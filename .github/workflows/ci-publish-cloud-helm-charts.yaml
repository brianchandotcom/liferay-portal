defaults:
    run:
        shell: bash
jobs:
    comment-argocd-patch-commands:
        if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal'
        needs:
            -   publish-aws
            -   publish-aws-infrastructure
            -   publish-aws-infrastructure-provider
            -   publish-default
            -   publish-gcp
            -   publish-gcp-infrastructure
            -   publish-gcp-infrastructure-provider
        permissions:
            pull-requests: write
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout comment templates
                uses: actions/checkout@v4
                with:
                    fetch-depth: 1
                    sparse-checkout: |
                        .github/templates
            -   env:
                    GH_REPO: ${{github.repository}}
                    GH_TOKEN: ${{github.token}}
                    PR_NUMBER: ${{github.event.pull_request.number}}
                    REGISTRY: ghcr.io/${{github.repository_owner}}/charts-pr/${{github.event.pull_request.number}}
                    SHA: ${{github.sha}}
                name: Post ArgoCD patch commands as PR comment
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local short_sha="${SHA:0:7}"

                        local aws_infra_provider_version
                        local aws_infra_version
                        local aws_version
                        local gcp_infra_provider_version
                        local gcp_infra_version
                        local gcp_version

                        aws_infra_provider_version=$(_chart_version aws-infrastructure-provider)
                        aws_infra_version=$(_chart_version aws-infrastructure)
                        aws_version=$(_chart_version aws)
                        gcp_infra_provider_version=$(_chart_version gcp-infrastructure-provider)
                        gcp_infra_version=$(_chart_version gcp-infrastructure)
                        gcp_version=$(_chart_version gcp)

                        _write_aws_comment_body \
                            "${aws_infra_provider_version}-pr-${PR_NUMBER}-g${short_sha}" \
                            "${aws_infra_version}-pr-${PR_NUMBER}-g${short_sha}" \
                            "${aws_version}-pr-${PR_NUMBER}-g${short_sha}" \
                            > /tmp/aws-comment.md

                        _write_gcp_comment_body \
                            "${gcp_infra_provider_version}-pr-${PR_NUMBER}-g${short_sha}" \
                            "${gcp_infra_version}-pr-${PR_NUMBER}-g${short_sha}" \
                            "${gcp_version}-pr-${PR_NUMBER}-g${short_sha}" \
                            > /tmp/gcp-comment.md

                        _upsert_comment argocd-aws-charts /tmp/aws-comment.md
                        _upsert_comment argocd-gcp-charts /tmp/gcp-comment.md
                    }

                    function _chart_version {
                        gh api "repos/${GH_REPO}/contents/cloud/helm/${1}/Chart.yaml?ref=${SHA}" --jq '.content' \
                            | base64 --decode \
                            | yq .version
                    }

                    function _upsert_comment {
                        local body_file="${2}"
                        local marker="${1}"

                        local comment_id

                        comment_id=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
                            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" \
                            | head --lines=1)

                        if [ -n "${comment_id}" ]
                        then
                            gh api "repos/${GH_REPO}/issues/comments/${comment_id}" \
                                --method PATCH \
                                --raw-field body="$(cat "${body_file}")"
                        else
                            gh pr comment "${PR_NUMBER}" --body-file "${body_file}"
                        fi
                    }

                    function _write_aws_comment_body {
                        local aws_infra_provider_version="${1}"
                        local aws_infra_version="${2}"
                        local aws_version="${3}"

                        export aws_infra_provider_version aws_infra_version aws_version

                        envsubst '${REGISTRY} ${aws_infra_provider_version} ${aws_infra_version} ${aws_version}' \
                            < .github/templates/argocd-aws-comment.md.tpl
                    }

                    function _write_gcp_comment_body {
                        local gcp_infra_provider_version="${1}"
                        local gcp_infra_version="${2}"
                        local gcp_version="${3}"

                        export gcp_infra_provider_version gcp_infra_version gcp_version

                        envsubst '${REGISTRY} ${gcp_infra_provider_version} ${gcp_infra_version} ${gcp_version}' \
                            < .github/templates/argocd-gcp-comment.md.tpl
                    }

                    main "${@}"
    delete-packages-pr:
        if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal'
        runs-on: ubuntu-latest
        steps:
            -   env:
                    GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
                    ORG: ${{github.repository_owner}}
                    PACKAGE: charts-pr/${{github.event.pull_request.number}}/${{matrix.chart}}
                name: Delete ephemeral PR package from GHCR
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local package_enc

                        package_enc=$(jq --arg p "${PACKAGE}" --null-input --raw-output '$p|@uri')

                        if gh api "/orgs/${ORG}/packages/container/${package_enc}" > /dev/null 2>&1
                        then
                            echo "Deleting package ${PACKAGE} from ${ORG}."

                            gh api \
                                --method DELETE \
                                "/orgs/${ORG}/packages/container/${package_enc}"
                        else
                            echo "No package ${PACKAGE} was found under ${ORG}."
                        fi
                    }

                    main "${@}"
        strategy:
            matrix:
                chart:
                    -   liferay-aws
                    -   liferay-aws-infrastructure
                    -   liferay-aws-infrastructure-provider
                    -   liferay-default
                    -   liferay-gcp
                    -   liferay-gcp-infrastructure
                    -   liferay-gcp-infrastructure-provider
    delete-releases-pr:
        env:
            PR_NUMBER: ${{github.event.pull_request.number}}
        if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal'
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            -   env:
                    GH_TOKEN: ${{github.token}}
                name: Delete preview GitHub Releases for closed PR
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local pattern="0\\.0\\.0-pr-${PR_NUMBER}-"

                        local tags

                        tags=$(gh release list --limit 1000 --json tagName \ --jq ".[] | select(.tagName | test(\"${pattern}\")) | .tagName")

                        echo "${tags}" | while read -r tag
                        do
                            [ -z "${tag}" ] && continue

                            echo "Deleting release ${tag}."

                            gh release delete --cleanup-tag --yes "${tag}"
                        done
                    }

                    main "${@}"
            -   name: Checkout gh-pages
                uses: actions/checkout@v4
                with:
                    fetch-depth: 1
                    ref: gh-pages
            -   name: Prune preview entries from index.yaml
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        if [ ! -f index.yaml ]
                        then
                            echo "Nothing to prune on gh-pages."

                            exit 0
                        fi

                        local pattern="^0\\.0\\.0-pr-${PR_NUMBER}-"

                        yq --inplace \
                            ".entries |= with_entries(.value |= map(select(.version | test(\"${pattern}\") | not)))" \
                            index.yaml

                        git config user.email "github-actions[bot]@users.noreply.github.com"
                        git config user.name "github-actions[bot]"

                        if ! git diff --quiet index.yaml
                        then
                            git add index.yaml

                            git commit --message "Remove preview entries for closed PR #${PR_NUMBER}."

                            git push
                        else
                            echo "No preview entries were found for PR #${PR_NUMBER}."
                        fi
                    }

                    main "${@}"
    publish-aws:
        if: |
            (github.event_name == 'push' && github.repository == 'liferay/liferay-portal') ||
            (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal')
        needs: publish-default
        secrets: inherit
        uses: ./.github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
        with:
            chart_name: liferay-aws
            pr_number: ${{github.event.pull_request.number}}
            registry: us-central1-docker.pkg.dev/liferay-artifact-registry/liferay-helm-chart
            working_directory: ./cloud/helm/aws
    publish-aws-infrastructure:
        if: |
            (github.event_name == 'push' && github.repository == 'liferay/liferay-portal') ||
            (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal')
        secrets: inherit
        uses: ./.github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
        with:
            chart_name: liferay-aws-infrastructure
            pr_number: ${{github.event.pull_request.number}}
            registry: us-central1-docker.pkg.dev/external-assets-prd/liferay-helm-chart
            working_directory: ./cloud/helm/aws-infrastructure
    publish-aws-infrastructure-provider:
        if: |
            (github.event_name == 'push' && github.repository == 'liferay/liferay-portal') ||
            (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal')
        secrets: inherit
        uses: ./.github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
        with:
            chart_name: liferay-aws-infrastructure-provider
            pr_number: ${{github.event.pull_request.number}}
            registry: us-central1-docker.pkg.dev/external-assets-prd/liferay-helm-chart
            working_directory: ./cloud/helm/aws-infrastructure-provider
    publish-aws-marketplace:
        env:
            ECR_REGISTRY: 709825985650.dkr.ecr.us-east-1.amazonaws.com
        if: github.event_name == 'push' && github.repository == 'liferay/liferay-portal'
        needs: publish-aws
        runs-on: ubuntu-latest
        steps:
            -   name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v5.1.0
                with:
                    aws-region: us-east-1
                    role-session-name: GitHubActions
                    role-to-assume: arn:aws:iam::831926597587:role/GitHubActionsRole
            -   name: Log in to ECR
                run: |
                    aws ecr get-login-password --region us-east-1 \
                        | helm registry login "${ECR_REGISTRY}" \
                            --password-stdin \
                            --username AWS
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    filter: blob:none
                    show-progress: false
            -   env:
                    GITHUB_TOKEN: ${{github.token}}
                id: verify_version
                name: Verify Helm chart version
                run: |
                    set -o errexit

                    function main {
                        CHART_VERSION=$(cat ./Chart.yaml | yq .version)

                        echo "Verifying Helm chart version ${CHART_VERSION}."

                        if ! helm show readme "oci://${ECR_REGISTRY}/liferay/liferay-aws-marketplace:${CHART_VERSION}" >/dev/null 2>&1
                        then
                            echo "Verified Helm Chart version ${CHART_VERSION}."

                            echo "CHART_VERSION=${CHART_VERSION}" >> ${GITHUB_ENV}

                            echo "should_publish=true" >> ${GITHUB_OUTPUT}
                        else
                            echo "Chart liferay-aws-marketplace@${CHART_VERSION} already exists."

                            echo "liferay-aws-marketplace: \`${CHART_VERSION}\` already published." >> ${GITHUB_STEP_SUMMARY}
                        fi
                    }

                    main "${@}"
                working-directory: ./cloud/helm/aws-marketplace
            -   if: ${{steps.verify_version.outputs.should_publish == 'true'}}
                name: Package and push Helm chart
                run: |
                    set -o errexit

                    function main {
                        local dist_dir="${{runner.temp}}/aws-marketplace/dist"

                        rm -fr "${dist_dir}"

                        mkdir --parents "${dist_dir}"

                        helm dependency update

                        helm package . \
                            --destination "${dist_dir}" \
                            --version "${CHART_VERSION}"

                        for file_name in "${dist_dir}"/*.tgz
                        do
                            echo "Pushing ${file_name}."

                            helm push "${file_name}" "oci://${ECR_REGISTRY}/liferay"
                        done
                    }

                    main "${@}"
                working-directory: ./cloud/helm/aws-marketplace
    publish-default:
        if: |
            (github.event_name == 'push' && github.repository == 'liferay/liferay-portal') ||
            (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal')
        secrets: inherit
        uses: ./.github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
        with:
            chart_name: liferay-default
            pr_number: ${{github.event.pull_request.number}}
            registry: us-central1-docker.pkg.dev/liferay-artifact-registry/liferay-helm-chart
            working_directory: ./cloud/helm/default
    publish-gcp:
        if: |
            (github.event_name == 'push' && github.repository == 'liferay/liferay-portal') ||
            (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal')
        needs: publish-default
        secrets: inherit
        uses: ./.github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
        with:
            chart_name: liferay-gcp
            pr_number: ${{github.event.pull_request.number}}
            registry: us-central1-docker.pkg.dev/liferay-artifact-registry/liferay-helm-chart
            working_directory: ./cloud/helm/gcp
    publish-gcp-infrastructure:
        if: |
            (github.event_name == 'push' && github.repository == 'liferay/liferay-portal') ||
            (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal')
        secrets: inherit
        uses: ./.github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
        with:
            chart_name: liferay-gcp-infrastructure
            pr_number: ${{github.event.pull_request.number}}
            registry: us-central1-docker.pkg.dev/external-assets-prd/liferay-helm-chart
            working_directory: ./cloud/helm/gcp-infrastructure
    publish-gcp-infrastructure-provider:
        if: |
            (github.event_name == 'push' && github.repository == 'liferay/liferay-portal') ||
            (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal')
        secrets: inherit
        uses: ./.github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
        with:
            chart_name: liferay-gcp-infrastructure-provider
            pr_number: ${{github.event.pull_request.number}}
            registry: us-central1-docker.pkg.dev/external-assets-prd/liferay-helm-chart
            working_directory: ./cloud/helm/gcp-infrastructure-provider
    release-helm-charts:
        env:
            CR_TOKEN: ${{secrets.GITHUB_TOKEN}}
        if: github.event.pull_request.head.repo.full_name == 'cloudnative-team/liferay-portal' && github.event.pull_request.number != '' && github.event_name == 'pull_request' && github.repository == 'cloudnative-team/liferay-portal'
        name: Run chart-releaser
        needs:
            -   publish-aws
            -   publish-aws-infrastructure
            -   publish-aws-infrastructure-provider
            -   publish-default
            -   publish-gcp
            -   publish-gcp-infrastructure
            -   publish-gcp-infrastructure-provider
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    fetch-depth: 1
                    spare-checkout-code-mode: true
                    sparse-checkout: |
                        cloud/helm
            -   name: Configure Git
                run: |
                    git config user.name "$GITHUB_ACTOR"
                    git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
            -   name: Install Helm
                uses: azure/setup-helm@v4
            -   name: Run chart-releaser
                uses: helm/chart-releaser-action@v1.7.0
                with:
                    charts_dir: cloud/helm
                    skip_existing: true
on:
    pull_request:
        branches:
            -   master
        paths:
            -   .github/workflows/ci-publish-cloud-helm-charts.yaml
            -   .github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
            -   cloud/helm/**
        types:
            -   closed
            -   opened
            -   reopened
            -   synchronize
    push:
        branches:
            -   master
        paths:
            -   .github/workflows/ci-publish-cloud-helm-charts.yaml
            -   .github/workflows/ci-reusable-publish-helm-chart-to-gar.yaml
            -   cloud/helm/**
permissions:
    contents: write
    id-token: write
    packages: write