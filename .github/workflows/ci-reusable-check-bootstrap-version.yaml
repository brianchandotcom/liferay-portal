defaults:
    run:
        shell: bash
jobs:
    check:
        outputs:
            should_release: ${{steps.check.outputs.should_release}}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 1
                    filter: tree:0
                    show-progress: false
                    sparse-checkout: cloud/scripts
            -   id: auth_production
                name: Authenticate to Google Cloud (Production)
                uses: google-github-actions/auth@v3
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_PRODUCTION}}
                    workload_identity_provider: ${{vars.GCP_WORKLOAD_IDENTITY_PROVIDER_EXTERNAL_PRODUCTION}}
            -   name: Set up Google Cloud CLI
                uses: google-github-actions/setup-gcloud@v2
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_PRODUCTION}}
            -   env:
                    BOOTSTRAP_STORAGE_PATH_PRODUCTION: ${{vars.BOOTSTRAP_STORAGE_PATH_PRODUCTION}}
                id: check
                name: Check whether bootstrap tarball is already published
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local provider="${{inputs.provider}}"

                        local version

                        version=$(jq --raw-output ".\"liferay-${provider}-bootstrap\"" ./cloud/scripts/versions.json)

                        local object_path="${BOOTSTRAP_STORAGE_PATH_PRODUCTION}/liferay-${provider}-bootstrap/liferay-${provider}-bootstrap-${version}.tar.gz"

                        if gcloud \
                                storage \
                                objects \
                                describe \
                                "${object_path}" \
                                > /dev/null 2>&1
                        then
                            echo "\`${object_path}\` is already published. The release candidate will not be pushed." >> "${GITHUB_STEP_SUMMARY}"

                            echo "should_release=false" >> ${GITHUB_OUTPUT}
                        else
                            echo "should_release=true" >> ${GITHUB_OUTPUT}
                        fi
                    }

                    main "${@}"
on:
    workflow_call:
        inputs:
            provider:
                required: true
                type: string
        outputs:
            should_release:
                value: ${{jobs.check.outputs.should_release}}
permissions:
    contents: read
    id-token: write