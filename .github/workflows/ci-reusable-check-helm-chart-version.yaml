defaults:
    run:
        shell: bash
jobs:
    check:
        outputs:
            should_release: ${{steps.check.outputs.should_release}}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 1
                    filter: blob:none
                    show-progress: false
                    sparse-checkout: cloud/helm
            -   id: auth_production
                name: Authenticate to Google Cloud (Production)
                uses: google-github-actions/auth@v3
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_PRODUCTION}}
                    workload_identity_provider: ${{vars.GCP_WORKLOAD_IDENTITY_PROVIDER_EXTERNAL_PRODUCTION}}
            -   name: Install ORAS
                uses: oras-project/setup-oras@v1
            -   env:
                    HELM_CHART_REGISTRY_PRODUCTION: ${{vars.HELM_CHART_REGISTRY_PRODUCTION}}
                id: check
                name: Check whether Helm chart version is already published
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local chart_version

                        chart_version=$(yq .version Chart.yaml)

                        local chart_oci_url="${HELM_CHART_REGISTRY_PRODUCTION}/${{inputs.chart_name}}:${chart_version}"

                        if oras \
                                manifest \
                                fetch \
                                --password "${{steps.auth_production.outputs.auth_token}}" \
                                --username oauth2accesstoken \
                                "${chart_oci_url}" \
                                > /dev/null 2>&1
                        then
                            echo "\`${chart_oci_url}\` is already published. The release candidate will not be pushed." >> "${GITHUB_STEP_SUMMARY}"

                            echo "should_release=false" >> ${GITHUB_OUTPUT}
                        else
                            echo "should_release=true" >> ${GITHUB_OUTPUT}
                        fi
                    }

                    main "${@}"
                working-directory: ${{inputs.working_directory}}
on:
    workflow_call:
        inputs:
            chart_name:
                required: true
                type: string
            working_directory:
                required: true
                type: string
        outputs:
            should_release:
                value: ${{jobs.check.outputs.should_release}}
permissions:
    contents: read
    id-token: write