defaults:
    run:
        shell: bash
jobs:
    promote:
        permissions:
            contents: read
            id-token: write
        runs-on: ubuntu-latest
        steps:
            -   id: auth_nonproduction
                name: Authenticate to Google Cloud (Non-production)
                uses: google-github-actions/auth@v3
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_NONPRODUCTION}}
                    workload_identity_provider: ${{vars.GCP_WORKLOAD_IDENTITY_PROVIDER_EXTERNAL_NONPRODUCTION}}
            -   id: auth_production
                name: Authenticate to Google Cloud (Production)
                uses: google-github-actions/auth@v3
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_PRODUCTION}}
                    workload_identity_provider: ${{vars.GCP_WORKLOAD_IDENTITY_PROVIDER_EXTERNAL_PRODUCTION}}
            -   name: Set up Google Cloud CLI
                uses: google-github-actions/setup-gcloud@v2
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_PRODUCTION}}
            -   env:
                    BOOTSTRAP_STORAGE_PATH_PRODUCTION: ${{vars.BOOTSTRAP_STORAGE_PATH_PRODUCTION}}
                name: Promote bootstrap tarball
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local destination_object_basename

                        destination_object_basename=$(basename "${{inputs.source_object_name}}")

                        CLOUDSDK_AUTH_ACCESS_TOKEN="${{steps.auth_nonproduction.outputs.auth_token}}" \
                            gcloud \
                                storage \
                                cp \
                                "${{inputs.source_object_name}}" \
                                "/tmp/${destination_object_basename}"

                        CLOUDSDK_AUTH_ACCESS_TOKEN="${{steps.auth_production.outputs.auth_token}}" \
                            gcloud \
                                storage \
                                cp \
                                "/tmp/${destination_object_basename}" \
                                "${BOOTSTRAP_STORAGE_PATH_PRODUCTION}/liferay-${{inputs.provider}}-bootstrap/${destination_object_basename}"
                    }

                    main "${@}"
on:
    workflow_call:
        inputs:
            provider:
                required: true
                type: string
            source_object_name:
                required: true
                type: string
permissions:
    contents: read
    id-token: write