defaults:
    run:
        shell: bash
jobs:
    publish:
        env:
            GITHUB_TOKEN: ${{github.token}}
            IS_PR: ${{inputs.pr_number != ''}}
        permissions:
            contents: read
            id-token: write
            packages: write
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 1
                    filter: blob:none
                    show-progress: false
            -   if: ${{env.IS_PR == 'true'}}
                name: Modify version for pull request
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local chart_version

                        chart_version=$(cat ./Chart.yaml | yq .version)

                        local short_sha

                        short_sha=$(git rev-parse --short HEAD)

                        local new_version="${chart_version}-pr-${{inputs.pr_number}}-g${short_sha}"

                        echo "Modifying chart version from ${chart_version} to ${new_version}."

                        yq -i ".version = \"${new_version}\"" Chart.yaml
                    }

                    main "${@}"
                working-directory: ${{inputs.working_directory}}
            -   id: verify_version
                name: Verify Helm chart version
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        CHART_VERSION=$(cat ./Chart.yaml | yq .version)

                        local registry

                        if [[ "${{env.IS_PR}}" == "true" ]]
                        then
                            registry="ghcr.io/${{github.repository_owner}}/charts-pr/${{inputs.pr_number}}"
                        else
                            registry="${{inputs.registry}}"
                        fi

                        echo "Verifying Helm chart version ${CHART_VERSION} in ${registry}."

                        if [[ "${{env.IS_PR}}" == "true" ]]
                        then
                            echo "Overwriting version ${CHART_VERSION} in GHCR if it exists."

                            echo "CHART_VERSION=${CHART_VERSION}" >> ${GITHUB_ENV}

                            echo "registry=${registry}" >> ${GITHUB_OUTPUT}

                            echo "should_publish=true" >> ${GITHUB_OUTPUT}
                        elif ! helm show readme "oci://${registry}/${{inputs.chart_name}}:${CHART_VERSION}" >/dev/null 2>&1
                        then
                            echo "Verified Helm Chart version ${CHART_VERSION}."

                            echo "CHART_VERSION=${CHART_VERSION}" >> ${GITHUB_ENV}

                            echo "registry=${registry}" >> ${GITHUB_OUTPUT}

                            echo "should_publish=true" >> ${GITHUB_OUTPUT}
                        else
                            echo "Chart ${{inputs.chart_name}}@${CHART_VERSION} already exists."

                            echo "${{inputs.chart_name}}: \`${CHART_VERSION}\` already published." >> ${GITHUB_STEP_SUMMARY}
                        fi
                    }

                    main "${@}"
                working-directory: ${{inputs.working_directory}}
            -   id: auth
                if: ${{env.IS_PR == 'false' && steps.verify_version.outputs.should_publish == 'true'}}
                name: Authenticate to Google Cloud
                uses: google-github-actions/auth@v3
                with:
                    project_id: ${{secrets.project_id}}
                    workload_identity_provider: ${{secrets.workload_identity_provider}}
            -   if: ${{env.IS_PR == 'false' && steps.verify_version.outputs.should_publish == 'true'}}
                name: Log in to GAR
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    echo "${{steps.auth.outputs.auth_token}}" \
                        | helm registry login "${{inputs.registry}}" \
                            --password-stdin \
                            --username oauth2accesstoken
            -   if: ${{env.IS_PR == 'true' && steps.verify_version.outputs.should_publish == 'true'}}
                name: Log in to GHCR
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    echo "${{github.token}}" \
                        | helm registry login ghcr.io \
                            --password-stdin \
                            --username "${{github.actor}}"
            -   if: ${{steps.verify_version.outputs.should_publish == 'true'}}
                name: Package Helm chart
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local dist_dir="${{runner.temp}}/${{inputs.chart_name}}/dist"

                        rm --force --recursive "${dist_dir}"

                        mkdir --parents "${dist_dir}"

                        helm dependency update

                        helm package . \
                            --destination "${dist_dir}" \
                            --version "${CHART_VERSION}"
                    }

                    main "${@}"
                working-directory: ${{inputs.working_directory}}
            -   if: ${{steps.verify_version.outputs.should_publish == 'true'}}
                name: Publish Helm chart
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local dist_dir="${{runner.temp}}/${{inputs.chart_name}}/dist"

                        for file_name in "${dist_dir}"/*.tgz
                        do
                            echo "Pushing ${file_name} to oci://${{steps.verify_version.outputs.registry}}."

                            helm push "${file_name}" "oci://${{steps.verify_version.outputs.registry}}"
                        done
                    }

                    main "${@}"
                working-directory: ${{inputs.working_directory}}
on:
    workflow_call:
        inputs:
            chart_name:
                required: true
                type: string
            pr_number:
                default: ""
                required: false
                type: string
            registry:
                required: true
                type: string
            working_directory:
                required: true
                type: string
        secrets:
            project_id:
                required: true
            workload_identity_provider:
                required: true
permissions:
    contents: read
    id-token: write
    packages: write