defaults:
    run:
        shell: bash
jobs:
    push:
        outputs:
            object_name: ${{steps.vars.outputs.object_name}}
            version: ${{steps.vars.outputs.version}}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 1
                    filter: tree:0
                    show-progress: false
                    sparse-checkout: |
                        cloud/scripts
                        cloud/terraform/${{inputs.provider}}
            -   name: Authenticate to Google Cloud
                uses: google-github-actions/auth@v3
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_NONPRODUCTION}}
                    workload_identity_provider: ${{vars.GCP_WORKLOAD_IDENTITY_PROVIDER_EXTERNAL_NONPRODUCTION}}
            -   name: Set up Google Cloud CLI
                uses: google-github-actions/setup-gcloud@v2
                with:
                    project_id: ${{vars.GCP_PROJECT_ID_EXTERNAL_NONPRODUCTION}}
            -   env:
                    BOOTSTRAP_STORAGE_PATH_NONPRODUCTION: ${{vars.BOOTSTRAP_STORAGE_PATH_NONPRODUCTION}}
                id: vars
                name: Set up variables
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local provider="${{inputs.provider}}"

                        local version

                        version=$(jq --raw-output --arg key "liferay-${provider}-bootstrap" '.[$key]' ./cloud/scripts/versions.json)

                        local object_basename="liferay-${provider}-bootstrap-${version}.tar.gz"

                        echo "OBJECT_BASENAME=${object_basename}" >> ${GITHUB_ENV}

                        local object_name="${BOOTSTRAP_STORAGE_PATH_NONPRODUCTION}/$(echo "${GITHUB_REF_NAME}" | tr '/' '-')/liferay-${provider}-bootstrap/${object_basename}"

                        echo "OBJECT_NAME=${object_name}" >> ${GITHUB_ENV}
                        echo "object_name=${object_name}" >> ${GITHUB_OUTPUT}
                        echo "version=${version}" >> ${GITHUB_OUTPUT}
                    }

                    main "${@}"
            -   name: Package and push bootstrap tarball
                run: |
                    set -o errexit
                    set -o nounset
                    set -o pipefail

                    function main {
                        local provider="${{inputs.provider}}"

                        local files

                        if [[ "${provider}" == "aws" ]]
                        then
                            files=(
                                cloud/scripts/setup_aws.sh
                                cloud/scripts/versions_aws.tfvars
                                cloud/terraform/aws/eks/*
                                cloud/terraform/aws/gitops/platform/*
                                cloud/terraform/aws/gitops/resources/*
                            )
                        elif [[ "${provider}" == "gcp" ]]
                        then
                            files=(
                                cloud/scripts/setup_gcp.sh
                                cloud/scripts/versions_gcp.tfvars
                                cloud/terraform/gcp/gitops/platform/*
                                cloud/terraform/gcp/gitops/resources/*
                                cloud/terraform/gcp/gke/*
                            )
                        fi

                        tar \
                            --create \
                            --file "/tmp/${OBJECT_BASENAME}" \
                            --gzip \
                            --verbose \
                            "${files[@]}"

                        (cd /tmp && sha256sum "${OBJECT_BASENAME}" > "${OBJECT_BASENAME}.sha256")

                        gcloud \
                            storage \
                            cp \
                            "/tmp/${OBJECT_BASENAME}" \
                            "${OBJECT_NAME}"

                        gcloud \
                            storage \
                            cp \
                            "/tmp/${OBJECT_BASENAME}.sha256" \
                            "${OBJECT_NAME}.sha256"
                    }

                    main "${@}"
on:
    workflow_call:
        inputs:
            provider:
                required: true
                type: string
        outputs:
            object_name:
                value: ${{jobs.push.outputs.object_name}}
            version:
                value: ${{jobs.push.outputs.version}}
permissions:
    contents: read
    id-token: write