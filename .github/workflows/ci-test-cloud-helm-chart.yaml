defaults:
    run:
        shell: bash
jobs:
    test-cloud-helm-chart:
        if: ${{github.repository == 'cloudnative-team/liferay-portal'}}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
            -   name: Install Helm
                uses: azure/setup-helm@v4
            -   name: Install helm-unittest plugin
                run: helm plugin install --verify=false --version 1.0.3 https://github.com/helm-unittest/helm-unittest
            -   name: Set up Kubeconform
                uses: bmuschko/setup-kubeconform@v1
                with:
                    kubeconform-version: 0.7.0
            -   name: Update Helm dependencies
                run: helm dependency update --skip-refresh
                working-directory: ./cloud/helm/${{matrix.chart}}
            -   name: Lint Helm chart
                run: helm lint .
                working-directory: ./cloud/helm/${{matrix.chart}}
            -   name: Run Helm chart tests
                run: helm unittest .
                working-directory: ./cloud/helm/${{matrix.chart}}
            -   name: Run Bash tests
                run: |
                    set -o errexit

                    function main {
                        local test

                        for test in scripts/tests/*-test.sh tests/*_test.sh
                        do
                            if [ -f "${test}" ]
                            then
                                bash "${test}"
                            fi
                        done
                    }

                    main
                working-directory: ./cloud/helm/${{matrix.chart}}
            -   name: Render and validate Helm chart
                run: |
                    set -o pipefail

                    helm template liferay . | kubeconform --strict --summary \
                        -schema-location default \
                        -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                        -skip ClusterProviderConfig,LiferayInfrastructure
                working-directory: ./cloud/helm/${{matrix.chart}}
        strategy:
            fail-fast: false
            matrix:
                chart:
                    -   aws
                    -   aws-infrastructure
                    -   aws-infrastructure-provider
                    -   aws-marketplace
                    -   default
                    -   gcp
                    -   gcp-infrastructure
                    -   gcp-infrastructure-provider
    test-cloud-helm-chart-smoke:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
            -   name: Create kind cluster
                uses: helm/kind-action@v1
            -   name: Install Helm
                uses: azure/setup-helm@v4
            -   name: Install Liferay chart
                run: |
                    helm upgrade --install liferay . \
                        --set resources.limits.cpu=2000m \
                        --set resources.limits.memory=4Gi \
                        --set resources.requests.cpu=500m \
                        --set resources.requests.memory=2Gi \
                        --set startupProbe.failureThreshold=180 \
                        --timeout 10m \
                        --wait
                working-directory: ./cloud/helm/default
            -   if: failure()
                name: Collect cluster diagnostics
                run: |
                    kubectl get all --all-namespaces
                    kubectl describe pods
                    kubectl logs --all-containers --tail=300 --selector=app.kubernetes.io/name=liferay-default || true
                    kubectl logs --all-containers --previous --tail=300 --selector=app.kubernetes.io/name=liferay-default || true
                    kubectl get events --sort-by=.lastTimestamp
on:
    pull_request:
        paths:
            -   .github/workflows/ci-test-cloud-helm-chart.yaml
            -   cloud/helm/**
    push:
        branches:
            -   master
        paths:
            -   .github/workflows/ci-test-cloud-helm-chart.yaml
            -   cloud/**