defaults:
    run:
        shell: bash
jobs:
    test-cloud-terraform:
        if: ${{github.repository == 'cloudnative-team/liferay-portal'}}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
            -   name: Setup Terraform
                uses: hashicorp/setup-terraform@v3
                with:
                    terraform_version: 1.5.7
            -   name: Initialize Terraform
                run: terraform init -backend=false -input=false
                working-directory: ./cloud/terraform/${{matrix.stack}}
            -   name: Validate Terraform
                run: terraform validate
                working-directory: ./cloud/terraform/${{matrix.stack}}
        strategy:
            fail-fast: false
            matrix:
                stack:
                    -   aws/backup/backup-plan
                    -   aws/backup/backup-restore-workflow
                    -   aws/backup/backup-vault
                    -   aws/dependencies
                    -   aws/ecr
                    -   aws/eks
                    -   aws/gitops/platform
                    -   aws/gitops/resources
                    -   aws/grafana
                    -   gcp/gitops/platform
                    -   gcp/gitops/resources
                    -   gcp/gke
on:
    pull_request:
        paths:
            -   .github/workflows/ci-test-cloud-terraform.yaml
            -   cloud/terraform/**
    push:
        branches:
            -   master
        paths:
            -   .github/workflows/ci-test-cloud-terraform.yaml
            -   cloud/terraform/**