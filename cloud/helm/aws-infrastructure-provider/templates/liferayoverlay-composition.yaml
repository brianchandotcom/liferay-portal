apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
    annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
        argocd.argoproj.io/sync-wave: "-60"
    name: liferayoverlays.aws.liferay.com
spec:
    group: aws.liferay.com
    names:
        kind: LiferayOverlay
        plural: liferayoverlays
        shortNames:
            -   lfroverlay
            -   lro
        singular: liferayoverlay
    versions:
        -   name: v1alpha1
            referenceable: true
            schema:
                openAPIV3Schema:
                    properties:
                        spec:
                            properties:
                                commonTags:
                                    additionalProperties:
                                        type: string
                                    default: {}
                                    type: object
                                forceDestroy:
                                    default: false
                                    type: boolean
                                orphanOnDelete:
                                    type: boolean
                                projectId:
                                    type: string
                                region:
                                    type: string
                            required:
                                -   forceDestroy
                                -   orphanOnDelete
                                -   projectId
                                -   region
                            type: object
                        status:
                            properties:
                                bucketReady:
                                    default: false
                                    type: boolean
                            type: object
                    type: object
            served: true
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-50"
    name: liferay-aws-overlay.aws.liferay.com
spec:
    compositeTypeRef:
        apiVersion: aws.liferay.com/v1alpha1
        kind: LiferayOverlay
    mode: Pipeline
    pipeline:
        -   functionRef:
                name: function-go-templating
            input:
                apiVersion: template.fn.crossplane.io/v1beta1
                inline:
                    template: |
                        {{`
                        {{- $accountId := `}}{{ .Values.aws.accountId | quote }}{{` -}}
                        {{- $deploymentName := `}}{{ .Values.deploymentName | quote }}{{` -}}

                        {{- $xr := .observed.composite.resource -}}

                        {{- $forceDestroy := $xr.spec.forceDestroy -}}
                        {{- $overlayRegion := $xr.spec.region -}}
                        {{- $projectId := $xr.spec.projectId -}}

                        {{- $managementPolicies := $xr.spec.orphanOnDelete | ternary (list "Create" "Observe" "Update") (list "*") | toJson -}}
                        {{- $namespace := $xr.metadata.namespace -}}

                        `}}
                        {{- include "aws-infrastructure-provider.overlayBucketName" . | nindent 24 }}
                        {{`
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: Bucket
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket
                            labels:
                                app: liferay
                                component: overlay
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                forceDestroy: {{ $forceDestroy }}
                                region: {{ $overlayRegion }}
                                tags:
                                    Name: {{ $overlayBucketName }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketLifecycleConfiguration
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket-lifecycle
                            labels:
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                        spec:
                            forProvider:
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: overlay
                                        projectId: {{ $projectId }}
                                region: {{ $overlayRegion }}
                                rule:
                                    -   abortIncompleteMultipartUpload:
                                            -   daysAfterInitiation: 7
                                        expiration:
                                            -   expiredObjectDeleteMarker: true
                                        id: bucket-scoped-rule
                                        noncurrentVersionExpiration:
                                            -   noncurrentDays: 7
                                        status: Enabled
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketPublicAccessBlock
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-bucket-public-access-block
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket-public-access-block
                            labels:
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                        spec:
                            forProvider:
                                blockPublicAcls: true
                                blockPublicPolicy: true
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: overlay
                                        projectId: {{ $projectId }}
                                ignorePublicAcls: true
                                region: {{ $overlayRegion }}
                                restrictPublicBuckets: true
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketVersioning
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-bucket-versioning
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket-versioning
                            labels:
                                app: liferay
                                component: overlay-versioning
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: overlay
                                        projectId: {{ $projectId }}
                                    namespace: {{ $namespace }}
                                region: {{ $overlayRegion }}
                                versioningConfiguration:
                                    status: Enabled
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: Policy
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-upload-only-policy
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-upload-only-policy
                            labels:
                                app: liferay
                                aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                                component: overlay-upload-only-policy
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}-upload-only
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                policy: |
                                    {
                                        "Statement": [
                                            {
                                                "Action": [
                                                    "s3:ListBucket"
                                                ],
                                                "Effect": "Allow",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $overlayBucketName }}"
                                                ],
                                                "Sid": "AllowListBucket"
                                            },
                                            {
                                                "Action": [
                                                    "s3:PutObject"
                                                ],
                                                "Effect": "Allow",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $overlayBucketName }}/*"
                                                ],
                                                "Sid": "AllowPutBucket"
                                            },
                                            {
                                                "Action": [
                                                    "s3:DeleteObject",
                                                    "s3:DeleteObjectVersion"
                                                ],
                                                "Effect": "Deny",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $overlayBucketName }}",
                                                    "arn:aws:s3:::{{ $overlayBucketName }}/*"
                                                ],
                                                "Sid": "DenyDeleteBucket"
                                            }
                                        ],
                                       "Version": "2012-10-17"
                                    }
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: User
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-ci-uploader-user
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-ci-uploader-user
                            labels:
                                aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                            name: {{ $overlayBucketName }}-ci-uploader
                            namespace: {{ $namespace }}
                        spec:
                            forProvider: {}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: UserPolicyAttachment
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-ci-uploader-user-policy-attachment
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-ci-uploader-user-policy-attachment
                            name: {{ $overlayBucketName }}-ci-uploader
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                policyArnSelector:
                                    matchLabels:
                                        aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                                userSelector:
                                    matchLabels:
                                        aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: AccessKey
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-ci-uploader-access-key
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-ci-uploader-access-key
                            name: {{ $overlayBucketName }}-ci-uploader
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                userSelector:
                                    matchLabels:
                                        aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                            writeConnectionSecretToRef:
                                name: {{ $overlayBucketName }}-ci-uploader-access-key
                        `}}
                kind: GoTemplate
                source: Inline
            step: overlay
        -   functionRef:
                name: function-tag-manager
            input:
                addTags:
                    -   fromFieldPath: spec.commonTags
                        type: FromCompositeFieldPath
                    -   tags:
                            DeploymentName: {{ .Values.deploymentName | quote }}
                        type: FromValue
                apiVersion: tag-manager.fn.crossplane.io/v1beta1
                kind: ManagedTags
            step: apply-default-tags
        -   functionRef:
                name: function-auto-ready
            step: auto-detect-ready-composed-resources