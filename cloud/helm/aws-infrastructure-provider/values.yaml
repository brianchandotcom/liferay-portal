aws: {}
crossplaneNamespace: crossplane-system
eck-operator:
    installCRDs: true
    resources:
        limits:
            cpu: 1
            memory: 512Mi
        requests:
            cpu: 100m
            memory: 128Mi
    securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
            drop:
                - ALL
        seccompProfile:
            type: RuntimeDefault
    podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
            type: RuntimeDefault
gateway:
    internetFacing: true
    namespace: envoy-gateway-system
liferay-subchart-backup-restore:
    enabled: true