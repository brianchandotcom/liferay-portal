suite: certificate ExternalSecret
templates:
    -   templates/externalsecret-certificate.yaml
tests:
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: web-cert
            -   equal:
                    path: spec.dataFrom[0].extract.key
                    value: liferay/certificates/web-cert
            -   equal:
                    path: spec.secretStoreRef.name
                    value: my-store
            -   hasDocuments:
                    count: 1
            -   isKind:
                    of: ExternalSecret
        it: should create a certificate ExternalSecret keyed under the certificates path
        set:
            enabled: true
            endpoints:
                web:
                    port: 443
                    protocol: HTTPS
                    tls:
                        externalSecretNames:
                            -   web-cert
            secretStoreName: my-store
    -   asserts:
            -   hasDocuments:
                    count: 2
        it: should create one ExternalSecret per distinct certificate across endpoints
        set:
            enabled: true
            endpoints:
                admin:
                    port: 8443
                    protocol: HTTPS
                    tls:
                        externalSecretNames:
                            -   admin-cert
                web:
                    port: 443
                    protocol: HTTPS
                    tls:
                        externalSecretNames:
                            -   web-cert
            secretStoreName: my-store
    -   asserts:
            -   hasDocuments:
                    count: 1
        it: should deduplicate a certificate referenced by more than one endpoint
        set:
            enabled: true
            endpoints:
                admin:
                    port: 8443
                    protocol: HTTPS
                    tls:
                        externalSecretNames:
                            -   shared-cert
                web:
                    port: 443
                    protocol: HTTPS
                    tls:
                        externalSecretNames:
                            -   shared-cert
            secretStoreName: my-store
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: should omit the certificate ExternalSecret when no secret store is configured
        set:
            enabled: true
            endpoints:
                web:
                    port: 443
                    protocol: HTTPS
                    tls:
                        externalSecretNames:
                            -   web-cert