suite: KEDA TriggerAuthentication AWS provider
templates:
    -   charts/liferay-default/templates/triggerauthentication.yaml
tests:
    -   asserts:
            -   equal:
                    path: spec.podIdentity.provider
                    value: aws
            -   isKind:
                    of: TriggerAuthentication
        it: Renders TriggerAuthentication with podIdentity.provider=aws when autoscaling is enabled
        set:
            liferay-default.autoscaling.enabled: true