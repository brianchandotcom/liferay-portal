{{- if and .Values.autoscaling.enabled (eq .Values.autoscaling.type "hpa") }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    {{- with .Values.autoscaling.hpa.annotations }}
    annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    labels:
        {{- include "liferay.labels" . | nindent 8 }}
    name: {{ include "liferay.name" . }}
    namespace: {{ include "liferay.namespace" . }}
spec:
    {{- with .Values.autoscaling.hpa.behavior }}
    behavior:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    maxReplicas: {{ .Values.autoscaling.hpa.maxReplicas }}
    {{- with .Values.autoscaling.hpa.metrics }}
    metrics:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    minReplicas: {{ .Values.autoscaling.hpa.minReplicas }}
    scaleTargetRef:
        apiVersion: apps/v1
        kind: StatefulSet
        name: {{ include "liferay.name" . }}
{{- end }}