{{- if and .Values.autoscaling.enabled .Values.keda.enabled -}}
{{- fail "Cannot enable both .Values.autoscaling.enabled and .Values.keda.enabled. KEDA manages its own HorizontalPodAutoscaler." -}}
{{- end }}
{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    labels:
        {{- include "liferay.labels" . | nindent 8 }}
    name: {{ include "liferay.name" . }}
    namespace: {{ include "liferay.namespace" . }}
spec:
    maxReplicaCount: {{ .Values.keda.maxReplicaCount }}
    minReplicaCount: {{ .Values.keda.minReplicaCount }}
    pollingInterval: {{ .Values.keda.pollingInterval }}
    scaleTargetRef:
        apiVersion: apps/v1
        kind: StatefulSet
        name: {{ include "liferay.name" . }}
    {{- $resolvedServerAddress := include "liferay.keda.prometheusServerAddress" . }}
    {{- $rawTriggers := concat (.Values.keda.triggers | default list) (.Values.keda.customTriggers | default list) }}
    {{- $triggers := list }}
    {{- range $rawTriggers }}
        {{- $trigger := deepCopy . }}
        {{- if not (hasKey $trigger "type") }}
            {{- $_ := set $trigger "type" "prometheus" }}
        {{- end }}
        {{- if eq $trigger.type "prometheus" }}
            {{- if not (hasKey $trigger.metadata "serverAddress") }}
                {{- $_ := set $trigger.metadata "serverAddress" $resolvedServerAddress }}
            {{- end }}
        {{- end }}
        {{- $triggers = append $triggers $trigger }}
    {{- end }}
    {{- with $triggers }}
    triggers:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}