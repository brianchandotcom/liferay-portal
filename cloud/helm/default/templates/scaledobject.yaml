{{- if and .Values.autoscaling.enabled (eq .Values.autoscaling.type "keda") }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    labels:
        {{- include "liferay.labels" . | nindent 8 }}
    name: {{ include "liferay.name" . }}
    namespace: {{ include "liferay.namespace" . }}
spec:
    maxReplicaCount: {{ .Values.autoscaling.keda.maxReplicaCount }}
    minReplicaCount: {{ .Values.autoscaling.keda.minReplicaCount }}
    pollingInterval: {{ .Values.autoscaling.keda.pollingInterval }}
    scaleTargetRef:
        apiVersion: apps/v1
        kind: StatefulSet
        name: {{ include "liferay.name" . }}
    {{- $resolvedServerAddress := include "liferay.keda.prometheusServerAddress" . }}
    {{- $custom := .Values.autoscaling.keda.customTriggers | default dict }}
    {{- $merged := mergeOverwrite (deepCopy (.Values.autoscaling.keda.triggers | default dict)) $custom }}
    {{- range $k, $v := $custom }}
        {{- if not $v }}
            {{- $_ := unset $merged $k }}
        {{- end }}
    {{- end }}
    {{- $triggers := list }}
    {{- range $k, $v := $merged }}
        {{- $trigger := deepCopy $v }}
        {{- if not (hasKey $trigger "type") }}
            {{- $_ := set $trigger "type" "prometheus" }}
        {{- end }}
        {{- if eq $trigger.type "prometheus" }}
            {{- if not (hasKey $trigger.metadata "serverAddress") }}
                {{- $_ := set $trigger.metadata "serverAddress" $resolvedServerAddress }}
            {{- end }}
        {{- end }}
        {{- $triggers = append $triggers $trigger }}
    {{- end }}
    {{- with $triggers }}
    triggers:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}