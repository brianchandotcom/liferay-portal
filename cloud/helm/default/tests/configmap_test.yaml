suite: ConfigMap
templates:
    -   templates/configmap.yaml
tests:
    -   asserts:
            -   isKind:
                    of: ConfigMap
            -   matchRegex:
                    path: data["portal-cloud.properties"]
                    pattern: "\"com.example.a\""
            -   matchRegex:
                    path: data["portal-cloud.properties"]
                    pattern: "\"com.example.b\""
            -   matchRegex:
                    path: data["portal-cloud.properties"]
                    pattern: "\"com.example.c\""
        it: should add every entry of the bundle deny list through the loop
        set:
            portalBundleDenyList:
                -   com.example.a
                -   com.example.b
                -   com.example.c
    -   asserts:
            -   notExists:
                    path: data["portal-cloud.properties"]
        it: should drop the default data when configmap defaults are overridden
        set:
            configmap.overrideDefaults: true
    -   asserts:
            -   matchRegex:
                    path: data["portal-cloud.properties"]
                    pattern: cluster.link.enabled=true
        it: should enable the cluster link properties when autoscaling is enabled
        set:
            autoscaling.enabled: true
            replicaCount: 1
    -   asserts:
            -   matchRegex:
                    path: data["portal-cloud.properties"]
                    pattern: cluster.link.enabled=true
        it: should enable the cluster link properties when more than one replica is requested
        set:
            autoscaling.enabled: false
            replicaCount: 2
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: my-portal
        it: should name the ConfigMap after the chart name override
        set:
            nameOverride: my-portal
    -   asserts:
            -   notMatchRegex:
                    path: data["portal-cloud.properties"]
                    pattern: cluster.link.enabled=true
        it: should omit the cluster link properties for a single replica
        set:
            autoscaling.enabled: false
            replicaCount: 1