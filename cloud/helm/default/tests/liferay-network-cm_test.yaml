suite: liferay-network ConfigMap
templates:
    -   templates/liferay-network-cm.yaml
tests:
    -   asserts:
            -   equal:
                    path: data["LIFERAY_COMPANY_PERIOD_DEFAULT_PERIOD_VIRTUAL_PERIOD_HOST_PERIOD_NAME"]
                    value: a.example.com
            -   equal:
                    path: data["LIFERAY_COMPANY_PERIOD_DEFAULT_PERIOD_WEB_PERIOD_ID"]
                    value: a.example.com
        it: Derives the default virtual host from the first configured hostname
        set:
            network.enabled: true
            network.hostnames:
                -   a.example.com
                -   b.example.com
    -   asserts:
            -   equal:
                    path: data["LIFERAY_VIRTUAL_PERIOD_HOSTS_PERIOD_VALID_PERIOD_HOSTS"]
                    value: a.example.com,b.example.com,localhost,${env.POD_IP}
        it: Joins every configured hostname into the valid hosts list
        set:
            network.enabled: true
            network.hostnames:
                -   a.example.com
                -   b.example.com
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: Omits the ConfigMap when networking is disabled
        set:
            network.enabled: false
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: Omits the ConfigMap when no hostnames are configured
        set:
            network.enabled: true
            network.hostnames: []