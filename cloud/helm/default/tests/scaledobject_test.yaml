suite: KEDA ScaledObject
templates:
    -   templates/scaledobject.yaml
tests:
    -   asserts:
            -   lengthEqual:
                    count: 3
                    path: spec.triggers
            -   notContains:
                    any: true
                    content:
                        type: cpu
                    path: spec.triggers
        it: drops a trigger flagged as disabled in the loop
        set:
            autoscaling.enabled: true
            autoscaling.keda.triggers.cpu-usage-percent.enabled: false
            autoscaling.type: keda
    -   asserts:
            -   lengthEqual:
                    count: 4
                    path: spec.triggers
        it: emits one trigger for each entry in the default triggers map
        set:
            autoscaling.enabled: true
            autoscaling.type: keda
    -   asserts:
            -   equal:
                    path: spec.triggers[1].metadata.serverAddress
                    value: http://prometheus.example.com
        it: injects the resolved Prometheus server address into prometheus triggers
        set:
            autoscaling.enabled: true
            autoscaling.keda.prometheusServerAddress: http://prometheus.example.com
            autoscaling.type: keda
    -   asserts:
            -   lengthEqual:
                    count: 6
                    path: spec.triggers
        it: merges custom triggers into the default triggers
        set:
            autoscaling.enabled: true
            autoscaling.keda.customTriggers:
                custom-cron:
                    metadata:
                        desiredReplicas: "2"
                    type: cron
                custom-kafka:
                    metadata:
                        lagThreshold: "10"
                    type: kafka
            autoscaling.type: keda
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: my-portal
            -   equal:
                    path: spec.scaleTargetRef.name
                    value: my-portal
        it: names the ScaledObject after the chart name override
        set:
            autoscaling.enabled: true
            autoscaling.type: keda
            nameOverride: my-portal
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: omits the ScaledObject when autoscaling is disabled
        set:
            autoscaling.enabled: false
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: omits the ScaledObject when the autoscaling type is hpa
        set:
            autoscaling.enabled: true
            autoscaling.type: hpa
    -   asserts:
            -   equal:
                    path: spec.scaleTargetRef.name
                    value: liferay-default
            -   hasDocuments:
                    count: 1
            -   isKind:
                    of: ScaledObject
        it: renders the ScaledObject when autoscaling is enabled with type keda
        set:
            autoscaling.enabled: true
            autoscaling.type: keda