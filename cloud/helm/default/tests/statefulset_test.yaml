suite: StatefulSet
templates:
    -   templates/configmap.yaml
    -   templates/liferay-init-scripts-cm.yaml
    -   templates/workloads.yaml
tests:
    -   asserts:
            -   contains:
                    any: true
                    content:
                        containerPort: 9999
                        name: metrics
                    path: spec.template.spec.containers[0].ports
        documentSelector:
            path: kind
            skipEmptyTemplates: true
            value: StatefulSet
        it: Appends custom container ports through the customPorts loop
        set:
            customPorts.x-liferay-metrics:
                -   containerPort: 9999
                    name: metrics
                    protocol: TCP
    -   asserts:
            -   contains:
                    any: true
                    content:
                        name: BAZ
                        value: qux
                    path: spec.template.spec.containers[0].env
            -   contains:
                    any: true
                    content:
                        name: FOO
                        value: bar
                    path: spec.template.spec.containers[0].env
        documentSelector:
            path: kind
            skipEmptyTemplates: true
            value: StatefulSet
        it: Appends every custom environment variable through the customEnv loop
        set:
            customEnv.x-liferay-extra:
                -   name: BAZ
                    value: qux
                -   name: FOO
                    value: bar
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: my-portal
            -   equal:
                    path: spec.serviceName
                    value: my-portal
            -   equal:
                    path: spec.template.spec.containers[0].name
                    value: my-portal
        documentSelector:
            path: kind
            skipEmptyTemplates: true
            value: StatefulSet
        it: Names the StatefulSet and its container after the chart name override
        set:
            nameOverride: my-portal
    -   asserts:
            -   notExists:
                    path: spec.replicas
        documentSelector:
            path: kind
            skipEmptyTemplates: true
            value: StatefulSet
        it: Omits the replica count so the autoscaler owns it when autoscaling is enabled
        set:
            autoscaling.enabled: true
    -   asserts:
            -   equal:
                    path: spec.replicas
                    value: 3
        documentSelector:
            path: kind
            skipEmptyTemplates: true
            value: StatefulSet
        it: Reflects the configured replica count
        set:
            replicaCount: 3
    -   asserts:
            -   equal:
                    path: spec.replicas
                    value: 3
            -   isKind:
                    of: StatefulSet
        documentSelector:
            path: kind
            skipEmptyTemplates: true
            value: StatefulSet
        it: Renders a StatefulSet with the configured replica count when autoscaling is disabled
        set:
            autoscaling.enabled: false
            replicaCount: 3