apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
    labels:
        component: backup-restore-platform
    name: backup-restore-cluster-workflow-template
spec:
    arguments:
        parameters:
            -   name: liferay-backup-name
            -   name: liferay-backup-namespace
                value: "{{ "{{" }}workflow.namespace}}"
    entrypoint: main
    podGC:
        {{- .Values.argo.workflowSpec.podGC | toYaml | nindent 8 }}
    serviceAccountName: backup-restore-service-account
    templates:
        -   inputs:
                parameters:
                    -   name: liferay-infrastructure-name
                    -   name: restore-phase
                    -   name: target-active-data-plane
            name: apply-infrastructure
            outputs:
                parameters:
                    -   name: generation
                        valueFrom:
                            jsonPath: "{.metadata.generation}"
            resource:
                action: patch
                manifest: |-
                    apiVersion: gcp.liferay.com/v1alpha1
                    kind: LiferayInfrastructure
                    metadata:
                        name: {{ "{{" }}inputs.parameters.liferay-infrastructure-name}}
                        namespace: {{ "{{" }}workflow.namespace}}
                    spec:
                        restorePhase: {{ "{{" }}inputs.parameters.restore-phase}}
                        targetActiveDataPlane: {{ "{{" }}inputs.parameters.target-active-data-plane}}
                mergeStrategy: merge
        -   inputs:
                parameters:
                    -   name: liferay-infrastructure-name
                    -   name: restore-phase
                    -   name: target-active-data-plane
            name: apply-wait-infrastructure
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: "{{ "{{" }}inputs.parameters.restore-phase}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: apply-infrastructure
                        template: apply-infrastructure
                -   -   arguments:
                            parameters:
                                -   name: expected-generation
                                    value: "{{ "{{" }}steps.apply-infrastructure.outputs.parameters.generation}}"
                        name: wait-infrastructure-ready
                        template: wait-infrastructure-ready
        -   container:
                args:
                    -   storage
                    -   rm
                    -   --recursive
                    -   "gs://{{ "{{" }}inputs.parameters.dl-bucket-id}}/**"
                command: [gcloud]
                env:
                    -   name: CLOUDSDK_CONFIG
                        value: /tmp/gcloud
                image: "{{ .Values.images.gcloud.repository }}:{{ .Values.images.gcloud.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: dl-bucket-id
            name: clean-up-dl-bucket
        -   inputs:
                parameters:
                    -   name: dl-bucket-id
                    -   name: liferay-infrastructure-name
                    -   name: target-active-data-plane
            name: clean-up-infrastructure
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: none
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: clean-up-cloudsql-instance
                        template: apply-wait-infrastructure
                    -   arguments:
                            parameters:
                                -   name: dl-bucket-id
                                    value: "{{ "{{" }}inputs.parameters.dl-bucket-id}}"
                        name: clean-up-dl-bucket
                        template: clean-up-dl-bucket
        -   inputs:
                parameters:
                    -   name: liferay-backup-namespace
            name: get-current-infrastructure-state
            outputs:
                parameters:
                    -   name: data-active
                        valueFrom:
                            path: /tmp/data-plane-active.txt
                    -   name: data-inactive
                        valueFrom:
                            path: /tmp/data-plane-inactive.txt
                    -   name: database-snapshot-uuid
                        valueFrom:
                            path: /tmp/database-snapshot-uuid.txt
                    -   name: dl-bucket-active
                        valueFrom:
                            path: /tmp/dl-bucket-active.txt
                    -   name: dl-bucket-inactive
                        valueFrom:
                            path: /tmp/dl-bucket-inactive.txt
                    -   name: liferay-infrastructure-name
                        valueFrom:
                            path: /tmp/liferay-infrastructure-name.txt
                    -   name: liferay-workload-name
                        valueFrom:
                            path: /tmp/liferay-workload-name.txt
                    -   name: vault-bucket
                        valueFrom:
                            path: /tmp/vault-bucket.txt
                    -   name: vault-path
                        valueFrom:
                            path: /tmp/vault-path.txt
            script:
                command: [sh]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
                source: |-
                    {{- tpl (.Files.Get "scripts/get-current-infrastructure-state.sh") . | nindent 20 }}
        -   container:
                args:
                    -   get
                    -   databaseinstances.sql.gcp.m.upbound.io
                    -   --output
                    -   jsonpath={.items[0].metadata.name}
                    -   --selector
                    -   dataPlane={{ "{{" }}inputs.parameters.data-inactive}}
                command: [kubectl]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: data-inactive
            name: get-inactive-cloudsql-instance
        -   container:
                args:
                    -   rollout
                    -   restart
                    -   statefulset
                    -   "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                command: [kubectl]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: liferay-workload-name
            name: kubectl-rollout-restart
        -   container:
                args:
                    -   rollout
                    -   status
                    -   statefulset
                    -   "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                    -   --timeout={{ .Values.liferayWorkload.rolloutTimeout }}
                command: [kubectl]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: liferay-workload-name
            name: kubectl-rollout-status
        -   dag:
                tasks:
                    -   arguments:
                            parameters:
                                -   name: dl-bucket-id
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.dl-bucket-active}}"
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-inactive}}"
                        depends: restart-liferay
                        name: clean-up-infrastructure
                        template: clean-up-infrastructure
                    -   arguments:
                            parameters:
                                -   name: liferay-backup-namespace
                                    value: "{{ "{{" }}workflow.parameters.liferay-backup-namespace}}"
                        name: get-current-infrastructure-state
                        template: get-current-infrastructure-state
                    -   arguments:
                            parameters:
                                -   name: data-inactive
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-inactive}}"
                        depends: provision-inactive-data-plane
                        name: get-inactive-cloudsql-instance
                        template: get-inactive-cloudsql-instance
                    -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: promoting
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-inactive}}"
                        depends: restore-cloudsql-backup && restore-dl-bucket
                        name: promote-inactive-data-plane
                        template: apply-wait-infrastructure
                    -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: provisioning
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-inactive}}"
                        depends: get-current-infrastructure-state
                        name: provision-inactive-data-plane
                        template: apply-wait-infrastructure
                    -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-workload-name}}"
                        depends: promote-inactive-data-plane
                        name: restart-liferay
                        template: restart-liferay
                    -   arguments:
                            parameters:
                                -   name: database-snapshot-uuid
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.database-snapshot-uuid}}"
                                -   name: restore-instance
                                    value: "{{ "{{" }}tasks.get-inactive-cloudsql-instance.outputs.result}}"
                        depends: get-inactive-cloudsql-instance
                        name: restore-cloudsql-backup
                        template: restore-cloudsql-backup
                    -   arguments:
                            parameters:
                                -   name: dl-bucket-inactive
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.dl-bucket-inactive}}"
                                -   name: vault-bucket
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.vault-bucket}}"
                                -   name: vault-path
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.vault-path}}"
                        depends: get-current-infrastructure-state
                        name: restore-dl-bucket
                        template: restore-dl-bucket
                    -   arguments:
                            parameters:
                                -   name: dl-bucket-id
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.dl-bucket-inactive}}"
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-active}}"
                        depends: "(!provision-inactive-data-plane.Omitted && !provision-inactive-data-plane.Skipped || !restore-cloudsql-backup.Omitted && !restore-cloudsql-backup.Skipped || !restore-dl-bucket.Omitted && !restore-dl-bucket.Skipped) && !promote-inactive-data-plane.Succeeded"
                        name: roll-back-infrastructure
                        template: clean-up-infrastructure
                    -   arguments:
                            parameters:
                                -   name: dl-bucket-id
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.dl-bucket-inactive}}"
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-workload-name}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-active}}"
                        depends: "promote-inactive-data-plane.Succeeded && !restart-liferay.Succeeded"
                        name: roll-back-restart
                        template: roll-back-restart
            name: main
        -   inputs:
                parameters:
                    -   name: liferay-workload-name
            name: restart-liferay
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                        name: kubectl-rollout-restart
                        template: kubectl-rollout-restart
                -   -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                        name: kubectl-rollout-status
                        template: kubectl-rollout-status
        -   container:
                args:
                    -   sql
                    -   backups
                    -   restore
                    -   "{{ "{{" }}inputs.parameters.database-snapshot-uuid}}"
                    -   --project={{ .Values.global.gcp.projectId }}
                    -   --quiet
                    -   --restore-instance
                    -   "{{ "{{" }}inputs.parameters.restore-instance}}"
                command: [gcloud]
                env:
                    -   name: CLOUDSDK_CONFIG
                        value: /tmp/gcloud
                image: "{{ .Values.images.gcloud.repository }}:{{ .Values.images.gcloud.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: database-snapshot-uuid
                    -   name: restore-instance
            name: restore-cloudsql-backup
        -   container:
                args:
                    -   transfer
                    -   jobs
                    -   create
                    -   "gs://{{ "{{" }}inputs.parameters.vault-bucket}}/{{ "{{" }}inputs.parameters.vault-path}}/"
                    -   "gs://{{ "{{" }}inputs.parameters.dl-bucket-inactive}}/"
                    -   --delete-from=destination-if-unique
                    -   --no-async
                    -   --overwrite-when=always
                command: [gcloud]
                env:
                    -   name: CLOUDSDK_CONFIG
                        value: /tmp/gcloud
                image: "{{ .Values.images.gcloud.repository }}:{{ .Values.images.gcloud.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: dl-bucket-inactive
                    -   name: vault-bucket
                    -   name: vault-path
            name: restore-dl-bucket
        -   inputs:
                parameters:
                    -   name: dl-bucket-id
                    -   name: liferay-infrastructure-name
                    -   name: liferay-workload-name
                    -   name: target-active-data-plane
            name: roll-back-restart
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: promoting
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: apply-wait-infrastructure
                        template: apply-wait-infrastructure
                -   -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                        name: restart-liferay
                        template: restart-liferay
                -   -   arguments:
                            parameters:
                                -   name: dl-bucket-id
                                    value: "{{ "{{" }}inputs.parameters.dl-bucket-id}}"
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: clean-up-infrastructure
                        template: clean-up-infrastructure
        -   inputs:
                parameters:
                    -   name: expected-generation
            name: wait-infrastructure-ready
            script:
                command: [sh]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
                source: |-
                    {{- tpl (.Files.Get "scripts/wait-infrastructure-ready.sh") . | nindent 20 }}
    ttlStrategy:
        {{- .Values.argo.workflowSpec.ttlStrategy | toYaml | nindent 8 }}