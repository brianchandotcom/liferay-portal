apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
    annotations:
        gotemplating.fn.crossplane.io/composition-resource-name: liferay-ksa
    labels:
        {{- $labels | toYaml | nindent 8 }}
    name: {{ $xr.metadata.name }}-ksa
spec:
    forProvider:
        manifest:
            apiVersion: v1
            kind: ServiceAccount
            metadata:
                annotations:
                    iam.gke.io/gcp-service-account: {{ $gsaEmail }}
                labels:
                    {{- $labels | toYaml | nindent 20 }}
                name: liferay-default
                namespace: {{ $namespace }}
{{- range $dataPlane := $dataPlanes }}
{{- $dbInstanceResourceName := printf "database-primary-%s" $dataPlane }}
{{- $dbReady := false }}
{{- if $.observed.resources }}
    {{- if (index $.observed.resources $dbInstanceResourceName) }}
        {{- $db := index $.observed.resources $dbInstanceResourceName }}
        {{- range $cond := $db.resource.status.conditions | default list }}
            {{- if and (eq $cond.type "Ready") (eq $cond.status "True") }}
                {{- $dbReady = true }}
            {{- end }}
        {{- end }}
    {{- end }}
{{- end }}
{{- if and $dbReady (not (and (eq $restorePhase "provisioning") (eq $dataPlane $targetActiveDataPlane))) }}
{{- $instanceConnectionName := printf "%s:%s:%s-db-instance-%s" $env.projectId $region $xr.metadata.name $dataPlane }}
{{- $jobName := printf "%s-db-grant-%s" $xr.metadata.name $dataPlane }}
---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
    annotations:
        gotemplating.fn.crossplane.io/composition-resource-name: liferay-db-grant-job-{{ $dataPlane }}
    labels:
        {{- $labels | toYaml | nindent 8 }}
        dataPlane: {{ $dataPlane }}
    name: {{ $jobName }}
spec:
    forProvider:
        manifest:
            apiVersion: batch/v1
            kind: Job
            metadata:
                labels:
                    {{- $labels | toYaml | nindent 20 }}
                    dataPlane: {{ $dataPlane }}
                name: {{ $jobName }}
                namespace: {{ $namespace }}
            spec:
                template:
                    spec:
                        containers:
                            -   args:
                                    -   |
                                            set -o errexit

                                            function main {
                                                until pg_isready --host 127.0.0.1 --port {{ $databasePort }} --username postgres
                                                do 
                                                    sleep 2
                                                done

                                                psql --dbname {{ $databaseName }} --host 127.0.0.1 --set ON_ERROR_STOP=1 --username postgres <<EOF
                                            DO \$\$

                                            BEGIN
                                                IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'liferay_shared_owner')
                                                THEN
                                                    CREATE ROLE liferay_shared_owner NOLOGIN;
                                                END IF;
                                            END \$\$;

                                            GRANT liferay_shared_owner TO postgres;

                                            ALTER DATABASE "{{ $databaseName }}" OWNER TO liferay_shared_owner;

                                            GRANT CONNECT, TEMPORARY ON DATABASE "{{ $databaseName }}" TO "{{ $databaseIamUser }}";

                                            GRANT liferay_shared_owner TO "{{ $databaseIamUser }}";

                                            ALTER ROLE "{{ $databaseIamUser }}" SET ROLE liferay_shared_owner;
                                            EOF

                                                timeout=$(($(date +%s) + 600))

                                                until PGCONNECT_TIMEOUT=10 PGPASSWORD=iam psql --dbname {{ $databaseName }} --command "SELECT 1" --host 127.0.0.1 --port {{ $databasePort }} --username "{{ $databaseIamUser }}" >/dev/null 2>&1
                                                do
                                                    if [ $(date +%s) -ge $timeout ]
                                                    then
                                                        echo "{{ $databaseIamUser }} could not be authenticated." >&2

                                                        exit 1
                                                    fi

                                                    sleep 2
                                                done
                                            }

                                            main
                                command:
                                    -   /bin/sh
                                    -   -c
                                env:
                                    -   name: PGPASSWORD
                                        valueFrom:
                                            secretKeyRef:
                                                key: password
                                                name: {{ $databaseSpec.rootPasswordSecretName }}
                                image: postgres:18-alpine
                                name: sql-runner
                                resources:
                                    limits:
                                        cpu: 200m
                                        memory: 256Mi
                                    requests:
                                        cpu: 100m
                                        memory: 128Mi
                                securityContext:
                                    allowPrivilegeEscalation: false
                                    capabilities:
                                        drop:
                                            -   ALL
                                    runAsNonRoot: true
                                    runAsUser: 1000
                                    seccompProfile:
                                        type: RuntimeDefault
                        initContainers:
                            -   args:
                                    -   --auto-iam-authn
                                    -   --port={{ $databasePort }}
                                    -   --private-ip
                                    -   --structured-logs
                                    -   "{{ $instanceConnectionName }}"
                                image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
                                name: cloud-sql-proxy
                                resources:
                                    limits:
                                        cpu: 200m
                                        memory: 256Mi
                                    requests:
                                        cpu: 100m
                                        memory: 128Mi
                                restartPolicy: Always
                                securityContext:
                                    allowPrivilegeEscalation: false
                                    capabilities:
                                        drop:
                                            -   ALL
                                    runAsNonRoot: true
                                    runAsUser: 65532
                                    seccompProfile:
                                        type: RuntimeDefault
                        restartPolicy: OnFailure
                        securityContext:
                            fsGroup: 1000
                            runAsNonRoot: true
                            seccompProfile:
                                type: RuntimeDefault
                        serviceAccountName: liferay-default
                        volumes:
                            -   emptyDir: {}
                                name: term-log
    managementPolicies: {{ $managementPoliciesOnce }}
    readiness:
        celQuery: object.status.succeeded == 1
        policy: DeriveFromCelQuery
{{- end }}
{{- end }}
---
{{- $isReady = false }}
{{- if .observed.resources }}
    {{- $activeJobResourceName := printf "liferay-db-grant-job-%s" $activeDataPlane }}
    {{- if (index .observed.resources $activeJobResourceName) }}
        {{- $job := index .observed.resources $activeJobResourceName }}
        {{- range $cond := $job.resource.status.conditions | default list }}
            {{- if and (eq $cond.type "Ready") (eq $cond.status "True") }}
                {{- $isReady = true }}
            {{- end }}
        {{- end }}
    {{- end }}
{{- end }}
{{- if $isReady }}
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
    annotations:
        crossplane.io/external-name: {{ $baseName }}-managed-service-details-secret
        gotemplating.fn.crossplane.io/composition-resource-name: managed-service-details-secret
    labels:
        {{- $labels | toYaml | nindent 8 }}
    name: {{ $baseName }}-managed-service-details-secret
spec:
    forProvider:
        manifest:
            apiVersion: v1
            data:
                DATABASE_ENDPOINT: {{ "localhost" | b64enc | quote }}
                DATABASE_INSTANCE_NAME: {{ printf "%s:%s:%s-db-instance-%s" $env.projectId $region $xr.metadata.name $activeDataPlane | b64enc | quote }}
                DATABASE_PORT: {{ $databasePort | default 5432 | toString | b64enc | quote }}
                DATABASE_USERNAME: {{ $databaseIamUser | toString | b64enc | quote }}
                LIFERAY_GCS_BUCKET_NAME: {{ printf "%s-dl-%s" $baseName $activeDataPlane | b64enc | quote }}
            kind: Secret
            metadata:
                labels:
                    {{- $labels | toYaml | nindent 20 }}
                name: managed-service-details
                namespace: {{ $namespace }}
            type: Opaque
    managementPolicies: {{ $managementPolicies }}
{{- end }}
{{- if $overlay.enabled }}
---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
    annotations:
        crossplane.io/external-name: {{ $baseName }}-overlay-bucket-details-secret
        gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket-details-secret
    labels:
        {{- $labels | toYaml | nindent 8 }}
    name: {{ $baseName }}-overlay-bucket-details-secret
spec:
    forProvider:
        manifest:
            apiVersion: v1
            data:
                LIFERAY_OVERLAY_BUCKET_NAME: {{ $overlayBucketName | b64enc | quote }}
            kind: Secret
            metadata:
                labels:
                    {{- $labels | toYaml | nindent 20 }}
                name: overlay-bucket-details
                namespace: {{ $namespace }}
            type: Opaque
    managementPolicies: {{ $managementPolicies }}
{{- end }}
---
apiVersion: gcp.liferay.com/v1alpha1
kind: LiferayInfrastructure
status:
    managedServiceDetailsReady: {{ $isReady }}