clusterBootstrap:
    enabled: true
    image: alpine:3
    resources:
        limits:
            cpu: 3m
            memory: 16Mi
        requests:
            cpu: 1m
            memory: 8Mi
    script: |
        sysctl -w vm.max_map_count=1048576
crossplaneGsaEmail: ""
crossplaneNamespace: crossplane-system
eck-operator:
    enabled: true
gateway:
    enabled: true
    internetFacing: true
    namespace: envoy-gateway-system
global:
    gcp: {}
liferay-subchart-backup-controller:
    enabled: true
    serviceAccountName: backup-controller
liferay-subchart-backup-create:
    enabled: true
liferay-subchart-backup-restore:
    enabled: true
providers:
    enabled: true