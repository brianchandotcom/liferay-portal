{{- if .Values.backup.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    labels:
        component: backup-cleanup
        environmentId: {{ .Values.environmentId }}
        projectId: {{ .Values.projectId }}
    name: backup-cleanup-role
    namespace: {{ .Release.Namespace }}
rules:
    -   apiGroups: ["liferay.com"]
        resources: ["liferaybackups"]
        verbs: ["delete", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    labels:
        component: backup-cleanup
        environmentId: {{ .Values.environmentId }}
        projectId: {{ .Values.projectId }}
    name: backup-cleanup-rolebinding
    namespace: {{ .Release.Namespace }}
subjects:
    -   kind: ServiceAccount
        name: {{ .Values.backup.cleanup.serviceAccountName }}
        namespace: {{ .Release.Namespace }}
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: backup-cleanup-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
    labels:
        component: backup-cleanup
        environmentId: {{ .Values.environmentId }}
        projectId: {{ .Values.projectId }}
    name: {{ .Values.backup.cleanup.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
