{{- range $secretName := .Values.secrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName | quote }}
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: "1h0m0s"
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.secretStoreName | quote }}
  target:
    creationPolicy: {{ $.Values.externalSecretCreationPolicy | default "Owner" | quote }}
    deletionPolicy: Retain
    template:
      templateFrom:
        - target: Labels
          literal: |
            {{ "{{- (.meta | toString | fromJson).labels | toYaml -}}" }}
        - target: Annotations
          literal: |
            {{ "{{- (.meta | toString | fromJson).annotations | toYaml -}}" }}
        - target: Data
          literal: |
            {{ `{{- $raw := .raw | toString -}}` }}
            {{ `{{- if and (hasPrefix "{" $raw) (hasSuffix "}" $raw) -}}` }}
            {{ `{{- range $k, $v := ($raw | fromJson) }}` }}
            {{ `{{ $k }}: {{ $v | toString | quote }}` }}
            {{ `{{- end }}` }}
            {{ `{{- else }}` }}
            {{ `secret: {{ $raw | quote }}` }}
            {{ `{{- end -}}` }}
      metadata:
        annotations:
          eso.validated: |-
            {{- $expectedNs := $.Release.Namespace }}
            {{- printf " {{- $expectedNs := %q -}}" $expectedNs | nindent 12 }}
            {{- (print " {{- $nsLabel := index ((.meta | toString | fromJson).labels | default dict) \"esm-app-destination-namespace\" -}}") | nindent 12 }}
            {{- (print " {{- if ne $nsLabel $expectedNs -}}") | nindent 12 }}
            {{- (print " {{- fail (printf \"GSM 'namespace' label (%q) does not match the ExternalSecret namespace (%q)\" $nsLabel $expectedNs) -}}") | nindent 12 }}
            {{- (print " {{- end -}}") | nindent 12 }}
            {{- (print " true") | nindent 12 }}
  data:
    - secretKey: raw
      remoteRef:
        key: {{ $secretName | quote }}
    - secretKey: meta
      remoteRef:
        key: {{ $secretName | quote }}
        metadataPolicy: Fetch
{{- end }}
