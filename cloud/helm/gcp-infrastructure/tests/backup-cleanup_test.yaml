suite: backup cleanup CronWorkflow
templates:
    -   templates/backup-cleanup.yaml
tests:
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: should omit the cleanup CronWorkflow when backups are disabled
        set:
            backup.enabled: false
    -   asserts:
            -   hasDocuments:
                    count: 1
            -   isKind:
                    of: CronWorkflow
            -   equal:
                    path: metadata.name
                    value: backup-cleanup-cron-workflow
            -   equal:
                    path: spec.schedules[0]
                    value: 0 2 * * *
        it: should render the cleanup CronWorkflow with its schedule when backups are enabled
        set:
            backup.enabled: true