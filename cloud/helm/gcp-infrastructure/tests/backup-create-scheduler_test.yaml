suite: backup create scheduler CronWorkflow
templates:
    -   templates/backup-create-scheduler.yaml
tests:
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: should omit the scheduler CronWorkflow when backups are disabled
        set:
            backup.enabled: false
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: should omit the scheduler CronWorkflow when no backup schedule is set
        set:
            backup.enabled: true
            backup.schedule: ""
    -   asserts:
            -   hasDocuments:
                    count: 1
            -   isKind:
                    of: CronWorkflow
            -   equal:
                    path: metadata.name
                    value: backup-create-scheduler-cron-workflow
            -   equal:
                    path: spec.schedules[0]
                    value: 0 5 * * *
        it: should render the scheduler CronWorkflow with the configured schedule when backups are enabled
        set:
            backup.enabled: true