release:
    name: my-release
    namespace: my-namespace
suite: database root password
templates:
    -   templates/database-root-password.yaml
tests:
    -   asserts:
            -   isKind:
                    of: Password
            -   equal:
                    path: metadata.name
                    value: my-release-db-root-password-generator
        documentSelector:
            path: kind
            value: Password
        it: should name the password generator after the release
    -   asserts:
            -   hasDocuments:
                    count: 2
        it: should render both the password generator and the ExternalSecret
    -   asserts:
            -   isKind:
                    of: ExternalSecret
            -   equal:
                    path: metadata.name
                    value: my-release-db-root-password
            -   equal:
                    path: spec.target.name
                    value: my-release-db-root-password
            -   equal:
                    path: spec.dataFrom[0].sourceRef.generatorRef.name
                    value: my-release-db-root-password-generator
        documentSelector:
            path: kind
            value: ExternalSecret
        it: should wire the ExternalSecret to the generated password