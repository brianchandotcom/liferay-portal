release:
    name: my-release
    namespace: my-namespace
suite: Elasticsearch
templates:
    -   elasticsearch.yaml
tests:
    -   asserts:
            -   contains:
                    any: true
                    content:
                        name: ES_SETTING_ONE
                        value: one
                    path: spec.nodeSets[0].podTemplate.spec.containers[0].env
            -   contains:
                    any: true
                    content:
                        name: ES_SETTING_TWO
                        value: two
                    path: spec.nodeSets[0].podTemplate.spec.containers[0].env
        documentSelector:
            path: kind
            value: Elasticsearch
        it: Appends every custom env entry through the loop
        set:
            search.elasticsearch.customEnv:
                x-extra:
                    -   name: ES_SETTING_ONE
                        value: one
                    -   name: ES_SETTING_TWO
                        value: two
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: custom-es
        documentSelector:
            path: kind
            value: Elasticsearch
        it: Names the Elasticsearch resource after the configured name override
        set:
            search.elasticsearch.name: custom-es
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: my-release-es
            -   equal:
                    path: metadata.namespace
                    value: my-namespace-elasticsearch
            -   equal:
                    path: spec.nodeSets[0].count
                    value: 1
            -   equal:
                    path: spec.version
                    value: 8.19.11
            -   isKind:
                    of: Elasticsearch
        documentSelector:
            path: kind
            value: Elasticsearch
        it: Names the Elasticsearch resource after the release and dedicated namespace
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: Omits the Elasticsearch resources when search is disabled
        set:
            search.elasticsearch.enabled: false
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: my-namespace-elasticsearch
            -   isKind:
                    of: Namespace
        documentSelector:
            path: kind
            value: Namespace
        it: Provisions the dedicated Elasticsearch namespace
    -   asserts:
            -   hasDocuments:
                    count: 2
        it: Renders both the Elasticsearch resource and its namespace by default