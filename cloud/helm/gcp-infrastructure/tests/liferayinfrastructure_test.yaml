release:
    name: my-release
    namespace: my-namespace
suite: LiferayInfrastructure
templates:
    -   templates/liferayinfrastructure.yaml
tests:
    -   asserts:
            -   equal:
                    path: spec.database.rootPasswordSecretName
                    value: my-release-db-root-password
        it: derives the database root password secret name from the release
        set:
            enabled: true
    -   asserts:
            -   equal:
                    path: metadata.name
                    value: my-release
            -   equal:
                    path: metadata.namespace
                    value: my-namespace
            -   hasDocuments:
                    count: 1
            -   isKind:
                    of: LiferayInfrastructure
        it: names the LiferayInfrastructure after the release
        set:
            enabled: true
    -   asserts:
            -   hasDocuments:
                    count: 0
        it: omits the LiferayInfrastructure when the chart is disabled
        set:
            enabled: false
    -   asserts:
            -   equal:
                    path: spec.commonTags.environment_id
                    value: env-123
            -   equal:
                    path: spec.commonTags.project_id
                    value: proj-456
        it: propagates the environment and project identifiers into the common tags
        set:
            environmentId: env-123
            projectId: proj-456
    -   asserts:
            -   equal:
                    path: spec.backup.enabled
                    value: true
        it: reflects an enabled backup configuration
        set:
            backup.enabled: true