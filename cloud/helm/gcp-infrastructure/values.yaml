backup:
    cleanup:
        schedule: 0 2 * * *
        serviceAccountName: backup-cleanup-service-account
    enabled: false
    region: ""
    retentionDays: 30
    schedule: 0 5 * * *
    storageClass: NEARLINE
cmk:
    enabled: false
database:
    databaseVersion: POSTGRES_18
    deletionProtection: true
    instanceType: db-custom-1-3840
    queryInsightsEnabled: true
    storageGB: 20
deletionProtection: true
enabled: true
endpoints: {}
environmentId: ""
externalSecretCreationPolicy: Owner
forceDestroy: false
gateway:
    annotations: {}
    className: ""
    clientTrafficPolicySpec: {}
    name: ""
    spec: {}
images:
    helmKubectl:
        repository: dtzar/helm-kubectl
        tag: 4.1.1
license:
    externalSecretName: ""
    targetSecretName: liferay-license
orphanOnDelete: false
overlay:
    commonTags: {}
    enabled: false
    forceDestroy: false
    orphanOnDelete: false
podMonitoring:
    instances:
        envoy:
            matchLabels:
                app.kubernetes.io/name: envoy
            metricRelabeling:
                -   action: keep
                    regex: ^envoy_(http_downstream_(rq_(total|xx|time_(bucket|sum|count))|cx_[rt]x_bytes_total)|cluster_upstream_rq_(total|time_(bucket|sum|count)))$
                    sourceLabels:
                        -   __name__
            path: /stats/prometheus
            port: 19001
        liferay:
            matchLabels:
                app: liferay-default
                app.kubernetes.io/name: liferay-default
            metricRelabeling:
                -   action: keep
                    regex: ^(?:Catalina_(?:GlobalRequestProcessor_(?:.*_)?(?:errorCount|processingTime|requestCount)|ThreadPool_(?:.*_)?(?:currentThreadCount|currentThreadsBusy))|hikaricp_(?:ActiveConnections|IdleConnections|ThreadsAwaitingConnection|TotalConnections)|java_lang_Threading_ThreadCount|jvm_(?:(?:buffer_pool|memory(?:_pool)?)_(?:used|max)_bytes|classes_currently_loaded|gc_collection_seconds_(?:count|sum)|threads_(?:current|peak|state))|process_(?:cpu_seconds_total|open_fds|resident_memory_bytes))$
                    sourceLabels:
                        -   __name__
            path: /metrics
            port: 12345
    interval: 1m
projectId: ""
region: ""
search:
    elasticsearch:
        annotations:
            instrumentation.opentelemetry.io/inject-dotnet: "false"
            instrumentation.opentelemetry.io/inject-java: "false"
            instrumentation.opentelemetry.io/inject-nodejs: "false"
            instrumentation.opentelemetry.io/inject-python: "false"
            sidecar.opentelemetry.io/inject: "false"
        enabled: true
        nodeCount: 1
        podSecurityContext:
            fsGroup: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
                type: RuntimeDefault
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                    -   ALL
            privileged: false
            readOnlyRootFilesystem: false
        version: 8.19.11
        volumeSize: 10Gi
secretNames: []
secretStoreName: ""
storage:
    enableVersioning: true
    region: ""