{{- $cloud := include "observability.cloudProvider" . -}}
{{- $remoteWrite := .Values.alloy.remoteWrite -}}
{{- if and .Values.alloy.enabled (ne $cloud "aws") (ne $cloud "gcp") (or $remoteWrite.basicAuth.password $remoteWrite.bearerToken) -}}
apiVersion: v1
kind: Secret
metadata:
    labels:
        {{- include "observability.labels" . | nindent 8 }}
    name: liferay-alloy-remote-write
    namespace: {{ include "observability.namespace" . | quote }}
stringData:
    {{- with $remoteWrite.bearerToken }}
    bearer-token: {{ . | quote }}
    {{- end }}
    {{- with $remoteWrite.basicAuth.password }}
    password: {{ . | quote }}
    {{- end }}
type: Opaque
{{- end -}}