{{- if .Values.alloy.enabled -}}
{{- $cloud := include "observability.cloudProvider" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
    {{- $awsRoleArn := .Values.alloy.iam.awsRoleArn -}}
    {{- $gcpServiceAccount := .Values.alloy.iam.gcpServiceAccount -}}
    {{- if or (and (eq $cloud "aws") $awsRoleArn) (and (eq $cloud "gcp") $gcpServiceAccount) }}
    annotations:
        {{- if and (eq $cloud "aws") $awsRoleArn }}
        eks.amazonaws.com/role-arn: {{ $awsRoleArn | quote }}
        {{- end }}
        {{- if and (eq $cloud "gcp") $gcpServiceAccount }}
        iam.gke.io/gcp-service-account: {{ $gcpServiceAccount | quote }}
        {{- end }}
    {{- end }}
    labels:
        {{- include "observability.labels" . | nindent 8 }}
    name: liferay-alloy
    namespace: {{ include "observability.namespace" . | quote }}
{{- end -}}