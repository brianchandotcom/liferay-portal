{{- if and (eq (include "observability.cloudProvider" .) "aws") .Values.alerting.recordingRules .Values.aws.ampWorkspaceID -}}
{{- $cloud := include "observability.cloudProvider" . -}}
{{- $interval := .Values.alerting.interval | default "1m" -}}
{{- $matchedRules := list -}}
{{- range $key, $rule := .Values.alerting.recordingRules -}}
{{- if or (not $rule.cloudProvider) (eq $rule.cloudProvider $cloud) -}}
{{- $matchedRules = append $matchedRules (dict "expr" $rule.expr "record" $rule.record) -}}
{{- end -}}
{{- end -}}
{{- if gt (len $matchedRules) 0 -}}
apiVersion: prometheusservice.services.k8s.aws/v1alpha1
kind: RuleGroupsNamespace
metadata:
    labels:
        {{- include "observability.labels" . | nindent 8 }}
    name: {{ printf "%s-recording-rules" (include "observability.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
spec:
    configuration: |
        groups:
            -   interval: {{ $interval | quote }}
                name: liferay-recording-rules
                rules:
                    {{- range $matchedRules }}
                    -   expr: |
                            {{- .expr | nindent 28 }}
                        record: {{ .record | quote }}
                    {{- end }}
    name: liferay-recording-rules
    workspaceID: {{ .Values.aws.ampWorkspaceID | quote }}
{{- end -}}
{{- end -}}