{{- if and (eq (include "observability.cloudProvider" .) "gcp") .Values.alerting.recordingRules -}}
{{- $cloud := include "observability.cloudProvider" . -}}
{{- $interval := .Values.alerting.interval | default "1m" -}}
{{- $matchedRules := list -}}
{{- range $key, $rule := .Values.alerting.recordingRules -}}
{{- if or (not $rule.cloudProvider) (eq $rule.cloudProvider $cloud) -}}
{{- $matchedRules = append $matchedRules (dict "record" $rule.record "expr" $rule.expr) -}}
{{- end -}}
{{- end -}}
{{- if gt (len $matchedRules) 0 -}}
apiVersion: monitoring.googleapis.com/v1
kind: ClusterRules
metadata:
    labels:
        {{- include "observability.labels" . | nindent 8 }}
    name: {{ printf "%s-recording-rules" (include "observability.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
spec:
    groups:
        -   interval: {{ $interval | quote }}
            name: liferay-recording-rules
            rules:
                {{- range $matchedRules }}
                -   expr: |
                        {{- .expr | nindent 24 }}
                    record: {{ .record | quote }}
                {{- end }}
{{- end -}}
{{- end -}}