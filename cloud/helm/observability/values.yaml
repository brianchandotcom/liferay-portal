alloy:
    enabled: false
    iam:
        awsRoleArn: ""
        gcpServiceAccount: ""
    remoteWrite:
        basicAuth:
            password: ""
            username: ""
        bearerToken: ""
        externalLabels: {}
        headers: {}
        url: ""
    scrape:
        cadvisor:
            enabled: true
            path: /metrics/cadvisor
        cloudwatchRds:
            discoveryInterval: 5m
            enabled: false
            metrics:
                -   name: CPUUtilization
                    statistics:
                        -   Average
                        -   Maximum
                -   name: FreeableMemory
                    statistics:
                        -   Average
                        -   Minimum
                -   name: FreeStorageSpace
                    statistics:
                        -   Average
                        -   Minimum
                -   name: ReadIOPS
                    statistics:
                        -   Average
                -   name: WriteIOPS
                    statistics:
                        -   Average
                -   name: ReadLatency
                    statistics:
                        -   Average
                        -   Maximum
                -   name: WriteLatency
                    statistics:
                        -   Average
                        -   Maximum
                -   name: SwapUsage
                    statistics:
                        -   Average
                        -   Maximum
                -   name: DiskQueueDepth
                    statistics:
                        -   Average
                        -   Maximum
                -   name: ReplicaLag
                    statistics:
                        -   Average
                        -   Maximum
            nameTagRegex: .*-database-(blue|green)$
            region: ""
            scrapeInterval: 1m
        envoy:
            enabled: true
            path: /stats/prometheus
            port: 19001
        kubeStateMetrics:
            enabled: true
            path: /metrics
            port: http
        liferay:
            enabled: true
            matchLabels:
                component: liferay
            path: /metrics
            port: 12345
        nodeExporter:
            enabled: true
            path: /metrics
            port: metrics
        pushgateway:
            enabled: true
            path: /metrics
            port: http
        rdsExporter:
            enabled: false
            path: /metrics
            port: http
    scrapeInterval: 1m
aws:
    ampWorkspaceUrl: ""
    region: ""
cloudProvider: ""
customLabels: {}
datasource:
    name: Prometheus
    type: prometheus
    uid: managed-prometheus
fullnameOverride: ""
gcp:
    projectId: ""
grafana-alloy:
    alloy:
        clustering:
            enabled: true
        configMap:
            create: false
            key: config.alloy
            name: liferay-alloy-config
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                    -   ALL
            privileged: false
            readOnlyRootFilesystem: false
    configReloader:
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                    -   ALL
            privileged: false
            readOnlyRootFilesystem: false
    controller:
        type: daemonset
    global:
        podSecurityContext:
            fsGroup: 473
            runAsGroup: 473
            runAsNonRoot: true
            runAsUser: 473
            seccompProfile:
                type: RuntimeDefault
    serviceAccount:
        create: false
        name: liferay-alloy
kube-state-metrics:
    enabled: true
    extraArgs:
        -   --v=1
        -   --metric-allowlist=kube_deployment_status_replicas_ready,kube_statefulset_status_replicas_ready,kube_pod_container_status_restarts_total,kube_pod_container_resource_limits,kube_pod_container_resource_requests,kube_pod_container_info,kube_namespace_labels,kube_node_info,kube_node_status_condition
    metricLabelsAllowlist:
        -   namespaces=[liferay.com/observable]
    networkPolicy:
        egress:
            -   {}
        enabled: true
        ingress:
            -   from:
                    -   podSelector: {}
    podDisruptionBudget:
        maxUnavailable: 1
    prometheus:
        monitor:
            enabled: false
    prometheusScrape: false
    resources:
        limits:
            cpu: 100m
            memory: 256Mi
        requests:
            cpu: 30m
            memory: 128Mi
    serviceAccount:
        automountServiceAccountToken: false
nameOverride: ""
prometheus-node-exporter:
    enabled: true
    extraArgs:
        -   --log.level=error
        -   --log.format=json
    networkPolicy:
        enabled: true
        ingress:
            -   from:
                    -   podSelector: {}
    prometheus:
        monitor:
            enabled: false
        podMonitor:
            enabled: false
    rbac:
        create: true
    resources:
        limits:
            cpu: 102m
            memory: 180Mi
        requests:
            cpu: 102m
            memory: 180Mi
    securityContext:
        fsGroup: 0
    service:
        enabled: true
    serviceAccount:
        automountServiceAccountToken: false
        create: true
prometheus-pushgateway:
    automountServiceAccountToken: false
    containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
            drop:
                -   ALL
        privileged: false
        readOnlyRootFilesystem: false
    enabled: true
    extraArgs:
        -   --persistence.file=/data/pushgateway.data
        -   --persistence.interval=1m
        -   --log.format=json
        -   --log.level=error
    extraContainers:
        -   args:
                -   --sync-period=1m
                -   --ttl=1m
            image: ghcr.io/abatilo/pushgateway-cleaner:v0.1.3
            name: pushgateway-cleaner
            resources:
                limits:
                    cpu: 40m
                    memory: 16Mi
                requests:
                    cpu: 20m
                    memory: 4Mi
            securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                    drop:
                        -   ALL
                privileged: false
                readOnlyRootFilesystem: false
    networkPolicy:
        allowAll: true
    resources:
        limits:
            cpu: 100m
            memory: 50Mi
        requests:
            cpu: 100m
            memory: 30Mi
    securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
            type: RuntimeDefault