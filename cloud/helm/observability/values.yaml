alerting:
    defaultChannel: ""
    folder: alerts
    interval: 1m
    notificationChannels: {}
    recordingRules:
        container-cpu-limit-utilization-ratio:
            expr: |
                sum by (container, namespace, pod) (
                    rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[5m])
                )
                /
                sum by (container, namespace, pod) (
                    kube_pod_container_resource_limits{resource="cpu"}
                )
            record: liferay:container_cpu_limit_utilization:ratio
        container-memory-limit-utilization-ratio:
            expr: |
                sum by (container, namespace, pod) (
                    container_memory_working_set_bytes{container!="", container!="POD"}
                )
                /
                sum by (container, namespace, pod) (
                    kube_pod_container_resource_limits{resource="memory"}
                )
            record: liferay:container_memory_limit_utilization:ratio
        db-cpu-reserved-cores-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    liferay:_rds_vcpu,
                                    "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                "project_id", "$1", "tag_ProjectId", "(.+)"),
                            "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                        "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$")
                )
            record: liferay:db_cpu_reserved_cores
        db-cpu-reserved-cores-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id) (
                    label_replace(
                        label_replace(
                            cloudsql_googleapis_com:database_cpu_reserved_cores,
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_cpu_reserved_cores
        db-cpu-used-cores-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    liferay:_rds_vcpu
                                    * on(dbinstance_identifier) group_left()
                                    (rds_cpu_usage_percent_average{job="prometheus-rds-exporter"} / 100),
                                    "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                "project_id", "$1", "tag_ProjectId", "(.+)"),
                            "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                        "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$")
                )
            record: liferay:db_cpu_used_cores
        db-cpu-used-cores-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id) (
                    label_replace(
                        label_replace(
                            rate(cloudsql_googleapis_com:database_cpu_usage_time[5m]),
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_cpu_used_cores
        db-cpu-utilization-percent-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane, engine) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    label_replace(
                                        aws_rds_cpuutilization_average{job="cloudwatch-rds"}
                                        * on(dbinstance_identifier) group_left(tag_EnvironmentId, tag_ProjectId) liferay:_rds_meta,
                                        "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                    "project_id", "$1", "tag_ProjectId", "(.+)"),
                                "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                            "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$"),
                        "engine", "$1", "dimension_EngineName", "(.+)")
                )
            record: liferay:db_cpu_utilization_percent
        db-cpu-utilization-percent-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id) (
                    label_replace(
                        label_replace(
                            rate(cloudsql_googleapis_com:database_cpu_usage_time[5m])
                            /
                            on(metadata_user_environment_id, metadata_system_name, db_name)
                            cloudsql_googleapis_com:database_cpu_reserved_cores
                            * 100,
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_cpu_utilization_percent
        db-disk-total-bytes-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane, engine) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    rds_allocated_storage_bytes{job="prometheus-rds-exporter"}
                                    * on(dbinstance_identifier) group_left(tag_EnvironmentId, tag_ProjectId) liferay:_rds_meta,
                                    "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                "project_id", "$1", "tag_ProjectId", "(.+)"),
                            "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                        "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$")
                )
            record: liferay:db_disk_total_bytes
        db-disk-total-bytes-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id) (
                    label_replace(
                        label_replace(
                            cloudsql_googleapis_com:database_disk_quota,
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_disk_total_bytes
        db-disk-used-bytes-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    (rds_allocated_storage_bytes{job="prometheus-rds-exporter"}
                                     - on(dbinstance_identifier) rds_free_storage_bytes{job="prometheus-rds-exporter"})
                                    * on(dbinstance_identifier) group_left(tag_EnvironmentId, tag_ProjectId) liferay:_rds_meta,
                                    "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                "project_id", "$1", "tag_ProjectId", "(.+)"),
                            "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                        "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$")
                )
            record: liferay:db_disk_used_bytes
        db-disk-used-bytes-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id) (
                    label_replace(
                        label_replace(
                            cloudsql_googleapis_com:database_disk_bytes_used,
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_disk_used_bytes
        db-instance-state-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane, state) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    label_replace(rds_instance_status{job="prometheus-rds-exporter"} == 1, "state", "RUNNING", "dbinstance_identifier", ".*")
                                    * on(dbinstance_identifier) group_left(tag_EnvironmentId, tag_ProjectId) liferay:_rds_meta,
                                    "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                "project_id", "$1", "tag_ProjectId", "(.+)"),
                            "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                        "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$")
                )
            record: liferay:db_instance_state
        db-instance-state-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id, state) (
                    label_replace(
                        label_replace(
                            last_over_time(cloudsql_googleapis_com:database_instance_state[5m]) > 0,
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_instance_state
        db-memory-total-bytes-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    liferay:_rds_memory_bytes,
                                    "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                "project_id", "$1", "tag_ProjectId", "(.+)"),
                            "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                        "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$")
                )
            record: liferay:db_memory_total_bytes
        db-memory-total-bytes-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id) (
                    label_replace(
                        label_replace(
                            cloudsql_googleapis_com:database_memory_quota,
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_memory_total_bytes
        db-memory-used-bytes-aws:
            cloudProvider: aws
            expr: |
                sum by (environment_id, project_id, database_id, data_plane) (
                    label_replace(
                        label_replace(
                            label_replace(
                                label_replace(
                                    liferay:_rds_memory_bytes
                                    - on(dbinstance_identifier)
                                    rds_freeable_memory_bytes{job="prometheus-rds-exporter"},
                                    "environment_id", "$1", "tag_EnvironmentId", "(.+)"),
                                "project_id", "$1", "tag_ProjectId", "(.+)"),
                            "data_plane", "$1", "dbinstance_identifier", ".*-database-(blue|green)$"),
                        "database_id", "$1", "dbinstance_identifier", "(.+?)-database-(?:blue|green)$")
                )
            record: liferay:db_memory_used_bytes
        db-memory-used-bytes-gcp:
            cloudProvider: gcp
            expr: |
                sum by (environment_id, database_id) (
                    label_replace(
                        label_replace(
                            cloudsql_googleapis_com:database_memory_usage,
                            "environment_id", "$1", "metadata_user_environment_id", "(.+)"),
                        "database_id", "$1", "metadata_system_name", ".*-db-(.*)")
                )
            record: liferay:db_memory_used_bytes
        rds-memory-bytes-aws:
            cloudProvider: aws
            expr: |
                rds_instance_memory_bytes{job="prometheus-rds-exporter"}
                * on(instance_class) group_right
                liferay:_rds_meta
            record: liferay:_rds_memory_bytes
        rds-meta-aws:
            cloudProvider: aws
            expr: |
                group by (dbinstance_identifier, tag_EnvironmentId, tag_ProjectId, instance_class) (
                    (label_replace(aws_rds_info, "dbinstance_identifier", "$1", "tag_Name", "(.+)") + 1)
                    * on(dbinstance_identifier) group_left(instance_class)
                    rds_instance_info{job="prometheus-rds-exporter"}
                )
            record: liferay:_rds_meta
        rds-vcpu-avg-aws:
            cloudProvider: aws
            expr: |
                rds_instance_vcpu_average{job="prometheus-rds-exporter"}
                * on(instance_class) group_right
                liferay:_rds_meta
            record: liferay:_rds_vcpu
    rules:
        cpu-limit-utilization:
            expr: |
                avg_over_time(liferay:container_cpu_limit_utilization:ratio[2m]) > 0.8
                and on(namespace)
                kube_namespace_labels{label_liferay_com_observable="true"}
            for: 5m
            interval: 2m
            labels:
                aggregation_period: 2m
                type: warning
                unit: percent
            title: Container CPU Limit Utilization Above 80%
        frequent-pod-restarts:
            expr: |
                sum by (container, namespace, pod) (
                    increase(kube_pod_container_status_restarts_total[30m])
                ) > 3
                and on(namespace)
                kube_namespace_labels{label_liferay_com_observable="true"}
            labels:
                aggregation_period: 30m
                type: warning
                unit: occurrences
            title: High Rate of Pod Restarts Detected
        memory-limit-utilization:
            expr: |
                avg_over_time(liferay:container_memory_limit_utilization:ratio[2m]) > 0.8
                and on(namespace)
                kube_namespace_labels{label_liferay_com_observable="true"}
            for: 5m
            interval: 2m
            labels:
                aggregation_period: 2m
                type: warning
                unit: percent
            title: Container Memory Limit Utilization Above 80%
        zero-ready-replicas:
            expr: |
                (
                    max_over_time(kube_deployment_status_replicas_ready[10m]) == 0
                    or
                    max_over_time(kube_statefulset_status_replicas_ready[10m]) == 0
                )
                and on(namespace)
                kube_namespace_labels{label_liferay_com_observable="true"}
            labels:
                aggregation_period: 10m
                type: critical
                unit: state
            title: Deployment or StatefulSet With Zero Ready Replicas
    templates: {}
alloy:
    enabled: false
    iam:
        awsRoleArn: ""
        gcpServiceAccount: ""
    remoteWrite:
        basicAuth:
            password: ""
            username: ""
        bearerToken: ""
        headers: {}
        url: ""
    scrape:
        cadvisor:
            enabled: true
            path: /metrics/cadvisor
        cloudwatchRDS:
            discoveryInterval: 5m
            enabled: false
            metrics:
                -   name: CPUUtilization
                    statistics:
                        -   Average
                        -   Maximum
                -   name: DiskQueueDepth
                    statistics:
                        -   Average
                        -   Maximum
                -   name: FreeStorageSpace
                    statistics:
                        -   Average
                        -   Minimum
                -   name: FreeableMemory
                    statistics:
                        -   Average
                        -   Minimum
                -   name: ReadIOPS
                    statistics:
                        -   Average
                -   name: ReadLatency
                    statistics:
                        -   Average
                        -   Maximum
                -   name: ReplicaLag
                    statistics:
                        -   Average
                        -   Maximum
                -   name: SwapUsage
                    statistics:
                        -   Average
                        -   Maximum
                -   name: WriteIOPS
                    statistics:
                        -   Average
                -   name: WriteLatency
                    statistics:
                        -   Average
                        -   Maximum
            nameTagRegex: .*-database-(blue|green)$
            region: ""
            scrapeInterval: 1m
        envoy:
            enabled: true
            path: /stats/prometheus
            port: 19001
        kubeStateMetrics:
            enabled: true
            path: /metrics
            port: http
        liferay:
            enabled: true
            matchLabels:
                component: liferay
            path: /metrics
            port: 12345
        nodeExporter:
            enabled: true
            path: /metrics
            port: metrics
        rdsExporter:
            enabled: false
            path: /metrics
            port: http
    scrapeInterval: 1m
aws:
    ampWorkspaceURL: ""
    region: ""
centralHub:
    argoWorkflowsURL: ""
    argocdURL: ""
    gitURL: ""
cloudProvider: ""
customLabels: {}
dashboards:
    folder: Liferay
    items:
        backups:
            file: dashboards/backups.json
        central-hub:
            file: dashboards/central-hub.json
        databases:
            file: dashboards/databases.json
        kubernetes-workloads:
            file: dashboards/kubernetes-workloads.json
        load-balancers:
            file: dashboards/load-balancers.json
datasource:
    name: Prometheus
    type: prometheus
    uid: managed-prometheus
fullnameOverride: ""
gcp:
    projectId: ""
grafana:
    datasources: {}
    grafana.ini:
        analytics:
            check_for_plugin_updates: true
            check_for_updates: true
            reporting_enabled: false
        annotations:
            cleanupjob_batchsize: 300
        annotations.api:
            max_age: 10d
            max_annotations_to_keep: 3000
        annotations.dashboard:
            max_age: 10d
            max_annotations_to_keep: 3000
        auth:
            sigv4_auth_enabled: true
        dashboards:
            default_home_dashboard_path: /tmp/dashboards/Liferay/central-hub.json
        feature_toggles:
            enable: accessControlOnCall,externalServiceAccounts,idForwarding
        log:
            filters: plugins:error
            level: error
            mode: console
        log.console:
            format: json
        panels:
            disable_sanitize_html: true
        plugins:
            disable_plugins: grafana-lokiexplore-app
        server:
            enable_gzip: true
            read_timeout: 0
        unified_alerting.state_history.annotations:
            max_age: 10d
            max_annotations_to_keep: 3000
        users:
            default_theme: light
    networkPolicy:
        enabled: false
    podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    podDisruptionBudget:
        maxUnavailable: 1
    rbac:
        namespaced: true
    resources:
        limits:
            cpu: 500m
            memory: 512Mi
        requests:
            cpu: 100m
            memory: 256Mi
    serviceAccount:
        annotations:
            eks.amazonaws.com/role-arn: ""
        automountServiceAccountToken: true
        name: grafana
    serviceMonitor:
        enabled: false
    sidecar:
        alerts:
            enabled: true
            env:
                HEALTH_PORT: 8081
            labelValue: "true"
            resource: configmap
            searchNamespace: ""
            watchMethod: SLEEP
        dashboards:
            enabled: true
            env:
                HEALTH_PORT: 8084
            folderAnnotation: grafana_folder
            labelValue: "true"
            provider:
                foldersFromFilesStructure: true
            resource: configmap
            searchNamespace: ""
            watchMethod: SLEEP
        datasources:
            alertmanager:
                enabled: false
            defaultDatasourceEnabled: true
            enabled: true
            env:
                HEALTH_PORT: 8082
            labelValue: "true"
            resource: configmap
            searchNamespace: ""
            timeout: 180s
            watchMethod: SLEEP
        logLevel: error
        plugins:
            enabled: true
grafana-alloy:
    alloy:
        clustering:
            enabled: true
        configMap:
            create: false
            key: config.alloy
            name: liferay-alloy-config
        mounts:
            extra:
                -   mountPath: /var/run/secrets/alloy
                    name: remote-write-credentials
                    readOnly: true
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                    -   ALL
            privileged: false
            readOnlyRootFilesystem: false
    configReloader:
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                    -   ALL
            privileged: false
            readOnlyRootFilesystem: false
    controller:
        type: daemonset
        volumes:
            extra:
                -   name: remote-write-credentials
                    secret:
                        optional: true
                        secretName: liferay-alloy-remote-write
    global:
        podSecurityContext:
            fsGroup: 473
            runAsGroup: 473
            runAsNonRoot: true
            runAsUser: 473
            seccompProfile:
                type: RuntimeDefault
    serviceAccount:
        create: false
        name: liferay-alloy
kube-state-metrics:
    enabled: true
    extraArgs:
        -   --metric-allowlist=kube_deployment_status_replicas_ready,kube_namespace_labels,kube_node_info,kube_node_status_condition,kube_pod_container_info,kube_pod_container_resource_limits,kube_pod_container_resource_requests,kube_pod_container_status_restarts_total,kube_statefulset_status_replicas_ready
        -   --v=1
    metricLabelsAllowlist:
        -   namespaces=[liferay.com/observable]
    networkPolicy:
        egress:
            -   {}
        enabled: true
        ingress:
            -   from:
                    -   namespaceSelector:
                            matchLabels:
                                kubernetes.io/metadata.name: gmp-system
                    -   podSelector: {}
    podDisruptionBudget:
        maxUnavailable: 1
    prometheus:
        monitor:
            enabled: false
    prometheusScrape: false
    resources:
        limits:
            cpu: 100m
            memory: 256Mi
        requests:
            cpu: 30m
            memory: 128Mi
    serviceAccount:
        automountServiceAccountToken: false
nameOverride: ""
prometheus-node-exporter:
    enabled: true
    extraArgs:
        -   --log.format=json
        -   --log.level=error
    networkPolicy:
        enabled: true
        ingress:
            -   from:
                    -   namespaceSelector:
                            matchLabels:
                                kubernetes.io/metadata.name: gmp-system
                    -   podSelector: {}
    prometheus:
        monitor:
            enabled: false
        podMonitor:
            enabled: false
    rbac:
        create: true
    resources:
        limits:
            cpu: 102m
            memory: 180Mi
        requests:
            cpu: 102m
            memory: 180Mi
    service:
        enabled: true
    serviceAccount:
        automountServiceAccountToken: false
        create: true
rdsExporter:
    enabled: false
    iam:
        awsRoleArn: ""
    image:
        repository: public.ecr.aws/qonto/prometheus-rds-exporter
        tag: 0.13.0
    region: ""
    resources:
        limits:
            cpu: 100m
            memory: 128Mi
        requests:
            cpu: 25m
            memory: 64Mi