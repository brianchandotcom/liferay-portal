liferay-releng-app-description=ແອັບ Adaptive Media ປັບແຕ່ງສື່ໃນພໍທັລຂອງທ່ານໃຫ້ເໝາະສົມກັບອຸປະກອນທີ່ໃຊ້ງານ. ເນື່ອງຈາກຜູ້ໃຊ້ມັກຈະເບິ່ງສື່ຜ່ານຫຼາຍອຸປະກອນທີ່ມີຂະໜາດໜ້າຈໍ ແລະ ຄວາມສາມາດທີ່ແຕກຕ່າງກັນ, ທ່ານຄວນໝັ້ນໃຈວ່າພໍທັລຂອງທ່ານສະແດງສື່ນັ້ນໃນຮູບແບບທີ່ເໝາະສົມກັບແຕ່ລະອຸປະກອນ. ຕົວຢ່າງ: ຜູ້ດູແລລະບົບພໍທັລສາມາດກຳນົດຄ່າແອັບ Adaptive Media ເພື່ອສົ່ງຮູບພາບທີ່ມີຄວາມລະອຽດສູງໄປຫາອຸປະກອນທີ່ມີຄວາມລະອຽດສູງ, ສົ່ງຮູບພາບທີ່ມີຄວາມລະອຽດຕ່ຳໄປຫາອຸປະກອນທີ່ມີຄວາມລະອຽດຕ່ຳ ແລະ ອື່ນໆ. ສິ່ງນີ້ຊ່ວຍໃຫ້ໝັ້ນໃຈວ່າຜູ້ໃຊ້ຂອງທ່ານຈະໄດ້ຮັບປະສົບການທີ່ດີທີ່ສຸດໃນການຊົມສື່ຈາກພໍທັລຂອງທ່ານ, ບໍ່ວ່າພວກເຂົາຈະໃຊ້ອຸປະກອນໃດກໍຕາມ.<br /><br />ໝາຍເຫດ: ໃນເວລານີ້, ແອັບ Adaptive Media ໃຊ້ງານໄດ້ສະເພາະກັບຮູບພາບໃນ ຄັງເອກະສານ ແລະ ສື່, ບລັອກ ແລະ ເນື້ອຫາເວັບເທົ່ານັ້ນ.<br /><br />ເມື່ອຕິດຕັ້ງແລ້ວ, ແອັບ Adaptive Media ຈະປະກົດຂຶ້ນໃນ ແຜງຄວບຄຸມ, ພາຍໃຕ້ເມນູ ການກຳນົດຄ່າ.