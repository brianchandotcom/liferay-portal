components:
    schemas: {}
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Analytics GraphQL
    version: v1.0
openapi: 3.0.1
paths:
    "/graphql":
        post:
            requestBody:
                content:
                    application/json:
                        schema:
                            type: string
                    application/xml:
                        schema:
                            type: string
                required: true
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                type: string
                        application/xml:
                            schema:
                                type: string
                    description:
                        Raw JSON response
                500:
                    content:
                        application/json:
                            schema:
                                type: string
                        application/xml:
                            schema:
                                type: string
                    description:
                        Unexpected error
            tags: ["GraphQL"]