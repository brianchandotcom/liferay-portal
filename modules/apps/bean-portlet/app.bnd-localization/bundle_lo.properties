liferay-releng-app-description=Bean Portlet ສະໜອງຄວາມສາມາດ CDI "bean portlets". ມັນຊ່ວຍໃຫ້ທ່ານລົງທະບຽນພອດເລັດໂດຍໃຊ້ annotations ເຊັ່ນ @PortletConfiguration ແລະ annotation @Inject ຂອງມັນຈະດຶງຂໍ້ມູນ dependencies ຜ່ານ Contexts and Dependency Injection (CDI). Bean portlets ແມ່ນຄຸນສົມບັດຂອງ Portlet 3.0 Specification ຕາມທີ່ກຳນົດໂດຍ JSR 362.<br /><br />ໂມດູນ Bean Portlet ຈະຖືກຕິດຕັ້ງໄວ້ທີ່ LIFERAY_HOME/osgi/modules/static.