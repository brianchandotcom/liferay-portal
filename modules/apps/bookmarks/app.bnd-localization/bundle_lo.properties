liferay-releng-app-description=ແອັບ Bookmarks ເພີ່ມວິດເຈັດທີ່ສາມາດໃຊ້ເພື່ອລາຍຊື່ ແລະ ຈັດລະບຽບບຸກມາກ (bookmarks). ການວາງວິດເຈັດ Bookmarks ໄວ້ໃນໜ້າເວັບໄຊ ຊ່ວຍໃຫ້ຜູ້ດູແລລະບົບສາມາດຄັດເລືອກບຸກມາກທີ່ໜ້າສົນໃຈສຳລັບຊຸມຊົນທັງໝົດ. ວິດເຈັດນີ້ສາມາດບຸກມາກໄດ້ທັງໜ້າພໍທັລພາຍໃນ ແລະ URLs ພາຍນອກ.<br /><br />ຫຼັງຈາກຕິດຕັ້ງແອັບນີ້ແລ້ວ, ທ່ານສາມາດເຂົ້າເຖິງວິດເຈັດ Bookmarks ໄດ້ຈາກເມນູ ວິດເຈັດ.