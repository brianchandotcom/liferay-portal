components:
    schemas:
        SimpleCaptcha:
            properties:
                image:
                    type: string
                token:
                    type: string
        SimpleCaptchaForm:
            properties:
                answer:
                    type: string
                token:
                    type: string
            required:
                - token
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.captcha.rest.client', and version '1.0.0'."
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/simple-captcha":
        get:
            operationId: getSimpleCaptcha
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SimpleCaptcha"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/SimpleCaptcha"
                    description:
                        Send a captcha token and image.
            tags: ["SimpleCaptcha"]
        post:
            operationId: postSimpleCaptcha
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SimpleCaptchaForm"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/SimpleCaptchaForm"
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
                400:
                    content:
                        application/json: {}
                        application/xml: {}
                    description:
                        Invalid answer provided
            tags: ["SimpleCaptcha"]