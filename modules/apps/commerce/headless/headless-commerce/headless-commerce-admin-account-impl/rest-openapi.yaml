components:
    parameters:
        accountExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the related Account. Idempotency key for create and update; must be unique per Account within the company.
            explode: false
            name: accountExternalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that identifies the resource. Idempotency key for create and update; must be unique per entity within the company.
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. The filterable fields depend on the endpoint; see the operation description for the supported field list.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        idPathParam:
            in: path
            description:
                Internal primary key that identifies the resource.
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        organizationIdPathParam:
            in: path
            description:
                Internal primary key of the related Organization.
            explode: false
            name: organizationId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        pageQueryParam:
            in: query
            description:
                One-based page index used together with pageSize to slice the result set. The first page is 1.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Maximum number of entries returned per page. The default value is 20 when the parameter is omitted.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        searchQueryParam:
            in: query
            description:
                Free-text search expression matched against the indexed string fields of the underlying entity. The matched fields depend on the endpoint; see the operation description for the searched field list.
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        sortQueryParam:
            in: query
            description:
                Comma-separated list of sort expressions in the form <field>:asc or <field>:desc. The sortable fields depend on the endpoint; see the operation description for the supported field list.
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
        userIdPathParam:
            in: path
            description:
                Internal primary key of the related User.
            explode: false
            name: userId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
    responses:
        NotFound:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                The specified resource was not found
        UnauthorizedError:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                Authentication information is missing or invalid
    schemas:
        Account:
            description:
                Commerce buyer organization or end customer that places orders. Owns addresses, members (users with account-scoped roles), and links to organizations and account groups. Created on POST, updated on PATCH, and returned by the matching list endpoint.
            properties:
                accountAddresses:
                    description:
                        Addresses owned by this account, accepted on POST or PATCH and persisted in the same transaction; existing addresses are matched by `id` and updated when supplied, otherwise added. Not returned on read; fetch them through the addresses sub-resource.
                    example:
                    -   city: Diamond Bar
                        countryISOCode: US
                        defaultBilling: true
                        defaultShipping: true
                        description:
                            right stairs, first room on the left
                        id: 31130
                        latitude: 33.9976884
                        longitude: -117.8144595
                        name: Alessio Antonio Rendina
                        phoneNumber: (123) 456 7890
                        regionISOCode: CA
                        street1: 1400 Montefino Ave
                        street2: 1st floor
                        street3: suite 200
                        zip: "91765"
                    items:
                        $ref: "#/components/schemas/AccountAddress"
                    type: array
                accountMembers:
                    description:
                        Members (user-to-account links) on this account, each carrying the user's account-scoped roles, accepted on POST or PATCH and persisted in the same transaction; existing memberships are kept, never removed. Not returned on read; fetch them through the members sub-resource.
                    example:
                    -   description:
                            en_US: Account Administrator Description US
                            hr_HR: Account Administrator Description HR
                            hu_HU: Account Administrator Description HU
                    -   id: 31256
                        name: Alessio Antonio Rendina
                        roles:
                    items:
                        $ref: "#/components/schemas/AccountMember"
                    type: array
                accountOrganizations:
                    description:
                        Organizations linked to this account, accepted on POST or PATCH and persisted in the same transaction; existing links are kept, never removed. Not returned on read; fetch them through the organizations sub-resource.
                    example:
                    -   id: 20546
                        name: Liferay Italy
                        organizationId: 20433
                        treePath: /Liferay/Liferay Italy
                    items:
                        $ref: "#/components/schemas/AccountOrganization"
                    type: array
                active:
                    description:
                        Whether the account is active. Inactive accounts cannot place orders but remain visible in the admin UI. Defaults to true on create; mapped to the workflow status of the underlying account record (active when approved, inactive otherwise).
                    example: true
                    type: boolean
                customFields:
                    additionalProperties: true
                    description:
                        Free-form custom field map populated by the platform expando mechanism. Keys are the registered custom field names; values follow the type declared on the field definition.
                    type: object
                dateCreated:
                    description:
                        Creation timestamp in ISO 8601 (UTC). Read-only; set when the account is first persisted. Filterable and sortable via the OData query parameter.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        Last modification timestamp in ISO 8601 (UTC). Read-only; updated on each save. Filterable and sortable via the OData query parameter.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                defaultBillingAccountAddressId:
                    description:
                        Reference to the address (FK identifier) used as the default billing address for the account. Setting this field clears the previous default billing flag on sibling addresses.
                    example: 10130
                    format: int64
                    minimum: 0
                    type: integer
                defaultShippingAccountAddressId:
                    description:
                        Reference to the address (FK identifier) used as the default shipping address for the account. Setting this field clears the previous default shipping flag on sibling addresses.
                    example: 10131
                    format: int64
                    minimum: 0
                    type: integer
                emailAddresses:
                    description:
                        Email addresses associated with the account. The first entry is the primary contact email; on create or update only the first entry is persisted as the account email.
                    example:
                    -   joe.1@commerce.com
                    -   joe.2@commerce.com
                    -   joe.3@commerce.com
                    items:
                        format: email
                        type: string
                    type: array
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per account within the company. Used as the addressing key on the by-externalReferenceCode endpoints.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal primary key. Read-only; assigned by the system on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                logoId:
                    description:
                        Reference to the document library entry (FK identifier) that stores the account logo image. Read-only on this schema; set through the dedicated logo upload endpoint.
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                logoURL:
                    description:
                        Relative URL the back-office uses to fetch the account logo image. Computed from the logo identifier and a cache-busting token; read-only.
                    example: /image/organization_logo?img_id=20078&t=1500000000000
                    type: string
                name:
                    description:
                        Display name of the account. Required on create. Filterable and sortable via the OData query parameter; matched by the search query parameter.
                    example: Account Name
                    type: string
                root:
                    description:
                        Whether this account sits at the root of the account hierarchy. Read-only; true when the account has no parent account.
                    example: true
                    type: boolean
                taxId:
                    description:
                        Tax identifier of the account such as a VAT or EIN number. Persisted as supplied and surfaced on invoices.
                    example: Abcd1234
                    type: string
                type:
                    description:
                        Integer account type -- 0=Guest, 1=Personal, 2=Business. Determines the available members and address flows. Defaults to Personal on create. Filterable and sortable via the OData query parameter.
                    example: 1
                    format: int32
                    maximum: 2
                    minimum: 0
                    type: integer
            required:
            -   externalReferenceCode
            -   name
            type: object
        AccountAddress:
            description:
                Billing, shipping, or combined-purpose address owned by an account. Marking an address as default billing or shipping clears the previously default address on the same account.
            properties:
                city:
                    description:
                        City name. Required on create.
                    example: Diamond Bar
                    type: string
                countryISOCode:
                    description:
                        Country code in ISO 3166-1 alpha-2 form. Required on create; resolved against the company's registered countries.
                    example: US
                    type: string
                defaultBilling:
                    description:
                        Whether this address is the default billing address for the owning account. Setting this to true clears the same flag on sibling addresses on the account.
                    example: true
                    type: boolean
                defaultShipping:
                    description:
                        Whether this address is the default shipping address for the owning account. Setting this to true clears the same flag on sibling addresses on the account.
                    example: true
                    type: boolean
                description:
                    description:
                        Free-form delivery hint or note attached to the address.
                    example: right stairs, first room on the left
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per address within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal primary key. Read-only; assigned by the system on create.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                latitude:
                    description:
                        Latitude in decimal degrees. Optional; populated only when the address has been geocoded.
                    example: 33.9976884
                    format: double
                    type: number
                longitude:
                    description:
                        Longitude in decimal degrees. Optional; populated only when the address has been geocoded.
                    example: -117.8144595
                    format: double
                    type: number
                name:
                    description:
                        Recipient name attached to the address. Required on create.
                    example: Alessio Antonio Rendina
                    type: string
                phoneNumber:
                    description:
                        Contact phone number associated with the address.
                    example: (123) 456 7890
                    type: string
                regionISOCode:
                    description:
                        Region code in ISO 3166-2 form. Optional; resolved against the regions registered on the country and left blank when no matching region is found.
                    example: CA
                    type: string
                street1:
                    description:
                        First street line. Required on create.
                    example: 1400 Montefino Ave
                    type: string
                street2:
                    description:
                        Second street line, when supplied.
                    example: 1st floor
                    type: string
                street3:
                    description:
                        Third street line, when supplied.
                    example: suite 200
                    type: string
                type:
                    description:
                        Integer address purpose -- 1=Billing, 2=Billing and shipping, 3=Shipping. Defaults to Billing and shipping on create when not supplied.
                    example: 1
                    format: int32
                    maximum: 3
                    minimum: 1
                    type: integer
                zip:
                    description:
                        Postal or ZIP code attached to the address.
                    example: "91765"
                    type: string
            required:
            -   city
            -   countryISOCode
            -   name
            -   street1
            type: object
        AccountChannelEntry:
            deprecated: true
            description:
                Deprecated -- per-account override of a channel-level commerce rule (currency, delivery or payment term, discount, payment method, price list, reserved billing or shipping address, or assigned user). The effective override type is derived from the endpoint path rather than from the payload. New integrations should use the per-account shipping option override or the nested account sub-resources.
            properties:
                accountExternalReferenceCode:
                    description:
                        Idempotency key of the parent account that owns the override. Read-only on this schema; mirrored from the parent account record.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                accountId:
                    description:
                        Reference to the parent account that owns the override (FK identifier). Read-only on this schema; mirrored from the parent account record.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                channelExternalReferenceCode:
                    description:
                        External reference code of the channel being overridden. Alternative to `channelId` on POST.
                    example: AB-34098-789-N
                    type: string
                channelId:
                    description:
                        Reference to the channel being overridden (FK identifier). Alternative to `channelExternalReferenceCode` on POST.
                    example: 30130
                    format: int64
                    type: integer
                classExternalReferenceCode:
                    description:
                        External reference code of the target entity (currency, term, discount, payment method, price list, address, or user) being attached to the channel-account pair. The interpretation of this code depends on the override type derived from the endpoint path.
                    example: AB-34098-789-N
                    type: string
                classPK:
                    description:
                        Internal primary key of the target entity being attached (FK identifier). Read in conjunction with the override type derived from the endpoint path.
                    example: 30130
                    format: int64
                    type: integer
                id:
                    description:
                        Internal primary key. Read-only; assigned by the system on create.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                overrideEligibility:
                    description:
                        Whether this override bypasses channel-level eligibility checks. When true the rule is applied to the account regardless of channel-level filters.
                    example: true
                    type: boolean
                priority:
                    description:
                        Sort priority among overrides of the same type for the same account. Lower values are applied first.
                    example: 1.0
                    format: double
                    type: number
            type: object
        AccountChannelShippingOption:
            description:
                Per-account override of a shipping option on a commerce channel. Pairs the owning account, the channel, a shipping method engine key, and a specific fixed option key; an override is unique per account, channel, shipping method, and option key.
            properties:
                accountExternalReferenceCode:
                    description:
                        Idempotency key of the parent account that owns the override. Read-only on this schema; mirrored from the parent account record.
                    example: AB-34098-789-N
                    type: string
                accountId:
                    description:
                        Reference to the parent account that owns the override (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                channelExternalReferenceCode:
                    description:
                        External reference code of the channel on which the shipping option override applies. Alternative to `channelId` on POST.
                    example: AB-34098-789-N
                    type: string
                channelId:
                    description:
                        Reference to the channel on which the shipping option override applies (FK identifier). Alternative to `channelExternalReferenceCode` on POST.
                    example: 30130
                    format: int64
                    type: integer
                id:
                    description:
                        Internal primary key. Read-only; assigned by the system on create.
                    example: 30324
                    format: int64
                    minimum: 0
                    type: integer
                shippingMethodId:
                    description:
                        Reference to the resolved shipping method (FK identifier). Read-only output computed from `shippingMethodKey` against the channel; 0 when the key matches no active method.
                    example: 30324
                    format: int64
                    minimum: 0
                    type: integer
                shippingMethodKey:
                    description:
                        Engine key of the shipping method, persisted as supplied. The method must be active and registered on the channel.
                    example: fixed
                    type: string
                shippingOptionId:
                    description:
                        Reference to the resolved fixed shipping option (FK identifier). Read-only output computed from `shippingOptionKey`; 0 when the key matches no fixed option.
                    example: 30324
                    format: int64
                    minimum: 0
                    type: integer
                shippingOptionKey:
                    description:
                        Engine key of the fixed shipping option, persisted as supplied. The option must be registered on the resolved shipping method.
                    example: expedited
                    type: string
            type: object
        AccountMember:
            description:
                Membership relation between an account and a user. Carries the user's account-scoped roles and the identifiers needed to resolve the user on create. Returned as a sub-resource of the owning account.
            properties:
                accountId:
                    description:
                        Reference to the parent account on which the membership is created (FK identifier). Read-only on this schema.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                accountRoles:
                    description:
                        Account-scoped roles assigned to the user on this account. Each entry carries the localized title and description of the role.
                    example:
                    -   description:
                            en_US: Account Administrator Description US
                            hr_HR: Account Administrator Description HR
                            hu_HU: Account Administrator Description HU
                    -   description:
                            en_US: Order Manager Description US
                            hr_HR: Order Manager Description HR
                            hu_HU: Order Manager Description HU
                    items:
                        $ref: "#/components/schemas/AccountRole"
                    type: array
                email:
                    description:
                        Email address of the user being attached as a member. Required on create; resolved against the platform user directory and rejected when no matching user exists.
                    example: joe.1@commerce.com
                    type: string
                externalReferenceCode:
                    description:
                        External reference code field on the membership payload. Not returned on read.
                    example: AB-34098-789-N
                    type: string
                name:
                    description:
                        Display name of the user attached as a member. Read-only; mirrored from the user record.
                    example: User Name
                    type: string
                userExternalReferenceCode:
                    description:
                        External reference code of the user attached as a member. Alternative to `email` or `userId` on POST; resolved against the platform user directory and rejected when no matching user exists. Not returned on read.
                    example: AB-34098-789-N
                    type: string
                userId:
                    description:
                        Reference to the user attached as a member (FK identifier). Alternative to `email` or `userExternalReferenceCode` on POST.
                    example: 30002
                    format: int64
                    minimum: 0
                    type: integer
            required:
            -   email
            type: object
        AccountOrganization:
            description:
                Link between an account and a Liferay organization. Used to mirror an organizational hierarchy into the commerce domain so that users tied to the organization inherit the account context.
            properties:
                accountId:
                    description:
                        Reference to the parent account that owns the link (FK identifier). Read-only on this schema.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the linked organization. Read-only; mirrored from the organization record.
                    example: Organization Name
                    type: string
                organizationExternalReferenceCode:
                    description:
                        External reference code of the linked organization. Alternative to `organizationId` on POST; resolved against the platform organization directory and rejected when no matching organization exists. Not returned on read.
                    example: AB-34098-789-N
                    type: string
                organizationId:
                    description:
                        Reference to the linked organization (FK identifier). Alternative to `organizationExternalReferenceCode` on POST.
                    example: 30002
                    format: int64
                    minimum: 0
                    type: integer
                treePath:
                    description:
                        Slash-delimited path from the root of the organization tree to the linked organization. Read-only; mirrored from the organization record.
                    example: /Parent Organization/Organization Name
                    type: string
            type: object
        AccountRole:
            description:
                Account-scoped role assigned to a user through their account membership. Carries the localized title and description that surface in the back-office.
            properties:
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized description of the role. Map keys are locale codes; values are the translated strings. Read-only; mirrored from the role record.
                    example:
                        en_US: Role Description US
                        hr_HR: Role Description HR
                        hu_HU: Role Description HU
                    type: object
                name:
                    description:
                        Internal name of the role, used as its stable identifier in the role registry. Required on create.
                    example: Role Name
                    type: string
                roleId:
                    description:
                        Reference to the platform role record (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized title of the role. Map keys are locale codes; values are the translated strings. Read-only; mirrored from the role record.
                    example:
                        en_US: Role Title US
                        hr_HR: Role Title HR
                        hu_HU: Role Title HU
                    type: object
            required:
            -   name
            type: object
        AdminAccountGroup:
            description:
                Collection of accounts that share commerce rules, price lists, or discounts. The schema name carries the `Admin` prefix to avoid colliding with the account group schema exposed by the headless admin-user module.
            properties:
                customFields:
                    additionalProperties: true
                    description:
                        Free-form custom field map populated by the platform expando mechanism. Keys are the registered custom field names; values follow the type declared on the field definition.
                    type: object
                description:
                    description:
                        Free-form description of the account group. Not returned on read.
                    example: AdminAccountGroup Description
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per account group within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal primary key. Read-only; assigned by the system on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    description:
                        Display name of the account group. Required on create. Filterable and sortable via the OData query parameter.
                    example: AdminAccountGroup Name
                    type: string
            required:
            -   name
            type: object
        Error:
            description:
                Standard error envelope returned by every non-success response. Carries the HTTP status, an internal error code, and a human-readable description.
            properties:
                errorCode:
                    description:
                        Internal numeric error code, distinct from the HTTP status. Mapped from the underlying exception that produced the response. Read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Human-readable description of the error, suitable for surfacing to operators. Read-only.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Underlying exception message, often including the lookup keys that failed. Read-only.
                    example: No commerce currency exists with the key groupId=41811, code=US Dollar
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code returned with this error envelope. Read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
            -   errorCode
            -   errorDescription
            -   message
            -   status
            type: object
        User:
            description:
                Portal user record. Returned by the createUser endpoint when a new user is provisioned as part of an account membership invitation; carries the identifiers and profile fields needed to address the user in subsequent calls.
            properties:
                email:
                    description:
                        Primary email address of the user. Required on create; used as the login when the portal is configured to log in by email.
                    example: joe.1@commerce.com
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per user within the company.
                    example: AB-34098-789-N
                    type: string
                firstName:
                    description:
                        Given name of the user. Required on create.
                    example: John
                    type: string
                id:
                    description:
                        Internal primary key. Read-only; assigned by the system on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                jobTitle:
                    description:
                        Free-form job title displayed in the back-office.
                    example: Account Manager
                    type: string
                lastName:
                    description:
                        Family name of the user. Required on create.
                    example: Doe
                    type: string
                male:
                    description:
                        Whether the user is recorded as male in the profile. Legacy field; new integrations should not rely on it.
                    example: true
                    type: boolean
                middleName:
                    description:
                        Middle name of the user, when supplied.
                    example: Robert
                    type: string
                roles:
                    description:
                        Names of the regular portal-scoped roles to assign to the user. Each entry is the stable role name in the role registry.
                    example:
                    -   User
                    -   Power User
                    items:
                        type: string
                    type: array
            required:
            -   email
            -   firstName
            -   lastName
            type: object
        body:
            description:
                Multipart upload envelope for an account logo addressed by internal identifier. Contains a single binary file field named `logo` that replaces the current account logo.
            properties:
                logo:
                    description:
                        Binary image file uploaded as the account logo. Standard image formats (PNG, JPEG, GIF) are accepted; the uploaded bytes replace the existing logo when supplied.
                    format: binary
                    type: string
            type: object
        body_1:
            description:
                Multipart upload envelope for an account logo addressed by external reference code. Contains a single binary file field named `logo` that replaces the current account logo.
            properties:
                logo:
                    description:
                        Binary image file uploaded as the account logo. Standard image formats (PNG, JPEG, GIF) are accepted; the uploaded bytes replace the existing logo when supplied.
                    format: binary
                    type: string
            type: object
info:
    description:
        "Liferay Commerce Admin Account API. Manages B2B and B2C Commerce accounts and their relationships from the admin perspective. -- Primary entities -- Account (the commerce buyer organization), AccountGroup (collections of accounts that share rules), AccountMember (links users to accounts with account-scoped roles), AccountOrganization (links accounts to Liferay Organizations), AccountAddress (billing and shipping addresses), AccountChannelEntry (deprecated per-account overrides of channel-level rules including currency, delivery and payment terms, discounts, payment methods, price lists, and reserved shipping or billing addresses), and AccountChannelShippingOption (per-account overrides of available shipping methods on a channel). -- Perspective -- administrators with the CommerceOpenApiAdmin.read or CommerceOpenApiAdmin.write scope. Endpoints expose the full account graph, including HATEOAS action descriptors and custom fields, regardless of the requesting user's account membership. -- Related modules -- buyer-perspective endpoints live in com.liferay.headless.commerce.delivery.cart and com.liferay.headless.commerce.delivery.catalog. Channel and pricing configuration lives in com.liferay.headless.commerce.admin.channel and com.liferay.headless.commerce.admin.pricing. -- Common workflows: Provision an account, addresses, and members from the back-office -- POST /accounts with externalReferenceCode upserts the account, and nested addresses and members are persisted in the same call; add further memberships through POST /accounts/by-externalReferenceCode/<externalReferenceCode>/accountMembers (existing user) or .../accountMembers/createUser (new user). -- Link an existing user as an account member -- POST /accounts/by-externalReferenceCode/<externalReferenceCode>/accountMembers with userId or userExternalReferenceCode and the desired AccountRoles, and PATCH on the member endpoint replaces the user's role set on the account. -- Override channel-level rules for one account -- POST /accounts/<id>/account-channel-* (or the by-externalReferenceCode variant) creates an override that takes precedence over the channel default; the top-level /account-channel-* endpoints are deprecated, so prefer the nested forms scoped under an account. -- Group accounts for bulk rule application -- POST /accountGroups creates the group (upsert by externalReferenceCode), and POST /accountGroups/by-externalReferenceCode/<externalReferenceCode>/accounts links an account into the group while the DELETE counterpart unlinks it. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.account.client', and version '4.0.44'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Admin Account API
    version: v1.0
openapi: 3.0.0
