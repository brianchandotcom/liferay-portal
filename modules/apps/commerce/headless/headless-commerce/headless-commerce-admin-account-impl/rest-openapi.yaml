tags:
-   description:
        Manages Account entities -- the commerce buyer organizations or end customers that place orders. Endpoints expose CRUD, the by-externalReferenceCode addressing scheme, and per-account sub-resources for addresses, members, organizations, channel-shipping-option overrides, and logo uploads.
    name: Account
-   description:
        Manages billing, shipping, and combined addresses owned by an Account. Endpoints expose per-address CRUD plus the addresses sub-resource on an Account. Marking an address as default billing or shipping clears the previously default address on the same account.
    name: AccountAddress
-   description:
        Deprecated -- per-account overrides of channel-level rules for currency, delivery and payment terms, discounts, payment methods, price lists, and reserved billing or shipping addresses. New integrations should use the nested endpoints under an Account.
    name: AccountChannelEntry
-   description:
        Manages per-account overrides of the shipping options available on a channel. Each entry pairs a shipping method with a specific fixed option key.
    name: AccountChannelShippingOption
-   description:
        Manages the membership relation between an Account and a User. Each AccountMember carries the user's account-scoped AccountRoles. PATCH replaces the role set; DELETE removes the membership.
    name: AccountMember
-   description:
        Manages the link between an Account and a Liferay Organization. Used to mirror an organizational hierarchy into the commerce domain.
    name: AccountOrganization
-   description:
        Manages AccountGroups -- collections of accounts that share rules, price lists, or discounts. The schema is named AdminAccountGroup to avoid colliding with the AccountGroup schema in com.liferay.headless.admin.user; both describe the same underlying entity from different admin perspectives.
    name: AdminAccountGroup
-   description:
        Creates Users in the context of an Account. The User endpoint is a thin facade that creates the user, assigns the supplied external reference code, and adds the membership in a single call.
    name: User