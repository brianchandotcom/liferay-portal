                customFields:
                    additionalProperties: true
                    description:
                        Custom field values attached to the product group; read-only.
                    readOnly: true
                    type: object
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized description as a map whose keys are locale codes and whose values are the translated strings.
                    example:
                        en_US: Description
                        hr_HR: Description HR
                        hu_HU: Description HU
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per product group within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary key of the product group.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                products:
                    description:
                        Embedded list of memberships included in this group; written through the product-group-product sub-resource.
                    items:
                        $ref: "#/components/schemas/ProductGroupProduct"
                    type: array
                productsCount:
                    description:
                        Number of products currently linked to this group; computed on read.
                    example: 20
                    format: int32
                    minimum: 0
                    type: integer
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized title as a map whose keys are locale codes and whose values are the translated strings; required on create; an empty or null title is rejected.
                    example:
                        en_US: Title
                        hr_HR: Title HR
                        hu_HU: Title HU
                    type: object
            type: object
        ProductGroupProduct:
            description:
                Membership entry that links a product to a product group; admin catalog write view used to add or remove products from a product group.
            properties:
                id:
                    description:
                        Primary key of the membership row.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                productExternalReferenceCode:
                    description:
                        External reference code of the parent envelope of the linked product; used on create to resolve the product when `productId` is not supplied.
                    example: PAB-34098-789-N
                    type: string
                productGroupExternalReferenceCode:
                    description:
                        External reference code of the product group this membership belongs to; used on create to resolve the group when `productGroupId` is not supplied.
                    example: DAB-34098-789-N
                    type: string
                productGroupId:
                    description:
                        Identifier of the product group; required on create when `productGroupExternalReferenceCode` does not resolve.
                    example: 30324
                    format: int64
                    minimum: 0
                    type: integer
                productId:
                    description:
                        Identifier of the parent product envelope whose published revision is added to the group; required on create when `productExternalReferenceCode` does not resolve.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                productName:
                    description:
                        Display name of the linked product in the requested locale; read-only.
                    example: Hand Saw
                    readOnly: true
                    type: string
                sku:
                    description:
                        SKU summary of the linked product -- the single variant SKU when there is exactly one variant, an empty string when there are no variants, or the localized 'multiple-skus' label when several variants exist; read-only.
                    example: BL500IC
                    type: string
            type: object
        ProductOption:
            description:
                An option attached to a specific product, carrying per-product overrides for the global option template; the link captures localized labels, required and SKU-contributor flags, price modifier settings, and the list of selectable values for that product.
            properties:
                catalogId:
                    description:
                        Not populated on reads and ignored on writes; the product option link has no direct catalog reference.
                    example: 30130
                    format: int64
                    type: integer
                customFields:
                    description:
                        Custom field values stored against the product option link through the expando bridge; localized when the request accepts all languages.
                    items:
                        type: customField
                    type: array
                definedExternally:
                    description:
                        Whether the option and its values are sourced from an external system rather than the catalog; when true the price type must be dynamic; writable through patch but currently not echoed back on reads.
                    example: true
                    type: boolean
                description:
                    additionalProperties:
                        type: string
                    description:
                        Per-product localized description that overrides the global option description on this product only; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Description
                        hr_HR: Description HR
                        hu_HU: Description HU
                    type: object
                facetable:
                    description:
                        Per-product override of whether this option is exposed as a search facet for the parent product; defaults to the global option flag on first attach.
                    example: true
                    type: boolean
                fieldType:
                    description:
                        Per-product input widget for this option; validated against the configured allow list and, when `skuContributor` is true, restricted to select, select_date, and radio; required.
                    example: checkbox, checkbox_multiple, date, numeric, radio, select
                    type: string
                id:
                    description:
                        Primary key; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                infoItemServiceKey:
                    description:
                        Service key identifying an external info-item provider that supplies option data from outside the catalog; used together with `definedExternally`; writable but currently not echoed back on reads.
                    example: null
                    type: string
                key:
                    description:
                        Machine identifier on the product link; copied from the linked global option's key when the link is created and must be unique within the product; required.
                    example: color
                    type: string
                name:
                    additionalProperties:
                        type: string
                    description:
                        Per-product localized label that overrides the global option name on this product only; map keys are locale codes and values are the translated strings; required.
                    example:
                        en_US: Color
                        hr_HR: Color HR
                        hu_HU: Color HU
                    type: object
                optionExternalReferenceCode:
                    description:
                        External reference code of the linked global option; used as an alternative to `optionId` when wiring a product to an existing option.
                    example: AB-34098-789-N
                    type: string
                optionId:
                    description:
                        Reference to the global option template this product link is based on; required.
                    example: 30080
                    format: int64
                    minimum: 0
                    type: integer
                priceType:
                    description:
                        How a selected value affects the product price; one of static (delta added to the base price) or dynamic (delta computed by an external pricing engine); when `definedExternally` is true the value is forced to dynamic.
                    example: dynamic, static
                    type: string
                priority:
                    description:
                        Display order used when listing options inside the product; lower values appear first.
                    example: 1.2
                    format: double
                    type: number
                productOptionValues:
                    description:
                        Per-product values for this option; returned only when the request asks for them, otherwise null.
                    items:
                        $ref: "#/components/schemas/ProductOptionValue"
                    type: array
                required:
                    description:
                        Whether the shopper must select a value for this option before the product can be added to the cart.
                    example: true
                    type: boolean
                skuContributor:
                    description:
                        Whether selecting a value on this option produces a distinct SKU for the parent product; enabling it restricts `fieldType` to select, select_date, or radio.
                    example: true
                    type: boolean
                typeSettings:
                    description:
                        Opaque, type-specific configuration string persisted on the product option link; format is determined by the field type implementation.
                    example: "22.50"
                    type: string
            required:
                -   fieldType
                -   key
                -   name
                -   optionId
            type: object
        ProductOptionValue:
            description:
                A value for a product option, carrying the per-product price modifier, the optional link to a specific SKU, the quantity adjustment, and the unit of measure used when the value is added to an order.
            properties:
                deltaPrice:
                    description:
                        Price modifier applied when this value is selected; used only when the parent product option's `priceType` is static.
                    example: 10
                    format: bigdecimal
                    minimum: 0
                    type: number
                id:
                    description:
                        Primary key; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                key:
                    description:
                        Machine identifier for this product option value; normalized to a friendly URL form and must be unique within the parent product option; required.
                    example: black
                    type: string
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized display label shown to administrators and shoppers; map keys are locale codes and values are the translated strings; required.
                    example:
                        en_US: Black
                        hr_HR: Black HR
                        hu_HU: Black HU
                    type: object
                preselected:
                    description:
                        Whether this value is preselected by default on the storefront when the parent product is displayed.
                    example: true
                    type: boolean
                priority:
                    description:
                        Display order used when listing values inside the parent product option; lower values appear first.
                    example: 1.2
                    format: double
                    type: number
                quantity:
                    description:
                        Quantity adjustment applied to the order item when this value is selected; defaults to 1.
                    example: 10
                    format: bigdecimal
                    minimum: 0
                    type: number
                skuExternalReferenceCode:
                    description:
                        External reference code of the linked SKU; used as an alternative to `skuId` when binding the value to a specific SKU.
                    example: SKU0111
                    type: string
                skuId:
                    description:
                        Reference to the specific product instance produced when this value is selected on a SKU-contributing option.
                    example: 30129
                    format: int64
                    minimum: 0
                    type: integer
                unitOfMeasureKey:
                    description:
                        Unit of measure applied to the order item when this value is selected; read-only.
                    example: pl
                    readOnly: true
                    type: string
            required:
                -   key
                -   name
            type: object
        ProductShippingConfiguration:
            description:
                Physical shipping attributes (dimensions, weight, shippable flags, extra shipping cost) used by shipping engines to compute rates and labels; sourced from the product itself at the product level and from the configuration entry when embedded inside a product configuration.
            properties:
                depth:
                    description:
                        Depth of the packaged product expressed in the catalog's measurement unit.
                    example: 202
                    format: bigdecimal
                    minimum: 0
                    type: number
                freeShipping:
                    description:
                        Whether the product is exempt from shipping charges regardless of shipping method; defaults to true on create when omitted.
                    example: true
                    type: boolean
                height:
                    description:
                        Height of the packaged product expressed in the catalog's measurement unit.
                    example: 202
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippable:
                    description:
                        Whether the product participates in shipping at all; when false, shipping engines skip it and dimensions and weight are ignored; defaults to true on create when omitted.
                    example: true
                    type: boolean
                shippingExtraPrice:
                    description:
                        Additional fixed surcharge added on top of the shipping method's calculated rate, expressed in the channel's currency.
                    example: 202
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingSeparately:
                    description:
                        Whether the product must ship in its own package rather than be combined with the rest of the cart; defaults to true on create when omitted.
                    example: true
                    type: boolean
                weight:
                    description:
                        Weight of the packaged product expressed in the catalog's measurement unit.
                    example: 202
                    format: bigdecimal
                    minimum: 0
                    type: number
                width:
                    description:
                        Width of the packaged product expressed in the catalog's measurement unit.
                    example: 202
                    format: bigdecimal
                    minimum: 0
                    type: number
            type: object
        ProductSpecification:
            description:
                A specification attribute value assigned to a specific product; it binds a specification template to a product and carries the localized value, an optional override of the category, a per-product priority, and a visibility flag.
            properties:
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per product specification within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary key; assigned by the service on create.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                key:
                    description:
                        Machine identifier on the product specification row; the service generates it from the primary key on create.
                    example: material
                    type: string
                label:
                    additionalProperties:
                        type: string
                    description:
                        Localized label of the underlying specification, returned as a convenience; map keys are locale codes and values are the translated strings; read-only on this resource.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
                optionCategoryExternalReferenceCode:
                    description:
                        External reference code of the linked option category; used as an alternative to `optionCategoryId` when overriding the specification's default category for this product.
                    example: AB-34098-789-N
                    type: string
                optionCategoryId:
                    description:
                        Reference to an option category that overrides, for this product, the category inherited from the underlying specification.
                    example: 30129
                    format: int64
                    minimum: 0
                    type: integer
                priority:
                    description:
                        Display order of this specification within the product; lower values appear first.
                    example: 1.2
                    format: double
                    minimum: 0
                    type: number
                productId:
                    description:
                        Reference to the product that owns this specification value.
                    example: 30129
                    format: int64
                    minimum: 0
                    type: integer
                specificationExternalReferenceCode:
                    description:
                        External reference code of the underlying specification; used as an alternative to `specificationId` on writes.
                    example: AB-34098-789-N
                    type: string
                specificationId:
                    description:
                        Reference to the specification template this value is for.
                    example: 30129
                    format: int64
                    minimum: 0
                    type: integer
                specificationKey:
                    description:
                        Machine key of the underlying specification; returned as a convenience.
                    example: specification-key
                    type: string
                specificationPriority:
                    description:
                        Display order configured on the underlying specification template; returned as a convenience and not editable on this resource.
                    example: 1.1
                    format: double
                    type: number
                value:
                    additionalProperties:
                        type: string
                    description:
                        Localized value for this specification on this product; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Steel
                        hr_HR: Celik
                        hu_HU: Acel
                    type: object
                visible:
                    description:
                        Whether the specification value is shown to shoppers on the storefront; values where `visible` is false are filtered out of public product detail views.
                    example: true
                    type: boolean
            required:
                -   value
            type: object
        ProductSubscriptionConfiguration:
            description:
                Recurring billing and recurring delivery settings for a product; subscription fields control how the product is rebilled and delivery-subscription fields control an independent delivery schedule; cadence values use the keys `daily`, `weekly`, `monthly`, and `yearly`.
            properties:
                deliverySubscriptionEnable:
                    description:
                        Whether recurring delivery is enabled independently of billing.
                    example: true
                    type: boolean
                deliverySubscriptionLength:
                    description:
                        Number of `deliverySubscriptionType` units between deliveries; for example, 2 with a `monthly` delivery type means delivering every two months.
                    example: 2
                    format: int32
                    type: integer
                deliverySubscriptionNumberOfLength:
                    description:
                        Maximum number of recurring deliveries before the delivery cycle ends; 0 means unlimited.
                    example: 12
                    format: int64
                    type: integer
                deliverySubscriptionType:
                    description:
                        Delivery interval unit; allowed values are `daily`, `weekly`, `monthly`, and `yearly`.
                    enum:
                        -   daily
                        -   monthly
                        -   weekly
                        -   yearly
                    example: monthly
                    type: string
                deliverySubscriptionTypeSettings:
                    additionalProperties:
                        type: string
                    description:
                        Cadence-specific configuration map; when the delivery type is `monthly`, recognized keys are `deliveryMonthDay` (1 to 31) and `deliveryMonthlyMode` (`exact-day-of-month` or `nth-weekday`).
                    example:
                        deliveryMonthDay: "1"
                        deliveryMonthlyMode: "0"
                    type: object
                enable:
                    description:
                        Whether subscription purchases (recurring billing) are enabled for the product.
                    example: true
                    type: boolean
                length:
                    description:
                        Number of `subscriptionType` units between billing cycles; for example, 2 with a `monthly` subscription type rebills every two months.
                    example: 2
                    format: int32
                    type: integer
                numberOfLength:
                    description:
                        Maximum number of billing cycles before the subscription ends; 0 means unlimited.
                    example: 12
                    format: int64
                    type: integer
                subscriptionType:
                    description:
                        Billing interval unit; allowed values are `daily`, `weekly`, `monthly`, and `yearly`.
                    enum:
                        -   daily
                        -   monthly
                        -   weekly
                        -   yearly
                    example: monthly
                    type: string
                subscriptionTypeSettings:
                    additionalProperties:
                        type: string
                    description:
                        Cadence-specific configuration map; when the subscription type is `monthly`, recognized keys are `monthDay` (1 to 31) and `monthlyMode` (`exact-day-of-month` or `nth-weekday`).
                    example:
                        monthDay: "1"
                        monthlyMode: "0"
                    type: object
            type: object
        ProductTaxConfiguration:
            description:
                Tax classification for a product; pairs the tax category used by tax engines with a taxable flag; sourced from the product itself at the product level and from the configuration entry when embedded inside a product configuration.
            properties:
                id:
                    description:
                        Identifier of the tax category assigned to the product; 0 means no tax category is assigned.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                taxCategory:
                    description:
                        Localized name of the tax category for the request locale; read-only.
                    example: taxCategoryName
                    type: string
                taxable:
                    description:
                        Whether the product is subject to tax; defaults to true on create when omitted.
                    example: true
                    type: boolean
            type: object
        ProductVirtualSettings:
            description:
                Digital download configuration for a virtual product; controls the download URL, sample file, terms of use, activation gating, and usage and duration limits; returned as null when the product is not virtual or has no virtual settings.
            properties:
                activationStatus:
                    description:
                        Order status at which the download becomes available to the buyer; numeric code where 0 means Completed (default), 1 means Pending, and 10 means Processing.
                    example: 0
                    format: int32
                    minimum: 0
                    type: integer
                activationStatusInfo:
                    $ref: "#/components/schemas/Status"
                    description:
                        Resolved human-readable label and localized label for the activation status value; read-only.
                    readOnly: true
                attachment:
                    description:
                        Base64-encoded payload of the primary downloadable file accepted on write; the service decodes it and stores it as a Document Library file referenced by the virtual setting; write-only.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                duration:
                    description:
                        Number of days after activation during which the buyer may download.
                    example: 30
                    format: int64
                    type: integer
                id:
                    description:
                        Identifier of the virtual settings record.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                maxUsages:
                    description:
                        Maximum number of times the buyer may download the file; 0 typically means unlimited.
                    example: 0
                    type: integer
                productVirtualSettingsFileEntries:
                    description:
                        Collection of downloadable file entries attached to these virtual settings; each entry models one downloadable file or external URL.
                    items:
                        $ref: "#/components/schemas/ProductVirtualSettingsFileEntry"
                    type: array
                sampleAttachment:
                    description:
                        Base64-encoded payload of a public sample file accepted on write; the service decodes it and stores it as the sample file referenced by the virtual settings; write-only.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                sampleSrc:
                    description:
                        Resolved download URL for the sample file; null when no sample file is set; read-only.
                    example: https://example.com/sample.pdf
                    readOnly: true
                    type: string
                sampleURL:
                    description:
                        External URL pointing at a sample of the product; alternative to `sampleAttachment`; validated for syntax when `useSample` is true.
                    example: https://example.com/sample.pdf
                    type: string
                src:
                    description:
                        Resolved download URL for the first attached file entry; null when no file is attached; read-only.
                    example: https://example.com/download.zip
                    readOnly: true
                    type: string
                termsOfUseContent:
                    additionalProperties:
                        type: string
                    description:
                        Localized terms of use shown to the buyer before download; map keys are locale codes and values are the translated strings; mutually exclusive with `termsOfUseJournalArticleId` (supplying an article identifier clears this map).
                    example:
                        en_US: By downloading you accept the license terms.
                        hr_HR: Preuzimanjem prihvacate uvjete licence.
                        hu_HU: A letoltessel elfogadja a licencfelteteleket.
                    type: object
                termsOfUseJournalArticleId:
                    description:
                        Identifier of the web content article whose body serves as the terms of use; mutually exclusive with `termsOfUseContent`.
                    example: 30130
                    format: int64
                    type: integer
                termsOfUseRequired:
                    description:
                        Whether the buyer must accept terms of use before downloading; when true, either a terms-of-use article or a non-empty terms-of-use content map must be supplied.
                    example: true
                    type: boolean
                url:
                    description:
                        External URL where the file is hosted as an alternative to `attachment`; persisted on the first downloadable file entry.
                    example: https://example.com/download.zip
                    type: string
                useSample:
                    description:
                        Whether the storefront exposes a sample to anonymous visitors; when true, either a sample file or a syntactically valid sample URL is required.
                    example: true
                    type: boolean
            type: object
        ProductVirtualSettingsFileEntry:
            description:
                Single downloadable artifact attached to a product's virtual settings; links one Document Library file (or an external URL) and a version label to the virtual settings record.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of available operations for the current user keyed by action name; each entry carries the URL template and HTTP method; read-only.
                    readOnly: true
                    type: object
                attachment:
                    description:
                        Base64-encoded payload of the file accepted on write; the service decodes it and stores it as a Document Library file; write-only.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                id:
                    description:
                        Identifier of the downloadable file entry; read-only.
                    example: 30324
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                src:
                    description:
                        Resolved download URL for the backing file; null when no file is attached; read-only.
                    example: https://example.com/download.zip
                    readOnly: true
                    type: string
                url:
                    description:
                        External URL where the file is hosted as an alternative to `attachment`; returned as-is.
                    example: https://example.com/download.zip
                    type: string
                version:
                    description:
                        Free-form version label for this file, for example `1.0` or `v2024-03`.
                    example: 1.0
                    type: string
            type: object
        RelatedProduct:
            description:
                Explicit product-to-product relationship identified by a type token; admin catalog write view scoped under a source product.
            properties:
                id:
                    description:
                        Primary key of the relationship row; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                priority:
                    description:
                        Sort order of the relationship within its source product; lower values appear first; defaults to 0.0 when omitted on create.
                    example: 1.2
                    format: double
                    type: number
                productExternalReferenceCode:
                    description:
                        External reference code of the target product; used on create when `productId` is not supplied to look up the target within the company.
                    example: AB-34098-789-N
                    type: string
                productId:
                    description:
                        Identifier of the target product; required on create together with `type`.
                    example: 30129
                    format: int64
                    minimum: 0
                    type: integer
                type:
                    description:
                        Link type token; required on create; also accepted as a query parameter to filter the related-products listing.
                    example: cross-sell
                    type: string
            required:
                -   productId
                -   type
            type: object
        Sku:
            description:
                A purchasable stock keeping unit (variant) of a product, with its own SKU code, pricing, dimensions, subscription configuration, and optional virtual download settings.
            properties:
                cost:
                    description:
                        Cost paid to acquire the SKU, before margin; expressed in the parent product catalog's default currency and rejected when negative.
                    example: 101
                    format: bigdecimal
                    minimum: 0
                    type: number
                customFields:
                    description:
                        Custom expando fields defined for SKUs; read using the request locale and written back as expando attributes alongside the SKU.
                    items:
                        type: customField
                    type: array
                depth:
                    description:
                        Depth dimension of the SKU; rejected when negative; expressed in the dimensions unit configured on the parent catalog or commerce shop settings.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                discontinued:
                    description:
                        Whether the SKU is marked as discontinued; when true the service resolves the replacement SKU from `replacementSkuId` or `replacementSkuExternalReferenceCode` and records the link to it.
                    example: false
                    type: boolean
                discontinuedDate:
                    description:
                        Date on which the SKU was marked discontinued; accepted in the request locale and time zone and normalized to the portal's time zone.
                    example: 2017-07-21
                    format: date
                    type: string
                displayDate:
                    description:
                        Date and time from which the SKU becomes visible; accepted in the request locale and time zone, normalized to the portal's time zone, and indexed for sorting.
                    example: 2017-07-21
                    format: date
                    type: string
                expirationDate:
                    description:
                        Date and time after which the SKU is considered expired; accepted in the request locale and time zone and ignored when `neverExpire` is true.
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per SKU within the company and limited to 75 characters; indexed for exact-match search.
                    example: AB-34098-789-N
                    type: string
                gtin:
                    description:
                        Global Trade Item Number (UPC, EAN, JAN, or ISBN) assigned to the SKU; limited to 75 characters and indexed for exact-match search.
                    example: "12341234"
                    type: string
                height:
                    description:
                        Height dimension of the SKU; rejected when negative; expressed in the dimensions unit configured on the parent catalog or commerce shop settings.
                    example: 20.2
                    format: double
                    minimum: 0
                    type: number
                id:
                    description:
                        Internal numeric identifier of the SKU; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                inventoryLevel:
                    description:
                        Reserved field for the current stock quantity of the SKU; not populated by this API. Use the headless commerce admin inventory API to read actual inventory.
                    example: 29
                    readOnly: true
                    type: integer
                manufacturerPartNumber:
                    description:
                        Manufacturer part number (MPN) assigned by the manufacturer; limited to 75 characters.
                    example: "12341234"
                    type: string
                neverExpire:
                    description:
                        When true the SKU has no expiration date and `expirationDate` is ignored on update; defaults to true when `expirationDate` is not supplied on create.
                    example: true
                    type: boolean
                price:
                    description:
                        Regular selling price of the SKU before any promotion; expressed in the parent catalog's default currency, rejected when negative, and synchronized to a base price-list entry for the SKU.
                    example: 101
                    format: bigdecimal
                    minimum: 0
                    type: number
                productId:
                    description:
                        Internal numeric identifier of the parent product; read-only.
                    example: 30129
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                productName:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings. Mirrors the parent product's name and is read-only.
                    example:
                        en_US: Hand Saw
                        hr_HR: Pila
                        hu_HU: Kezi fureszrol
                    readOnly: true
                    type: object
                promoPrice:
                    description:
                        Promotional selling price applied in place of `price` when a promotion is active; expressed in the parent catalog's default currency, rejected when negative, and synchronized to a promotion price-list entry for the SKU.
                    example: 202
                    format: bigdecimal
                    minimum: 0
                    type: number
                published:
                    description:
                        Whether the SKU is publicly published; indexed for filtering and defaults to true on create.
                    example: true
                    type: boolean
                purchasable:
                    description:
                        Whether the SKU can be added to an order; indexed for filtering and defaults to true on create.
                    example: true
                    type: boolean
                replacementSkuExternalReferenceCode:
                    description:
                        External reference code of the replacement SKU that customers are redirected to when this SKU is discontinued; on read the value mirrors the replacement's external reference code, and on write it is honored only when `discontinued` is true.
                    example: SKU0111
                    type: string
                replacementSkuId:
                    description:
                        Internal numeric identifier of the replacement SKU used when `discontinued` is true; honored only when `replacementSkuExternalReferenceCode` does not resolve. Pointing a SKU to itself is rejected.
                    example: 33135
                    format: int64
                    minimum: 0
                    type: integer
                sku:
                    description:
                        Stable SKU code that uniquely identifies the variant within its parent product; required on create, limited to 75 characters, indexed as text and sortable, and rejected when another SKU within the same product already uses it.
                    example: "12341234"
                    type: string
                skuOptions:
                    description:
                        Option selections that define which product option values this variant represents; each entry references a product option and one of its option values, either by numeric identifier or by stable string key.
                    items:
                        $ref: "#/components/schemas/SkuOption"
                    type: array
                skuSubscriptionConfiguration:
                    $ref: "#/components/schemas/SkuSubscriptionConfiguration"
                skuUnitOfMeasures:
                    description:
                        Alternative units in which the SKU is sold (per kg, per box, per pallet, and similar) with their conversion rates and per-unit pricing.
                    items:
                        $ref: "#/components/schemas/SkuUnitOfMeasure"
                    type: array
                skuVirtualSettings:
                    $ref: "#/components/schemas/SkuVirtualSettings"
                unitOfMeasureKey:
                    description:
                        Stable key of the unit of measure carried in the current row; only populated when the SKU was expanded through the unit-of-measure SKUs endpoint for a specific unit of measure.
                    example: pl
                    readOnly: true
                    type: string
                unitOfMeasureName:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings. Mirrors the unit-of-measure name and is only populated when the SKU was expanded for a specific unit of measure.
                    example:
                        en_US: Pallet
                        hr_HR: Pallet HR
                        hu_HU: Pallet HU
                    readOnly: true
                    type: object
                unitOfMeasureSkuId:
                    description:
                        Composite identifier in the form <skuId>-<unitOfMeasureId> returned by the unit-of-measure SKUs endpoint; falls back to the SKU's numeric identifier as a string when no unit of measure is in context.
                    example: 30130-piece
                    readOnly: true
                    type: string
                unspsc:
                    description:
                        United Nations Standard Products and Services Code categorizing the SKU for procurement; limited to 75 characters and indexed for exact-match search.
                    example: "1234567890"
                    type: string
                weight:
                    description:
                        Weight of the SKU; rejected when negative; expressed in the weight unit configured on the parent catalog or commerce shop settings.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                width:
                    description:
                        Width dimension of the SKU; rejected when negative; expressed in the dimensions unit configured on the parent catalog or commerce shop settings.
                    example: 20.2
                    format: double
                    minimum: 0
                    type: number
            required:
                -   sku
            type: object
        SkuOption:
            description:
                Selection of a single product option value for a SKU variant; links the SKU to one product option and one of that option's values.
            properties:
                key:
                    description:
                        Stable string key of the product option; on read the value is the option's key, while on write the value may also be the option's numeric identifier encoded as a string, which the service resolves back to the key.
                    example: color
                    type: string
                optionId:
                    description:
                        Internal numeric identifier of the product option this selection answers.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                optionValueId:
                    description:
                        Internal numeric identifier of the chosen value within the product option referenced by `optionId`.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                value:
                    description:
                        Stable string key of the option value chosen for this option; on read the value is the option value's key.
                    example: red
                    type: string
            type: object
        SkuSubscriptionConfiguration:
            description:
                Per-SKU subscription billing configuration; takes effect only when `overrideSubscriptionInfo` is true, otherwise the parent product's subscription configuration is used.
            properties:
                deliverySubscriptionEnable:
                    description:
                        Whether recurring deliveries are enabled for this SKU.
                    example: true
                    type: boolean
                deliverySubscriptionLength:
                    description:
                        Number of delivery interval units between deliveries; must be greater than zero.
                    example: 2
                    format: int32
                    type: integer
                deliverySubscriptionNumberOfLength:
                    description:
                        Maximum number of delivery cycles before the recurring delivery ends; zero means no maximum.
                    example: 12
                    format: int64
                    type: integer
                deliverySubscriptionType:
                    description:
                        Delivery interval unit; one of daily, weekly, monthly, or yearly.
                    enum:
                        -   daily
                        -   monthly
                        -   weekly
                        -   yearly
                    example: monthly
                    type: string
                deliverySubscriptionTypeSettings:
                    additionalProperties:
                        type: string
                    description:
                        Free-form key-value settings consumed by the selected delivery interval unit.
                    example:
                        deliveryMonthDay: "1"
                        deliveryMonthlyMode: "0"
                    type: object
                enable:
                    description:
                        Whether recurring billing is enabled for this SKU.
                    example: true
                    type: boolean
                length:
                    description:
                        Number of subscription interval units between billings; must be greater than zero and defaults to 1.
                    example: 2
                    format: int32
                    type: integer
                numberOfLength:
                    description:
                        Maximum number of billing cycles before the subscription ends; zero means no maximum.
                    example: 12
                    format: int64
                    type: integer
                overrideSubscriptionInfo:
                    description:
                        When true the service uses the per-SKU subscription fields on this object instead of the parent product's subscription settings.
                    example: true
                    type: boolean
                subscriptionType:
                    description:
                        Subscription interval unit; one of daily, weekly, monthly, or yearly.
                    enum:
                        -   daily
                        -   monthly
                        -   weekly
                        -   yearly
                    example: monthly
                    type: string
                subscriptionTypeSettings:
                    additionalProperties:
                        type: string
                    description:
                        Free-form key-value settings consumed by the selected subscription interval unit.
                    example:
                        monthDay: "1"
                        monthlyMode: "0"
                    type: object
            type: object
        SkuUnitOfMeasure:
            description:
                Alternative unit in which the parent SKU can be sold, with its own conversion rate to the base unit, pricing, and ordering rules.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                active:
                    description:
                        Whether this unit of measure is selectable for ordering.
                    example: true
                    type: boolean
                basePrice:
                    description:
                        Price per `pricingQuantity` for this unit of measure, taken from the base price list entry keyed by the SKU and this unit-of-measure key; rounded to the currency precision and read-only.
                    example: 10.0
                    format: bigdecimal
                    minimum: 0
                    type: number
                id:
                    description:
                        Internal numeric identifier of the unit-of-measure entry; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                incrementalOrderQuantity:
                    description:
                        Minimum increment in which orders are accepted for this unit of measure; required, must be greater than zero, and its decimal scale must not exceed `precision`. The service normalizes the value to the configured precision.
                    example: 1.5
                    format: bigdecimal
                    minimum: 0
                    type: number
                key:
                    description:
                        Stable string key identifying the unit of measure within the parent SKU; required and must be unique among the SKU's units of measure.
                    example: pl
                    type: string
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings. Required.
                    example:
                        en_US: Pallet
                        hr_HR: Pallet HR
                        hu_HU: Pallet HU
                    type: object
                precision:
                    description:
                        Number of decimal places allowed for quantities expressed in this unit of measure; required and used to scale `incrementalOrderQuantity`, `pricingQuantity`, and `rate` with half-up rounding.
                    example: 3
                    type: integer
                pricingQuantity:
                    description:
                        Quantity in this unit of measure for which `basePrice` and `promoPrice` apply; scaled to `precision` with half-up rounding.
                    example: 1.5
                    format: bigdecimal
                    minimum: 0
                    type: number
                primary:
                    description:
                        Whether this is the default unit of measure for the SKU; on update the service automatically clears the primary flag on the SKU's other units of measure.
                    example: true
                    type: boolean
                priority:
                    description:
                        Display order among the SKU's units of measure; lower values surface first.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                promoPrice:
                    description:
                        Promotional price per `pricingQuantity` for this unit of measure, taken from the promotion price list entry keyed by the SKU and this unit-of-measure key; rounded to the currency precision and read-only.
                    example: 10.0
                    format: bigdecimal
                    minimum: 0
                    type: number
                rate:
                    description:
                        Conversion factor from this unit to the SKU's base unit; required, must be greater than zero, and scaled to `precision` with half-up rounding.
                    example: 1.5
                    format: bigdecimal
                    minimum: 0
                    type: number
                sku:
                    description:
                        SKU code of the parent variant; mirrored on the unit-of-measure entry for indexing and lookups. Read-only.
                    example: SKU-0001
                    readOnly: true
                    type: string
                skuId:
                    description:
                        Internal numeric identifier of the parent SKU; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
            type: object
        SkuVirtualSettings:
            description:
                Per-SKU override for digital-download settings of a virtual product; only meaningful when the parent product type is virtual.
            properties:
                activationStatus:
                    description:
                        Order status at which the virtual asset becomes downloadable. Common values are 0 (Completed, the default), 17 (Pending), and 10 (Processing).
                    example: 0
                    format: int32
                    minimum: 0
                    type: integer
                activationStatusInfo:
                    $ref: "#/components/schemas/Status"
                    description:
                        Localized label for `activationStatus`; read-only.
                    readOnly: true
                attachment:
                    description:
                        Base64-encoded file uploaded as the main virtual download asset on create or update; write-only and not returned on read. The resolved download URL is exposed through `src`.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                duration:
                    description:
                        Number of days during which a customer can download the virtual asset after activation.
                    example: 30
                    format: int64
                    type: integer
                id:
                    description:
                        Internal numeric identifier of the virtual settings entry.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                maxUsages:
                    description:
                        Maximum number of times a customer can download the virtual asset; zero means unlimited.
                    example: 0
                    type: integer
                override:
                    description:
                        When true the service uses these per-SKU virtual settings instead of the parent product's virtual settings.
                    example: true
                    type: boolean
                sampleAttachment:
                    description:
                        Base64-encoded sample file uploaded on create or update so customers can preview the virtual product before purchase; write-only and not returned on read. The resolved sample download URL is exposed through `sampleSrc`.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                sampleSrc:
                    description:
                        Resolved internal sample download URL for the uploaded sample file; null when no sample file is attached. Read-only.
                    example: https://example.com/sample.pdf
                    readOnly: true
                    type: string
                sampleURL:
                    description:
                        External URL pointing at a sample of the virtual product, used when the sample is hosted outside the portal; when `useSample` is true and no sample file is provided the URL must be a syntactically valid URL.
                    example: https://example.com/sample.pdf
                    type: string
                skuVirtualSettingsFileEntries:
                    description:
                        Additional file attachments associated with this SKU's virtual settings.
                    items:
                        $ref: "#/components/schemas/SkuVirtualSettingsFileEntry"
                    type: array
                src:
                    description:
                        Resolved internal download URL for the first attached file entry; null when no file is attached. Read-only.
                    example: https://example.com/download.zip
                    readOnly: true
                    type: string
                termsOfUseContent:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings. Used as inline terms of use content when `termsOfUseRequired` is true and no `termsOfUseJournalArticleId` is supplied; at least one non-null entry is required.
                    example:
                        en_US: By downloading you accept the license terms.
                        hr_HR: Preuzimanjem prihvacate uvjete licence.
                        hu_HU: A letoltessel elfogadja a licencfelteteleket.
                    type: object
                termsOfUseJournalArticleId:
                    description:
                        Internal identifier of a web content article that supplies the terms of use a customer must accept before download; when set and `termsOfUseRequired` is true the inline `termsOfUseContent` is cleared. The article must exist.
                    example: 30130
                    format: int64
                    type: integer
                termsOfUseRequired:
                    description:
                        Whether the customer must accept terms of use before downloading; when true the service requires either `termsOfUseJournalArticleId` or non-empty `termsOfUseContent`.
                    example: true
                    type: boolean
                url:
                    description:
                        External URL pointing at the virtual asset when the file is hosted outside the portal; on read the value is the URL of the first attached file entry when present.
                    example: https://example.com/download.zip
                    type: string
                useSample:
                    description:
                        Whether a sample preview is offered to customers before purchase; when true the service requires either a `sampleAttachment` or a syntactically valid `sampleURL`.
                    example: true
                    type: boolean
            type: object
        SkuVirtualSettingsFileEntry:
            description:
                Individual file or external URL attached to a SKU's virtual settings as a downloadable asset.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                attachment:
                    description:
                        Base64-encoded file uploaded as the asset for this entry on create or update; write-only and not returned on read. The resolved download URL is exposed through `src`.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                id:
                    description:
                        Internal numeric identifier of the file entry; read-only and assigned by the service on create.
                    example: 30324
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                src:
                    description:
                        Resolved internal download URL for the attached file entry; null when no file is attached. Read-only.
                    example: https://example.com/download.zip
                    readOnly: true
                    type: string
                url:
                    description:
                        External URL pointing at the asset when it is hosted outside the portal; null when no URL is set.
                    example: https://example.com/download.zip
                    type: string
                version:
                    description:
                        Optional version label for the asset; null when not set.
                    example: 1.0
                    type: string
            type: object
        Specification:
            description:
                A reusable, company-scoped specification attribute template; specifications group products by attribute, are optionally bound to one or more list type definitions that constrain their values, and can be displayed on the storefront and used as search facets.
            properties:
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized administrative description shown in the admin UI; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Material composition
                        hr_HR: Sastav materijala
                        hu_HU: Anyagosszetetel
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per specification within the company.
                    example: AB-34098-789-N
                    type: string
                facetable:
                    description:
                        Whether the specification is exposed as a search facet in product catalog searches; indexed and filterable through the visible field on the search results.
                    example: true
                    type: boolean
                id:
                    description:
                        Primary key; read-only and assigned by the service on create.
                    example: 31130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                key:
                    description:
                        Machine identifier used for lookups and integrations; normalized to a friendly URL form (underscores converted to dashes) and must be unique per company; required.
                    example: specification-key
                    type: string
                listTypeDefinitionId:
                    deprecated: true
                    description:
                        Deprecated; returns the first ID from `listTypeDefinitionIds` in iteration order, which is not stable; preserved only for backward compatibility with older clients; use `listTypeDefinitionIds` instead.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                listTypeDefinitionIds:
                    description:
                        References to the list type definitions that constrain the allowed values of this specification.
                    example:
                        -   30130
                        -   30131
                    items:
                        format: int64
                        type: integer
                    type: array
                optionCategory:
                    $ref: "#/components/schemas/OptionCategory"
                priority:
                    description:
                        Display order used when listing specifications in the admin UI; lower values appear first.
                    example: 1.2
                    format: double
                    type: number
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized display label shown to administrators and (when visible) to shoppers; map keys are locale codes and values are the translated strings; required -- the title map must hold a non-null value for the site default locale.
                    example:
                        en_US: Material
                        hr_HR: Materijal
                        hu_HU: Anyag
                    type: object
                visible:
                    description:
                        Whether the specification is shown to shoppers on the storefront and exposed through search facets.
                    example: true
                    type: boolean
            required:
                -   key
                -   title
            type: object
        Status:
            description:
                Workflow status envelope attached to entities that participate in Liferay's workflow framework; read-only across the admin catalog API.
            properties:
                code:
                    description:
                        Integer status -- 0=Approved, 1=Draft, 2=Expired, 3=Inactive, 4=Incomplete, 5=Pending, 6=Scheduled, 7=Denied, 8=In Trash; read-only.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
                label:
                    description:
                        Untranslated status key emitted by the workflow framework; read-only.
                    example: black
                    type: string
                label_i18n:
                    description:
                        Localized status label resolved against the request's preferred locale; read-only.
                    example: black
                    type: string
            type: object
info:
    description:
        "Administrative REST API for the Liferay Commerce catalog. It manages every entity that defines what is for sale -- catalogs, currencies, categories, products, SKUs, options and option values, specifications, attachments, diagrams, pins, and the configuration that ties them to channels, accounts, and order types. The API targets back-office administrators and integration tooling; storefront browsing belongs to the headless-commerce-delivery-catalog module instead. Most resources are addressable both by internal ID (`/<id>`) and by external reference code (`/by-externalReferenceCode/<externalReferenceCode>`); POST against the external-reference-code path is upsert. PATCH applies JSON Merge Patch (only the supplied fields are modified), while PUT replaces the resource. For the storefront, customer-facing counterpart see `headless-commerce-delivery-catalog`; for pricing, account, channel, order, and inventory data see the matching `headless-commerce-admin-*` modules. -- Common workflows: Provision a catalog with its base currency -- (1) GET /currencies to confirm the desired CommerceCurrency is provisioned, otherwise POST /currencies (or POST /currencies/by-externalReferenceCode/<externalReferenceCode>) to add it; (2) POST /catalogs with name and commerceCurrencyCode to create the CommerceCatalog every product, SKU, and category will live under; (3) PATCH /catalog/<id> (JSON Merge Patch) to rename it or change the default currency. -- Author a configurable product end-to-end -- (1) POST /options to define a reusable Option master, then POST /options/<id>/optionValues to declare its allowed OptionValues; (2) POST /products with productType, catalogId, and base fields to create the CPDefinition (POST /products/by-externalReferenceCode/<externalReferenceCode> is upsert); (3) POST /products/<id>/productOptions to attach the option to the product, then POST /productOptions/<id>/productOptionValues to whitelist the values that apply; (4) POST /products/<id>/skus per option-value combination to create the purchasable Sku variants; (5) POST /products/<id>/images and /products/<id>/attachments (also the by-base64 and by-url variants) to upload product media. -- Configure shop-by-diagram navigation -- (1) POST /products/<id>/diagrams to upload the diagram image to the parent product; (2) POST /products/<id>/pins per hotspot to anchor coordinates on the diagram; (3) POST /products/<id>/mapped-products to bind each pin to a child product or SKU so the storefront can route from the hotspot to the purchasable variant. -- Publish a product to channels and account groups -- (1) POST /products/<id>/product-channels to expose the product on each CommerceChannel; (2) POST /products/<id>/product-account-groups to restrict visibility to specific AccountGroups; (3) POST /product-configuration-lists, POST /product-configuration-lists/<id>/product-configurations, and POST /product-configuration-lists/<id>/product-configuration-list-channels (and the matching -accounts, -account-groups, and -order-types endpoints) to define a reusable configuration bundle, then PATCH /products/<id>/configuration to attach the list. -- Define reusable product specifications and option categories -- (1) POST /optionCategories to group specifications and options under a category; (2) POST /specifications, optionally followed by POST /specifications/<id>/list-type-definitions to lock the allowed values to a ListTypeDefinition; (3) POST /products/<id>/productSpecifications to attach a specification value to a product. -- Manage SKU virtual delivery and unit-of-measure tiers -- (1) POST /skus/<id>/sku-virtual-settings followed by POST /sku-virtual-settings/<id>/sku-virtual-settings-file-entries to enable digital-good delivery for downloadable SKUs; (2) POST /skus/<id>/sku-unit-of-measures to define tiered units (for example, case or pallet) on top of the base unit, and GET /unit-of-measure-skus to enumerate SKUs by a unit-of-measure key. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.catalog.client', and version '4.0.78'."
