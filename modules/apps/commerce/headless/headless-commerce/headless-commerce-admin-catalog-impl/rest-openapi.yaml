        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Admin Catalog API
    version: v1.0
openapi: 3.0.0
paths:
    /attachment/by-externalReferenceCode/{externalReferenceCode}:
        delete:
            description:
                Deletes the attachment identified by its external reference code. Calls CPAttachmentFileEntryService.fetchCPAttachmentFileEntryByExternalReferenceCode + deleteCPAttachmentFileEntry. Validation -- NoSuchCPAttachmentFileEntryException -> 404 when ERC not found. Side effects -- Removes the underlying DL file entry association via the attachment delete cascade.
            operationId: deleteAttachmentByExternalReferenceCode
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this attachment.
            summary: Deletes an attachment by external reference code.
            tags:
                -   Attachment
        get:
            description:
                Fetches the attachment identified by its external reference code. Calls CPAttachmentFileEntryService.fetchCPAttachmentFileEntryByExternalReferenceCode. Validation -- NoSuchCPAttachmentFileEntryException -> 404 when ERC not found.
            operationId: getAttachmentByExternalReferenceCode
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Attachment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Attachment"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this attachment.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
