tags:
    -   description:
            File attachments associated with products (images, documents, virtual files). Upload via multipart, base64, or remote URL, and link to the product or SKU as a gallery image, virtual asset, or general attachment.
        name: Attachment
    -   description:
            Catalogs that group products under a company-scoped namespace. Each catalog has a default language and a primary currency that products inherit.
        name: Catalog
    -   description:
            Categories used to classify products and drive faceted navigation. Categories are bound to vocabularies in the asset framework.
        name: Category
    -   description:
            Currencies available in the commerce instance, identified by ISO 4217 code. Catalogs and prices reference currencies through their external reference code or ID.
        name: Currency
    -   description:
            Diagram resource for a product. A diagram captures the visual hotspots that map regions of a product image to SKUs and pin annotations.
        name: Diagram
    -   description:
            Grouped-product entries on a parent product. Each entry binds a child product (CPDefinition) to the parent with a priority and quantity. Backed by CPDefinitionGroupedEntry.
        name: GroupedProduct
    -   description:
            Reverse lookup -- the parent products that link to a given product as a grouped-product child or as a shop-by-diagram entry. Read-only; aggregates CPDefinitionGroupedEntry and CSDiagramEntry references back to the child product.
        name: LinkedProduct
    -   description:
            List type definitions used by specifications to constrain the allowed value set (a picklist).
        name: ListTypeDefinition
    -   description:
            Low-stock action mappings that decide what happens when a SKU's available inventory falls below its threshold (none, set inactive, set unpublished).
        name: LowStockAction
    -   description:
            Shop-by-diagram entries on a parent product. Each entry binds a hotspot sequence on the parent's diagram to one of three targets -- a child SKU (CPInstance), a nested sub-diagram, or an external SKU code -- with a quantity. Backed by CSDiagramEntry.
        name: MappedProduct
    -   description:
            Product-level options (configurable attributes such as color or size) and their values. These options drive SKU variant generation.
        name: Option
    -   description:
            Categories used to group options for editorial display in the admin UI.
        name: OptionCategory
    -   description:
            Discrete values that an Option can take (for example, the colors a "Color" option offers).
        name: OptionValue
    -   description:
            Pin annotations on a product diagram that map a hotspot to a SKU.
        name: Pin
    -   description:
            Products — the core catalog entity that aggregates SKUs, options, attachments, categories, specifications, and channel bindings.
        name: Product
    -   description:
            Account-group bindings that restrict product visibility to a specific set of account groups.
        name: ProductAccountGroup
    -   description:
            Channel bindings that decide which commerce channels expose a product.
        name: ProductChannel
    -   description:
            Product configuration entries that describe per-product overrides of a configuration list.
        name: ProductConfiguration
    -   description:
            Reusable product configuration lists that can be applied to many products, accounts, account groups, channels, and order types.
        name: ProductConfigurationList
    -   description:
            Account-scoped overrides on a product configuration list.
        name: ProductConfigurationListAccount
    -   description:
            Account-group-scoped overrides on a product configuration list.
        name: ProductConfigurationListAccountGroup
    -   description:
            Channel-scoped overrides on a product configuration list.
        name: ProductConfigurationListChannel
    -   description:
            Order-type-scoped overrides on a product configuration list.
        name: ProductConfigurationListOrderType
    -   description:
            Product groups that bundle products for marketing, pricing, or qualification rules.
        name: ProductGroup
    -   description:
            Membership records that bind a product to a product group.
        name: ProductGroupProduct
    -   description:
            Product-level options inherited from the catalog Option definitions and customized per product.
        name: ProductOption
    -   description:
            Product-level option values that constrain or extend the catalog OptionValue list per product.
        name: ProductOptionValue
    -   description:
            Shipping configuration for a product (shippable flag, free shipping, dimensions, weight, shipping extras).
        name: ProductShippingConfiguration
    -   description:
            Specification values bound to a product, drawn from the Specification list.
        name: ProductSpecification
    -   description:
            Subscription configuration for a product (enabled, length, type, cycles).
        name: ProductSubscriptionConfiguration
    -   description:
            Tax configuration for a product (tax category and tax-exempt flag).
        name: ProductTaxConfiguration
    -   description:
            Virtual settings (downloadable file, activation URL, sample, duration, max usages) bound to a product.
        name: ProductVirtualSettings
    -   description:
            File entries associated with a product's virtual settings.
        name: ProductVirtualSettingsFileEntry
    -   description:
            Related-product relations on a source product (for example, up-sell, cross-sell, related). Types are configured through CPDefinitionLinkTypeConfiguration. Backed by CPDefinitionLink.
        name: RelatedProduct
    -   description:
            SKUs (stock-keeping units) — the purchasable variants of a product. A SKU carries the price, the inventory tracking, the dimensions, and the unit-of-measure bindings.
        name: Sku
    -   description:
            Subscription configuration overrides at the SKU level.
        name: SkuSubscriptionConfiguration
    -   description:
            Unit-of-measure bindings for a SKU (key, name, incremental order quantity, precision, primary flag).
        name: SkuUnitOfMeasure
    -   description:
            Virtual settings (downloadable file, activation URL, sample, duration, max usages) bound to a SKU.
        name: SkuVirtualSettings
    -   description:
            File entries associated with a SKU's virtual settings.
        name: SkuVirtualSettingsFileEntry
    -   description:
            Catalog-wide specifications and their picklists.
        name: Specification