components:
    parameters:
        catalogExternalReferenceCodeQueryParam:
            in: query
            description:
                External reference code identifying the source catalog when cloning a product into another catalog.
            explode: false
            name: catalogExternalReferenceCode
            required: true
            schema:
                description:
                    The catalog external reference code, where to clone the product
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: form
        catalogIdQueryParam:
            in: query
            description:
                Catalog ID used to scope the result set to a single catalog.
            explode: true
            name: catalogId
            required: false
            schema:
                format: int64
                minimum: 0
                type: integer
            style: form
        diagramIdPathParam:
            in: path
            description:
                Identifier of the diagram setting attached to a product. Addresses a single CSDiagramSetting that owns the hotspot map for shop-by-diagram navigation.
            explode: false
            name: diagramId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target resource on the `by-externalReferenceCode` paths. The code is the integration-supplied idempotency key, unique within the resource scope; POST against this path is upsert (create when absent, replace when present).
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. Supported fields depend on the endpoint and are sourced from the matching entity model (typically createDate, externalReferenceCode, modifiedDate, productExternalReferenceCode, productId, and similar). Example -- filter=productId eq 12345.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        groupedProductIdPathParam:
            in: path
            description:
                Identifier of a grouped-product entry. Addresses a single CPDefinitionGroupedEntry that binds a child product to its parent with a priority and quantity.
            explode: false
            name: groupedProductId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        idPathParam:
            in: path
            description:
                Internal numeric identifier of the target resource. Counterpart to the `by-externalReferenceCode` path variant; identifiers are server-assigned and stable across the resource's lifetime.
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        listTypeDefinitionIdPathParam:
            in: path
            description:
                Identifier of the ListTypeDefinition used as a specification's picklist. Addresses a single list type definition; resolved against the company scope.
            explode: false
            name: listTypeDefinitionId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        mappedProductIdPathParam:
            in: path
            description:
                Identifier of a shop-by-diagram entry. Addresses a single CSDiagramEntry that binds a hotspot sequence to a SKU, a nested sub-diagram, or an external SKU code.
            explode: false
            name: mappedProductId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        pageQueryParam:
            in: query
            description:
                One-based page index. Combined with pageSize to paginate the result set; defaults to 1 when omitted.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items per page. Defaults to the portal's configured page size when omitted; capped by the portal configuration to prevent unbounded reads.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        pinIdPathParam:
            in: path
            description:
                Identifier of a diagram pin. Addresses a single CSDiagramPin, the clickable hotspot anchored at `positionX`/`positionY` on the parent product's diagram image.
            explode: false
            name: pinId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        productConfigurationListAccountGroupIdPathParam:
            in: path
            description:
                Identifier of an account-group binding on a product configuration list. Addresses a single account-group-scoped override entry within the parent configuration list.
            explode: false
            name: productConfigurationListAccountGroupId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        productConfigurationListAccountIdPathParam:
            in: path
            description:
                Identifier of an account binding on a product configuration list. Addresses a single account-scoped override entry within the parent configuration list.
            explode: false
            name: productConfigurationListAccountId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        productConfigurationListChannelIdPathParam:
            in: path
            description:
                Identifier of a channel binding on a product configuration list. Addresses a single channel-scoped override entry within the parent configuration list.
            explode: false
            name: productConfigurationListChannelId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        productConfigurationListOrderTypeIdPathParam:
            in: path
            description:
                Identifier of an order-type binding on a product configuration list. Addresses a single order-type-scoped override entry within the parent configuration list.
            explode: false
            name: productConfigurationListOrderTypeId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        searchQueryParam:
            in: query
            description:
                Full-text search expression matched against the resource's indexed fields. Returns the items whose searchable content matches the expression.
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        sequencePathParam:
            in: path
            description:
                Sequence identifier of a pin within its parent product. Combined with the parent product reference, this string is the lookup key that matches a pin to its mapped product on the same diagram.
            explode: false
            name: sequence
            required: true
            schema:
                description:
                    The sequence of the pin
                example: 12c
                minLength: 1
                type: string
            style: simple
        showDifferencesQueryParam:
            in: query
            description:
                When true, returns only the configuration entries whose values differ from the parent product configuration; when false or omitted, returns the full configuration.
            explode: true
            name: showDifferences
            required: false
            schema:
                type: boolean
            style: form
        sortQueryParam:
            in: query
            description:
                Sort expression of the form `field:asc` or `field:desc`, comma-separated for multi-field sorting. Supported sort fields depend on the endpoint and are sourced from the matching entity model (typically createDate, modifiedDate, and the resource's name or code field).
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
        specificationIdPathParam:
            in: path
            description:
                Identifier of a catalog Specification. Addresses a single specification definition that can be bound to products through ProductSpecification entries.
            explode: false
            name: specificationId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        typeQueryParam:
            in: query
            description:
                Filters the related-product list by relation type (for example, upSell, crossSell, accessory). When omitted, returns all relations.
            explode: true
            name: type
            required: false
            schema:
                type: string
            style: form
        versionPathParam:
            in: path
            description:
                Numeric version of the resource snapshot to address. Used on operations that return or act on a specific historical revision rather than the current state.
            explode: false
            name: version
            required: true
            schema:
                description:
                    The resource version
                example: 1
                format: int32
                minimum: 0
                type: integer
            style: simple
    responses:
        NotFound:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                The specified resource was not found
        UnauthorizedError:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                Authentication information is missing or invalid
    schemas:
        Account:
            description:
                Read-only reference to a Liferay account, embedded by catalog resources to identify the supplier or business that owns a catalog or product configuration list scope.
            properties:
                id:
                    description:
                        Reference to the account (FK identifier); 0 means the default or guest account.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                logoId:
                    description:
                        Reference to the portal file entry that stores the account logo image; 0 when no logo is set.
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the account; read-only in catalog responses.
                    example: Account Name
                    type: string
            type: object
        AccountGroup:
            description:
                Read-only reference to a Liferay account group used by catalog resources to target a set of accounts that share product configuration list visibility.
            properties:
                id:
                    description:
                        Reference to the account group (FK identifier); read-only in catalog responses.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    description:
                        Display name of the account group.
                    example: AccountGroup Name
                    type: string
            type: object
        Attachment:
            description:
                An attachment associated with a product (or one of its options or option values) in the admin catalog write surface. Used to create, read, replace, and patch either gallery images (type 0) or generic attachments (type 1).
            properties:
                attachment:
                    description:
                        Base64-encoded payload used only when supplying the file body inline; decoded server-side and stored as a new document-library file entry. Mutually exclusive with `src`; ignored when `src` is supplied. Not populated on read responses.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                cdnEnabled:
                    description:
                        When true the attachment is treated as an externally hosted asset -- no uploaded file is required and `cdnURL` becomes mandatory and must be a valid URL. When false the attachment must reference an existing document-library file.
                    example: true
                    type: boolean
                cdnURL:
                    description:
                        Public CDN URL used when `cdnEnabled` is true; must be a valid URL. Ignored when `cdnEnabled` is false.
                    example: https://cdn.example.com/attachment.png
                    type: string
                contentType:
                    description:
                        MIME type of the uploaded file. When omitted, the server derives it from the decoded file content; the resolved type then drives the file extension applied to the generated unique file name.
                    example: image/png
                    type: string
                customFields:
                    description:
                        Custom expando attributes attached to the attachment; on read they are filtered by the accept-language locale, and on write they are applied to the attachment's expando bridge.
                    items:
                        type: customField
                    type: array
                displayDate:
                    description:
                        Date when the attachment becomes visible. ISO 8601 date (yyyy-MM-dd) interpreted in the request user's time zone. When the value lies in the future the attachment is persisted as scheduled instead of draft or approved.
                    example: 2017-07-21
                    format: date
                    type: string
                expirationDate:
                    description:
                        Date when the attachment is hidden. ISO 8601 date in the user's time zone; must be in the future and after `displayDate`. When this date has already passed the attachment is persisted as expired. Ignored when `neverExpire` is true.
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per attachment within the company. Used to resolve the upsert target; reusing a code that points at a different parent is rejected as a duplicate.
                    example: AB-34098-789-N
                    type: string
                fileEntryExternalReferenceCode:
                    description:
                        Optional external reference code of an existing document-library file to attach. On write the server resolves it scoped to `fileEntryGroupExternalReferenceCode` and links the resulting file. Required together with `fileEntryGroupExternalReferenceCode` when `fileEntryId` is 0 and no inline content or URL is supplied. On read it reflects the linked file.
                    example: AB-34098-789-N
                    type: string
                fileEntryGroupExternalReferenceCode:
                    description:
                        External reference code of the site that owns the referenced document-library file. An unknown value is rejected. On read it returns the site code of the underlying file.
                    example: AB-34098-789-N
                    type: string
                fileEntryId:
                    description:
                        Identifier of the underlying document-library file. When 0 on write, a new file is created from the supplied base64 body, URL, or file external reference code. When `cdnEnabled` is false a non-zero value is required, otherwise the request is rejected. The current user must hold view permission on this file.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                galleryEnabled:
                    description:
                        When true the attachment is exposed in the storefront product gallery. Defaults to true when omitted on write.
                    example: true
                    type: boolean
                id:
                    description:
                        Identifier of the attachment. Read-only; assigned by the server.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                neverExpire:
                    description:
                        When true the attachment never expires and `expirationDate` is ignored. Defaults to false on write.
                    example: true
                    type: boolean
                options:
                    additionalProperties:
                        type: string
                    description:
                        Free-form key/value map that binds the attachment to a specific SKU variant of the parent product; each entry is resolved against the product's options and option values, and unknown keys, options, or values are rejected.
                    example:
                        color: yellow
                        optionKey: optionValueKey
                        size: xs
                    type: object
                priority:
                    description:
                        Sort weight used to order attachments within a product gallery; higher values are returned first. Defaults to 0.0 when omitted.
                    example: 1.2
                    format: double
                    type: number
                src:
                    description:
                        URL pointing at the binary to download. On write the server fetches the URL and stores the body as a new document-library file; the `file://` protocol is rejected. On read it returns the portal download URL; for external video shortcuts the URL is intentionally blank.
                    example: https://example.com/attachment.png
                    type: string
                tags:
                    description:
                        Asset tag names attached to the underlying asset entry; used for categorization and search facets.
                    example:
                        -   tag1
                        -   tag2
                        -   tag3
                    items:
                        type: string
                    type: array
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings. Falls back to the file name in the site default locale when no value is supplied.
                    example:
                        en_US: Hand Saw
                        hr_HR: Attachment Title HR
                        hu_HU: Attachment Title HU
                    type: object
                type:
                    description:
                        Integer type code. Mapping -- 0=Image, 1=Other. Set by the resource endpoint -- image endpoints write 0, attachment endpoints write 1. The diagram image variant uses code 2 internally but is not exposed through the attachment surface.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
            type: object
        AttachmentBase64:
            description:
                Input variant of an attachment used by the upload-by-base64 endpoints; the file body must be supplied inline as Base64 in the `attachment` property. Backed by the same attachment entity, with CDN mode disabled (the body is always stored as a document-library file).
            properties:
                attachment:
                    description:
                        Required Base64-encoded file body; decoded server-side and stored as a new document-library file entry. When omitted, no file entry is created and the call becomes a metadata-only update.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                contentType:
                    description:
                        MIME type for the decoded file. When omitted, the server derives it from the decoded content before applying the matching file extension to the generated unique file name.
                    example: image/png
                    type: string
                customFields:
                    description:
                        Custom expando attributes applied to the attachment on write.
                    items:
                        type: customField
                    type: array
                displayDate:
                    description:
                        ISO 8601 date controlling visibility start, interpreted in the request user's time zone. A future date causes the attachment to be persisted as scheduled.
                    example: 2017-07-21
                    format: date
                    type: string
                expirationDate:
                    description:
                        ISO 8601 date controlling visibility end. Defaults to one month after the display date when omitted; rejected when in the past or earlier than the display date.
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per attachment within the company. Used by the upload-by-base64 endpoints to decide between create and update.
                    example: AB-34098-789-N
                    type: string
                galleryEnabled:
                    description:
                        When true the attachment appears in the product gallery. Defaults to true when omitted on write.
                    example: true
                    type: boolean
                id:
                    description:
                        Read-only identifier of the resulting attachment.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                neverExpire:
                    description:
                        When true `expirationDate` is ignored on the server side. Defaults to false when omitted.
                    example: true
                    type: boolean
                options:
                    additionalProperties:
                        type: string
                    description:
                        Free-form variant-selector map that binds the attachment to a specific SKU variant of the parent product; each entry is resolved against the product's options and option values, and unknown keys are rejected.
                    example:
                        color: yellow
                        optionKey: optionValueKey
                        size: xs
                    type: object
                priority:
                    description:
                        Sort weight used to order gallery entries. Defaults to 0.0 when omitted.
                    example: 1.2
                    format: double
                    type: number
                src:
                    description:
                        Ignored on the base64 input path; only the `attachment` body is consumed. Provided for shape parity with the read variant.
                    example: https://example.com/attachment.png
                    type: string
                tags:
                    description:
                        Asset tag names applied to the underlying asset entry before the attachment is created or updated.
                    example:
                        -   tag1
                        -   tag2
                        -   tag3
                    items:
                        type: string
                    type: array
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Hand Saw
                        hr_HR: Attachment Title HR
                        hu_HU: Attachment Title HU
                    type: object
                type:
                    description:
                        Integer type code. Mapping -- 0=Image, 1=Other. Driven by the calling endpoint (image versus attachment); not set by the client.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
            type: object
        AttachmentUrl:
            description:
                Input variant of an attachment used by the upload-by-URL endpoints; the file body is fetched server-side from the `src` URL rather than uploaded inline. Backed by the same attachment entity, with CDN mode disabled (the downloaded body is always materialized as a document-library file).
            properties:
                contentType:
                    description:
                        Optional MIME type for the downloaded file. When omitted, the server derives it from the streamed bytes.
                    example: image/png
                    type: string
                customFields:
                    description:
                        Custom expando attributes applied to the attachment on write.
                    items:
                        type: customField
                    type: array
                displayDate:
                    description:
                        ISO 8601 date controlling visibility start, interpreted in the request user's time zone. A future value causes the attachment to be persisted as scheduled.
                    example: 2017-07-21
                    format: date
                    type: string
                expirationDate:
                    description:
                        ISO 8601 date controlling visibility end. Defaults to the display date plus one month when omitted; rejected when in the past or earlier than the display date.
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per attachment within the company. Used to decide between insert and update.
                    example: AB-34098-789-N
                    type: string
                galleryEnabled:
                    description:
                        When true the attachment is exposed in the product gallery. Defaults to true when omitted on write.
                    example: true
                    type: boolean
                id:
                    description:
                        Read-only identifier of the resulting attachment, assigned by the server.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                neverExpire:
                    description:
                        When true `expirationDate` is ignored on the server side. Defaults to false when omitted.
                    example: true
                    type: boolean
                options:
                    additionalProperties:
                        type: string
                    description:
                        Free-form variant-selector map that binds the attachment to a specific SKU variant of the parent product; each entry is resolved against the product's options and option values, and unknown keys are rejected.
                    example:
                        color: yellow
                        optionKey: optionValueKey
                        size: xs
                    type: object
                priority:
                    description:
                        Sort weight used to order gallery entries; defaults to 0.0 when omitted.
                    example: 1.2
                    format: double
                    type: number
                src:
                    description:
                        Required source URL fetched server-side; the downloaded bytes are stored as a new document-library file. When omitted, no file entry is created and the call becomes a metadata-only update.
                    example: https://example.com/attachment.png
                    type: string
                tags:
                    description:
                        Asset tag names applied to the underlying asset entry before the attachment is created or updated.
                    example:
                        -   tag1
                        -   tag2
                        -   tag3
                    items:
                        type: string
                    type: array
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Hand Saw
                        hr_HR: Attachment Title HR
                        hu_HU: Attachment Title HU
                    type: object
                type:
                    description:
                        Integer type code. Mapping -- 0=Image, 1=Other. Driven by the calling endpoint, not by the client.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
            type: object
        Catalog:
            description:
                Versioned product catalog scoped to a company and tied to a Liferay site group. Create, read, update, and delete operations from the catalog admin perspective; the master catalog and any catalog whose `system` flag is true are managed by the platform and cannot be deleted through the standard delete path.
            properties:
                accountId:
                    description:
                        Reference to the account that owns this catalog (FK identifier); defaults to no account when omitted on create. The linked account must be a supplier account with approved status; other account types or statuses are rejected.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from user permissions; read-only.
                    readOnly: true
                    type: object
                currencyCode:
                    description:
                        ISO 4217 code of the catalog's default currency; on write the catalog's default currency can be identified by `currencyCode`, `currencyExternalReferenceCode`, or `currencyId`.
                    example: USD
                    type: string
                currencyExternalReferenceCode:
                    description:
                        External reference code of the catalog's default currency; alternative write-time identifier used together with `currencyCode` and `currencyId`.
                    example: AB-34098-789-N
                    type: string
                currencyId:
                    description:
                        Reference to the catalog's default currency (FK identifier); alternative write-time identifier used when `currencyCode` and `currencyExternalReferenceCode` are not supplied.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                defaultLanguageId:
                    description:
                        Liferay locale code used as the catalog's default language for localized product content.
                    example: en_US
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per catalog within the company; POST upserts when a catalog with this code already exists, and PUT by external reference code creates or replaces.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Auto-generated catalog identifier; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    description:
                        Display name of the catalog; required on create and used to seed the localized name map for the backing Liferay site group; matched by the search query parameter and filterable and sortable through the OData query parameter.
                    example: Default Catalog
                    type: string
                system:
                    description:
                        Indicates that the catalog is platform-managed (the master catalog and similar); read-only; deletion of system catalogs is blocked.
                    example: false
                    readOnly: true
                    type: boolean
            required:
                -   name
            type: object
        Category:
            description:
                Asset-based taxonomy entry used to classify products; within the admin catalog API a category appears only as a reference body for assigning or listing categories against a product, and the resource itself does not create or delete category records.
            properties:
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per category within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the category (FK identifier); required when patching product-category assignments because each entry is resolved by identifier and unknown identifiers are rejected.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Internal name of the category; the human-facing label is exposed through the localized `title` map.
                    example: Hand Tools
                    type: string
                siteId:
                    description:
                        Reference to the Liferay site (FK identifier) where the category was defined.
                    example: 20121
                    format: int64
                    type: integer
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized text; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Category Title EN
                        hr_HR: Category Title HR
                        hu_HU: Category Title HU
                    type: object
                vocabulary:
                    description:
                        Name of the vocabulary that owns this category, resolved at read time; read-only.
                    example: Default Vocabulary
                    readOnly: true
                    type: string
            required:
                -   id
            type: object
        Channel:
            description:
                Read-only reference to a sales channel, embedded by catalog resources to identify the storefront or B2B portal scope of a product configuration list; channel create, read, update, and delete operations live in a separate admin module.
            properties:
                currencyCode:
                    description:
                        ISO 4217 code of the default currency for this channel.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for the underlying channel; must be unique per channel within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the channel (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                name:
                    description:
                        Display name of the channel; required when the channel is created.
                    example: Default Channel
                    type: string
                siteGroupId:
                    description:
                        Reference to the Liferay site (FK identifier) bound to this channel.
                    example: 20121
                    format: int64
                    type: integer
                type:
                    description:
                        Channel type key; only keys registered at deployment time are accepted, and unknown values are rejected.
                    example: site
                    type: string
            type: object
        Currency:
            description:
                Currency definition specifying the formatting, fraction digits, rounding mode, and exchange rate used by catalogs and channels; supports create, read, update, and delete operations from the catalog admin perspective; every write triggers a reindex.
            properties:
                active:
                    description:
                        Whether the currency is selectable for pricing; filterable and sortable through the OData query parameter.
                    example: true
                    type: boolean
                code:
                    description:
                        ISO 4217 currency code; required and rejected when blank; must be unique per company, and a duplicate code in the same company is rejected; filterable and sortable through the OData query parameter.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per currency within the company; defaults to the value of `code` on POST when omitted.
                    example: AB-34098-789-N
                    type: string
                formatPattern:
                    additionalProperties:
                        type: string
                    description:
                        Localized text; map keys are locale codes and values are the translated decimal-format patterns; when omitted on create, a standard pattern (###,##0.00) is applied for the user locale.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
                id:
                    description:
                        Auto-generated currency identifier.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                maxFractionDigits:
                    description:
                        Maximum decimal places displayed when formatting amounts; defaults to 2 on create when not supplied.
                    example: 2
                    format: int32
                    minimum: 0
                    type: integer
                minFractionDigits:
                    description:
                        Minimum decimal places displayed when formatting amounts; defaults to 2 on create when not supplied.
                    example: 2
                    format: int32
                    minimum: 0
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text; map keys are locale codes and values are the translated strings; required, and rejected when the entry for the site-default locale is blank; sortable through the OData query parameter.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
                primary:
                    description:
                        Whether this is the company's primary currency; when true the rate is forced to 1 and every other currency in the company is automatically switched to non-primary; filterable and sortable through the OData query parameter.
                    example: true
                    type: boolean
                priority:
                    description:
                        Numeric display-order weight used to sort currency selectors, with lower values surfacing first; filterable and sortable through the OData query parameter.
                    example: 1.2
                    format: double
                    type: number
                rate:
                    description:
                        Exchange rate relative to the company's primary currency; must be strictly greater than zero and is rejected otherwise; reset to 1 when `primary` is true.
                    example: 33.54
                    format: bigdecimal
                    type: number
                roundingMode:
                    description:
                        Rounding mode applied when amounts exceed `maxFractionDigits`; allowed values are UP, DOWN, CEILING, FLOOR, HALF_UP, HALF_DOWN, HALF_EVEN, and UNNECESSARY; when omitted on create, defaults to the configured system rounding mode (typically HALF_EVEN).
                    enum:
                        -   UP
                        -   DOWN
                        -   CEILING
                        -   FLOOR
                        -   HALF_UP
                        -   HALF_DOWN
                        -   HALF_EVEN
                        -   UNNECESSARY
                    example: HALF_EVEN
                    type: string
                symbol:
                    description:
                        Currency display symbol shown alongside formatted amounts.
                    example: $
                    type: string
            required:
                -   code
                -   name
            type: object
        Diagram:
            description:
                A shop-by-diagram setting that turns a product into an interactive image with clickable pins. Created and updated by the admin catalog write surface, which first uploads the diagram image as a diagram-type attachment and then persists the diagram setting.
            properties:
                attachmentBase64:
                    $ref: "#/components/schemas/AttachmentBase64"
                color:
                    description:
                        Hex or CSS color string used to render the diagram background or overlay. No server-side validation; maximum length is 75 characters.
                    example: black
                    type: string
                id:
                    description:
                        Identifier of the diagram setting. Assigned by the server.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                imageId:
                    description:
                        Identifier of the attachment that holds the diagram image. Populated from the uploaded `attachmentBase64`; can also be set explicitly to point at an existing diagram-type attachment.
                    example: 33132
                    format: int64
                    minimum: 0
                    type: integer
                imageURL:
                    description:
                        Public download URL for the diagram image. Read-only; returns null when the underlying attachment has no document-library file.
                    example: Name 1
                    readOnly: true
                    type: string
                productExternalReferenceCode:
                    description:
                        External reference code of the parent product the diagram belongs to. Read-only; populated from the linked product.
                    example: exampleERC
                    readOnly: true
                    type: string
                productId:
                    description:
                        Identifier of the parent product. Read-only; populated from the linked product.
                    example: 33131
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                radius:
                    description:
                        Pixel radius used by the storefront to compute the click area around each pin.
                    example: 33.54
                    format: double
                    type: number
                type:
                    description:
                        Diagram type key resolved against the registered diagram types. Defaults to `diagram.type.default` on add when omitted; patch preserves the previous value when omitted.
                    example: default
                    type: string
            type: object
        Error:
            description:
                Generic error response body returned by the portal framework when a catalog request fails; read-only and emitted by the platform rather than declared by this module.
            properties:
                errorCode:
                    description:
                        Internal numeric code that classifies the error category; required and read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Human-readable description of the failure, suitable for displaying to API clients; required and read-only.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Technical detail message, often including the underlying failure text; required and read-only.
                    example: No CommerceCurrency exists with the key <catalogId=41811, code=US Dollar>
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code of the response; required and read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        GroupedProduct:
            description:
                Bundle membership entry for a grouped-type product; links a parent grouped product to a child product with a quantity and a sort priority; admin catalog write view used under a parent product whose `productType` is grouped.
            properties:
                entryProductExternalReferenceCode:
                    description:
                        External reference code of the child product included in the bundle; on create, used to look up the child when `entryProductId` is not supplied.
                    example: exampleERC
                    type: string
                entryProductId:
                    description:
                        Identifier of the child product included in the bundle; required on create when `entryProductExternalReferenceCode` does not resolve.
                    example: 33131
                    format: int64
                    minimum: 0
                    type: integer
                entryProductName:
                    additionalProperties:
                        type: string
                    description:
                        Localized child product name as a map whose keys are locale codes and whose values are the translated strings; read-only.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    readOnly: true
                    type: object
                id:
                    description:
                        Primary key of the bundle membership entry; read-only.
                    example: 33130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                priority:
                    description:
                        Sort order of this entry within its parent grouped product; lower values appear first; defaults to 0.0 when omitted on create.
                    example: 1.2
                    format: double
                    type: number
                productExternalReferenceCode:
                    description:
                        External reference code of the parent grouped product; read-only and derived from the path used to scope the entry.
                    example: exampleERC
                    readOnly: true
                    type: string
                productId:
                    description:
                        Identifier of the parent grouped product; read-only and derived from the path used to scope the entry.
                    example: 33131
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                productName:
                    additionalProperties:
                        type: string
                    description:
                        Localized parent product name as a map whose keys are locale codes and whose values are the translated strings; read-only.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    readOnly: true
                    type: object
                quantity:
                    description:
                        Quantity of the child product included per parent unit; must be greater than zero or the request is rejected; required on create.
                    example: 1
                    format: int32
                    minimum: 0
                    type: integer
            type: object
        LinkedProduct:
            description:
                Read-only projection of a product link surfaced under a parent product; covers both grouped-product entries and shop-by-diagram entries; the `type` field discriminates which kind of link the row came from.
            properties:
                productExternalReferenceCode:
                    description:
                        External reference code of the linked product; read-only.
                    example: exampleERC
                    readOnly: true
                    type: string
                productId:
                    description:
                        Identifier of the linked product; read-only.
                    example: 33131
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                type:
                    description:
                        Product type name of the linked product; read-only.
                    example: exampleERC
                    readOnly: true
                    type: string
            type: object
        ListTypeDefinition:
            description:
                Reusable list-type definition attached to a product specification option to constrain the values a product specification can take; within this module the resource only supports listing definitions attached to a specification, creating one and attaching it, attaching an existing definition, and detaching one, while the definition itself is persisted through a separate list-type module.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from user permissions; read-only.
                    readOnly: true
                    type: object
                dateCreated:
                    description:
                        ISO 8601 timestamp captured when the definition was first persisted; read-only.
                    example: 2017-07-21T19:30:00Z
                    format: date
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        ISO 8601 timestamp captured on the latest update; read-only.
                    example: 2017-07-21T19:30:00Z
                    format: date
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per list type definition within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Auto-generated list type definition identifier; read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        Display name of the definition, resolved against the request's preferred locale.
                    example: Availability
                    type: string
                name_i18n:
                    additionalProperties:
                        type: string
                    description:
                        Localized text; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Availability
                        hr_HR: Dostupnost
                        hu_HU: Elerhetoseg
                    type: object
                system:
                    description:
                        Indicates that the definition is platform-managed; system definitions are typically created by initial data and should not be edited by tenant users.
                    example: true
                    type: boolean
            type: object
        LowStockAction:
            description:
                Read-only descriptor of a registered low-stock activity used by SKU and product configuration endpoints to indicate which action runs when inventory falls below a threshold; entries are contributed by platform extensions and resolved from a registry.
            properties:
                key:
                    description:
                        Stable identifier of the registered low-stock activity; read-only because the set of keys is fixed at deployment time.
                    example: default
                    type: string
                label:
                    additionalProperties:
                        type: string
                    description:
                        Localized text; map keys are locale codes and values are the translated strings; read-only.
                    example:
                        en_US: Low Stock Action
                        hr_HR: Low Stock Action HR
                        hu_HU: Low Stock Action HU
                    readOnly: true
                    type: object
        MappedProduct:
            description:
                A mapping that links a product (and optionally a SKU) to a diagram pin sequence within a parent product. Created and updated by the admin catalog write surface; the pair of parent product and sequence is unique, and duplicates are rejected.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                customFields:
                    description:
                        Custom expando attributes attached to the mapping; on read they are filtered by the accept-language locale, and on write they are applied to the mapping's expando bridge.
                    items:
                        type: customField
                    type: array
                id:
                    description:
                        Identifier of the mapped product. Assigned by the server.
                    example: 33130
                    format: int64
                    minimum: 0
                    type: integer
                productExternalReferenceCode:
                    description:
                        External reference code of the referenced product. On write it is resolved to the matching product and overrides `productId`. On read it returns the code of the linked product, or blank when the linked product no longer exists.
                    example: exampleERC
                    type: string
                productId:
                    description:
                        Identifier of the referenced product. On write the supplied value is overridden when `productExternalReferenceCode` resolves to a different product.
                    example: 33131
                    format: int64
                    minimum: 0
                    type: integer
                productName:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings. Read-only; populated from the linked product.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    readOnly: true
                    type: object
                quantity:
                    description:
                        Quantity of the mapped product or SKU implied by selecting this pin.
                    example: 1
                    format: int32
                    minimum: 0
                    type: integer
                sequence:
                    description:
                        Position identifier shared with the matching pin on the same parent product. Together with the parent product it forms the unique lookup key; duplicates are rejected. Matched by the `search` query parameter. Maximum length is 75 characters.
                    example: 1
                    type: string
                sku:
                    description:
                        Free-text SKU label used to display the variant on the storefront when the mapped product is not linked to a concrete SKU (type `external`). Matched by the `search` query parameter. Maximum length is 75 characters.
                    example: SKU01
                    type: string
                skuExternalReferenceCode:
                    description:
                        External reference code of the linked SKU. On write it is resolved to the matching SKU and overrides `skuId`. On read it returns the code of the linked SKU, or blank when no SKU is linked.
                    example: SKU0111
                    type: string
                skuId:
                    description:
                        Identifier of the SKU that backs the mapping when `type` is `sku`. Zero or null when the mapping is of type `diagram` or `external`.
                    example: 33135
                    format: int64
                    minimum: 0
                    type: integer
                type:
                    description:
                        Mapping kind. Resolved at read time as `diagram` when the mapping is flagged as a diagram mapping, `sku` when a SKU is linked, otherwise `external`. On write the mapping is flagged as a diagram mapping only when the supplied value is `diagram`.
                    enum:
                        -   diagram
                        -   external
                        -   sku
                    example: sku
                    type: string
            type: object
        Option:
            description:
                A reusable, company-scoped option template; an option defines a field type, a key, localized labels, optional values, and a few flags that drive how the option appears on every product that links to it.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from the caller's permissions (delete, get, update); read-only.
                    readOnly: true
                    type: object
                catalogId:
                    description:
                        Not populated on reads and ignored on writes; the option is scoped by company only; reserved for future per-catalog scoping.
                    example: 30130
                    format: int64
                    type: integer
                customFields:
                    description:
                        Custom field values stored against the option through the expando bridge; localized when the request accepts all languages.
                    items:
                        type: customField
                    type: array
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized administrative description shown in the admin UI; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Description
                        hr_HR: Description HR
                        hu_HU: Description HU
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per option within the company.
                    example: AB-34098-789-N
                    type: string
                facetable:
                    description:
                        Whether the option is exposed as a search facet in product catalog searches; when true the option key and value names are indexed so the storefront can filter on them.
                    example: true
                    type: boolean
                fieldType:
                    description:
                        Selects the input widget rendered on the storefront; validated against the configured allow list and, when `skuContributor` is true, restricted to select, select_date, and radio; required.
                    enum:
                        -   checkbox
                        -   checkbox_multiple
                        -   date
                        -   document_library
                        -   numeric
                        -   radio
                        -   select
                        -   select_date
                        -   text
                    example: select
                    type: string
                id:
                    description:
                        Primary key; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                key:
                    description:
                        Machine identifier used for integrations and lookups; normalized to a friendly URL form and must be unique per company; required.
                    example: color
                    type: string
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized display label shown to administrators and (when surfaced) to shoppers; map keys are locale codes and values are the translated strings; required.
                    example:
                        en_US: Color
                        hr_HR: Color HR
                        hu_HU: Color HU
                    type: object
                optionValues:
                    description:
                        Available values for this option; populated on create or update by cascading each value through the option-value resource.
                    items:
                        $ref: "#/components/schemas/OptionValue"
                    type: array
                priority:
                    description:
                        Display order used when listing options in the admin UI; lower values appear first.
                    example: 1.2
                    format: double
                    type: number
                required:
                    description:
                        Whether the shopper must select a value for this option before the product can be added to the cart.
                    example: true
                    type: boolean
                skuContributor:
                    description:
                        Whether selecting a value on this option produces a distinct SKU for the parent product; enabling it restricts `fieldType` to select, select_date, or radio.
                    example: true
                    type: boolean
            required:
                -   fieldType
                -   key
                -   name
            type: object
        OptionCategory:
            description:
                A logical grouping of specifications used for display organization in the admin UI; categories are scoped per company and identified by a unique key.
            properties:
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized administrative description shown in the admin UI; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Physical attributes grouping
                        hr_HR: Grupa fizickih svojstava
                        hu_HU: Fizikai jellemzok csoportja
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per option category within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary key; assigned by the service on create.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                key:
                    description:
                        Machine identifier used for lookups and integrations; normalized to a friendly URL form and must be unique per company; required.
                    example: option-category-key
                    type: string
                priority:
                    description:
                        Display order used when listing categories in the admin UI; lower values appear first.
                    example: 1.2
                    format: double
                    minimum: 0
                    type: number
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized display label for the category; map keys are locale codes and values are the translated strings; required.
                    example:
                        en_US: Physical Attributes
                        hr_HR: Fizicka svojstva
                        hu_HU: Fizikai jellemzok
                    type: object
            type: object
        OptionValue:
            description:
                A selectable value for a global option; each value carries a machine key, a localized name, and a priority that controls its display order within the parent option.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from the caller's permissions; read-only.
                    readOnly: true
                    type: object
                customFields:
                    description:
                        Custom field values stored against the option value through the expando bridge; localized when the request accepts all languages.
                    items:
                        type: customField
                    type: array
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per option value within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary key; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                key:
                    description:
                        Machine identifier for this value; normalized to a friendly URL form and must be unique within the parent option; for an option whose `fieldType` is select_date, the key encodes a date plus duration and is validated against a strict pattern; required.
                    example: black
                    type: string
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized display label shown to administrators and shoppers; map keys are locale codes and values are the translated strings; required -- the site default locale must hold a non-null value.
                    example:
                        en_US: Black
                        hr_HR: Black HR
                        hu_HU: Black HU
                    type: object
                priority:
                    description:
                        Display order used when listing values inside the parent option; lower values appear first.
                    example: 1.2
                    format: double
                    type: number
            required:
                -   key
                -   name
            type: object
        OrderType:
            description:
                Read-only reference to a commerce order type, embedded by catalog resources to identify the order classification for a product configuration list scope; order type create, read, update, and delete operations live in a separate admin module.
            properties:
                id:
                    description:
                        Reference to the order type (FK identifier); read-only in this module.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text; map keys are locale codes and values are the translated strings.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
            type: object
        Pin:
            description:
                A clickable hot-spot on a shop-by-diagram image, identified within the product by its sequence. Created and updated by the admin catalog write surface; deleting the last pin for a sequence cascades into the matching mapped product.
            properties:
                id:
                    description:
                        Identifier of the pin. Assigned by the server.
                    example: 33130
                    format: int64
                    minimum: 0
                    type: integer
                mappedProduct:
                    $ref: "#/components/schemas/MappedProduct"
                positionX:
                    description:
                        Horizontal coordinate of the pin on the diagram image, in pixels.
                    example: 33.54
                    format: double
                    type: number
                positionY:
                    description:
                        Vertical coordinate of the pin on the diagram image, in pixels.
                    example: 33.54
                    format: double
                    type: number
                sequence:
                    description:
                        Identifier used to match this pin to a mapped product on the same parent product; the pair of parent product and sequence is the lookup key. Maximum length is 75 characters.
                    example: 1
                    type: string
            type: object
        Product:
            description:
                Core catalog product entity with a parent envelope record, a parent catalog, localized name and description maps, and asset-framework category and tag links; admin catalog write view covering create, update (PATCH merges with current values), clone, and status transitions; nested collections such as `skus`, `productOptions`, `categories`, `productChannels`, and `productAccountGroups` are written through dedicated sub-resources during the same request.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from the caller's permissions; read-only.
                    readOnly: true
                    type: object
                active:
                    description:
                        Whether the product is published; setting this to false moves the product to inactive status after the save and removes it from storefront listings; setting it to true leaves the workflow-driven status untouched; required.
                    example: true
                    type: boolean
                attachments:
                    description:
                        Gallery attachments of type Other; replaces the existing set on write.
                    items:
                        $ref: "#/components/schemas/Attachment"
                    type: array
                catalog:
                    $ref: "#/components/schemas/Catalog"
                    description:
                        Embedded parent catalog reference; read-only.
                    readOnly: true
                catalogExternalReferenceCode:
                    description:
                        External reference code of the parent catalog; used on create when `catalogId` is not supplied to look up the catalog within the company; the request is rejected when neither resolves.
                    example: AB-34098-789-N
                    type: string
                catalogId:
                    description:
                        Identifier of the parent catalog; the catalog's scope determines where the product lives; either `catalogId` or `catalogExternalReferenceCode` must resolve on create.
                    example: 30054
                    format: int64
                    minimum: 0
                    type: integer
                categories:
                    description:
                        Asset-framework categories associated with the product for classification; on write, replaces the existing assignments; each item is resolved by id, or by external reference code within the company scope when id is omitted.
                    items:
                        $ref: "#/components/schemas/Category"
                    type: array
                createDate:
                    description:
                        Creation timestamp of the product row; filterable and sortable via the OData query parameter.
                    example: 2017-07-21
                    format: date
                    type: string
                customFields:
                    description:
                        Custom field values stored against the product; written as expando attribute values during save.
                    items:
                        type: customField
                    type: array
                defaultSku:
                    description:
                        Optional default SKU code used during product creation to seed the initial variant.
                    example: Blue handle, 00001l, 70cm, lifetime warranty
                    type: string
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized description as a map whose keys are locale codes and whose values are the translated strings; HTML is sanitized on save.
                    example:
                        en_US: Professional hand stainless steel saw for wood. Made to last and saw forever. Made of best steel
                        hr_HR: Product Description HR
                        hu_HU: Product Description HU
                    type: object
                diagram:
                    $ref: "#/components/schemas/Diagram"
                displayDate:
                    description:
                        ISO 8601 date from which the product becomes visible; must not be after `expirationDate` or the request is rejected.
                    example: 2017-07-21
                    format: date
                    type: string
                expando:
                    additionalProperties: true
                    description:
                        Custom field payload applied to the product after save; merged with any existing custom field values.
                    type: object
                expirationDate:
                    description:
                        ISO 8601 date when the product is hidden from the catalog; ignored when `neverExpire` is true (default).
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per product within the company; used by upsert, lookup, and PATCH endpoints to locate the product.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary key of the product row; read-only; filterable and sortable via the OData query parameter.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                images:
                    description:
                        Image attachments of type Image.
                    items:
                        $ref: "#/components/schemas/Attachment"
                    type: array
                linkedProducts:
                    description:
                        Read-only collection of linked-product projections covering grouped-product entries and shop-by-diagram entries that target this product.
                    items:
                        $ref: "#/components/schemas/LinkedProduct"
                    type: array
                mappedProducts:
                    description:
                        Read-only collection of mapped-product entries that bind diagram pins to other catalog products.
                    items:
                        $ref: "#/components/schemas/MappedProduct"
                    type: array
                metaDescription:
                    additionalProperties:
                        type: string
                    description:
                        Localized SEO meta description as a map whose keys are locale codes and whose values are the translated strings; maximum length 255 per value.
                    example:
                        en_US: Meta description HU
                        hr_HR: Meta description HU
                        hu_HU: Meta description HU
                    type: object
                metaKeyword:
                    additionalProperties:
                        type: string
                    description:
                        Localized SEO meta keywords as a map whose keys are locale codes and whose values are the translated strings; maximum length 255 per value.
                    example:
                        en_US: Meta keyword HU
                        hr_HR: Meta keyword HU
                        hu_HU: Meta keyword HU
                    type: object
                metaTitle:
                    additionalProperties:
                        type: string
                    description:
                        Localized SEO meta title as a map whose keys are locale codes and whose values are the translated strings; maximum length 255 per value.
                    example:
                        en_US: Meta title HU
                        hr_HR: Meta title HU
                        hu_HU: Meta title HU
                    type: object
                modifiedDate:
                    description:
                        Last modification timestamp of the product row, refreshed on every update; filterable and sortable via the OData query parameter.
                    example: 2017-08-21
                    format: date
                    type: string
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized product name as a map whose keys are locale codes and whose values are the translated strings; required on create; sortable via the OData query parameter and matched by the search query parameter.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
                neverExpire:
                    description:
                        When true, `expirationDate` is ignored and the product never auto-expires; defaults to true on create when omitted; on update, defaults to true when no `expirationDate` is set on the current row.
                    example: true
                    type: boolean
                pins:
                    description:
                        Diagram pins defined on this product; applies when `productType` is diagram.
                    items:
                        $ref: "#/components/schemas/Pin"
                    type: array
                productAccountGroupFilter:
                    description:
                        When true, the product's visibility is filtered by the associated account groups in `productAccountGroups`.
                    example: true
                    type: boolean
                productAccountGroups:
                    description:
                        Account groups allowed to see this product when `productAccountGroupFilter` is enabled; written through the product-account-group sub-resource.
                    items:
                        $ref: "#/components/schemas/ProductAccountGroup"
                    type: array
                productChannelFilter:
                    description:
                        When true, the product's visibility is filtered by the associated commerce channels in `productChannels`.
                    example: true
                    type: boolean
                productChannels:
                    description:
                        Commerce channels where this product is offered when `productChannelFilter` is enabled; written through the product-channel sub-resource.
                    items:
                        $ref: "#/components/schemas/ProductChannel"
                    type: array
                productConfiguration:
                    $ref: "#/components/schemas/ProductConfiguration"
                productId:
                    description:
                        Identifier of the parent product envelope; stable across product revisions; read-only; filterable and sortable via the OData query parameter.
                    example: 30129
                    format: int64
                    readOnly: true
                    type: integer
                productOptions:
                    description:
                        Customizable options bound to this product.
                    items:
                        $ref: "#/components/schemas/ProductOption"
                    type: array
                productSpecifications:
                    description:
                        Specification attribute values recorded against this product.
                    items:
                        $ref: "#/components/schemas/ProductSpecification"
                    type: array
                productStatus:
                    description:
                        Integer workflow status -- 0=Approved, 1=Pending, 2=Draft, 3=Expired, 4=Denied, 5=Inactive, 6=Incomplete, 7=Scheduled, 8=InTrash; on write, any value other than Approved or Pending causes the save to be treated as a draft.
                    example: 0
                    format: int32
                    type: integer
                productType:
                    description:
                        Product type name; validated on save and rejected when the type is unknown; required; filterable and sortable via the OData query parameter.
                    example: simple
                    type: string
                productTypeI18n:
                    description:
                        Localized label for `productType` in the requested locale; read-only.
                    example: simple
                    readOnly: true
                    type: string
                productVirtualSettings:
                    $ref: "#/components/schemas/ProductVirtualSettings"
                relatedProducts:
                    description:
                        Explicit product-to-product links such as cross-sell or up-sell; written through the related-product sub-resource.
                    items:
                        $ref: "#/components/schemas/RelatedProduct"
                    type: array
                shippingConfiguration:
                    $ref: "#/components/schemas/ProductShippingConfiguration"
                shortDescription:
                    additionalProperties:
                        type: string
                    description:
                        Localized short description as a map whose keys are locale codes and whose values are the translated strings.
                    example:
                        en_US: Hand stainless steel saw for wood
                        hr_HR: Product Short Description HR
                        hu_HU: Product Short Description HU
                    type: object
                skuFormatted:
                    description:
                        Display-formatted SKU summary; read-only; resolves to the single variant SKU when only one variant exists, an empty string when there are no variants, or the localized 'multiple-skus' label when several variants exist.
                    example: default
                    readOnly: true
                    type: string
                skus:
                    description:
                        Product variants with pricing and inventory information.
                    items:
                        $ref: "#/components/schemas/Sku"
                    type: array
                subscriptionConfiguration:
                    $ref: "#/components/schemas/ProductSubscriptionConfiguration"
                tags:
                    description:
                        Asset-framework tag names attached to the product; replaces the existing tag set on write; matched by the search query parameter.
                    example:
                        -   tag1
                        -   tag2
                        -   tag3
                    items:
                        type: string
                    type: array
                taxConfiguration:
                    $ref: "#/components/schemas/ProductTaxConfiguration"
                thumbnail:
                    description:
                        URL of the product's default thumbnail attachment resolved against the admin account scope; read-only.
                    example: simple
                    readOnly: true
                    type: string
                urls:
                    additionalProperties:
                        type: string
                    description:
                        Friendly URL slugs per locale as a map whose keys are locale codes and whose values are the URL slugs.
                    example:
                        en_US: product-url-us
                        hr_HR: product-url-hr
                        hu_HU: product-url-hu
                    type: object
                version:
                    description:
                        Versioning counter of the product row; incremented when a versionable product is cloned to a new revision; read-only.
                    example: 1
                    format: int32
                    readOnly: true
                    type: integer
                workflowStatusInfo:
                    $ref: "#/components/schemas/Status"
                    description:
                        Embedded workflow status descriptor exposing the integer code together with its label and localized label; read-only.
                    readOnly: true
            required:
                -   active
                -   name
                -   productType
            type: object
        ProductAccountGroup:
            description:
                Association between a product and an account group; admin catalog write view used to manage which account groups can see a product when `productAccountGroupFilter` is enabled on the parent product.
            properties:
                accountGroupId:
                    description:
                        Identifier of the account group; required to associate the product with an existing account group.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per product account group within the company; persisted on the underlying account group, not on the relation itself.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary key of the row that links the product to the account group.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the associated account group; read-only.
                    example: Alessio Antonio Rendina
                    type: string
            type: object
        ProductChannel:
            description:
                Association between a product and a commerce channel; admin catalog write view used to manage which commerce channels expose the product when `productChannelFilter` is enabled on the parent product.
            properties:
                channelId:
                    description:
                        Identifier of the commerce channel; required to associate the product with a sales channel.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                currencyCode:
                    description:
                        ISO 4217 currency code configured for the linked channel; read-only.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per product channel within the company; persisted on the underlying channel, not on the relation itself.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary key of the row that links the product to the channel.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the associated channel; read-only.
                    example: Alessio Antonio Rendina
                    type: string
                type:
                    description:
                        Type identifier of the associated channel; read-only and configured on the channel itself.
                    example: site
                    type: string
            type: object
        ProductConfiguration:
            description:
                Inventory, ordering, and fulfillment configuration for a single product or for a reusable configuration template; bundles inventory engine selection, order quantity rules, low-stock behavior, shipping dimensions, and tax classification under one configuration list entry.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of available operations for the current user keyed by action name such as `get`, `update`, and `delete`; each entry carries the URL template and HTTP method; the `delete` action is omitted on the master entry; read-only.
                    readOnly: true
                    type: object
                allowBackOrder:
                    description:
                        Whether customers can place orders when the item is out of stock.
                    example: true
                    type: boolean
                allowedOrderQuantities:
                    description:
                        Discrete order quantities the customer may pick from (for example 10, 20, 30); supplied as a space-separated list of numbers and exposed as a numeric array; when set, this list overrides the minimum, maximum, and step combination.
                    example:
                        -   10
                        -   20
                        -   30
                        -   40
                    items:
                        format: bigdecimal
                        type: number
                    type: array
                availabilityEstimateId:
                    description:
                        Identifier of the availability estimate label assigned on create or update and used to render `availabilityEstimateName`.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                availabilityEstimateName:
                    additionalProperties:
                        type: string
                    description:
                        Localized label for the availability estimate; map keys are locale codes such as `en_US` or `it_IT` and values are the translated strings.
                    example:
                        en_US: 3-5 Days
                        it_IT: 3-5 Giorni
                    type: object
                differences:
                    description:
                        Names of the fields whose stored values differ from the parent template snapshot; populated only when the `showDifferences` query parameter is true and the entry has a parent template; read-only.
                    example:
                        -   minOrderQuantity
                        -   maxOrderQuantity
                    items:
                        type: string
                    type: array
                displayAvailability:
                    description:
                        Whether the storefront displays availability information such as in stock, out of stock, or estimate to customers.
                    example: true
                    type: boolean
                displayStockQuantity:
                    description:
                        Whether the storefront displays the exact remaining stock count to customers.
                    example: true
                    type: boolean
                entityExternalReferenceCode:
                    description:
                        External reference code of the target entity; the product's external reference code when the entry points at a product, or null when it points at a template; read-only.
                    example: AB-34098-789-N
                    type: string
                entityId:
                    description:
                        Identifier of the target entity; the product identifier when the entry points at a product or the configuration list identifier when it points at a template.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                entityName:
                    description:
                        Localized name of the target product for the request locale; null when the entry points at a template; read-only.
                    example: ABS Sensor
                    type: string
                entityType:
                    description:
                        Discriminator on create indicating which entity the new entry targets; `product` resolves a product by external reference code or identifier, while `template` targets the parent configuration list; defaults to `product` when omitted.
                    enum:
                        -   product
                        -   template
                    example: product
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per product configuration within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Identifier of the product configuration; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                inventoryEngine:
                    description:
                        Key of the inventory engine that resolves stock for this product; defaults to `default`, which uses the embedded inventory record; custom engines may delegate to external inventory systems.
                    example: default
                    type: string
                lowStockAction:
                    description:
                        Key of the activity that runs when stock falls to or below the minimum stock quantity; the built-in `default` activity unpublishes the SKU.
                    example: default
                    type: string
                maxOrderQuantity:
                    description:
                        Maximum quantity a customer may include for this product in a single order; must be greater than zero; defaults to 10000 on create when omitted.
                    example: 10.1
                    format: bigdecimal
                    type: number
                minOrderQuantity:
                    description:
                        Minimum quantity a customer must include for this product in a single order; must be greater than zero; defaults to 1.
                    example: 10.1
                    format: bigdecimal
                    type: number
                minStockQuantity:
                    description:
                        Threshold at which the configured low-stock action is triggered; defaults to 1 on create; trailing zeros are stripped on read.
                    example: 10.1
                    format: bigdecimal
                    type: number
                multipleOrderQuantity:
                    description:
                        Step increment for order quantity; ordered quantities must be multiples of this value; must be greater than zero; defaults to 1.
                    example: 10.1
                    format: bigdecimal
                    type: number
                productShippingConfiguration:
                    $ref: "#/components/schemas/ProductShippingConfiguration"
                productTaxConfiguration:
                    $ref: "#/components/schemas/ProductTaxConfiguration"
                purchasable:
                    description:
                        Whether the product or SKU can be added to a cart and checked out; defaults to true on create.
                    example: true
                    type: boolean
            type: object
        ProductConfigurationList:
            description:
                Container that groups product configuration entries under a single inventory, shipping, and tax template; each catalog has one master configuration list used as the catalog-level default, and additional sub-templates can inherit from a parent and be qualified by account, account group, channel, or order type.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of available operations for the current user keyed by action name; each entry carries the URL template and HTTP method; read-only.
                    readOnly: true
                    type: object
                catalogExternalReferenceCode:
                    description:
                        External reference code of the catalog whose site owns this configuration list; on create, it is resolved first and falls back to `catalogId`; write-only.
                    example: AB-34098-789-N
                    type: string
                catalogId:
                    description:
                        Identifier of the catalog whose site owns this configuration list; used on create to derive the owning site when `catalogExternalReferenceCode` does not resolve; write-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                createDate:
                    description:
                        Timestamp when the configuration list was created; set by the service on persist; read-only.
                    example: 2017-07-21
                    format: date
                    type: string
                customFields:
                    description:
                        Custom field values defined for the configuration list; serialized for the request locale.
                    items:
                        type: customField
                    type: array
                displayDate:
                    description:
                        Date at which the configuration list becomes effective; interpreted in the requesting user's time zone; rejected when invalid.
                    example: 2017-07-21
                    format: date
                    type: string
                expirationDate:
                    description:
                        Date after which the configuration list is no longer effective; ignored when `neverExpire` is true; rejected when invalid.
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per product configuration list within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Identifier of the product configuration list; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                master:
                    description:
                        Whether this is the catalog-level default configuration list; a catalog has exactly one master list (a duplicate is rejected), the master cannot be deleted, and it seeds the default product configuration entry on creation.
                    example: true
                    type: boolean
                name:
                    description:
                        Administrative display name shown in the Commerce control panel; sortable.
                    example: Hand Saw
                    type: string
                neverExpire:
                    description:
                        When true, the expiration date is ignored and the configuration list never expires; defaults to true on create or update when the field is omitted.
                    example: true
                    type: boolean
                parentProductConfigurationListId:
                    description:
                        Identifier of the parent configuration list; enables inheritance, with child lists copying parent entry snapshots on creation; the parent must belong to the same site as the child.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                priority:
                    description:
                        Display weight used to order qualified lists ascending before applying account, account group, channel, and order-type tie-breakers.
                    example: 1.2
                    format: double
                    type: number
                productConfigurations:
                    description:
                        Nested product configuration entries associated with this list; supplying entries on create or update triggers nested calls to create or update each entry.
                    items:
                        $ref: "#/components/schemas/ProductConfiguration"
                    type: array
            type: object
