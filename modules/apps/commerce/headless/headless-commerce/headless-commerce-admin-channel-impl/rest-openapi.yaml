components:
    parameters:
        accountAddressChannelIdPathParam:
            in: path
            description:
                Identifier of an account-address-channel binding. Addresses a single mapping that scopes an account
                address to a specific channel for shipping or billing eligibility.
            explode: false
            name: accountAddressChannelId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        addressIdPathParam:
            in: path
            description:
                Identifier of an account address. Addresses a single postal address attached to a commerce account.
            explode: false
            name: addressId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        channelAccountIdPathParam:
            in: path
            description:
                Identifier of a channel-account link. Addresses a single association that grants one commerce account
                access to a channel.
            explode: false
            name: channelAccountId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        channelIdPathParam:
            in: path
            description:
                Identifier of a commerce channel. Addresses a single storefront bound to a Liferay site, with its own
                currency, account visibility, and display pages.
            explode: false
            name: channelId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target resource on the `by-externalReferenceCode` paths. The
                code is the integration-supplied idempotency key, unique within the resource scope; it is assigned by
                the client rather than the server.
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. Supported fields depend on the endpoint and are
                sourced from the matching entity model; see the per-resource list operation description for specifics.
                For example, filter=externalReferenceCode eq 'AB-34098-789-N'.
            name: filter
            required: false
            schema:
                type: string
        idPathParam:
            in: path
            description:
                Internal numeric identifier of the target resource. Counterpart to the `by-externalReferenceCode` path
                variant; identifiers are server-assigned and stable across the resource's lifetime.
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        pageQueryParam:
            in: query
            description:
                1-based page number for paginated responses. Defaults to 1.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items per page. Defaults to the portal's configured page size when omitted; capped by the
                portal configuration to prevent unbounded reads.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        paymentMethodGroupRelOrderTypeIdPathParam:
            in: path
            description:
                Identifier of a binding between a payment method group and an order type. Addresses a single rule
                controlling which payment options apply for a given order type.
            explode: false
            name: paymentMethodGroupRelOrderTypeId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        paymentMethodGroupRelTermIdPathParam:
            in: path
            description:
                Identifier of a binding between a payment method group and a commerce term. Addresses a single rule
                controlling which payment options apply when that term is in effect.
            explode: false
            name: paymentMethodGroupRelTermId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        searchQueryParam:
            in: query
            description:
                Free-text search applied to the resource's full-text indexed fields. Multiple terms are AND-combined.
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        shippingFixedOptionOrderTypeIdPathParam:
            in: path
            description:
                Identifier of a binding between a fixed-rate shipping option and an order type. Addresses a single rule
                restricting that shipping option to the order type.
            explode: false
            name: shippingFixedOptionOrderTypeId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        shippingFixedOptionTermIdPathParam:
            in: path
            description:
                Identifier of a binding between a fixed-rate shipping option and a commerce term. Addresses a single
                rule restricting that shipping option to the term.
            explode: false
            name: shippingFixedOptionTermId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        sortQueryParam:
            in: query
            description:
                Sort expression of the form `field:asc` or `field:desc`, comma-separated for multi-field sorting (for
                example, name:asc,createDate:desc). Supported sort fields depend on the endpoint and are sourced from
                the matching entity model; see the per-resource list operation description for specifics.
            name: sort
            required: false
            schema:
                type: string
    schemas:
        Account:
            description:
                Lightweight projection of a commerce account, returned by channel-relationship endpoints to identify the
                linked account; full account management is performed through the Account admin API.
            properties:
                id:
                    description:
                        Internal long ID of the linked account; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    description:
                        Display name of the linked account; read-only.
                    example: Account Name
                    readOnly: true
                    type: string
            type: object
        AccountAddress:
            description:
                Postal address attached to a commerce account; used as the shipping or billing target on orders placed
                by that account. Returned by channel-relationship endpoints; full address management is performed
                through the Account admin API.
            properties:
                city:
                    description:
                        City portion of the postal address.
                    example: Diamond Bar
                    type: string
                countryISOCode:
                    description:
                        ISO 3166-1 alpha-2 country code; required on create.
                    example: US
                    type: string
                defaultBilling:
                    description:
                        When true, this address is the account's default billing address.
                    example: true
                    type: boolean
                defaultShipping:
                    description:
                        When true, this address is the account's default shipping address.
                    example: true
                    type: boolean
                description:
                    description:
                        Free-text annotation attached to the address.
                    example: right stairs, first room on the left
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per address within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal long ID of the AccountAddress record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                latitude:
                    description:
                        Latitude of the address in WGS84 decimal degrees.
                    example: 33.9976884
                    format: double
                    type: number
                longitude:
                    description:
                        Longitude of the address in WGS84 decimal degrees.
                    example: -117.8144595
                    format: double
                    type: number
                name:
                    description:
                        Recipient or addressee name on the address.
                    example: Alessio Antonio Rendina
                    type: string
                phoneNumber:
                    description:
                        Contact phone number for delivery-related communication.
                    example: (123) 456 7890
                    type: string
                regionISOCode:
                    description:
                        ISO 3166-2 region (state/province) code.
                    example: CA
                    type: string
                street1:
                    description:
                        First line of the street address (number and street).
                    example: 1400 Montefino Ave
                    type: string
                street2:
                    description:
                        Second line of the street address (apt, suite, floor).
                    example: 1st floor
                    type: string
                street3:
                    description:
                        Third line of the street address (additional addressing detail).
                    example: suite 200
                    type: string
                subtype:
                    description:
                        Free-text address subtype tag.
                    example: box
                    type: string
                type:
                    description:
                        Integer address type with values 1=Billing, 2=Billing-and-Shipping, 3=Shipping. Read-only on
                        this projection; the underlying address is created and updated through the Account admin API,
                        which rejects out-of-range values with 400.
                    example: 1
                    format: int32
                    maximum: 3
                    minimum: 1
                    readOnly: true
                    type: integer
                zip:
                    description:
                        Postal code (ZIP code).
                    example: "91765"
                    type: string
            required:
                -   city
                -   countryISOCode
                -   name
                -   street1
            type: object
        AccountAddressChannel:
            description:
                Binding that scopes a specific account address to a specific channel; controls whether the address is
                eligible for shipping or billing within that storefront. Created on POST and deleted on DELETE; no
                update operation.
            properties:
                accountAddressChannelId:
                    description:
                        Internal long ID of the AccountAddressChannel record; read-only.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                addressChannelExternalReferenceCode:
                    description:
                        Reference to the Channel by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                addressChannelId:
                    description:
                        Reference to the Channel (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                addressExternalReferenceCode:
                    description:
                        Reference to the AccountAddress by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                addressId:
                    description:
                        Reference to the AccountAddress (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                channel:
                    allOf:
                        -   $ref: "#/components/schemas/Channel"
                    description:
                        Embedded snapshot of the channel side of this binding; read-only.
                    readOnly: true
            required:
                -   addressChannelId
                -   addressId
            type: object
        CategoryDisplayPage:
            description:
                Per-category mapping that overrides the channel's default category site page, allowing a category to
                render through a different page for SEO or merchandising purposes. Created on POST and removed on
                DELETE; the channel falls back to its DefaultCategoryDisplayPage when no mapping exists.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                categoryExternalReferenceCode:
                    description:
                        Reference to the Category by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                categoryId:
                    description:
                        Reference to the Category (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                groupExternalReferenceCode:
                    description:
                        Reference by external reference code to the Liferay site that owns the category mapping (FK
                        alternate key).
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal long ID of the CategoryDisplayPage record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                pageUuid:
                    description:
                        UUID of the Liferay site page used to render this mapping; drives the resolved URL for SEO and
                        merchandising.
                    example: aabb9d9d-60a3-429b-0005-294945e2b956
                    type: string
            type: object
        Channel:
            description:
                Storefront bound to a Liferay site that pins a currency, account-visibility set, fulfilment rules, and
                SEO display pages for the products it exposes. Created on POST, updated on PATCH and PUT, and listed by
                the matching GET endpoint.
            properties:
                accountExternalReferenceCode:
                    description:
                        Reference to the Account by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                accountId:
                    description:
                        Reference to the Account (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                currencyCode:
                    description:
                        ISO 4217 currency code applied to every monetary amount handled by this channel; required on
                        create and must match a currency configured for the company. On PATCH an unrecognized code is
                        ignored and the channel's current currency is preserved; on PUT the code must resolve to an
                        existing currency or the request fails with 404.
                    example: USD
                    type: string
                currencyExternalReferenceCode:
                    description:
                        Reference to the Currency by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                currencyId:
                    description:
                        Reference to the Currency (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per channel within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal long ID of the Channel record; read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        Non-localized display name of the channel; required on create and sanitized server-side.
                    example: EU Storefront
                    type: string
                siteGroupId:
                    description:
                        Reference to the Liferay site that backs this channel (FK identifier); drives content scoping,
                        theme, and language settings.
                    example: 20121
                    format: int64
                    type: integer
                type:
                    description:
                        Channel-taxonomy key registered with the server's channel-type SPI; values not registered are
                        rejected with 400. The default deployment registers a single key, `site`, for site-backed
                        storefronts; additional keys may be added by extensions.
                    example: site
                    type: string
            required:
                -   currencyCode
                -   name
                -   type
            type: object
        ChannelAccount:
            description:
                Association that grants a commerce account access to a channel; controls whether the account can browse
                or purchase on the storefront. Created on POST and removed on DELETE; no update operation.
            properties:
                account:
                    allOf:
                        -   $ref: "#/components/schemas/Account"
                    description:
                        Embedded snapshot of the linked Account; read-only.
                    readOnly: true
                accountExternalReferenceCode:
                    description:
                        Reference to the Account by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                accountId:
                    description:
                        Reference to the Account (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                channelAccountId:
                    description:
                        Internal long ID of the ChannelAccount record; read-only.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                channelExternalReferenceCode:
                    description:
                        Reference to the Channel by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                channelId:
                    description:
                        Reference to the Channel (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            required:
                -   accountId
                -   channelId
            type: object
        DefaultCategoryDisplayPage:
            description:
                Channel-level setting that names the fallback Liferay site page used to render any product category that
                has no explicit CategoryDisplayPage mapping. Backed by the channel's group settings under the
                `assetCategoryLayoutUuid` key; written through POST.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                pageUuid:
                    description:
                        UUID of the Liferay site page used to render this mapping; drives the resolved URL for SEO and
                        merchandising.
                    example: aabb9d9d-60a3-429b-0005-294945e2b956
                    type: string
            type: object
        DefaultProductDisplayPage:
            description:
                Channel-level setting that names the fallback Liferay site page used to render any product that has no
                explicit ProductDisplayPage mapping. Backed by the channel's group settings under the
                `productLayoutUuid` key; written through POST.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                pageUuid:
                    description:
                        UUID of the Liferay site page used to render this mapping; drives the resolved URL for SEO and
                        merchandising.
                    example: aabb9d9d-60a3-429b-0005-294945e2b956
                    type: string
            type: object
        Error:
            description:
                Standard response envelope returned for every non-2xx outcome; carries a numeric code, an end-user
                description, an internal message, and the matching HTTP status.
            properties:
                errorCode:
                    description:
                        Numeric error code identifying the failure class for programmatic handling; read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        End-user-facing error description suitable for surfacing to clients.
                    example: Unable to find currency. Currency code should be expressed with
                        3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Internal error message intended for debugging and server-side logs.
                    example: No CommerceCurrency exists with the key {groupId=41811, code=US
                        Dollar}
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code matching the response status line; read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        OrderType:
            description:
                Order classification referenced by orders to drive downstream processing such as payment-method
                eligibility and shipping rules. Read-only on this projection; created and updated through the Order
                admin API.
            properties:
                id:
                    description:
                        Internal long ID of the OrderType record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
            type: object
        PaymentMethodGroupRelOrderType:
            description:
                Binding that enables a payment-method group for a specific OrderType; controls which payment options
                appear at checkout for that order kind. Created on POST and removed on DELETE; no update operation.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                orderType:
                    allOf:
                        -   $ref: "#/components/schemas/OrderType"
                    description:
                        Embedded snapshot of the linked OrderType; read-only.
                    readOnly: true
                orderTypeExternalReferenceCode:
                    description:
                        Reference to the OrderType by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                orderTypeId:
                    description:
                        Reference to the OrderType (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                paymentMethodGroupRelId:
                    description:
                        Reference to the PaymentMethodGroupRel (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                paymentMethodGroupRelOrderTypeId:
                    description:
                        Internal long ID of the PaymentMethodGroupRelOrderType record; read-only.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                priority:
                    description:
                        Reserved for future use; the converter does not currently populate this field and the runtime
                        returns null.
                    example: 1
                    format: int32
                    minimum: 0
                    readOnly: true
                    type: integer
            required:
                -   paymentMethodGroupRelId
                -   orderTypeId
            type: object
        PaymentMethodGroupRelTerm:
            description:
                Binding that enables a payment-method group for a specific commerce Term; controls which payment options
                apply when that term is in effect. Created on POST and removed on DELETE; no update operation.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                paymentMethodGroupRelId:
                    description:
                        Reference to the PaymentMethodGroupRel (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                paymentMethodGroupRelTermId:
                    description:
                        Internal long ID of the PaymentMethodGroupRelTerm record; read-only.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                term:
                    allOf:
                        -   $ref: "#/components/schemas/Term"
                    description:
                        Embedded snapshot of the linked Term; read-only.
                    readOnly: true
                termExternalReferenceCode:
                    description:
                        Reference to the Term by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                termId:
                    description:
                        Reference to the Term (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            required:
                -   paymentMethodGroupRelId
                -   termId
            type: object
        ProductDisplayPage:
            description:
                Per-product mapping that overrides the channel's default product site page, allowing a product to render
                through a different page (and optionally a page template) for SEO or merchandising purposes. Created on
                POST and removed on DELETE; the channel falls back to its DefaultProductDisplayPage when no mapping
                exists.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                id:
                    description:
                        Internal long ID of the ProductDisplayPage record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                pageTemplateUuid:
                    description:
                        UUID of the Liferay page template used to render the resolved product page when set.
                    example: aabb9d9d-60a3-429b-0005-294945e2b957
                    type: string
                pageUuid:
                    description:
                        UUID of the Liferay site page used to render this mapping; drives the resolved URL for SEO and
                        merchandising.
                    example: aabb9d9d-60a3-429b-0005-294945e2b956
                    type: string
                productExternalReferenceCode:
                    description:
                        Reference to the Product by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                productId:
                    description:
                        Reference to the Product (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            type: object
        ShippingFixedOptionOrderType:
            description:
                Binding that restricts a fixed-rate shipping option to a specific OrderType; the option appears only
                when the order matches that type. Created on POST and removed on DELETE; no update operation.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                orderType:
                    allOf:
                        -   $ref: "#/components/schemas/OrderType"
                    description:
                        Embedded snapshot of the linked OrderType; read-only.
                    readOnly: true
                orderTypeExternalReferenceCode:
                    description:
                        Reference to the OrderType by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                orderTypeId:
                    description:
                        Reference to the OrderType (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                priority:
                    description:
                        Reserved for future use; the converter does not currently populate this field and the runtime
                        returns null.
                    example: 1
                    format: int32
                    minimum: 0
                    readOnly: true
                    type: integer
                shippingFixedOptionId:
                    description:
                        Reference to the ShippingFixedOption (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                shippingFixedOptionOrderTypeId:
                    description:
                        Internal long ID of the ShippingFixedOptionOrderType record; read-only.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
            required:
                -   shippingFixedOptionId
                -   orderTypeId
            type: object
        ShippingFixedOptionTerm:
            description:
                Binding that restricts a fixed-rate shipping option to a specific commerce Term; the option appears only
                when that term is in effect. Created on POST and removed on DELETE; no update operation.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries
                        the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                shippingFixedOptionId:
                    description:
                        Reference to the ShippingFixedOption (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                shippingFixedOptionTermId:
                    description:
                        Internal long ID of the ShippingFixedOptionTerm record; read-only.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                term:
                    allOf:
                        -   $ref: "#/components/schemas/Term"
                    description:
                        Embedded snapshot of the linked Term; read-only.
                    readOnly: true
                termExternalReferenceCode:
                    description:
                        Reference to the Term by its external reference code (FK alternate key).
                    example: AB-34098-789-N
                    type: string
                termId:
                    description:
                        Reference to the Term (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            required:
                -   shippingFixedOptionId
                -   termId
            type: object
        ShippingMethod:
            description:
                Shipping method available on a channel; selectable by customers at checkout. Read-only on this
                projection; full shipping-method management lives in the Shipment admin API.
            properties:
                active:
                    description:
                        When true, the shipping method is enabled and offered at checkout; when false, it is hidden but
                        preserved.
                    example: true
                    type: boolean
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the
                        translated strings.
                    example:
                        en_US: Professional hand stainless steel saw for wood. Made to last and
                            saw forever. Made of best steel
                        hr_HR: Product Description HR
                        hu_HU: Product Description HU
                    type: object
                engineKey:
                    description:
                        Key of the shipping-engine backing this method, registered server-side. The default deployment
                        registers `fixed` (flat-rate per option), `by-weight` (rate from a weight-bracket table), and
                        engines contributed by extensions.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal long ID of the ShippingMethod record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Professional hand stainless steel saw for wood. Made to last and
                            saw forever. Made of best steel
                        hr_HR: Product Description HR
                        hu_HU: Product Description HU
                    type: object
                priority:
                    description:
                        Sort order applied when listing shipping methods at checkout; lower values come first.
                    example: 1.2
                    format: double
                    type: number
                shippingOptions:
                    description:
                        Embedded list of shipping options exposed by this method; read-only.
                    items:
                        $ref: "#/components/schemas/ShippingOption"
                    readOnly: true
                    type: array
            type: object
        ShippingOption:
            description:
                Individual shipping option exposed by a ShippingMethod with its rate, ordering, and active flag.
                Read-only on this projection; full shipping-option management lives in the Shipment admin API.
            properties:
                active:
                    description:
                        When true, the option is selectable at checkout; when false, it is hidden but preserved.
                    example: true
                    type: boolean
                amount:
                    description:
                        Shipping cost expressed in the parent channel's currency; tax-inclusive or tax-exclusive per the
                        channel's price-display configuration.
                    example: 1.2
                    format: double
                    type: number
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the
                        translated strings.
                    example:
                        en_US: Professional hand stainless steel saw for wood. Made to last and
                            saw forever. Made of best steel
                        hr_HR: Product Description HR
                        hu_HU: Product Description HU
                    type: object
                id:
                    description:
                        Internal long ID of the ShippingOption record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Professional hand stainless steel saw for wood. Made to last and
                            saw forever. Made of best steel
                        hr_HR: Product Description HR
                        hu_HU: Product Description HU
                    type: object
                priority:
                    description:
                        Sort order applied when listing options inside a shipping method; lower values come first.
                    example: 1.2
                    format: double
                    type: number
            type: object
        TaxCategory:
            description:
                Tax classification assigned to products to drive tax calculation at checkout. Read-only on this
                projection; full tax-category management lives in the Site Setting admin API.
            properties:
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the
                        translated strings.
                    example:
                        en_US: Croatia
                        hr_HR: Hrvatska
                        hu_HU: Horvatorszag
                    type: object
                groupId:
                    description:
                        Reference to the Liferay site that owns this tax category (FK identifier); read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                id:
                    description:
                        Internal long ID of the TaxCategory record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Croatia
                        hr_HR: Hrvatska
                        hu_HU: Horvatorszag
                    type: object
            required:
                -   name
            type: object
        Term:
            description:
                Commerce term (delivery, payment, or warranty condition) that can be attached to orders, payment
                methods, or shipping options. Read-only on this projection; full term management lives in the Payment
                and Site Setting admin APIs.
            properties:
                id:
                    description:
                        Internal long ID of the Term record; read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    description:
                        Identifier-style name of the commerce term; normalized server-side using the friendly-URL rules
                        and unique per company. Read-only on this projection.
                    example: simple
                    readOnly: true
                    type: string
            type: object
info:
    description:
        "Configure commerce channels (storefronts) bound to Liferay sites. Each channel pins a currency, an
        account-visibility set, fulfilment rules, and SEO display pages. Enables multi-currency / multi-region
        storefronts on a single product catalog. Primary entities: Channel, ChannelAccount, AccountAddressChannel,
        OrderType, CategoryDisplayPage, DefaultProductDisplayPage, DefaultCategoryDisplayPage. Operates admin-side
        (merchandiser or system administrator configuring storefront topology); the buyer-facing surfaces of these
        entities are served by the headless-commerce-delivery-* module family. Cross-references to sibling admin
        modules: full account and address management lives in headless-commerce-admin-account-impl; shipping-method
        configuration in headless-commerce-admin-shipment-impl; OrderType definitions and order lifecycle in
        headless-commerce-admin-order-impl; payment-method groups and term entries in
        headless-commerce-admin-payment-impl; tax-category administration in headless-commerce-admin-site-setting-impl.
        Common workflows: Launch a regional storefront by posting to /channels with currencyCode (for example EUR),
        siteGroupId, and type (for example site, the channel-taxonomy key registered by the default deployment); then
        post to /channels/<id>/channel-accounts (or by-externalReferenceCode) for each eligible Account; then post to
        /channels/<id>/default-product-display-pages (or by-externalReferenceCode) with the SEO template pageUuid, and
        repeat with /default-category-display-pages for categories. -- OrderType entries (e.g. Quote-to-Order or Direct
        Purchase), created via the order admin API, are referenced by Channel-bound bindings such as
        PaymentMethodGroupRelOrderType and ShippingFixedOptionOrderType to govern downstream processing. A Java client
        JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.headless.commerce.admin.channel.client', and version '4.0.47'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Admin Channel API
    version: v1.0
openapi: 3.0.0
