tags:
    -   description:
            Read-only references to Liferay Commerce accounts reachable via channel-relationship endpoints; full account
            management lives in the Account admin API.
        name: Account
    -   description:
            Bindings of account addresses to specific channels to scope shipping or billing eligibility.
        name: AccountAddressChannel
    -   description:
            Mappings of product categories to SEO-friendly display pages within a channel.
        name: CategoryDisplayPage
    -   description:
            Storefronts bound to Liferay sites that pin a currency, account-visibility set, fulfilment rules, and SEO
            display pages.
        name: Channel
    -   description:
            Links between accounts and channels controlling which accounts can purchase or browse a given storefront.
        name: ChannelAccount
    -   description:
            Channel-level default display page used for categories when no explicit CategoryDisplayPage mapping exists.
        name: DefaultCategoryDisplayPage
    -   description:
            Channel-level default display page used for products when no explicit ProductDisplayPage mapping exists.
        name: DefaultProductDisplayPage
    -   description:
            Order classifications that downstream Order entities reference to govern processing behaviour.
        name: OrderType
    -   description:
            Bindings between a payment method group and an OrderType, controlling which payment options apply for a
            given order kind.
        name: PaymentMethodGroupRelOrderType
    -   description:
            Bindings between a payment method group and a commerce Term, controlling which payment options apply when
            that term is in effect.
        name: PaymentMethodGroupRelTerm
    -   description:
            Mappings of products to SEO-friendly display pages within a channel.
        name: ProductDisplayPage
    -   description:
            Bindings that restrict a fixed-rate shipping option to a specific OrderType.
        name: ShippingFixedOptionOrderType
    -   description:
            Bindings that restrict a fixed-rate shipping option to a specific commerce Term.
        name: ShippingFixedOptionTerm
    -   description:
            Read-only references to shipping methods enabled on a channel; full shipping method management lives in the
            Shipment admin API.
        name: ShippingMethod
    -   description:
            Read-only references to tax classifications visible to the channel; full tax category management lives in
            the Site Setting admin API.
        name: TaxCategory
    -   description:
            Read-only references to commerce terms reachable via channel-relationship endpoints; full term management
            lives in the Payment and Site Setting admin APIs.
        name: Term