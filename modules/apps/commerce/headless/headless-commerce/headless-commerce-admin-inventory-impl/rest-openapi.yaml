tags:
    -   description:
            Read-only projection of the account record referenced by a warehouse-account binding. Exposes the id, logo, and display name only; the writable account surface lives in the account admin API.
        name: Account
    -   description:
            Read-only projection of the account group referenced by a warehouse-account-group binding. Exposes the id and display name only; the writable account-group surface lives in the account admin API.
        name: AccountGroup
    -   description:
            Read-only projection of the channel referenced by a warehouse-channel binding. Exposes the id, externalReferenceCode, name, currency code, site group, and channel type; the writable channel surface lives in the channel admin API.
        name: Channel
    -   description:
            Read-only projection of the order type referenced by a warehouse-order-type binding. Exposes the id and localized name only; the writable order-type surface lives in the order admin API.
        name: OrderType
    -   description:
            Planned restock event for a SKU at a warehouse. Records the expected quantity and the availability date so on-hand stock can be reconciled with future arrivals; addressable by id or externalReferenceCode and created either under the SKU or under a specific warehouse.
        name: ReplenishmentItem
    -   description:
            Physical or logical fulfillment location that holds inventory. Carries the address, geo-coordinates, and the active flag that decides eligibility for sourcing stock; the upsert path keys on externalReferenceCode and cascades through every binding when the warehouse is deleted.
        name: Warehouse
    -   description:
            Binding that scopes a warehouse to a specific account, restricting which buyer the warehouse can source inventory for. Created under the parent warehouse and removed through its own top-level resource path; duplicate bindings raise 400.
        name: WarehouseAccount
    -   description:
            Binding that scopes a warehouse to a specific account group, restricting which buyer cohort the warehouse can source inventory for. Created under the parent warehouse and removed through its own top-level resource path; duplicate bindings raise 400.
        name: WarehouseAccountGroup
    -   description:
            Binding that scopes a warehouse to a specific channel, restricting which storefront the warehouse can source inventory for. Created under the parent warehouse and removed through its own top-level resource path; duplicate bindings raise 409.
        name: WarehouseChannel
    -   description:
            On-hand inventory record for one SKU at one warehouse, scaled to a unit-of-measure key. Carries the total quantity and the reserved quantity; the available-for-sale figure is the difference between the two and is not surfaced as a separate property.
        name: WarehouseItem
    -   description:
            Binding that scopes a warehouse to a specific order type, restricting which order kinds the warehouse can source inventory for. Created under the parent warehouse and removed through its own top-level resource path; duplicate bindings raise 400.
        name: WarehouseOrderType