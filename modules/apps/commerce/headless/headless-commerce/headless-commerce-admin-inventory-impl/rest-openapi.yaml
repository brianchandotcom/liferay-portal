components:
    parameters:
        endQueryParam:
            in: query
            name: end
            required: false
            schema:
                description:
                    Ending date of the timespan for which to retrieve updated warehouse items, in ISO 8601 date format (YYYY-MM-DD). When omitted, defaults to today; when start is also omitted, the implementation uses today as the window end.
                format: date
                type: string
        externalReferenceCodePathParam:
            in: path
            name: externalReferenceCode
            required: true
            schema:
                description:
                    Idempotency key supplied by the client to identify the entity across systems. Unique per entity type within the company.
                example: AB-34098-789-N
                minLength: 1
                type: string
        filterQueryParam:
            in: query
            name: filter
            required: false
            schema:
                description:
                    OData v4 filter expression applied to the listing. Filterable fields on Warehouse -- active, latitude, longitude, city, countryISOCode, name, regionISOCode, street1. Other list endpoints in this module ignore the filter parameter.
                type: string
        idPathParam:
            in: path
            name: id
            required: true
            schema:
                description:
                    Internal numeric primary key of the entity.
                example: 30130
                format: int64
                minimum: 0
                type: integer
        pageQueryParam:
            in: query
            name: page
            required: false
            schema:
                description:
                    One-based page index. Combined with pageSize to paginate the result set.
                type: integer
        pageSizeQueryParam:
            in: query
            name: pageSize
            required: false
            schema:
                description:
                    Maximum number of entries to return per page. When omitted, the portal default applies.
                type: integer
        replenishmentItemIdPathParam:
            in: path
            name: replenishmentItemId
            required: true
            schema:
                description:
                    Internal numeric primary key of the ReplenishmentItem (commerceInventoryReplenishmentItemId).
                example: 30130
                format: int64
                minimum: 0
                type: integer
        searchQueryParam:
            in: query
            name: search
            required: false
            schema:
                description:
                    Full-text search expression applied to the indexed fields of the listing. On Warehouse, matches against the indexed warehouse fields; on binding listings, matches against the related entity name.
                type: string
        skuPathParam:
            in: path
            name: sku
            required: true
            schema:
                description:
                    SKU (stock keeping unit) of the catalog item the replenishment plan or warehouse item is keyed on.
                example: SKU
                type: string
        sortQueryParam:
            in: query
            name: sort
            required: false
            schema:
                description:
                    Comma-separated list of fields with optional :asc or :desc suffix. Sortable fields on Warehouse -- active, latitude, longitude, city, countryISOCode, name, regionISOCode, street1. Other list endpoints in this module ignore the sort parameter.
                type: string
        startQueryParam:
            in: query
            name: start
            required: false
            schema:
                description:
                    Starting date of the timespan for which to retrieve updated warehouse items, in ISO 8601 date format (YYYY-MM-DD). When omitted but end is supplied, the implementation rewinds 30 days from end; when both are omitted, the window is the trailing 30 days.
                format: date
                type: string
        warehouseAccountGroupIdPathParam:
            in: path
            name: warehouseAccountGroupId
            required: true
            schema:
                description:
                    Internal numeric primary key of the WarehouseAccountGroup binding (commerceInventoryWarehouseRelId where the related entity is an AccountGroup).
                example: 30130
                format: int64
                minimum: 0
                type: integer
        warehouseAccountIdPathParam:
            in: path
            name: warehouseAccountId
            required: true
            schema:
                description:
                    Internal numeric primary key of the WarehouseAccount binding (commerceInventoryWarehouseRelId where the related entity is an AccountEntry).
                example: 30130
                format: int64
                minimum: 0
                type: integer
        warehouseChannelIdPathParam:
            in: path
            name: warehouseChannelId
            required: true
            schema:
                description:
                    Internal numeric primary key of the WarehouseChannel binding (commerceChannelRelId on the CommerceChannelRel row).
                example: 30130
                format: int64
                minimum: 0
                type: integer
        warehouseIdPathParam:
            in: path
            name: warehouseId
            required: true
            schema:
                description:
                    Internal numeric primary key of the Warehouse the request targets.
                example: 30130
                format: int64
                minimum: 0
                type: integer
        warehouseOrderTypeIdPathParam:
            in: path
            name: warehouseOrderTypeId
            required: true
            schema:
                description:
                    Internal numeric primary key of the WarehouseOrderType binding (commerceInventoryWarehouseRelId where the related entity is a CommerceOrderType).
                example: 30130
                format: int64
                minimum: 0
                type: integer
    schemas:
        Account:
            description:
                Read-only projection of the account referenced by a WarehouseAccount binding -- exposes only id, logoId, and name.
            properties:
                id:
                    description:
                        Reference to the account record (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                logoId:
                    description:
                        Reference to the image asset that holds the account's logo (FK identifier). Zero when no logo is attached. Read-only.
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the account. Plain string -- not localized. Read-only.
                    example: Account Name
                    type: string
            type: object
        AccountGroup:
            description:
                Read-only projection of the AccountGroup referenced by a WarehouseAccountGroup binding -- exposes only id and name.
            properties:
                id:
                    description:
                        Reference to the account group record (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    description:
                        Display name of the account group. Plain string -- not localized. Read-only.
                    example: AccountGroup Name
                    type: string
            type: object
        Channel:
            description:
                Read-only projection of the channel referenced by a WarehouseChannel binding -- exposes only id, externalReferenceCode, name, currencyCode, siteGroupId, and channel type.
            properties:
                currencyCode:
                    description:
                        Three-letter ISO 4217 currency code of the channel's pricing currency. Read-only.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per channel within the company. Read-only.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the channel (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    type: integer
                name:
                    description:
                        Display name of the channel. Plain string -- not localized. Read-only.
                    example: Sample Storefront
                    type: string
                siteGroupId:
                    description:
                        Reference to the Group (site) the channel is bound to (FK identifier). Read-only.
                    example: 20136
                    format: int64
                    type: integer
                type:
                    description:
                        Channel type discriminator. The only in-tree value is `site`; other values are reserved for OSGi extensions. Read-only.
                    example: site
                    type: string
            type: object
        Error:
            description:
                Standard error envelope returned on every non-2xx response. Populated by the request-handler exception mappers with an internal errorCode, the HTTP status code, a human-readable message, and a stable errorDescription category.
            properties:
                errorCode:
                    description:
                        Internal error code identifying the specific failure within the request-handler exception mapper. Read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Stable, machine-friendly category of the failure (for example, the kind of validation that rejected the request). Read-only.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Human-readable error message with the offending parameter values interpolated. Read-only.
                    example: No CommerceCurrency exists with the key {groupId=41811, code=US Dollar}
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code mirrored from the response line. Read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        OrderType:
            description:
                Read-only projection of the order type referenced by a WarehouseOrderType binding -- exposes only id and the localized name map.
            properties:
                id:
                    description:
                        Reference to the order type record (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized order-type display name. Map keys are locale codes; values are the translated strings. Read-only.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
            type: object
        ReplenishmentItem:
            description:
                Planned restock event for a SKU at a warehouse. Records the expected quantity (strictly positive) and the date it becomes available; on create the underlying warehouse item identified by warehouseId and sku must already exist.
            properties:
                availabilityDate:
                    description:
                        Date the planned restock becomes available, in ISO 8601 date format (YYYY-MM-DD). Optional -- a missing value is allowed.
                    example: 2017-07-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per replenishment item within the company. Optional on create; the runtime accepts a blank value.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal numeric identifier of the replenishment item; read-only and assigned by the service on create; immutable thereafter.
                    example: 30130
                    format: int64
                    type: integer
                quantity:
                    description:
                        Planned restock quantity, scaled to the unitOfMeasureKey precision. Must be strictly positive; values of zero or below are rejected. The runtime formats the persisted decimal through the commerce quantity formatter on read.
                    example: 10.1
                    format: bigdecimal
                    type: number
                sku:
                    description:
                        SKU (stock keeping unit) the planned restock targets. Required and non-blank on create; immutable on update -- a different SKU cannot be patched onto an existing replenishment item.
                    example: SKU
                    type: string
                unitOfMeasureKey:
                    description:
                        Key of the unit-of-measure the quantity is expressed in. Empty string denotes the SKU's default unit. Immutable on update.
                    example: lt
                    type: string
                warehouseId:
                    description:
                        Reference to the warehouse the planned restock targets (FK identifier). Immutable on update.
                    example: 30130
                    format: int64
                    type: integer
            type: object
        Warehouse:
            description:
                Fulfillment location that holds inventory for one or more channels, accounts, account groups, and order types. Carries the address, geo-coordinates, and active flag; cannot be activated unless latitude or longitude is non-zero. Supports OData filter and sort over active, latitude, longitude, city, countryISOCode, name, regionISOCode, and street1, plus full-text search over the indexed warehouse fields.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                active:
                    description:
                        When true, the warehouse is eligible to source inventory. Activating the warehouse requires that latitude or longitude is non-zero; otherwise the service rejects the change.
                    example: true
                    type: boolean
                city:
                    description:
                        City line of the warehouse postal address. Matched by the search query parameter. Filterable and sortable via the OData query parameter.
                    example: Diamond Bar
                    type: string
                countryISOCode:
                    description:
                        Two-letter ISO 3166-1 alpha-2 country code of the warehouse address. Matched by the search query parameter. Filterable and sortable via the OData query parameter.
                    example: US
                    type: string
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized warehouse description. Map keys are locale codes; values are the translated strings. Matched by the search query parameter.
                    example:
                        en_US: Warehouse Description US
                        hr_HR: Warehouse Description HR
                        hu_HU: Warehouse Description HU
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per warehouse within the company. Optional on create -- when blank the runtime accepts the row without an external reference code.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal numeric identifier of the warehouse; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                latitude:
                    description:
                        Geographic latitude of the warehouse in decimal degrees. Required to be non-zero (in combination with longitude) before the warehouse can be activated. Filterable and sortable via the OData query parameter.
                    example: 33.9976884
                    format: double
                    type: number
                longitude:
                    description:
                        Geographic longitude of the warehouse in decimal degrees. Required to be non-zero (in combination with latitude) before the warehouse can be activated. Filterable and sortable via the OData query parameter.
                    example: -117.8144595
                    format: double
                    type: number
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized warehouse display name. Map keys are locale codes; values are the translated strings. Required on create -- a blank or empty map is rejected. Matched by the search query parameter. Filterable and sortable via the OData query parameter.
                    example:
                        en_US: Warehouse Name US
                        hr_HR: Warehouse Name HR
                        hu_HU: Warehouse Name HU
                    type: object
                regionISOCode:
                    description:
                        Region code of the warehouse address (sub-national administrative division). Filterable and sortable via the OData query parameter.
                    example: CA
                    type: string
                street1:
                    description:
                        First line of the warehouse street address. Matched by the search query parameter. Filterable and sortable via the OData query parameter.
                    example: 1400 Montefino Ave
                    type: string
                street2:
                    description:
                        Second line of the warehouse street address. Matched by the search query parameter.
                    example: 1st floor
                    type: string
                street3:
                    description:
                        Third line of the warehouse street address. Matched by the search query parameter.
                    example: suite 200
                    type: string
                type:
                    description:
                        Warehouse classification string carried verbatim from the persisted column. No validated set of allowed values; the service neither writes nor reads the column on create or update, so the field round-trips on read only.
                    example: warehouse
                    type: string
                warehouseItems:
                    description:
                        Optional nested list of warehouse-item rows to upsert alongside the warehouse on create or update. Each entry is matched on externalReferenceCode and cascaded through the warehouse-item upsert path.
                    items:
                        $ref: "#/components/schemas/WarehouseItem"
                    type: array
                zip:
                    description:
                        Postal code line of the warehouse address. Matched by the search query parameter.
                    example: "91765"
                    type: string
            type: object
        WarehouseAccount:
            description:
                Binding that scopes a warehouse to a specific account, restricting which buyer the warehouse can source inventory for. Created by POSTing under a warehouse and deleted through its own top-level resource path. Adding or removing the binding reindexes the parent warehouse.
            properties:
                account:
                    $ref: "#/components/schemas/Account"
                    readOnly: true
                accountExternalReferenceCode:
                    description:
                        Idempotency key of the bound account. Either accountId or accountExternalReferenceCode must resolve to an existing account on create.
                    example: DAB-34098-789-N
                    type: string
                accountId:
                    description:
                        Reference to the bound account (FK identifier). Either accountId or accountExternalReferenceCode must resolve to an existing account on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                warehouseAccountId:
                    description:
                        Internal numeric identifier of the binding; read-only and assigned by the service on create.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                warehouseExternalReferenceCode:
                    description:
                        Idempotency key of the warehouse side of the binding. Either warehouseId or warehouseExternalReferenceCode must resolve to an existing warehouse on create.
                    example: PAB-34098-789-N
                    type: string
                warehouseId:
                    description:
                        Reference to the warehouse side of the binding (FK identifier). Either warehouseId or warehouseExternalReferenceCode must resolve to an existing warehouse on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            required:
                -   accountId
                -   warehouseId
            type: object
        WarehouseAccountGroup:
            description:
                Binding that scopes a warehouse to a specific account group, restricting which buyer cohort the warehouse can source inventory for. Created by POSTing under a warehouse and deleted through its own top-level resource path. Adding or removing the binding reindexes the parent warehouse.
            properties:
                accountGroup:
                    $ref: "#/components/schemas/AccountGroup"
                    readOnly: true
                accountGroupExternalReferenceCode:
                    description:
                        Idempotency key of the bound account group. Either accountGroupId or accountGroupExternalReferenceCode must resolve to an existing account group on create.
                    example: DAB-34098-789-N
                    type: string
                accountGroupId:
                    description:
                        Reference to the bound account group (FK identifier). Either accountGroupId or accountGroupExternalReferenceCode must resolve to an existing account group on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                warehouseAccountGroupId:
                    description:
                        Internal numeric identifier of the binding; read-only and assigned by the service on create.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                warehouseExternalReferenceCode:
                    description:
                        Idempotency key of the warehouse side of the binding.
                    example: PAB-34098-789-N
                    type: string
                warehouseId:
                    description:
                        Reference to the warehouse side of the binding (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            required:
                -   accountGroupId
                -   warehouseId
            type: object
        WarehouseChannel:
            description:
                Binding that scopes a warehouse to a specific channel, restricting which storefront the warehouse can source inventory for. Created by POSTing under a warehouse and deleted through its own top-level resource path. A duplicate (warehouse, channel) pair is rejected with a 409. Does not reindex the parent warehouse on add or delete.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                channel:
                    $ref: "#/components/schemas/Channel"
                    readOnly: true
                channelExternalReferenceCode:
                    description:
                        Idempotency key of the bound channel. Either channelId or channelExternalReferenceCode must resolve to an existing channel on create.
                    example: DAB-34098-789-N
                    type: string
                channelId:
                    description:
                        Reference to the bound channel (FK identifier). Either channelId or channelExternalReferenceCode must resolve to an existing channel on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                warehouseChannelId:
                    description:
                        Internal numeric identifier of the binding; read-only and assigned by the service on create.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                warehouseExternalReferenceCode:
                    description:
                        Idempotency key of the warehouse side of the binding.
                    example: PAB-34098-789-N
                    type: string
                warehouseId:
                    description:
                        Reference to the warehouse side of the binding (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            required:
                -   channelId
                -   warehouseId
            type: object
        WarehouseItem:
            description:
                On-hand inventory record for one SKU at one warehouse, scaled to a unit-of-measure key. The triple (warehouse, sku, unitOfMeasureKey) is unique; when the SKU has exactly one unit-of-measure defined the key may be omitted and the runtime resolves it automatically.
            properties:
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per warehouse item within the company. Optional on create.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal numeric identifier of the warehouse item; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                modifiedDate:
                    description:
                        Last-modified timestamp of the warehouse-item row, in ISO 8601 date format. Maintained automatically by the persistence layer and surfaces only through the dedicated /warehouseItems/updated listing; not populated on the standard read paths.
                    example: 2017-07-21
                    format: date
                    type: string
                quantity:
                    description:
                        Total on-hand quantity at the warehouse, scaled to the unitOfMeasureKey precision. The runtime formats the persisted decimal through the commerce quantity formatter on read. Stock available for sale is the difference between quantity and reservedQuantity; it is not surfaced as a separate property and consumers compute it from these two fields.
                    example: 1.1
                    format: bigdecimal
                    minimum: 0
                    type: number
                reservedQuantity:
                    description:
                        Quantity currently held by open orders against future fulfillment, scaled to the unitOfMeasureKey precision. The runtime formats the persisted decimal through the commerce quantity formatter on read. Subtracted from quantity to derive stock available for sale; the difference is not surfaced as a separate property.
                    example: 2.1
                    format: bigdecimal
                    minimum: 0
                    type: number
                sku:
                    description:
                        SKU (stock keeping unit) the inventory record applies to. Required and non-blank on create.
                    example: SKU
                    type: string
                unitOfMeasureKey:
                    description:
                        Key of the unit-of-measure the quantities are expressed in. When omitted on create and the SKU has exactly one unit-of-measure defined, the runtime resolves the key automatically; when the SKU has more than one, an explicit key is required.
                    example: lt
                    type: string
                warehouseExternalReferenceCode:
                    description:
                        Idempotency key of the warehouse the warehouse item belongs to. Either warehouseId or warehouseExternalReferenceCode must resolve to an existing warehouse on create.
                    example: AB-34098-789-N
                    type: string
                warehouseId:
                    description:
                        Reference to the warehouse the warehouse item belongs to (FK identifier). Either warehouseId or warehouseExternalReferenceCode must resolve to an existing warehouse on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            type: object
        WarehouseOrderType:
            description:
                Binding that scopes a warehouse to a specific order type, restricting which order kinds the warehouse can source inventory for. Created by POSTing under a warehouse and deleted through its own top-level resource path. Adding or removing the binding reindexes the parent warehouse.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name; each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                orderType:
                    $ref: "#/components/schemas/OrderType"
                    readOnly: true
                orderTypeExternalReferenceCode:
                    description:
                        Idempotency key of the bound order type. Either orderTypeId or orderTypeExternalReferenceCode must resolve to an existing order type on create.
                    example: DAB-34098-789-N
                    type: string
                orderTypeId:
                    description:
                        Reference to the bound order type (FK identifier). Either orderTypeId or orderTypeExternalReferenceCode must resolve to an existing order type on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                priority:
                    description:
                        Reserved ordering hint for the binding. The runtime does not currently persist or read this field -- the underlying binding row has no priority column -- so the value round-trips on the request body but has no effect.
                    example: 1
                    format: int32
                    minimum: 0
                    type: integer
                warehouseExternalReferenceCode:
                    description:
                        Idempotency key of the warehouse side of the binding.
                    example: PAB-34098-789-N
                    type: string
                warehouseId:
                    description:
                        Reference to the warehouse side of the binding (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                warehouseOrderTypeId:
                    description:
                        Internal numeric identifier of the binding; read-only and assigned by the service on create.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
            required:
                -   orderTypeId
                -   warehouseId
            type: object
info:
    description:
        "Liferay Commerce Admin Inventory API exposes the inventory side of the Commerce administration surface -- warehouses, the items they stock, replenishment plans for those items, and the bindings that decide which warehouses can fulfill which accounts, account groups, channels, and order types. Primary entities -- Warehouse models a physical or logical fulfillment location with address, geo-coordinates, and an active flag. WarehouseItem tracks the on-hand and reserved quantity of a SKU at a single warehouse, scaled to a unit-of-measure key. ReplenishmentItem records expected restock quantities with an availability date. WarehouseAccount, WarehouseAccountGroup, WarehouseChannel, and WarehouseOrderType are the four binding entities that connect a warehouse to an AccountEntry, AccountGroup, CommerceChannel, and CommerceOrderType respectively, and decide which warehouse is eligible to source inventory for a given buyer or order type. Audience -- administrators of the Commerce inventory subsystem. The buyer-facing inventory view lives in the commerce-delivery-cart, commerce-delivery-catalog, and commerce-delivery-order modules; this API is the admin counterpart used to provision and maintain stock data. Addressing -- every primary resource is reachable either by the internal numeric id (/warehouses/<id>, /warehouseItems/<id>, /replenishment-items/<replenishmentItemId>) or by externalReferenceCode (/warehouses/by-externalReferenceCode/<externalReferenceCode>, /warehouseItems/by-externalReferenceCode/<externalReferenceCode>, /replenishment-items/by-externalReferenceCode/<externalReferenceCode>). PUT against the externalReferenceCode path is upsert -- the request body either replaces the existing entity or creates a new one carrying that externalReferenceCode. PATCH against either path is JSON Merge Patch -- only the fields supplied in the body are modified, every other field falls back to its persisted value. Binding entities -- WarehouseAccount, WarehouseAccountGroup, WarehouseChannel, and WarehouseOrderType live under both /warehouses/<id>/<rel> and /warehouses/by-externalReferenceCode/<externalReferenceCode>/<rel> for listing and creation, and under their own top-level path (/warehouse-accounts/<warehouseAccountId>, etc.) for deletion and sub-resource lookup. Bindings are not upserts -- creating a duplicate binding returns 409 for warehouse-channel bindings and 400 for the other three. Common workflows: Provision a warehouse -- POST /warehouses with externalReferenceCode, name, address, and geo-coordinates, then POST nested warehouse-channels, warehouse-accounts, warehouse-account-groups, and warehouse-order-types to make the warehouse eligible for that scope. Adjust stock -- PUT /warehouseItems/by-externalReferenceCode/<externalReferenceCode> to upsert the quantity and reservedQuantity of a SKU at a warehouse, or PATCH the same path to change only the quantity. Plan a restock -- PUT /replenishment-items/by-externalReferenceCode/<externalReferenceCode> with sku, warehouseId, quantity, and availabilityDate to record an expected delivery. Audit recent changes -- GET /warehouseItems/updated with start and end query parameters to retrieve every WarehouseItem modified in the requested timespan (defaulting to a 30-day window when only one bound is supplied). A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.inventory.client', and version '4.0.44'."
