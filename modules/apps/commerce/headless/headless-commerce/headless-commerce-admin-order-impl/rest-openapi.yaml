                    type: string
                typeLocalized:
                    description:
                        Localized text. Map keys are locale codes; values are the translated strings.
                    example: Payment Terms
                    type: string
                typeSettings:
                    description:
                        Free-form JSON or text configuration specific to the term type.
                    example: daysFromInvoice=30
                    type: string
                workflowStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
            required:
            -   name
            -   type
            type: object
        TermOrderType:
            description:
                Binding between a term and an order type. Identifies an order type the term applies to.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions (delete). Read-only.
                    readOnly: true
                    type: object
                orderType:
                    $ref: "#/components/schemas/OrderType"
                    readOnly: true
                orderTypeExternalReferenceCode:
