                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the term (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                label:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated labels (display names).
                    example:
                        en_US: Net 30
                        hr_HR: Term Label HR
                        hu_HU: Term Label HU
                    type: object
                name:
                    description:
                        Free-text name identifying the term (for example, Net30, 2/10 Net30).
                    example: Net 30
                    type: string
                neverExpire:
                    description:
                        When true, the term ignores expirationDate and never expires.
                    example: false
                    type: boolean
                priority:
