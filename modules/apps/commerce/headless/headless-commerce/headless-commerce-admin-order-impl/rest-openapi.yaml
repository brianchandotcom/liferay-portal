                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                orderExternalReferenceCode:
                    description:
                        External reference code of the parent order.
                    example: AB-34098-789-N
                    type: string
                orderId:
                    description:
                        Reference to the parent order (FK identifier).
                    example: 30128
                    format: int64
                    minimum: 0
                    type: integer
                restricted:
                    description:
                        When true, the note is internal-only and not visible to the storefront. When false, it is visible to the buyer.
                    example: false
                    type: boolean
            type: object
        OrderRule:
            description:
                A business rule that conditions order behavior on the linked accounts, account groups, channels, and order types. Drives discounting, validation, and other administrator-defined order policy.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                active:
                    description:
                        When true, the rule is evaluated against orders. When false, the rule is disabled.
                    example: true
                    type: boolean
                author:
                    description:
                        Display name of the user who created the rule. Read-only.
                    example: Test Test
                    type: string
                createDate:
                    description:
                        Creation date for the rule. Read-only.
                    example: 2017-07-21
                    format: date
                    type: string
                description:
                    description:
                        Free-text description of the rule purpose and logic.
                    example: Applies a 10% discount on orders over $500.
                    type: string
                displayDate:
                    description:
                        Date the rule becomes active.
                    example: 2017-07-21
                    format: date
                    type: string
                expirationDate:
                    description:
                        Date the rule expires and stops applying.
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per rule within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the order rule (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the rule. Filterable via the OData query parameter.
                    example: Volume Discount
                    type: string
                neverExpire:
                    description:
                        When true, the rule ignores expirationDate and never expires.
                    example: false
                    type: boolean
                orderRuleAccount:
                    description:
                        "List of accounts the rule applies to. Upserts on PATCH: missing entries are deleted."
                    items:
                        $ref: "#/components/schemas/OrderRuleAccount"
                    type: array
                orderRuleAccountGroup:
                    description:
                        "List of account groups the rule applies to. Upserts on PATCH: missing entries are deleted."
                    items:
                        $ref: "#/components/schemas/OrderRuleAccountGroup"
                    type: array
                orderRuleChannel:
                    description:
                        "List of channels the rule applies to. Upserts on PATCH: missing entries are deleted."
                    items:
                        $ref: "#/components/schemas/OrderRuleChannel"
                    type: array
                orderRuleOrderType:
                    description:
                        "List of order types the rule applies to. Upserts on PATCH: missing entries are deleted."
                    items:
                        $ref: "#/components/schemas/OrderRuleOrderType"
                    type: array
                priority:
                    description:
                        Numeric priority for rule evaluation order. Higher values are evaluated first.
                    example: 1
                    format: double
                    type: number
                type:
                    description:
                        Rule type identifier (for example, minimum_order_value, shipping_restriction). Free-form string.
                    example: minimum_order_value
                    type: string
                typeSettings:
                    description:
                        Free-form JSON or text configuration specific to the rule type.
                    example: minValue=500
                    type: string
                workflowStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
            required:
            -   name
            -   type
            type: object
