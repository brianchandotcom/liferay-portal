                    type: string
                orderTypeId:
                    description:
                        Reference to the order type (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                termExternalReferenceCode:
                    description:
                        External reference code of the parent term.
                    example: AB-34098-789-N
                    type: string
                termId:
                    description:
                        Reference to the parent term (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                termOrderTypeId:
                    description:
                        Reference to the term-order-type link (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
            required:
            -   orderTypeId
            -   termId
            type: object
        VirtualItem:
            description:
                A virtual or downloadable asset associated with an order item, such as a license URL with usage limits.
            properties:
                url:
                    description:
                        Fully qualified URL where the virtual asset can be downloaded.
                    example: https://example.com/downloads/license.pdf
                    type: string
                usages:
                    description:
                        Integer maximum number of times the virtual asset can be redeemed. 0 means unlimited.
                    example: 5
                    format: int32
                    type: integer
                version:
                    description:
                        Version label of the virtual asset.
                    example: v1.0.0
                    type: string
            type: object
info:
    contact:
        email: team-commerce@liferay.com
        name: Commerce Team
    description:
        "Administrative REST API for the Liferay Commerce order domain. It manages the core order entity end-to-end --
        the order header (account, channel, currency, billing and shipping addresses, payment and delivery terms, totals
        and tax breakdown), the order items it contains, the order notes attached to it, the attachments uploaded
        against it, the order rules (COREntry) that drive discounting and validation, the order types that classify it,
        and the delivery and payment terms that bind to those order types. The API targets back-office administrators
        and integration tooling; the buyer-facing checkout and order-lookup surface lives in the
        headless-commerce-delivery-order module. Most resources are addressable both by internal ID (/`<id>`) and by
        external reference code (/by-externalReferenceCode/`<externalReferenceCode>`); POST against the
        external-reference-code path is upsert. PATCH applies JSON Merge Patch (only the supplied fields are modified),
        while PUT replaces the resource. For the storefront, customer-facing counterpart see
        headless-commerce-delivery-order; for catalog, pricing, account, channel, and inventory data see the matching
        headless-commerce-admin-* modules. -- Common workflows: Provision an order header end-to-end -- (1) POST /orders
        with accountId or accountExternalReferenceCode, channelId or channelExternalReferenceCode, currencyCode, and
        orderTypeId to create the order; (2) PATCH /orders/`<id>`/billing-address (or the by-externalReferenceCode
        variant) with a BillingAddress payload to set the billing address; (3) PATCH /orders/`<id>`/shipping-address to
        set the shipping address. -- Add and price line items -- (1) POST /orders/`<id>`/orderItems with sku, quantity,
        and optional options to add a order item; (2) PATCH /orderItems/`<id>` to adjust quantity, options, or unitPrice
        (price overrides require the MANAGE_COMMERCE_ORDER_PRICES permission); (3) DELETE /orderItems/`<id>` to remove a
        line. -- Attach notes and files to an order -- (1) POST /orders/`<id>`/orderNotes with content and the
        restricted flag for internal-only notes; (2) POST /orders/`<id>`/attachments with a base64-encoded payload,
        title, and type to upload a file. -- Manage order rules and their bindings -- (1) POST /orderRules with name,
        type, priority, dates, and active flag to create the COREntry; (2) POST /orderRules/`<id>`/orderRuleChannels,
        /orderRuleAccountGroups, /orderRuleAccounts, and /orderRuleOrderTypes to bind the rule to channels, account
        groups, accounts, and order types respectively; (3) PATCH /orderRules/`<id>` to update fields or nested bindings
        (upsert semantics for nested arrays). -- Manage order types and their channels -- (1) POST /orderTypes with
        localized name and description, active flag, and displayOrder to create the order type; (2) POST
        /orderTypes/`<id>`/orderTypeChannels to expose the order type on specific commerce channels. -- Manage delivery
        and payment terms -- (1) POST /terms with type (delivery or payment), label, name, priority, and active flag to
        create the term; (2) POST /terms/`<id>`/termOrderTypes to bind the term to specific order types so it applies
        only when those order types are in use. A Java client JAR is available for use with the group ID 'com.liferay',
        artifact ID 'com.liferay.headless.commerce.admin.order.client', and version '4.0.55'."
