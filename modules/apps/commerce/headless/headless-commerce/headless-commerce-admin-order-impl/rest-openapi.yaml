components:
    parameters:
        attachmentExternalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses an attachment under an order. The code is the integration-supplied idempotency key, unique per attachment within the company.
            explode: false
            name: attachmentExternalReferenceCode
            required: true
            schema:
                description:
                    The attachment external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        attachmentIdPathParam:
            in: path
            description:
                Internal numeric identifier of the target order attachment.
            explode: false
            name: attachmentId
            required: true
            schema:
                description:
                    The attachment Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target resource on the by-externalReferenceCode paths. The code is the integration-supplied idempotency key, unique within the resource scope; POST against this path is upsert (create when absent, replace when present).
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. Supported fields depend on the endpoint and are sourced from the matching entity model -- typically accountId, channelId, orderStatus, orderTypeId, paymentStatus, sku, name, and createDate. Example -- filter=orderStatus eq 10.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        idPathParam:
            in: path
            description:
                Internal numeric identifier of the target resource. Counterpart to the by-externalReferenceCode path variant; identifiers are server-assigned and stable across the resource lifetime.
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        orderIdPathParam:
            in: path
            description:
                Internal numeric identifier of the target order. Used as the parent context when accessing nested resources (items, notes, attachments, addresses).
            explode: false
            name: orderId
            required: true
            schema:
                description:
                    The order Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        orderRuleAccountGroupIdPathParam:
            in: path
            description:
                Internal numeric identifier of an order-rule-to-account-group relationship (COREntryRel).
            explode: false
            name: orderRuleAccountGroupId
            required: true
            schema:
                description:
                    The order rule account group relationship Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        orderRuleAccountIdPathParam:
            in: path
            description:
                Internal numeric identifier of an order-rule-to-account relationship (COREntryRel).
            explode: false
            name: orderRuleAccountId
            required: true
            schema:
                description:
                    The order rule account relationship Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        orderRuleChannelIdPathParam:
            in: path
            description:
                Internal numeric identifier of an order-rule-to-channel relationship (COREntryRel).
            explode: false
            name: orderRuleChannelId
            required: true
            schema:
                description:
                    The order rule channel relationship Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        orderRuleOrderTypeIdPathParam:
            in: path
            description:
                Internal numeric identifier of an order-rule-to-order-type relationship (COREntryRel).
            explode: false
            name: orderRuleOrderTypeId
            required: true
            schema:
                description:
                    The order rule order type relationship Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        orderTypeChannelIdPathParam:
            in: path
            description:
                Internal numeric identifier of an order-type-to-channel relationship.
            explode: false
            name: orderTypeChannelId
            required: true
            schema:
                description:
                    The order type channel relationship Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        pageQueryParam:
            in: query
            description:
                One-based page number used together with pageSize to navigate paginated result sets. Defaults to 1 when omitted.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items to return per page in paginated result sets. Defaults to the resource pagination configuration when omitted.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        searchQueryParam:
            in: query
            description:
                Free-text search expression applied to the indexed search corpus of the target resource (for example, the creator email for orders, the SKU for order items, the name for order rules).
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        sortQueryParam:
            in: query
            description:
                Comma-separated list of fields to sort by. Each field accepts the suffix :asc or :desc; sortable fields depend on the endpoint and are sourced from the matching entity model.
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
        termOrderTypeIdPathParam:
            in: path
            description:
                Internal numeric identifier of a term-to-order-type relationship.
            explode: false
            name: termOrderTypeId
            required: true
            schema:
                description:
                    The term order type relationship Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
    responses:
        NotFound:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                The specified resource was not found
        UnauthorizedError:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                Authentication information is missing or invalid
    schemas:
        Account:
            description:
                A customer account that places orders. Represents either a person or a business and carries identity, contact, and tax-attribution data; created on POST and updated on PATCH.
            properties:
                customFields:
                    additionalProperties: true
                    description:
                        Map of custom-field values keyed by field name. Values depend on the custom-field type and are configured per company.
                    example:
                        customField: customValue
                    type: object
                emailAddress:
                    description:
                        Primary email contact for the account.
                    example: tester@liferay.com
                    format: email
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per account within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the account (FK identifier). Read-only; set by the service when the account is first persisted.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                logoId:
                    description:
                        Reference to the file entry that stores the account logo image (FK identifier). 0 when no logo is set.
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the account. Required on create; trimmed by the service before persistence.
                    example: Acme Corporation
                    type: string
                root:
                    description:
                        When true, the account is a top-level (parent) account with no parent. When false, the account is a subsidiary.
                    example: true
                    type: boolean
                taxId:
                    description:
                        Tax identification number for the account (for example, VAT or EIN). Free-form string.
                    example: Abcd1234
                    type: string
                type:
                    description:
                        "Integer account type: 0=Person, 1=Business, 2=Guest."
                    example: 1
                    format: int32
                    maximum: 2
                    minimum: 0
                    type: integer
        Attachment:
            description:
                A file attached to an order (image, document, virtual asset). Carries the file content on upload and file metadata, download URL, and a restricted flag for visibility control on retrieval.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name (e.g., "delete", "update"). Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                attachment:
                    description:
                        Base64-encoded file content to upload. Write-only; omitted from GET responses.
                    example: iVBORw0KGgoAAAANSUhEUgAA
                    format: byte
                    type: string
                dateModified:
                    description:
                        Last-modification timestamp in ISO 8601 (UTC). Read-only; set by the service on each update.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                extension:
                    description:
                        File extension extracted from the uploaded file name (for example, pdf, jpg). Read-only.
                    example: pdf
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per attachment within the company.
                    example: AB-34098-789-N
                    type: string
                fileName:
                    description:
                        Original file name supplied at upload time.
                    example: invoice.pdf
                    type: string
                id:
                    description:
                        Reference to the order attachment (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                priority:
                    description:
                        Numeric sort order for displaying multiple attachments. Lower values come first; defaults to 0.
                    example: 1.0
                    format: double
                    type: number
                restricted:
                    description:
                        When true, the attachment is internal-only and not visible to the storefront. When false, it is visible to the buyer.
                    example: false
                    type: boolean
                title:
                    description:
                        Display title for the attachment; may differ from the original file name.
                    example: Invoice
                    type: string
                type:
                    description:
                        Type key for the attachment, drawn from the attachment-type list configured for the company. Free-form string.
                    example: general
                    type: string
                typeLabel:
                    description:
                        Localized human-readable label for the type key. Read-only; resolved against the request locale.
                    example: General
                    readOnly: true
                    type: string
                url:
                    description:
                        Fully qualified download URL for the file. Read-only; generated by the service.
                    example: https://example.com/attachments/invoice.pdf
                    readOnly: true
                    type: string
            type: object
        BillingAddress:
            description:
                Postal address used for billing the order. Stored as an address record on the order and accessed by order ID or external reference code.
            properties:
                city:
                    description:
                        City name of the address. Required on create.
                    example: Diamond Bar
                    type: string
                countryISOCode:
                    description:
                        ISO 3166-1 alpha-2 country code of the address. Required on create.
                    example: US
                    type: string
                description:
                    description:
                        Free-text delivery notes or directions associated with the address.
                    example: Right stairs, first room on the left.
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per address within the company. Read-only after create.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                id:
                    description:
                        Reference to the address (FK identifier).
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                latitude:
                    description:
                        Decimal latitude of the address for geocoding.
                    example: 33.9976884
                    format: double
                    type: number
                longitude:
                    description:
                        Decimal longitude of the address for geocoding.
                    example: -117.8144595
                    format: double
                    type: number
                name:
                    description:
                        Address label or recipient name (for example, head office, warehouse). Required on create.
                    example: Alessio Antonio Rendina
                    type: string
                phoneNumber:
                    description:
                        Contact phone number associated with the address.
                    example: (123) 456 7890
                    type: string
                regionISOCode:
                    description:
                        ISO 3166-2 sub-region (province or state) code within the country.
                    example: CA
                    type: string
                street1:
                    description:
                        Primary street line of the address. Required on create.
                    example: 1400 Montefino Ave
                    type: string
                street2:
                    description:
                        Secondary street line (apartment, suite, floor).
                    example: 1st floor
                    type: string
                street3:
                    description:
                        Tertiary street line for additional address detail.
                    example: Suite 200
                    type: string
                subtype:
                    description:
                        Address subtype classifier (for example, residential, business). Free-form string.
                    example: business
                    type: string
                vatNumber:
                    description:
                        VAT or tax registration number associated with the address.
                    example: "353246836565"
                    type: string
                zip:
                    description:
                        ZIP or postal code of the address.
                    example: "91765"
                    type: string
            required:
            -   city
            -   countryISOCode
            -   name
            -   street1
            type: object
        Channel:
            description:
                A commerce sales channel that groups products, prices, and orders. Channels carry a default currency and a type that classifies the storefront context.
            properties:
                currencyCode:
                    description:
                        ISO 4217 currency code used as the default currency for the channel.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per channel within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the channel (FK identifier).
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the channel.
                    example: Default Channel
                    type: string
                type:
                    description:
                        Channel type identifier classifying the storefront context. Free-form string.
                    example: site
                    type: string
            type: object
        Error:
            description:
                Standard error envelope returned on non-success responses, with HTTP status code, internal error code, developer message, and user-facing description.
            properties:
                errorCode:
                    description:
                        Internal numeric error code that identifies the failure category. Read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Human-readable description of the error suitable for end users. Read-only.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Developer-facing message that pinpoints the failing field or call. Read-only.
                    example: No currency exists with the code USD.
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code echoed in the body. Read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
            -   errorCode
            -   errorDescription
            -   message
            -   status
            type: object
        Order:
            description:
                A purchase order placed by an account in a channel. Carries the buyer account, addresses, currency, payment and delivery terms, line items, notes, attachments, and tax-aware totals; created on POST, updated on PATCH, replaced on PUT against the external reference code.
            properties:
                account:
                    $ref: "#/components/schemas/Account"
                    readOnly: true
                accountExternalReferenceCode:
                    description:
                        External reference code of the buyer account. Used as a lookup key when the numeric account ID is not supplied.
                    example: AB-34098-789-N
                    type: string
                accountId:
                    description:
                        Reference to the buyer account (FK identifier). One of accountId or accountExternalReferenceCode is required on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                advanceStatus:
                    description:
                        Free-text status string for custom workflows on top of the standard order status (for example, on-hold, escalated).
                    example: transmitted
                    type: string
                author:
                    description:
                        Display name of the user who created the order. Read-only.
                    example: Test Test
                    readOnly: true
                    type: string
                billingAddress:
                    $ref: "#/components/schemas/BillingAddress"
                billingAddressExternalReferenceCode:
                    description:
                        External reference code of the billing address. Used as a lookup key when the numeric address ID is not supplied.
                    example: AB-34098-789-N
                    type: string
                billingAddressId:
                    description:
                        Reference to the billing address (FK identifier).
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                channel:
                    $ref: "#/components/schemas/Channel"
                    readOnly: true
                channelExternalReferenceCode:
                    description:
                        External reference code of the channel. Used as a lookup key when the numeric channel ID is not supplied.
                    example: AB-34098-789-N
                    type: string
                channelId:
                    description:
                        Reference to the channel where the order was placed (FK identifier). One of channelId or channelExternalReferenceCode is required on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                couponCode:
                    description:
                        Coupon code applied to the order. When present, matching commerce discount rules are evaluated.
                    example: SAVE20
                    type: string
                createDate:
                    description:
                        Creation date for the order. Read-only; set by the service when the record is first persisted.
                    example: 2017-07-21
                    format: date
                    type: string
                creatorEmailAddress:
                    description:
                        Email address of the user who created the order. Indexed for search.
                    example: tester@liferay.com
                    format: email
                    type: string
                currencyCode:
                    description:
                        ISO 4217 currency code applied to every monetary value on the order. Defaults to the channel currency.
                    example: USD
                    type: string
                currencyExternalReferenceCode:
                    description:
                        External reference code of the currency entry. Used as a lookup key when the numeric currency ID is not supplied.
                    example: AB-34098-789-N
                    type: string
                currencyId:
                    description:
                        Reference to the currency entry (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                customFields:
                    additionalProperties: true
                    description:
                        Map of custom-field values keyed by field name. Values depend on the custom-field type and are configured per company.
                    example:
                        customField: customValue
                    type: object
                deliveryTermDescription:
                    description:
                        Localized description of the bound delivery term, resolved against the request locale. Read-only.
                    example: Standard delivery within 5 business days.
                    readOnly: true
                    type: string
                deliveryTermExternalReferenceCode:
                    description:
                        External reference code of the delivery term. Used as a lookup key when the numeric term ID is not supplied.
                    example: AB-34098-789-N
                    type: string
                deliveryTermId:
                    description:
                        Reference to the delivery term (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                deliveryTermName:
                    description:
                        Localized display name of the bound delivery term, resolved against the request locale. Read-only.
                    example: Standard Delivery
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per order within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the order (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                lastPriceUpdateDate:
                    description:
                        Date of the most recent price recalculation on the order. Read-only.
                    example: 2017-07-21
                    format: date
                    type: string
                modifiedDate:
                    description:
                        Last-modification date for the order. Read-only.
                    example: 2017-08-21
                    format: date
                    type: string
                name:
                    description:
                        Free-text label or name for the order, intended for administrator-facing displays.
                    example: Acme PO-12345
                    type: string
                orderDate:
                    description:
                        Date the order was placed. May differ from the creation date when the order is imported from another system.
                    example: 2017-07-21
                    format: date
                    type: string
                orderItems:
                    description:
                        Nested array of OrderItem objects. Write-only on POST/PATCH; items not in the array are deleted (upsert-by-ID semantics).
                    items:
                        $ref: "#/components/schemas/OrderItem"
                    type: array
                orderStatus:
                    description:
                        "Integer order status: 0=Approved, 1=Pending, 2=Open, 9=Subscription, 10=Processing, 13=AwaitingPickup, 14=PartiallyShipped, 15=Shipped, 16=Declined, 17=Refunded, 18=Disputed, 19=PartiallyRefunded, 20=OnHold, 21=QuoteRequested, 22=QuoteProcessed."
                    example: 0
                    format: int32
                    minimum: 0
                    type: integer
                orderStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                orderTypeExternalReferenceCode:
                    description:
                        External reference code of the order type. Used as a lookup key when the numeric order type ID is not supplied. Filterable via the OData query parameter.
                    example: AB-34098-789-N
                    type: string
                orderTypeId:
                    description:
                        Reference to the order type (FK identifier). Filterable via the OData query parameter.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                paymentMethod:
                    description:
                        Identifier of the payment method used by the order (for example, credit_card, purchase_order). Free-form string.
                    example: credit_card
                    type: string
                paymentStatus:
                    description:
                        "Integer payment status: 0=Approved, 1=Pending, 2=Authorized, 4=Failed, 17=Refunded, 23=NotRequired."
                    example: 0
                    format: int32
                    minimum: 0
                    type: integer
                paymentStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                paymentTermDescription:
                    description:
                        Localized description of the bound payment term, resolved against the request locale. Read-only.
                    example: Net 30 days from invoice date.
                    readOnly: true
                    type: string
                paymentTermExternalReferenceCode:
                    description:
                        External reference code of the payment term. Used as a lookup key when the numeric term ID is not supplied.
                    example: AB-34098-789-N
                    type: string
                paymentTermId:
                    description:
                        Reference to the payment term (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                paymentTermName:
                    description:
                        Localized display name of the bound payment term, resolved against the request locale. Read-only.
                    example: Net 30
                    readOnly: true
                    type: string
                printedNote:
                    description:
                        Free-text note printed on invoices and shipping slips.
                    example: Handle with care.
                    type: string
                purchaseOrderNumber:
                    description:
                        Buyer-supplied purchase order number or external order identifier.
                    example: PO-12345
                    type: string
                requestedDeliveryDate:
                    description:
                        Buyer-requested delivery date.
                    example: 2017-07-21
                    format: date
                    type: string
                shippable:
                    description:
                        When true, the order (or its product) ships physically; when false, it is virtual or non-shippable. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                shippingAddress:
                    $ref: "#/components/schemas/ShippingAddress"
                shippingAddressExternalReferenceCode:
                    description:
                        External reference code of the shipping address. Used as a lookup key when the numeric address ID is not supplied.
                    example: AB-34098-789-N
                    type: string
                shippingAddressId:
                    description:
                        Reference to the shipping address (FK identifier).
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                shippingAmount:
                    description:
                        Shipping charge in the order currency. Tax-exclusive.
                    example: 9.99
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingAmountFormatted:
                    description:
                        Locale-aware formatted shipping charge with the currency symbol. Read-only.
                    example: $9.99
                    type: string
                shippingAmountValue:
                    description:
                        Raw decimal value of the shipping charge without currency formatting. Read-only.
                    example: 9.99
                    format: double
                    minimum: 0
                    type: number
                shippingDiscountAmount:
                    description:
                        Total shipping discount across every discount tier, in the order currency. Tax-exclusive.
                    example: 0
                    format: bigdecimal
                    type: number
                shippingDiscountAmountFormatted:
                    description:
                        Locale-aware formatted shipping-discount amount with the currency symbol. Read-only.
                    example: $0.00
                    type: string
                shippingDiscountAmountValue:
                    description:
                        Raw decimal value of the shipping-discount amount without currency formatting. Read-only.
                    example: 0.0
                    format: double
                    type: number
                shippingDiscountPercentageLevel1:
                    description:
                        Level-1 tiered shipping discount percentage. Tax-exclusive.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountPercentageLevel1WithTaxAmount:
                    description:
                        Level-1 tiered shipping discount percentage after tax application.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountPercentageLevel2:
                    description:
                        Level-2 tiered shipping discount percentage. Tax-exclusive.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountPercentageLevel2WithTaxAmount:
                    description:
                        Level-2 tiered shipping discount percentage after tax application.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountPercentageLevel3:
                    description:
                        Level-3 tiered shipping discount percentage. Tax-exclusive.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountPercentageLevel3WithTaxAmount:
                    description:
                        Level-3 tiered shipping discount percentage after tax application.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountPercentageLevel4:
                    description:
                        Level-4 tiered shipping discount percentage. Tax-exclusive.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountPercentageLevel4WithTaxAmount:
                    description:
                        Level-4 tiered shipping discount percentage after tax application.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                shippingDiscountWithTaxAmount:
                    description:
                        Total shipping discount with tax included.
