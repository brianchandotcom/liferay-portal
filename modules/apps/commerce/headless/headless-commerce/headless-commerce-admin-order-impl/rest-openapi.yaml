tags:
-   description:
        Endpoints for retrieving the Account entity linked to an order, nested under Order.account.
    name: Account
-   description:
        Endpoints for managing file attachments associated with orders, including upload, download, update, and delete operations.
    name: Attachment
-   description:
        Endpoints for retrieving and updating the billing address bound to an order, persisted as a address and updated via BillingAddressUtil.
    name: BillingAddress
-   description:
        Endpoints for retrieving the Channel entity linked to an order, representing the sales channel context.
    name: Channel
-   description:
        Endpoints for managing commerce orders end-to-end -- create, retrieve, update, and delete the order header (account, channel, currency, addresses, payment and delivery terms, totals) and orchestrate the nested order items, attachments, notes, and addresses.
    name: Order
-   description:
        Endpoints for retrieving account group entities linked to order rules.
    name: OrderAccountGroup
-   description:
        Endpoints for managing line items within orders, including quantity, options, pricing, and per-item shipping.
    name: OrderItem
-   description:
        Endpoints for managing notes attached to a single order, including internal-only notes flagged via the restricted property.
    name: OrderNote
-   description:
        Endpoints for managing order rules (COREntry) that apply business logic to orders based on account, channel, and order-type conditions.
    name: OrderRule
-   description:
        Endpoints for managing account-to-order-rule relationships, which determine which accounts a rule applies to.
    name: OrderRuleAccount
-   description:
        Endpoints for managing account-group-to-order-rule relationships, enabling rule application to groups of accounts.
    name: OrderRuleAccountGroup
-   description:
        Endpoints for managing channel-to-order-rule relationships, enabling channel-specific rule application.
    name: OrderRuleChannel
-   description:
        Endpoints for managing order-type-to-order-rule relationships, enabling order-type-specific rule application.
    name: OrderRuleOrderType
-   description:
        Endpoints for managing order type classifications and their associations with sales channels.
    name: OrderType
-   description:
        Endpoints for managing order-type-to-channel relationships, determining which order types are available per channel.
    name: OrderTypeChannel
-   description:
        Endpoints for retrieving and updating the shipping address bound to an order or order item, persisted as a address and updated via ShippingAddressUtil.
    name: ShippingAddress
-   description:
        Endpoints for managing commerce terms (delivery and payment terms) and their associations with order types.
    name: Term
-   description:
        Endpoints for managing term-to-order-type relationships, determining which terms apply to specific order types.
    name: TermOrderType