        OrderNote:
            description:
                A note attached to an order. Carries free-text content and a restricted flag that hides internal-only notes from the storefront.
            properties:
                author:
                    description:
                        Display name of the user who authored the note. Read-only.
                    example: Test Test
                    type: string
                content:
                    description:
                        Free-text content of the note.
                    example: Customer requested expedited shipping.
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per note within the company.
                    example: AB-34098-789-N
