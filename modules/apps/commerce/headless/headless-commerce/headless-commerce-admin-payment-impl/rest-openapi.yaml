components:
    parameters:
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target payment on the `by-externalReferenceCode` paths. The code is the integration-supplied idempotency key, unique within the company scope; POST against this path is upsert (create when absent, replace when present).
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the payment result set. Filterable fields sourced from the payment entity model -- paymentStatus, type, reasonKey, and relatedItemId (the FK to the parent order or subscription, indexed as classPK). Example -- filter=paymentStatus eq 0 and type eq 1.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        idPathParam:
            in: path
            description:
                Internal numeric identifier of the target payment. Counterpart to the `by-externalReferenceCode` path variant; identifiers are server-assigned and stable across the payment's lifetime.
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        pageQueryParam:
            in: query
            description:
                One-based page index. Combined with pageSize to paginate the payment result set; defaults to 1 when omitted.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of payments per page. Defaults to the portal's configured page size when omitted; capped by the portal configuration to prevent unbounded reads.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        searchQueryParam:
            in: query
            description:
                Full-text search expression matched against the payment's indexed fields. Returns the payments whose searchable content matches the expression.
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        sortQueryParam:
            in: query
            description:
                Sort expression of the form `field:asc` or `field:desc`, comma-separated for multi-field sorting. Sortable fields sourced from the payment entity model -- createDate, id, paymentStatus, reasonKey, relatedItemId, and type.
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
    schemas:
        Error:
            description:
                Error envelope returned by the API when a request fails. Carries the HTTP status, an internal error code, a developer-facing error description, and a human-readable message that names the offending input.
            properties:
                errorCode:
                    description:
                        Internal error code that identifies the specific validation or lookup failure. Stable across releases for the same error condition.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Developer-facing description of the error, typically naming the invalid field or the missing cross-reference.
                    example: Unable to find currency. Currency code should be expressed with
                        3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Human-readable error message. May embed lookup keys that identify the offending entity.
                    example: No currency exists with the key (companyId=41811, code=USD)
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code returned with the response. Mirrors the numeric status of the response line.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        Payment:
            description:
                Payment or refund record produced by the commerce checkout and back-office flows. Captures the amount, currency, payment integration, workflow status, related order or subscription, and the gateway transaction code. The same schema is used for both kinds of record and is distinguished by the integer `type` discriminator.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                amount:
                    description:
                        Monetary amount of the payment in the payment's currency, expressed as a decimal number. Must be greater than zero on create. Tax handling matches the parent order or subscription.
                    example: 10.1
                    format: bigdecimal
                    type: number
                amountFormatted:
                    description:
                        Localized, currency-formatted rendering of `amount`. Computed by the price formatter using the payment currency and the request locale. Read-only.
                    example: $10.10
                    readOnly: true
                    type: string
                author:
                    description:
                        Full name of the user who created the payment record. Computed from the authenticated user at create time and stored alongside the record. Read-only.
                    example: Liferay Administrator
                    readOnly: true
                    type: string
                callbackURL:
                    description:
                        Server-to-server callback URL the payment gateway invokes to notify the portal of the payment outcome.
                    example: https://example.com/payment/callback
                    type: string
                cancelURL:
                    description:
                        Frontend URL the buyer is redirected to when the payment is cancelled at the gateway.
                    example: https://example.com/payment/cancel
                    type: string
                channelId:
                    description:
                        Reference to the storefront channel that owns the payment (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                comment:
                    description:
                        Free-text note attached to the payment, surfaced in the admin UI for back-office annotations.
                    example: Manually verified offline payment.
                    type: string
                createDate:
                    description:
                        Creation date of the payment in ISO 8601 (yyyy-MM-dd). Read-only; set when the record is first persisted. Sortable via the OData query parameter.
                    example: 2017-07-21
                    format: date-time
                    readOnly: true
                    type: string
                currencyCode:
                    description:
                        ISO 4217 three-letter currency code. One of `currencyCode`, `currencyExternalReferenceCode`, or `currencyId` resolves the currency on write.
                    example: USD
                    type: string
                currencyExternalReferenceCode:
                    description:
                        External reference code of the currency. Alternative lookup key for resolving the currency on write.
                    example: AB-34098-789-N
                    type: string
                currencyId:
                    description:
                        Reference to the currency (FK identifier). Alternative lookup key for resolving the currency on write.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                errorMessages:
                    description:
                        Error message returned by the payment gateway when the transaction fails. Populated by the integration on a failed authorization, capture, or refund.
                    example: Card declined due to insufficient funds.
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update. Must be unique per payment within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal numeric identifier of the payment. Server-assigned and stable across the payment's lifetime. Read-only; sortable via the OData query parameter.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                languageId:
                    description:
                        Liferay locale identifier of the buyer at the time of the payment. Used by the gateway to localize redirect pages.
                    example: en_US
                    type: string
                payload:
                    description:
                        Raw gateway payload captured from the payment integration for audit and replay. The portal stores the value as supplied without parsing it.
                    example: intent_id=pi_3O8L7v2eZvKYlo2C1pX2DV4z
                    type: string
                paymentIntegrationKey:
                    description:
                        Identifier of the payment integration in use. Matches the registered integration's method key.
                    example: money-order
                    type: string
                paymentIntegrationType:
                    description:
                        Integer integration type indicating how the configured payment integration is invoked. Derived from the payment integration and set by the server. 0=Internal Online Standard, 1=Internal Online Redirect, 2=Internal Offline, 3=Function Online Standard, 4=Function Online Redirect, 5=Function Offline. Read-only.
                    example: 0
                    format: int32
                    minimum: 0
                    readOnly: true
                    type: integer
                paymentStatus:
                    description:
                        Integer workflow status of the payment. 0=Completed, 1=Pending, 2=Authorized, 4=Failed, 8=Cancelled, 17=Refunded, 18=Created, 23=Not Required. Forced to Pending on create; cannot be set to Refunded by the client. Filterable and sortable via the OData query parameter.
                    example: 0
                    format: int32
                    minimum: 0
                    type: integer
                paymentStatusStatus:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                reasonKey:
                    description:
                        Reason code for a refund, or, on a failed payment, the gateway-reported decline reason. Free text driven by the integration vocabulary; on a refund record the value must resolve to a registered refund type. Filterable and sortable via the OData query parameter.
                    example: product-defect
                    type: string
                reasonName:
                    additionalProperties:
                        type: string
                    description:
                        Localized refund reason text. Map keys are locale codes; values are the translated strings. Computed from the registered refund type matching `reasonKey`. Read-only.
                    example:
                        en_US: Product Defect
                        hr_HR: Product Defect HR
                        hu_HU: Product Defect HU
                    readOnly: true
                    type: object
                redirectURL:
                    description:
                        Frontend URL the buyer is redirected to after the gateway completes the transaction successfully.
                    example: https://example.com/payment/redirect
                    type: string
                relatedItemId:
                    description:
                        Reference to the related entity (FK identifier). Typically the order the payment funds, or the source payment when this record is a refund. Filterable and sortable via the OData query parameter.
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                relatedItemName:
                    description:
                        Fully qualified class name of the related entity. Resolved into a class name identifier on write. For a refund record, must reference a payment.
                    example: com.liferay.commerce.model.CommerceOrder
                    type: string
                relatedItemNameLabel:
                    description:
                        Localized, human-readable label for the related entity. Read-only.
                    example: Order
                    type: string
                transactionCode:
                    description:
                        Identifier returned by the payment gateway for the transaction. Used for reconciliation, chargeback investigation, and refund linkage.
                    example: txn-1A2B3C4D
                    type: string
                type:
                    description:
                        Integer payment type discriminator. 0=Payment, 1=Refund. The `/refund` operations require type=1; a refund record points to the source payment via `relatedItemId`. Filterable and sortable via the OData query parameter.
                    example: 0
                    format: int32
                    type: integer
                typeLabel:
                    description:
                        Localized, human-readable label for `type`. Read-only.
                    example: Payment
                    readOnly: true
                    type: string
        Status:
            description:
                Payment status envelope. Exposes the integer status code together with the English label key and the label rendered in the request locale. Read-only.
            properties:
                code:
                    description:
                        Integer payment status. 0=Completed, 1=Pending, 2=Authorized, 4=Failed, 8=Cancelled, 17=Refunded, 18=Created, 23=Not Required. Read-only.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
                label:
                    description:
                        English label key for the status. Stable identifier used to look up translations.
                    example: completed
                    type: string
                label_i18n:
                    description:
                        Localized rendering of `label` in the request locale.
                    example: Completed
                    type: string
            type: object
info:
    description:
        "Administrative REST API for Liferay Commerce payment entries. It manages the payment and refund records that the commerce checkout and back-office flows produce when a buyer pays for an order or subscription, when a gateway returns a transaction outcome, and when an administrator issues a refund. The API targets back-office administrators and integration tooling -- it is not a payment gateway and does not by itself authorize, capture, or settle funds; gateway interaction is driven through the configured payment integration. Payments are addressable both by internal ID (`/payments/<id>`) and by external reference code (`/payments/by-externalReferenceCode/<externalReferenceCode>`); POST against `/payments` is upsert by external reference code. PATCH applies JSON Merge Patch (only the supplied fields are modified), while PUT replaces the payment record. For order, channel, account, and currency data see the matching `headless-commerce-admin-*` modules; for the storefront, customer-facing checkout see the `headless-commerce-delivery-*` modules. -- Common workflows: Record a successful payment for an existing order -- (1) GET /headless-commerce-admin-order/v1.0/orders/<id> or by-externalReferenceCode to confirm the order. (2) POST /payments with relatedItemName=com.liferay.commerce.model.CommerceOrder, relatedItemId=<orderId>, channelId=<channelId>, currencyCode=<USD>, amount=<orderTotal>, paymentIntegrationKey=<money-order>, type=0 (Payment), externalReferenceCode=<gateway-txn-id> -- the call upserts by ERC, creating the record in Pending. (3) PATCH /payments/by-externalReferenceCode/<gateway-txn-id> with paymentStatus=0 (Completed) and transactionCode=<final-id> once the gateway confirms settlement. -- Issue a refund against a completed payment -- (1) GET /payments/by-externalReferenceCode/<original-txn-id> to confirm the source payment is in status 0 (Completed) and type 0 (Payment). (2) POST /payments with type=1 (Refund), relatedItemName= com.liferay.commerce.model.CommercePaymentEntry, relatedItemId=<original-paymentId>, amount=<refundAmount>, currencyCode=<USD>, channelId=<channelId>, reasonKey=<product-defect>, externalReferenceCode=<refund-txn-id> -- the create yields a refund payment in status 18 (Created). (3) POST /payments/by-externalReferenceCode/<refund-txn-id>/refund -- triggers the configured payment gateway's refund() to push the refund through the integration; the gateway transitions the record to status 17 (Refunded) on success. -- Inspect payment history for an order -- (1) GET /payments?filter=relatedItemId eq <orderId> and type eq 0 to list the payment records linked to the order, sorted by createDate desc. (2) For each, GET /payments/<paymentId> to inspect the gateway transaction code, payload, and status transitions captured in `actions`. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.payment.client', and version '1.0.18'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Admin Payment API
    version: v1.0
openapi: 3.0.0
paths:
    /payments:
        get:
            description:
                Lists payments visible to the authenticated user as a permission-filtered page. Searches the CommercePaymentEntry index for the current company and applies the OData filter, full-text search, and sort expression. Filterable fields -- paymentStatus, type, reasonKey, relatedItemId. Sortable fields -- createDate, id, paymentStatus, reasonKey, relatedItemId, type. Search is matched against the indexed fields of the entry.
            operationId: getPaymentsPage
            parameters:
                -   $ref: "#/components/parameters/filterQueryParam"
                -   $ref: "#/components/parameters/pageQueryParam"
                -   $ref: "#/components/parameters/pageSizeQueryParam"
                -   $ref: "#/components/parameters/searchQueryParam"
                -   $ref: "#/components/parameters/sortQueryParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Payment"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Payment"
                                type: array
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets a List of Payments.
            tags:
                -   Payment
        post:
            description:
                Upsert by external reference code. Delegates to CommercePaymentEntryService. addOrUpdateCommercePaymentEntry, resolving the currency by `currencyCode`, `currencyExternalReferenceCode`, or `currencyId` and the related entity by `relatedItemName` (resolved to a class name id) and `relatedItemId`. Creates a new payment when no record matches the supplied externalReferenceCode within the company; replaces the existing record otherwise. Validates the amount, payment integration type, payment status, and reason key; invalid input raises a CommercePaymentEntry*Exception that maps to 400.
            operationId: postPayment
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Payment"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Payment"
                required: true
            responses:
                201:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Payment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Payment"
                    description:
                        Created
                202:
                    description:
                        Accepted - Async
                204:
                    description:
                        No content
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Creates or updates a Payment.
            tags:
                -   Payment
    /payments/by-externalReferenceCode/{externalReferenceCode}:
        delete:
            description:
                Deletes the payment identified by external reference code. Looks up the entry via CommercePaymentEntryService.fetchCommercePaymentEntryByExternalReferenceCode for the current company and delegates to deleteCommercePaymentEntry. Returns 204 on success; raises NoSuchPaymentEntryException (404) when no record matches the supplied code.
            operationId: deletePaymentByExternalReferenceCode
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                204:
                    description:
                        No content
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this payment.
            summary: Deletes a Payment by external reference code.
            tags:
                -   Payment
        get:
            description:
                Returns the payment identified by external reference code. Looks up the entry via CommercePaymentEntryService.fetchCommercePaymentEntryByExternalReferenceCode for the current company and converts it through PaymentDTOConverter, populating the formatted amount, the localized paymentStatusStatus envelope, the type label, and the HATEOAS actions map. Raises NoSuchPaymentEntryException (404) when no record matches the supplied code.
            operationId: getPaymentByExternalReferenceCode
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Payment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Payment"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this payment.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets a Payment by external reference code.
            tags:
                -   Payment
        patch:
            description:
                Partially updates the payment identified by external reference code (JSON Merge Patch -- only the supplied fields are modified; unspecified fields retain their existing value). Resolves the entry via CommercePaymentEntryService.fetchCommercePaymentEntryByExternalReferenceCode and delegates to updateCommercePaymentEntry, blending the request body against the stored record. Currency lookup falls back to the stored `currencyCode` when the request does not resolve a new currency. Raises NoSuchPaymentEntryException (404) when no record matches; raises CommercePaymentEntry*Exception (400) when validation fails.
            operationId: patchPaymentByExternalReferenceCode
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Payment"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Payment"
                required: true
            responses:
                202:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Payment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Payment"
                    description:
                        Accepted - Async
                204:
                    description:
                        No content
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this payment.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Updates a Payment by external reference code.
            tags:
                -   Payment
        put:
            description:
                Replaces the payment identified by external reference code. Delegates to CommercePaymentEntryService.addOrUpdateCommercePaymentEntry with the supplied externalReferenceCode taken from the path -- creates a new payment when no record matches in the current company, fully replaces the existing record otherwise. Unlike PATCH, missing fields take their default value (for example, type defaults to 0 (Payment), paymentStatus defaults to 1 (Pending)). Validates the amount, payment integration type, payment status, and reason key; invalid input raises a CommercePaymentEntry*Exception that maps to 400.
            operationId: putPaymentByExternalReferenceCode
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Payment"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Payment"
                required: true
            responses:
                202:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Payment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Payment"
                    description:
                        Accepted - Async
                204:
                    description:
                        No content
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this payment.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Replaces a payment with information sent in the request body. Any missing fields are deleted
                unless they are required.
            tags:
                -   Payment
    /payments/by-externalReferenceCode/{externalReferenceCode}/refund:
        post:
            description:
                Issues a refund against the payment identified by external reference code. Resolves the payment via CommercePaymentEntryService.fetchCommercePaymentEntryByExternalReferenceCode; the call requires the record to be of type=1 (Refund), otherwise it raises UnsupportedOperationException (500). On a valid refund record, delegates to CommercePaymentGateway.refund to drive the configured payment integration and transitions the entry to paymentStatus=17 (Refunded) on success. Raises NoSuchPaymentEntryException (404) when no record matches the supplied code.
            operationId: postPaymentByExternalReferenceCodeRefund
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                201:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Payment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Payment"
                    description:
                        Created
                202:
                    description:
                        Accepted - Async
                204:
                    description:
                        No content
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
