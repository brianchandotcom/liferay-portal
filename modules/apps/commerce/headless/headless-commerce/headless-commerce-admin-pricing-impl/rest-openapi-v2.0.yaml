    schemas:
        Account:
            description:
                Read-only projection of a account referenced by a discount or price-list account binding. Carries the account id, optional logo id, and display name; the full record lives in headless-commerce-admin-account.
            properties:
                id:
                    description:
                        Internal numeric identifier of the account. Server-assigned and stable.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                logoId:
                    description:
                        Reference to the logo entity (FK identifier).
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Display name of the account.
                    example: Account Name
                    type: string
            type: object
        Category:
            description:
                Read-only projection of an AssetCategory referenced by a discount, price-modifier, or product category binding. Carries the category id, name, path, and the vocabulary the category belongs to.
            properties:
                id:
                    description:
                        Internal numeric identifier of the category. Server-assigned and stable.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    description:
                        Display name of the category.
                    example: simple
                    readOnly: true
                    type: string
                path:
                    description:
                        Hierarchical path of the record relative to its parent vocabulary or container.
                    example: simple
                    readOnly: true
                    type: string
                vocabulary:
                    description:
                        Vocabulary the record belongs to.
                    example: Default Vocabulary
                    readOnly: true
                    type: string
            type: object
        Channel:
            description:
                Read-only projection of a channel referenced by a discount or price-list channel binding. Carries the channel id, name, ERC, type, default currencyCode, and the underlying siteGroupId.
            properties:
                currencyCode:
                    description:
                        ISO 4217 currency code in which monetary values on this record are expressed.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal numeric identifier of the channel. Server-assigned and stable.
                    example: 30130
                    format: int64
                    type: integer
                name:
                    description:
                        Display name of the channel.
                    example: Web Storefront
                    type: string
                siteGroupId:
                    description:
                        Identifier of the Liferay site Group that hosts this channel. Read-only.
                    example: 30130
                    format: int64
                    type: integer
                type:
                    description:
                        Type discriminator for the record. Refer to the parent schema's documentation for the allowed values.
                    example: site
                    type: string
            type: object
        Discount:
            description:
                Promotional discount program scoped to a single company. Backed by discount; carries the target slice (subtotal, total, products, categories, skus, product-groups, order-types, or shipping), the limitation policy that caps reuse, an optional couponCode gate, the percentage tiers (or fixed-amount cap), and the cascading rel collections (account-group, account, category, channel, order-type, product, product-group, sku, rule). Workflow-aware -- the runtime only honours discounts whose status is approved (Approved).
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                active:
                    description:
                        Whether the discount is currently enabled. When false the price calculation engine skips the discount during cart evaluation.
                    example: true
                    type: boolean
                amountFormatted:
                    description:
                        Pre-formatted display string of the monetary amount, in the parent record's currency. Read-only.
                    example: $10.00
                    type: string
                couponCode:
                    description:
                        Optional coupon code that the buyer must supply at checkout when `useCouponCode` is true. Case-sensitive; ignored when `useCouponCode` is false.
                    example: SAVE20
                    type: string
                customFields:
                    additionalProperties: true
                    description:
                        Free-form Expando custom fields attached to the underlying discount entity. Keys are Expando attribute names; values follow each attribute's declared column type.
                    example:
                        priority: high
                        segment: B2B
                    type: object
                discountAccountGroups:
                    description:
                        Account-group bindings cascaded on upsert. Each entry attaches the discount to one AccountGroup; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountAccountGroup"
                    type: array
                discountAccounts:
                    description:
                        Account bindings cascaded on upsert. Each entry attaches the discount to one Account; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountAccount"
                    type: array
                discountCategories:
                    description:
                        AssetCategory bindings cascaded on upsert. Each entry restricts the discount to one category; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountCategory"
                    type: array
                discountChannels:
                    description:
                        Channel bindings cascaded on upsert. Each entry restricts the discount to one channel; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountChannel"
                    type: array
                discountOrderTypes:
                    description:
                        Order-type bindings cascaded on upsert. Each entry restricts the discount to one order type; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountOrderType"
                    type: array
                discountProductGroups:
                    description:
                        product group bindings cascaded on upsert. Each entry restricts the discount to one product group; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountProductGroup"
                    type: array
                discountProducts:
                    description:
                        product bindings cascaded on upsert. Each entry restricts the discount to one product; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountProduct"
                    type: array
                discountRules:
                    description:
                        Validator rules cascaded on upsert. Each entry attaches a pre-qualification, post-qualification, or target validator; supplying this array on POST/PUT replaces the previous rules.
                    items:
                        $ref: "#/components/schemas/DiscountRule"
                    type: array
                displayDate:
                    description:
                        Date and time when the discount becomes effective. ISO 8601.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    type: string
                expirationDate:
                    description:
                        Date and time when the discount expires. ISO 8601; the runtime stops honoring the discount past this date.
                    example: 2017-08-21T19:30:00Z
                    format: date-time
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per discount within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Internal numeric identifier of the discount. Server-assigned and stable.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                level:
                    description:
                        Level qualifier (`L1`, `L2`, `L3`, `L4`) that selects which percentageLevel applies when usePercentage is true.
                    example: L1
                    type: string
                limitationTimes:
                    description:
                        Maximum number of times the discount may be used in total when limitationType is `limited`. Zero means unlimited.
                    example: 0
                    format: int32
                    minimum: 0
                    type: integer
                limitationTimesPerAccount:
                    description:
                        Maximum number of times the discount may be used per account when limitationType is `limited-for-accounts` or `limited-for-accounts-and-total`.
                    example: 0
                    format: int32
                    minimum: 0
                    type: integer
                limitationType:
                    description:
                        Caps how often the discount may be redeemed. One of `unlimited`, `limited`, `limited-for-accounts`, `limited-for-accounts-and-total`.
                    example: unlimited
                    type: string
                maximumDiscountAmount:
                    description:
                        Fixed-amount cap on the discount payout, in the order's currency. Mutually exclusive with the percentage levels.
                    example: 25
                    format: bigdecimal
                    minimum: 0
                    type: number
                modifiedDate:
                    description:
                        Date value. ISO 8601.
                    example: 2017-07-21
                    format: date
                    readOnly: true
                    type: string
                neverExpire:
                    description:
                        When true, the discount has no expiration date and expirationDate is ignored.
                    example: true
                    type: boolean
                numberOfUse:
                    description:
                        Read-only counter of how many times the discount has been used.
                    example: 5
                    format: int32
                    minimum: 0
                    type: integer
                percentageLevel1:
                    description:
                        Percentage discount applied when `level` is `L1` and usePercentage is true.
                    example: 20
                    format: bigdecimal
                    minimum: 0
                    type: number
                percentageLevel2:
                    description:
                        Percentage discount applied when `level` is `L2` and usePercentage is true.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                percentageLevel3:
                    description:
                        Percentage discount applied when `level` is `L3` and usePercentage is true.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                percentageLevel4:
                    description:
                        Percentage discount applied when `level` is `L4` and usePercentage is true.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                rulesConjunction:
                    description:
                        When true, all attached discount rules must pass for the discount to apply; when false, any single passing rule activates the discount.
                    example: true
                    type: boolean
                target:
                    description:
                        Which order slice the discount applies to. One of `subtotal`, `total`, `products`, `categories`, `skus`, `product-groups`, `shipping`.
                    example: subtotal
                    type: string
                title:
                    description:
                        Human-readable name of the discount; shown in admin and used as the fallback label at checkout.
                    example: 20% Off
                    type: string
                useCouponCode:
                    description:
                        When true, the discount is gated by `couponCode` and is only applied when the buyer supplies the matching code at checkout.
                    example: true
                    type: boolean
                usePercentage:
                    description:
                        When true, the discount payout is calculated using `percentageLevel1..4` keyed by `level`; when false, the payout is `maximumDiscountAmount`.
                    example: true
                    type: boolean
            required:
                -   level
                -   limitationType
                -   target
                -   title
                -   usePercentage
            type: object
        DiscountAccount:
