                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                minimumQuantity:
                    description:
                        Quantity threshold at which the tier price applies; the runtime resolves the highest-threshold tier whose minimumQuantity is at most the cart line quantity.
                    example: 10.1
                    format: bigdecimal
                    minimum: 0
                    type: number
                neverExpire:
                    description:
                        When true, the record has no expiration date and expirationDate is ignored.
                    example: true
                    type: boolean
                price:
