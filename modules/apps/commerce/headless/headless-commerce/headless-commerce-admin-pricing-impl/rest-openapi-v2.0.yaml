tags:
    -   description:
            Read-only lookups of Account records referenced by other pricing resources -- exposed so a client that holds a discount or price-list account binding can resolve the linked account without leaving the pricing module.
        name: Account
    -   description:
            Read-only lookups of AssetCategory records referenced by discount and price-modifier category bindings.
        name: Category
    -   description:
            Read-only lookups of channel records referenced by discount and price-list channel bindings.
        name: Channel
    -   description:
            Promotional discount programs scoped to a company. Each discount carries a target (subtotal, total, products, categories, skus, product-groups, or shipping), a limitation policy (unlimited, limited, limited-for-accounts, limited-for-accounts-and-total), a percentage or fixed-amount payout, and may be gated by an optional couponCode. Backed by discount.
        name: Discount
    -   description:
            Account bindings that restrict a discount's eligibility to a specific set of Accounts. Backed by discount account link.
        name: DiscountAccount
    -   description:
            Account-group bindings that restrict a discount's eligibility to a specific set of AccountGroups. Backed by discount account group link.
        name: DiscountAccountGroup
    -   description:
            Category bindings that restrict a discount to products tagged with specific asset categories. Backed by discount link with the AssetCategory class name.
        name: DiscountCategory
    -   description:
            Channel bindings that restrict a discount's eligibility to a specific set of channels. Backed by discount channel link.
        name: DiscountChannel
    -   description:
            order type bindings that restrict a discount's eligibility to specific order types. Backed by discount order type link.
        name: DiscountOrderType
    -   description:
            Product bindings that restrict a discount to specific products. Backed by discount link with the product class name.
        name: DiscountProduct
    -   description:
            product group bindings that restrict a discount to products inside a product group. Backed by discount product group link.
        name: DiscountProductGroup
    -   description:
            Pre-qualification, post-qualification, or target validators attached to a discount. Each rule carries a type string and a JSON typeSettings payload interpreted by the matching discount rule type.
        name: DiscountRule
    -   description:
            SKU bindings that restrict a discount to specific SKUs. Backed by discount link with the SKU class name.
        name: DiscountSku
    -   description:
            Read-only lookups of order type records referenced by discount and price-list order-type bindings.
        name: OrderType
    -   description:
            Per-SKU price entries inside a price list. Each entry binds a SKU to a regular price and an optional promo price; entries with quantity-break overrides expose `hasTierPrice`.
        name: PriceEntry
    -   description:
            Versioned price catalogs that price SKUs in a specific currency for a catalog. Each price list has a priority, a display/expiration window, and may be scoped to specific accounts, account-groups, channels, or order types.
        name: PriceList
    -   description:
            Account bindings that restrict a price list's eligibility to a specific set of Accounts. Backed by price list account link.
        name: PriceListAccount
    -   description:
            Account-group bindings that restrict a price list's eligibility to a specific set of AccountGroups, with an `order` integer that controls the resolution priority.
        name: PriceListAccountGroup
    -   description:
            Channel bindings that restrict a price list's eligibility to a specific set of channels. Backed by price list channel link.
        name: PriceListChannel
    -   description:
            Discount linkages attached to a price list. Each binding ties one discount to the price list so its rules participate in price resolution against that list. Backed by price list discount link.
        name: PriceListDiscount
    -   description:
            order type bindings that restrict a price list's eligibility to specific order types. Backed by price list order type link.
        name: PriceListOrderType
    -   description:
            Add-on price calculations layered on a price list. Each modifier carries a target (categories, products, or product-groups), a modifierAmount or modifierPercentage, a modifierType (absolute or percentage), a limitationType, and a priority. Backed by price modifier.
        name: PriceModifier
    -   description:
            AssetCategory bindings that restrict a price modifier to products tagged with specific asset categories. Backed by price modifier link with the AssetCategory class name.
        name: PriceModifierCategory
    -   description:
            product bindings that restrict a price modifier to specific products. Backed by price modifier link with the product class name.
        name: PriceModifierProduct
    -   description:
            product group bindings that restrict a price modifier to products inside a product group. Backed by price modifier link with the product group class name.
        name: PriceModifierProductGroup
    -   description:
            Read-only lookups of account group records referenced by discount and price-list account-group bindings.
        name: PricingAccountGroup
    -   description:
            Read-only lookups of product records referenced by discount and price-modifier product bindings.
        name: Product
    -   description:
            Read-only lookups of product group records referenced by discount and price-modifier product-group bindings.
        name: ProductGroup
    -   description:
            Read-only lookups of SKU (SKU) records referenced by discount sku bindings and by price entries.
        name: Sku
    -   description:
            Quantity-break overrides on a price entry. Each tier price binds a minimumQuantity threshold to an override price; the runtime resolves the highest-quantity tier whose minimumQuantity is at most the cart line quantity.
        name: TierPrice