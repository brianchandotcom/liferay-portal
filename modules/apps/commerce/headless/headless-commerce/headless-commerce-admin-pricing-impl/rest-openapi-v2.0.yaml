                Deletes the discount account group link addressed by internal id.
            operationId: deleteDiscountAccountGroup
            parameters:
                -   $ref: "#/components/parameters/discountAccountGroupIdPathParam"
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this discount account group binding.
            summary: Deletes a Discount Account Group by ID.
            tags: ["DiscountAccountGroup"]
    /discount-account-groups/{discountAccountGroupId}/account-group:
