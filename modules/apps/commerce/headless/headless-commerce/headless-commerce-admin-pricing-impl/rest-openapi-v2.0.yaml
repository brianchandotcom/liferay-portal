            required:
                -   minimumQuantity
                -   price
                -   priceEntryId
            type: object
info:
    contact:
        email: team-commerce@liferay.com
        name: Commerce Team
    description:
        "Administrative REST API for the Liferay Commerce pricing domain, second generation (v2.0). It manages discount programs, price-list catalogs, and price-list price modifiers used to price products for buyers -- discounts (with their coupon codes, tier percentages, expiration windows, and account/account-group/category/channel/order-type/product/product-group/sku/rule scope), price lists (with their per-SKU price entries, tier-quantity break prices, and account/account-group/channel/order-type/discount eligibility), and price modifiers (price-list-attached add-on calculations scoped by category, product, or product-group). The v2.0 surface expands on v1.0 by promoting each scope binding to a first-class collection addressable both at the binding ID and through the parent's external-reference-code path, and by adding the price-modifier resource family. The API targets back-office administrators and integration tooling; storefront price resolution belongs to headless-commerce-delivery-cart and the runtime the price calculation engine services instead. Most resources are addressable both by internal ID (`/<id>`) and by external reference code (`/by-externalReferenceCode/<externalReferenceCode>`); POST against the external-reference-code path is upsert. PATCH applies JSON Merge Patch (only the supplied fields are modified), while PUT replaces the resource. For the catalog, account, channel, order, and payment surfaces see the matching `headless-commerce-admin-*` modules. -- Common workflows: Define a tiered discount end-to-end -- (1) POST /discounts with title, target (for example `products` or `subtotal`), limitationType, and the percentage levels (or a fixed maximumDiscountAmount) to create the discount (POST /discounts/by-externalReferenceCode/<externalReferenceCode> is upsert); (2) POST /discounts/<id>/discount-account-groups, /discount-accounts, /discount-categories, /discount-channels, /discount-order-types, /discount-products, /discount-product-groups, and /discount-skus to scope eligibility; (3) POST /discounts/<id>/discount-rules to attach pre-qualification, post-qualification, or target validators carrying a JSON typeSettings payload; (4) PATCH /discounts/<id> to flip `active`, rotate the couponCode, or adjust the displayDate/expirationDate window. -- Publish a contract or promotion price list -- (1) POST /price-lists with name, currencyCode, catalogId, and priority to create the price list; (2) POST /price-lists/<id>/price-entries per SKU with sku (or skuExternalReferenceCode), price, and optional promoPrice to set the per-SKU price; (3) POST /price-entries/<priceEntryId>/tier-prices to add quantity-break overrides keyed by minimumQuantity; (4) POST /price-lists/<id>/price-list-account-groups (or /price-list-accounts, /price-list-channels, /price-list-order-types) to limit visibility, and /price-lists/<id>/price-list-discounts to link tied discounts. -- Layer price modifiers on a price list -- (1) POST /price-lists/<id>/price-modifiers with target (categories, products, or product-groups), modifierAmount or modifierPercentage, and limitationType to create the price modifier; (2) POST /price-modifiers/<id>/price-modifier-categories, /price-modifier-products, or /price-modifier-product-groups to scope the modifier; (3) PATCH /price-modifiers/<id> to adjust the modifier amount, priority, or active flag. -- Maintain an existing price entry -- (1) GET /price-lists/<id>/price-entries (or /price-lists/by-externalReferenceCode/<externalReferenceCode>/price-entries) to enumerate the per-SKU entries; (2) PATCH /price-entries/<priceEntryId> (or /price-entries/by-externalReferenceCode/<externalReferenceCode>) to adjust price or promoPrice; (3) PATCH /tier-prices/<id> or DELETE /tier-prices/<id> to refresh or retire a quantity-break override. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.pricing.client', and version '4.0.49'."
