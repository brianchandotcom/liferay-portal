components:
    parameters:
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target resource on the `by-externalReferenceCode` paths. The code is the integration-supplied idempotency key, unique within the resource scope; POST against this path is upsert (create when absent, replace when present).
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. Only the price-list listing endpoint honours this parameter, and the filterable field is `name` (sourced from PriceListEntityModel). Example -- filter=name eq "Default Price List".
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        idPathParam:
            in: path
            description:
                Internal numeric identifier of the target resource. Counterpart to the `by-externalReferenceCode` path variant; identifiers are server-assigned and stable across the resource's lifetime.
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        nestedFieldsQueryParam:
            in: query
            description:
                Comma separated list of nested fields to embed in each returned resource. Each value names a relationship exposed on the resource; when omitted, those relationships are not expanded inline.
            explode: true
            name: nestedFields
            required: false
            schema:
                type: string
            style: form
        pageQueryParam:
            in: query
            description:
                One-based page index. Combined with pageSize to paginate the result set; defaults to 1 when omitted.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items per page. Defaults to the portal's configured page size when omitted; capped by the portal configuration to prevent unbounded reads.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        sortQueryParam:
            in: query
            description:
                Sort expression with one or more field:asc|desc pairs separated by commas. Only the price-list listing endpoint honours this parameter, and the sortable field is `name` (sourced from PriceListEntityModel). Example -- sort=name:asc.
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
    responses:
        NotFound:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                The specified resource was not found
        UnauthorizedError:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                Authentication information is missing or invalid
    schemas:
        Discount:
            description:
                Promotional discount program scoped to a single company. Backed by discount; carries the target slice (subtotal, total, products, categories, skus, product-groups, or shipping), the limitation policy that caps reuse, an optional couponCode gate, the percentage tiers (or fixed-amount cap), and four cascading rel collections (account-group, category, product, rule). Workflow-aware -- the runtime only honours discounts whose status is approved (Approved).
            properties:
                active:
                    description:
                        Whether the discount is currently enabled. Inverted from discount.isActive in the runtime; when false the price calculation engine skips the discount during cart evaluation.
                    example: true
                    type: boolean
                couponCode:
                    description:
                        Optional coupon code that the buyer must supply at checkout when `useCouponCode` is true. Case-sensitive; matched on the persisted record; ignored when `useCouponCode` is false.
                    example: SAVE20
                    type: string
                customFields:
                    additionalProperties: true
                    description:
                        Free-form Expando custom fields attached to the underlying discount entity. Keys are Expando attribute names; values follow each attribute's declared column type. Read and write through ExpandoBridge on the entity.
                    example:
                        customField1: value1
                    type: object
                discountAccountGroups:
                    description:
                        Account-group bindings cascaded on upsert. Each entry attaches the discount to one AccountGroup; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountAccountGroup"
                    type: array
                discountCategories:
                    description:
                        AssetCategory bindings cascaded on upsert. Each entry restricts the discount to one category; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountCategory"
                    type: array
                discountProducts:
                    description:
                        product bindings cascaded on upsert. Each entry restricts the discount to one product; supplying this array on POST/PUT replaces the previous bindings.
                    items:
                        $ref: "#/components/schemas/DiscountProduct"
                    type: array
                discountRules:
                    description:
                        Validator rules cascaded on upsert. Each entry attaches a pre-qualification, post-qualification, or target validator; supplying this array on POST/PUT replaces the previous rules.
                    items:
                        $ref: "#/components/schemas/DiscountRule"
                    type: array
                displayDate:
                    description:
                        Date and time at which the discount becomes eligible for cart evaluation. Accepted in the request locale and time zone, normalized to the portal's time zone, and compared against the current server clock at price calculation time.
                    example: 2025-01-01T19:30:00Z
                    format: date-time
                    type: string
                expirationDate:
                    description:
                        Date and time after which the discount stops applying. Ignored when `neverExpire` is true; accepted in the request locale and time zone and normalized to the portal's time zone.
                    example: 2099-12-31T19:30:00Z
                    format: date-time
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update. Must be unique per discount within the company; matched on the persisted record; indexed for exact-match search.
                    example: DISC-SUMMER-2025
                    type: string
                id:
                    description:
                        Internal numeric identifier of the discount; read-only and assigned by the service on create. Stable across the discount's lifetime.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                limitationTimes:
                    description:
                        Cap on the total number of applications across orders. Interpreted together with `limitationType` -- `unlimited` ignores this value, `limited` enforces a global cap, `limited-for-accounts` enforces a per-account cap, and `limited-for-accounts-and-total` enforces both. Stored as int; 0 means unlimited.
                    example: 100
                    format: int32
                    minimum: 0
                    type: integer
                limitationType:
                    description:
                        Strategy that decides how the discount usage cap is enforced. One of `unlimited`, `limited`, `limited-for-accounts`, `limited-for-accounts-and-total` (sourced from a discount constant). Required on create.
                    example: unlimited
                    type: string
                maximumDiscountAmount:
                    description:
                        Maximum monetary amount that can be discounted in a single application. Expressed in the order's currency with the same scale as the price entries; honoured only when `usePercentage` is true and the computed percentage payout exceeds this cap.
                    example: 50
                    format: bigdecimal
                    minimum: 0
                    type: number
                neverExpire:
                    description:
                        When true the discount has no expiration date and `expirationDate` is ignored. Defaults to true on the DTO when `expirationDate` is null; persisted as expirationDate == null in the backend.
                    example: false
                    type: boolean
                numberOfUse:
                    description:
                        How many times the discount has been applied to a placed order. Read-only; incremented by the runtime when the discount fires on a checkout.
                    example: 12
                    format: int32
                    minimum: 0
                    type: integer
                percentageLevel1:
                    description:
                        First tier of the discount percentage. Used when `usePercentage` is true; expressed as a decimal where 20 means 20%. Targets like `subtotal` and `total` only consume Level 1; SKU and category targets can chain Levels 1-4.
                    example: 20
                    format: bigdecimal
                    minimum: 0
                    type: number
                percentageLevel2:
                    description:
                        Second tier of the discount percentage. Applies to multi-tier discount targets (chained off Level 1). Expressed as a decimal; 0 means no second tier.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                percentageLevel3:
                    description:
                        Third tier of the discount percentage. Applies to multi-tier discount targets. Expressed as a decimal; 0 means no third tier.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                percentageLevel4:
                    description:
                        Fourth tier of the discount percentage. Applies to multi-tier discount targets. Expressed as a decimal; 0 means no fourth tier.
                    example: 0
                    format: bigdecimal
                    minimum: 0
                    type: number
                target:
                    description:
                        Slice of the order the discount applies to. One of `subtotal`, `total`, `products`, `categories`, `skus`, `product-groups`, `shipping` (sourced from a discount constant). Required on create. The choice decides which of the four rel collections (categories, products, account groups) the price calculation engine consults.
                    example: subtotal
                    type: string
                title:
                    description:
                        Human-readable title of the discount. Shown in the admin UI, in usage reports, and in any HATEOAS link that references the discount.
                    example: Summer 20% Off
                    type: string
                useCouponCode:
                    description:
                        When true the discount only applies when the buyer supplies the matching `couponCode` at checkout. Storefront enforces this via the cart's coupon-code workflow.
                    example: true
                    type: boolean
                usePercentage:
                    description:
                        When true the discount payout is computed from `percentageLevel1` ... `percentageLevel4`. When false the discount uses the `maximumDiscountAmount` fixed-amount payout.
                    example: true
                    type: boolean
            required:
                -   limitationType
                -   target
                -   title
            type: object
        DiscountAccountGroup:
            description:
                Account-group binding that restricts a discount to a specific AccountGroup. Backed by discount account group link; one row per (discount, accountGroup) pair, the pair is enforced unique by the underlying service.
            properties:
                accountGroupExternalReferenceCode:
                    description:
                        External reference code of the target AccountGroup. Either this or `accountGroupId` must be supplied on create; resolved through AccountGroupLocalService.fetchByExternalReferenceCode.
                    example: ACG-PARTNERS
                    type: string
                accountGroupId:
                    description:
                        Internal numeric identifier of the target AccountGroup. Either this or `accountGroupExternalReferenceCode` must be supplied on create.
                    example: 41001
                    format: int64
                    minimum: 0
                    type: integer
                discountExternalReferenceCode:
                    description:
                        External reference code of the parent discount. Populated by the server on response; on create the discount is resolved from the URL path.
                    example: DISC-SUMMER-2025
                    type: string
                discountId:
                    description:
                        Internal numeric identifier of the parent discount. Populated by the server on response; on create the discount is resolved from the URL path.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                id:
                    description:
                        Internal numeric identifier of the discount account group link; read-only and assigned by the service on create.
                    example: 30643
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
            type: object
        DiscountCategory:
            description:
                Category binding that restricts a discount to products tagged with a specific AssetCategory. Backed by discount link where classNameId resolves to AssetCategory; honoured only when the parent discount's `target` is `categories`.
            properties:
                categoryExternalReferenceCode:
                    description:
                        External reference code of the target AssetCategory. Either this or `categoryId` must be supplied on create; resolved through AssetCategoryLocalService.fetchByExternalReferenceCode.
                    example: CAT-LAPTOPS
                    type: string
                categoryId:
                    description:
                        Internal numeric identifier of the target AssetCategory. Either this or `categoryExternalReferenceCode` must be supplied on create.
                    example: 41002
                    format: int64
                    minimum: 0
                    type: integer
                discountExternalReferenceCode:
                    description:
                        External reference code of the parent discount. Populated by the server on response; on create the discount is resolved from the URL path.
                    example: DISC-SUMMER-2025
                    type: string
                discountId:
                    description:
                        Internal numeric identifier of the parent discount. Populated by the server on response; on create the discount is resolved from the URL path.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                id:
                    description:
                        Internal numeric identifier of the discount link (AssetCategory binding); read-only and assigned by the service on create.
                    example: 30644
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
            type: object
        DiscountProduct:
            description:
                Product binding that restricts a discount to a specific product. Backed by discount link where classNameId resolves to product; honoured only when the parent discount's `target` is `products`.
            properties:
                discountExternalReferenceCode:
                    description:
                        External reference code of the parent discount. Populated by the server on response; on create the discount is resolved from the URL path.
                    example: DISC-SUMMER-2025
                    type: string
                discountId:
                    description:
                        Internal numeric identifier of the parent discount. Populated by the server on response; on create the discount is resolved from the URL path.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                id:
                    description:
                        Internal numeric identifier of the discount link (product binding); read-only and assigned by the service on create.
                    example: 30645
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                productExternalReferenceCode:
                    description:
                        External reference code of the target product. Either this or `productId` must be supplied on create; resolved through the catalog service.
                    example: PROD-HAND-SAW
                    type: string
                productId:
                    description:
                        Internal numeric identifier of the target product. Either this or `productExternalReferenceCode` must be supplied on create.
                    example: 42001
                    format: int64
                    minimum: 0
                    type: integer
            type: object
        DiscountRule:
            description:
                Validator rule attached to a discount. Backed by discount rule; the `type` string selects the discount rule type implementation (registered via OSGi), and `typeSettings` carries the JSON configuration the validator consumes at price-calculation time.
            properties:
                discountId:
                    description:
                        Internal numeric identifier of the parent discount. Read-only; populated by the server from the URL path on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                id:
                    description:
                        Internal numeric identifier of the discount rule; read-only and assigned by the service on create.
                    example: 30646
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                type:
                    description:
                        Validator type that selects the discount rule type implementation. Common values include `cart-total`, `categories`, `products`, and `coupon`. Required on create; unknown types raise DiscountRuleTypeException -> 400.
                    example: cart-total
                    type: string
                typeSettings:
                    description:
                        JSON-encoded configuration consumed by the matching discount rule type. The shape depends on `type` -- for `cart-total` it carries a numeric threshold, for `categories` it carries the eligible category list, and so on.
                    example: "22.50"
                    type: string
            required:
                -   type
            type: object
        Error:
            description:
                Standard error envelope returned by the JAX-RS exception mappers in the impl module. Wraps the HTTP status, an internal error code, and a human-readable message and description for failed requests; emitted as application/json or application/xml based on the request's Accept header.
            properties:
                errorCode:
                    description:
                        Internal Liferay error code that classifies the failure. Stable across releases for the same error condition; used by integration code to branch on specific failure modes without parsing the message.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Detailed, human-readable explanation of the failure intended for log entries and developer-facing tooling. May embed lookup keys that identify the offending entity.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Short, human-readable summary of the failure intended for end-user display. May embed lookup keys that identify the offending entity.
                    example: No currency exists with the key (companyId=41811, code=USD)
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code returned with the response. Mirrors the numeric status of the response line.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        PriceEntry:
            description:
                Per-SKU price entry inside a price list. Backed by price entry; binds a SKU to a regular price and an optional promo price. Entries with one or more tier price overrides expose `hasTierPrice` as true.
            properties:
                customFields:
                    additionalProperties: true
                    description:
                        Free-form Expando custom fields attached to the underlying price entry entity. Keys are Expando attribute names; values follow each attribute's declared column type.
                    example:
                        customField1: value1
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key for create and update. Must be unique per price entry within the company; matched on the persisted record.
                    example: PE-HAND-SAW-DEFAULT
                    type: string
                hasTierPrice:
                    description:
                        Whether the entry has one or more tier price overrides. Read-only; computed by the runtime from the tier-price collection on every fetch.
                    example: true
                    type: boolean
                id:
                    description:
                        Internal numeric identifier of the price entry; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                price:
                    description:
                        Regular selling price for the SKU within this price list. Expressed in the price list's currency with the price-list scale (typically 2 decimals); rejected when negative.
                    example: 99.99
                    format: bigdecimal
                    minimum: 0
                    type: number
                priceListExternalReferenceCode:
                    description:
                        External reference code of the parent price list. Populated by the server on response; on create the parent is resolved from the URL path.
                    example: PL-DEFAULT-USD
                    type: string
                priceListId:
                    description:
                        Internal numeric identifier of the parent price list. Populated by the server on response; on create the parent is resolved from the URL path.
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                promoPrice:
                    description:
                        Promotional price applied when a promotion is active for the SKU. Expressed in the price list's currency; rejected when negative.
                    example: 89.99
                    format: bigdecimal
                    minimum: 0
                    type: number
                sku:
                    description:
                        SKU code of the target SKU. Read-only on update; on create the SKU is resolved by `skuId` or `skuExternalReferenceCode`.
                    example: HAND-SAW-A1
                    type: string
                skuExternalReferenceCode:
                    description:
                        External reference code of the target SKU. Either this or `skuId` must be supplied on create; resolved through the catalog service.
                    example: SKU-HAND-SAW-A1
                    type: string
                skuId:
                    description:
                        Internal numeric identifier of the target SKU. Either this or `skuExternalReferenceCode` must be supplied on create.
                    example: 42101
                    format: int64
                    minimum: 0
                    type: integer
                tierPrices:
                    description:
                        Quantity-break overrides cascaded on upsert. Supplying this array on POST/PATCH replaces the previous tier-price collection.
                    items:
                        $ref: "#/components/schemas/TierPrice"
                    type: array
            required:
                -   price
            type: object
        PriceList:
            description:
                Versioned price catalog scoped to a catalog. Backed by price list; carries the currency, the resolution priority, an optional display/expiration window, and nested priceEntries and priceListAccountGroups collections. The DTO field `active` is the logical inverse of the backend `inactive` flag.
            properties:
                active:
                    description:
                        Whether the price list is currently enabled. Inverse of the backend `inactive` flag; when false the runtime skips the list during price resolution.
                    example: true
                    type: boolean
                catalogId:
                    description:
                        Internal numeric identifier of the parent catalog. Resolved by the converter on the price list's groupId; 0 when the lookup fails.
                    example: 23130
                    format: int64
                    minimum: 0
                    type: integer
                currencyCode:
                    description:
                        ISO 4217 code of the currency the prices are expressed in. Must match an existing currency in the company scope (matched on the persisted record).
                    example: USD
                    type: string
                customFields:
                    additionalProperties: true
                    description:
                        Free-form Expando custom fields attached to the underlying price list entity. Keys are Expando attribute names; values follow each attribute's declared column type.
                    example:
                        customField1: value1
                    type: object
                displayDate:
                    description:
                        Date and time at which the price list becomes eligible for price resolution. Accepted in the request locale and time zone, normalized to the portal's time zone.
                    example: 2025-01-01T19:30:00Z
                    format: date-time
                    type: string
                expirationDate:
                    description:
                        Date and time after which the price list stops applying. Ignored when `neverExpire` is true; accepted in the request locale and time zone.
                    example: 2099-12-31T19:30:00Z
                    format: date-time
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update. Must be unique per price list within the company; matched on the persisted record.
                    example: PL-DEFAULT-USD
                    type: string
                id:
                    description:
                        Internal numeric identifier of the price list; read-only and assigned by the service on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Human-readable name of the price list shown in the admin UI. Indexed for search and exposed as the OData `name` field for filter and sort.
                    example: Default USD Price List
                    type: string
                neverExpire:
                    description:
                        When true the price list has no expiration date and `expirationDate` is ignored. Defaults to true on the DTO when `expirationDate` is null.
                    example: false
                    type: boolean
                priceEntries:
                    description:
                        Per-SKU price entries cascaded on upsert. Supplying this array on POST/PUT replaces the previous price-entry collection.
                    items:
                        $ref: "#/components/schemas/PriceEntry"
                    type: array
                priceListAccountGroups:
                    description:
                        Account-group bindings cascaded on upsert. Supplying this array on POST/PUT replaces the previous binding collection.
                    items:
                        $ref: "#/components/schemas/PriceListAccountGroup"
                    type: array
                priority:
                    description:
                        Resolution priority used when more than one eligible price list applies to a buyer. Higher values win; ties are broken by externalReferenceCode lexicographic order.
                    example: 1.0
                    format: double
                    type: number
            required:
                -   currencyCode
                -   name
            type: object
        PriceListAccountGroup:
            description:
                Account-group binding that restricts a price list to a specific AccountGroup. Backed by price list account group link; the `order` integer controls the resolution priority when multiple account-group bindings match the buyer.
            properties:
                accountGroupExternalReferenceCode:
                    description:
                        External reference code of the target AccountGroup. Either this or `accountGroupId` must be supplied on create; resolved through AccountGroupLocalService.fetchByExternalReferenceCode.
                    example: ACG-PARTNERS
                    type: string
                accountGroupId:
                    description:
                        Internal numeric identifier of the target AccountGroup. Either this or `accountGroupExternalReferenceCode` must be supplied on create.
                    example: 41001
                    format: int64
                    minimum: 0
                    type: integer
                id:
                    description:
                        Internal numeric identifier of the price list account group link; read-only and assigned by the service on create.
                    example: 30647
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                order:
                    description:
                        Resolution priority within the (price list, account group) bindings. Used as a tie-breaker when multiple account-group bindings match the buyer; lower values evaluated first.
                    example: 1
                    format: int32
                    minimum: 0
                    type: integer
                priceListExternalReferenceCode:
                    description:
                        External reference code of the parent price list. Populated by the server on response; on create the parent is resolved from the URL path.
                    example: PL-DEFAULT-USD
                    type: string
                priceListId:
                    description:
                        Internal numeric identifier of the parent price list. Populated by the server on response; on create the parent is resolved from the URL path.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            type: object
        TierPrice:
            description:
                Quantity-break override on a price entry. Backed by tier price; the DTO's `minimumQuantity` maps to the backend `minQuantity` BigDecimal threshold above which `price` (and optional `promoPrice`) supersede the parent price entry.
            properties:
                customFields:
                    additionalProperties: true
                    description:
                        Free-form Expando custom fields attached to the underlying tier price entity. Keys are Expando attribute names; values follow each attribute's declared column type.
                    example:
                        customField1: value1
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key for create and update. Must be unique per tier price within the company; matched on the persisted record.
                    example: TP-HAND-SAW-Q10
                    type: string
                id:
                    description:
                        Internal numeric identifier of the tier price; read-only and assigned by the service on create.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                minimumQuantity:
                    description:
                        Quantity threshold above which the tier `price` (and optional `promoPrice`) supersedes the parent price entry. Maps to tier price.minQuantity (BigDecimal); supplied as integer in the DTO and converted on persistence.
                    example: 10
                    format: int32
                    minimum: 0
                    type: integer
                price:
                    description:
                        Override price applied at or above `minimumQuantity`. Expressed in the parent price list's currency with the price-list scale; rejected when negative.
                    example: 89.99
                    format: bigdecimal
                    minimum: 0
                    type: number
                priceEntryExternalReferenceCode:
                    description:
                        External reference code of the parent price entry. Populated by the server on response; on create the parent is resolved from the URL path.
                    example: PE-HAND-SAW-DEFAULT
                    type: string
                priceEntryId:
                    description:
                        Internal numeric identifier of the parent price entry. Populated by the server on response; on create the parent is resolved from the URL path.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                promoPrice:
                    description:
                        Promotional override price applied at or above `minimumQuantity` when a promotion is active. Expressed in the parent price list's currency; rejected when negative.
                    example: 79.99
                    format: bigdecimal
                    minimum: 0
                    type: number
            type: object
info:
    description:
        "Administrative REST API for the Liferay Commerce pricing domain. It manages discount programs and price-list catalogs used to price products for buyers -- discounts (with their coupon codes, tier percentages, expiration windows, and account-group/category/product/rule scope), price lists (with their per-SKU price entries, tier-quantity break prices, and account-group eligibility), and the rules that decide when each program applies. The API targets back-office administrators and integration tooling; storefront price resolution belongs to headless-commerce-delivery-cart and the runtime the price calculation engine services instead. Most resources are addressable both by internal ID (`/<id>`) and by external reference code (`/by-externalReferenceCode/<externalReferenceCode>`); POST against the external-reference-code path is upsert. PATCH applies JSON Merge Patch (only the supplied fields are modified), while PUT replaces the resource. For the catalog, account, channel, order, and payment surfaces see the matching `headless-commerce-admin-*` modules. -- Common workflows: Define a tiered discount end-to-end -- (1) POST /discounts with title, target (for example `products` or `subtotal`), limitationType, and the percentage levels (or a fixed maximumDiscountAmount) to create the discount (POST /discounts/by-externalReferenceCode/<externalReferenceCode> is upsert); (2) POST /discounts/<id>/discountAccountGroups, /discountCategories, and /discountProducts to scope eligibility; (3) POST /discounts/<id>/discountRules to attach pre-qualification, post-qualification, or target validators carrying a JSON typeSettings payload; (4) PATCH /discounts/<id> to flip `active`, rotate the couponCode, or adjust the displayDate/expirationDate window. -- Publish a contract or promotion price list -- (1) POST /priceLists with name, currencyCode, catalogId, and priority to create the price list; (2) POST /priceLists/<id>/priceEntries per SKU with sku (or skuExternalReferenceCode), price, and optional promoPrice to set the per-SKU price; (3) POST /priceEntries/<id>/tierPrices to add quantity-break overrides keyed by minimumQuantity; (4) POST /priceLists/<id>/priceListAccountGroups to limit visibility to specific AccountGroups with an ordering priority. -- Maintain an existing price entry -- (1) GET /priceLists/<id>/priceEntries (or /priceLists/by-externalReferenceCode/<externalReferenceCode>/priceEntries) to enumerate the per-SKU entries; (2) PATCH /priceEntries/<id> (or /priceEntries/by-externalReferenceCode/<externalReferenceCode>) to adjust price or promoPrice; (3) PATCH /tierPrices/<id> or DELETE /tierPrices/<id> to refresh or retire a quantity-break override. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.pricing.client', and version '4.0.49'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Admin Pricing API
    version: v1.0
