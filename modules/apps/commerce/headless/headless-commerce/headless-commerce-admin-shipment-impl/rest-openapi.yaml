components:
    parameters:
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target resource on the `by-externalReferenceCode` paths. The code is the integration-supplied idempotency key, unique within the resource scope; PUT against this path is upsert (create when absent, replace when present).
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. The supported fields are those exposed by the matching Liferay entity model for shipment (typically createDate, modifiedDate, status, and the shipment identifiers). Example -- filter=status eq 2.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        nestedFieldsQueryParam:
            in: query
            description:
                Comma-separated list of nested fields to embed in each returned resource. Each value names a relationship exposed on the resource; when omitted, those relationships are not expanded inline.
            explode: true
            name: nestedFields
            required: false
            schema:
                type: string
            style: form
        pageQueryParam:
            in: query
            description:
                One-based page index. Combined with pageSize to paginate the result set; defaults to 1 when omitted.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items per page. Defaults to the portal's configured page size when omitted; capped by the portal configuration to prevent unbounded reads.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        searchQueryParam:
            in: query
            description:
                Full-text search expression matched against the resource's indexed fields. Returns the items whose searchable content matches the expression.
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        shipmentIdPathParam:
            in: path
            description:
                Internal numeric identifier of the target shipment. Counterpart to the `by-externalReferenceCode` path variant; identifiers are server-assigned and stable across the shipment's lifetime.
            explode: false
            name: shipmentId
            required: true
            schema:
                description:
                    The shipment resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        shipmentItemIdPathParam:
            in: path
            description:
                Internal numeric identifier of the target shipment item. Identifiers are server-assigned and stable across the shipment item's lifetime; the parent shipment is resolved from the row.
            explode: false
            name: shipmentItemId
            required: true
            schema:
                description:
                    The shipment item resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        sortQueryParam:
            in: query
            description:
                Sort expression of the form `field:asc` or `field:desc`, comma-separated for multi-field sorting. Supported sort fields depend on the endpoint and are sourced from the matching entity model (typically createDate, modifiedDate, and the status field).
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
    schemas:
        Error:
            description:
                Standard error envelope returned on every non-success response. Carries the HTTP status, an internal error code, a short human-readable message, and a developer-oriented diagnostic description.
            properties:
                errorCode:
                    description:
                        Numeric tooling-facing identifier that groups related failures across the API. Read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Diagnostic message describing the failure. Intended for logs and debugging surfaces; not meant for end-user display. Read-only.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Short human-readable summary of the failure, suitable for end-user display when the calling client does not provide a domain-specific message. Read-only.
                    example: No CommerceCurrency exists with the key {groupId=41811, code=US Dollar}
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code returned with the response; mirrors the response status line. Read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        Shipment:
            description:
                Fulfillment record that ships a single parcel for a source order. Carries the carrier, tracking identifiers, expected and shipping dates, the ship-to address, the picked items, and the workflow status that advances from processing through ready-to-be-shipped and shipped to delivered.
            properties:
                accountId:
                    description:
                        Reference to the customer account that owns the source order (FK identifier). Copied from the order at creation time and read-only thereafter.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                carrier:
                    description:
                        Name of the shipping carrier handling the parcel. Free-form string supplied by the fulfillment operator; updatable while the shipment is still in flight.
                    example: FedEx
                    type: string
                createDate:
                    description:
                        Creation timestamp in ISO 8601. Read-only; set when the shipment is first persisted.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                customFields:
                    description:
                        Custom field values attached to the shipment by the platform's expando mechanism. Each entry is a name/value pair declared on the shipment's custom-fields configuration; the field set is installation-specific.
                    items:
                        type: customField
                    type: array
                expectedDate:
                    description:
                        Estimated delivery date in ISO 8601. Supplied by the fulfillment operator; updatable until the shipment is delivered.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per shipment within the company. When set, the resource is also addressable through the by-external-reference-code paths.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Server-assigned identifier of the shipment. Stable across the shipment's lifetime. Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                modifiedDate:
                    description:
                        Timestamp of the most recent update in ISO 8601. Read-only; refreshed on every persisted change.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                orderExternalReferenceCode:
                    description:
                        External reference code of the source order. Accepted on create as an alternative to orderId; the order is resolved against the current company scope. Write-only -- the response carries the resolved orderId and accountId instead.
                    example: AB-34098-789-N
                    type: string
                orderId:
                    description:
                        Reference to the source order this shipment fulfills (FK identifier). Required on create when orderExternalReferenceCode is omitted; seeds the shipment's group, customer account, ship-to address, shipping method, and shipping-option label.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                shipmentItems:
                    description:
                        Nested picked-line rows to write together with the shipment. When supplied on update, every existing line on the parent is removed first and the array is replayed; supply an empty array to clear all lines, or omit the field to leave the lines untouched.
                    items:
                        $ref: "#/components/schemas/ShipmentItem"
                    type: array
                shippingAddress:
                    $ref: "#/components/schemas/ShippingAddress"
                    description:
                        Nested ship-to address applied to this shipment. When supplied, the existing address row is updated in place (or a new one is created when none is linked yet) and the shipment is rebound to it. Omit to leave the address inherited from the source order.
                shippingAddressId:
                    description:
                        Reference to the postal address the parcel ships to (FK identifier). Copied from the source order at creation time; can be retargeted by supplying a nested shippingAddress or by calling the shipping-address endpoint.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                shippingDate:
                    description:
                        Date the parcel was handed over to the carrier, in ISO 8601. Typically set when the shipment transitions to shipped.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    type: string
                shippingMethodId:
                    description:
                        Reference to the shipping method used by the carrier (FK identifier). Copied from the source order at creation time; updatable while the shipment is still processing or ready to be shipped.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                shippingOptionName:
                    description:
                        Label of the shipping option selected on the source order. Copied from the order at creation time. Read-only.
                    example: Standard Delivery
                    readOnly: true
                    type: string
                status:
                    $ref: "#/components/schemas/Status"
                    description:
                        Workflow envelope with the integer code and the localized label of the shipment. Transitions are driven by the dedicated status-* endpoints and cannot run backwards; reaching shipped or delivered emits an asynchronous shipment-status message. Read-only on this schema.
                    readOnly: true
                trackingNumber:
                    description:
                        Carrier-assigned tracking number for the parcel. Free-form string supplied by the fulfillment operator.
                    example: 123AD-asd
                    type: string
                trackingURL:
                    description:
                        Carrier tracking page for the parcel. Free-form string; not validated as a URL. Defaults to the tracking URL configured on the selected shipping method when the field is omitted.
                    example: https://example.com/track?number=123AD-asd
                    type: string
                userName:
                    description:
                        Full name of the user who created the shipment. Read-only.
                    example: John Doe
                    readOnly: true
                    type: string
            type: object
        ShipmentItem:
            description:
                Single picked line on a shipment. Binds an order item to a shipment with a quantity drawn from a specific inventory warehouse, optionally validating against stock on hand at write time.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                createDate:
                    description:
                        Creation timestamp in ISO 8601. Read-only; set when the picked-line row is first persisted.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per picked line within the company. When set, the resource is also addressable through the by-external-reference-code paths.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Server-assigned identifier of the picked-line row. Stable across the row's lifetime. Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                modifiedDate:
                    description:
                        Timestamp of the most recent update in ISO 8601. Read-only; refreshed on every persisted change.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                orderItemExternalReferenceCode:
                    description:
                        External reference code of the source order item this line draws from. Accepted on create as an alternative to orderItemId; the order item is resolved against the current company scope.
                    example: AB-34098-789-N
                    type: string
                orderItemId:
                    description:
                        Reference to the source order item this line draws from (FK identifier). Required on create when orderItemExternalReferenceCode is omitted; identifies the SKU and the remaining quantity available to ship.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                quantity:
                    description:
                        Quantity shipped on this line, expressed in the unit of measure of the referenced order item. Formatted on read against the SKU's unit-of-measure configuration. Required on create; must be positive.
                    example: 10.1
                    format: bigdecimal
                    minimum: 0
                    type: number
                shipmentExternalReferenceCode:
                    description:
                        External reference code of the parent shipment this line belongs to. Read-only; derived from the linked shipment.
                    example: AB-34098-789-N
                    type: string
                shipmentId:
                    description:
                        Reference to the parent shipment this line belongs to (FK identifier). Set by the server when the line is created through a shipment-scoped path. Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                unitOfMeasureKey:
                    description:
                        Unit-of-measure key applied to the quantity. Inherited from the referenced order item; common values are each, kg, and m.
                    example: each
                    type: string
                userName:
                    description:
                        Full name of the user who created the picked line. Read-only.
                    example: John Doe
                    readOnly: true
                    type: string
                validateInventory:
                    description:
                        When true, the server validates the requested quantity against the warehouse's current stock on hand and rejects the write when stock is insufficient. Defaults to true when omitted.
                    example: true
                    type: boolean
                warehouseExternalReferenceCode:
                    description:
                        External reference code of the inventory warehouse the line is picked from. Accepted on create as an alternative to warehouseId; the warehouse is resolved against the current company scope.
                    example: AB-34098-789-N
                    type: string
                warehouseId:
                    description:
                        Reference to the inventory warehouse the line is picked from (FK identifier). Required on create when warehouseExternalReferenceCode is omitted. Defaults on update to the warehouse already bound to the row.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
            required:
                -   quantity
            type: object
        ShippingAddress:
            description:
                Postal address used as the ship-to location for a shipment. Country and region are resolved by ISO code against the portal's country and region catalogs; the same row is shared with the parent shipment's address slot.
            properties:
                city:
                    description:
                        City portion of the address. Required.
                    example: Diamond Bar
                    type: string
                countryISOCode:
                    description:
                        ISO 3166-1 alpha-2 country code. Resolved against the portal's country catalog to bind the address to a country record. Required.
                    example: US
                    type: string
                description:
                    description:
                        Free-form delivery notes attached to the address, such as building or floor hints. Optional.
                    example: right stairs, first room on the left
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for the address row; must be unique per address within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Server-assigned identifier of the address row. Stable across the address's lifetime.
                    example: 31130
                    format: int64
                    minimum: 0
                    type: integer
                latitude:
                    description:
                        Geographic latitude of the address in decimal degrees. Optional.
                    example: 33.9976884
                    format: double
                    type: number
                longitude:
                    description:
                        Geographic longitude of the address in decimal degrees. Optional.
                    example: -117.8144595
                    format: double
                    type: number
                name:
                    description:
                        Full name of the recipient on the parcel label. Required.
                    example: Alessio Antonio Rendina
                    type: string
                phoneNumber:
                    description:
                        Recipient phone number as a free-form string. Optional; not validated for shape.
                    example: (123) 456 7890
                    type: string
                regionISOCode:
                    description:
                        Region or state code within the resolved country, in the portal's region-code shape. Optional.
                    example: CA
                    type: string
                street1:
                    description:
                        First line of the street address (number and street name). Required.
                    example: 1400 Montefino Ave
                    type: string
                street2:
                    description:
                        Second line of the street address, such as apartment or floor. Optional.
                    example: 1st floor
                    type: string
                street3:
                    description:
                        Third line of the street address, such as suite or building. Optional.
                    example: suite 200
                    type: string
                zip:
                    description:
                        Postal or ZIP code of the address.
                    example: "91765"
                    type: string
            required:
                -   city
                -   countryISOCode
                -   name
                -   street1
            type: object
        Status:
            description:
                Workflow envelope describing the integer code and human-readable label of a shipment's current state. Used by the Shipment.status property; the value follows the shipment lifecycle and is not editable directly on the parent resource.
            properties:
                code:
                    description:
                        Integer status of the shipment -- 0=Processing, 1=Ready to be shipped, 2=Shipped, 3=Delivered. Transitions are driven by the dedicated status-* endpoints and cannot run backwards. Read-only.
                    example: 2
                    format: int32
                    readOnly: true
                    type: integer
                label:
                    description:
                        Non-localized label corresponding to the integer code.
                    example: shipped
                    type: string
                label_i18n:
                    description:
                        Localized label corresponding to the integer code, resolved against the current request's preferred locale.
                    example: Spedito
                    type: string
            type: object
info:
    description:
        "Liferay Commerce Admin Shipment REST API. Manages the fulfillment of orders -- shipment headers, the shipment item rows that pick stock from a warehouse, the address that the parcel ships to, and the workflow that advances a shipment from PROCESSING (0) to READY_TO_BE_SHIPPED (1) to SHIPPED (2) to DELIVERED (3). The API targets back-office fulfillment operators and integration tooling; storefront-side ordering belongs to the headless-commerce-delivery-order module. Most resources are addressable both by internal ID and by external reference code; PUT against the external-reference-code path is upsert (create when the ERC is unknown, update otherwise). PATCH applies JSON Merge Patch (only the supplied fields are modified). For the order, account, and inventory data that this module refers to see the matching headless-commerce-admin-order, headless-commerce-admin-account, and headless-commerce-admin-inventory modules. -- Common workflows: Ship an order in one parcel -- (1) POST /shipments with orderId (or orderExternalReferenceCode) and an inline shipmentItems array to create the shipment in PROCESSING status and deduct stock from the chosen warehouse; (2) POST /shipments/<shipmentId>/status-finish-processing to advance the shipment to READY_TO_BE_SHIPPED once picking is complete; (3) POST /shipments/<shipmentId>/status-shipped after the carrier accepts the parcel; (4) POST /shipments/<shipmentId>/status-delivered after the customer receives it. -- Partial fulfillment -- (1) POST /shipments referencing the order to open an empty shipment; (2) POST /shipments/<shipmentId>/items per order item to add a subset of the ordered quantity, choosing the picking warehouse per row; (3) repeat the open-then-add cycle for each subsequent parcel until the remaining order quantity is zero. -- Correct a shipment in flight -- (1) PATCH /shipments/<shipmentId> to adjust carrier, trackingNumber, trackingURL, expectedDate, shippingDate, or shippingMethodId without changing the line items; (2) PATCH /shipments/<shipmentId>/shipping-address to retarget the parcel before it leaves the warehouse; (3) DELETE /shipments/<shipmentId> to roll the shipment back. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.shipment.client', and version '1.0.42'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Admin Shipment API
    version: v1.0
openapi: 3.0.0
paths:
    /shipment-items/by-externalReferenceCode/{externalReferenceCode}:
        delete:
            description:
                Deletes the shipment item identified by external reference code. Resolves the row and calls deleteCommerceShipmentItem with restoreStockQuantity=false; raises a not-found error (404) when the ERC is unknown.
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this shipment item.
            summary: Deletes a Shipment Item by external reference code.
            tags:
                -   ShipmentItem
        get:
            description:
                Returns the shipment item identified by external reference code. Resolves the row against the current company scope; raises a not-found error (404) when the ERC is unknown.
            operationId: getShipmentByExternalReferenceCodeItem
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ShipmentItem"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ShipmentItem"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this shipment item.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets a Shipment Item by external reference code.
            tags:
                -   ShipmentItem
        patch:
            description:
                Updates the shipment item identified by external reference code using JSON Merge Patch (only the supplied fields are modified). Resolves the row, then calls the service with the resolved warehouse, the new quantity, and the validateInventory flag (default true). Raises a not-found error (404) when the ERC is unknown; domain validation (inactive warehouse, insufficient stock) maps to 422.
            parameters:
                -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ShipmentItem"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/ShipmentItem"
                required: true
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ShipmentItem"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ShipmentItem"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this shipment item.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                422:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        A domain validation error prevented the shipment item from being created or updated (for example, the referenced warehouse is inactive, the requested quantity exceeds stock on hand, or a required cross-reference cannot be resolved).
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Updates a Shipment Item by external reference code.
            tags:
                -   ShipmentItem
    /shipment-items/{shipmentItemId}:
        delete:
            description:
                Deletes the shipment item identified by shipmentItemId. Calls the service with restoreStockQuantity=false; the row is removed without re-crediting the shipped quantity back to the order item.
            operationId: deleteShipmentItem
            parameters:
                -   $ref: "#/components/parameters/shipmentItemIdPathParam"
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this shipment item.
            summary: Deletes a Shipment Item by ID.
            tags:
                -   ShipmentItem
        get:
            description:
                Returns the shipment item identified by shipmentItemId. Read-only fetch; the response includes the actions HATEOAS map for the current user.
            operationId: getShipmentItem
            parameters:
                -   $ref: "#/components/parameters/shipmentItemIdPathParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ShipmentItem"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ShipmentItem"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this shipment item.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
