tags:
    -   description:
            Named restock-time windows (for example, `Available in 1-3 weeks`) shown on out-of-stock storefront items to communicate when the merchant expects them to become available again. Records are company-scoped on the server.
        name: AvailabilityEstimate
    -   description:
            Units of measure (`Dimensions`, `Weight`, `Unit`) used by SKUs and shipping rules, with per-company primary-unit and conversion-rate semantics.
        name: MeasurementUnit
    -   description:
            Classifications used to group SKUs that share the same tax treatment. Records are company-scoped on the server and referenced by pricing and tax engines to resolve the applicable rate.
        name: TaxCategory
    -   description:
            Warehouse definitions (name, postal address, geolocation, active flag) addressed through this admin API. Records are company-scoped on the server. Per-SKU stock levels and account/group/channel scoping live in the admin-inventory API.
        name: Warehouse