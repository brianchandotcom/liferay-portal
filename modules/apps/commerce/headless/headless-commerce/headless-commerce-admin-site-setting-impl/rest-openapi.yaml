components:
    parameters:
        activeQueryParam:
            in: query
            description:
                Boolean flag intended to restrict a Warehouse list to entities whose `active` flag matches the supplied value. Accepted by getCommerceAdminSiteSettingGroupWarehousePage but currently has no observable effect because that operation is a stub returning an empty Page.
            explode: true
            name: active
            required: false
            schema:
                description:
                    Active to filter
                example: true
                type: boolean
            style: form
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code (ERC) used as the addressing key in place of the internal long ID. ERCs are client-defined and stable across migrations.
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 $filter expression applied to the resource (for example, `key eq 'kg'` or `name eq 'Acme'`). The set of filterable fields is defined by the back-end entity model; see the per-resource list operation description for specifics.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        groupIdPathParam:
            in: path
            description:
                Liferay site identifier (`groupId`) that scopes the operation. Only entities belonging to this site are visible or created.
            explode: false
            name: groupId
            required: true
            schema:
                description:
                    Group to filter (Liferay site)
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        idPathParam:
            in: path
            description:
                Internal long ID of the addressed resource. Generated by Liferay on create; not stable across migrations.
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        keyPathParam:
            in: path
            description:
                Stable string key of a MeasurementUnit (for example, `kg`, `cm`, `unit`). Unique per company and used as an alternative addressing scheme to the internal long ID.
            explode: false
            name: key
            required: true
            schema:
                description:
                    The resource key
                example: kg
                minLength: 1
                type: string
            style: simple
        measurementUnitTypePathParam:
            in: path
            description:
                MeasurementUnit type label (either the human label `Dimensions`, `Weight`, `Unit` or its integer code `0`, `1`, `2`) used to scope a list query.
            explode: false
            name: measurementUnitType
            required: true
            schema:
                description:
                    The resource type
                example: Dimensions
                minLength: 1
                type: string
            style: simple
        pageQueryParam:
            in: query
            description:
                1-based page number for paginated responses. Defaults to 1.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items returned per page. Defaults to the server-configured page size.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        sortQueryParam:
            in: query
            description:
                Sort expression in the form `field:asc` or `field:desc`. The set of sortable fields is defined by the back-end entity model.
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
    responses:
        NotFound:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                The specified resource was not found
        UnauthorizedError:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                Authentication information is missing or invalid
    schemas:
        AvailabilityEstimate:
            description:
                Named restock-time window shown on out-of-stock storefront items to communicate when the merchant expects the product to become available again. Records are company-scoped; the localized `title` is the user-facing label and the `priority` orders estimates when more than one matches an item.
            properties:
                groupId:
                    description:
                        Wire-only site identifier accepted on input but ignored by the server and omitted from responses; availability estimates are company-scoped, not site-scoped.
                    example: 23130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                id:
                    description:
                        Server-assigned identifier. Read-only; set when the record is first persisted.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                priority:
                    description:
                        Ordering hint applied when more than one estimate matches an item; lower values are applied first. Defaults to 0 when omitted.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                title:
                    additionalProperties:
                        type: string
                    description:
                        Localized restock-time label shown on out-of-stock items in the storefront. Map keys are locale codes; values are the translated strings. Required on create.
                    example:
                        en_US: Available in 1-3 weeks
                        hr_HR: Dostupno za 1-3 tjedna
                        hu_HU: 1-3 héten belül elérhető
                    type: object
            required:
                -   title
            type: object
        Error:
            description:
                Standard error envelope returned by 4xx and 5xx responses. Carries an application-level numeric code, a short human-readable description, a diagnostic message, and the HTTP status.
            properties:
                errorCode:
                    description:
                        Application-level numeric code identifying the error class, intended for programmatic dispatch. Read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Short, human-readable description of the error condition; safe to surface to end users. Read-only.
                    example: Unable to find currency. Currency code should be expressed with
                        3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Diagnostic message produced by the server, typically including the offending key set; intended for logs rather than end users. Read-only.
                    example: No CommerceCurrency exists with the key <groupId=41811, code=US
                        Dollar>
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code mirrored from the response status line. Read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        MeasurementUnit:
            description:
                Unit of measure used by SKUs and shipping rules. Each unit belongs to one category (dimensions, weight, or units), declares a conversion `rate` against the primary unit of its category, and optionally carries the `primary` flag that marks the base unit. Records are company-scoped.
            properties:
                companyId:
                    description:
                        Reference to the company that owns the unit (FK identifier). Read-only; inferred from the authenticated user on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per measurement unit within the company. Accepted in place of the numeric identifier on the matching by-external-reference-code endpoints.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Server-assigned identifier. Read-only; set when the record is first persisted.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                key:
                    description:
                        Stable, locale-independent string identifier. Required on create; must be unique per company, and used as an alternative addressing scheme to the numeric identifier on the matching by-key endpoints.
                    example: kg
                    type: string
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized human-readable name shown in the back office. Map keys are locale codes; values are the translated strings. Required on create.
                    example:
                        en_US: Kilogram
                        hr_HR: Kilogram
                        hu_HU: Kilogramm
                    type: object
                primary:
                    description:
                        When true, marks this unit as the base unit of its category; the primary unit has a `rate` of 1 and every other unit's `rate` is expressed against it. Setting this to true forces the `rate` to 1 and demotes any previously primary unit of the same category.
                    example: true
                    type: boolean
                priority:
                    description:
                        Display ordering hint used when listing units of the same category; lower values appear first. Defaults to 0 when omitted.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                rate:
                    description:
                        Conversion factor against the `primary` unit of the same category; the `primary` unit always has a rate of 1, and every other unit's rate expresses how many primary units one of this unit represents.
                    example: 1
                    format: double
                    minimum: 0
                    type: number
                type:
                    description:
                        Category of the unit. Integer mapping is `0`=`Dimensions`, `1`=`Weight`, `2`=`Unit`. Accepted on input either as the integer code or as the matching human label. Required on create.
                    example: Dimensions
                    type: string
            required:
                -   key
                -   name
                -   type
            type: object
        TaxCategory:
            description:
                Classification used to group products that share the same tax treatment. Records are company-scoped and referenced by pricing and tax engines to resolve the applicable rate. Saving a category triggers a search reindex; deleting one resets the tax-category reference on every product definition that points to it.
            properties:
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized free-form description shown in the back-office UI. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Standard goods
                        hr_HR: Standardna roba
                        hu_HU: Általános áru
                    type: object
                groupId:
                    description:
                        Wire-only site identifier accepted on input but ignored by the server and omitted from responses; tax categories are company-scoped, not site-scoped.
                    example: 23130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                id:
                    description:
                        Server-assigned identifier. Read-only; set when the record is first persisted.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized human-readable name shown in the back office and on product wiring. Map keys are locale codes; values are the translated strings. Required on create; the entry for the site-default locale must be non-empty.
                    example:
                        en_US: Standard
                        hr_HR: Standardno
                        hu_HU: Általános
                    type: object
            required:
                -   name
            type: object
        Warehouse:
            description:
                Warehouse definition addressed through this admin API, carrying the localized `name` and `description`, postal address, geolocation, and `active` flag. Records are company-scoped, and saving one triggers a search reindex; per-SKU stock levels, replenishment, and account/group/channel scoping live in the admin-inventory API.
            properties:
                active:
                    description:
                        When true, the warehouse participates in fulfilment and inventory queries; when false, it is hidden from runtime resolution while remaining addressable through this admin API. Activating a warehouse requires non-zero `latitude` and `longitude`.
                    example: true
                    type: boolean
                city:
                    description:
                        City portion of the postal address. Matched by the `search` query parameter on the inventory administration list endpoint.
                    example: Diamond Bar
                    type: string
                commerceCountryId:
                    description:
                        Wire-only numeric country identifier accepted on input but ignored by the server and omitted from responses; the warehouse country is stored as an ISO 3166-1 alpha-2 code and is set and returned through the inventory administration API.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                commerceRegionId:
                    description:
                        Wire-only numeric region identifier accepted on input but ignored by the server and omitted from responses; the warehouse region is stored as a string code resolved against the warehouse country, and is set and returned through the inventory administration API.
                    example: 30234
                    format: int64
                    minimum: 0
                    type: integer
                description:
                    additionalProperties:
                        type: string
                    description:
                        Localized free-form description shown in the back-office UI. Map keys are locale codes; values are the translated strings.
                    example:
                        en_US: Primary fulfilment hub for North America
                        hr_HR: Glavno skladište za Sjevernu Ameriku
                        hu_HU: Észak-Amerika elsődleges raktára
                    type: object
                groupId:
                    description:
                        Wire-only site identifier accepted on input but ignored by the server and omitted from responses; warehouses are company-scoped, not site-scoped.
                    example: 23130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                id:
                    description:
                        Server-assigned identifier. Read-only; set when the record is first persisted.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                latitude:
                    description:
                        Geographic latitude in decimal degrees, used by distance-based fulfilment rules. Must be non-zero when the warehouse is `active`.
                    example: 33.9976884
                    format: double
                    type: number
                longitude:
                    description:
                        Geographic longitude in decimal degrees, used by distance-based fulfilment rules. Must be non-zero when the warehouse is `active`.
                    example: -117.8144595
                    format: double
                    type: number
                mvccVersion:
                    description:
                        Wire-only optimistic-locking version counter accepted on input but ignored by the server and omitted from responses; concurrency-controlled updates are available through the inventory administration API.
                    example: 0
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized human-readable name shown in the back office and on fulfilment screens. Map keys are locale codes; values are the translated strings. Required on create; the supplied map must be non-empty.
                    example:
                        en_US: Diamond Bar Warehouse
                        hr_HR: Skladište Diamond Bar
                        hu_HU: Diamond Bar Raktár
                    type: object
                primary:
                    description:
                        Wire-only default-warehouse flag accepted on input but ignored by the server and omitted from responses; no primary-warehouse concept exists on the server.
                    example: true
                    type: boolean
                street1:
                    description:
                        First line of the postal address. Matched by the `search` query parameter on the inventory administration list endpoint.
                    example: 1400 Montefino Ave
                    type: string
                street2:
                    description:
                        Second line of the postal address.
                    example: 1st floor
                    type: string
                street3:
                    description:
                        Third line of the postal address.
                    example: suite 200
                    type: string
                zip:
                    description:
                        Postal code for the warehouse address. Matched by the `search` query parameter on the inventory administration list endpoint.
                    example: "91765"
                    type: string
            required:
                -   commerceCountryId
                -   name
            type: object
info:
    description:
        "Back-office administration of Liferay Commerce site-setting entities: warehouse definitions, tax categories, measurement units, and availability estimates. All four entities are company-scoped on the server, although warehouse, tax category, and availability estimate paths still accept a Liferay site identifier (`groupId`) as a compatibility wire field. Used by store-launch wizards and admin dashboards. Primary entities: AvailabilityEstimate (restock-time windows shown on out-of-stock items), TaxCategory (groupings for tax treatment), Warehouse (warehouse definition; stock levels and per-account/group/channel scoping live in the admin-inventory API), and MeasurementUnit (units of measure used by SKUs and shipping rules). Write endpoints: the POST and PUT operations under /commerceAdminSiteSetting/<groupId>/* and on the AvailabilityEstimate, TaxCategory, and Warehouse by-id paths are not implemented and reject every request with a 400 Bad Request without invoking the underlying service; to persist availability estimates, tax categories, or warehouse records, drive the back-end services directly or use the sibling admin APIs. Common workflows: Set up measurement units -- (1) POST /measurement-units (or PUT /measurement-units/by-key/<key>) to create each unit, setting primary=true for the base unit of each type (Dimensions, Weight, Unit); (2) GET /measurement-units/by-type/<measurementUnitType> to confirm the units of a given type before enabling a channel. -- Manage warehouse definitions -- this API only reads (GET /warehouse/<id>) and deletes (DELETE /warehouse/<id>) warehouse definitions; the POST and PUT operations here are not implemented and reject every request with a 400 Bad Request, so per-SKU stock, replenishment, and account/group/channel scoping are administered through the admin-inventory API. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.admin.site.setting.client', and version '4.0.43'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Admin Site Setting API
    version: v1.0
openapi: 3.0.0
paths:
    /availabilityEstimate/{id}:
        delete:
            description:
                Deletes the AvailabilityEstimate identified by id. Calls CommerceAvailabilityEstimateService.deleteCommerceAvailabilityEstimate. Validation -- 404 when no estimate matches the id.
            operationId: deleteAvailabilityEstimate
            parameters:
                -   $ref: "#/components/parameters/idPathParam"
            responses:
                204:
                    description:
                        No content
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this AvailabilityEstimate.
            summary: Deletes an Availability Estimate by ID.
            tags:
                -   AvailabilityEstimate
        get:
            description:
                Fetches the AvailabilityEstimate identified by id. Calls CommerceAvailabilityEstimateService.getCommerceAvailabilityEstimate. Validation -- 404 when no estimate matches the id.
            operationId: getAvailabilityEstimate
            parameters:
                -   $ref: "#/components/parameters/idPathParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AvailabilityEstimate"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AvailabilityEstimate"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this AvailabilityEstimate.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets an Availability Estimate by ID.
            tags:
                -   AvailabilityEstimate
        put:
            description:
                Unimplemented endpoint for replacing an AvailabilityEstimate identified by id. Calls -- none; throws UnsupportedOperationException without invoking CommerceAvailabilityEstimateService, so every request is rejected with a 400 Bad Request and the addressed record is not changed.
            operationId: putAvailabilityEstimate
            parameters:
                -   $ref: "#/components/parameters/idPathParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AvailabilityEstimate"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/AvailabilityEstimate"
                required: true
            responses:
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this AvailabilityEstimate.
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Updates an Availability Estimate by ID.
            tags:
                -   AvailabilityEstimate
    /commerceAdminSiteSetting/{groupId}/availabilityEstimate:
        get:
            description:
                Stub endpoint for listing AvailabilityEstimate records under the supplied site (groupId). Calls -- none; returns an empty page without invoking CommerceAvailabilityEstimateService. The page and pageSize query parameters are accepted but ignored and have no effect on the response.
            operationId: getCommerceAdminSiteSettingGroupAvailabilityEstimatePage
            parameters:
                -   $ref: "#/components/parameters/groupIdPathParam"
                -   $ref: "#/components/parameters/pageQueryParam"
                -   $ref: "#/components/parameters/pageSizeQueryParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AvailabilityEstimate"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AvailabilityEstimate"
                                type: array
                    description:
                        Successful operation
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets a list of Availability Estimates.
            tags:
                -   AvailabilityEstimate
        post:
            description:
                Unimplemented endpoint for creating an AvailabilityEstimate under the supplied site (groupId). Calls -- none; throws UnsupportedOperationException without invoking CommerceAvailabilityEstimateService, so every request is rejected with a 400 Bad Request and no record is persisted.
            operationId: postCommerceAdminSiteSettingGroupAvailabilityEstimate
            parameters:
                -   $ref: "#/components/parameters/groupIdPathParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AvailabilityEstimate"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/AvailabilityEstimate"
                required: true
            responses:
                201:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AvailabilityEstimate"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AvailabilityEstimate"
                    description:
                        Created
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this AvailabilityEstimate.
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Creates an Availability Estimate.
            tags:
                -   AvailabilityEstimate
    /commerceAdminSiteSetting/{groupId}/taxCategory:
        get:
            description:
                Stub endpoint for listing TaxCategory records under the supplied site (groupId). Calls -- none; returns an empty page without invoking CPTaxCategoryService. The page and pageSize query parameters are accepted but ignored and have no effect on the response.
            operationId: getCommerceAdminSiteSettingGroupTaxCategoryPage
            parameters:
                -   $ref: "#/components/parameters/groupIdPathParam"
                -   $ref: "#/components/parameters/pageQueryParam"
                -   $ref: "#/components/parameters/pageSizeQueryParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/TaxCategory"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/TaxCategory"
                                type: array
                    description:
                        Successful operation
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets a list of Tax Categories.
            tags:
                -   TaxCategory
        post:
            description:
                Unimplemented endpoint for creating a TaxCategory under the supplied site (groupId). Calls -- none; throws UnsupportedOperationException without invoking CPTaxCategoryService, so every request is rejected with a 400 Bad Request and no record is persisted.
            operationId: postCommerceAdminSiteSettingGroupTaxCategory
            parameters:
                -   $ref: "#/components/parameters/groupIdPathParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/TaxCategory"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/TaxCategory"
                required: true
            responses:
                201:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TaxCategory"
