tags:
-   description:
        Billing and shipping addresses attached to a cart, returned as nested read-only views off the parent cart. The same address record can be reused across multiple carts for the same buyer account; addresses are addressed by ID or by external reference code.
    name: Address
-   description:
        Files linked to a cart -- typically invoices, signed quotes, spec sheets, and similar buyer-facing documents. Created via the by-base64 endpoint; deleted via the matching ID or external-reference-code path. The download URL is computed at response time.
    name: Attachment
-   description:
        Top-level shopping cart for the storefront buyer flow. Aggregates line items, billing and shipping addresses, applied coupon, delivery and payment terms, order type, currency, and the computed totals; the workflow status moves the cart from open through checkout into fulfillment.
    name: Cart
-   description:
        Comments attached to a cart by buyers or back-office staff. Unrestricted comments are visible to the buyer; restricted comments are visible only to staff with the manage-comments permission on the parent cart.
    name: CartComment
-   description:
        Cart line items. Each item binds a purchasable SKU and quantity to its parent cart, with unit pricing, selected options, the resolved unit-of-measure tier, an optional per-item shipping address, and any bundle children.
    name: CartItem
-   description:
        Workflow and order-status transitions available on a cart. Combines workflow task transitions (when the cart has an active workflow instance) with order-status transitions -- request-quote, submit, quick-checkout, and checkout -- derived from the cart's current state.
    name: CartTransition
-   description:
        Read-only enumeration of payment methods qualified for a cart. The methods returned depend on the cart's billing address country, the order-type qualifiers, the buyer's view permission, and subscription eligibility.
    name: PaymentMethod
-   description:
        Read-only enumeration of shipping methods qualified for a cart. The nested shipping options are computed by the active shipping engine against the cart's shipping address country.
    name: ShippingMethod
-   description:
        Delivery and payment terms qualified for a cart. The list is filtered by the cart's order type and by the currently selected shipping method (for delivery terms) or payment method (for payment terms).
    name: Term