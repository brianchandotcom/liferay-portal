components:
    parameters:
        accountExternalReferenceCodePathParam:
            in: path
            description:
                External reference code identifying the account whose carts are being queried in the given channel. Resolved against the company scope before filtering carts.
            explode: false
            name: accountExternalReferenceCode
            required: true
            schema:
                description:
                    Account external reference code
                type: string
            style: simple
        accountIdPathParam:
            in: path
            description:
                Internal numeric identifier of the account whose carts are being queried in the given channel. Counterpart to the by-externalReferenceCode variant.
            explode: false
            name: accountId
            required: true
            schema:
                description:
                    Account Id
                format: int64
                type: integer
            style: simple
        attachmentExternalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target attachment under the parent cart on the by-externalReferenceCode sub-path. Idempotency key, unique per attachment within the cart scope.
            explode: false
            name: attachmentExternalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        attachmentIdPathParam:
            in: path
            description:
                Internal numeric identifier of a attachment linked to a cart.
            explode: false
            name: attachmentId
            required: true
            schema:
                description:
                    Attachment Id
                format: int64
                type: integer
            style: simple
        callbackURLQueryParam:
            in: query
            description:
                Optional URL the payment gateway redirects the buyer to after the payment flow completes or is abandoned. When omitted, the gateway-default callback configured on the channel is used.
            explode: true
            name: callbackURL
            required: false
            schema:
                type: string
            style: form
        cartCommentIdPathParam:
            in: path
            description:
                Internal numeric identifier of a comment (cart comment). Counterpart to the by-externalReferenceCode variant.
            explode: false
            name: cartCommentId
            required: true
            schema:
                description:
                    Note Id
                format: int64
                type: integer
            style: simple
        cartIdPathParam:
            in: path
            description:
                Internal numeric identifier of a cart. Counterpart to the by-externalReferenceCode path variant; identifiers are server-assigned and stable across the cart's lifetime.
            explode: false
            name: cartId
            required: true
            schema:
                description:
                    Cart Id
                format: int64
                type: integer
            style: simple
        cartItemIdPathParam:
            in: path
            description:
                Internal numeric identifier of a cart item (cart line item). Counterpart to the by-externalReferenceCode variant.
            explode: false
            name: cartItemId
            required: true
            schema:
                description:
                    Cart Item Id
                format: int64
                type: integer
            style: simple
        channelExternalReferenceCodePathParam:
            in: path
            description:
                External reference code identifying the CommerceChannel that scopes the carts. The channel determines currency, available payment methods, available shipping methods, and visibility rules.
            explode: false
            name: channelExternalReferenceCode
            required: true
            schema:
                description:
                    Channel external reference code
                type: string
            style: simple
        channelIdPathParam:
            in: path
            description:
                Internal numeric identifier of the CommerceChannel that scopes the carts. Counterpart to the by-externalReferenceCode variant.
            explode: false
            name: channelId
            required: true
            schema:
                description:
                    Channel Id
                format: int64
                type: integer
            style: simple
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target resource on the by-externalReferenceCode paths. The code is the integration-supplied idempotency key, unique within the resource scope; POST against this path is upsert (create when absent, replace when present).
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. Supported fields depend on the endpoint and come from the matching entity model. For /carts list endpoints, supported fields include accountId, orderStatus, createDate, modifiedDate, orderDate, id, orderId, account, author, externalReferenceCode, name, orderType, and purchaseOrderNumber. For /carts/<cartId>/attachments, restricted, dateCreated, dateModified, priority, commerceOrderId, externalReferenceCode, title, and type are supported. For /carts/<cartId>/items, quantity, name, sku, and unitOfMeasure are supported. Example -- filter=accountId eq 12345.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        pageQueryParam:
            in: query
            description:
                One-based page index. Combined with pageSize to paginate the result set; defaults to 1 when omitted.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items per page. Defaults to the portal's configured page size when omitted; capped by the portal configuration to prevent unbounded reads.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        searchQueryParam:
            in: query
            description:
                Full-text search query. For /carts list endpoints the search corpus is the cart index (matches against account, author, name, and other indexed fields). For nested /items and /attachments endpoints the corpus is the corresponding cart item or attachment index.
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        skuIdQueryParam:
            in: query
            description:
                Restrict the result set to cart items that reference this SKU (CPInstance) identifier.
            explode: true
            name: skuId
            required: false
            schema:
                format: int64
                type: integer
            style: form
        sortQueryParam:
            in: query
            description:
                Sort expression. Comma-separated `field:direction` pairs (direction `asc` or `desc`). Supported sort fields are the same as the filterable fields documented on filter for the same endpoint.
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
    schemas:
        Address:
            description:
                Billing or shipping address attached to a cart. Carries the structured fields -- street, city, region, country, ZIP, phone, VAT -- plus a type code that classifies the address as billing-only, shipping-only, or both.
            properties:
                city:
                    description:
                        City name. Required on create.
                    example: Diamond Bar
                    type: string
                country:
                    description:
                        Country display name resolved from the country reference identified by the country ISO code.
                    example: United States
                    type: string
                countryISOCode:
                    description:
                        ISO 3166-1 alpha-2 country code. Required on create.
                    example: US
                    type: string
                description:
                    description:
                        Optional free-form description of the address.
                    example: Main warehouse delivery point
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per address within the company. Read-only on the wire and set automatically when omitted.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                id:
                    description:
                        Reference to the address (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                latitude:
                    description:
                        Geographic latitude in decimal degrees.
                    example: 34.0286
                    format: double
                    type: number
                longitude:
                    description:
                        Geographic longitude in decimal degrees.
                    example: -117.8103
                    format: double
                    type: number
                name:
                    description:
                        Short label that identifies the address. Required on create.
                    example: Home
                    type: string
                phoneNumber:
                    description:
                        Phone number string. Free-form; not validated against the country code.
                    example: +1-909-555-0142
                    type: string
                region:
                    description:
                        State or province display name resolved from the region reference identified by the region ISO code.
                    example: California
                    type: string
                regionISOCode:
                    description:
                        ISO 3166-2 region code.
                    example: CA
                    type: string
                street1:
                    description:
                        Street address line 1. Required on create.
                    example: 1400 Montefino Avenue
                    type: string
                street2:
                    description:
                        Optional street address line 2.
                    example: Suite 200
                    type: string
                street3:
                    description:
                        Optional street address line 3.
                    example: Building B
                    type: string
                subtype:
                    description:
                        Free-form address subtype label.
                    example: residential
                    type: string
                type:
                    description:
                        Address type label derived from the integer type code. Read-only.
                    example: billing-and-shipping
                    readOnly: true
                    type: string
                typeId:
                    description:
                        "Integer address type: 1=Billing, 2=Billing and Shipping, 3=Shipping."
                    example: 2
                    format: int32
                    type: integer
                vatNumber:
                    description:
                        VAT or tax identification number.
                    example: Abcd1234
                    type: string
                zip:
                    description:
                        Postal or ZIP code.
                    example: "91765"
                    type: string
            required:
            -   city
            -   countryISOCode
            -   name
            -   street1
            type: object
        Attachment:
            description:
                File linked to a cart -- typically an invoice, signed quote, or spec sheet. Returned read-only on cart payloads; created through the by-base64 endpoint and removed through the matching delete endpoint.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                dateModified:
                    description:
                        Last modification timestamp in ISO 8601 with UTC timezone. Read-only.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                extension:
                    description:
                        File extension without the leading dot. Read-only.
                    example: pdf
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for the underlying attachment record; unique per attachment within the cart scope. Read-only on the wire.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                id:
                    description:
                        Reference to the attachment record (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                priority:
                    description:
                        Display and sort priority. Lower values appear first. Read-only.
                    example: 1.0
                    format: double
                    readOnly: true
                    type: number
                restricted:
                    description:
                        When true, the attachment is visible only to staff with the manage-comments permission on the parent cart. Read-only.
                    example: false
                    readOnly: true
                    type: boolean
                title:
                    description:
                        File title or display name. Read-only.
                    example: purchase-order.pdf
                    readOnly: true
                    type: string
                type:
                    description:
                        Attachment type code resolved against the configured attachment-type list. Read-only.
                    example: invoice
                    readOnly: true
                    type: string
                typeLabel:
                    description:
                        Localized label for the attachment type, sourced from the matching list entry. Read-only.
                    example: Invoice
                    readOnly: true
                    type: string
                url:
                    description:
                        Public download URL for the file. Read-only.
                    example: https://example.com/attachment.pdf
                    readOnly: true
                    type: string
        AttachmentBase64:
            description:
                Request payload for uploading a cart attachment as a base64-encoded file. Used by the /attachments/by-base64 endpoint to create a single attachment under a cart.
            properties:
                attachment:
                    description:
                        Base64-encoded file content. Required on create.
                    example: JVBERi0xLjQKJeLjz9MKMyAwIG9iag==
                    type: string
                externalReferenceCode:
                    description:
                        Optional idempotency key for the resulting attachment.
                    example: AB-34098-789-N
                    type: string
                priority:
                    description:
                        Display and sort priority. Lower values appear first.
                    example: 1.0
                    format: double
                    type: number
                restricted:
                    description:
                        When true, the resulting attachment is visible only to staff with the manage-comments permission.
                    example: false
                    type: boolean
                title:
                    description:
                        File title or display name to store on the attachment.
                    example: purchase-order.pdf
                    type: string
                type:
                    description:
                        Attachment type code resolved against the configured attachment-type list.
                    example: invoice
                    type: string
            type: object
        Cart:
            description:
                Shopping cart for a buyer flow while the order is still open. Aggregates line items, billing and shipping addresses, applied coupon, delivery and payment terms, order type, currency, computed totals, and the order, payment, and workflow status snapshots.
            properties:
                account:
                    description:
                        Display name of the buyer account that owns the cart. Read-only.
                    example: Acme Industrial Supply
                    readOnly: true
                    type: string
                accountId:
                    description:
                        Reference to the buyer account (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                attachments:
                    description:
                        File attachments linked to the cart. Read-only on the cart payload; mutate through the attachments endpoints.
                    items:
                        $ref: "#/components/schemas/Attachment"
                    type: array
                author:
                    description:
                        Display name of the user who created the cart. Read-only.
                    example: Casey Buyer
                    readOnly: true
                    type: string
                billingAddress:
                    $ref: "#/components/schemas/Address"
                billingAddressExternalReferenceCode:
                    description:
                        External reference code of the address to use as the billing address. Alternative to the billing-address ID.
                    example: AB-34098-789-N
                    type: string
                billingAddressId:
                    description:
                        Reference to the billing address (FK identifier).
                    example: 10130
                    format: int64
                    type: integer
                cartItems:
                    description:
                        Cart line items. Read-only on the cart payload; mutate through the items endpoints.
                    items:
                        $ref: "#/components/schemas/CartItem"
                    type: array
                channelId:
                    description:
                        Reference to the channel that scopes the cart (FK identifier). Read-only; the channel is fixed at cart creation.
                    example: 20078
                    format: int64
                    readOnly: true
                    type: integer
                couponCode:
                    description:
                        Currently applied promotional coupon code. Set through the coupon-code endpoint.
                    example: SUMMER25
                    type: string
                createDate:
                    description:
                        Creation timestamp in ISO 8601. Read-only; set when the cart is first persisted.
                    example: 2017-07-21
                    format: date
                    readOnly: true
                    type: string
                currencyCode:
                    description:
                        ISO 4217 currency code.
                    example: USD
                    type: string
                currencyExternalReferenceCode:
                    description:
                        External reference code of the currency. Alternative to the currency ID.
                    example: AB-34098-789-N
                    type: string
                currencyId:
                    description:
                        Reference to the currency (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                customFields:
                    additionalProperties: true
                    description:
                        Custom attribute bag. Keys are the configured custom-field names; values are typed by the custom-field definition.
                    example:
                        priorityCode: GOLD
                        salesRepEmail: rep@example.com
                    type: object
                deliveryTermId:
                    description:
                        Reference to the delivery term selected on the cart (FK identifier).
                    example: 10131
                    format: int64
                    type: integer
                deliveryTermLabel:
                    description:
                        Localized label of the resolved delivery term. Read-only.
                    example: Free On Board
                    readOnly: true
                    type: string
                errorMessages:
                    description:
                        Validation messages collected during cart-level validation. Each message names a missing or invalid field. Populated when a single cart is fetched, created, or updated, when a coupon code is applied, and on a failed checkout. Omitted in cart list responses.
                    example:
                    -   Billing address is required.
                    -   Shipping method is required.
                    items:
                        type: string
                    type: array
                externalReferenceCode:
                    description:
                        Idempotency key for the underlying cart; unique per cart within the company. Read-only on the wire and set automatically when omitted.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                friendlyURLSeparator:
                    description:
                        Friendly URL separator used to build storefront links. Read-only.
                    example: /-/
                    readOnly: true
                    type: string
                id:
                    description:
                        Reference to the cart (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                lastPriceUpdateDate:
                    description:
                        Timestamp of the last price recalculation in ISO 8601. Read-only.
                    example: 2017-07-21
                    format: date
                    readOnly: true
                    type: string
                modifiedDate:
                    description:
                        Last modification timestamp in ISO 8601. Read-only.
                    example: 2017-07-21
                    format: date
                    readOnly: true
                    type: string
                name:
                    description:
                        Cart or order display name.
                    example: Order Name
                    type: string
                notes:
                    description:
                        Comments attached to the cart. Read-only on the cart payload; mutate through the comments endpoints. Restricted notes are filtered by permission.
                    items:
                        $ref: "#/components/schemas/CartComment"
                    type: array
                orderStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                orderType:
                    description:
                        Localized display name of the resolved order type. Read-only.
                    example: Standard Order
                    readOnly: true
                    type: string
                orderTypeExternalReferenceCode:
                    description:
                        External reference code of the order type. Alternative to the order-type ID.
                    example: AB-34098-789-N
                    type: string
                orderTypeId:
                    description:
                        Reference to the order type (FK identifier).
                    example: 10131
                    format: int64
                    type: integer
                orderUUID:
                    description:
                        Stable UUID of the underlying cart record. Read-only.
                    example: c8e8b6e0-7b9e-4f8b-9b8f-1c2d3e4f5a6b
                    readOnly: true
                    type: string
                paymentMethod:
                    description:
                        Currently selected payment method key. Matches the payment method engine key on the payment-methods enumeration.
                    example: money-order
                    type: string
                paymentMethodLabel:
                    description:
                        Localized label of the selected payment method. Read-only.
                    example: Money Order
                    readOnly: true
                    type: string
                paymentMethodType:
                    description:
                        "Integer payment method type: 1=Online standard, 2=Online recurring, 3=Online subscription, 4=Offline. Read-only."
                    example: 1
                    format: int32
                    readOnly: true
                    type: integer
                paymentStatus:
                    description:
                        "Integer payment status: 0=Completed, 1=Pending, 2=Authorized, 5=Failed, 17=Refunded, 23=Not Required, 51=Cancelled. Read-only."
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
                paymentStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                paymentStatusLabel:
                    description:
                        Localized label of the payment status. Read-only.
                    example: Completed
                    readOnly: true
                    type: string
                paymentTermId:
                    description:
                        Reference to the payment term selected on the cart (FK identifier).
                    example: 10130
                    format: int64
                    type: integer
                paymentTermLabel:
                    description:
                        Localized label of the resolved payment term. Read-only.
                    example: Net 30
                    readOnly: true
                    type: string
                printedNote:
                    description:
                        Free-form note rendered onto the printed order document.
                    example: Please leave at the side door.
                    type: string
                purchaseOrderNumber:
                    description:
                        Buyer-supplied purchase order number for back-office reconciliation.
                    example: PO-2024-00457
                    type: string
                requestedDeliveryDate:
                    description:
                        Buyer-requested delivery date in ISO 8601 (date only, no time component).
                    example: 2017-07-21
                    format: date
                    type: string
                shippingAddress:
                    $ref: "#/components/schemas/Address"
                shippingAddressExternalReferenceCode:
                    description:
                        External reference code of the address to use as the shipping address. Alternative to the shipping-address ID.
                    example: AB-34098-789-N
                    type: string
                shippingAddressId:
                    description:
                        Reference to the shipping address (FK identifier).
                    example: 10131
                    format: int64
                    type: integer
                shippingMethod:
                    description:
                        Currently selected shipping method key. Matches the shipping method engine key on the shipping-methods enumeration.
                    example: fixed
                    type: string
                shippingOption:
                    description:
                        Currently selected shipping option name within the chosen shipping method.
                    example: Standard
                    type: string
                status:
                    description:
                        Workflow status label string. Read-only; for the integer code see the order-status snapshot.
                    example: approved
                    readOnly: true
                    type: string
                steps:
                    description:
                        Checkout step progress; ordered list of step entries with state pending, active, or completed.
                    items:
                        $ref: "#/components/schemas/Step"
                    type: array
                summary:
                    $ref: "#/components/schemas/Summary"
                useAsBilling:
                    description:
                        When true, the shipping address is copied to the billing address on save.
                    example: true
                    type: boolean
                valid:
                    description:
                        Aggregate validation flag. True when no cart-level error messages and no item-level errors are present. Populated when a single cart is fetched, created, or updated, when a coupon code is applied, and when the cart is checked out. Omitted in cart list responses. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                workflowStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
            type: object
        CartComment:
            description:
                Note attached to a cart. Restricted comments are visible only to staff with the manage-comments permission on the parent cart; unrestricted comments are buyer-visible.
            properties:
                author:
                    description:
                        Display name of the user who authored the comment. Read-only.
                    example: Casey Buyer
                    readOnly: true
                    type: string
                authorId:
                    description:
                        Reference to the user who authored the comment (FK identifier). Read-only.
                    example: 20078
                    format: int64
                    readOnly: true
                    type: integer
                authorPortraitURL:
                    description:
                        Avatar URL of the comment author. Read-only.
                    example: https://example.com/portrait.png
                    readOnly: true
                    type: string
                content:
                    description:
                        Comment body text.
                    example: Please confirm receipt of the signed quote.
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for the comment; unique per comment within the cart scope. Read-only on the wire and set automatically when omitted.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                id:
                    description:
                        Reference to the comment (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                modifiedDate:
                    description:
                        Last modification timestamp in ISO 8601. Read-only.
                    example: 2017-07-21
                    format: date
                    readOnly: true
                    type: string
                orderId:
                    description:
                        Reference to the parent cart (FK identifier). Read-only.
                    example: 10130
                    format: int64
                    readOnly: true
                    type: integer
                restricted:
                    description:
                        When true, the comment is visible only to staff with the manage-comments permission on the parent cart.
                    example: false
                    type: boolean
            type: object
        CartItem:
            description:
                Cart line item. Binds a purchasable SKU and a quantity to its parent cart, with unit pricing, selected options, the resolved unit-of-measure tier, an optional per-item shipping address, and any bundle children.
            properties:
                adaptiveMediaImageHTMLTag:
                    description:
                        Pre-rendered HTML `img` tag for the SKU's adaptive media thumbnail. Read-only.
                    example: <img src='https://example.com/thumbnail.png' alt='Hand Saw'/>
                    readOnly: true
                    type: string
                cartItems:
                    description:
                        Nested child cart items when this item is a bundle parent.
                    items:
                        $ref: "#/components/schemas/CartItem"
                    type: array
                customFields:
                    additionalProperties: true
                    description:
                        Custom attribute bag for the cart item. Keys are the configured custom-field names; values are typed by the custom-field definition.
                    example:
                        engravingText: For Alex
                        giftWrap: true
                    type: object
                deliveryGroup:
                    deprecated: true
                    description:
                        Deprecated -- use the delivery group name field instead. Retained for backward compatibility; both fields are written but only the new field is honored on create and update.
                    example: warehouse-east
                    type: string
                deliveryGroupName:
                    description:
                        Warehouse or fulfillment group name used to split shipments across origins.
                    example: warehouse-east
                    type: string
                errorMessages:
                    description:
                        Validation messages collected during item-level validation -- for example, quantity outside the configured bounds.
                    example:
                    -   Quantity must be at least 1.
                    -   SKU is no longer available.
                    items:
                        type: string
                    type: array
                externalReferenceCode:
                    description:
                        Idempotency key for the cart item; unique per item within the company. Read-only on the wire and set automatically when omitted.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                id:
                    description:
                        Reference to the cart item (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        Localized product display name as of the item snapshot. Read-only.
                    example: Hand Saw
                    readOnly: true
                    type: string
                options:
                    description:
                        JSON-serialized snapshot of the buyer-selected product option values.
                    example: "[{key:color,value:red}]"
                    type: string
                parentCartItemId:
                    description:
                        Reference to the parent cart item when this row is a bundle child (FK identifier); 0 for top-level items. Read-only.
                    example: 0
                    format: int64
                    readOnly: true
                    type: integer
                price:
                    $ref: "#/components/schemas/Price"
                productId:
                    description:
                        Reference to the product the SKU belongs to (FK identifier).
                    example: 10130
                    format: int64
                    type: integer
                productURLs:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the storefront product URLs.
                    example:
                        en_US: https://example.com/products/hand-saw
                        hr_HR: https://example.com/hr/products/hand-saw
                        hu_HU: https://example.com/hu/products/hand-saw
                    readOnly: true
                    type: object
                quantity:
                    description:
                        Ordered quantity expressed in the item's unit of measure. Validated against the item settings -- minimum, maximum, multiple, allowed quantities.
                    example: 10.1
                    format: bigdecimal
                    type: number
                replacedSku:
                    description:
                        Original SKU code when this line replaces another SKU after an out-of-stock substitution or similar swap. Read-only.
                    example: "12341234"
                    readOnly: true
                    type: string
                replacedSkuExternalReferenceCode:
                    description:
                        External reference code of the replaced SKU. Alternative to the replaced-SKU ID.
                    example: AB-34098-789-N
                    type: string
                replacedSkuId:
                    description:
                        Reference to the SKU the original line pointed to before the replacement (FK identifier).
                    example: 10131
                    format: int64
                    type: integer
                requestedDeliveryDate:
                    description:
                        Item-specific requested delivery date in ISO 8601 (date only). Overrides the cart-level requested delivery date when set.
                    example: 2017-07-21
                    format: date
                    type: string
                settings:
                    $ref: "#/components/schemas/Settings"
                shippingAddress:
                    $ref: "#/components/schemas/Address"
                shippingAddressExternalReferenceCode:
                    description:
                        External reference code of the address to use as the item-level shipping address.
                    example: AB-34098-789-N
                    type: string
                shippingAddressId:
                    description:
                        Reference to the address used as item-level shipping address (FK identifier). Overrides the cart-level shipping address for this line.
                    example: 10131
                    format: int64
                    type: integer
                sku:
                    description:
                        SKU code of the purchased variant. Read-only.
                    example: HS-001
                    readOnly: true
                    type: string
                skuId:
                    description:
                        Reference to the SKU (FK identifier). Required on create.
                    example: 30130
                    format: int64
                    type: integer
                skuUnitOfMeasure:
                    $ref: "#/components/schemas/SkuUnitOfMeasure"
                subscription:
                    description:
                        When true, the SKU is configured for subscription-based delivery. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                thumbnail:
                    description:
                        URL of the SKU's adaptive media thumbnail. Read-only.
                    example: https://example.com/thumbnail.png
                    readOnly: true
                    type: string
                unitOfMeasure:
                    description:
                        Localized unit-of-measure label. Read-only; derived from the resolved unit-of-measure tier name.
                    example: Pallet
                    readOnly: true
                    type: string
                valid:
                    description:
                        Aggregate validation flag for the item. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
            required:
            -   skuId
            type: object
        CartTransition:
            description:
                Workflow or order-status transition available on the cart. Each entry names the transition (a workflow task name or one of request-quote, submit, quick-checkout, checkout), its localized label, whether the transition is currently allowed, and an optional comment captured when the transition is fired.
            properties:
                cartId:
                    description:
                        Reference to the parent cart (FK identifier). Read-only.
                    example: 10130
                    format: int64
                    readOnly: true
                    type: integer
                comment:
                    description:
                        Optional comment recorded with the transition -- for example, a reason for a quote request.
                    example: Please quote with rush shipping.
                    type: string
                label:
                    description:
                        Localized label for the transition. Read-only.
                    example: Submit
                    readOnly: true
                    type: string
                name:
                    description:
                        "Transition identifier. Either a workflow task name or one of the order-status transitions: request-quote, submit, quick-checkout, checkout."
                    example: submit
                    type: string
                open:
                    description:
                        When true, the transition is currently allowed against the cart's state. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                restricted:
                    description:
                        When true, firing the transition requires an elevated permission -- typically the manage-orders permission on the cart.
                    example: false
                    type: boolean
                workflowTaskId:
                    description:
                        Reference to the active workflow task when the transition is a workflow transition (FK identifier); 0 when the transition is an order-status transition.
                    example: 30130
                    format: int64
                    type: integer
        CouponCode:
            description:
                Request payload for applying a coupon to a cart. Carries the coupon code string the discount engine resolves against the active promotion rules.
            properties:
                code:
                    description:
                        Coupon code string to apply. Resolved against the active discount rules; raises an error when the code is unknown, expired, or not applicable to the cart.
                    example: SUMMER25
                    type: string
            type: object
        Error:
            description:
                Standard error envelope returned on non-2xx responses. Carries the HTTP status, an internal error code, a developer-facing description, and a localized message.
            properties:
                errorCode:
                    description:
                        Internal error code mapping.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Developer-facing description of the failure.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Localized message intended for end-user display.
                    example: Unable to find currency for the supplied currency code.
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code.
                    example: 404
                    readOnly: true
                    type: integer
            required:
            -   errorCode
            -   errorDescription
            -   message
            -   status
            type: object
        PaymentMethod:
            description:
                Payment method qualified for a cart. The entries returned for a given cart depend on the billing address country, the order type qualifiers, the buyer's view permission, and subscription eligibility.
            properties:
                description:
                    description:
                        Localized description of the payment method as configured on the channel binding.
                    example: Pay by money order on receipt.
                    type: string
                key:
                    description:
                        Stable engine key identifying the payment integration. Used as the value of the cart's payment method field.
                    example: money-order
                    type: string
                name:
                    description:
                        Localized display name of the payment method.
                    example: Money Order
                    type: string
            type: object
        Price:
            description:
                Computed unit price snapshot for a cart item. Carries the base price, the promotional price, the absolute and percentage discount levels, and the final price. The currency is inherited from the parent cart; the price-on-application flag indicates the price is negotiated and not displayed on the storefront. All monetary amounts are per unit and tax-exclusive -- cart-level tax is computed by the active tax engine and reported on the cart Summary (taxValue, total), not on this per-unit snapshot.
            properties:
                currency:
                    description:
                        ISO 4217 currency code inherited from the parent cart.
                    example: USD
                    type: string
                discount:
                    description:
                        Absolute discount amount applied to the unit price, expressed tax-exclusive in the cart currency.
                    example: 5.0
                    format: double
                    type: number
                discountFormatted:
                    description:
                        Currency-formatted discount string.
                    example: $5.00
                    type: string
                discountPercentage:
                    description:
                        Discount expressed as a percentage string.
                    example: 10%
                    type: string
                discountPercentageLevel1:
                    description:
                        Discount percentage at tier 1 of the discount cascade.
                    example: 10.0
                    format: double
                    type: number
                discountPercentageLevel2:
                    description:
                        Discount percentage at tier 2 of the discount cascade.
                    example: 0.0
                    format: double
                    type: number
                discountPercentageLevel3:
                    description:
                        Discount percentage at tier 3 of the discount cascade.
                    example: 0.0
                    format: double
                    type: number
                discountPercentageLevel4:
                    description:
                        Discount percentage at tier 4 of the discount cascade.
                    example: 0.0
                    format: double
                    type: number
                finalPrice:
                    description:
                        Unit price after all applicable discounts, tax-exclusive in the cart currency. Multiply by the item quantity for the line subtotal; cart-level tax is reported on the cart Summary.
                    example: 45.0
                    format: double
                    type: number
                finalPriceFormatted:
                    description:
                        Currency-formatted final price.
                    example: $45.00
                    type: string
                price:
                    description:
                        Base catalog unit price before promotional or volume discounts, tax-exclusive in the cart currency.
                    example: 50.0
                    format: double
                    type: number
                priceFormatted:
                    description:
                        Currency-formatted base price.
                    example: $50.00
                    type: string
                priceOnApplication:
                    description:
                        When true, the price is negotiated and not displayed on the storefront (`Call for price`). Read-only.
                    example: false
                    readOnly: true
                    type: boolean
                promoPrice:
                    description:
                        Promotional unit price when a catalog promotion is active, tax-exclusive in the cart currency.
                    example: 45.0
                    format: double
                    type: number
                promoPriceFormatted:
                    description:
                        Currency-formatted promotional price.
                    example: $45.00
                    type: string
            type: object
        Settings:
            description:
                Quantity constraints for a cart item. The minimum and maximum bound the orderable range; the multiple forces quantities to a fixed step; when the allowed-quantities list is set, it overrides the other constraints with an explicit allow-list.
            properties:
                allowedQuantities:
                    description:
                        Explicit allow-list of orderable quantities. When set, overrides the minimum, maximum, and multiple constraints.
                    example:
                    -   1
                    -   5
                    -   10
                    items:
                        example: 10.1
                        format: bigdecimal
                        type: number
                    type: array
                maxQuantity:
                    description:
                        Maximum orderable quantity in the item's unit of measure.
                    example: 100.0
                    format: bigdecimal
                    type: number
                minQuantity:
                    description:
                        Minimum orderable quantity in the item's unit of measure.
                    example: 1.0
                    format: bigdecimal
                    type: number
                multipleQuantity:
                    description:
                        Quantity granularity. The ordered quantity must be a multiple of this value.
                    example: 5.0
                    format: bigdecimal
                    type: number
            type: object
        ShippingMethod:
            description:
                Shipping method qualified for a cart. The nested shipping options are computed by the active shipping engine against the cart's shipping address country.
            properties:
                description:
                    description:
                        Localized description of the shipping method.
                    example: Standard ground shipping
                    type: string
                engineKey:
                    description:
                        Stable engine key identifying the shipping integration. Used as the value of the cart's shipping method field.
                    example: fixed
                    type: string
                id:
                    description:
                        Reference to the shipping method (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                name:
                    description:
                        Localized display name of the shipping method.
                    example: Standard Shipping
                    type: string
                shippingOptions:
                    description:
                        Available shipping options computed by the engine against the cart's shipping address.
                    items:
                        $ref: "#/components/schemas/ShippingOption"
                    type: array
            type: object
        ShippingOption:
            description:
                Single shipping option within a parent shipping method. Carries the option name, its localized label, the computed cost, and the currency-formatted display string.
            properties:
                amount:
                    description:
                        Computed shipping cost in the cart's currency.
                    example: 9.99
                    format: double
                    type: number
                amountFormatted:
                    description:
                        Currency-formatted shipping cost.
                    example: $9.99
                    type: string
                label:
                    description:
                        Localized label of the option.
                    example: Standard
                    type: string
                name:
                    description:
                        Option identifier within the parent shipping method. Used as the value of the cart's shipping option field.
                    example: Standard
                    type: string
            type: object
        SkuUnitOfMeasure:
            description:
                Unit-of-measure tier bound to the SKU on a cart item. The key and name identify the tier (for example a Pallet tier on a base unit); the rate is the conversion factor against the base unit; the incremental order quantity is the minimum order increment in this tier.
            properties:
                incrementalOrderQuantity:
                    description:
                        Minimum order increment expressed in this unit-of-measure tier.
                    example: 1.5
                    format: bigdecimal
                    minimum: 0
                    type: number
                key:
                    description:
                        Stable identifier of the unit-of-measure tier.
                    example: pl
                    type: string
                name:
                    description:
                        Localized display name of the tier.
                    example: Pallet
                    type: string
                precision:
                    description:
                        Number of decimal places allowed in the ordered quantity for this tier.
                    example: 3
                    type: integer
                primary:
                    description:
                        When true, this is the default unit-of-measure tier for the SKU.
                    example: true
                    type: boolean
                priority:
                    description:
                        Display priority among the SKU's unit-of-measure tiers. Lower values appear first.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                rate:
                    description:
                        Conversion factor from this tier to the base unit -- for example, the number of base units per pallet.
                    example: 202.1
                    format: bigdecimal
                    minimum: 0
                    type: number
            type: object
        Status:
            description:
                Generic status snapshot returned alongside the structured order, payment, and workflow states. The code is the integer status code; the label is the canonical key; the localized label is the display string.
            properties:
                code:
                    description:
                        Integer status code. The semantic mapping depends on the host field (order, payment, workflow). Read-only.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
                label:
                    description:
                        Canonical status key.
                    example: approved
                    type: string
                label_i18n:
                    description:
                        Localized label for the status.
                    example: Approved
                    type: string
            type: object
        Step:
            description:
                Checkout step descriptor. The id is the step key (cart, shipping, payment, confirmation); the state is its progress -- pending, active, or completed.
            properties:
                id:
                    description:
                        Step key -- cart, shipping, payment, or confirmation. Read-only.
                    example: shipping
                    readOnly: true
                    type: string
                label:
                    description:
                        Localized step label. Read-only.
                    example: Shipping
                    readOnly: true
                    type: string
                state:
                    description:
                        Step progress -- pending, active, or completed. Read-only.
                    example: active
                    readOnly: true
                    type: string
        Summary:
            description:
                Computed totals for a cart. Carries the subtotal, the shipping and tax components, the absolute and percentage discounts at each level (subtotal, shipping, total), and the final total. The currency is inherited from the parent cart.
            properties:
                currency:
                    description:
                        ISO 4217 currency code inherited from the parent cart.
                    example: USD
                    type: string
                itemsCount:
                    description:
                        Number of distinct line items. Read-only.
                    example: 1
                    format: int32
                    readOnly: true
                    type: integer
                itemsQuantity:
                    description:
                        Sum of line item quantities across the cart.
                    example: 1.1
                    format: bigdecimal
                    type: number
                shippingDiscountPercentages:
                    description:
                        Per-level percentage discounts applied to shipping, in cascade order.
                    example:
                    -   "10"
                    -   "5"
                    -   "0"
                    -   "0"
                    items:
                        type: string
                    type: array
                shippingDiscountValue:
                    description:
                        Absolute discount applied to the shipping component.
                    example: 1.5
                    format: double
                    type: number
                shippingDiscountValueFormatted:
                    description:
                        Currency-formatted shipping discount.
                    example: $1.50
                    type: string
                shippingValue:
                    description:
                        Total shipping cost before tax.
                    example: 9.99
                    format: double
                    type: number
                shippingValueFormatted:
                    description:
                        Currency-formatted shipping cost.
                    example: $9.99
                    type: string
                shippingValueWithTaxAmount:
                    description:
                        Total shipping cost including tax.
                    example: 10.79
                    format: double
                    type: number
                shippingValueWithTaxAmountFormatted:
                    description:
                        Currency-formatted shipping cost with tax.
                    example: $10.79
                    type: string
                subtotal:
                    description:
                        Sum of line item prices before tax, shipping, and cart-level discounts.
                    example: 50.0
                    format: double
                    type: number
                subtotalDiscountPercentages:
                    description:
                        Per-level percentage discounts applied to the subtotal, in cascade order.
                    example:
                    -   "10"
                    -   "5"
                    -   "0"
                    -   "0"
                    items:
                        type: string
                    type: array
                subtotalDiscountValue:
                    description:
                        Absolute discount applied to the subtotal.
                    example: 5.0
                    format: double
                    type: number
                subtotalDiscountValueFormatted:
                    description:
                        Currency-formatted subtotal discount.
                    example: $5.00
                    type: string
                subtotalFormatted:
                    description:
                        Currency-formatted subtotal.
                    example: $50.00
                    type: string
                taxValue:
                    description:
                        Total tax (sales tax plus VAT) computed by the active tax engine.
                    example: 4.05
                    format: double
                    type: number
                taxValueFormatted:
                    description:
                        Currency-formatted tax.
                    example: $4.05
                    type: string
                total:
                    description:
                        Final total -- subtotal plus shipping plus tax minus all discounts.
                    example: 58.54
                    format: double
                    type: number
                totalDiscountPercentages:
                    description:
                        Aggregate percentage discounts across all levels.
                    example:
                    -   "10"
                    -   "5"
                    -   "0"
                    -   "0"
                    items:
                        type: string
                    type: array
                totalDiscountValue:
                    description:
                        Aggregate absolute discount across subtotal, shipping, and other levels.
                    example: 6.5
                    format: double
                    type: number
                totalDiscountValueFormatted:
                    description:
                        Currency-formatted total discount.
                    example: $6.50
                    type: string
                totalFormatted:
                    description:
                        Currency-formatted total.
                    example: $58.54
                    type: string
            type: object
        Term:
            description:
                Delivery or payment term. Returned filtered by order type and the currently selected shipping method (for delivery terms) or payment method (for payment terms).
            properties:
                description:
                    description:
                        Localized description (terms-and-conditions text). Read-only.
                    example: Net 30 payment terms apply.
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        External reference code of the term. Idempotency key.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the term (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                label:
                    description:
                        Localized label of the term. Read-only.
                    example: Net 30
                    readOnly: true
                    type: string
                name:
                    description:
                        Internal name of the term. Read-only.
                    example: net-30
                    readOnly: true
                    type: string
info:
    description:
        "Storefront REST API for buyer-facing shopping cart interactions in Liferay Commerce. Manages the cart lifecycle while it is still in the Open state -- creation under a channel, line item management (CartItem), addresses (Address) for billing and shipping, applied coupon codes (CouponCode), buyer comments (CartComment), file attachments (AttachmentBase64 upload), delivery and payment terms (Term), available payment and shipping methods (PaymentMethod, ShippingMethod), and the workflow transitions (CartTransition) that move the cart through quote and checkout flows. The API is scoped to the storefront (delivery) perspective; back-office order management belongs to the headless-commerce-admin-order module, and catalog browsing to headless-commerce-delivery-catalog. Most resources are addressable both by internal ID (for example /carts/<cartId>) and by external reference code (for example /carts/by-externalReferenceCode/<externalReferenceCode>). The ERC is the integration-supplied idempotency key, unique per resource within the company; POST against the by-externalReferenceCode path is upsert. PATCH applies JSON Merge Patch semantics (only supplied fields are modified); PUT replaces the resource. All mutating operations require the cart to be in the Open state; checkout transitions the cart to the In Progress state via the configured checkout engine and validator chain. -- Common workflows: Create and populate a cart -- (1) POST /channels/<channelId>/carts (or /channels/by-externalReferenceCode/<externalReferenceCode>/carts) with accountId (or accountExternalReferenceCode) and currencyCode to create a new cart in the Open state; (2) POST /carts/<cartId>/items per line item with skuId and quantity to add CartItem rows; (3) PATCH /carts/<cartId> to set billing and shipping addresses (billingAddressId/shippingAddressId or their ERCs), delivery term (deliveryTermId), payment term (paymentTermId), and order type (orderTypeId); (4) POST /carts/<cartId>/coupon-code with a code to apply a promotional discount. -- Apply terms and choose payment/shipping -- (1) GET /carts/<cartId>/delivery-terms and /carts/<cartId>/payment-terms to list the Term entries qualified for the current cart configuration; (2) GET /carts/<cartId>/shipping-methods and /carts/<cartId>/payment-methods to enumerate available shipping method and payment method options filtered by address country and cart eligibility; (3) PATCH /carts/<cartId> to set shippingMethod, shippingOption, and paymentMethod accordingly. -- Submit, request a quote, or check out -- (1) GET /carts/<cartId>/cart-transitions to enumerate the available transitions (request-quote, submit, quick-checkout, checkout, or workflow task transitions) given the current order state; (2) POST /carts/<cartId>/cart-transitions with a CartTransition naming the transition to fire it; (3) Or POST /carts/<cartId>/checkout to run the validator chain (billing address, shipping method, payment method, items) and transition the cart to the In Progress state; (4) GET /carts/<cartId>/payment-url to retrieve the encrypted redirect URL into the payment gateway. -- Annotate a cart and attach files -- (1) POST /carts/<cartId>/comments with CartComment.content and restricted to add a comment (restricted notes are visible only to users with the manage-comments permission); (2) POST /carts/<cartId>/attachments/by-base64 with AttachmentBase64 (base64-encoded file plus title, type, restricted) to upload a file attachment linked to the cart. -- Resolve a cart for a buyer in a channel -- (1) GET /channels/<channelId>/account/<accountId>/carts (or the by-externalReferenceCode variants) to list open carts for an account in a channel, with OData filter and search; (2) GET /carts/<cartId> or /carts/by-externalReferenceCode/<externalReferenceCode> to retrieve a single cart with summary, items, addresses, and status. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.delivery.cart.client', and version '4.0.56'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Delivery Cart API
    version: v1.0
openapi: 3.0.0
paths:
    /cart-comments/by-externalReferenceCode/{externalReferenceCode}:
        delete:
            description:
                Deletes the comment addressed by its external reference code.
            operationId: deleteCartCommentByExternalReferenceCode
            parameters:
            -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this cart comment.
            summary: Deletes a cart comment by external reference code.
            tags:
            -   CartComment
        get:
            description:
                Retrieves a single comment by external reference code. Restricted notes are returned only to users with the manage-comments permission on the parent cart.
            operationId: getCartCommentByExternalReferenceCode
            parameters:
            -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CartComment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/CartComment"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this cart comment.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets a cart comment by external reference code.
            tags:
            -   CartComment
        patch:
            description:
                Updates the comment addressed by external reference code with JSON Merge Patch semantics (only supplied fields are modified). Mutates content and restricted.
            operationId: patchCartCommentByExternalReferenceCode
            parameters:
            -   $ref: "#/components/parameters/externalReferenceCodePathParam"
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CartComment"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/CartComment"
                required: true
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CartComment"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/CartComment"
                    description:
                        Successful operation
                400:
                    description:
                        Invalid input
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                403:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The authenticated user lacks permission for the requested action on this cart comment.
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                422:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
