                    description:
                        Reference to the replacement SKU (FK identifier). Read-only.
                    example: 33135
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                skuOptions:
                    description:
                        Inline option selections of the replacement SKU. Read-only.
