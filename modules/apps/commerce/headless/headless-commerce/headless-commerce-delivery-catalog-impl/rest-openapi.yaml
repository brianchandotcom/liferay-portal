                    format: int64
                    minimum: 0
                    type: integer
                specificationKey:
                    description:
                        Stable key of the specification option. Filterable via the OData query parameter and matched by the search query parameter.
                    example: specification-key
                    type: string
                specificationPriority:
                    description:
                        Display priority of the underlying specification option; lower values sort first.
