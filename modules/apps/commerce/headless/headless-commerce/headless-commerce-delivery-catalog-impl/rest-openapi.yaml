tags:
    -   description:
            Buyer accounts (business, person, guest, supplier) tied to commerce channels.
        name: Account
    -   description:
            Media and document attachments bound to catalog products.
        name: Attachment
    -   description:
            Asset categories tagging catalog products via Liferay vocabularies.
        name: Category
    -   description:
            Commerce channels that scope catalog visibility, pricing, and inventory.
        name: Channel
    -   description:
            Currency definitions available to commerce channels.
        name: Currency
    -   description:
            References to products linked through grouped or shop-by-diagram relationships.
        name: LinkedProduct
    -   description:
            Shop-by-diagram entries that map a parent product's diagram region to a referenced product or SKU.
        name: MappedProduct
    -   description:
            Coordinates on a product diagram image that locate mapped products.
        name: Pin
    -   description:
            Catalog products exposed to storefront callers (full product payload).
        name: Product
    -   description:
            Configurable product options (for example, color, size) attached to products.
        name: ProductOption
    -   description:
            Selectable values of product options, including pricing and SKU contribution.
        name: ProductOptionValue
    -   description:
            Static product specification values used for filtering and detail rendering.
        name: ProductSpecification
    -   description:
            Typed product-to-product links such as up-sell, cross-sell, and related.
        name: RelatedProduct
    -   description:
            Stock-keeping units (CPInstance) including pricing, availability, options, and units of measure.
        name: Sku
    -   description:
            Named wish lists scoping a collection of WishListItem entries for a buyer account.
        name: WishList
    -   description:
            Single line item on a wish list referencing a product or SKU.
        name: WishListItem