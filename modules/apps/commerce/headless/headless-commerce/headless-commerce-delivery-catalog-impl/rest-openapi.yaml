                        Localized title of the specification option, resolved for the request locale. Filterable, sortable, and matched by the search query parameter.
                    example: Color
                    type: string
                value:
                    description:
                        Localized value of the specification, resolved for the request locale. Filterable, sortable, and matched by the search query parameter.
