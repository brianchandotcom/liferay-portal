paths:
    /channels:
        get:
            description:
                Lists CommerceChannel entries visible to the caller. Calls Vulcan SearchUtil.search over the CommerceChannel index scoped to the request company; converts each hit through ChannelDTOConverter. Validation -- None (returns empty page when no matches). List query support — filterable and sortable fields -- ChannelEntityModel (siteGroupId, name); search fields -- indexed channel fields.
            operationId: getChannelsPage
            parameters:
                -   $ref: "#/components/parameters/filterQueryParam"
                -   $ref: "#/components/parameters/pageQueryParam"
                -   $ref: "#/components/parameters/pageSizeQueryParam"
                -   $ref: "#/components/parameters/searchQueryParam"
                -   $ref: "#/components/parameters/sortQueryParam"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Channel"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Channel"
                                type: array
                    description:
                        Successful operation
                401:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Authentication information is missing or invalid
                404:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            summary: Gets a list of channels.
            tags:
                -   Channel
    /channels/by-externalReferenceCode/{channelExternalReferenceCode}/products/by-externalReferenceCode/{productExternalReferenceCode}/pins:
