                DDMOptions:
                    description:
                        Form-option captures for this SKU when it is configured through a dynamic-data-mapping structure. Read-only.
                    items:
                        $ref: "#/components/schemas/DDMOption"
                    readOnly: true
                    type: array
                allowedOrderQuantities:
                    description:
                        Discrete order quantities accepted for this SKU; values outside the list are rejected.
                    example:
                        -   "10"
                        -   "20"
                        -   "30"
                        -   "40"
                    items:
                        type: string
                    type: array
                availability:
                    $ref: "#/components/schemas/Availability"
                backOrderAllowed:
                    description:
                        When true, the SKU permits back orders once stock is depleted. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                customFields:
                    description:
                        Caller-defined extension attributes attached to the SKU through the platform's expando mechanism. Read-only on this API.
                    items:
                        type: customField
                    readOnly: true
                    type: array
                depth:
                    description:
                        Physical depth of the SKU, in the catalog's measurement unit.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                discontinued:
                    description:
                        Whether the SKU is marked as discontinued. When true, the storefront may surface a replacement SKU in its place.
                    example: false
                    type: boolean
                discontinuedDate:
                    description:
                        Date the SKU was marked discontinued, in ISO 8601 (date only).
                    example: 2017-07-21
                    format: date-time
                    type: string
                displayDate:
                    description:
                        Date from which the SKU becomes visible to buyers, in ISO 8601 (date only).
                    example: 2017-07-21
                    format: date-time
                    type: string
                displayDiscountLevels:
                    description:
                        When true, the resolved price exposes its per-level discount percentages to the storefront.
                    example: true
                    type: boolean
                expirationDate:
                    description:
                        Date after which the SKU is no longer visible to buyers, in ISO 8601 (date only). Ignored when neverExpire is true.
                    example: 2017-08-21
                    format: date-time
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key; must be unique per SKU within the company.
                    example: SKU0111
                    type: string
                gtin:
                    description:
                        Global Trade Item Number (UPC/EAN) of the SKU. Matched by the search query parameter on the product list endpoint.
                    example: "12341234"
                    type: string
                height:
                    description:
                        Physical height of the SKU, in the catalog's measurement unit.
                    example: 20.2
                    format: double
                    minimum: 0
                    type: number
                id:
                    description:
                        Reference to the SKU (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                incomingQuantityLabel:
                    description:
                        Localized label describing incoming stock shown when the SKU is out of stock.
                    example: Available in 2 weeks
                    type: string
                manufacturerPartNumber:
                    description:
                        Manufacturer-issued part number for the SKU.
                    example: "12341234"
                    type: string
                maxOrderQuantity:
                    description:
                        Maximum quantity orderable for this SKU on a single order line.
                    example: 10.1
                    format: bigdecimal
                    type: number
                minOrderQuantity:
                    description:
                        Minimum quantity orderable for this SKU on a single order line.
                    example: 10.1
                    format: bigdecimal
                    type: number
                neverExpire:
                    description:
                        When true the SKU never expires and expirationDate is ignored.
                    example: true
                    type: boolean
                price:
                    $ref: "#/components/schemas/Price"
                productConfiguration:
                    $ref: "#/components/schemas/ProductConfiguration"
                productId:
                    description:
                        Reference to the parent product head (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                published:
                    description:
                        Whether the SKU is published and visible to buyers.
                    example: true
                    type: boolean
                purchasable:
                    description:
                        Whether the SKU can be added to cart given the current configuration and stock.
                    example: true
                    type: boolean
                replacementSku:
                    $ref: "#/components/schemas/ReplacementSku"
                replacementSkuExternalReferenceCode:
                    description:
                        External reference code of the replacement SKU used for idempotent linking.
                    example: SKU0111
                    type: string
                replacementSkuId:
                    description:
                        Reference to the replacement SKU (FK identifier).
                    example: 33135
                    format: int64
                    minimum: 0
                    type: integer
                sku:
                    description:
                        SKU code (human-readable inventory identifier). Updating this field triggers a reindex; matched by the search query parameter on the product list endpoint.
                    example: SKU01
                    type: string
                skuOptions:
                    description:
                        Inline option selections that distinguish this SKU among the product's variants.
                    items:
                        $ref: "#/components/schemas/SkuOption"
                    type: array
                skuUnitOfMeasures:
                    description:
                        Inline units of measure supported by the SKU.
                    items:
                        $ref: "#/components/schemas/SkuUnitOfMeasure"
                    type: array
                tierPrices:
                    description:
                        Inline tier-pricing breakpoints applied to the SKU's pricing. Absent when the SKU has units of measure configured (tier prices are then nested per unit of measure).
                    items:
                        $ref: "#/components/schemas/TierPrice"
                    type: array
                weight:
                    description:
                        Physical weight of the SKU, in the catalog's measurement unit.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                width:
                    description:
                        Physical width of the SKU, in the catalog's measurement unit.
                    example: 20.2
                    format: double
                    minimum: 0
                    type: number
            type: object
        SkuOption:
            description:
                Resolved option selection captured for a specific SKU variant; carries the option key/value pair plus its price impact.
            properties:
                key:
                    description:
                        Reference to the parent option binding on the product (FK identifier). Read-only.
                    example: 31130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                price:
                    description:
                        Formatted price delta applied by this option selection, in the channel currency.
                    example: $10.00
                    type: string
                priceType:
                    description:
                        Pricing strategy applied to the option's price delta.
                    example: static
                    type: string
                quantity:
                    description:
                        Quantity of the option's value bound to this SKU when the option contributes inventory.
                    example: "1"
                    type: string
                required:
                    description:
                        When true, the option must be supplied when ordering the SKU.
                    example: true
                    type: boolean
                skuId:
                    description:
                        Reference to the SKU (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                skuOptionId:
                    description:
                        Reference to the option binding on the product that defines this option (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                skuOptionKey:
                    description:
                        Stable key of the option (mirrors the parent option's key).
                    example: Sku Option Key
                    type: string
                skuOptionName:
                    description:
                        Localized display name of the option, resolved for the request locale.
                    example: Sku Option Name
                    type: string
                skuOptionValueId:
                    description:
                        Reference to the option-value binding selected as the value (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                skuOptionValueKey:
                    description:
                        Stable key of the selected option value.
                    example: Sku Option Value Key
                    type: string
                skuOptionValueNames:
                    description:
                        Localized display names of the selected option values; an array supports multi-valued options.
                    example:
                        -   Red
                    items:
                        type: string
                    type: array
                value:
                    description:
                        Reference to the option-value binding selected for this option (FK identifier). Read-only.
                    example: 31130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
            type: object
        SkuUnitOfMeasure:
            description:
                Unit of measure available for a SKU, including its conversion rate to the SKU's primary unit, its decimal precision, and its own pricing.
            properties:
                incrementalOrderQuantity:
                    description:
                        Order-quantity step (in base units) that order lines must respect when using this unit of measure. Defaults to 1.
                    example: 1.5
                    format: bigdecimal
                    minimum: 0
                    type: number
                key:
                    description:
                        Stable key identifying the unit of measure within the SKU.
                    example: pl
                    type: string
                name:
                    description:
                        Display name of the unit of measure.
                    example: Pallet
                    type: string
                precision:
                    description:
                        Number of decimal places accepted when quantities are entered in this unit.
                    example: 3
                    type: integer
                price:
                    $ref: "#/components/schemas/Price"
                primary:
                    description:
                        When true, this is the SKU's primary (base) unit of measure. At most one unit of measure per SKU is primary.
                    example: true
                    type: boolean
                priority:
                    description:
                        Sort priority among the SKU's units of measure; lower values sort first.
                    example: 1.1
                    format: double
                    minimum: 0
                    type: number
                rate:
                    description:
                        Conversion factor from this unit to the SKU's primary unit. The primary unit itself always carries the rate 1.
                    example: 202.1
                    format: bigdecimal
                    minimum: 0
                    type: number
                tierPrices:
                    description:
                        Tier-pricing breakpoints applied when buying in this unit of measure.
                    items:
                        $ref: "#/components/schemas/TierPrice"
                    type: array
            type: object
        TierPrice:
            description:
                Quantity-based pricing breakpoint applied to a SKU; the unit price changes once the buyer's quantity reaches the breakpoint. Computed at response time.
            properties:
                currency:
                    description:
                        Display name of the channel's currency resolved for the request locale. This is the human-readable name, not the ISO code.
                    example: US Dollar
                    type: string
                price:
                    description:
                        Unit price applied at and above this breakpoint, as a numeric value in the channel currency. Read-only.
                    example: 9.99
                    format: double
                    readOnly: true
                    type: number
                priceFormatted:
                    description:
                        Locale-formatted rendering of price including the currency symbol. Read-only.
                    example: $9.99
                    readOnly: true
                    type: string
                pricingQuantityPrice:
                    description:
                        Unit price multiplied by the unit-of-measure incremental quantity at this breakpoint. Read-only.
                    example: 9.99
                    format: double
                    readOnly: true
                    type: number
                pricingQuantityPriceFormatted:
                    description:
                        Locale-formatted rendering of pricingQuantityPrice including the currency symbol. Read-only.
                    example: $9.99
                    readOnly: true
                    type: string
                quantity:
                    description:
                        Minimum quantity (in base units) at which this tier price activates.
                    example: 202.1
                    format: bigdecimal
                    minimum: 0
                    readOnly: true
                    type: number
            type: object
        WishList:
            description:
                Named buyer wish list scoping a collection of wish-list items for the authenticated account within a commerce channel.
            properties:
                defaultWishList:
                    description:
                        When true, this is the account's default wish list (the one that receives items when no list is specified).
                    example: true
                    type: boolean
                id:
                    description:
                        Reference to the wish list (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    type: integer
                name:
                    description:
                        Display name of the wish list. Required on create. Filterable, sortable, and matched by the search query parameter.
                    example: My Wish List
                    type: string
                wishListItems:
                    description:
                        Inline wish-list items belonging to the wish list.
                    items:
                        $ref: "#/components/schemas/WishListItem"
                    type: array
            type: object
        WishListItem:
            description:
                Single entry in a wish list referencing a product or SKU together with snapshot display fields the storefront uses to render the saved item.
            properties:
                finalPrice:
                    description:
                        Resolved final price of the referenced SKU at the time the response is built, formatted in the channel currency.
                    example: $8.99
                    type: string
                friendlyURL:
                    description:
                        Resolved friendly URL of the referenced product in the active channel.
                    example: /hand-saw
                    type: string
                icon:
                    description:
                        Resolved URL of the referenced product's thumbnail image.
                    example: https://example.com/thumbnail.png
                    type: string
                id:
                    description:
                        Reference to the wish-list item (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    type: integer
                productId:
                    description:
                        Reference to the referenced product head (FK identifier).
                    example: 30129
                    format: int64
                    type: integer
                productName:
                    description:
                        Localized display name of the referenced product, resolved for the request locale.
                    example: Hand Saw
                    type: string
                skuId:
                    description:
                        Reference to the referenced SKU (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
info:
    description:
        "Storefront REST API for the Liferay Commerce delivery (buyer-facing) catalog domain. Exposes channel-scoped read access to products, SKUs, prices, availability, attachments, categories, specifications, related and linked products, shop-by-diagram pins and mapped products, currencies, accounts, and wish lists, and supports write access for wish-list lifecycle and account creation under a channel. -- Primary entities: Channel, Account, Product, Sku, ProductOption, ProductOptionValue, ProductSpecification, RelatedProduct, LinkedProduct, MappedProduct, Pin, Attachment, Category, Currency, WishList, WishListItem. -- Perspective: buyer-facing (delivery) storefront. Every product, SKU, price, and availability response is computed under a CommerceContext keyed by the addressed channel, the resolved account (via AccountUtil) and the request locale. For the merchant-facing (admin) side of the same domain see headless-commerce-admin-catalog; for cart and checkout see headless-commerce-delivery-cart and headless-commerce-delivery-order. -- Common workflows: Browse the storefront catalog -- (1) GET /channels to enumerate CommerceChannel entries visible to the caller and pick a channelId; (2) GET /channels/<channelId>/products with `filter`, `search`, `sort`, `page`, and `pageSize` to page through the channel's published catalog; (3) GET /channels/<channelId>/products/<productId> (or /channels/<channelId>/products/by-friendly-url-path/<path>) for the product detail, then GET the product's attachments, images, categories, product-specifications, related products, linked products, and product-options to assemble the product page. -- Resolve a configurable product to a purchasable SKU -- (1) GET /channels/<channelId>/products/<productId>/product-options to enumerate the product's option groups and GET the product-option-values for each option; (2) POST /channels/<channelId>/products/<productId>/skus/by-sku-option with the selected option-value IDs to resolve the matching Sku, including channel- and account-scoped price and availability; (3) GET /channels/<channelId>/products/<productId>/skus/<skuId> to refetch the resolved SKU on demand. -- Browse a shop-by-diagram product -- (1) GET /channels/<channelId>/products/<productId>/pins to enumerate the diagram hotspots defined on a parent product; (2) GET /channels/<channelId>/products/<productId>/mapped-products to fetch the child products mapped behind each pin and feed them back into the product detail flow above. -- Onboard a buyer account under a channel -- (1) GET /channels/<channelId>/accounts to confirm the caller does not already have a matching account; (2) POST /channels/<channelId>/accounts with the buyer profile to create the Account that becomes the CommerceContext account on subsequent price and availability calls. -- Manage a buyer wish list -- (1) POST /channels/<channelId>/wishlists (or POST /channels/by-externalReferenceCode/<externalReferenceCode>/wishlists) to create a wish list under the channel; (2) POST /wishlists/<wishListId>/wishlist-items with a productId/skuId pair to add an item; (3) PATCH /wishlists/<wishListId> (JSON Merge Patch) to rename the list or toggle the default flag; (4) DELETE /wishlist-items/<wishListItemId> to remove a single item or DELETE /wishlists/<wishListId> to remove the entire list. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.delivery.catalog.client', and version '4.0.66'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Commerce Delivery Catalog API
    version: v1.0
