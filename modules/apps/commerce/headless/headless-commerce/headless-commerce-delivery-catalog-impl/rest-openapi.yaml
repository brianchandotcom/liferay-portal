components:
    parameters:
        accountIdQueryParam:
            in: query
            description:
                Reference to the AccountEntry the request is scoped to. When omitted, AccountUtil resolves the effective account from the authenticated user's commerce account assignments and channel eligibility; when the user has multiple accounts the explicit value is required (NoSuchEntryException otherwise).
            explode: true
            name: accountId
            required: false
            schema:
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: form
        channelExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the addressed CommerceChannel; raises 404 when no channel with this code exists in the company.
            explode: false
            name: channelExternalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        channelIdPathParam:
            in: path
            description:
                Reference to the addressed CommerceChannel; raises 404 when no channel with this primary key exists.
            explode: false
            name: channelId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        currencyCodeQueryParam:
            in: query
            description:
                ISO 4217 currency code applied to the request's CommerceContext for price resolution. When omitted, the channel's default currency is used; a non-active currency raises 422.
            explode: true
            name: currencyCode
            required: false
            schema:
                example: USD
                type: string
            style: form
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code of the addressed CommerceChannel; raises 404 when no channel with this code exists in the company.
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        filterQueryParam:
            in: query
            description:
                OData v4 $filter expression applied to the indexed entity. Supported fields are sourced from the entity model -- ChannelEntityModel exposes siteGroupId, name; AccountEntityModel exposes dateCreated, dateModified, name, type; ProductEntityModel exposes categoryIds, categoryNames, gtins, specificationNames, specificationValues, tags, createDate, modifiedDate, catalogId, statusCode, externalReferenceCode, name, productType plus every expando custom column. Currency, mapped product, and most child endpoints do not publish an entity model and ignore filter.
            explode: true
            name: filter
            required: false
            schema:
                type: string
            style: form
        friendlyUrlPathPathParam:
            in: path
            description:
                Localized friendly URL slug of the addressed Product (sourced from the storefront URL). Resolved against the company group via CPDefinitionLocalService.fetchCPDefinitionByFriendlyURL; raises 404 when no product matches.
            explode: false
            name: friendlyUrlPath
            required: true
            schema:
                description:
                    The product friendly URL path
                example: hand-saw
                minLength: 1
                type: string
            style: simple
        nestedFieldsQueryParam:
            in: query
            description:
                Comma-separated list of nested fields to embed in each returned resource. Each value names a relationship exposed on the resource; when omitted, those relationships are not expanded inline.
            explode: true
            name: nestedFields
            required: false
            schema:
                type: string
            style: form
        pageQueryParam:
            in: query
            description:
                One-based page index for paginated results. Combine with pageSize to walk pages; when omitted the server returns page 1.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items per page. When omitted the server applies the configured default page size; the maximum page size is bounded by the portal's PortalUtil.PROPS_REST_MAX_RETURN_SIZE.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        productExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the addressed CProduct; raises 404 when no product with this code exists in the company.
            explode: false
            name: productExternalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        productIdPathParam:
            in: path
            description:
                Reference to the addressed CProduct (product head). The resource resolves the active CPDefinition through fetchCPDefinitionByCProductId; raises 404 when missing.
            explode: false
            name: productId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        productOptionExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the addressed CPOption (parent of the CPDefinitionOptionRel); raises 404 when missing.
            explode: false
            name: productOptionExternalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        productOptionIdPathParam:
            in: path
            description:
                Reference to the addressed CPDefinitionOptionRel; raises 404 when missing.
            explode: false
            name: productOptionId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        productOptionValueIdQueryParam:
            in: query
            description:
                Reference to the CPDefinitionOptionValueRel currently selected by the buyer. Forwarded to the DTO converter so price and selectability for each returned value reflect this candidate selection.
            explode: true
            name: productOptionValueId
            required: false
            schema:
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: form
        quantityQueryParam:
            in: query
            description:
                Requested order quantity expressed in base units. Used by the pricing engine to evaluate tier pricing and unit-of-measure conversions; defaults to BigDecimal.ONE or the unit-of-measure incremental order quantity when omitted.
            explode: true
            name: quantity
            required: false
            schema:
                example: 10.1
                format: bigdecimal
                type: number
            style: form
        searchQueryParam:
            in: query
            description:
                Free-text keyword applied to the indexed entity. The corpus is sourced from the indexer -- AccountEntry indexes name and email; CommerceChannel indexes name; CPDefinition indexes title, description, SKU, GTIN, and expando custom fields registered via EntityFieldsUtil; CSDiagramEntry indexes the referenced product title.
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        skuExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the addressed CPInstance; raises 404 when missing.
            explode: false
            name: skuExternalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        skuIdPathParam:
            in: path
            description:
                Reference to the addressed CPInstance (SKU); raises 404 when missing.
            explode: false
            name: skuId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        skuIdQueryParam:
            in: query
            description:
                Reference to a candidate CPInstance the buyer is configuring. Forwarded to the DTO converter so price and selectability for each option value reflect this candidate SKU.
            explode: true
            name: skuId
            required: false
            schema:
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: form
        skuUnitOfMeasureKeyQueryParam:
            in: query
            description:
                Key of the SkuUnitOfMeasure the buyer is ordering in. When omitted the SKU's primary unit of measure is used; ignored when the SKU is single-unit.
            explode: true
            name: skuUnitOfMeasureKey
            required: false
            schema:
                type: string
            style: form
        sortQueryParam:
            in: query
            description:
                OData v4 $orderby expression. Supported fields mirror the filterable entity-model columns -- AccountEntityModel (dateCreated, dateModified, name, type), ChannelEntityModel (siteGroupId, name), ProductEntityModel (the full set of indexed product fields). Endpoints without an entity model ignore sort.
            explode: true
            name: sort
            required: false
            schema:
                type: string
            style: form
        typeQueryParam:
            in: query
            description:
                RelatedProduct.type filter applied to /channels/{channelId}/products/{productId}/related-products (for example, up-sell, cross-sell, related). When omitted, every APPROVED link is returned.
            explode: true
            name: type
            required: false
            schema:
                type: string
            style: form
        wishListIdPathParam:
            in: path
            description:
                Reference to the addressed CommerceWishList; raises 404 when missing or when the caller lacks VIEW permission.
            explode: false
            name: wishListId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        wishListItemIdPathParam:
            in: path
            description:
                Reference to the addressed CommerceWishListItem; raises 404 when missing or when the caller lacks VIEW on the parent wish list.
            explode: false
            name: wishListItemId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
    schemas:
        Account:
            description:
                Buyer account (business, person, guest, or supplier) used to scope catalog access, orders, and pricing within a commerce channel.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                customFields:
                    description:
                        Caller-defined extension attributes attached to the account through the platform's expando mechanism. Read-only on this API.
                    items:
                        type: customField
                    readOnly: true
                    type: array
                dateCreated:
                    description:
                        Creation timestamp in ISO 8601 (UTC). Filterable and sortable via the OData query parameters. Read-only; set when the account is first persisted.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        Last-modification timestamp in ISO 8601 (UTC). Filterable and sortable via the OData query parameters. Read-only; updated on every save.
                    example: 2017-08-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                defaultBillingAddressId:
                    description:
                        Reference to the address selected as the account's default billing destination (FK identifier). Must resolve to an existing address; zero or absent when no default is set.
                    example: 10130
                    format: int64
                    minimum: 0
                    type: integer
                defaultShippingAddressId:
                    description:
                        Reference to the address selected as the account's default shipping destination (FK identifier). Must resolve to an existing address; zero or absent when no default is set.
                    example: 10131
                    format: int64
                    minimum: 0
                    type: integer
                description:
                    description:
                        Free-form description of the account. Optional.
                    example: Default buyer account.
                    type: string
                domains:
                    description:
                        Email-domain allow-list used to auto-associate self-registering users with this account when their email matches one of these domains. Stored as a comma-separated list on the underlying record; surfaced here as an array of domain strings.
                    example:
                        -   example.com
                        -   example.org
                    items:
                        type: string
                    type: array
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per account within the company. When omitted on create the server generates one.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Primary identifier of the account (FK identifier). Read-only; assigned on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                logoId:
                    description:
                        Reference to the file entry that stores the account's logo image (FK identifier). Must resolve to an existing file entry; zero or absent when no logo is set. Updating this field triggers a reindex.
                    example: 20078
                    format: int64
                    minimum: 0
                    type: integer
                logoURL:
                    description:
                        Resolved URL where the account's logo image can be fetched. Read-only; computed from logoId at response time.
                    example: https://example.com/logo.png
                    type: string
                name:
                    description:
                        Display name of the account. Required on create. Updating this field triggers a reindex; filterable, sortable, and matched by the search query parameter.
                    example: Account Name
                    type: string
                organizationIds:
                    description:
                        References to the organizations the account is associated with (FK identifiers). Synchronizing this list adds or removes the corresponding account-to-organization links.
                    example:
                        -   10130
                        -   10131
                    items:
                        format: int64
                        type: integer
                    type: array
                status:
                    description:
                        Integer workflow status. 0=Approved, 1=Pending, 2=Draft, 3=Expired, 4=Denied, 5=Inactive, 7=Scheduled. Read-only; controlled by the workflow engine.
                    example: 0
                    type: integer
                taxId:
                    description:
                        Tax registration identifier associated with the account. Optional.
                    example: Abcd1234
                    type: string
                type:
                    description:
                        Account category. One of business, guest, person, or supplier. Required on create. Filterable via the OData query parameter; updating this field triggers a reindex.
                    enum:
                        -   business
                        -   guest
                        -   person
                        -   supplier
                    example: business
            required:
                -   name
            type: object
        Attachment:
            description:
                Media or document attached to a catalog product, used for images, downloadable resources, or gallery entries.
            properties:
                attachment:
                    description:
                        Base64-encoded file payload accepted on create or update. The payload is written to the document library, and the resulting file entry is referenced by fileEntryId.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==
                    type: string
                cdnEnabled:
                    description:
                        When true, the attachment is served from the configured CDN host rather than the document library. Defaults to false.
                    example: true
                    type: boolean
                cdnURL:
                    description:
                        Fully qualified CDN URL for the attachment when CDN delivery is enabled. Read-only; computed at response time.
                    example: https://cdn.example.com/attachment.png
                    type: string
                customFields:
                    description:
                        Caller-defined extension attributes attached to the attachment through the platform's expando mechanism. Read-only on this API.
                    items:
                        type: customField
                    readOnly: true
                    type: array
                displayDate:
                    description:
                        Date from which the attachment becomes visible to storefront callers, in ISO 8601 (date only). Optional; absent means visible immediately.
                    example: 2017-07-21
                    format: date-time
                    type: string
                expirationDate:
                    description:
                        Date after which the attachment is no longer visible to storefront callers, in ISO 8601 (date only). Ignored when neverExpire is true.
                    example: 2017-08-21
                    format: date-time
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per attachment within the company.
                    example: AB-34098-789-N
                    type: string
                fileEntryId:
                    description:
                        Reference to the document library file entry that holds the binary content (FK identifier). Read-only; set when the attachment payload is uploaded.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                galleryEnabled:
                    description:
                        Whether this attachment is displayed in the product gallery. Read-only; derived from the attachment's type (image attachments are gallery-enabled).
                    example: true
                    readOnly: true
                    type: boolean
                id:
                    description:
                        Primary identifier of the attachment (FK identifier). Read-only; assigned on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                neverExpire:
                    description:
                        When true the attachment never expires and expirationDate is ignored. Defaults to false.
                    example: true
                    type: boolean
                options:
                    additionalProperties:
                        type: string
                    description:
                        Map of option key/value pairs that bind this attachment to a specific SKU variant. Stored as a serialized JSON array on the underlying record. Updating this field triggers a reindex of the owning product.
                    example:
                        color: yellow
                        optionKey: optionValueKey
                        size: xs
                    type: object
                priority:
                    description:
                        Display priority within the product's attachment list; lower values sort first. Sortable via the OData query parameter.
                    example: 1.2
                    format: double
                    type: number
                src:
                    description:
                        Resolved URL where the attachment can be downloaded. Read-only; computed at response time.
                    example: https://example.com/attachment.png
                    type: string
                tags:
                    description:
                        Asset-tag names attached to the underlying file entry. Read-only on this API.
                    example:
                        -   tag1
                        -   tag2
                        -   tag3
                    items:
                        type: string
                    readOnly: true
                    type: array
                title:
                    description:
                        Display title of the attachment, resolved for the request locale.
                    example: Hand Saw
                    type: string
                type:
                    description:
                        Integer attachment role. 0=Image, 1=Other. Read-only.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
            type: object
        Availability:
            description:
                Stock-availability snapshot for a SKU resolved in the active commerce channel and inventory engine. Computed at response time and never persisted.
            properties:
                label:
                    description:
                        Untranslated availability label key. Computed from the inventory engine's view of current stock against the SKU's thresholds.
                    example: available
                    type: string
                label_i18n:
                    description:
                        Localized availability label resolved for the request locale.
                    example: Available
                    type: string
                stockQuantity:
                    description:
                        Quantity currently available across the active inventory engine, expressed in the SKU's primary unit of measure.
                    example: 10.1
                    format: bigdecimal
                    type: number
            type: object
        Category:
            description:
                Asset-vocabulary category tagged on a catalog product, used for storefront browsing and filtering.
            properties:
                id:
                    description:
                        Reference to the asset category (FK identifier).
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Untranslated category name. Matched by the search query parameter on the product list endpoint.
                    example: Hand Tools
                    type: string
                siteId:
                    description:
                        Reference to the site that owns the vocabulary the category belongs to (FK identifier). Filterable via the OData query parameter.
                    example: 20078
                    format: int64
                    type: integer
                title:
                    description:
                        Localized category title resolved for the request locale. Read-only.
                    example: Hand Tools
                    readOnly: true
                    type: string
                vocabulary:
                    description:
                        Display name of the asset vocabulary the category belongs to. Read-only.
                    example: Default Vocabulary
                    readOnly: true
                    type: string
            type: object
        Channel:
            description:
                Commerce channel (site or external endpoint) that scopes pricing, currency, inventory, and catalog visibility for the buyer.
            properties:
                currencyCode:
                    description:
                        ISO 4217 currency code used for prices in this channel. Required on create; must reference an active currency configured on the company. Updating this field triggers a reindex.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per channel within the company.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the commerce channel (FK identifier). Read-only; assigned on create.
                    example: 30130
                    format: int64
                    type: integer
                name:
                    description:
                        Display name of the channel. Required on create. Updating this field triggers a reindex; filterable, sortable, and matched by the search query parameter.
                    example: Storefront Channel
                    type: string
                siteGroupId:
                    description:
                        Reference to the site the channel is bound to (FK identifier). Filterable via the OData query parameter.
                    example: 20078
                    format: int64
                    type: integer
                type:
                    description:
                        Channel kind discriminator. Required on create. Filterable via the OData query parameter. The built-in value is `site`; additional values may be contributed by custom CommerceChannelType OSGi components and are accepted here as free-form strings.
                    example: site
                    type: string
            required:
                -   currencyCode
                -   name
                -   type
            type: object
        Currency:
            description:
                Commerce currency definition including its ISO code, locale-specific formatting rules, exchange rate, and rounding behavior.
            properties:
                active:
                    description:
                        When true, the currency is enabled for use in commerce flows. A non-active currency supplied as a request parameter is rejected.
                    example: true
                    type: boolean
                code:
                    description:
                        ISO 4217 currency code. Required on create; must be a 3-letter code.
                    example: USD
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for create and update; must be unique per currency within the company.
                    example: AB-34098-789-N
                    type: string
                formatPattern:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are decimal-format patterns applied when rendering monetary amounts for the locale.
                    example:
                        en_US: ¤#,##0.00
                        hr_HR: "#,##0.00 ¤"
                        hu_HU: "#,##0.00 ¤"
                    type: object
                id:
                    description:
                        Reference to the commerce currency (FK identifier). Read-only; assigned on create.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                maxFractionDigits:
                    description:
                        Upper bound on the number of fractional digits rendered when formatting monetary values in this currency.
                    example: 2
                    format: int32
                    minimum: 0
                    type: integer
                minFractionDigits:
                    description:
                        Lower bound on the number of fractional digits rendered when formatting monetary values in this currency.
                    example: 2
                    format: int32
                    minimum: 0
                    type: integer
                name:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated currency names.
                    example:
                        en_US: US Dollar
                        hr_HR: Američki dolar
                        hu_HU: USA dollár
                    type: object
                primary:
                    description:
                        When true, this is the company-wide primary currency used as the base for exchange-rate conversions. At most one currency per company is primary; its rate is always 1.
                    example: true
                    type: boolean
                priority:
                    description:
                        Sort priority among currencies; lower values sort first. Sortable via the OData query parameter.
                    example: 1.2
                    format: double
                    type: number
                rate:
                    description:
                        Exchange rate relative to the primary currency. The primary currency itself always carries the rate 1.
                    example: 33.54
                    format: bigdecimal
                    type: number
                roundingMode:
                    description:
                        Rounding strategy applied to monetary calculations. One of UP, DOWN, CEILING, FLOOR, HALF_UP, HALF_DOWN, HALF_EVEN, UNNECESSARY. Defaults to HALF_EVEN.
                    enum:
                        -   UP
                        -   DOWN
                        -   CEILING
                        -   FLOOR
                        -   HALF_UP
                        -   HALF_DOWN
                        -   HALF_EVEN
                        -   UNNECESSARY
                    example: HALF_EVEN
                    type: string
                symbol:
                    description:
                        Display symbol shown next to formatted amounts.
                    example: $
                    type: string
            required:
                -   code
                -   name
            type: object
        DDMOption:
            description:
                Dynamic-data-mapping form option captured against a configurable SKU. Represents either a free-form or a selected value supplied by the buyer when ordering.
            properties:
                key:
                    description:
                        Stable key identifying the form field on the SKU's option structure.
                    example: engraving
                    type: string
                required:
                    description:
                        When true, the option must be supplied to order the SKU.
                    example: true
                    type: boolean
                value:
                    description:
                        Submitted values for the option. The array shape supports multi-valued fields; single-valued fields carry one element.
                    example:
                        -   Happy Birthday
                    items:
                        type: string
                    type: array
            type: object
        Error:
            description:
                Standard error envelope returned for non-2xx responses across the API.
            properties:
                errorCode:
                    description:
                        Internal error code identifying the specific failure mode. Read-only.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Human-readable explanation of the error condition. Read-only.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Diagnostic message identifying the failed operation. Read-only.
                    example: No matching currency found for the supplied key.
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code echoed in the response body. Read-only.
                    example: 404
                    readOnly: true
                    type: integer
            required:
                -   errorCode
                -   errorDescription
                -   message
                -   status
            type: object
        LinkedProduct:
            description:
                Lightweight reference linking a product to another product without inlining the linked product's full payload.
            properties:
                productExternalReferenceCode:
                    description:
                        External reference code of the linked product. Read-only.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                productId:
                    description:
                        Reference to the linked product (FK identifier). Read-only.
                    example: 33131
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                type:
                    description:
                        Product-type discriminator of the linked product. Read-only.
                    example: simple
                    readOnly: true
                    type: string
            type: object
        MappedProduct:
            description:
                Shop-by-diagram payload that ties a region of a parent product's diagram image to a referenced product or SKU, together with the resolved availability and pricing for the buyer.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                availability:
                    $ref: "#/components/schemas/Availability"
                firstAvailableReplacementMappedProduct:
                    $ref: "#/components/schemas/MappedProduct"
                id:
                    description:
                        Reference to the diagram entry (FK identifier).
                    example: 33130
                    format: int64
                    minimum: 0
                    type: integer
                price:
                    $ref: "#/components/schemas/Price"
                productConfiguration:
                    $ref: "#/components/schemas/ProductConfiguration"
                productExternalReferenceCode:
                    description:
                        External reference code of the referenced product.
                    example: AB-34098-789-N
                    type: string
                productId:
                    description:
                        Reference to the referenced product (FK identifier).
                    example: 33131
                    format: int64
                    minimum: 0
                    type: integer
                productName:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the translated product names. Read-only.
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    readOnly: true
                    type: object
                productOptions:
                    description:
                        Inline option definitions of the referenced product.
                    items:
                        $ref: "#/components/schemas/ProductOption"
                    type: array
                purchasable:
                    description:
                        Whether the mapped product can currently be purchased through this channel. Read-only; computed from availability and channel/account eligibility.
                    example: true
                    readOnly: true
                    type: boolean
                quantity:
                    description:
                        Number of units represented by this pin, typically the count required by the diagram position. Defaults to 1.
                    example: 1
                    format: int32
                    minimum: 0
                    type: integer
                replacementMappedProduct:
                    $ref: "#/components/schemas/MappedProduct"
                replacementMessage:
                    description:
                        User-facing message describing why a replacement is shown in place of the original mapped product. Read-only.
                    example: MIN3123 has been replaced by MIN1289
                    readOnly: true
                    type: string
                sequence:
                    description:
                        Free-form sequence identifier ordering pins within the parent diagram. Sortable via the OData query parameter.
                    example: 1
                    type: string
                sku:
                    description:
                        SKU code (human-readable inventory identifier) of the referenced inventory unit.
                    example: SKU01
                    type: string
                skuExternalReferenceCode:
                    description:
                        External reference code of the referenced SKU.
                    example: SKU0111
                    type: string
                skuId:
                    description:
                        Reference to the referenced SKU (FK identifier).
                    example: 33135
                    format: int64
                    minimum: 0
                    type: integer
                skuOptions:
                    description:
                        Inline option selections defining the variant identified by skuId.
                    items:
                        $ref: "#/components/schemas/SkuOption"
                    type: array
                skuUnitOfMeasures:
                    description:
                        Inline units of measure available for the mapped product.
                    items:
                        $ref: "#/components/schemas/SkuUnitOfMeasure"
                    type: array
                thumbnail:
                    description:
                        Resolved URL of the referenced product's thumbnail image. Read-only.
                    example: https://example.com/thumbnail.png
                    readOnly: true
                    type: string
                type:
                    description:
                        Mapping target discriminator. One of diagram, external, or sku. Determines how the pin resolves a purchasable target.
                    enum:
                        -   diagram
                        -   external
                        -   sku
                    example: sku
                    type: string
                urls:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the friendly URL paths of the referenced product.
                    example:
                        en_US: product-url-us
                        hr_HR: product-url-hr
                        hu_HU: product-url-hu
                    type: object
            type: object
        Pin:
            description:
                Coordinates on a product-diagram image that locate a mapped product, used to render interactive shop-by-diagram views.
            properties:
                id:
                    description:
                        Reference to the diagram pin (FK identifier).
                    example: 33130
                    format: int64
                    minimum: 0
                    type: integer
                mappedProduct:
                    $ref: "#/components/schemas/MappedProduct"
                positionX:
                    description:
                        Horizontal coordinate of the pin on the diagram image, expressed as a percentage (0-100) of the image width.
                    example: 33.54
                    format: double
                    type: number
                positionY:
                    description:
                        Vertical coordinate of the pin on the diagram image, expressed as a percentage (0-100) of the image height.
                    example: 33.54
                    format: double
                    type: number
                sequence:
                    description:
                        Free-form sequence identifier used to order pins within the diagram.
                    example: 1
                    type: string
            type: object
        Price:
            description:
                Resolved price snapshot for a SKU in the active channel and currency, including discounts, promotional prices, and tier breakpoints. Tax inclusion follows the channel display setting; values are computed at response time and never persisted on the SKU.
            properties:
                currency:
                    description:
                        Display name of the channel's currency resolved for the request locale. This is the human-readable name, not the ISO code.
                    example: US Dollar
                    type: string
                discount:
                    description:
                        Absolute discount amount applied to the unit price, formatted as a string in the channel currency.
                    example: $2.00
                    type: string
                discountPercentage:
                    description:
                        Total discount percentage applied to the unit price as a formatted string.
                    example: "15"
                    type: string
                discountPercentages:
                    description:
                        Per-level discount percentages contributing to the total discount, in application order.
                    example:
                        -   "10"
                        -   "5"
                    items:
                        type: string
                    type: array
                finalPrice:
                    description:
                        Unit price after all discounts and promotions, formatted in the channel currency.
                    example: $8.99
                    type: string
                price:
                    description:
                        Unit list price before discounts, as a numeric value in the channel currency.
                    example: 10.99
                    format: double
                    type: number
                priceFormatted:
                    description:
                        Locale-formatted rendering of the unit list price including the currency symbol.
                    example: $10.99
                    type: string
                priceOnApplication:
                    description:
                        When true, the price is hidden and the buyer must contact the seller to obtain it. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                pricingQuantityPrice:
                    description:
                        Unit price multiplied by the unit-of-measure incremental quantity (the price for the priced quantity).
                    example: 10.99
                    format: double
                    type: number
                pricingQuantityPriceFormatted:
                    description:
                        Locale-formatted rendering of pricingQuantityPrice including the currency symbol.
                    example: $10.99
                    type: string
                promoPrice:
                    description:
                        Promotional unit price as a numeric value in the channel currency, applied before order-level discounts.
                    example: 8.99
                    format: double
                    type: number
                promoPriceFormatted:
                    description:
                        Locale-formatted rendering of promoPrice including the currency symbol.
                    example: $8.99
                    type: string
                tierPrice:
                    description:
                        Resolved tier-pricing unit price for the requested quantity, as a numeric value in the channel currency.
                    example: 9.99
                    format: double
                    type: number
                tierPriceFormatted:
                    description:
                        Locale-formatted rendering of tierPrice including the currency symbol.
                    example: $9.99
                    type: string
            type: object
        Product:
            description:
                Catalog product exposed to storefront callers; includes media, options, specifications, SKUs, and SEO metadata. Read-only on this API; product lifecycle is managed through the admin catalog API.
            properties:
                attachments:
                    description:
                        Non-image attachments bound to the product.
                    items:
                        $ref: "#/components/schemas/Attachment"
                    type: array
                catalogName:
                    description:
                        Display name of the catalog the product belongs to. Read-only.
                    example: Hardware Catalog
                    readOnly: true
                    type: string
                categories:
                    description:
                        Asset categories tagged on the product. Matched by the search query parameter.
                    items:
                        $ref: "#/components/schemas/Category"
                    type: array
                createDate:
                    description:
                        Product creation timestamp in ISO 8601 (UTC). Filterable and sortable via the OData query parameters.
                    example: 2017-07-21
                    format: date-time
                    type: string
                customFields:
                    description:
                        Caller-defined extension attributes attached to the product through the platform's expando mechanism. Each registered attribute is also filterable via the OData query parameter.
                    items:
                        type: customField
                    type: array
                description:
                    description:
                        Long-form HTML description of the product, resolved for the request locale. Matched by the search query parameter.
                    example: Cordless circular saw with brushless motor.
                    type: string
                expando:
                    additionalProperties: true
                    description:
                        Raw map of expando attribute name to value for caller-driven extensions to the product record.
                    example:
                        expandoKey: expandoValue
                    type: object
                externalReferenceCode:
                    description:
                        Idempotency key; must be unique per product within the company. Filterable via the OData query parameter.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Reference to the product definition (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                images:
                    description:
                        Image-type attachments bound to the product, rendered in the gallery.
                    items:
                        $ref: "#/components/schemas/Attachment"
                    type: array
                linkedProducts:
                    description:
                        Lightweight references to other products linked from this one (cross-sell, up-sell, accessory).
                    items:
                        $ref: "#/components/schemas/LinkedProduct"
                    type: array
                metaDescription:
                    description:
                        Localized SEO meta description rendered for the request locale.
                    example: Hand Saw with 10-inch blade.
                    type: string
                metaKeyword:
                    description:
                        Localized SEO meta keywords rendered for the request locale.
                    example: saw, hand-saw, tools
                    type: string
                metaTitle:
                    description:
                        Localized SEO meta title rendered for the request locale.
                    example: Hand Saw
                    type: string
                modifiedDate:
                    description:
                        Timestamp of the last product modification in ISO 8601 (UTC). Filterable and sortable via the OData query parameters.
                    example: 2017-08-21
                    format: date-time
                    type: string
                multipleOrderQuantity:
                    description:
                        Order-quantity step (in base units) that order lines for this product must respect.
                    example: 1
                    format: int32
                    type: integer
                name:
                    description:
                        Localized product name resolved for the request locale. Filterable, sortable, and matched by the search query parameter.
                    example: Hand Saw
                    type: string
                productConfiguration:
                    $ref: "#/components/schemas/ProductConfiguration"
                productId:
                    description:
                        Reference to the product head used as a stable identifier across product versions (FK identifier). Read-only.
                    example: 30129
                    format: int64
                    readOnly: true
                    type: integer
                productOptions:
                    description:
                        Inline option definitions configurable when ordering the product.
                    items:
                        $ref: "#/components/schemas/ProductOption"
                    type: array
                productSpecifications:
                    description:
                        Inline specification values describing the product's static attributes.
                    items:
                        $ref: "#/components/schemas/ProductSpecification"
                    type: array
                productType:
                    description:
                        Product-type name discriminator. Filterable via the OData query parameter and matched by the search query parameter. Built-in values are `simple`, `grouped`, `virtual`, and `bundle`; additional values may be contributed by custom CPType OSGi components and are accepted here as free-form strings.
                    example: simple
                    type: string
                relatedProducts:
                    description:
                        Inline typed links to other products (up-sell, cross-sell, related).
                    items:
                        $ref: "#/components/schemas/RelatedProduct"
                    type: array
                shortDescription:
                    description:
                        Localized short summary of the product, resolved for the request locale. Matched by the search query parameter.
                    example: Hand Saw, 10-inch blade.
                    type: string
                skus:
                    description:
                        Inline SKU variants belonging to the product.
                    items:
                        $ref: "#/components/schemas/Sku"
                    type: array
                slug:
                    description:
                        Localized friendly URL slug used in storefront URLs.
                    example: hand-saw
                    type: string
                tags:
                    description:
                        Asset-tag names attached to the product. Matched by the search query parameter.
                    example:
                        -   tag1
                        -   tag2
                        -   tag3
                    items:
                        type: string
                    type: array
                urlImage:
                    description:
                        Resolved URL of the product's default image.
                    example: https://example.com/product-image.png
                    type: string
                urls:
                    additionalProperties:
                        type: string
                    description:
                        Localized text. Map keys are locale codes; values are the friendly URL paths of the product. Read-only.
                    example:
                        en_US: product-url-us
                        hr_HR: product-url-hr
                        hu_HU: product-url-hu
                    readOnly: true
                    type: object
            type: object
        ProductConfiguration:
            description:
                Inventory and ordering constraints attached to a product or SKU; defines stock display, back-order policy, quantity bounds, and the inventory engine used to source stock.
            properties:
                allowBackOrder:
                    description:
                        When true, back orders are accepted once stock is depleted. Defaults to false.
                    example: true
                    type: boolean
                allowedOrderQuantities:
                    description:
                        Discrete order quantities buyers may select. When populated, only listed values are accepted on an order line; absent means any quantity within the min/max bounds is allowed.
                    example:
                        -   10
                        -   20
                        -   30
                        -   40
                    items:
                        example: 10.1
                        format: bigdecimal
                        type: number
                    type: array
                availabilityEstimateId:
                    description:
                        Reference to the availability estimate advertised when the SKU is out of stock (FK identifier). Read-only.
                    example: 31130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                availabilityEstimateName:
                    description:
                        Display name of the availability estimate. Read-only.
                    example: Available in 2 weeks
                    readOnly: true
                    type: string
                displayAvailability:
                    description:
                        When true, the storefront exposes the SKU's availability label. Defaults to false.
                    example: true
                    type: boolean
                displayStockQuantity:
                    description:
                        When true, the storefront exposes the SKU's numeric stock quantity. Defaults to false.
                    example: true
                    type: boolean
                inventoryEngine:
                    description:
                        Identifier of the inventory engine used to manage the product's stock.
                    example: default
                    type: string
                lowStockAction:
                    description:
                        Action key executed when stock crosses the minStockQuantity threshold.
                    example: set-published-to-false
                    type: string
                maxOrderQuantity:
                    description:
                        Maximum quantity orderable on a single order line.
                    example: 10.1
                    format: bigdecimal
                    type: number
                minOrderQuantity:
                    description:
                        Minimum quantity orderable on a single order line.
                    example: 10.1
                    format: bigdecimal
                    type: number
                minStockQuantity:
                    description:
                        Stock threshold at or below which the lowStockAction is triggered.
                    example: 10.1
                    format: bigdecimal
                    type: number
                multipleOrderQuantity:
                    description:
                        Order-quantity step (in base units) order lines must respect. Defaults to 1.
                    example: 10.1
                    format: bigdecimal
                    type: number
            type: object
        ProductOption:
            description:
                Configurable product option attached to a product definition. The set of selectable values shapes the resolved SKU when the buyer configures the product.
            properties:
                catalogId:
                    description:
                        Reference to the catalog that owns the parent option (FK identifier).
                    example: 30130
                    format: int64
                    type: integer
                description:
                    description:
                        Localized description of the option, resolved for the request locale.
                    example: Available colors.
                    type: string
                fieldType:
                    description:
                        Renderer key identifying the option's input type.
                    example: select
                    type: string
                id:
                    description:
                        Reference to the option binding on the product (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                key:
                    description:
                        Stable key identifying the option within the product.
                    example: color
                    type: string
                name:
                    description:
                        Localized display name of the option, resolved for the request locale. Filterable, sortable, and matched by the search query parameter on the option list endpoint.
                    example: Color
                    type: string
                optionExternalReferenceCode:
                    description:
                        External reference code of the parent option used for idempotent linking.
                    example: AB-34098-789-N
                    type: string
                optionId:
                    description:
                        Reference to the parent option definition (FK identifier).
                    example: 30080
                    format: int64
                    minimum: 0
                    type: integer
                priority:
                    description:
                        Display priority within the product's option list; lower values sort first. Sortable via the OData query parameter.
                    example: 1.2
                    format: double
                    type: number
                productOptionValues:
                    description:
                        Inline selectable values for this option.
                    items:
                        $ref: "#/components/schemas/ProductOptionValue"
                    type: array
                required:
                    description:
                        When true, the buyer must supply a value when adding the product to cart. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                skuContributor:
                    description:
                        When true, the option's selection contributes to the resolved SKU variant; option values may link to specific SKUs. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
            type: object
        ProductOptionValue:
            description:
                Selectable value of a product option with an optional price impact and link to a specific SKU variant.
            properties:
                id:
                    description:
                        Reference to the option-value binding on the product (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                infoMessage:
                    description:
                        Localized informational message displayed next to the value. Read-only.
                    example: Only 3 left in stock.
                    readOnly: true
                    type: string
                key:
                    description:
                        Stable key identifying the value within its option.
                    example: black
                    type: string
                name:
                    description:
                        Localized display name of the value, resolved for the request locale. Filterable, sortable, and matched by the search query parameter on the option-value list endpoint.
                    example: Red
                    type: string
                preselected:
                    description:
                        When true, the value is selected by default when the option is rendered. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                price:
                    description:
                        Formatted price delta applied when this value is selected; the sign matches priceType. Read-only.
                    example: $10.00
                    readOnly: true
                    type: string
                priceType:
                    description:
                        Pricing strategy applied to the value's price delta. Read-only.
                    example: static
                    readOnly: true
                    type: string
                priority:
                    description:
                        Display priority within the option's values; lower values sort first. Sortable via the OData query parameter.
                    example: 1.2
                    format: double
                    type: number
                productOptionId:
                    description:
                        Reference to the owning product option binding (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                quantity:
                    description:
                        Inventory quantity bound to the value when the option is configured as a SKU contributor. Read-only.
                    example: "1"
                    readOnly: true
                    type: string
                relativePriceFormatted:
                    description:
                        Formatted relative price contribution rendered with the appropriate sign and currency symbol. Read-only.
                    example: +$10.00
                    readOnly: true
                    type: string
                selectable:
                    description:
                        Whether the value can currently be selected given the other selections and stock. Read-only; computed at response time.
                    example: true
                    readOnly: true
                    type: boolean
                skuId:
                    description:
                        Reference to the SKU bound to this value when the option is a SKU contributor (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                totalPrice:
                    description:
                        Formatted resolved total price for the product when this value is selected. Read-only.
                    example: $25.99
                    readOnly: true
                    type: string
                unitOfMeasureKey:
                    description:
                        Key of the unit of measure the value is priced against. Read-only.
                    example: EA
                    readOnly: true
                    type: string
                visible:
                    description:
                        Whether the value is visible in the storefront. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
            type: object
        ProductSpecification:
            description:
                Static product attribute (a specification option value) attached to a product, used for storefront filtering and product-detail rendering.
