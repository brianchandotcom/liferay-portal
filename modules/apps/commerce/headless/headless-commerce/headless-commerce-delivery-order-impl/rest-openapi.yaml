                    readOnly: true
                    type: string
                settings:
                    $ref: "#/components/schemas/Settings"
                    readOnly: true
                shippingAddressExternalReferenceCode:
                    description:
                        External reference code of the per-line shipping address, when the line ships to a different address than the order. Read-only.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                shippingAddressId:
                    description:
                        Reference to the per-line shipping address (FK identifier). Zero when the line follows the order's shipping address. Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                sku:
                    description:
                        SKU code of the purchased variant. Read-only.
                    example: SKU-1234
                    readOnly: true
                    type: string
                skuId:
                    description:
                        Reference to the purchased SKU variant (FK identifier on the underlying CPInstance). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                subscription:
                    description:
                        When true the line item is part of a subscription. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                thumbnail:
                    description:
                        URL of the SKU thumbnail image, scoped to the buyer's account. Read-only.
                    example: https://example.com/o/commerce-media/thumbnail/30130
                    readOnly: true
                    type: string
                unitOfMeasure:
                    description:
                        Localized name of the unit of measure (for example, Each, Meter). Read-only.
                    example: Meter
                    readOnly: true
                    type: string
                unitOfMeasureKey:
