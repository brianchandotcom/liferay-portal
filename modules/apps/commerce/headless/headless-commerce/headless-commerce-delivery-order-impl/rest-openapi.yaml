                    type: array
                shippingDiscountValue:
                    description:
                        Total shipping discount amount in the order's currency. Read-only.
                    example: 1.0
                    format: double
                    readOnly: true
                    type: number
                shippingDiscountValueFormatted:
                    description:
                        Pre-formatted shipping discount amount with currency symbol. Read-only.
                    example: $1.00
                    readOnly: true
                    type: string
                shippingValue:
                    description:
                        Total shipping amount before tax in the order's currency. Read-only.
                    example: 9.99
                    format: double
                    readOnly: true
                    type: number
                shippingValueFormatted:
                    description:
                        Pre-formatted shipping amount with currency symbol. Read-only.
                    example: $9.99
                    readOnly: true
                    type: string
                shippingValueWithTaxAmount:
                    description:
                        Shipping amount including tax in the order's currency. Falls back to shippingValue when no tax is configured. Read-only.
                    example: 10.99
                    format: double
                    readOnly: true
                    type: number
                shippingValueWithTaxAmountFormatted:
                    description:
                        Pre-formatted shipping amount including tax, with currency symbol. Read-only.
                    example: $10.99
                    readOnly: true
                    type: string
                subtotal:
                    description:
                        Subtotal of the order before shipping, tax, and order-level discounts. Read-only.
                    example: 33.54
                    format: double
                    readOnly: true
                    type: number
                subtotalDiscountPercentages:
                    description:
                        Four-entry list of pre-formatted subtotal discount percentages, one per discount level. Read-only.
                    example:
                        -   10%
                        -   0%
                        -   0%
                        -   0%
                    items:
                        type: string
                    readOnly: true
                    type: array
                subtotalDiscountValue:
                    description:
                        Total subtotal discount amount in the order's currency. Read-only.
                    example: 3.35
                    format: double
                    readOnly: true
                    type: number
                subtotalDiscountValueFormatted:
                    description:
                        Pre-formatted subtotal discount amount with currency symbol. Read-only.
                    example: $3.35
                    readOnly: true
                    type: string
                subtotalFormatted:
                    description:
                        Pre-formatted subtotal with currency symbol. Read-only.
                    example: $33.54
                    readOnly: true
                    type: string
                taxValue:
                    description:
                        Total tax amount in the order's currency. Populated only when tax is configured on the channel. Read-only.
                    example: 2.69
                    format: double
                    readOnly: true
                    type: number
                taxValueFormatted:
                    description:
                        Pre-formatted tax amount with currency symbol. Read-only.
                    example: $2.69
                    readOnly: true
                    type: string
                total:
                    description:
                        Order total in the order's currency (subtotal plus shipping plus tax minus discounts, with tax inclusion controlled by the channel configuration). Read-only.
                    example: 43.52
                    format: double
                    readOnly: true
                    type: number
                totalDiscountPercentages:
                    description:
                        Four-entry list of pre-formatted total-discount percentages, one per discount level. Read-only.
                    example:
                        -   5%
                        -   0%
                        -   0%
                        -   0%
                    items:
                        type: string
                    readOnly: true
                    type: array
                totalDiscountValue:
                    description:
                        Total order-level discount amount in the order's currency. Read-only.
                    example: 2.18
                    format: double
                    readOnly: true
                    type: number
                totalDiscountValueFormatted:
                    description:
                        Pre-formatted total-discount amount with currency symbol. Read-only.
                    example: $2.18
                    readOnly: true
                    type: string
                totalFormatted:
                    description:
                        Pre-formatted total with currency symbol, ready for display on the order summary. Read-only.
                    example: $43.52
                    readOnly: true
                    type: string
            type: object
        Term:
            description:
                Reusable delivery or payment term assigned to a placed order. Returned by the placed-order delivery-term and payment-term endpoints. Read-only on this surface.
            properties:
                description:
                    description:
                        Localized description of the term, resolved in the request locale. Read-only.
                    example: Net 30 days from invoice date.
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        External reference code of the term entry.
                    example: AB-34098-789-N
                    type: string
                id:
                    description:
                        Identifier of the term entry.
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                name:
                    description:
                        Canonical name of the term entry. Read-only.
                    example: Net 30
                    readOnly: true
                    type: string
            type: object
        VirtualItem:
            description:
                Single downloadable virtual item attached to a placed order item (for example, an e-book PDF, a license key, a digital asset). Carries the resolved download URL, the optional version string, and the remaining download-usage count. Read-only.
            properties:
                url:
                    description:
                        Resolved download URL the buyer follows to obtain the virtual asset. Falls back to a portal-generated download URL when no explicit external URL is set on the underlying file entry. Read-only.
                    example: https://example.com/o/commerce-media/download-virtual/30130/30131
                    readOnly: true
                    type: string
                usages:
                    description:
                        Number of download usages permitted for the virtual asset. Decremented on each successful buyer download until the cap is reached. Read-only.
                    example: 5
                    format: int32
                    readOnly: true
                    type: integer
                version:
                    description:
                        Version label attached to the virtual asset (for example, v1.0.0). Read-only.
                    example: v1.0.0
                    readOnly: true
                    type: string
            type: object
info:
    description:
        "Buyer-facing API for placed orders -- read order history, line items, addresses, comments, shipments, and attachments, and trigger the workflow and storefront transitions allowed to the buyer (for example, cancel a pending order, request an RMA, process a quote, reorder). The API exposes the buyer or delegated account-user slice of the placed-order surface; an order is visible only to its owner or to users with the MANAGE_ALL_ACCOUNTS permission on the channel scope, and orders in the OPEN draft state are excluded from every read endpoint -- the open cart side of the flow lives in headless-commerce-delivery-cart, and back-office administration belongs to headless-commerce-admin-order. Primary entities -- PlacedOrder, PlacedOrderItem, PlacedOrderAddress, PlacedOrderComment, Shipment, PlacedOrderItemShipment, OrderTransition, Attachment, Term, VirtualItem. Most resources are addressable both by internal ID and by external reference code; PATCH applies JSON Merge Patch (only supplied fields are modified). For the cart-side counterpart see headless-commerce-delivery-cart; for admin-side order management see headless-commerce-admin-order. -- Common workflows: Order history view -- (1) GET /channels/<channelId>/placed-orders?sort=createDate desc with paging to enumerate the buyer's committed orders on a channel, then GET /placed-orders/<placedOrderId> for the full detail. -- Re-order -- (1) GET /placed-orders/<placedOrderId> to fetch the order and its line items; (2) POST /placed-orders/<placedOrderId>/order-transitions with name=reorder to spawn a new draft cart whose identifier is returned in OrderTransition.orderId, then continue on the headless-commerce-delivery-cart endpoints to edit and check out the new cart. -- Track shipments -- (1) GET /placed-orders/<placedOrderId>/shipments?sort=createDate desc to list every dispatched shipment with carrier, trackingNumber, and trackingURL; (2) GET /placed-order-items/<placedOrderItemId>/placed-order-item-shipments to drill into the shipments that fulfill a specific line item. -- Invoice download -- (1) GET /placed-orders/<placedOrderId>/attachments to list invoices and delivery notes; (2) follow Attachment.url for each entry to download the PDF. -- Cancel or transition a pending order -- (1) GET /placed-orders/<placedOrderId>/order-transitions to enumerate the transitions the buyer is permitted to trigger; (2) POST /placed-orders/<placedOrderId>/order-transitions with the chosen name (and the workflowTaskId when the order is in a workflow) to apply the transition. -- Virtual item download -- (1) GET /placed-orders/<placedOrderId> and inspect PlacedOrderItem.virtualItems[] on each line item; (2) follow VirtualItem.url for each downloadable file, observing the remaining usages quota and the optional version label. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.commerce.delivery.order.client', and version '1.0.36'."
