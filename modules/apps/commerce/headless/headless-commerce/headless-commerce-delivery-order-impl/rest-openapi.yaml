                    format: int64
                    readOnly: true
                    type: integer
                productURLs:
                    additionalProperties:
                        type: string
                    description:
                        Localized friendly-URL slug map keyed by locale code; values are the per-locale URL slug for the parent product page. Read-only.
                    example:
