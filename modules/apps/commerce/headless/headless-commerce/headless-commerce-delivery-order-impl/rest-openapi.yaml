                        The specified resource was not found
                500:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Error"
                    description:
                        Unexpected error
            tags: ["Shipment"]
tags:
    -   description:
            Buyer-visible attachments uploaded against a placed order, such as invoices, delivery notes, or supporting documents. List, create by base64, and delete by id or external reference code.
        name: Attachment
    -   description:
            Workflow and storefront transitions the buyer can trigger on a placed order (for example, cancel a pending order, process a quote, reorder).
        name: OrderTransition
    -   description:
            Committed (non-open) commerce orders the buyer or a delegated account user is authorized to view. Includes read endpoints, partial update via JSON Merge Patch, billing and shipping address lookups, comments, items, shipments, payment URL generation, and the buyer-permitted order transitions.
        name: PlacedOrder
    -   description:
            Snapshot of the billing or shipping address attached to a placed order. Read-only.
        name: PlacedOrderAddress
    -   description:
            Comments (notes) recorded by the buyer or support staff against a placed order. Corresponds to the standard Commerce Order Note.
        name: PlacedOrderComment
    -   description:
            Individual line items on a placed order. Carries the purchased SKU, quantity, options, child items, and the shipments that fulfill the line.
        name: PlacedOrderItem
    -   description:
            Shipments resolved against a single placed-order line item, including drop-ship supplier shipments.
        name: PlacedOrderItemShipment
    -   description:
            Shipments dispatched against a placed order. Carries the carrier, tracking, status, item count, and shipping-address summary.
        name: Shipment
    -   description:
            Reusable delivery or payment term assigned to a placed order.
        name: Term