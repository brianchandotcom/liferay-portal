components:
    parameters:
        accountExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the buyer account that owns the placed orders. Addresses the account scope when listing orders by account-ERC within a channel-ERC.
            name: accountExternalReferenceCode
            required: true
            schema:
                type: string
        accountIdPathParam:
            in: path
            description:
                Identifier of the buyer account that owns the placed orders. Addresses the account scope when listing orders by account within a channel.
            explode: false
            name: accountId
            required: true
            schema:
                description:
                    Account Id
                format: int64
                type: integer
            style: simple
        attachmentExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the order attachment. Addresses a single attachment within the parent placed order ERC scope.
            name: attachmentExternalReferenceCode
            required: true
            schema:
                type: string
        attachmentIdPathParam:
            in: path
            description:
                Internal identifier of an order attachment. Addresses a single attachment within the parent placed order.
            explode: false
            name: attachmentId
            required: true
            schema:
                description:
                    The attachment Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        callbackURLQueryParam:
            in: query
            description:
                Optional URL the payment gateway redirects the buyer to after the payment flow completes. When omitted, the buyer is routed back to the order-confirmation step on the storefront checkout.
            name: callbackURL
            required: false
            schema:
                type: string
        channelExternalReferenceCodePathParam:
            in: path
            description:
                External reference code of the commerce channel that owns the placed orders. Addresses the channel scope when listing or filtering orders by channel ERC.
            name: channelExternalReferenceCode
            required: true
            schema:
                type: string
        channelIdPathParam:
            in: path
            description:
                Identifier of the commerce channel that owns the placed orders. Addresses the channel scope when listing orders by channel.
            explode: false
            name: channelId
            required: true
            schema:
                description:
                    Channel Id
                format: int64
                type: integer
            style: simple
        externalReferenceCodeMinLengthPathParam:
            in: path
            description:
                External reference code that addresses the target resource on the by-externalReferenceCode paths. The code is the integration-supplied idempotency key, unique within the resource scope.
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
        externalReferenceCodePathParam:
            in: path
            description:
                External reference code that addresses the target resource on the by-externalReferenceCode paths. The code is the integration-supplied idempotency key, unique within the resource scope.
            name: externalReferenceCode
            required: true
            schema:
                type: string
        filterQueryParam:
            in: query
            description:
                OData v4 filter expression that narrows the result set. Supported fields depend on the endpoint and are sourced from the matching entity model (for PlacedOrder typically account, author, createDate, externalReferenceCode, modifiedDate, name, orderStatus, orderType, purchaseOrderNumber).
            name: filter
            required: false
            schema:
                type: string
        nestedFieldsQueryParam:
            in: query
            description:
                Comma-separated list of nested fields to embed in each returned resource. Each value names a relationship exposed on the resource; when omitted, those relationships are not expanded inline.
            explode: true
            name: nestedFields
            required: false
            schema:
                type: string
            style: form
        pageFormQueryParam:
            in: query
            description:
                One-based page index. Combined with pageSize to paginate the result set; defaults to 1 when omitted.
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageQueryParam:
            in: query
            description:
                One-based page index. Combined with pageSize to paginate the result set; defaults to 1 when omitted.
            name: page
            required: false
            schema:
                type: integer
        pageSizeFormQueryParam:
            in: query
            description:
                Number of items per page. Defaults to the portal's configured page size when omitted; capped by the portal configuration to prevent unbounded reads.
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            description:
                Number of items per page. Defaults to the portal's configured page size when omitted; capped by the portal configuration to prevent unbounded reads.
            name: pageSize
            required: false
            schema:
                type: integer
        placedOrderCommentIdPathParam:
            in: path
            description:
                Internal identifier of an order comment (note). Addresses a single comment attached to a placed order.
            explode: false
            name: placedOrderCommentId
            required: true
            schema:
                description:
                    Note Id
                format: int64
                type: integer
            style: simple
        placedOrderIdPathParam:
            in: path
            description:
                Internal identifier of a placed order. Addresses a single non-open placed order owned by the authenticated buyer or a delegated account user.
            explode: false
            name: placedOrderId
            required: true
            schema:
                description:
                    Placed Order Id
                format: int64
                type: integer
            style: simple
        placedOrderIdScopedPathParam:
            in: path
            description:
                Internal identifier of a placed order used as the path scope for nested attachment endpoints. Addresses the parent placed order under which the attachment is created, listed, or deleted.
            explode: false
            name: placedOrderId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        placedOrderIdSimplePathParam:
            in: path
            description:
                Internal identifier of a placed order. Addresses a single non-open placed order owned by the authenticated buyer or a delegated account user.
            name: placedOrderId
            required: true
            schema:
                format: int64
                type: integer
        placedOrderItemIdPathParam:
            in: path
            description:
                Internal identifier of a placed order item under a non-open placed order. Addresses the line-item scope for read and nested-shipment listing.
            explode: false
            name: placedOrderItemId
            required: true
            schema:
                description:
                    Placed Order Item Id
                format: int64
                type: integer
            style: simple
        searchQueryParam:
            in: query
            description:
                Full-text search expression. Matched against the indexed fields of the target entity (for PlacedOrder typically account name, author, externalReferenceCode, name, orderType, and purchaseOrderNumber).
            name: search
            required: false
            schema:
                type: string
        skuIdQueryParam:
            in: query
            description:
                Optional SKU identifier used to narrow placed-order-item results to a single purchasable variant. When omitted, every parent item is returned.
            name: skuId
            required: false
            schema:
                format: int64
                type: integer
        sortQueryParam:
            in: query
            description:
                Sort expression in OData order syntax (field asc|desc, comma-separated). Sortable fields depend on the endpoint and are sourced from the matching entity model.
            name: sort
            required: false
            schema:
                type: string
    schemas:
        Attachment:
            description:
                Buyer-visible file attached to a placed order (for example, an invoice PDF, a delivery note, or a customer-uploaded supporting document). Returned by the order attachment list endpoint and created via the upload-by-base64 endpoint.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    description:
                        Map of HATEOAS actions available to the current user, keyed by action name. Each value carries the href template and HTTP method, computed dynamically from user permissions. Read-only.
                    readOnly: true
                    type: object
                dateModified:
                    description:
                        Last modification timestamp in ISO 8601 (UTC). Read-only; set by the service when the attachment metadata or underlying file is updated.
                    example: 2017-07-21T19:30:00Z
                    format: date-time
                    readOnly: true
                    type: string
                extension:
                    description:
                        File extension of the attached document, derived from the underlying document-library file entry (for example, pdf, jpg). Read-only.
                    example: pdf
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        External reference code copied from the underlying document-library file entry or the order attachment record. Idempotency key for downstream lookups; read-only on this surface.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                id:
                    description:
                        Identifier of the attachment. Read-only; assigned by the server.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                priority:
                    description:
                        Sort weight used to order attachments within the order's attachment list; higher values are returned first. Read-only on this surface.
                    example: 1.2
                    format: double
                    readOnly: true
                    type: number
                restricted:
                    description:
                        When true the attachment is restricted to admin or supplier eyes only and is not exposed to the storefront buyer. Read-only.
                    example: false
                    readOnly: true
                    type: boolean
                title:
                    description:
                        Display title of the attachment. Falls back to the underlying file name when none is supplied. Read-only.
                    example: Invoice 30130
                    readOnly: true
                    type: string
                type:
                    description:
                        Free-form type code (for example, invoice, delivery-note) drawn from the configured commerce order attachment list type definition. Read-only.
                    example: invoice
                    readOnly: true
                    type: string
                typeLabel:
                    description:
                        Human-readable label resolved from the type code in the request locale. Read-only.
                    example: Invoice
                    readOnly: true
                    type: string
                url:
                    description:
                        Portal download URL for the attachment binary. Resolved server-side from the underlying document-library file; suitable for direct browser download by the buyer. Read-only.
                    example: https://example.com/documents/30130/AB-34098-789-N
                    readOnly: true
                    type: string
        AttachmentBase64:
            description:
                Input payload for the upload-by-base64 endpoints. The file body is supplied inline as Base64 in attachment; the server decodes and persists it as a new document-library file under the parent placed order.
            properties:
                attachment:
                    description:
                        Base64-encoded payload of the file to upload. Required; decoded server-side and stored as a new document-library file entry under the placed order.
                    example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==
                    type: string
                externalReferenceCode:
                    description:
                        Idempotency key for the upload; must be unique per attachment within the company. Stored on the underlying file entry when supplied.
                    example: AB-34098-789-N
                    type: string
                priority:
                    description:
                        Sort weight used to order attachments within the order's attachment list. Defaults to 0.0 when omitted.
                    example: 1.2
                    format: double
                    type: number
                restricted:
                    description:
                        When true the attachment is hidden from the storefront buyer view and only visible to admin or supplier users. Defaults to false.
                    example: false
                    type: boolean
                title:
                    description:
                        Display title applied to the new attachment. Falls back to the supplied file name when omitted.
                    example: Invoice 30130
                    type: string
                type:
                    description:
                        Free-form type code identifying the attachment category (for example, invoice, delivery-note); validated against the commerce order attachment list type definition when configured.
                    example: invoice
                    type: string
            type: object
        Error:
            description:
                Standard error envelope returned on non-2xx responses. Carries an HTTP status, an optional internal error code, a human-readable description, and the raw exception message.
            properties:
                errorCode:
                    description:
                        Internal error code mapping. Read-only; populated when the underlying exception is tagged with a numeric code.
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    description:
                        Human-readable explanation of the error, localized to the request locale when a translation exists. Read-only.
                    example: Unable to find currency. Currency code should be expressed with 3-letter ISO 4217 format.
                    readOnly: true
                    type: string
                message:
                    description:
                        Raw exception message returned by the underlying service. Read-only; intended for diagnostics rather than buyer-facing display.
                    example: No CommerceCurrency exists with the key {groupId=41811, code=US Dollar}
                    readOnly: true
                    type: string
                status:
                    description:
                        HTTP status code that accompanies the response. Read-only.
                    example: 404
                    readOnly: true
                    type: integer
            type: object
        OrderTransition:
            description:
                Workflow or storefront transition available to the buyer on a placed order (for example, cancel a pending order, process a quote, or reorder). Returned by the transition list endpoint and consumed by the POST transition endpoint to trigger the action.
            properties:
                comment:
                    description:
                        Optional buyer comment attached to the transition; persisted with the workflow task when a workflowTaskId is supplied.
                    example: Cancelling because the order was placed in error.
                    type: string
                label:
                    description:
                        Localized human-readable label for the transition, resolved from the transition name in the request locale. Read-only.
                    example: Cancel
                    readOnly: true
                    type: string
                name:
                    description:
                        Canonical name of the transition (for example, approve, cancel, process-quote, reorder). Supplied on POST to identify which transition to trigger.
                    example: process-quote
                    type: string
                orderId:
                    description:
                        Identifier of the new placed order produced by the transition (for example, the reorder transition creates a new draft order). Populated only when the transition spawns a successor order; read-only.
                    example: 30131
                    format: int64
                    readOnly: true
                    type: integer
                placedOrderId:
                    description:
                        Identifier of the placed order the transition targets. Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                workflowTaskId:
                    description:
                        Identifier of the workflow task assigned to the buyer (when the order is in a workflow). Supplied on POST to route the transition through the workflow engine; zero on transitions that bypass workflow (process-quote, reorder).
                    example: 0
                    format: int64
                    type: integer
        PlacedOrder:
            description:
                Buyer-facing projection of a committed (non-open) commerce order. Read via the placed-orders list or by id and ERC; PATCH applies JSON Merge Patch to a small set of buyer-editable fields (name, printedNote, purchaseOrderNumber). The open cart counterpart lives in headless-commerce-delivery-cart.
            properties:
                account:
                    description:
                        Display name of the buyer account that owns the order. Read-only.
                    example: Acme Corp.
                    readOnly: true
                    type: string
                accountId:
                    description:
                        Reference to the buyer account that owns the order (FK identifier). Read-only; sortable and filterable via the OData query parameter.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                attachments:
                    description:
                        Attachments uploaded against the order (for example, invoices, delivery notes). Resolved server-side from the document-library files linked to the order.
                    items:
                        $ref: "#/components/schemas/Attachment"
                    type: array
                author:
                    description:
                        Display name of the user that created the order. Read-only; sortable via the OData query parameter.
                    example: John
                    readOnly: true
                    type: string
                authorId:
                    description:
                        Reference to the user that created the order (FK identifier). Read-only; filterable via the OData query parameter.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                channelId:
                    description:
                        Reference to the commerce channel the order was placed on (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                couponCode:
                    description:
                        Coupon code applied at checkout. Read-only.
                    example: SUMMER10
                    readOnly: true
                    type: string
                createDate:
                    description:
                        Creation date of the order. ISO 8601 date. Read-only; sortable and filterable via the OData query parameter.
                    example: 2017-07-21
                    format: date-time
                    readOnly: true
                    type: string
                currencyCode:
                    description:
                        ISO 4217 currency code the order was priced in. Read-only.
                    example: USD
                    readOnly: true
                    type: string
                customFields:
                    additionalProperties: true
                    description:
                        Custom expando attributes attached to the order. On PATCH the supplied entries are merged into the order's expando bridge.
                    type: object
                errorMessages:
                    description:
                        Localized validation or fulfillment errors associated with the order (for example, a removed SKU, an expired price, a stock shortfall). Each entry is a human-readable sentence in the request locale. Read-only.
                    example:
                        -   The product is no longer available.
                    items:
                        type: string
                    readOnly: true
                    type: array
                externalReferenceCode:
                    description:
                        Idempotency key copied from the underlying commerce order. Used to address the order on the by-externalReferenceCode paths. Read-only; sortable and filterable via the OData query parameter.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                friendlyURLSeparator:
                    description:
                        Friendly-URL separator string configured for the order's company. Populated only when the friendly-URL feature flag is enabled. Read-only.
                    example: /-/
                    readOnly: true
                    type: string
                id:
                    description:
                        Identifier of the placed order. Read-only; assigned by the server.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                lastPriceUpdateDate:
                    description:
                        Date the order's pricing was last recalculated. ISO 8601 date. Read-only.
                    example: 2017-07-21
                    format: date-time
                    readOnly: true
                    type: string
                modifiedDate:
                    description:
                        Last modification date of the order. ISO 8601 date. Read-only; sortable and filterable via the OData query parameter.
                    example: 2017-07-21
                    format: date-time
                    readOnly: true
                    type: string
                name:
                    description:
                        Buyer-supplied name for the order. Editable via PATCH; sortable and filterable via the OData query parameter.
                    example: Order Name
                    type: string
                orderStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                orderType:
                    description:
                        Localized name of the commerce order type assigned to the order. Read-only; sortable and filterable via the OData query parameter.
                    example: Default
                    readOnly: true
                    type: string
                orderTypeExternalReferenceCode:
                    description:
                        External reference code of the commerce order type assigned to the order. Read-only; sortable via the OData query parameter.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                orderTypeId:
                    description:
                        Reference to the commerce order type assigned to the order (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                orderUUID:
                    description:
                        Stable UUID of the order, distinct from id and preserved across data migrations. Use this value when persisting a reference to the order in external systems. Read-only.
                    example: f0b1c2d3-4e5f-6a7b-8c9d-0e1f2a3b4c5d
                    readOnly: true
                    type: string
                paymentMethod:
                    description:
                        Payment method engine key selected at checkout (for example, money-order, paypal). Read-only.
                    example: money-order
                    readOnly: true
                    type: string
                paymentMethodLabel:
                    description:
                        Localized display name of the selected payment method group, resolved in the channel's site scope. Read-only.
                    example: Money Order
                    readOnly: true
                    type: string
                paymentStatus:
                    description:
                        Integer payment status. Mapping -- 0=Authorized, 6=Pending, 4=Completed, 5=Failed, 8=Cancelled, 17=Refunded, 23=Not Required. Read-only.
                    example: 0
                    format: int32
                    readOnly: true
                    type: integer
                paymentStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                paymentStatusLabel:
                    description:
                        Canonical label key for the payment status (for example, authorized, completed, pending, refunded, cancelled, failed, not-required). Read-only.
                    example: authorized
                    readOnly: true
                    type: string
                placedOrderBillingAddress:
                    $ref: "#/components/schemas/PlacedOrderAddress"
                    readOnly: true
                placedOrderBillingAddressId:
                    description:
                        Reference to the billing address used at checkout (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                placedOrderComments:
                    description:
                        Comments (notes) recorded against the order by the buyer or by support staff. Nested field; use the dedicated list endpoint for paginated access.
                    items:
                        $ref: "#/components/schemas/PlacedOrderComment"
                    readOnly: true
                    type: array
                placedOrderItems:
                    description:
                        Top-level line items on the order. Children of a parent item are exposed on the nested placedOrderItems property of PlacedOrderItem.
                    items:
                        $ref: "#/components/schemas/PlacedOrderItem"
                    readOnly: true
                    type: array
                placedOrderShippingAddress:
                    $ref: "#/components/schemas/PlacedOrderAddress"
                    readOnly: true
                placedOrderShippingAddressId:
                    description:
                        Reference to the shipping address used at checkout (FK identifier). Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                printedNote:
                    description:
                        Buyer-visible printed note (for example, gift message, packing instructions). Editable via PATCH.
                    example: Please include a gift receipt.
                    type: string
                purchaseOrderNumber:
                    description:
                        Buyer-supplied purchase order number for accounting and reconciliation. Editable via PATCH; sortable and filterable via the OData query parameter.
                    example: PO-2024-30130
                    type: string
                requestedDeliveryDate:
                    description:
                        Date the buyer requested the order to be delivered. ISO 8601 date. Read-only; sortable and filterable via the OData query parameter.
                    example: 2017-07-21
                    format: date-time
                    readOnly: true
                    type: string
                shipments:
                    $ref: "#/components/schemas/Shipment"
                    readOnly: true
                shippingMethod:
                    description:
                        Engine key of the shipping method selected at checkout (for example, fixed, by-weight). Read-only.
                    example: fixed
                    readOnly: true
                    type: string
                shippingOption:
                    description:
                        Name of the shipping option (carrier service tier) selected at checkout. Read-only.
                    example: Standard Delivery
                    readOnly: true
                    type: string
                status:
                    description:
                        Workflow status label resolved from the underlying integer status (for example, approved, pending). Read-only.
                    example: approved
                    readOnly: true
                    type: string
                steps:
                    description:
                        Ordered list of checkout steps with their state (active, completed, pending). Computed for the request locale; useful for rendering an order-progress breadcrumb on the storefront.
                    items:
                        $ref: "#/components/schemas/Step"
                    type: array
                summary:
                    $ref: "#/components/schemas/Summary"
                    readOnly: true
                useAsBilling:
                    description:
                        When true the shipping address is reused as the billing address. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                valid:
                    description:
                        When true the order passes every line-item and pricing validation. False indicates that one or more entries in errorMessages must be resolved before fulfillment. Read-only.
                    example: true
                    readOnly: true
                    type: boolean
                workflowStatusInfo:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
            type: object
        PlacedOrderAddress:
            description:
                Buyer-facing projection of the address snapshotted onto a placed order. Returned by the placed-order billing-address and shipping-address endpoints. Read-only.
            properties:
                city:
                    description:
                        City portion of the address. Read-only.
                    example: Diamond Bar
                    readOnly: true
                    type: string
                country:
                    description:
                        Localized country name resolved from the underlying Country in the request locale. Read-only.
                    example: United States
                    readOnly: true
                    type: string
                countryISOCode:
                    description:
                        ISO 3166-1 alpha-2 country code. Read-only.
                    example: US
                    readOnly: true
                    type: string
                description:
                    description:
                        Free-form description annotated on the address (for example, delivery instructions). Read-only.
                    example: right stairs, first room on the left
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        External reference code of the underlying commerce address. Read-only.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                id:
                    description:
                        Identifier of the underlying commerce address. Read-only.
                    example: 30130
                    format: int64
                    readOnly: true
                    type: integer
                latitude:
                    description:
                        Geographic latitude of the address. Read-only.
                    example: 33.9976884
                    format: double
                    readOnly: true
                    type: number
                longitude:
                    description:
                        Geographic longitude of the address. Read-only.
                    example: -117.8144595
                    format: double
                    readOnly: true
                    type: number
                name:
                    description:
                        Recipient name on the address. Read-only.
                    example: Alessio Antonio Rendina
                    readOnly: true
                    type: string
                phoneNumber:
                    description:
                        Contact phone number associated with the address. Read-only.
                    example: (123) 456 7890
                    readOnly: true
                    type: string
                region:
                    description:
                        Display name of the region (state, province) resolved from the underlying Region. Read-only.
                    example: California
                    readOnly: true
                    type: string
                regionISOCode:
                    description:
                        ISO 3166-2 subdivision code of the region. Empty when no region is set. Read-only.
                    example: CA
                    readOnly: true
                    type: string
                street1:
                    description:
                        First line of the street address. Read-only.
                    example: 1400 Montefino Ave
                    readOnly: true
                    type: string
                street2:
                    description:
                        Second line of the street address (for example, floor, suite). Read-only.
                    example: 1st floor
                    readOnly: true
                    type: string
                street3:
                    description:
                        Third line of the street address (for example, building, landmark). Read-only.
                    example: suite 200
                    readOnly: true
                    type: string
                subtype:
                    description:
                        Free-form subtype label drawn from the configured address subtype list (for example, home, office). Read-only.
                    example: office
                    readOnly: true
                    type: string
                type:
                    description:
                        Localized label of the address type (billing, shipping, billing-and-shipping). Read-only.
                    example: shipping
                    readOnly: true
                    type: string
                typeId:
                    description:
                        Integer type code of the address. Mapping -- 1=Billing, 2=Shipping, 3=Billing And Shipping. Read-only.
                    example: 2
                    format: int32
                    readOnly: true
                    type: integer
                vatNumber:
                    description:
                        VAT identifier captured on the underlying address. Read-only.
                    example: IT12345678901
                    readOnly: true
                    type: string
                zip:
                    description:
                        Postal or ZIP code. Read-only.
                    example: "91765"
                    readOnly: true
                    type: string
            type: object
        PlacedOrderComment:
            description:
                Note (comment) recorded against a placed order. Returned by the order comments list and the by-id and by-ERC read endpoints. Corresponds to the standard Liferay Commerce Order Note; the PlacedOrderComment name is preserved for client compatibility.
            properties:
                author:
                    description:
                        Display name of the user that authored the comment. Read-only.
                    example: John
