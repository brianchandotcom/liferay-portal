                        hr_HR: rucna-pila
                        hu_HU: kezi-furesz
                    readOnly: true
                    type: object
                quantity:
                    description:
                        Quantity ordered, formatted against the SKU's unit of measure. Read-only.
                    example: 10.1
                    format: bigdecimal
                    readOnly: true
                    type: number
                replacedSku:
                    description:
                        When the item's SKU was replaced after the order was committed, the SKU code of the replacement. Read-only.
                    example: SKU-5678
                    readOnly: true
                    type: string
                requestedDeliveryDate:
                    description:
                        Buyer-requested delivery date for the line item. ISO 8601 date. Read-only.
