liferay-releng-app-description=ດ້ວຍ Liferay Data Engine, ທ່ານສາມາດໃຊ້ APIs ລະດັບສູງເພື່ອປະກອບແອັບພລິເຄຊັນທຸລະກິດທີ່ຂະຫຍາຍຕົວໄດ້ ແລະ ຢືດຢຸ່ນຢ່າງວ່ອງໄວ. ໂດຍບໍ່ຕ້ອງຂຽນລະຫັດ persistence ຫຼື ຕັກກະທຸລະກິດທີ່ຊັບຊ້ອນ, ທ່ານສາມາດເອີ້ນໃຊ້ Data Engine APIs ເພື່ອສ້າງແອັບພລິເຄຊັນທັງໝົດໄດ້.<br /><br />Data Definition API ແມ່ນຫົວໃຈຫຼັກຂອງ Data Engine. ມັນຊ່ວຍໃຫ້ທ່ານ:<br />* ກຳນົດຟິວ (fields) ຂອງຄຳນິຍາມຂໍ້ມູນ.<br />* ປະຕິບັດການ CRUD ໃນຄຳນິຍາມຂໍ້ມູນ (Data Definitions).<br />* ກຳນົດກົດເກນການກວດສອບຄວາມຖືກຕ້ອງສຳລັບອົງປະກອບຂອງຄຳນິຍາມຂໍ້ມູນ.<br /><br />Data Record Collection API ເກັບກຳບັນທຶກຂໍ້ມູນທີ່ຮອງຮັບໂດຍຄຳນິຍາມຂໍ້ມູນ.<br />* ປະຕິບັດການ CRUD ໃນຊຸດສະສົມບັນທຶກຂໍ້ມູນ ແລະ ບັນທຶກຂໍ້ມູນຂອງພວກມັນ.<br /><br />Data Layouts API ຊ່ວຍໃຫ້ທ່ານເພີ່ມ ແລະ ແກ້ໄຂຮູບແບບການຈັດວາງຂໍ້ມູນເພື່ອຈັດຮູບແບບຟອມຂອງຄຳນິຍາມຂໍ້ມູນ.<br /><br />ເຄື່ອງມືສ້າງແອັບທີ່ຢືດຢຸ່ນແບບນີ້ຊ່ວຍໃຫ້ທຸລະກິດສະໄໝໃໝ່ສາມາດແຂ່ງຂັນໄດ້. ວິທີແກ້ໄຂດິຈິຕອນທີ່ປັບແຕ່ງສະເພາະບໍ່ໄດ້ສ້າງຂຶ້ນເອງ, ແຕ່ APIs ຂອງ Data Engine ເຮັດໃຫ້ການສ້າງແອັບພລິເຄຊັນໃໝ່ເປັນເລື່ອງງ່າຍ ແລະ ວ່ອງໄວ.