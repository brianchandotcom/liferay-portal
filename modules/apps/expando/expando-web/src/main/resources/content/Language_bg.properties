custom-field-hidden-help=Създаване на персонализирано поле да скрит означава, че никога не е показана на полето стойност във всеки потребителски интерфейс освен този. Това позволява на полето се използва за по-неясен и напреднали цели като действа като контейнер за разрешения по избор. (Automatic Translation)
custom-field-index-type-help=Създаване на персонализирано поле към търсене означава, че стойността на полето се индексира когато образуванието (като потребител) е променен. Само java.lang.String полета могат да бъдат направени за търсене. Обърнете внимание, че когато едно поле е ново търсене, трябва да бъдат актуализирани индексите преди данните са достъпни за търсене. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag. (Automatic Copy)
custom-field-secret-help=Настройка на персонализирано поле за тайна означава че пишете е скрит на екрана. Използвайте това за пароли. (Automatic Translation)
custom-field-visible-with-update-permission-help=Settings a custom field to visible with update permission means that a user with update permission can view this field. This setting overrides the value of hidden in this case. (Automatic Copy)
