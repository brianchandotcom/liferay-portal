custom-field-height-help=Ceci définit la hauteur de la zone de saisie en pixels. (Automatic Translation)
custom-field-hidden-help=Définissant un champ personnalisé à caché signifie que la valeur du champ n'est jamais montrée dans n'importe quelle interface utilisateur en dehors de celui-ci. Cela laisse le champ servir à des fins plus obscures et plus avancées comme agissant comme un espace réservé pour des autorisations personnalisées. (Automatic Translation)
custom-field-index-type-help=Définissant un champ personnalisé consultable signifie que la valeur du champ est indexée lorsque l'entité (par exemple par l'utilisateur) est modifiée. Seuls les champs java.lang.String peuvent être faits consultables. Que lorsqu'un champ est nouvellement fait consultable, les index doivent être mis à jour avant que les données sont disponibles à la recherche. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag.
custom-field-secret-help=Affecter un champ personnalisé secret signifie que ce typage est masqué à l'écran. Utiliser des mots de passe. (Automatic Translation)
custom-field-visible-with-update-permission-help=Signifie qu'un usager ayant les permissions de modification peut voir ce champs. Ce comportement remplace alors celui de la propriété "Caché".
custom-fields-are-not-enabled-for-any-resource=Des champs faits sur commande ne sont permis pour aucune ressource.
