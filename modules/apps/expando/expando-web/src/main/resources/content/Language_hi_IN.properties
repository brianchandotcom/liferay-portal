custom-field-display-type-help=किस प्रकार का नियंत्रण इस फ़ील्ड सेट करने के लिए उपयोग किया जाता है निर्दिष्ट करें। (Automatic Translation)
custom-field-height-help=यह इनपुट क्षेत्र की ऊंचाई पिक्सल में सेट करता है। (Automatic Translation)
custom-field-hidden-help=छिपा हुआ अर्थ है कि फ़ील्ड का मान कभी नहीं इस एक के अलावा किसी भी उपयोगकर्ता इंटरफ़ेस में दिखाया गया है के लिए एक कस्टम फ़ील्ड सेट करना। यह क्षेत्र जैसे कि कस्टम अनुमतियाँ के लिए एक प्लेसहोल्डर के रूप में अभिनय और अधिक अस्पष्ट और उन्नत प्रयोजनों के लिए इस्तेमाल किया जा करने देता है। (Automatic Translation)
custom-field-index-type-help=कोई कस्टम फ़ील्ड के लिए खोज सकने योग्य साधन सेटिंग है कि फ़ील्ड का मान अनुक्रमित है जब इकाई (जैसे उपयोगकर्ता) संशोधित किया गया है। केवल java.lang.String फ़ील्ड खोज सकने योग्य बनाया जा सकता है। ध्यान दें कि जब एक फ़ील्ड नव खोज सकने योग्य बनाया है, अनुक्रमित करने से पहले डेटा नवीनीकृत किया जाना चाहिए खोज करने के लिए उपलब्ध है। (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag.
custom-field-secret-help=उस टाइपिंग गुप्त साधन करने के लिए एक कस्टम फ़ील्ड सेटिंग स्क्रीन पर छिपा हुआ है। इस के लिए पासवर्ड का उपयोग करें। (Automatic Translation)
custom-field-visible-with-update-permission-help=एक कस्टम सेटिंग्स अद्यतन के साथ करने के लिए दृश्यमान फ़ील्ड की अनुमति का मतलब है कि एक उपयोगकर्ता अद्यतन की अनुमति के साथ इस फ़ील्ड को देख सकते हैं। इस सेटिंग का मान को ओवरराइड करता है इस मामले में छिपा हुआ। (Automatic Translation)
custom-fields-are-not-enabled-for-any-resource=किसी भी संसाधन के लिए कस्टम फील्ड्स सक्षम नहीं हैं.
enter-one-value-per-line=प्रति पंक्ति एक मान दर्ज करें। (Automatic Translation)
