custom-field-hidden-help=Menetapkan bidang kustom untuk tersembunyi berarti bahwa nilai dari lapangan tersebut tidak pernah ditampilkan di antarmuka pengguna selain satu ini. Hal ini memungkinkan bidang yang digunakan untuk tujuan yang lebih jelas dan canggih seperti bertindak sebagai pengganti untuk kustom perizinan. (Automatic Translation)
custom-field-index-type-help=Menetapkan bidang kustom untuk dicari berarti bahwa nilai dari field diindeks ketika entitas (seperti User) yang dimodifikasi. Hanya java.lang.String bidang dapat dibuat dicari. Perhatikan bahwa ketika sebuah field baru dibuat dicari, indeks harus diperbaharui sebelum data ini tersedia untuk mencari. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag.
custom-field-secret-help=Menetapkan bidang kustom cara rahasia mengetik yang tersembunyi pada layar. Gunakan ini untuk password. (Automatic Translation)
custom-field-visible-with-update-permission-help=Pengaturan a custom lapangan untuk terlihat dengan update izin berarti bahwa pengguna dengan izin update dapat melihat bidang ini. Pengaturan ini mengabaikan nilai tersembunyi dalam kasus ini. (Automatic Translation)
