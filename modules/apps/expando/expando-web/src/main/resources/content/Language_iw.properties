custom-field-index-type-help=הגדרת שדה מותאם אישית אמצעי לחיפוש הערך של השדה באינדקס כאשר הישות (כגון המשתמש) משתנה. רק java.lang.String שדות יכולים להתבצע ניתן לחיפוש. שים לב כי כאשר שדה שזה עתה נוצר ניתן לחיפוש, האינדקסים להתעדכן לפני הנתונים זמין לחיפוש. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag.
