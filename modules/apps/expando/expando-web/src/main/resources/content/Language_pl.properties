custom-field-display-type-help=Określ typ zarządzania używany do ustawiania tego pola.
custom-field-height-help=Ustawia wysokość pola wejściowego w pikselach. (Automatic Translation)
custom-field-hidden-help=Ustawienie niestandardowe pole ukryte oznacza, że wartość pola nie jest wyświetlana w każdy interfejs użytkownika, oprócz ten jeden. Dzięki temu pole używane do celów bardziej niejasne i zaawansowane jak działając jako symbol zastępczy dla uprawnienia niestandardowe. (Automatic Translation)
custom-field-index-type-help=Ustawienie pola niestandardowego do przeszukiwania oznacza wartość tego pola jest indeksowana, gdy podmiot (np. użytkownika) jest modyfikowany. Jedynie angielskim znajduje się tutaj pola mogą być wykonane do przeszukiwania. Należy pamiętać, że gdy pole jest nowo wykonane można przeszukiwać, indeksy muszą zostać zaktualizowane przed danych jest dostępna do wyszukiwania. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag.
custom-field-secret-help=Ustawienie niestandardowe pole tajemnicy oznacza że pisanie jest ukryty na ekranie. Za pomocą tego hasła. (Automatic Translation)
custom-field-visible-with-update-permission-help=Ustawianie pola użytkownika jako widoczne dla uprawnień do aktualizacji oznacza że użytkownik z uprawnieniami do aktualizacji będzie mógł oglądać to pole. To ustawienie nadpisuje wartość ukryte.
custom-fields-are-not-enabled-for-any-resource=Pola użytkownika nie są włączone dla żadnego zasobu.
