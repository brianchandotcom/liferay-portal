custom-field-display-type-help=Укажите, какой тип управляющего элемента используется для установки этого поля.
custom-field-height-help=Это устанавливает высоту поля ввода в пикселях. (Automatic Translation)
custom-field-hidden-help=Установка настраиваемого поля скрытый означает, что значение поля никогда не отображается в любом пользовательском интерфейсе помимо этот один. Это позволяет поле, используемое для более неясными и передовых целей, таких как действует как местозаполнитель для пользовательских разрешений. (Automatic Translation)
custom-field-index-type-help=Установка настраиваемого поля для поиска означает, что значение поля индексируется при изменении сущности (например, пользователя). Только java.lang.String поля могут быть сделаны для поиска. Обратите внимание, что при поле недавно производится поиск, индексы должны быть обновлены до данных доступен для поиска. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag.
custom-field-secret-help=Установка настраиваемого поля секретный означает, что ввод скрыт на экране. Используйте это для паролей. (Automatic Translation)
custom-field-visible-with-update-permission-help=Установка дополнительного поля как видимого с правами на изменение означает, что пользователь с правами на изменение может видеть это поле. Эта установка перекрывает значений атрибута "скрытый".
custom-fields-are-not-enabled-for-any-resource=Ни для одного ресурса нет дополнительных полей
enter-one-value-per-line=Введите по одному значению на каждой строке.
index-type=Тип индекса
