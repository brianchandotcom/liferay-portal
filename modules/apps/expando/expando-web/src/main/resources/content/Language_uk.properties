custom-field-hidden-help=Встановлення настроюване поле приховані означає, що значення поля ніколи не показано в певний інтерфейс користувача, крім того, це одне. Це дозволяє поле для більш неясними і передові цілей, таких як заповнювач для користувацькі дозволи. (Automatic Translation)
custom-field-index-type-help=Установивши настроюване поле для пошуку означає що значення поля буде проіндексовано, коли змінив сутностей (таких як користувача). Тільки java.lang.String поля можуть бути зроблені для пошуку. Зверніть увагу, що коли поле нещодавно зробив для пошуку, індекси потрібно оновити перед тим, як дані доступний для пошуку. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag. (Automatic Copy)
custom-field-secret-help=Встановлення настроюване поле Секретна засоби що ввівши приховано на екрані. Використовувати це для паролів. (Automatic Translation)
custom-field-visible-with-update-permission-help=Settings a custom field to visible with update permission means that a user with update permission can view this field. This setting overrides the value of hidden in this case. (Automatic Copy)
