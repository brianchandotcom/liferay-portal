custom-field-display-type-help=Hãy chọn loại của điều khiền sẽ được sử dụng để thiết lập cho trường này.
custom-field-height-help=Điều này bộ chiều cao của trường đầu vào trong pixel. (Automatic Translation)
custom-field-hidden-help=Thiết lập một lĩnh vực tùy chỉnh để ẩn có nghĩa là giá trị của trường không bao giờ được hiển thị trong giao diện người dùng bất kỳ bên cạnh việc này. Điều này cho phép lĩnh vực được sử dụng cho mục đích che khuất và tiên tiến hơn như đóng vai trò là một giữ chỗ cho phép tùy chỉnh. (Automatic Translation)
custom-field-index-type-help=Thiết lập một lĩnh vực tùy chỉnh để có thể tìm kiếm phương tiện mà giá trị của trường được lập chỉ mục khi các thực thể (chẳng hạn như người sử dụng) được sửa đổi. Chỉ java.lang.String lĩnh vực có thể được thực hiện tìm kiếm. Lưu ý rằng khi một trường vừa được thực hiện có thể tìm kiếm, các chỉ số phải được cập nhật trước khi các dữ liệu có sẵn để tìm kiếm. (Automatic Translation)
custom-field-key-help=The custom field key is used to access the field programatically through the &lt;liferay-ui:custom-attribute /&gt; tag.
custom-field-secret-help=Thiết lập một lĩnh vực tùy chỉnh để bí mật phương tiện đánh máy đó ẩn trên màn hình. Sử dụng cho mật khẩu. (Automatic Translation)
custom-field-visible-with-update-permission-help=Thiết lập <trường tùy biến> thành hiển thị thấy được khi bạn có quyền- có nghĩa là người dùng sẽ nhìn thấy giá trị thông tin này nếu có đủ quyền. Trong tình huống này, thiết lập sẽ ghi đè các giá trị ẩn.
custom-fields-are-not-enabled-for-any-resource=<Trường tùy biến> không được cho phép sử dụng với bất kỳ đối tượng tài nguyên nào .
enter-one-value-per-line=Nhập mỗi giá trị trên từng dòng.
