components:
    schemas:
        ExportPreview:
            properties:
                additionCount:
                    format: int64
                    readOnly: true
                    type: integer
                deletionCount:
                    format: int64
                    readOnly: true
                    type: integer
                previewPortletDataHandlerSections:
                    items:
                        $ref: "#/components/schemas/PreviewPortletDataHandlerSection"
                    readOnly: true
                    type: array
            type: object
        ExportProcess:
            properties:
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    format: date-time
                    readOnly: true
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    readOnly: true
                    type: string
                status:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
            type: object
        ExportProcessRequest:
            properties:
                deletions:
                    default: false
                    type: boolean
                endDate:
                    format: date-time
                    type: string
                last:
                    format: int32
                    type: integer
                name:
                    type: string
                permissions:
                    default: false
                    type: boolean
                range:
                    default: all
                    enum: [all, dateRange, last]
                    type: string
                requestPortletDataHandlers:
                    items:
                        $ref: "#/components/schemas/RequestPortletDataHandler"
                    type: array
                startDate:
                    format: date-time
                    type: string
            required:
                -   name
            type: object
        ImportPreview:
            properties:
                additionCount:
                    format: int64
                    readOnly: true
                    type: integer
                author:
                    readOnly: true
                    type: string
                deletionCount:
                    format: int64
                    readOnly: true
                    type: integer
                exportDate:
                    format: date-time
                    readOnly: true
                    type: string
                fileName:
                    readOnly: true
                    type: string
                fileSize:
                    format: int64
                    readOnly: true
                    type: integer
                previewPortletDataHandlerSections:
                    items:
                        $ref: "#/components/schemas/PreviewPortletDataHandlerSection"
                    readOnly: true
                    type: array
            type: object
        ImportProcess:
            properties:
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    description:
                        The import process's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The import process's last modification date.
                    format: date-time
                    readOnly: true
                    type: string
                id:
                    description:
                        The import process's ID.
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        The import process's name.
                    readOnly: true
                    type: string
                status:
                    $ref: "#/components/schemas/Status"
                    description:
                        The import process's end status.
                    readOnly: true
            type: object
        ImportProcessRequest:
            properties:
                dataStrategy:
                    default: MIRROR
                    enum: [MIRROR, MIRROR_OVERWRITE, COPY_AS_NEW]
                    type: string
                deletions:
                    default: false
                    type: boolean
                name:
                    type: string
                permissions:
                    default: false
                    type: boolean
                requestPortletDataHandlers:
                    items:
                        $ref: "#/components/schemas/RequestPortletDataHandler"
                    type: array
                userIdStrategy:
                    default: CURRENT_USER_ID
                    enum: [CURRENT_USER_ID, ALWAYS_CURRENT_USER_ID]
                    type: string
            type: object
        Origin:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
            type: object
        PreviewPortletDataHandler:
            properties:
                additionCount:
                    format: int64
                    readOnly: true
                    type: integer
                deletionCount:
                    format: int64
                    readOnly: true
                    type: integer
                description:
                    readOnly: true
                    type: string
                label:
                    readOnly: true
                    type: string
                name:
                    description:
                        The handler's portlet ID.
                    readOnly: true
                    type: string
                previewPortletDataHandlerControls:
                    items:
                        $ref: "#/components/schemas/PreviewPortletDataHandlerControl"
                    readOnly: true
                    type: array
                tag:
                    readOnly: true
                    type: string
            type: object
        PreviewPortletDataHandlerBoolean:
            allOf:
                -   $ref: "#/components/schemas/PreviewPortletDataHandlerControl"
                -   properties:
                        additionCount:
                            format: int64
                            readOnly: true
                            type: integer
                        defaultState:
                            readOnly: true
                            type: boolean
                        deletionCount:
                            format: int64
                            readOnly: true
                            type: integer
                        previewPortletDataHandlerControls:
                            items:
                                $ref: "#/components/schemas/PreviewPortletDataHandlerControl"
                            readOnly: true
                            type: array
            type: object
        PreviewPortletDataHandlerChoice:
            allOf:
                -   $ref: "#/components/schemas/PreviewPortletDataHandlerControl"
                -   properties:
                        choices:
                            items:
                                properties:
                                    label:
                                        readOnly: true
                                        type: string
                                    name:
                                        readOnly: true
                                        type: string
                                type: object
                            readOnly: true
                            type: array
                        defaultChoice:
                            readOnly: true
                            type: string
            type: object
        PreviewPortletDataHandlerControl:
            discriminator:
                mapping:
                    Boolean: "#/components/schemas/PreviewPortletDataHandlerBoolean"
                    Choice: "#/components/schemas/PreviewPortletDataHandlerChoice"
                    Setting: "#/components/schemas/PreviewPortletDataHandlerSetting"
                propertyName: type
            properties:
                disabled:
                    readOnly: true
                    type: boolean
                label:
                    readOnly: true
                    type: string
                name:
                    readOnly: true
                    type: string
                type:
                    enum: [Boolean, Choice, Setting]
                    readOnly: true
                    type: string
            required:
                -   type
            type: object
        PreviewPortletDataHandlerSection:
            properties:
                additionCount:
                    format: int64
                    readOnly: true
                    type: integer
                deletionCount:
                    format: int64
                    readOnly: true
                    type: integer
                label:
                    readOnly: true
                    type: string
                name:
                    readOnly: true
                    type: string
                previewPortletDataHandlers:
                    items:
                        $ref: "#/components/schemas/PreviewPortletDataHandler"
                    readOnly: true
                    type: array
            type: object
        PreviewPortletDataHandlerSetting:
            allOf:
                -   $ref: "#/components/schemas/PreviewPortletDataHandlerControl"
                -   properties:
                        defaultState:
                            readOnly: true
                            type: boolean
                        previewPortletDataHandlerControls:
                            items:
                                $ref: "#/components/schemas/PreviewPortletDataHandlerControl"
                            readOnly: true
                            type: array
            type: object
        ReportEntry:
            properties:
                classExternalReferenceCode:
                    description:
                        The reported item's external reference code.
                    readOnly: true
                    type:
                        string
                classNameId:
                    description:
                        The reported item's class name id.
                    format: int64
                    readOnly: true
                    type: integer
                classPK:
                    description:
                        The reported item's class primary key.
                    format: int64
                    readOnly: true
                    type: integer
                configurationId:
                    description:
                        The report entry's configuration ID.
                    format: int64
                    readOnly: true
                    type: integer
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    description:
                        The report entry's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The report entry's latest modification date.
                    format: date-time
                    readOnly: true
                    type: string
                errorMessage:
                    description:
                        The error message.
                    readOnly: true
                    type: string
                errorStacktrace:
                    description:
                        Optional field with the full stack trace of the error, can be embedded with nestedFields.
                    readOnly: true
                    type: string
                id:
                    description:
                        The report entry's ID.
                    format: int64
                    readOnly: true
                    type: integer
                modelName:
                    description:
                        The reported item's model name.
                    readOnly: true
                    type: string
                origin:
                    $ref: "#/components/schemas/Origin"
                    description:
                        The report entry's origin.
                    readOnly: true
                scope:
                    description:
                        The reported item's scope.
                    readOnly: true
                    type: scope
                status:
                    $ref: "#/components/schemas/Status"
                    description:
                        The report entry's 's status.
                    readOnly: true
                type:
                    $ref: "#/components/schemas/Type"
                    description:
                        The report entry's type.
                    readOnly: true
            type: object
        RequestPortletDataHandler:
            properties:
                name:
                    description:
                        The handler's portlet ID.
                    type: string
                requestPortletDataHandlerControls:
                    items:
                        $ref: "#/components/schemas/RequestPortletDataHandlerControl"
                    type: array
            type: object
        RequestPortletDataHandlerControl:
            properties:
                name:
                    type: string
                requestPortletDataHandlerControls:
                    items:
                        $ref: "#/components/schemas/RequestPortletDataHandlerControl"
                    type: array
                values:
                    items:
                        type: string
                    type: array
            type: object
        Status:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
        Type:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
            type: object
