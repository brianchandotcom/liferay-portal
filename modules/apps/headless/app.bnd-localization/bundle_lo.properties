liferay-releng-app-description=ແອັບ Liferay REST APIs ນຳສະເໜີ RESTful APIs ຮູບແບບໃໝ່ທີ່ເຮັດວຽກຮ່ວມກັບບໍລິການຂອງ Liferay. APIs ເຫຼົ່ານີ້ຊ່ວຍໃຫ້ຜູ້ພັດທະນາໃຊ້ບໍລິການຂອງ Liferay ໄດ້ຢ່າງງ່າຍດາຍ ແລະ ຢືດຢຸ່ນ. ຕົວຢ່າງ: ຜູ້ພັດທະນາສາມາດໃຊ້ຊັບພະຍາກອນຂອງພໍທັລ ເຊັ່ນ ເອກະສານ, ບລັອກ ຫຼື ເນື້ອຫາທີ່ມີໂຄງສ້າງ ຜ່ານ RESTful APIs ຢ່າງເຕັມຮູບແບບທີ່ຮອງຮັບຮູບແບບການຕອບສະໜອງຫຼາຍຢ່າງເຊັ່ນ JSON ຫຼື XML. <br /><br />ແອັບນີ້ບໍ່ມີສ່ວນການສະແດງຜົນໃນພໍທັລ. ຫຼັງຈາກຕິດຕັ້ງແລ້ວ, ທ່ານສາມາດເລີ່ມເຂົ້າເຖິງ APIs ໄດ້ຕາມ URLs ທີ່ກ່ຽວຂ້ອງ ເຊິ່ງທ່ານສາມາດກວດສອບໄດ້ຜ່ານ http://[host]:[port]/o/api.