components:
    schemas:
        Country:
            properties:
                a2:
                    pattern: "[A-Z]{2}"
                    type: string
                a3:
                    pattern: "[A-Z]{3}"
                    type: string
                active:
                    default: true
                    type: boolean
                billingAllowed:
                    default: true
                    type: boolean
                creator:
                    $ref: "#/components/schemas/Creator"
                    description:
                        The user who created the country.
                    readOnly: true
                dateCreated:
                    description:
                        The country's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The country's most recent modification date.
                    format: date-time
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        The country's external reference code.
                    example: AB-34098-789-N
                    type: string
                groupFilterEnabled:
                    default: false
                    type: boolean
                id:
                    format: int64
                    readOnly: true
                    type: integer
                idd:
                    type: integer
                name:
                    type: string
                number:
                    type: integer
                position:
                    default: 0.0
                    format: double
                    type: number
                regions:
                    items:
                        $ref: "#/components/schemas/Region"
                    type: array
                shippingAllowed:
                    default: true
                    type: boolean
                subjectToVAT:
                    default: false
                    type: boolean
                title_i18n:
                    additionalProperties:
                        type: string
                    type: object
                zipRequired:
                    default: true
                    type: boolean
            required:
                -   a2
                -   a3
                -   name
                -   number
            type: object
        Creator:
            description:
                Represents the user who created/authored the content. Properties follow the
                [creator](https://schema.org/creator) specification.
            properties:
                additionalName:
                    description:
                        The user's additional name, which can be used as a middle name.
                    readOnly: true
                    type: string
                contentType:
                    description:
                        The type of the content.
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        The user's external reference code.
                    example: AB-34098-789-N
                    readOnly: true
                    type: string
                familyName:
                    description:
                        The user's surname (last name).
                    readOnly: true
                    type: string
                givenName:
                    description:
                        The user's first name.
                    readOnly: true
                    type: string
                id:
                    description:
                        The user's ID.
                    format: int64
                    readOnly: true
                    type: integer
                image:
                    description:
                        A relative URL to the user's profile image.
                    format: uri
                    readOnly: true
                    type: string
                name:
                    description:
                        The user's full name.
                    readOnly: true
                    type: string
                profileURL:
                    description:
                        A relative URL to the user's profile.
                    format: uri
                    readOnly: true
                    type: string
            type: object
        Region:
            properties:
                active:
                    default: true
                    type: boolean
                countryId:
                    format: int64
                    type: integer
                creator:
                    $ref: "#/components/schemas/Creator"
                    description:
                        The user who created the region.
                    readOnly: true
                dateCreated:
                    description:
                        The region's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The region's most recent modification date.
                    format: date-time
                    readOnly: true
                    type: string
                externalReferenceCode:
                    description:
                        The region's external reference code.
                    example: AB-34098-789-N
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    type: string
                position:
                    default: 0.0
                    format: double
                    type: number
                regionCode:
                    type: string
                title_i18n:
                    additionalProperties:
                        type: string
                    type: object
            required:
                -   regionCode
                -   name
