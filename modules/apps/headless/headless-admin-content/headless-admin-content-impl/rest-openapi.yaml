components:
    schemas:
        Status:
            # @review
            description:
                Represents the status of a resource
            properties:
                code:
                    # @review
                    description:
                        A number which identifies a specific status
                    format: int32
                    readOnly: true
                    type: integer
                label:
                    # @review
                    description:
                        Label associated to the status
                    readOnly: true
                    type: string
                label_i18n:
                    additionalProperties:
                        type: string
                    readOnly: true
                    type: object
        VersionInformation:
            properties:
                status:
                    allOf:
                        - $ref: "#/components/schemas/Status"
                    # @review
                    description:
                        Represents the status of a resource
                    readOnly: true
                versionNumber:
                    # @review
                    description:
                        The version of a resource
                    format: double
                    readOnly: true
                    type: number
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.headless.admin.content.client', and version '2.0.0'."
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: "Headless Admin Content"
    version: v1.0
openapi: 3.0.1
paths:
    "/sites/{siteId}/page-definitions/preview":
        # @review
        post:
            description:
                Renders and retrieves HTML for the page definition using the theme of specified site.
            parameters:
                - in: path
                  name: siteId
                  required: true
                  schema:
                      format: int64
                      type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "../../headless-delivery/headless-delivery-impl/rest-openapi.yaml#PageDefinition"
                    application/xml:
                        schema:
                            $ref: "../../headless-delivery/headless-delivery-impl/rest-openapi.yaml#PageDefinition"
            responses:
                200:
                    content:
                        text/html:
                            schema:
                                type: string
                    description:
                        ""
            tags: ["PageDefinition"]
    "/sites/{siteId}/structured-contents":
        get:
            # @review
            description:
                Retrieves the site's structured contents latest version. Results can be paginated, filtered, searched,
                flattened, and sorted.
            operationId: getSiteStructuredContentsVersionInformationPage
            parameters:
                - in: path
                  name: siteId
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: query
                  name: aggregationTerms
                  schema:
                      items:
                          type: string
                      type: array
                - in: query
                  name: flatten
                  schema:
                      type: boolean
                - in: query
                  name: filter
                  schema:
                      type: string
                - in: query
                  name: page
                  schema:
                      type: integer
                - in: query
                  name: pageSize
                  schema:
                      type: integer
                - in: query
                  name: search
                  schema:
                      type: string
                - in: query
                  name: sort
                  schema:
                      type: string
                - in: header
                  name: Accept-Language
                  schema:
                      type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "../../headless-delivery/headless-delivery-impl/rest-openapi.yaml#StructuredContent"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "../../headless-delivery/headless-delivery-impl/rest-openapi.yaml#StructuredContent"
                                type: array
                    description:
                        ""
            tags: ["StructuredContent"]