components:
    schemas:
        Fragment:
            description:
                A fragment entry.
            properties:
                cacheable:
                    description:
                        A flag that indicates whether the fragment output is cacheable.
                    type: boolean
                creator:
                    $ref: ../../headless-admin-user/headless-admin-user-impl/rest-openapi.yaml#Creator
                    description:
                        The fragment's creator.
                    readOnly: true
                dateCreated:
                    description:
                        The fragment's creation date.
                    format: date-time
                    type: string
                dateModified:
                    description:
                        The last time the fragment changed.
                    format: date-time
                    type: string
                externalReferenceCode:
                    description:
                        The fragment's external reference code.
                    type: string
                fragmentSet:
                    $ref: "#/components/schemas/FragmentSet"
                    description:
                        The fragment's set.
                fragmentVersions:
                    description:
                        The fragment's versions. A fragment can have up to 2 versions, one draft and one published (approved).
                    items:
                        $ref: "#/components/schemas/FragmentVersion"
                    type: array
                icon:
                    description:
                        The fragment's icon identifier.
                    type: string
                key:
                    description:
                        The fragment's unique key within the group.
                    type: string
                marketplace:
                    description:
                        A flag that indicates whether the fragment is from the marketplace.
                    type: boolean
                name:
                    description:
                        The fragment's name.
                    type: string
                readOnly:
                    description:
                        A flag that indicates whether the fragment is read-only.
                    type: boolean
                thumbnailURLReference:
                    $ref: ../../headless-admin-site/headless-admin-site-impl/rest-openapi.yaml#ThumbnailURLReference
                    description:
                        The fragment's thumbnail. On read, returned only when `nestedFields=thumbnailURLReference` is requested. On POST or PUT, omitting `thumbnailURLReference` clears any previously bound preview.
                type:
                    description:
                        The fragment's type.
                    enum: [Component]
                    type: string
            type: object
        FragmentSet:
            description:
                A fragment set (also known as fragment collection).
            properties:
                creator:
                    $ref: ../../headless-admin-user/headless-admin-user-impl/rest-openapi.yaml#Creator
                    description:
                        The fragment set's creator.
                    readOnly: true
                dateCreated:
                    description:
                        The fragment set's creation date.
                    format: date-time
                    type: string
                dateModified:
                    description:
                        The last time the fragment set changed.
                    format: date-time
                    type: string
                description:
                    description:
                        The fragment set's description.
                    type: string
                externalReferenceCode:
                    description:
                        The fragment set's external reference code.
                    type: string
                key:
                    description:
                        The fragment set's key.
                    type: string
                marketplace:
                    description:
                        A flag that indicates whether the fragment set is from the marketplace.
                    type: boolean
                name:
                    description:
                        The fragment set's name.
                    type: string
            type: object
        FragmentVersion:
            description:
                A version of a fragment (draft or published).
            properties:
                configuration:
                    description:
                        The fragment version's JSON configuration.
                    type: string
                css:
                    description:
                        The fragment version's CSS code.
                    type: string
                html:
                    description:
                        The fragment version's HTML code.
                    type: string
                js:
                    description:
                        The fragment version's JavaScript code.
                    type: string
                status:
                    description:
                        The fragment version's status (Approved or Draft).
                    enum: [Approved, Draft]
                    type: string
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.headless.admin.fragment.client', and version '1.0.3'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Headless Admin Fragment API
    version: v1.0
openapi: 3.0.1
paths:
    "/sites/{siteExternalReferenceCode}/fragment-sets":
        get:
            description:
                Retrieves the fragment sets of the site.
            operationId: getSiteFragmentSetsPage
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: filter
                    schema:
                        type: string
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/FragmentSet"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/FragmentSet"
                                type: array
            tags: ["FragmentSet"]
        post:
            description:
                Adds a new fragment set.
            operationId: postSiteFragmentSet
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
