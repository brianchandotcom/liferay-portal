components:
    schemas:
        FragmentSet:
            description:
                A fragment set (also known as fragment collection).
            properties:
                creator:
                    $ref: ../../headless-admin-user/headless-admin-user-impl/rest-openapi.yaml#Creator
                    description:
                        The fragment set's creator.
                    readOnly: true
                dateCreated:
                    description:
                        The fragment set's creation date.
                    format: date-time
                    type: string
                dateModified:
                    description:
                        The last time the fragment set changed.
                    format: date-time
                    type: string
                description:
                    description:
                        The fragment set's description.
                    type: string
                externalReferenceCode:
                    description:
                        The fragment set's external reference code.
                    type: string
                key:
                    description:
                        The fragment set's key.
                    type: string
                marketplace:
                    description:
                        A flag that indicates whether the fragment set is from the marketplace.
                    type: boolean
                name:
                    description:
                        The fragment set's name.
                    type: string
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.headless.admin.fragment.client', and version '1.0.0'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Headless Admin Fragment API
    version: v1.0
openapi: 3.0.1
paths:
    "/sites/{siteExternalReferenceCode}/fragment-sets":
        get:
            description:
                Retrieves the fragment sets of the site.
            operationId: getSiteFragmentSetsPage
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/FragmentSet"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/FragmentSet"
                                type: array
            tags: ["FragmentSet"]
        post:
            description:
                Adds a new fragment set.
            operationId: postSiteFragmentSet
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/FragmentSet"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/FragmentSet"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FragmentSet"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/FragmentSet"
            tags: ["FragmentSet"]
    "/sites/{siteExternalReferenceCode}/fragment-sets/{fragmentSetExternalReferenceCode}":
        delete:
            description:
                Deletes a specific fragment set of a site.
            operationId: deleteSiteFragmentSet
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: path
                    name: fragmentSetExternalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["FragmentSet"]
        get:
            description:
                Retrieves a specific fragment set of a site.
            operationId: getSiteFragmentSet
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: path
                    name: fragmentSetExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FragmentSet"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/FragmentSet"
            tags: ["FragmentSet"]
        put:
            description:
                Updates the fragment set with the given external reference code, or creates it if it does not exist.
            operationId: putSiteFragmentSet
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: path
                    name: fragmentSetExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/FragmentSet"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/FragmentSet"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/FragmentSet"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/FragmentSet"
            tags: ["FragmentSet"]