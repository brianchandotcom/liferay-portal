components:
  schemas:
    BlogPosting:
      description: 'https://www.schema.org/BlogPosting'
      properties:
        alternativeHeadline:
          type: string
        articleBody:
          type: string
        blogPosts:
          allOf:
            - $ref: ../../headless-person/headless-person-impl/openapi.yaml/components/schemas/ContentSpace
            - type: number
        caption:
          type: string
        dateCreated:
          format: date
          type: string
        dateModified:
          format: date
          type: string
        datePublished:
          format: date
          type: string
        description:
          type: string
        encodingFormat:
          type: string
        friendlyUrlPath:
          type: string
        headline:
          type: string
        keywords:
          items:
            type: string
          type: array
      type: object
    BlogPostingCollection:
      properties:
        collection:
          $ref: '#/components/schemas/BlogPostingCollection'
        elements:
          items:
            $ref: '#/components/schemas/BlogPosting'
          type: array
        numberOfItems:
          format: int
          type: number
        pages:
          properties:
            first:
              $ref: '#/components/schemas/BlogPostingCollection'
            last:
              $ref: '#/components/schemas/BlogPostingCollection'
            next:
              $ref: '#/components/schemas/BlogPostingCollection'
          type: object
        self:
          $ref: '#/components/schemas/BlogPostingCollection'
        totalNumberOfItems:
          format: int
          type: number
      type: object
info:
  description: Description
  title: Title
  version: '1.0.0'
openapi: '3.0.1'
paths:
  '/blog-posting/{id}':
    delete:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        204:
          content:
            '*/*': {}
          description: description
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BlogPosting'
          description: description
    put:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          '*/*':
            schema:
              properties:
                alternativeHeadline:
                  type: string
                articleBody:
                  type: string
                caption:
                  type: string
                dateCreated:
                  format: date
                  type: string
                dateModified:
                  format: date
                  type: string
                datePublished:
                  format: date
                  type: string
                description:
                  type: string
                friendlyUrlPath:
                  type: string
                headline:
                  type: string
                keywords:
                  items:
                    type: string
                  type: array
              type: object
      responses:
        200:
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BlogPosting'
          description: description
  '/content-space/{parent-id}/blog-posting':
    get:
      parameters:
        - in: query
          name: page
          schema:
            format: int
            type: number
        - in: query
          name: per_page
          schema:
            format: int
            type: number
        - in: path
          name: parent-id
          required: true
          schema:
            type: string
      responses:
        200:
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BlogPostingCollection'
          description: description
    post:
      parameters:
        - in: path
          name: parent-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          '*/*':
            schema:
              properties:
                alternativeHeadline:
                  type: string
                articleBody:
                  type: string
                caption:
                  type: string
                dateCreated:
                  format: date
                  type: string
                dateModified:
                  format: date
                  type: string
                datePublished:
                  format: date
                  type: string
                description:
                  type: string
                friendlyUrlPath:
                  type: string
                headline:
                  type: string
                keywords:
                  items:
                    type: string
                  type: array
              type: object
      responses:
        200:
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BlogPosting'
          description: description