components:
    schemas:
        TaskStatistics:
            properties:
                blockedCount:
                    format: int64
                    type: integer
                inProgressCount:
                    format: int64
                    type: integer
                overdueCount:
                    format: int64
                    type: integer
                totalCount:
                    format: int64
                    type: integer
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/projects/{projectId}/task-statistics":
        get:
            operationId: getProjectTaskStatistics
            parameters:
                -   in: path
                    name: projectId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: filter
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
            tags: ["TaskStatistics"]
    "/task-statistics":
        get:
            operationId: getTaskStatistics
            parameters:
                -   in: query
                    name: filter
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
            tags: ["TaskStatistics"]