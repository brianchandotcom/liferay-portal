components:
    schemas:
        AssetPermissionAction:
            discriminator:
                mapping:
                    ResetAssetPermissionAction: "#/components/schemas/ResetAssetPermissionAction"
                propertyName: type
            properties:
                className:
                    type: string
                classPK:
                    format: int64
                    type: integer
                type:
                    enum:
                        -   ResetAssetPermissionAction
                    type: string
        AssetStatistics:
            properties:
                expiredCount:
                    format: int64
                    readOnly: true
                    type: integer
                expiringSoonCount:
                    format: int64
                    readOnly: true
                    type: integer
                inDraftCount:
                    format: int64
                    readOnly: true
                    type: integer
                reviewDateOverdueCount:
                    format: int64
                    readOnly: true
                    type: integer
                totalCount:
                    format: int64
                    readOnly: true
                    type: integer
        AssetUsage:
            properties:
                name:
                    type: string
                type:
                    type: string
                url:
                    type: string
        ResetAssetPermissionAction:
            allOf:
                -   $ref: "#/components/schemas/AssetPermissionAction"
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/asset-permission":
        post:
            description:
                Perform an action on the asset's permissions
            operationId: postAssetPermission
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AssetPermissionAction"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/AssetPermissionAction"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AssetPermissionAction"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AssetPermissionAction"
            tags: ["AssetPermissionAction"]
    "/asset-statistics":
        get:
            operationId: getAssetStatistics
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AssetStatistics"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AssetStatistics"
            tags: ["AssetStatistics"]
    "/asset-usages/{assetId}":
        get:
            operationId: getAssetUsagesAssetPage
            parameters:
                -   in: path
                    name: assetId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: search
                    schema:
                        type: string
                -   in: query
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AssetUsage"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AssetUsage"
                                type: array
            tags: ["AssetUsage"]