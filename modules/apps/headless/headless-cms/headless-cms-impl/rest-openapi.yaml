components:
    schemas:
        BulkAction:
            discriminator:
                mapping:
                    DeleteAction: "#/components/schemas/DeleteAction"
                    KeywordAction: "#/components/schemas/TagAction"
                    MoveAction: "#/components/schemas/MoveAction"
                    PermissionAction: "#/components/schemas/PermissionAction"
                    StatusAction: "#/components/schemas/StatusAction"
                    TaxonomyCategoryAction: "#/components/schemas/CategoryAction"
                propertyName: type
            properties:
                action:
                    enum:
                        -   DeleteAction
                        -   KeywordAction
                        -   MoveAction
                        -   PermissionAction
                        -   StatusAction
                        -   TaxonomyCategoryAction
                    type: string
                selectAll:
                    type: boolean
                selections:
                    items:
                        $ref: "#/components/schemas/Selection"
                    type: array
        DeleteAction:
            allOf:
                -   $ref: "#/components/schemas/BulkAction"
        KeywordBulkAction:
            allOf:
                -   $ref: "#/components/schemas/BulkAction"
                -   properties:
                        keywords:
                            items:
                                type: string
                            type: array
        MoveAction:
            allOf:
                -   $ref: "#/components/schemas/BulkAction"
                -   properties:
                        objectEntryFolderId:
                            description:
                                The object entry folder's ID.
                            format: int64
                            type: integer
        PermissionAction:
            allOf:
                -   $ref: "#/components/schemas/BulkAction"
                -   properties:
                        permissions:
                            items:
                                type: permission
                            type: array
        Selection:
            properties:
                id:
                    format: int64
                    type: integer
                modelClassName:
                    type: string
        StatusAction:
            allOf:
                -   $ref: "#/components/schemas/BulkAction"
                -   properties:
                        status:
                            format: int32
                            type: integer
        TaskReport:
            properties:
                action:
                    type: string
                author:
                    type: string
                dateCompletion:
                    format: date-time
                    type: string
                dateCreated:
                    format: date-time
                    type: string
                externalReferenceCode:
                    type: string
                id:
                    format: int64
                    type: integer
                numberOfItems:
                    type: integer
                result:
                    type: string
                type:
                    type: string
        TaxonomyCategoryBulkAction:
            allOf:
                -   $ref: "#/components/schemas/BulkAction"
                -   properties:
                        taxonomyCategoryIds:
                            items:
                                format: int64
                                type: integer
                            type: array
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/bulk-action":
        post:
            description:
                Execute a bulk action
            parameters:
                -   in: query
                    name: filter
                    required: false
                    schema:
                        type: string
                -   in: query
                    name: search
                    required: false
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/BulkAction"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/BulkAction"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TaskReport"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TaskReport"
            tags: ["BulkAction"]