components:
    schemas:
        StyleBook:
            description:
                Represents a style book entry in a design library.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            description:
                                The action's properties.
                            type: string
                        description:
                            The action's name.
                        type: object
                    description:
                        The actions and their permissions for this style book.
                    readOnly: true
                    type: object
                creator:
                    $ref: ../../headless-admin-user/headless-admin-user-impl/rest-openapi.yaml#Creator
                    description:
                        The style book's creator.
                    readOnly: true
                dateCreated:
                    description:
                        The style book's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The last time the style book changed.
                    format: date-time
                    readOnly: true
                    type: string
                defaultStyleBook:
                    description:
                        A flag to indicate whether this is the default style book for the specified theme.
                    readOnly: true
                    type: boolean
                externalReferenceCode:
                    description:
                        The style book's external reference code.
                    readOnly: true
                    type: string
                frontendTokensValues:
                    description:
                        The style book's tokens values.
                    readOnly: true
                    type: string
                id:
                    description:
                        The style book's ID.
                    format: int64
                    readOnly: true
                    type: integer
                key:
                    description:
                        The style book's key.
                    readOnly: true
                    type: string
                name:
                    description:
                        The style book's name.
                    readOnly: true
                    type: string
                previewFileEntryExternalReferenceCode:
                    description:
                        The style book's preview file entry external reference code.
                    readOnly: true
                    type: string
                themeId:
                    description:
                        The theme id or the themeCSS client extension external reference code this style book is based on.
                    readOnly: true
                    type: string
            type: object
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Headless Design Library
    version: v1.0
openapi: 3.0.1
paths:
    "/asset-libraries/{assetLibraryExternalReferenceCode}/style-books":
        get:
            description:
                Retrieves the style books of the asset library.
            operationId: getAssetLibraryStyleBooksPage
            parameters:
                -   in: path
                    name: assetLibraryExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: aggregationTerms
                    schema:
                        items:
                            type: string
                        type: array
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: filter
                    schema:
                        type: string
                -   in: query
                    name: nestedFields
                    schema:
                        type: string
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
                -   in: query
                    name: search
                    schema:
                        type: string
                -   in: query
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/StyleBook"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/StyleBook"
                                type: array
            tags: ["StyleBook"]
    "/asset-libraries/{assetLibraryExternalReferenceCode}/style-books/{styleBookExternalReferenceCode}":
        delete:
            description:
                Deletes a specific style book of an asset library.
            operationId: deleteAssetLibraryStyleBook
            parameters:
                -   in: path
                    name: assetLibraryExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: path
                    name: styleBookExternalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["StyleBook"]
        get:
            description:
                Retrieves a specific style book of an asset library.
            operationId: getAssetLibraryStyleBook
            parameters:
                -   in: path
                    name: assetLibraryExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: path
                    name: styleBookExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: nestedFields
                    schema:
                        type: string
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StyleBook"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/StyleBook"
            tags: ["StyleBook"]