components:
    schemas:
        AggregateRating:
            description: https://www.schema.org/AggregateRating
            properties:
                bestRating:
                    #@review
                    description: "The highest rating"
                    type: number
                ratingCount:
                    #@review
                    description: "The number of ratings"
                    type: number
                ratingValue:
                    #@review
                    description: "The average of the ratings"
                    type: number
                worstRating:
                    #@review
                    description: "The lowest rating"
                    type: number
            type: object
        Comment:
            description: https://www.schema.org/Comment
            properties:
                creator:
                    #@review
                    $ref: "#/components/schemas/Creator"
                    description: "Adds a comment to a structured content"
                    readOnly: true
                dateCreated:
                    #@review
                    description: "The creation date"
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    #@review
                    description: "The date of the last modification"
                    format: date-time
                    readOnly: true
                    type: string
                hasComments:
                    #@review
                    description: "Whether or not this comment has child comments"
                    readOnly: true
                    type: boolean
                id:
                    #@review
                    description: "The comment's ID"
                    format: int64
                    readOnly: true
                    type: integer
                text:
                    #@review
                    description: "The comment's body"
                    type: string
            type: object
        ContentDocument:
            description: https://www.schema.org/ContentDocument
            properties:
                contentUrl:
                    #@review
                    description: "The url to download the contents of the document"
                    format: uri
                    type: string
                encodingFormat:
                    #@review
                    description: "The encoding format"
                    type: string
                fileExtension:
                    #@review
                    description: "The document's file extension"
                    type: string
                id:
                    #@review
                    description: "The document's ID"
                    format: int64
                    type: integer
                sizeInBytes:
                    #@review
                    description: "The document's size in bytes"
                    type: number
                title:
                    #@review
                    description: "The document's title"
                    type: string
            type: object
        ContentField:
            description: https://www.schema.org/ContentField
            properties:
                dataType:
                    #@review
                    description: "The field's data type. In some cases extra information is available in the inputControl property"
                    type: string
                inputControl:
                    #@review
                    description: "The field's input control. Additional information need to add extra context to the data type. Not always present"
                    type: string
                label:
                    #@review
                    description: "The human readable label of the field"
                    type: string
                name:
                    #@review
                    description: "The internal name of the field"
                    type: string
                nestedFields:
                    #@review
                    description: "The content field's nested fields"
                    items:
                        $ref: "#/components/schemas/ContentField"
                    type: array
                repeatable:
                    #@review
                    description: "Whether or not the field is repeatable"
                    type: boolean
                value:
                    #@review
                    description: "The value of the field"
                    properties:
                        data:
                            type: string
                        document:
                            allOf:
                                - $ref: "#/components/schemas/ContentDocument"
                            readOnly: true
                        documentId:
                            format: int64
                            type: integer
                            writeOnly: true
                        geo:
                            description: https://www.schema.org/GeoCoordinates
                            properties:
                                id:
                                    format: int64
                                    type: integer
                                latitude:
                                    type: number
                                longitude:
                                    type: number
                            type: object
                        image:
                            allOf:
                                - $ref: "#/components/schemas/StructuredContentImage"
                            readOnly: true
                        link:
                            format: uri
                            type: string
                        structuredContentId:
                            format: int64
                            type: integer
                            writeOnly: true
                        structuredContentLink:
                            properties:
                                id:
                                    format: int64
                                    type: integer
                                title:
                                    type: string
                            type: object
                    type: object
        ContentStructure:
            description: https://www.schema.org/ContentStructure
            properties:
                availableLanguages:
                    #@review
                    description: "The content structure's available translations"
                    items:
                        type: string
                    readOnly: true
                    type: array
                contentSpace:
                    #@review
                    description: "The content space ID where the content structure is stored"
                    format: int64
                    readOnly: true
                    type: integer
                contentStructureFields:
                    #@review
                    description: "The content structure's fields"
                    items:
                        $ref: "#/components/schemas/ContentStructureField"
                    readOnly: true
                    type: array
                creator:
                    #@review
                    $ref: "#/components/schemas/Creator"
                    description: "The content structure's creator"
                    readOnly: true
                dateCreated:
                    #@review
                    description: "The creation date"
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    #@review
                    description: "The date of the last modification"
                    format: date-time
                    readOnly: true
                    type: string
                description:
                    #@review
                    description: "The content structure's description"
                    readOnly: true
                    type: string
                id:
                    #@review
                    description: "The content structure's ID"
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    #@review
                    description: "The content structure's name"
                    readOnly: true
                    type: string
            type: object
        ContentStructureField:
            description: https://www.schema.org/ContentStructureField
            properties:
                dataType:
                    #@review
                    description: "The field's data type. In some cases extra information is available in the inputControl property"
                    readOnly: true
                    type: string
                inputControl:
                    #@review
                    description: "Not always present. The field's input control.
                        Additional information needed to add extra context to the data type"
                    readOnly: true
                    type: string
                label:
                    #@review
                    description: "The human readable label of the field"
                    readOnly: true
                    type: string
                localizable:
                    #@review
                    description: "Whether or not the field is localizable"
                    readOnly: true
                    type: boolean
                multiple:
                    #@review
                    description: "Whether or not the field is multiple"
                    readOnly: true
                    type: boolean
                name:
                    #@review
                    description: "The field's name"
                    readOnly: true
                    type: string
                nestedContentStructureFields:
                    #@review
                    description: "The field's nested fields"
                    items:
                        $ref: "#/components/schemas/ContentStructureField"
                    readOnly: true
                    type: array
                options:
                    #@review
                    description: "The field's option available. Not always present"
                    items:
                        properties:
                            label:
                                readOnly: true
                                type: string
                            value:
                                readOnly: true
                                type: string
                        type: object
                    readOnly: true
                    type: array
                predefinedValue:
                    #@review
                    description: "The field's default value"
                    readOnly: true
                    type: string
                repeatable:
                    #@review
                    description: "Whether or not this field is repeatable"
                    readOnly: true
                    type: boolean
                required:
                    #@review
                    description: "Whether or not this field is required"
                    readOnly: true
                    type: boolean
                showLabel:
                    #@review
                    description: "Whether or not the field label must be shown"
                    readOnly: true
                    type: boolean
            type: object
        Creator:
            description: https://www.schema.org/Creator
            properties:
                additionalName:
                    #@review
                    description: "The creator's additional name"
                    readOnly: true
                    type: string
                familyName:
                    #@review
                    description: "The creator's family name"
                    readOnly: true
                    type: string
                givenName:
                    #@review
                    description: "The creator's given name"
                    readOnly: true
                    type: string
                id:
                    #@review
                    description: "The creator's ID"
                    format: int64
                    readOnly: true
                    type: integer
                image:
                    #@review
                    description: "The creator's image URL"
                    format: uri
                    readOnly: true
                    type: string
                name:
                    #@review
                    description: "The creator's name"
                    readOnly: true
                    type: string
                profileURL:
                    #@review
                    description: "The creator's profile URL"
                    format: uri
                    readOnly: true
                    type: string
            type: object
        StructuredContent:
            description: https://www.schema.org/StructuredContent
            properties:
                aggregateRating:
                    #@review
                    $ref: "#/components/schemas/AggregateRating"
                    description: "The structured content's aggregate rating"
                    readOnly: true
                availableLanguages:
                    #@review
                    description: "The structured content's available translations"
                    items:
                        type: string
                    readOnly: true
                    type: array
                categories:
                    #@review
                    description: "The structured content's categories"
                    items:
                        properties:
                            categoryId:
                                format: int64
                                type: integer
                            categoryName:
                                type: string
                        type: object
                    readOnly: true
                    type: array
                categoryIds:
                    #@review
                    description: "The structured content's category Ids"
                    items:
                        format: int64
                        type: integer
                    type: array
                    writeOnly: true
                contentFields:
                    #@review
                    description: "The structured content's structure fields"
                    items:
                        $ref: "#/components/schemas/ContentField"
                    type: array
                contentSpace:
                    #@review
                    description: "The content space ID where the structured content is stored"
                    format: int64
                    readOnly: true
                    type: integer
                contentStructureId:
                    #@review
                    description: "The structured content's content structure id"
                    format: int64
                    type: integer
                creator:
                    #@review
                    $ref: "#/components/schemas/Creator"
                    description: "The structured content's creator"
                    readOnly: true
                dateCreated:
                    #@review
                    description: "The date of creation"
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    #@review
                    description: "The date of the last modification"
                    format: date-time
                    readOnly: true
                    type: string
                datePublished:
                    #@review
                    description: "The structured content's publication date"
                    format: date-time
                    type: string
                description:
                    #@review
                    description: "The structured content's description"
                    type: string
                hasComments:
                    #@review
                    description: "Wheter or not this structured content has comments"
                    readOnly: true
                    type: boolean
                id:
                    #@review
                    description: "The structured content's ID"
                    format: int64
                    readOnly: true
                    type: integer
                keywords:
                    #@review
                    description: "The structured content's keywords"
                    items:
                        type: string
                    type: array
                lastReviewed:
                    #@review
                    description: "The structured content's last reviewed date"
                    format: date-time
                    readOnly: true
                    type: string
                renderedContents:
                    #@review
                    description: "A list of all structured contents rendered content URLs"
                    items:
                        properties:
                            renderedContentURL:
                                format: uri
                                readOnly: true
                                type: string
                            templateName:
                                readOnly: true
                                type: string
                        type: object
                    readOnly: true
                    type: array
                title:
                    #@review
                    description: "The structured content's title"
                    type: string
                viewableBy:
                    #@review
                    description: "The permission level to be used on the structured content. Only available on creation"
                    enum: [Anyone, Members, Owner]
                    type: string
                    writeOnly: true
        StructuredContentImage:
            description: https://www.schema.org/StructuredContentImage
            properties:
                contentUrl:
                    #@review
                    description: "The url to download the contents of the image"
                    format: uri
                    readOnly: true
                    type: string
                creator:
                    #@review
                    $ref: "#/components/schemas/Creator"
                    description: "The image's creator"
                    readOnly: true
                dateCreated:
                    #@review
                    description: "The creation date"
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    #@review
                    description: "The modified date"
                    format: date-time
                    readOnly: true
                    type: string
                description:
                    #@review
                    description: "The image's description"
                    readOnly: true
                    type: string
                encodingFormat:
                    #@review
                    description: "The image's encoding format"
                    readOnly: true
                    type: string
                fileExtension:
                    #@review
                    description: "The image's extension"
                    readOnly: true
                    type: string
                id:
                    #@review
                    description: "The image's ID"
                    format: int64
                    readOnly: true
                    type: integer
                sizeInBytes:
                    #@review
                    description: "The image's size in bytes"
                    readOnly: true
                    type: number
                title:
                    #@review
                    description: "The image's title"
                    readOnly: true
                    type: string
            type: object
info:
    description: ""
    title: "Headless Web Experience"
    version: v1.0
openapi: 3.0.1
paths:
    "/comments/{comment-id}":
        delete:
            #@review
            description: "Remove a comment"
            parameters:
                - in: path
                  name: comment-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                204:
                    content:
                        application/json: {}
                    description: ""
            tags: ["Comment"]
        get:
            #@review
            description: "Retrieve a comment"
            parameters:
                - in: path
                  name: comment-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Comment"
                    description: ""
            tags: ["Comment"]
        put:
            #@review
            description: "Update a comment"
            parameters:
                - in: path
                  name: comment-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Comment"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Comment"
                    description: ""
            tags: ["Comment"]
    "/comments/{comment-id}/comments":
        get:
            #@review
            description: "Retrieve the child comments of a comment thread"
            parameters:
                - in: query
                  name: filter
                  schema:
                      type: string
                - in: query
                  name: page
                  schema:
                      type: integer
                - in: query
                  name: pageSize
                  schema:
                      type: integer
                - in: query
                  name: sort
                  schema:
                      type: string
                - in: path
                  name: comment-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Comment"
                                type: array
                    description: ""
            tags: ["Comment"]
        post:
            #@review
            description: "Add a child comment to a comment thread"
            parameters:
                - in: path
                  name: comment-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Comment"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Comment"
                    description: ""
            tags: ["Comment"]
    "/content-spaces/{content-space-id}/content-structures":
        #@review
        description: "Retrieve the content structures of a content space"
        get:
            parameters:
                - in: query
                  name: page
                  schema:
                      type: integer
                - in: query
                  name: pageSize
                  schema:
                      type: integer
                - in: path
                  name: content-space-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: query
                  name: filter
                  schema:
                      type: string
                - in: query
                  name: sort
                  schema:
                      type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/ContentStructure"
                                type: array
                    description: ""
            tags: ["ContentStructure"]
    "/content-spaces/{content-space-id}/structured-contents":
        get:
            #@review
            description: "Retrieve the structured contents of a content space.
                dateCreated, dateModified, datePublished, creatorId, contentStructureId,
                title and any field of its structure"
                This collection can be filtered and sorted using: categoryIds, keywords,
            parameters:
                - in: query
                  name: page
                  schema:
                      type: integer
                - in: query
                  name: pageSize
                  schema:
                      type: integer
                - in: path
                  name: content-space-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: header
                  name: Accept-Language
                  schema:
                      type: string
                - in: query
                  name: filter
                  schema:
                      type: string
                - in: query
                  name: sort
                  schema:
                      type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/StructuredContent"
                                type: array
                    description: ""
            tags: ["StructuredContent"]
        post:
            #@review
            description: "Add a structured content to a content space"
            parameters:
                - in: path
                  name: content-space-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: header
                  name: Accept-Language
                  schema:
                      type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/StructuredContent"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StructuredContent"
                    description: ""
            tags: ["StructuredContent"]
    "/content-structures/{content-structure-id}":
        get:
            #@review
            description: "Retrieve a content structure"
            parameters:
                - in: path
                  name: content-structure-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ContentStructure"
                    description: ""
            tags: ["ContentStructure"]
    "/content-structures/{content-structure-id}/structured-contents":
        get:
            #@review
            description: "Retrieve the structured contents that are using the structure ID provided.
                dateCreated, dateModified, datePublished, creatorId, title and any field of
                its structure"
                This collection can be filtered and sorted using: categoryIds, keywords,
            parameters:
                - in: query
                  name: page
                  schema:
                      type: integer
                - in: query
                  name: pageSize
                  schema:
                      type: integer
                - in: path
                  name: content-structure-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: header
                  name: Accept-Language
                  schema:
                      type: string
                - in: query
                  name: filter
                  schema:
                      type: string
                - in: query
                  name: sort
                  schema:
                      type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/StructuredContent"
                                type: array
                    description: ""
            tags: ["StructuredContent"]
    "/structured-contents/{structured-content-id}":
        delete:
            #@review
            description: "Remove a structured content"
            parameters:
                - in: path
                  name: structured-content-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                204:
                    content:
                        application/json: {}
                    description: ""
            tags: ["StructuredContent"]
        get:
            #@review
            description: "Retrieve a structured content"
            parameters:
                - in: path
                  name: structured-content-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: header
                  name: Accept-Language
                  schema:
                      type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StructuredContent"
                    description: ""
            tags: ["StructuredContent"]
        patch:
            #@review
            description: "Update the properties of a structured content.
                Structured contents with repeatable fields don't support this operation"
            parameters:
                - in: path
                  name: structured-content-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: header
                  name: Accept-Language
                  schema:
                      type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/StructuredContent"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StructuredContent"
                    description: ""
            tags: ["StructuredContent"]
        put:
            #@review
            description: "Update the properties of a structured content"
            parameters:
                - in: path
                  name: structured-content-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: header
                  name: Accept-Language
                  schema:
                      type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/StructuredContent"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StructuredContent"
                    description: ""
            tags: ["StructuredContent"]
    "/structured-contents/{structured-content-id}/comments":
        get:
            #@review
            description: "Retrieve the comment of a structured content"
            parameters:
                - in: query
                  name: filter
                  schema:
                      type: string
                - in: query
                  name: page
                  schema:
                      type: integer
                - in: query
                  name: pageSize
                  schema:
                      type: integer
                - in: query
                  name: sort
                  schema:
                      type: string
                - in: path
                  name: structured-content-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Comment"
                                type: array
                    description: ""
            tags: ["Comment"]
        post:
            #@review
            description: "Add a comment to a structured content"
            parameters:
                - in: path
                  name: structured-content-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Comment"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Comment"
                    description: ""
            tags: ["Comment"]
    "/structured-contents/{structured-content-id}/rendered-content/{template-id}":
        get:
            #@review
            description: "Retrieve the rendered html of a structured content using the template ID provided"
            parameters:
                - in: path
                  name: structured-content-id
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: path
                  name: template-id
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        text/html:
                            schema:
                                type: string
                    description: ""
            tags: ["StructuredContent"]