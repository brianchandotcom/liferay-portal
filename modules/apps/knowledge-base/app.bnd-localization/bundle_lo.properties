liferay-releng-app-description=ແອັບ Knowledge Base (ຖານຄວາມຮູ້) ຂອງ Liferay ສະໜອງວິທີການສ້າງ ແລະ ຈັດລະບຽບບົດຄວາມພາຍໃນເວັບໄຊ. ຖານຄວາມຮູ້ນີ້ເໝາະສຳລັບການສ້າງ ແລະ ຈັດລະບຽບຂໍ້ມູນໃຫ້ເປັນທາງການຫຼາຍກວ່າໃນ wiki. ຕົວຢ່າງ: ມັນສາມາດໃຊ້ເພື່ອຈັດລະບຽບ ແລະ ສະແດງເອກະສານຜະລິດຕະພັນແບບມືອາຊີບ. ຖານຄວາມຮູ້ຊ່ວຍໃຫ້ທ່ານນຳເຂົ້າໄຟລ໌ຕົ້ນສະບັບຂອງບົດຄວາມທີ່ຂຽນດ້ວຍ Markdown, ເພື່ອໃຫ້ທ່ານສາມາດເຮັດວຽກແບບອອບລາຍກ່ອນທີ່ຈະເຜີຍແຜ່. ການເຊື່ອມຕໍ່ກັບ GitHub ຊ່ວຍໃຫ້ທ່ານສາມາດໃຫ້ສິດຜູ້ໃຊ້ໃນການຊ່ວຍແກ້ໄຂ ຫຼື ປັບປຸງບົດຄວາມ. ມັນງ່າຍທີ່ຈະຕັ້ງຄ່າຖານຄວາມຮູ້ດ້ວຍຂັ້ນຕອນການເຮັດວຽກ (workflow) ທີ່ກຳນົດໃຫ້ບົດຄວາມຕ້ອງໄດ້ຮັບການອະນຸມັດກ່ອນທີ່ຈະເຜີຍແຜ່. ນອກຈາກນັ້ນ, ມັນຍັງຊ່ວຍໃຫ້ຜູ້ດູແລລະບົບສ້າງແມ່ແບບບົດຄວາມໄດ້. ແມ່ແບບສາມາດໃຊ້ເພື່ອຮັບປະກັນວ່າບົດຄວາມບາງປະເພດມີໂຄງສ້າງດຽວກັນ ແລະ ມີຂໍ້ມູນປະເພດທີ່ກຳນົດໄວ້. ບົດຄວາມໃນຖານຄວາມຮູ້ສາມາດຈັດໝວດໝູ່ເພື່ອໃຫ້ຫາໄດ້ງ່າຍ. ພວກມັນຍັງສາມາດຈັດລຽງຕາມລຳດັບຊັ້ນເພື່ອສ້າງເປັນປຶ້ມ ຫຼື ຄູ່ມືທີ່ສົມບູນ. ມີ portlets ຫຼາຍອັນລວມຢູ່ໃນແອັບນີ້.<br /><br />ແອັບນີ້ຈະປະກົດຂຶ້ນໃນເມນູ ແອັບພລິເຄຊັນ ແລະ ການຈັດການເວັບໄຊ ເມື່ອຕິດຕັ້ງແລ້ວ.