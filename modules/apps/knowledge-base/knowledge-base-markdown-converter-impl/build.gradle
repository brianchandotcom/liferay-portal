sourceCompatibility = "1.7"
targetCompatibility = "1.7"

dependencies {

	compileInclude group:"com.vladsch.flexmark", name:"flexmark-osgi", version:"0.40.18"
	compileInclude group: "org.ow2.asm", name: "asm", version: "4.1"
	compileInclude group: "org.ow2.asm", name: "asm-analysis", version: "4.1"
	compileInclude group: "org.ow2.asm", name: "asm-tree", version: "4.1"
	compileInclude group: "org.ow2.asm", name: "asm-util", version: "4.1"

	compileOnly group: "com.liferay", name: "com.liferay.petra.string"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations"
	compileOnly project(":modules:knowledge-base:knowledge-base-api")
	compileOnly project(":modules:knowledge-base:knowledge-base-markdown-converter-api")
	compileOnly project(":modules:knowledge-base:knowledge-base-service")

	testCompile group: "junit", name: "junit", version: "4.12"
	testCompile group:"com.vladsch.flexmark", name:"flexmark-osgi", version:"0.40.16"
