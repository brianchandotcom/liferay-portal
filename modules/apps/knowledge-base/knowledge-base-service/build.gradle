buildService {
	apiDir = "../knowledge-base-api/src/main/java"
	testDir = "../knowledge-base-test/src/testIntegration/java"
}

dependencies {
	compileInclude group: "net.htmlparser.jericho", name: "jericho-html", version: "3.1"

	compileOnly group: "biz.aQute.bnd", name: "biz.aQute.bnd.annotation"
	compileOnly group: "com.liferay", name: "com.liferay.exportimport.api"
	compileOnly group: "com.liferay", name: "com.liferay.petra.function"
	compileOnly group: "com.liferay", name: "com.liferay.petra.string"
	compileOnly group: "com.liferay", name: "com.liferay.portal.dao.orm.custom.sql.api"
	compileOnly group: "com.liferay", name: "com.liferay.portal.instance.lifecycle.api"
	compileOnly group: "com.liferay", name: "com.liferay.portal.spring.extender.api"
	compileOnly group: "com.liferay", name: "com.liferay.portal.upgrade.api"
	compileOnly group: "com.liferay", name: "com.liferay.registry.api"
	compileOnly group: "com.liferay", name: "com.liferay.rss.api"
	compileOnly group: "com.liferay", name: "com.liferay.staging.api"
	compileOnly group: "com.liferay", name: "com.liferay.subscription.api"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel"
	compileOnly group: "com.liferay.portal", name: "com.liferay.util.java"
	compileOnly group: "javax.portlet", name: "portlet-api"
	compileOnly group: "javax.servlet", name: "javax.servlet-api"
	compileOnly group: "org.osgi", name: "org.osgi.core"
	compileOnly group: "org.osgi", name: "osgi.cmpn"
	compileOnly group: "org.slf4j", name: "slf4j-api", version: "1.7.22"
	compileOnly project(":apps:knowledge-base:knowledge-base-api")
	compileOnly project(":apps:knowledge-base:knowledge-base-markdown-converter-api")

	testCompile group: "com.liferay", name: "com.liferay.petra.lang"
	testCompile group: "easyconf", name: "easyconf", version: "0.9.5"
	testCompile group: "junit", name: "junit", version: "4.12"
	testCompile group: "org.apache.tika", name: "tika-core", version: "1.18"
	testCompile group: "org.powermock", name: "powermock-api-mockito", version: "1.6.1"
	testCompile group: "org.powermock", name: "powermock-module-junit4", version: "1.6.1"
}

group = 'com.liferay.knowledge.base'
