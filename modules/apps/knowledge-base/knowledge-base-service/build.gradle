buildService {
	apiDir = "../knowledge-base-api/src/main/java"
	testDir = "../knowledge-base-test/src/testIntegration/java"
}

dependencies {
	compileInclude group: "net.htmlparser.jericho", name: "jericho-html", version: "3.1"

	compileOnly group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	compileOnly group: "com.liferay", name: "com.liferay.exportimport.api", version: "3.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.petra.function", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.petra.string", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.dao.orm.custom.sql.api", version: "1.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.instance.lifecycle.api", version: "1.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.spring.extender.api", version: "3.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.upgrade.api", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.registry.api", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.rss.api", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.staging.api", version: "3.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.subscription.api", version: "1.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "3.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "3.18.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.util.java", version: "3.0.0"
	compileOnly group: "javax.portlet", name: "portlet-api", version: "3.0.0"
	compileOnly group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
	compileOnly group: "org.osgi", name: "org.osgi.core", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	compileOnly group: "org.slf4j", name: "slf4j-api", version: "1.7.22"
	compileOnly project(":apps:knowledge-base:knowledge-base-api")
	compileOnly project(":apps:knowledge-base:knowledge-base-markdown-converter-api")

	testCompile group: "com.liferay", name: "com.liferay.petra.lang", version: "2.0.0"
	testCompile group: "easyconf", name: "easyconf", version: "0.9.5"
	testCompile group: "junit", name: "junit", version: "4.12"
	testCompile group: "org.apache.tika", name: "tika-core", version: "1.18"
	testCompile group: "org.powermock", name: "powermock-api-mockito", version: "1.6.1"
	testCompile group: "org.powermock", name: "powermock-module-junit4", version: "1.6.1"
}

group = 'com.liferay.knowledge.base'
