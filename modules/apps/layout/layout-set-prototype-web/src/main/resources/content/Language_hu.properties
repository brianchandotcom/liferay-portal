allow-site-administrators-to-modify-pages-associated-with-this-site-template=Lehetővé teszi a webhely adminisztátorok számára, hogy módosítság azokat az oldalakat, amelyek hozzá vannak rendelve ehhez a webhely sablonhoz, akkor is ha a változás terjesztése engedélyezett.
allow-site-administrators-to-modify-pages-associated-with-this-site-template-help=Az érték beállításával az adminisztrátorok hozzáadhatnak, eltávolíthatnak, konfigurálhatnak alkalmazásokat, és az oldal tulajdonságait megváltoztathatják. Ha a webhelyadminisztrátor módosít egy oldalt, az eredeti webhelysablon-oldalra a változás már nem terjed át. Ha ez az opció be van állítva, lehetőség van letiltani bizonyos oldalak módosíthatóságát az oldalkezelés eszközön.
javax.portlet.description.com_liferay_layout_set_prototype_web_portlet_LayoutSetPrototypePortlet=Site Templates allows you to define pages and web content to include when creating sites. You can define and edit site templates as well as their permissions.
