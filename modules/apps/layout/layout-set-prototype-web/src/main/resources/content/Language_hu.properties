there-are-no-site-templates.-you-can-add-a-site-template-by-clicking-the-plus-button-on-the-bottom-right-corner=There are no site templates. You can add a site template by clicking the plus button on the bottom right corner.
you-cannot-delete-site-templates-that-are-used-by-a-site=Nem lehet olyan webhelysablont törölni, amelyet egy webhely használ.
