liferay-releng-app-description=Liferay Marketplace ແມ່ນສ່ວນໜຶ່ງທີ່ສຳຄັນຂອງປະສົບການແພລດຟອມ Liferay ສຳລັບຜູ້ໃຊ້ທຸກຄົນ. ຜູ້ສະໝັກໃຊ້ແບບ Enterprise ຍັງສາມາດເຂົ້າເຖິງ Liferay Subscription Apps ໄດ້ໂດຍສະເພາະຜ່ານ Liferay Marketplace. ເຂົ້າສູ່ລະບົບດ້ວຍບັນຊີ Liferay ຂອງທ່ານເພື່ອເລືອກເບິ່ງແອັບຫຼາຍຮ້ອຍລາຍການທີ່ຈະຊ່ວຍທ່ານສ້າງທຸລະກິດ ຫຼື ວິທີແກ້ໄຂທາງເຕັກນິກ.