liferay-releng-app-description=O Mercado de Aplicações da Liferay é parte integral da experiência da plataforma Liferay para todos os utilizadores. Os assinantes Enterprise também têm acesso exclusivo às Aplicações de Subscrição Liferay através do Liferay Marketplace. Autentique-se com a sua conta Liferay para navegar por centenas de aplicações para ajudá-lo a construir a sua solução técnica ou de negócio.