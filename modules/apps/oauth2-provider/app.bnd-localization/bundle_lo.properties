liferay-releng-app-description=Liferay Plugin ສຳລັບ OAuth 2.0 ແມ່ນໂປຣໂຕຄໍການອະນຸຍາດມາດຕະຖານອຸດສາຫະກຳ. ຜູ້ໃຊ້ສາມາດແບ່ງປັນຂໍ້ມູນປະຈຳຕົວບາງຢ່າງຈາກເວັບໄຊອື່ນເພື່ອເຂົ້າສູ່ລະບົບຂອງທ່ານໄດ້ຢ່າງລຽບງ່າຍ. ມັນເຮັດວຽກໂດຍການອະນຸຍາດໃຫ້ເຂົ້າເຖິງຊັບພະຍາກອນບາງສ່ວນຂອງຜູ້ໃຊ້ໂດຍບໍ່ຕ້ອງໃຊ້ລະຫັດຜ່ານ (ເຊັ່ນ: ທີ່ຢູ່ອີເມວ, ຮູບໂປຣໄຟລ໌ ຫຼື ຂໍ້ມູນອື່ນໆຈາກບັນຊີຂອງທ່ານ) ແລະ ຊັບພະຍາກອນອື່ນໆທີ່ໄດ້ຮັບອະນຸຍາດ.