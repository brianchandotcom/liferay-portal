liferay-releng-app-description=O plugin Liferay para OAuth 2.0 é um protocolo de autorização padrão da indústria. Os utilizadores podem partilhar facilmente credenciais selecionadas de outro site para fazer login no seu. Funciona autorizando o acesso sem palavra-passe a partes de recursos pertencentes ao utilizador (como um endereço de e-mail, uma fotografia de perfil ou outros dados da sua conta) e a outros recursos com permissão.