<!doctype html>

<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta content="width=device-width, initial-scale=1" name="viewport" />

	<title>Liferay - OAuth2 Tester</title>

	<link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" rel="stylesheet" />
</head>

<body style="width: 90%; margin: 3%">
<div class="row">
	<div class="col-8">
		<h1 id="title">Liferay OAuth2 Tester</h1>

		<div><p>You must configure an OAuth2 Application in your Liferay Portal and set:</p>
			<dl class="row" style="padding-left: 1.5rem">
				<dt class="col-sm-2">Callback</dt>
				<dd class="col-sm-10"><span id="callbackUri"></span>url=YOUR_LIFERAY_URL&client_id=YOUR_CLIENT_ID</dd>
				<dt class="col-sm-2">Scope</dt>
				<dd class="col-sm-10">everything.read.userprofile</dd>
			</dl>
		</div>
	</div>

	<div class="col-4">
		<div class="gy-2 row">
			<div class="col-12">
				<button id="changeModeButton" class="btn btn-info float-end">Use PKCE Authorization Code Grant Flow</button>
			</div>

			<div class="col-12">
				<button id="resetButton" class="btn btn-danger float-end">Reset</button>
			</div>
		</div>
	</div>
</div>

<div class="accordion" id="accordion">
	<div class="accordion-item">
		<h2 class="accordion-header" id="authTab">
			<button id="authTabButton" class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#authTabCollapse" aria-expanded="false" aria-controls="authTabCollapse" disabled>
				1. Authorize application
			</button>
		</h2>

		<div aria-labelledby="authTab" class="accordion-collapse collapse" data-bs-parent="#accordion" id="authTabCollapse">
			<form class="accordion-body gy-4 row" id="authForm">
				<div class="col-md-6">
					<label for="liferayUrl" class="form-label">Liferay URL:</label>

					<input class="form-control" id="liferayUrl" name="liferayUrl" type="text" value="http://localhost:8080" required />
				</div>

				<div class="col-md-6">
					<label for="authorizeUrl" class="form-label">OAuth2 Authorization URL:</label>

					<input class="form-control" id="authorizeUrl" name="authorizeUrl" type="text" value="/o/oauth2/authorize" />
				</div>

				<div class="col-12" id="clientIdDiv">
					<label for="clientId" class="form-label">Client ID:</label>

					<input class="form-control" id="clientId" name="clientId" type="text" required />
				</div>

				<div class="col-md-3" id="codeChallengeDiv" style="display: none">
					<label for="codeChallenge" class="form-label">Code Challenge:</label>

					<input class="form-control" id="codeChallenge" name="codeChallenge" type="text" disabled readonly />
				</div>

				<div class="col-md-6" id="convertedCodeChallengeDiv" style="display: none">
					<label for="convertedCodeChallenge" class="form-label">Base64 Encoded SHA256 Code Challenge:</label>

					<input class="form-control" id="convertedCodeChallenge" name="convertedCodeChallenge" type="text" disabled readonly />
				</div>

				<div class="col-12">
					<button class="btn btn-primary" id="generateCodeChallenge" style="display: none">Generate Code Challenge</button>
					<button class="btn btn-primary" id="getAuthorizationCode" type="submit">Authorize</button>
					<button class="btn btn-warning float-end" id="alreadyHaveTokens" type="submit">Already have tokens</button>
				</div>
			</form>
		</div>
	</div>

	<div class="accordion-item">
		<h2 class="accordion-header" id="tokenTab">
			<button id="tokenTabButton" class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#tokenTabCollapse" aria-expanded="false" aria-controls="tokenTabCollapse" disabled>
				2. Obtain OAuth2 Token
			</button>
		</h2>

		<div aria-labelledby="tokenTab" class="accordion-collapse collapse" data-parent="#accordion" id="tokenTabCollapse">
			<form class="accordion-body gy-4 row" id="tokenForm">
				<div class="col-md-6">
					<label for="tokenLiferayUrl" class="form-label">Liferay URL:</label>

					<input class="form-control" id="tokenLiferayUrl" name="tokenLiferayUrl" type="text" disabled readonly />
				</div>

				<div class="col-md-6">
					<label for="tokenClientId" class="form-label">Client ID:</label>

					<input class="form-control" id="tokenClientId" name="tokenClientId" type="text" disabled readonly />
				</div>

				<div class="col-md-6">
					<label for="authCode" class="form-label">Auth Code:</label>

					<input class="form-control" id="authCode" name="authCode" type="text" disabled readonly />
				</div>

				<div class="col-md-6">
					<label for="tokenUrl" class="form-label">OAuth2 Token URL:</label>

					<input class="form-control" id="tokenUrl" name="tokenUrl" type="text" value="/o/oauth2/token" required />
				</div>

				<div class="col-12">
					<label id="clientSecretOrCodeChallengeLabel" for="clientSecretOrCodeChallenge" class="form-label">Client Secret:</label>

					<input class="form-control" id="clientSecretOrCodeChallenge" name="clientSecretOrCodeChallenge" type="password" required />
				</div>

				<div class="col-12">
					<button class="btn btn-primary" id="getToken" >Obtain token</button>
				</div>
			</form>
		</div>
	</div>

	<div class="accordion-item">
		<h2 class="accordion-header" id="requestTab">
			<button id="requestTabButton" class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#requestTabCollapse" aria-expanded="false" aria-controls="requestTabCollapse" disabled>
				3. Test Request
			</button>
		</h2>

		<div aria-labelledby="requestTab" class="accordion-collapse collapse" data-parent="#accordion" id="requestTabCollapse">
			<div class="accordion-body">
				<form class="gy-4 row" id="requestForm">
					<div class="col-md-6">
						<label for="requestUrl" class="form-label">URL:</label>

						<input class="form-control" id="requestUrl" name="requestUrl" type="text" value="http://localhost:8080/api/jsonws/user/get-current-user" required />
					</div>

					<div class="col-md-2">
						<label for="methodType" class="form-label">Method:</label>

						<select class="form-select" id="methodType" name="methodType">
							<option selected>GET</option>
							<option>POST</option>
							<option>PUT</option>
							<option>DELETE</option>
						</select>
					</div>

					<div class="col-md-4">
						<label for="contentType" class="form-label">Content-Type:</label>

						<select class="form-select" id="contentType" name="contentType">
							<option selected="selected">application/json</option>
							<option>application/x-www-form-urlencoded</option>
						</select>
					</div>

					<div id="parameters" style="display: none">
						<hr />

						<div class="gy-3 row">
							<div class="col-12">
								<p class="h6" style="margin-bottom: 0">Parameters</p>
							</div>

							<div class="col-md-6"><input type="text" id="paramName0" placeholder="Name" class="form-control form-control-sm" /></div>
							<div class="col-md-6"><input type="text" id="paramValue0" placeholder="Value" class="form-control form-control-sm" /></div>

							<div class="col-12">
								<button id="addParameter" class="btn btn-success btn-sm">Add another parameter</button>
							</div>
						</div>

						<hr />
					</div>

					<div class="col-12">
						<button id="sendRequest" class="btn btn-primary gy-4">Launch Request</button>
					</div>
				</form>

				<hr />

				<div class="align-items-end gy-3 row">
					<div class="col-lg-9">
						<label for="accessToken" class="form-label">Access Token:</label>

						<input class="form-control form-control-sm" id="accessToken" name="accessToken" type="text" />
					</div>

					<div class="col-lg-3 text-end">
						<button id="refreshTokenButton" class="btn btn-warning btn-sm">Refresh Token</button>
						<button id="introspectAccessTokenButton" class="btn btn-warning btn-sm">Introspect Access Token</button>
					</div>

					<div class="col-lg-9">
						<label for="refreshToken" class="form-label">Refresh Token:</label>

						<input class="form-control form-control-sm" id="refreshToken" name="refreshToken" type="text" />
					</div>

					<div class="col-lg-3 text-end">
						<button id="introspectRefreshTokenButton" class="btn btn-warning btn-sm">Introspect Refresh Token</button>
					</div>
				</div>

				<hr />

				<div class="col-12">
					<label for="resultTextArea" class="form-label fw-bold fs-5">Result</label>

					<textarea class="form-control" id="resultTextArea" rows="5" disabled readonly></textarea>
				</div>
			</div>
		</div>
	</div>
</div>

<script crossorigin="anonymous" integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8" src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
<script crossorigin="anonymous" integrity="sha512-E8QSvWZ0eCLGk4km3hxSsNmGWbLtSCSUcewDQPQWZF6pEU8GlT8a5fF32wOl1i8ftdMhssTrF/OhyGWwonTcXA==" referrerpolicy="no-referrer" src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="liferayOauth2Tester.js"></script>
</body>
</html>
