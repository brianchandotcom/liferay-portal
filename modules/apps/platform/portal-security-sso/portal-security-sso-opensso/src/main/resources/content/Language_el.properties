import-from-ldap-help=Ορίστε αυτό σε true, αν θέλετε να εισάγουν οι χρήστες από LDAP μετά από μια επιτυχή σύνδεση μέσω OpenSSO. Το LDAP ρυθμίσεις πρέπει να ρυθμιστούν σωστά στην ενότητα LDAP. Εάν έχει οριστεί σε false, οι χρήστες θα δημιουργηθεί από δεδομένα που παρέχονται από OpenSSO. (Automatic Translation)
