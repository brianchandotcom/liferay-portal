import-from-ldap-help=यह सच है अगर आप OpenSSO के माध्यम से एक सफल लॉगिन के बाद LDAP से उपयोगकर्ताओं को आयात करना चाहते हैं करने के लिए सेट करें। LDAP सेटिंग्स जो LDAP खंड में ठीक से कॉन्फ़िगर करने के लिए की जरूरत है। यदि यह false करने के लिए सेट है, उपयोगकर्ताओं द्वारा OpenSSO प्रदान किए गए डेटा से बनाया जाएगा। (Automatic Translation)
logout-on-session-expiration-help=जब पोर्टल सत्र की समय सीमा समाप्त करने के लिए यह सच OpenSSO से बाहर एक उपयोगकर्ता लॉग सेट करें। (Automatic Translation)
