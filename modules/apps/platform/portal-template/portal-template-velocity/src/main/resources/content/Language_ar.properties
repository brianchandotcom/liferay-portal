directive-if-to-string-null-check-help=تعيين هذه الخاصية إلى true ليكون toString() المكالمة شرط #if للتحقق من وجود قيم فارغة. على سبيل المثال، إذا تم تعيين الخاصية إلى true، شرط "#if ($layout)" سوف افالوتي إلى true إذا كان $layout فارغة أو إذا $layout.toString() بإرجاع null. (Automatic Translation)
resource-modification-check-interval-help=تعيين إلى 0 لتحميل القالب وهذا مصدر كل الوقت. تعيين هذه القيمة إلى عدد أقل من 0 تحميل قوالب مرة واحدة وذاكرة مؤقتة لهم إلى أجل غير مسمى. قم بتعيين هذا إلى عدد أكبر من 0 (بالمللي ثانية) تحميل القوالب ومخبأ لهم لمدة محددة. (Automatic Translation)
