directive-if-to-string-null-check-help=Задайте това свойство, за да е истина да имат #if състояние повикване toString() да провери за null стойности. Например ако свойството е зададен на true, условието "#if ($layout)" ще evalute да вярно ако $layout е празна или ако $layout.toString() връща null. (Automatic Translation)
resource-modification-check-interval-help=Поставям този към 0 да заредите шаблон източник всеки път. Зададете на число по-малко от 0 до зареждане на шаблони веднъж и ги кеш за неопределено време. Зададете това в число по-голямо от 0 (в милисекунди) за зареждане на шаблони и ги кеш за изтичането на зададения период. (Automatic Translation)
