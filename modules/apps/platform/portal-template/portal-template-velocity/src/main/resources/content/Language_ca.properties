directive-if-to-string-null-check-help=Definir aquesta propietat per cert que la condició de #if crida toString() per comprovar si els valors nuls. Per exemple, si la propietat està situada a true, l'estat "#if ($layout)" es evalute a true si $layout és nul o $layout.toString() retorna nul. (Automatic Translation)
resource-modification-check-interval-help=Conjunt això a 0 per carregar la plantilla font cada vegada. Estableix amb un nombre inferior a 0 per carregar plantilles una vegada i memòria cau-los indefinidament. Estableix un número major que 0 (en mil·lisegons) per carregar plantilles i memòria cau-los per la durada especificada. (Automatic Translation)
