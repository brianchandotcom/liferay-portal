directive-if-to-string-null-check-help=Nastavte tuto vlastnost na hodnotu true mít volání toString() podmínka #if ke kontrole hodnoty null. Například pokud je vlastnost nastavena na hodnotu true, je podmínka "#if ($layout)", bude hodnocení true Pokud $layout má hodnotu null nebo pokud $layout.toString() vrátí null. (Automatic Translation)
resource-modification-check-interval-help=Sada to 0 načíst šablonu zdroje pokaždé. Nastavte počet menší než 0 načíst šablony jednou a mezipaměti je na neurčito. Nastavte číslo větší než 0 (v milisekundách) pro načtení šablony a mezipaměti po určenou dobu trvání. (Automatic Translation)
