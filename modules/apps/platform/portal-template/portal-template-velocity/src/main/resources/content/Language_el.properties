directive-if-to-string-null-check-help=Ορίσετε αυτήν την ιδιότητα στην τιμή true για να έχετε το #if κατάσταση κλήση ToString () για να ελέγξετε για τις μηδενικές τιμές. Για παράδειγμα, εάν η ιδιότητα έχει οριστεί σε true, ο όρος «#if ($layout)» θα αξιολόγηση σε true εάν $layout είναι null ή εάν $layout.toString() επιστρέφει τιμή null. (Automatic Translation)
resource-modification-check-interval-help=Το σύνολο αυτό σε 0 για να φορτώσετε το πρότυπο πηγή κάθε φορά. Το ορίσετε σε αριθμό μικρότερο του 0 να φορτώσετε πρότυπα κάποτε και προσωρινή αποθήκευσή τους κατά τρόπο αόριστο. Το ορίσετε σε έναν αριθμό μεγαλύτερο από 0 (σε χιλιοστά του δευτερολέπτου) για να φορτώσετε πρότυπα και προσωρινή αποθήκευσή τους για καθορισμένη διάρκεια. (Automatic Translation)
velocity.engine.configuration.name=Ταχύτητα κινητήρα (Automatic Translation)