directive-if-to-string-null-check-help=Establezca esta propiedad en true para tener el #if condición llamada toString() para buscar valores null. Por ejemplo, si la propiedad está establecida en true, la condición "#if ($layout)" evalúe a true si $layout es null o si $layout.toString() devuelve null. (Automatic Translation)
resource-modification-check-interval-help=Set a 0 para cargar la plantilla fuente cada vez. Seleccione un número menor que 0 para cargar plantillas de una vez y caché de forma indefinida. Cambialo a un número mayor que 0 (en milisegundos) para cargar plantillas y caché para la duración especificada. (Automatic Translation)
