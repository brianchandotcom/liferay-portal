directive-if-to-string-null-check-help=Définissez cette propriété à true pour que le #if condition appel toString() pour vérifier les valeurs null. Par exemple, si la propriété est définie sur true, la condition "#if ($layout)" sera remis à true si $layout est null ou si $layout.toString() retourne null. (Automatic Translation)
resource-modification-check-interval-help=Ensemble cela à 0 pour charger le modèle source chaque fois. Cela affecter un nombre inférieur à 0 pour charger les modèles une fois et mettre en cache indéfiniment. Indiquez ce un nombre supérieur à 0 (en millisecondes) pour charger des modèles et de mettre en cache pendant la durée spécifiée. (Automatic Translation)
