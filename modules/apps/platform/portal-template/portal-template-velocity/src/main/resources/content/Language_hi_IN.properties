directive-if-to-string-null-check-help=इस गुण को true करने के लिए नल मान के लिए जाँच करने के लिए #if शर्त कॉल toString() करने के लिए सेट। गुण को true, हालत "#if ($layout)" करने के लिए सेट है, तो उदाहरण के लिए, यदि $layout नल है या नल $layout.toString() देता है, तो यह सच करने के लिए evalute होगा। (Automatic Translation)
resource-modification-check-interval-help=हर समय स्रोत यह टेम्पलेट को लोड करने के लिए 0 के लिए सेट। यह टेम्पलेट एक बार लोड और कैश उन्हें अनिश्चित करने के लिए एक संख्या 0 से कम सेट करें। यह एक संख्या के लिए (में मिलीसेकंड) 0 से अधिक लोड टेम्पलेट्स और उन्हें निर्दिष्ट अवधि के लिए कैश करने के लिए सेट करें। (Automatic Translation)
