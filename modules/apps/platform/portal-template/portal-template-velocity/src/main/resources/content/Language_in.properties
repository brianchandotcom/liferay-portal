directive-if-to-string-null-check-help=Set properti ini menjadi true untuk memiliki #if kondisi panggilan toString () untuk memeriksa nilai null. Misalnya, jika properti diatur ke true, kondisi "#if ($layout)" akan evalute untuk benar jika $layout null atau jika $layout.toString() kembali null. (Automatic Translation)
resource-modification-check-interval-help=Set ini ke 0 untuk memuat template sumber setiap waktu. Set ini ke jumlah kurang dari 0 untuk memuat template sekali dan cache mereka tanpa batas. Set ini ke nomor yang lebih besar dari 0 (dalam milidetik) untuk memuat template dan cache mereka untuk jangka waktu tertentu. (Automatic Translation)
