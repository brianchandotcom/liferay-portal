directive-if-to-string-null-check-help=Impostare questa proprietà su true in modo che la #if condizione chiamata ToString () per verificare i valori null. Ad esempio, se la proprietà è impostata su true, la condizione di "#if ($layout)" verrà valutare su true se $layout è null o se $layout.toString() restituisce null. (Automatic Translation)
resource-modification-check-interval-help=Insieme questo su 0 per caricare il modello di origine ogni volta. Impostare un numero inferiore a 0 per caricare modelli di una volta e memorizzarli nella cache a tempo indeterminato. Impostare un numero maggiore di 0 (in millisecondi) per caricare modelli e memorizzarli nella cache per la durata specificata. (Automatic Translation)
