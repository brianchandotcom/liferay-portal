directive-if-to-string-null-check-help=להגדיר מאפיין זה כ- true לקיים את תנאי #if שיחת toString() כדי לבדוק אם ערכי null. לדוגמה, אם המאפיין מוגדר כ- true, התנאי "#if ($layout)" יהיה evalute כ- true אם $layout הוא null או אם $layout.toString() תחזיר null. (Automatic Translation)
resource-modification-check-interval-help=סט זה 0 כדי לטעון את התבנית המקור בכל פעם. הגדר זה מספר פחות מ- 0 ועד לטעון תבניות פעם ולהחביא אותם ללא הגבלת זמן. הגדר זה מספר גדול מ- 0 (באלפיות שניה) כדי לטעון תבניות ולהחביא אותם למשך זמן שצוין. (Automatic Translation)
