directive-if-to-string-null-check-help=Set this property to true to have the #if condition call toString() to check for null values. For example, if the property is set to true, the condition "#if ($layout)" will evalute to true if $layout is null or if $layout.toString() returns null. (Automatic Copy)
resource-modification-check-interval-help=Set this to 0 to load the template source every time. Set this to a number less than 0 to load templates once and cache them indefinitely. Set this to a number greater than 0 (in milliseconds) to load templates and cache them for the specified duration. (Automatic Copy)
