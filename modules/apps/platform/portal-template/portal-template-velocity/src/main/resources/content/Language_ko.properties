directive-if-to-string-null-check-help=이 속성에서 #if 상태 전화 tostring () null 값에 대 한 확인을 true로 설정 합니다. 예를 들어 속성이 true 조건 "#if ($layout)"로 설정 된 경우 $layout은 null 또는 $layout.toString()는 null를 반환 하는 경우 true를 것입니다. (Automatic Translation)
resource-modification-check-interval-help=서식 파일을 로드 하는 0이 모든 시간 소스를 설정 합니다. 이 서식 파일을 한 번 로드 하 여 그들을 무기한 캐시 0 보다 작은 수를 설정 합니다. 이 숫자 보다 큰 설정 (밀리초)에서 0 서식 파일을 로드 하 여 지정 된 기간 동안 캐시 합니다. (Automatic Translation)
