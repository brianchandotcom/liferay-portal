directive-if-to-string-null-check-help=Šią ypatybę nustatyti kaip tiesa, kad #if būklė skambinti toString() patikrinti, ar neapibrėžtų reikšmių. Pavyzdžiui, jei turto nustatyta true, sąlyga "#if ($layout)" bus polimerams True jei $layout yra neapibrėžtas arba $layout.toString() grąžina neapibrėžta. (Automatic Translation)
resource-modification-check-interval-help=Rinkinys 0 įkelti šablono kodo kiekvieną kartą. Nustatyti šį skaičių mažiau nei 0 įkelti šablonus vieną kartą ir talpyklos juos neribotą laiką. Nustatyti šį skaičių didesnis už 0 (milisekundėmis) įkelti šablonus ir talpyklos juos už nurodytą trukmę. (Automatic Translation)
