directive-if-to-string-null-check-help=Zestaw tej właściwość true aby #if stan wywołania toString() aby sprawdzić, czy wartości null. Na przykład jeśli właściwość jest zestaw do true, stan "#if ($layout)" będzie czynnie TRUE Jeśli $layout ma wartość null, lub jeśli $layout.toString() zwraca wartość null. (Automatic Translation)
resource-modification-check-interval-help=Zestaw to 0, aby załadować szablon źródła za każdym razem. Ustawienie tego parametru na wiele mniej niż 0 do ładowania szablonów raz i buforować je w nieskończoność. Zestaw to liczbę większą niż 0 (w milisekundach) do ładowania szablonów i buforować je na określony czas. (Automatic Translation)
