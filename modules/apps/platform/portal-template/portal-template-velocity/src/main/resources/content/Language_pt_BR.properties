directive-if-to-string-null-check-help=Defina essa propriedade para true para que o #if condição chamada ToString () para verificar se há valores nulos. Por exemplo, se a propriedade estiver definida como true, a condição de "#if ($layout)" irá avaliar como true se $layout é nulo, ou se $layout.toString() retorna null. (Automatic Translation)
resource-modification-check-interval-help=Conjunto para 0 para carregar o modelo de fonte de cada vez. Defina um número menor do que 0 para carregar modelos de uma vez e cache-los indefinidamente. Defina isso para um número maior que 0 (em milissegundos) para carregar modelos e cache-los da duração especificada. (Automatic Translation)
