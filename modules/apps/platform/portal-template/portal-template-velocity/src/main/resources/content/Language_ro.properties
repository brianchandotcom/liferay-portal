directive-if-to-string-null-check-help=Setaţi această proprietate adevărat să aibă starea #if apel toString() pentru a verifica pentru valori nule. De exemplu, dacă proprietatea este setată la true, starea "#if ($layout)" va evalute la true dacă $layout este nulă sau dacă $layout.toString() întoarce null. (Automatic Translation)
resource-modification-check-interval-help=Set this la spre 0 pentru a încărca şablonul sursa de fiecare dată. Aceasta setată la un număr mai mic decât 0 pentru a încărca template-uri o dată şi cache-le la nesfârşit. Seta acest lucru pentru un număr mai mare decât 0 (în milisecunde) pentru a incarca template-uri şi cache-le durata specificată. (Automatic Translation)
