directive-if-to-string-null-check-help=Задайте это свойство в значение true, чтобы вызов toString() условие #if, чтобы проверить наличие значения null. Например если свойство имеет значение true, состояние «#if ($layout)» будет evalute значение true, если $layout имеет значение null или если $layout.toString() возвращает значение null. (Automatic Translation)
resource-modification-check-interval-help=Набор, это 0, чтобы загрузить шаблон источника каждый раз. Задайте число меньше 0 один раз загрузить шаблоны и кэшировать их на неопределенный срок. Установите это число больше 0 (в миллисекундах) для загрузки шаблонов и кэшировать их за указанный период времени. (Automatic Translation)
velocity.engine.configuration.name=Скорость двигателя (Automatic Translation)