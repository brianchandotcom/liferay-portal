directive-if-to-string-null-check-help=Túto vlastnosť môžete nastaviť True mať #if stav hovoru toString() skontrolovať hodnoty null. Napríklad, ak je vlastnosť nastavená na hodnotu true, podmienka "#if ($layout)" bude vyčíslenie True ak $layout má hodnotu null alebo $layout.toString() vráti hodnotu null. (Automatic Translation)
resource-modification-check-interval-help=Set to 0 načítať šablóny zdroj zakaždým. Nastaviť toto číslo menšie ako 0 načítať šablóny raz a cache je donekonečna. Nastaviť číslo väčšie ako 0 (v milisekundách potrebný) na načítanie šablóny a cache je pre zadané trvanie. (Automatic Translation)
