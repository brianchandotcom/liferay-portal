directive-if-to-string-null-check-help=Bu özelliği için null değerleri kontrol etmek için #if durumu arama toString() için true olarak ayarlayın. Örneğin, özelliğini true olarak, "#if ($layout)" koşul ayarlarsanız $layout null ise, ya da $layout.toString() null döndürür true olarak evalute olur. (Automatic Translation)
resource-modification-check-interval-help=Bu şablon yüklemek için 0 her zaman kaynak seti. Bu şablonları bir kez yüklemek ve onları süresiz olarak önbelleğe bir sayıya 0 ayarlayın. Bu bir sayıya (milisaniye cinsinden) 0'dan büyük şablonları yüklemek ve onları belirli süre için önbelleğe için ayarlayın. (Automatic Translation)
