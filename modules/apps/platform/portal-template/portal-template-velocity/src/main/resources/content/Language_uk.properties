directive-if-to-string-null-check-help=Значення цієї властивості true мати #if станом виклик toString() перевірити наявність значення null. Наприклад, якщо властивість має значення TRUE, за умови "#if ($layout)" буде evalute правда, якщо $layout має значення null або $layout.toString() повертається нульове значення. (Automatic Translation)
resource-modification-check-interval-help=Набір це 0 завантажити шаблон джерело будь-який час. Встановити це число менше, ніж 0 завантажити шаблони один раз і кешують їх на невизначений термін. Встановити це число більше 0 (у мілісекундах) для завантаження шаблонів і кешувати їх протягом зазначеного терміну. (Automatic Translation)
