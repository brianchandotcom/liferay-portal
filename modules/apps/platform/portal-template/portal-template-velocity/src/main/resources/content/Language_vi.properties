directive-if-to-string-null-check-help=Thiết lập này bất động sản thực sự có điều kiện #if gọi toString() để kiểm tra giá trị null. Ví dụ, nếu các tài sản được thiết lập True, tình trạng "#if ($layout)" sẽ evalute cho true Nếu $layout là null hoặc nếu $layout.toString() trả về null. (Automatic Translation)
resource-modification-check-interval-help=Bộ này đến 0 để tải các mẫu mã nguồn tất cả thời gian. Thiết lập này cho một số ít hơn 0 để tải mẫu một lần và bộ nhớ cache họ vô hạn định. Thiết lập này cho một số lớn hơn 0 (trong mili giây) để tải mẫu và bộ nhớ cache chúng trong thời gian quy định. (Automatic Translation)
