directive-if-to-string-null-check-help=将此属性设置为 true 可有 #if 条件调用 tostring () 来检查 null 值。例如，如果该属性设置为 true 时，"#if ($layout)"的条件将评定为 true，如果 $layout 是 null 或 $layout.toString()，则返回 null。 (Automatic Translation)
resource-modification-check-interval-help=设置为 0 来加载模板源每次。将此设置为小于 0 一次加载模板，并无限期缓存它们。此设置为数大于 0 (以毫秒为单位) 来加载模板和缓存它们指定的持续时间。 (Automatic Translation)
