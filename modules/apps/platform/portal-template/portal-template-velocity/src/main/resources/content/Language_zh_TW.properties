directive-if-to-string-null-check-help=將此屬性設置為 true 可有 #if 條件調用 tostring () 來檢查 null 值。例如，如果該屬性設置為 true 時，"#if ($layout)"的條件將評定為 true，如果 $layout 是 null 或 $layout.toString()，則返回 null。 (Automatic Translation)
resource-modification-check-interval-help=設置為 0 來載入範本源每次。將此設置為小於 0 一次載入範本，並無限期緩存它們。此設置為數大於 0 (以毫秒為單位) 來載入範本和緩存它們指定的持續時間。 (Automatic Translation)
