ds-delayed-keepInstances-help=Mﺣ۳ﺣ۳ritﺣ۳, sﺣ۳ilytetﺣ۳ﺣ۳nkﺣﭘ vai ei viivﺣ۳styneiden komponenttien instansseja, kun niihin ei enﺣ۳ﺣ۳ viitata. Declarative Services -mﺣ۳ﺣ۳ritys ehdottaa, ettﺣ۳ viivﺣ۳stettyjen komponenttien instanssit hﺣ۳vitetﺣ۳ﺣ۳n, jos niitﺣ۳ ei enﺣ۳ﺣ۳ kﺣ۳ytetﺣ۳. Tﺣ۳mﺣ۳n lipun asettaminen aiheuttaa sen, ettﺣ۳ komponentteja ei hﺣ۳vitetﺣ۳, ja nﺣ۳in estetﺣ۳ﺣ۳n niiden toistuva uudelleenluominen, jos niitﺣ۳ kﺣ۳ytetﺣ۳ﺣ۳n usein. Esimerkkejﺣ۳ nﺣ۳istﺣ۳ komponenteista voivat olla EventHandler-palvelut. Oletusarvo on hﺣ۳vittﺣ۳ﺣ۳ kﺣ۳yttﺣ۳mﺣ۳ttﺣﭘmﺣ۳t komponentit.
