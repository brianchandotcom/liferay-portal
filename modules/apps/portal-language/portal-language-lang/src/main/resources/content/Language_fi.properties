org-apache-felix-eventadmin-AsyncToSyncThreadRatio=Asynk./Synkr. Sﺣ۳ikeen Poolisuhde
org-apache-felix-eventadmin-AsyncToSyncThreadRatio-help=Mﺣ۳ﺣ۳ritﺣ۳ asynkronisten sﺣ۳ikeiden suhde synkronisiin sﺣ۳ikeisiin sisﺣ۳isessﺣ۳ sﺣ۳iepoolissa. Suhteen on oltava positiivinen ja sitﺣ۳ voidaan sﺣ۳ﺣ۳tﺣ۳ﺣ۳ edustamaan lﺣ۳hetettﺣ۳vﺣ۳ksi lﺣ۳hettﺣ۳mistoimenpiteiden jakaumaa. Sovelluksilla, joilla on enemmﺣ۳n lﺣ۳hetysoperaatioita, tﺣ۳ytyy olla suurempi suhde.
org-apache-felix-eventadmin-IgnoreTimeout=Jﺣ۳tﺣ۳ Aikakatkaisut Huomiotta
org-apache-felix-eventadmin-IgnoreTimeout-help=Mﺣ۳ﺣ۳ritﺣ۳ tapahtumakﺣ۳sittelijﺣ۳t, joita kutsutaan ilman aikakatkaisua. Jos aikakatkaisu on mﺣ۳ﺣ۳ritelty oletusarvoisesti, niin kaikkia tapahtumien kﺣ۳sittelijﺣﭘitﺣ۳ kutsutaan aikakatkaisun kanssa. Suorituskyvyn optimointia varten on mahdollista mﺣ۳ﺣ۳rittﺣ۳ﺣ۳ tapahtumakﺣ۳sittelijﺣﭘitﺣ۳, joissa aikakatkaisun kﺣ۳sittelyﺣ۳ ei kﺣ۳ytetﺣ۳. Tﺣ۳mﺣ۳ vﺣ۳hentﺣ۳ﺣ۳ sﺣ۳ikeiden kﺣ۳yttﺣﭘﺣ۳ sﺣ۳iepooleista, koska aikakatkaisun kﺣ۳sittely vaatii lisﺣ۳sﺣ۳ikeen tapahtumakﺣ۳sittelijﺣ۳n kutsumiseksi. Sovelluksen on kuitenkin toimittava oikein ilman tﺣ۳tﺣ۳ mﺣ۳ﺣ۳ritystﺣ۳. Kyse on puhtaasta optimoinnista. Arvo on luettelo merkkijonoja. Jos merkkijono pﺣ۳ﺣ۳ttyy pisteeseen, kaikki juuri tﺣ۳mﺣ۳n paketin kﺣ۳sittelijﺣ۳t jﺣ۳tetﺣ۳ﺣ۳n huomiotta. Jos merkkijono pﺣ۳ﺣ۳ttyy tﺣ۳hteen, kaikki tﺣ۳mﺣ۳n paketin ja kaikkien alipakettien kﺣ۳sittelijﺣ۳t jﺣ۳tetﺣ۳ﺣ۳n huomiotta. Jos merkkijono ei lopu pisteeseen eikﺣ۳ tﺣ۳hteen, sen oletetaan mﺣ۳ﺣ۳rittﺣ۳vﺣ۳n tarkan luokan nimien.
org-apache-felix-eventadmin-IgnoreTopic=Jﺣ۳tﺣ۳ Aiheet Huomioimatta
org-apache-felix-eventadmin-IgnoreTopic-help=Mﺣ۳ﺣ۳ritﺣ۳ aiheet, jotka tapahtuman yllﺣ۳pitﺣ۳jﺣ۳n toteutus jﺣ۳ttﺣ۳ﺣ۳ huomiotta suorituskyvyn optimoinnin takia. Siinﺣ۳ tapauksessa tapahtumia ei toimiteta rekisterﺣﭘidyille tapahtuman kﺣ۳sittelijﺣﭘille. Arvo on merkkijonoluettelo (pilkuilla erotettuna). Jos yksittﺣ۳inen arvo pﺣ۳ﺣ۳ttyy pisteeseen, kaikki juuri tﺣ۳mﺣ۳n paketin aiheet jﺣ۳tetﺣ۳ﺣ۳n huomiotta. Jos yksittﺣ۳inen arvo pﺣ۳ﺣ۳ttyy tﺣ۳hteen, kaikki tﺣ۳mﺣ۳n paketin ja kaikkien alipakettien aiheet jﺣ۳tetﺣ۳ﺣ۳n huomiotta. Yksittﺣ۳istﺣ۳ tﺣ۳hteﺣ۳ voidaan kﺣ۳yttﺣ۳ﺣ۳ poistamaan toimitus kokonaan kﺣ۳ytﺣﭘstﺣ۳.
org-apache-felix-eventadmin-RequireTopic=Vaadi Aihe
org-apache-felix-eventadmin-RequireTopic-help=Mﺣ۳ﺣ۳ritﺣ۳, onko tapahtumakﺣ۳sittelijﺣﭘiden rekisterﺣﭘidyttﺣ۳vﺣ۳ aiheen kanssa. Tﺣ۳mﺣ۳ on oletusarvoisesti kﺣ۳ytﺣﭘssﺣ۳. Mﺣ۳ﺣ۳ritys sanoo, ettﺣ۳ tapahtumakﺣ۳sittelijﺣﭘiden on rekisterﺣﭘidyttﺣ۳vﺣ۳ niiden aiheiden luettelon kanssa, joista ne ovat kiinnostuneita. Tﺣ۳mﺣ۳n asetuksen poistaminen kﺣ۳ytﺣﭘstﺣ۳ mahdollistaa ilman aihetta olevien kﺣ۳sittelijﺣﭘiden saada kaikki tapahtumat (ts. niitﺣ۳ kﺣ۳sitellﺣ۳ﺣ۳n kuin jos aihe=*).
org-apache-felix-eventadmin-ThreadPoolSize=Sﺣ۳iepoolin Koko
org-apache-felix-eventadmin-ThreadPoolSize-help=Mﺣ۳ﺣ۳ritﺣ۳ tapahtuman toimituksessa kﺣ۳ytetyn sﺣ۳iepoolin koko. Oletusarvo on 20. Kasvata, jos tapahtumien mﺣ۳ﺣ۳rﺣ۳ on suuri. Pienempi arvo kuin 2 laukaisee oletusarvon. Jos pooli on tyhjﺣ۳, tapahtuman toimitus estetﺣ۳ﺣ۳n, kunnes pooliin tulee sﺣ۳ie saataville. Jokainen tapahtuma toimtetaan poolin sﺣ۳ikeessﺣ۳, ellei ohitusaikakatkaisuja mﺣ۳ﺣ۳ritetﺣ۳ vastaanottavalle tapahtumien kﺣ۳sittelijﺣ۳lle.
org-apache-felix-eventadmin-Timeout=Aikakatkaisu
org-apache-felix-eventadmin-Timeout-help=Mﺣ۳ﺣ۳ritﺣ۳ mustan listan aikakatkaisu millisekunteina. Oletusarvo on 5000. Lisﺣ۳ﺣ۳ tai vﺣ۳hennﺣ۳ oman harkintasi mukaan. Alle 100 oleva arvo kytkee aikakatkaisun pois. Kaikki muut arvot ovat se aika millisekunteina, joka annetaan jokaiselle tapahtumien kﺣ۳sittelijﺣ۳lle ennen kuin se joutuu mustalle listalle.
org-apache-felix-eventadmin-ocd-help=Mﺣ۳ﺣ۳ritﺣ۳ Apache Felix Event -yllﺣ۳pitﺣ۳jﺣ۳n toteutus. Tﺣ۳mﺣ۳ mﺣ۳ﺣ۳ritys ohittaa samannimisissﺣ۳ puitekehyksen ominaisuuksissa annetun mﺣ۳ﺣ۳rityksen.
