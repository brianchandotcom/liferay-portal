cookies-consent-description=Kun vierailet millûÊ tahansa verkkosivustolla, se saattaa tallentaa tai noutaa tietoa selaimessasi, enimmûÊkseen evûÊsteiden muodossa. NûÊmûÊ tiedot voivat koskea sinua, asetuksiasi tai laitettasi, ja niitûÊ kûÊytetûÊûÊn enimmûÊkseen saamaan sivusto toimimaan odotetulla tavalla. NûÊistûÊ tiedoista ei voi yleensûÊ tunnistaa sinua suoraan, mutta ne voivat antaa sinulle personoidumman verkkokokemuksen. Voit pûÊûÊttûÊûÊ olla sallimatta joitakin evûÊstetyyppejûÊ. Napsauta eri luokkien otsikoita lukeaksesi lisûÊûÊ ja muuttaaksesi oletusasetuksiasmme. Tietyn tyyppisten evûÊsteiden estûÊminen voi kuitenkin vaikuttaa kokemukseesi sivustolla ja palveluihin, joita voimme tarjota.
cookies-description[CONSENT_TYPE_FUNCTIONAL]=NûÊiden evûÊsteiden avulla verkkosivusto voi tarjota parempia toimintoja ja personointia. Ne voivat olla meidûÊn tai kolmansien osapuolten asettamia, joiden palveluita olemme lisûÊnneet sivuillemme. Jos et salli nûÊitûÊ evûÊsteitûÊ, osa tai kaikki nûÊistûÊ palveluista eivûÊt vûÊlttûÊmûÊttûÊ toimi oikein.
