detail-low-contrast-ratio-tip=Teksti, joka on 18 pt tai 14 pt ja lihavoitu, tarvitsee kontrastisuhteen 3:1. Kaikki muu teksti tarvitsee kontrastisuhteen 4.5:1. Kontrasti eri vﺣ۳rien vﺣ۳lillﺣ۳ voi olla mﺣ۳ﺣ۳ritetty tyylikirjassa, sivun tai sivunosan mallissa tai sivunosassa itsessﺣ۳ﺣ۳n.
