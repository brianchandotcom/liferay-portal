detail-incorrect-image-aspect-ratios-description=Sivu nﺣ۳yttﺣ۳ﺣ۳ kuvat vﺣ۳ﺣ۳rﺣ۳ssﺣ۳ kuvasuhteessa. Jos hahmonnetulla kuvalla on kuvasuhde, joka poikkeaa merkittﺣ۳vﺣ۳sti sen lﺣ۳hdetiedoston kuvasuhteesta, hahmonnettu kuva voi nﺣ۳yttﺣ۳ﺣ۳ vﺣ۳ﺣ۳ristyneeltﺣ۳, mikﺣ۳ saattaa aiheuttaa epﺣ۳miellyttﺣ۳vﺣ۳n kﺣ۳yttﺣﭘkokemuksen. {0}
