javax.portlet.description.com_liferay_oauth2_provider_web_internal_portlet_OAuth2AdminPortlet=Valtuuttaa kolmannen osapuolen sovelluksille turvallisen pﺣ۳ﺣ۳syn kﺣ۳yttﺣ۳jﺣ۳n resursseihin antamatta niille salasanoja.
javax.portlet.description.com_liferay_password_policies_admin_web_portlet_PasswordPoliciesAdminPortlet=Salasanakﺣ۳ytﺣ۳nnﺣﭘt mﺣ۳ﺣ۳rittﺣ۳vﺣ۳t yritystason suojaustoimenpiteitﺣ۳, muun muassa kﺣ۳yttﺣ۳jﺣ۳n lukitseminen ja salasanan vanhentuminen. Voit mﺣ۳ﺣ۳rittﺣ۳ﺣ۳ kﺣ۳ytﺣ۳nnﺣﭘt tai delegoida LDAP-palvelimelle.
javax.portlet.description.com_liferay_plugins_admin_web_portlet_PluginsAdminPortlet=Komponenttien avulla voit ottaa kﺣ۳yttﺣﭘﺣﭘn tai poistaa kﺣ۳ytﺣﭘstﺣ۳ komponenttityyppejﺣ۳, kuten portletteja, teemoja ja asettelumalleja.
javax.portlet.description.com_liferay_portal_instances_web_portlet_PortalInstancesPortlet=Virtuaalisten esiintymien avulla voit ajaa useita Liferayn esiintymiﺣ۳ yhdellﺣ۳ palvelimella. Vaikka esiintymillﺣ۳ on sama tietokanta, niiden kﺣ۳yttﺣ۳jﺣ۳t, sivustot, organisaatiot, roolit, asetukset jne. ovat riippumattomia esiintymittﺣ۳in.
javax.portlet.description.com_liferay_portal_search_admin_web_portlet_SearchAdminPortlet=Haun asetusten ohjausindeksointi ja muut hakukoneen ominaisuudet.
javax.portlet.description.com_liferay_portal_settings_web_portlet_PortalSettingsPortlet=Instanssiasetukset sisﺣ۳ltﺣ۳vﺣ۳t globaalit, mﺣ۳ﺣ۳ritettﺣ۳vﺣ۳t instanssiasetukset, kuten nimi, todennus, oletuskﺣ۳yttﺣ۳jﺣ۳liitynnﺣ۳t ja sﺣ۳hkﺣﭘposti-isﺣ۳nnﺣ۳n nimet.
javax.portlet.description.com_liferay_portal_workflow_instance_tracker_web_internal_portlet_WorkflowInstanceTrackerPortlet=Tyﺣﭘnkulkuinstanssin seuranta
javax.portlet.description.com_liferay_portal_workflow_web_internal_portlet_SiteAdministrationWorkflowPortlet=Mﺣ۳ﺣ۳ritﺣ۳ tyﺣﭘnkulkuprosesseja sisﺣ۳llﺣﭘille ja valvo tﺣ۳mﺣ۳nhetkisiﺣ۳ prosesseja.
javax.portlet.description.com_liferay_portal_workflow_web_internal_portlet_UserWorkflowPortlet=Luettelee aloittamasi tyﺣﭘnkulun prosessit.
javax.portlet.description.com_liferay_roles_admin_web_portlet_RolesAdminPortlet=Roolit ovat portaalissa tietyn soveltamisalueen mukaisesti tietyn toiminnon jakavien kﺣ۳yttﺣ۳jien ryhmityksiﺣ۳. Voit lisﺣ۳tﺣ۳ rooleja, joilla voidaan antaa oikeuksia tiettyihin toimintoihin portlet-sovellusten sisﺣ۳llﺣ۳.
javax.portlet.description.com_liferay_segments_web_internal_portlet_SegmentsPortlet=Segmentti edustaa joukkoa kﺣ۳yttﺣ۳jiﺣ۳, jotka tﺣ۳yttﺣ۳vﺣ۳t tietyt vaatimukset. Segmenttejﺣ۳ voidaan kﺣ۳yttﺣ۳ﺣ۳ luotaessa mukautettja kokemuksia niiden jﺣ۳senille. Yllﺣ۳pitﺣ۳jﺣ۳t voivat lisﺣ۳tﺣ۳, katsella, esikastella jﺣ۳seniﺣ۳, pﺣ۳ivittﺣ۳ﺣ۳ ja poistaa segmenttejﺣ۳.
javax.portlet.description.com_liferay_server_admin_web_portlet_ServerAdminPortlet=Palvelimen hallinnan asetukset ohjaavat lokeja, vﺣ۳limuistia, indeksointia ja muita kehittyneitﺣ۳ ominaisuuksia. Voit tarkkailla jﺣ۳rjestelmﺣ۳n suorituskykyﺣ۳, muuttaa yksityiskohtaisia asetuksia, indeksoida hakuja ja muokata vﺣ۳limuistia.
javax.portlet.description.com_liferay_site_admin_web_portlet_SiteAdminPortlet=Sivustot ovat kokoelma sivuja, jotka nﺣ۳yttﺣ۳vﺣ۳t sisﺣ۳ltﺣﭘﺣ۳ ja tarjoavat pﺣ۳ﺣ۳syn tiettyihin sovelluksiin. Sivustoilla voi olla jﺣ۳seniﺣ۳, joille voidaan mﺣ۳ﺣ۳rittﺣ۳ﺣ۳ oikeuksia tietyille sivuille ja sisﺣ۳llﺣﭘille.
javax.portlet.description.com_liferay_site_teams_web_portlet_SiteTeamsPortlet=Tiimit ovat joukko sivuston jﺣ۳seniﺣ۳. Sivuston yllﺣ۳pitﺣ۳jﺣ۳ voi antaa oikeuksia tiimeille kuten rooleille.
javax.portlet.description.com_liferay_staging_configuration_web_portlet_StagingConfigurationPortlet=Vaihestetunjulkaisun asetukset mahdollistavat pﺣ۳ﺣ۳syn sivuston vaiheistetunjulkasun asetuksiin.
javax.portlet.description.com_liferay_trash_web_portlet_TrashPortlet=Roskakori nﺣ۳yttﺣ۳ﺣ۳ kaikki kﺣ۳yttﺣ۳jien poistamat sisﺣ۳llﺣﭘt. Sisﺣ۳llﺣﭘt voidaan palauttaa tai poistaa pysyvﺣ۳sti.
javax.portlet.description.com_liferay_user_groups_admin_web_portlet_UserGroupsAdminPortlet=Kﺣ۳ytﺣ۳jﺣ۳ryhmﺣ۳t tarjoavat tavan ryhmitellﺣ۳ kﺣ۳yttﺣ۳jiﺣ۳ riippumatta organisaatioista, joihin he kuuluvat. Voit mﺣ۳ﺣ۳ritellﺣ۳ kﺣ۳yttﺣ۳jﺣ۳ryhmﺣ۳n ja liittﺣ۳ﺣ۳ kﺣ۳yttﺣ۳jﺣ۳ryhmﺣ۳n sivuston jﺣ۳seneksi, jolloin kaikista sen kﺣ۳yttﺣ۳jistﺣ۳ tulee automaattisesti jﺣ۳seniﺣ۳.
javax.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=Kﺣ۳yttﺣ۳jﺣ۳t ovat yksilﺣﭘitﺣ۳, jotka suorittavat tehtﺣ۳viﺣ۳ portaalin avulla. Voit luoda uusia kﺣ۳yttﺣ۳jiﺣ۳ tai poistaa olemassa olevien kﺣ۳yttﺣ۳jien aktivointeja. Kﺣ۳yttﺣ۳jﺣ۳t voivat liittyﺣ۳ sivustoille, sijoittua organisaatiohierarkkiaan, saada oikeuksia roolien perusteella, tai niitﺣ۳ voidaan koota ryhmiksi. Kﺣ۳yttﺣ۳jﺣ۳ryhmﺣ۳t voivat ylittﺣ۳ﺣ۳ organisaatiorajat., ja niitﺣ۳ voidaan kﺣ۳yttﺣ۳ﺣ۳ liittﺣ۳mﺣ۳ﺣ۳n kaikki jﺣ۳senet muuhun kokoelmaan, kuten sivustoon tai rooleihin. Kﺣ۳yttﺣ۳jﺣ۳ryhmiﺣ۳ voidaan myﺣﭘs kﺣ۳yttﺣ۳ﺣ۳ muokkaamaan jﺣ۳senten henkilﺣﭘkohtaisia sivustomalleja.
javax.portlet.description.com_liferay_wiki_web_portlet_WikiAdminPortlet=Wiki on sosiaalinen ja yhteisﺣﭘllinen sanakirja, mikﺣ۳ mahdollistaa tietojen jakamisen kﺣ۳yttﺣ۳jien kesken. Yllﺣ۳pitﺣ۳jﺣ۳t voivat lisﺣ۳tﺣ۳, muokata wiki-sivuja, sekﺣ۳ mﺣ۳ﺣ۳rittﺣ۳ﺣ۳ kﺣ۳yttﺣﭘoikeuksia ja asetuksia.
