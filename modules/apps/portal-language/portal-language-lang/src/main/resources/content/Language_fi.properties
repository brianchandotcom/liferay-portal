detail-illegible-font-sizes-description=Monet hakukoneet rankkaavat sivuja niiden mobiiliystﺣ۳vﺣ۳llisyyden perusteella. Alle 12 pikselin fonttikoot ovat usein vaikeita lukea mobiililaitteilla, ja ne voivat vaatia kﺣ۳yttﺣ۳jﺣ۳ﺣ۳ lﺣ۳hentﺣ۳mﺣ۳ﺣ۳n tekstin nﺣ۳yttﺣ۳miseksi miellyttﺣ۳vﺣ۳ssﺣ۳ lukukoossa. {0}
detail-illegible-font-sizes-tip=Tﺣ۳mﺣ۳ ongelma esiintyy, kun vﺣ۳hintﺣ۳ﺣ۳n 60 prosentilla tekstistﺣ۳ on alle 12 pikselin fonttikoko. Tarkista fonttikoot verkkosisﺣ۳ltﺣﭘeditorissa, sivunosassa, mallissa tai tyylikirjassa lﺣﭘytﺣ۳ﺣ۳ksesi sﺣ۳ﺣ۳ntﺣﭘ, joka aiheuttaa vaikealukuisen tekstin.
