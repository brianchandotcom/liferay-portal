detail-invalid-canonical-url=Virheellinen kanoninen URL
detail-invalid-canonical-url-description=Kun useilla sivuilla on samankaltaista sisﺣ۳ltﺣﭘﺣ۳, hakukoneet pitﺣ۳vﺣ۳t niitﺣ۳ saman sivun kaksoiskappaleina. Kelvollisilla kanonisilla linkeillﺣ۳ voit ilmoittaa hakukoneille mikﺣ۳ sivun versio niiden tulisi indeksoida ja nﺣ۳yttﺣ۳ﺣ۳ kﺣ۳yttﺣ۳jille hakutuloksissa. {0}
detail-invalid-canonical-url-failing-element=Jos ongelmana on, ettﺣ۳ kanoninen URL ei vastaa sivun URL-osoitetta, kokeile muuttaa lokalisoitujen kanonisten URL-osoitteiden kﺣ۳ytﺣﭘn mﺣ۳ﺣ۳ritys kohdassa {0}Portaalin asetukset > Sivut > SEO{1}.
detail-invalid-canonical-url-tip=Liferay-sivustolla kanoniset URL-osoitteet luodaan automaattisesti. Jos se puuttuu, ongelma voi johtua teemasta. Jos ongelmana on, ettei se vastaa sivun URL-osoitetta, voit muuttaa lokalisoitujen kanonisten URL-osoitteiden kﺣ۳ytﺣﭘn mﺣ۳ﺣ۳ritys kohdassa Portaalin asetukset > Sivut > SEO.
detail-invalid-hreflang=Virheellinen Hreflang
detail-invalid-hreflang-description=Monet sivustot tarjoavat eri versioita sivusta kﺣ۳yttﺣ۳jﺣ۳n kielen tai alueen mukaan. Hreflang-linkit kertovat hakukoneille sivun kaikkien versioiden URL-osoitteet, jotta ne voivat nﺣ۳yttﺣ۳ﺣ۳ oikean version kullekin kielelle tai alueelle. {0}
detail-invalid-hreflang-tip=Liferay-sivustolla hreflang-linkit luodaan automaattisesti. Jos se puuttuu tai on virheellinen, ongelma voi johtua teemasta tai Open Graph-laajennuspisteestﺣ۳.
detail-link-texts=Linkkien tekstit
detail-link-texts-description=Linkin teksti on napsautettavissa oleva sana tai lause hyperlinkissﺣ۳. Kun linkin teksti ilmoittaa selvﺣ۳sti hyperlinkin kohteen, sekﺣ۳ kﺣ۳yttﺣ۳jﺣ۳t ettﺣ۳ hakukoneet voivat ymmﺣ۳rtﺣ۳ﺣ۳ helpommin sisﺣ۳ltﺣﭘﺣ۳si sekﺣ۳ sitﺣ۳, miten se liittyy muihin sivuihin. {0}
detail-link-texts-tip=Tee linkkien teksteistﺣ۳ kuvaavampia vﺣ۳lttﺣ۳mﺣ۳llﺣ۳ ilmaisuja, kuten "napsauta tﺣ۳stﺣ۳", "napsauta tﺣ۳tﺣ۳" tai "lisﺣ۳tietoja".
detail-low-contrast-ratio=Pieni kontrastisuhde
