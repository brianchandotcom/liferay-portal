components:
    schemas:
        Language:
            properties:
                createDate:
                    format: date
                    readOnly: true
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                key:
                    type: string
                languageId:
                    type: string
                modifiedDate:
                    format: date
                    readOnly: true
                    type: string
                override:
                    readOnly: true
                    type: boolean
                value:
                    type: string
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.portal.language.rest.client', and version '1.0.0'."
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: "Language"
    version: v1.0
openapi: 3.0.1
paths:
    "/languages":
        get:
            operationId: getLanguagesPage
            parameters:
                - in: query
                  explode: true
                  name: keys
                  required: true
                  schema:
                      items:
                          type: string
                      type: array
                  style: form
                - in: query
                  name: languageId
                  required: true
                  schema:
                      type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Language"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Language"
                                type: array
            tags: ["Language"]
        post:
            operationId: postLanguage
            parameters:
                - in: query
                  name: languageId
                  required: false
                  schema:
                      type: string
            requestBody:
                content:
                    multipart/form-data:
                        schema:
                            properties:
                                file:
                                    format: binary
                                    type: string
                            type: object
            responses:
                200:
                    content:
                        application/json: {}
                        application/xml: {}
                400:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["Language"]
        put:
            operationId: putLanguage
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Language"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Language"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Language"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Language"
            tags: ["Language"]
    "/languages/by-key":
        delete:
            operationId: deleteLanguageByKey
            parameters:
                - in: query
                  name: key
                  required: true
                  schema:
                      type: string
                - in: query
                  name: languageId
                  required: false
                  schema:
                      type: string
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["Language"]