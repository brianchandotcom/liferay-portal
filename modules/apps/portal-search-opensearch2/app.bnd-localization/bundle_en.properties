liferay-releng-app-description=This app integrates Liferay DXP with OpenSearch 2.12+.<br />OpenSearch is an open-source, enterprise-grade search engine and observability suite with lexical search for text-based data, vector search for applications using embeddings like Liferay's Semantic Search, and robust scalability and extensibility.<br />The installation of this app requires specific configurations covered in the official documentation. Once installed, enabled, and configured, Liferay DXP communicates with a self-managed OpenSearch 2 cluster for indexing and searching. For detailed compatibility information, see the Search Engine Compatibility Matrix: https://help.liferay.com/hc/en-us/articles/360016511651.