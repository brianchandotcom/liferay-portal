liferay-releng-app-description=Ce connecteur intègre Liferay DXP à OpenSearch 2.12+, le moteur de recherche open source de niveau entreprise.<br />OpenSearch offre une recherche lexicale pour les données textuelles, une évolutivité et une extensibilité robustes, ainsi qu'une recherche vectorielle pour les applications utilisant des intégrations, comme la recherche sémantique de Liferay.<br />L'installation de cette application nécessite des configurations spécifiques décrites dans la documentation officielle. Pour plus d'informations sur la compatibilité, consultez la matrice de compatibilité des moteurs de recherche : https://help.liferay.com/hc/en-us/articles/360016511651.