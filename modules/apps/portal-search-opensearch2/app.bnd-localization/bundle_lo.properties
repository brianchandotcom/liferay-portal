liferay-releng-app-description=ຕົວເຊື່ອມຕໍ່ນີ້ລວມ Liferay DXP ເຂົ້າກັບ OpenSearch 2, ເຊິ່ງເປັນເຄື່ອງຈັກຄົ້ນຫາລະດັບອົງກອນແບບໂອເພັນຊອດ (open source).<br />OpenSearch ສະເໜີການຄົ້ນຫາແບບເລັກຊິກອນ (lexical search) ສຳລັບຂໍ້ມູນຂໍ້ຄວາມ, ຄວາມສາມາດໃນການຂະຫຍາຍຕົວ ແລະ ການເພີ່ມສ່ວນຂະຫຍາຍທີ່ແຂງແກ່ນ, ແລະ ການຄົ້ນຫາແບບເວັກເຕີ (vector search) ສຳລັບແອັບພລິເຄຊັນທີ່ໃຊ້ embeddings ເຊັ່ນ Semantic Search ຂອງ Liferay.<br />ການຕິດຕັ້ງແອັບນີ້ຕ້ອງການການກຳນົດຄ່າສະເພາະທີ່ລະບຸໄວ້ໃນເອກະສານທາງການ. ສຳລັບຂໍ້ມູນຄວາມເຂົ້າກັນໄດ້ຢ່າງລະອຽດ, ເບິ່ງຕາຕະລາງຄວາມເຂົ້າກັນໄດ້ຂອງເຄື່ອງຈັກຄົ້ນຫາ: https://help.liferay.com/hc/en-us/articles/360016511651.