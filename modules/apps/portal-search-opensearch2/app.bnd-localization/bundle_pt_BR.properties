liferay-releng-app-description=Este conector integra o Liferay DXP ao OpenSearch 2.12 ou superior, uma plataforma de busca de nível corporativo e de código aberto.<br />O OpenSearch oferece pesquisa lexical para dados de texto, escalabilidade e extensibilidade avançadas, além de suporte à pesquisa vetorial para cenários baseados em embeddings, como a Pesquisa Semântica do Liferay.<br />A instalação deste aplicativo requer configurações específicas descritas na documentação oficial. Para obter informações detalhadas sobre compatibilidade, consulte a Matriz de compatibilidade do mecanismo de pesquisa:\nhttps://help.liferay.com/hc/en-us/articles/360016511651.