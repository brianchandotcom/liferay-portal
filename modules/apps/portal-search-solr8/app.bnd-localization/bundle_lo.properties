liferay-releng-app-description=ແອັບນີ້ລວມ Liferay DXP ເຂົ້າກັບ Apache Solr 8, ເຊິ່ງເປັນແພລດຟອມການຄົ້ນຫາລະດັບອົງກອນແບບໂອເພັນຊອດຍອດນິຍົມຈາກໂຄງການ Apache Lucene. Solr ປະກອບມີການຄົ້ນຫາແບບເຕັມຮູບແບບທີ່ມີປະສິດທິພາບ, ການເນັ້ນຄຳຄົ້ນຫາ, ການຄົ້ນຫາແບບແຍກກຸ່ມ (faceted search), ການຈັດກຸ່ມແບບໄດນາມິກ, ການເຊື່ອມຕໍ່ຖານຂໍ້ມູນ, ການຈັດການເອກະສານທີ່ຫຼາກຫຼາຍ (ເຊັ່ນ Word, PDF) ແລະ ການຄົ້ນຫາຂໍ້ມູນທາງພູມສາດ. Solr ສາມາດຂະຫຍາຍຕົວໄດ້ສູງ, ໃຫ້ການຄົ້ນຫາແບບກະຈາຍ ແລະ ການຈຳລອງດັດຊະນີ, ແລະ ມັນເປັນຫົວໃຈຫຼັກຂອງຄຸນສົມບັດການຄົ້ນຫາ ແລະ ການນຳທາງຂອງເວັບໄຊທີ່ໃຫຍ່ທີ່ສຸດຫຼາຍແຫ່ງໃນໂລກ. ການຕິດຕັ້ງແອັບນີ້ຕ້ອງການການກຳນົດຄ່າສະເພາະທີ່ລະບຸໄວ້ໃນເອກະສານທາງການ. ເມື່ອຕິດຕັ້ງ, ເປີດໃຊ້ ແລະ ກຳນົດຄ່າແອັບນີ້ແລ້ວ, Liferay DXP ຈະສື່ສານກັບເຊີບເວີ Solr 8 ທີ່ຕິດຕັ້ງໄວ້ທາງໄກເພື່ອເຮັດດັດຊະນີ ແລະ ຄົ້ນຫາ.<br />ສຳລັບຂໍ້ມູນຄວາມເຂົ້າກັນໄດ້ຢ່າງລະອຽດ, ລວມທັງເວີຊັນຍ່ອຍຂອງ Solr 8 ທີ່ເຂົ້າກັນໄດ້ ແລະ ລະດັບ patch ຂອງ Liferay DXP ທີ່ຕ້ອງການ, ເບິ່ງຕາຕະລາງຄວາມເຂົ້າກັນໄດ້ຂອງລະບົບຄົ້ນຫາ: https://help.liferay.com/hc/en-us/articles/360016511651.