                            type: array
                required: false
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/SuggestionsContributorResults"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/SuggestionsContributorResults"
                                type: array
            tags: ["Suggestion"]