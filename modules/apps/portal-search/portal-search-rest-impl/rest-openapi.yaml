                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: keywordsParameterName
                    schema:
                        type: string
                -   in: query
                    name: plid
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: scope
                    schema:
                        type: string
                -   in: query
