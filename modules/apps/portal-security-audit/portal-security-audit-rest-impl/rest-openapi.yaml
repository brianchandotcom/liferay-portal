                    type: object
                clientHost:
                    readOnly: true
                    type: string
                clientIP:
                    readOnly: true
                    type: string
                contextName:
                    readOnly: true
                    type: string
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    format: date-time
                    readOnly: true
                    type: string
