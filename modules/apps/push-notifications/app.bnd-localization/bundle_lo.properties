liferay-releng-app-description=ແອັບ Liferay Push ນຳສະເໜີໂຄງຮ່າງ (framework) ທີ່ຊ່ວຍໃຫ້ຜູ້ພັດທະນາສົ່ງການແຈ້ງເຕືອນແບບພຸຊ (push notifications) ສົ່ງຈາກ Liferay ໄປຫາແອັບ Android ແລະ iOS ຕົ້ນສະບັບ. ດ້ວຍການນຳໃຊ້ Liferay Push, ທ່ານສາມາດໝັ້ນໃຈໄດ້ວ່າຜູ້ໃຊ້ຂອງທ່ານຈະໄດ້ຮັບຂໍ້ມູນຫຼ້າສຸດໃນ Liferay instance ຂອງທ່ານ ບໍ່ວ່າພວກເຂົາຈະຢູ່ໃສກໍຕາມ. ລະບົບ Push ຍັງເຮັດວຽກຮ່ວມກັບ Liferay Screens ໄດ້ຢ່າງລຽບງ່າຍ. ການຕິດຕັ້ງແອັບ Liferay Push ຈະເປີດໃຊ້ໂຄງຮ່າງການສົ່ງການແຈ້ງເຕືອນໂດຍອັດຕະໂນມັດ. ແອັບນີ້ຍັງມີພອດເລັດໃນ ແຜງຄວບຄຸມ ທີ່ທ່ານສາມາດໃຊ້ເພື່ອທົດລອງສົ່ງການແຈ້ງເຕືອນໄດ້.