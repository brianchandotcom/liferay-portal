import com.liferay.gradle.util.OSDetector
import com.liferay.gradle.util.StringUtil

import java.text.DateFormat
import java.text.SimpleDateFormat

import java.util.Date
import java.util.TimeZone

import org.gradle.util.GUtil

apply plugin: "com.liferay.node"

configurations {
	extraRemoteApp
}

task buildExtraApps
task forceDeploy
task processExtraApps
task zipExtraRemoteApp(type: Zip)

String extraRemoteAppName = "com.liferay.site.initializer.raylife.extra.remote.app"
String extraRemoteAppVersion = "20211229.2203"

DateFormat dateFormat = new SimpleDateFormat("yyyyMMdd.HHmm")

dateFormat.setTimeZone(TimeZone.getTimeZone("UTC"))

String dateString = dateFormat.format(new Date())

artifacts {
	extraRemoteApp zipExtraRemoteApp
}

dependencies {
	extraRemoteApp ext: "zip", group: "com.liferay", name: extraRemoteAppName, version: extraRemoteAppVersion
}

forceDeploy {
	finalizedBy deploy
}

node {
	global = false
	nodeVersion = "14.17.6"
	useNpm = false
}

processExtraApps {
	mustRunAfter buildExtraApps

	doLast {
		File reactFragmentsSrcDir = new File(projectDir, "extra/react-fragments/src")

		if (reactFragmentsSrcDir.exists()) {
			reactFragmentsSrcDir.eachDir {
				File dir ->

				copy {
					from new File(dir, "../../build/" + dir.name + "/index.js")
					into dir
					rename("index.js", "index.build.js")
				}
			}

			copy {
				exclude "**/index.js"
				from reactFragmentsSrcDir
				into new File(projectDir, "src/main/zippableResources/fragments/fragments")
				rename("index.build.js", "index.js")
			}
		}
	}
}

processResources {
	dependsOn processExtraApps

	if (gradle.startParameter.taskNames.contains("forceDeploy") || gradle.startParameter.taskNames.contains("uploadExtraRemoteApp")) {
		dependsOn buildExtraApps

		into("site-initializer/documents/company/remote-app") {
			from(new File(projectDir, "extra/remote-app/build/static/css")) {
				include "*.css"
			}

			from(new File(projectDir, "extra/remote-app/build/static/js")) {
				include "*.js"
			}
		}

		rename(/([0-9a-zA-Z-]+).*\.(css|js)$/, '$1.$2')
	}
	else {
		into("site-initializer/documents/company/remote-app") {
			from zipTree(configurations.extraRemoteApp.singleFile)
		}
	}
}

uploadExtraRemoteApp {
	doLast {
		File buildGradleFile = file("build.gradle")

		String content = buildGradleFile.getText("UTF-8")

		content = content.replaceFirst(~/String extraRemoteAppVersion = "(\w+\.\w+)"/) {
			String all, String versionString ->

			all.replace versionString, dateString
		}

		buildGradleFile.setText content, "UTF-8"
	}

	repositories {
		mavenDeployer {
			pom {
				artifactId = GUtil.loadProperties(file("bnd.bnd"))["Bundle-SymbolicName"] + ".extra.remote.app"
				groupId = "com.liferay"
				version = dateString
			}

			if (project.path.startsWith(":dxp:")) {
				repository(url: "https://repository.liferay.com/nexus/content/repositories/liferay-private-releases") {
					authentication password: System.properties["repository.private.password"], userName: System.properties["repository.private.username"]
				}
			}
		}
	}
}

zipExtraRemoteApp {
	if (!System.getenv("JENKINS_HOME")) {
		dependsOn buildExtraApps

		archiveName "extra-remote-app.zip"
		destinationDir new File(buildDir, "dist")

		from(new File(projectDir, "extra/remote-app/build/static/css")) {
			include "*.css"
		}

		from(new File(projectDir, "extra/remote-app/build/static/js")) {
			include "*.js"
		}

		rename(/([0-9a-zA-Z-]+).*\.(css|js)$/, '$1.$2')
	}
}

zipZippableResources {
	doLast {
		delete new File(projectDir, "src/main/zippableResources/fragments/fragments")
	}
}

_createExtraTasks()

private String _camelCase(String dirName) {
	String suffix = dirName.replaceAll(/\-(\w)/) {
		String s = it[1]

		s.toUpperCase()
	}

	return StringUtil.capitalize(suffix)
}

private void _createExtraTasks() {
	File extraDir = new File(projectDir, "extra/")

	extraDir.eachDir {
		File dir ->

		File packageJSONFile = new File(dir, "package.json")

		if (!packageJSONFile.exists()) {
			return
		}

		Task yarnInstallExtraTask = tasks.create(name: "yarnInstallExtra" + _camelCase(dir.name), type: Exec) {
			if (OSDetector.windows) {
				executable "cmd.exe"

				args "/c"
				args new File(node.nodeDir, "node.exe")
				args new File(node.nodeDir, "node_modules/yarn/yarn-" + node.yarnVersion + ".js")
			}
			else {
				executable new File(node.nodeDir, "bin/node")

				args new File(node.nodeDir, "lib/node_modules/yarn/yarn-" + node.yarnVersion + ".js")
			}

			args "install"
			dependsOn downloadNode
			workingDir dir
		}

		Task yarnBuildExtraTask = tasks.create(name: "yarnBuildExtra" + _camelCase(dir.name),, type: Exec) {
			if (OSDetector.windows) {
				executable "cmd.exe"

				args "/c"
				args new File(node.nodeDir, "node.exe")
				args new File(node.nodeDir, "node_modules/yarn/yarn-" + node.yarnVersion + ".js")
			}
			else {
				executable new File(node.nodeDir, "bin/node")

				args new File(node.nodeDir, "lib/node_modules/yarn/yarn-" + node.yarnVersion + ".js")
			}

			args "build"
			dependsOn yarnInstallExtraTask
			workingDir dir
		}

		buildExtraApps.dependsOn yarnBuildExtraTask
	}
}