components:
    schemas:
        DocumentMetric:
            properties:
                assetId:
                    type: string
                assetTitle:
                    type: string
                commentsMetric:
                    $ref: "#/components/schemas/MetricValue"
                downloadsMetric:
                    $ref: "#/components/schemas/MetricValue"
                impressionMadeMetric:
                    $ref: "#/components/schemas/MetricValue"
                lastViewedMetric:
                    $ref: "#/components/schemas/MetricValue"
                ratingsMetric:
                    $ref: "#/components/schemas/MetricValue"
                urls:
                    items:
                        type: string
                    type: array
                usersInvolvedMetric:
                    $ref: "#/components/schemas/MetricValue"
        DocumentMetrics:
            properties:
                documentMetrics:
                    items:
                        $ref: "#/components/schemas/DocumentMetric"
                    type: array
                total:
                    format: int64
                    type: integer
        EventEntry:
            properties:
                createDate:
                    type: string
                emailAddressHashed:
                    type: string
                individualName:
                    type: string
                name:
                    type: string
        Events:
            properties:
                eventEntries:
                    items:
                        $ref: "#/components/schemas/EventEntry"
                    type: array
        Histogram:
            properties:
                histogramMetrics:
                    items:
                        $ref: "#/components/schemas/HistogramMetric"
                    type: array
                total:
                    format: double
                    type: number
        HistogramMetric:
            properties:
                key:
                    type: string
                value:
                    format: double
                    type: number
                valueKey:
                    type: string
        IdentityActivity:
            properties:
                count:
                    format: int64
                    type: integer
                name:
                    type: string
        MetricValue:
            properties:
                value:
                    format: double
                    type: number
        MostActiveVisitor:
            properties:
                activitiesCount:
                    format: int64
                    type: integer
                emailAddress:
                    type: string
                firstName:
                    type: string
                id:
                    type: string
                lastName:
                    type: string
        MostActiveVisitors:
            properties:
                mostActiveVisitors:
                    items:
                        $ref: "#/components/schemas/MostActiveVisitor"
                    type: array
                total:
                    format: int64
                    type: integer
        Property:
            properties:
                name:
                    type: string
                value:
                    type: string
        SiteHistogramMetric:
            properties:
                histogram:
                    $ref: "#/components/schemas/Histogram"
        SiteVisitorBehaviorMetric:
            properties:
                averageSessionDuration:
                    format: double
                    type: number
                knownVisitors:
                    format: int64
                    type: integer
                totalSessionDuration:
                    format: double
                    type: number
                visitors:
                    format: int64
                    type: integer
        UserSession:
            properties:
                userName:
                    type: string
                userSessionEvents:
                    items:
                        $ref: "#/components/schemas/UserSessionEvent"
                    type: array
        UserSessionEvent:
            properties:
                assetTitle:
                    type: string
                createDate:
                    type: string
                emailAddressHashed:
                    type: string
                name:
                    type: string
                properties:
                    items:
                        $ref: "#/components/schemas/Property"
                    type: array
        UserSessions:
            properties:
                totalEvents:
                    format: int64
                    type: integer
                userSessions:
                    items:
                        $ref: "#/components/schemas/UserSession"
                    type: array
        VisitFrequency:
            properties:
                totalCount:
                    format: int64
                    type: integer
                visitFrequencyItems:
                    items:
                        $ref: "#/components/schemas/VisitFrequencyItem"
                    type: array
        VisitFrequencyItem:
            properties:
                count:
                    format: int64
                    type: integer
                name:
                    type: string
info:
