query EventQuery(
	$channelId: String!
	$groupIds: [String]
	$includeAnonymousUsers: Boolean
	$individualId: String
	$keywords: String
	$page: Int!
	$rangeEnd: String
	$rangeKey: Int
	$rangeStart: String
	$size: Int!
) {
	events(
		channelId: $channelId
		groupIds: $groupIds
		includeAnonymousUsers: $includeAnonymousUsers
		individualId: $individualId
		keywords: $keywords
		page: $page
		rangeEnd: $rangeEnd
		rangeKey: $rangeKey
		rangeStart: $rangeStart
		size: $size
	) {
		events {
			createDate
			emailAddressHashed
			individualName
			name
		}
	}
}
