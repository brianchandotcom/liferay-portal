query VisitFrequency(
	$channelId: String!
	$groupIds: [String]
	$rangeEnd: String
	$rangeKey: Int
	$rangeStart: String
) {
	visitFrequency(
		channelId: $channelId
		groupIds: $groupIds
		rangeEnd: $rangeEnd
		rangeKey: $rangeKey
		rangeStart: $rangeStart
	) {
		visitFrequency {
			count
			name
		}
		totalCount
	}
}
