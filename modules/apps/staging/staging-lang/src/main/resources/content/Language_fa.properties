you-cannot-submit-your-changes-because-your-previous-submission-is-still-waiting-for-approval=شما قادر به ثبت تغییرات نیستید، زیرا ثبت قبلی شما هنوز منتظر تایید است.
you-do-not-have-permission-to-manage-settings-related-to-staging=مجوز مدیریت تنظیمات حالت ویرایش را ندارید.