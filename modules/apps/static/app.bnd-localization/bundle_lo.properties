liferay-releng-app-description=ແອັບ Static ປະກອບມີກຸ່ມຂອງຕົວຂະຫຍາຍ (extenders) ແລະ ຢູທິລີຕີ້ (utilities) ທີ່ສຳຄັນທີ່ Liferay ຕິດຕັ້ງແບບສະແຕຕິກກ່ອນການຕິດຕັ້ງໂມດູນ OSGi ແບບໄດນາມິກໃດໆ. ຟັງຊັນຂອງແອັບລວມມີ log4j extender, OSGi WAB extender, ຢູທິລີຕີ້ການກຳນົດຄ່າ, ຢູທິລີຕີ້ການຕິດຕັ້ງ OSGi, ການເຮັດດັດຊະນີແພລດຟອມເປົ້າໝາຍ ແລະ ອື່ນໆ.<br /><br />ຊຸດເຄື່ອງມືນີ້ມີໃຫ້ໃຊ້ໃນແພັກເກັດ ${liferay.releng.app.title.prefix}.