buildscript {
	dependencies {
		classpath group: "com.github.jengelman.gradle.plugins", name: "shadow", version: "5.2.0"
		classpath group: "com.liferay", name: "com.liferay.gradle.plugins.source.formatter", version: "latest.release"
	}
	repositories {
		jcenter()
		mavenCentral()
	}
}

apply plugin: "com.liferay.source.formatter"
apply plugin: "java"
apply plugin: 'com.github.johnrengelman.shadow'

compileJava {
	sourceCompatibility = "1.8"
	targetCompatibility = "11"
}

dependencies {
	compile group: "com.google.cloud.functions", name: "functions-framework-api", version: "1.0.4"
	compile group: "com.google.code.gson", name: "gson", version: "2.8.7"
	compile group: "com.liferay.commerce", name: "com.liferay.headless.commerce.admin.order.client", version: "4.0.5"
}

repositories {
	mavenCentral()
}

shadowJar {
	mergeServiceFiles()
}