import com.liferay.gradle.util.FileUtil
import com.liferay.gradle.util.tasks.DownloadFileTask

buildscript {
	apply from: file("build-buildscript.gradle"), to: buildscript
}

task downloadDXPCredentials(type: DownloadFileTask)
task setUpDXP

String dxpCredentialsURL = "https://files.liferay.com/private/ee/.DXP_CREDENTIALS"

downloadDXPCredentials {
	destinationFile = FileUtil.getDestinationFile(dxpCredentialsURL)
	showLoginDialog = true
	url = dxpCredentialsURL
}

setUpDXP {
	dependsOn downloadDXPCredentials
}