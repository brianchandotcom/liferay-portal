components:
    schemas:
        AgentDefinition:
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    readOnly: true
                    type: object
                active:
                    type: boolean
                description:
                    type: string
                externalReferenceCode:
                    readOnly: true
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                inputVariables:
                    items:
                        $ref: "#/components/schemas/Variable"
                    type: array
                model:
                    $ref: "#/components/schemas/Model"
                    readOnly: true
                outputVariable:
                    $ref: "#/components/schemas/Variable"
                status:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                system:
                    readOnly: true
                    type: boolean
                title:
                    type: string
                version:
                    readOnly: true
                    type: integer
                workflowDefinitionName:
                    type: string
            type: object
        AgentInstance:
            properties:
                agentDefinitionExternalReferenceCode:
                    type: string
                context:
                    additionalProperties: true
                    type: object
                    writeOnly: true
                externalReferenceCode:
                    readOnly: true
                    type: string
                instructionDefinitionScope:
                    enum:
                        -   clickToChat
                        -   cms
                        -   everywhere
                    type: string
                sseEventSinkKey:
                    type: string
            type: object
        Chat:
            properties:
                externalReferenceCode:
                    type: string
            type: object
        ContentRetriever:
            properties:
                crawlDate:
                    format: date-time
                    type: string
                description:
                    readOnly: true
                    type: string
                description_i18n:
                    additionalProperties:
                        type: string
                    type: object
                externalReferenceCode:
                    type: string
                indexName:
                    type: string
                title:
                    readOnly: true
                    type: string
                title_i18n:
                    additionalProperties:
                        type: string
                    type: object
                type:
                    type: string
                url:
                    type: string
            type: object
        Credential:
            properties:
                clientId:
                    readOnly: true
                    type: string
                clientSecret:
                    readOnly: true
                    type: string
            type: object
        Guardrail:
            properties:
                active:
                    type: boolean
                description:
                    type: string
                externalReferenceCode:
                    type: string
                guardrailType:
                    enum:
                        -   input
                        -   output
                    type: string
                location:
                    type: string
                maliciousUriFilterEnabled:
                    type: boolean
                multilanguageDetectionEnabled:
                    type: boolean
                piAndJailbreakConfidenceLevel:
                    default: mediumAndAbove
                    enum:
                        -   high
                        -   lowAndAbove
                        -   mediumAndAbove
                    type: string
                piAndJailbreakFilterEnabled:
                    type: boolean
                raiDangerousLevel:
                    default: none
                    enum:
                        -   high
                        -   lowAndAbove
                        -   mediumAndAbove
                        -   none
                    type: string
                raiHarassmentLevel:
                    default: none
                    enum:
                        -   high
                        -   lowAndAbove
                        -   mediumAndAbove
                        -   none
                    type: string
                raiHateSpeechLevel:
                    default: none
                    enum:
                        -   high
                        -   lowAndAbove
                        -   mediumAndAbove
                        -   none
                    type: string
                raiSexuallyExplicitLevel:
                    default: none
                    enum:
                        -   high
                        -   lowAndAbove
                        -   mediumAndAbove
                        -   none
                    type: string
                sdpFilterEnabled:
                    type: boolean
                title:
                    readOnly: true
                    type: string
                title_i18n:
                    additionalProperties:
                        type: string
                    type: object
            type: object
        Message:
            properties:
                chat:
                    $ref: "#/components/schemas/Chat"
                    readOnly: true
                chatbotExternalReferenceCode:
                    type: string
                context:
                    additionalProperties: true
                    type: object
                instructionDefinitionScope:
                    enum:
                        -   clickToChat
                        -   cms
                        -   everywhere
                    type: string
                text:
                    type: string
            type: object
        Model:
            properties:
                label:
                    type: string
                name:
                    type: string
                providerLabel:
                    type: string
            type: object
        ProvisioningRequest:
            properties:
                accountEntryExternalReferenceCode:
                    type: string
                accountEntryId:
                    format: int64
                    readOnly: true
                    type: integer
                accountEntryName:
                    type: string
                userAccounts:
                    items:
                        $ref: "#/components/schemas/UserAccount"
                    type: array
            required:
                -   accountEntryName
                -   userAccounts
            type: object
        Report:
            properties:
                agentDefinitionExternalReferenceCodes:
                    items:
                        type: string
                    type: array
                chatbotExternalReferenceCode:
                    type: string
                dateCreated:
                    format: date-time
                    readOnly: true
                    type: string
                externalReferenceCode:
                    readOnly: true
                    type: string
                feedback:
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                level:
                    readOnly: true
                    type: string
                reason:
                    type: string
                surface:
                    type: string
                userMessage:
                    type: string
            required:
                -   agentDefinitionExternalReferenceCodes
                -   feedback
                -   surface
            type: object
        Site:
            properties:
                externalReferenceCode:
                    readOnly: true
                    type: string
            type: object
        Status:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
                label_i18n:
                    type: string
            type: object
        UserAccount:
            properties:
                emailAddress:
                    type: string
                firstName:
                    type: string
                lastName:
                    type: string
                screenName:
                    type: string
            required:
                -   emailAddress
            type: object
        Variable:
            properties:
                name:
                    type: string
                type:
                    type: string
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.ai.hub.rest.client', and version '1.0.6'."
