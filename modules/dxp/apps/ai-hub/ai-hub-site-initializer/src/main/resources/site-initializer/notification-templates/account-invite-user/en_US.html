<html>
	<head>
		<meta content="width=device-width, initial-scale=1" name="viewport" />

		<style type="text/css">
			html, body {
				background-color: #FFF;
				color: #272833;
				margin: 0;
				padding: 0;
				width: 100%;
			}
			.banner {
				background: linear-gradient(120deg, #011181 0%,#0c6297 45%,#0c6297 50%,#7eefec 100%);
				border-radius: 8px 8px 0 0;
				height: 56px;
			}
			.container {
				background-color: #F7F8F9;
				border-radius: 20px;
				box-sizing: border-box;
				font-family: 'Roboto', sans-serif;
				font-size: 14px;
				margin: 48px auto;
				max-width: 640px;
				min-width: 320px;
				overflow: hidden;
				padding: 32px 48px;
			}
			.content {
				box-sizing: border-box;
				margin-top: 14px;
			}
			.footer {
				color: #6B6C7E;
				font-size: 14px;
				line-height: 21px;
				text-align: center;
			}
			.help-section {
				padding: 1px 24px 8px;
			}
			.help-section h4 {
				font-size: 16px;
				font-weight: 600;
				margin: 20px 0;
				text-align:left;
			}
			.info-section {
				margin: 0 24px;
				padding: 0 0 24px;
			}
			.info-section h3 {
				font-size: 18px;
				font-weight: 500;
				margin: 20px 0;
			}
			.section {
				background-color: #FFF;
				border-radius: 8px;
				margin-bottom: 24px;
				overflow: hidden;
				padding-bottom: 1px;
			}
			@media only screen and (max-width: 640px) {
				.container {
					margin: 0 auto !important;
					padding: 24px !important;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="content">
				<div class="section">
					<div class="banner"></div>
					<div class="info-section">
						<h3>AI Hub</h3>

						<div>
							<p>[%INVITE_SENDER_NAME%] has invited you to join the [%ACCOUNT_NAME%] account on AI Hub.</p>
							<p>Use the following <a href="[%CREATE_ACCOUNT_URL%]">link</a> to create your account.</p>
						</div>
					</div>
				</div>
			</div>

			<div class="section">
				<div class="help-section">
					<h4>Do you need help?</h4>

					<p>If you have any questions, please contact us.</p>
				</div>
			</div>

			<div class="footer">
				<div>Copyright © 2026</div>
			</div>
		</div>
	</body>
</html>
