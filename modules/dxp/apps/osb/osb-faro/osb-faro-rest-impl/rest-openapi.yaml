components:
    schemas:
        AssetSummaryMetric:
            description:
                "An aggregated set of analytics metrics for a single tracked asset (page, blog, document, form, journal,
                object entry, etc.) over the selected date range. Trend percentages compare metrics on the selected date
                range to the previous date range. Use `getSiteAssetSummariesPage` to list these sets of metrics."
            properties:
                assetId:
                    description:
                        "Identifier of the tracked asset."
                    readOnly: true
                    type: string
                assetTitle:
                    description:
                        "Display title of the asset, e.g. the page title or blog post title."
                    readOnly: true
                    type: string
                assetType:
                    description:
                        "Asset category, e.g. 'BLOG', 'DOCUMENT', 'FORM', 'JOURNAL', 'OBJECT_ENTRY', 'PAGE'."
                    readOnly: true
                    type: string
                downloads:
                    description:
                        "Download count over the selected date range. Null when the asset type doesn't track downloads."
                    format: double
                    readOnly: true
                    type: number
                downloadsTrendPercentage:
                    description:
                        "Percentage change in downloads compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                impressions:
                    description:
                        "Impression count (asset rendered into a viewport but not necessarily interacted with)."
                    format: double
                    readOnly: true
                    type: number
                impressionsTrendPercentage:
                    description:
                        "Percentage change in impressions compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                reads:
                    description:
                        "Read count (full-content engagement, distinct from impressions)."
                    format: double
                    readOnly: true
                    type: number
                readsTrendPercentage:
                    description:
                        "Percentage change in reads compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                views:
                    description:
                        "View count (asset opened/loaded by an individual)."
                    format: double
                    readOnly: true
                    type: number
                viewsTrendPercentage:
                    description:
                        "Percentage change in views compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
            type: object
        Event:
            description:
                "A single tracked analytics event captured — page views, custom events, form submissions, etc. Each
                event carries free-form `attributes` (a name-value map of contextual properties) plus any matching page
                metadata. Use `getSiteChannelEventsPage` to retrieve a list of analytics events."
            properties:
                applicationId:
                    description:
                        "Identifier of the application that emitted the event."
                    readOnly: true
                    type: string
                assetTitle:
                    description:
                        "Title of the asset associated with the event."
                    readOnly: true
                    type: string
                attributes:
                    additionalProperties:
                        type: string
                    description:
                        "Free-form event properties as a key-value map."
                    readOnly: true
                    type: object
                canonicalUrl:
                    description:
                        "Canonical URL of the page where the event was emitted."
                    readOnly: true
                    type: string
                createDate:
                    description:
                        "Timestamp of when the event was recorded."
                    format: date-time
                    readOnly: true
                    type: string
                individualId:
                    description:
                        "Identifier of known individuals. Null for anonymous individuals."
                    readOnly: true
                    type: string
                name:
                    description:
                        "Name of the event type (e.g. 'pageViewed', 'formSubmitted', etc.)."
                    readOnly: true
                    type: string
                pageDescription:
                    description:
                        "Meta description of the page that emitted the event."
                    readOnly: true
                    type: string
                pageKeywords:
                    description:
                        "Meta keywords of the page that emitted the event. Comma-separated when there are multiple."
                    readOnly: true
                    type: string
                pageTitle:
                    description:
                        "Title of the page that event occurred on."
                    readOnly: true
                    type: string
                referrer:
                    description:
                        "Referring URL the visitor arrived from."
                    readOnly: true
                    type: string
                url:
                    description:
                        "Full URL of the page where the event was emitted."
                    readOnly: true
                    type: string
            type: object
        PageMetric:
            description:
                "Analytics metrics for a single tracked page over the selected date range. Use `getSitePagesPage` to
                list these metrics for a site."
            properties:
                assetId:
                    description:
                        "The canonical URL of the page."
                    readOnly: true
                    type: string
                assetTitle:
                    description:
                        "Display title of the page."
                    readOnly: true
                    type: string
                avgTimeOnPage:
                    description:
                        "Average time on page in seconds across all sessions in the date range."
                    format: double
                    readOnly: true
                    type: number
                bounceRate:
                    description:
                        "Fraction of sessions that landed on this page and exited without further interaction. Expressed
                        as a value between 0 to 1."
                    format: double
                    readOnly: true
                    type: number
                dataSourceId:
                    description:
                        "Identifier of the data source providing this page's analytics events."
                    readOnly: true
                    type: string
                directAccess:
                    description:
                        "Total count of sessions where this page was the entry point with no referrer over the selected
                        time range."
                    format: double
                    readOnly: true
                    type: number
                entrances:
                    description:
                        "Total count of sessions that started on this page over the selected time range."
                    format: double
                    readOnly: true
                    type: number
                exitRate:
                    description:
                        "Fraction of sessions on which this page was the last page viewed before exit. Expressed as a
                        value between 0 to 1."
                    format: double
                    readOnly: true
                    type: number
                indirectAccess:
                    description:
                        "Visit count where this page was reached via a referrer (search engine, link, etc.)."
                    format: double
                    readOnly: true
                    type: number
                urls:
                    description:
                        "List of distinct URLs that resolve to this page."
                    items:
                        type: string
                    readOnly: true
                    type: array
                views:
                    description:
                        "Total page view count over the selected date range."
                    format: double
                    readOnly: true
                    type: number
                viewsTrendPercentage:
                    description:
                        "Percentage change in views compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                visitors:
                    description:
                        "Distinct visitor count over the selected date range."
                    format: double
                    readOnly: true
                    type: number
                visitorsTrendPercentage:
                    description:
                        "Percentage change in distinct visitors compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
            type: object
info:
    description:
        "Read-only headless REST API for Liferay Analytics Cloud. Exposes events, pages, and asset-summary metrics for
        use as MCP tools and external integrations. All endpoints are scoped to a provisioned Analytics Cloud
        workspace."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Faro Headless REST API
    version: v1.0
    x-class-name: FaroRest
openapi: 3.0.1
paths:
    "/workspace/{groupId}/asset-summaries":
        get:
            description:
                "List analytics asset summaries for pages, blogs, documents, forms, journal articles, and object
                entries. Rank summaries by the requested sort metric. Each summary includes download, impression, read,
                and view counts along with their period-over-period trend percentages. Optionally narrow results to a
                single channel (also known as property) or to a date range. Use this to answer 'what content is
                performing best' and to pick assets for deeper drill-down via `getSitePagesPage`."
            operationId: getSiteAssetSummariesPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    description:
                        "Optional id to scope results to a single channel."
                    name: channelId
                    schema:
                        type: string
                -   in: query
                    description:
                        "Page number (starts at 1)."
                    name: page
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Page size."
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Custom range end as ISO datetime (e.g. 2026-01-01T00:00:00Z). Use with rangeEnd as a rangeKey
                        alternative."
                    name: rangeEnd
                    schema:
                        type: string
                -   in: query
                    description:
                        "Date-range preset code (0 = LAST_24_HOURS, 1 = YESTERDAY, 7 = LAST_7_DAYS, 28 = LAST_28_DAYS,
                        30 = LAST_30_DAYS, 90 = LAST_90_DAYS, 180 = LAST_180_DAYS, 365 = LAST_YEAR). Otherwise, provide
                        the rangeStart and rangeEnd. Mutually exclusive with rangeStart and rangeEnd; if provided, those
                        are ignored."
                    name: rangeKey
                    schema:
                        format: int32
                        type: integer
                -   in: query
                    description:
                        "Custom range start as ISO datetime (e.g. 2026-01-01T00:00:00Z). Use with rangeEnd as a rangeKey
                        alternative."
                    name: rangeStart
                    schema:
                        type: string
                -   in: query
                    description:
                        "Free-text keyword search across asset titles. Empty or null returns all matching assets."
                    name: search
                    schema:
                        type: string
                -   in: query
                    description:
                        "Sort expression `column:asc|desc`. Defaults to `views:desc` when omitted. Common columns:
                        views, downloads, impressions, reads."
                    example: views:desc
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AssetSummaryMetric"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AssetSummaryMetric"
                                type: array
            tags: ["AssetSummaryMetric"]
    "/workspace/{groupId}/channels/{channelId}/events":
        get:
            description:
                "List tracked analytics events for a specific channel (also known as property), optionally narrowed to a
                date range. For aggregated metrics across events, prefer `getSiteAssetSummariesPage` or
                `getSitePagesPage`."
            operationId: getSiteChannelEventsPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: path
                    description:
                        "Identifier of the channel whose events should be listed."
                    name: channelId
                    required: true
                    schema:
                        type: string
                -   in: query
                    description:
                        "Include events from anonymous individuals if set to true."
                    name: includeAnonymousUsers
                    schema:
                        type: boolean
                -   in: query
                    description:
                        "Page number (starts at 1)."
                    name: page
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Page size."
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Custom range end as ISO datetime (e.g. 2026-01-01T00:00:00Z). Use with rangeEnd as a rangeKey
                        alternative."
                    name: rangeEnd
                    schema:
                        type: string
                -   in: query
                    description:
                        "Date-range preset code (0 = LAST_24_HOURS, 1 = YESTERDAY, 7 = LAST_7_DAYS, 28 = LAST_28_DAYS,
                        30 = LAST_30_DAYS, 90 = LAST_90_DAYS, 180 = LAST_180_DAYS, 365 = LAST_YEAR). Otherwise, provide
                        the rangeStart and rangeEnd. Mutually exclusive with rangeStart and rangeEnd; if provided, those
                        are ignored."
                    name: rangeKey
                    schema:
                        format: int32
                        type: integer
                -   in: query
                    description:
                        "Custom range start as ISO datetime (e.g. 2026-01-01T00:00:00Z). Use with rangeEnd as a rangeKey
                        alternative."
                    name: rangeStart
                    schema:
                        type: string
                -   in: query
                    description:
                        "Free-text keyword search across asset titles. Empty or null returns all matching assets."
                    name: search
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Event"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Event"
                                type: array
            tags: ["Event"]
    "/workspace/{groupId}/pages":
        get:
            description:
                "List analytics metrics for tracked pages on the workspace, ranked by views or another metric,
                optionally narrowed to a single channel (also known as property) or data source. Returns flattened view,
                visitor, bounce, exit, and access-path metrics for each page. Use this for 'top pages' style queries."
            operationId: getSitePagesPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    description:
                        "Optional channel ID to scope results to a single channel."
                    name: channelId
                    schema:
                        type: string
                -   in: query
                    description:
                        "Optional data source ID to scope results to a single data source."
                    name: dataSourceId
                    schema:
                        type: string
                -   in: query
                    description:
                        "Page number."
                    name: page
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Page size."
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Custom range end as ISO datetime (e.g. 2026-01-01T00:00:00Z). Use with rangeStart as a rangeKey
                        alternative."
                    name: rangeEnd
                    schema:
                        type: string
                -   in: query
                    description:
                        "Date-range preset code (0 = LAST_24_HOURS, 1 = YESTERDAY, 7 = LAST_7_DAYS, 28 = LAST_28_DAYS,
                        30 = LAST_30_DAYS, 90 = LAST_90_DAYS, 180 = LAST_180_DAYS, 365 = LAST_YEAR). Otherwise, provide
                        the rangeStart and rangeEnd. Mutually exclusive with rangeStart and rangeEnd; if provided, those
                        are ignored."
                    name: rangeKey
                    schema:
                        format: int32
                        type: integer
                -   in: query
                    description:
                        "Custom range start as ISO datetime (e.g. 2026-01-01T00:00:00Z). Use with rangeEnd as a rangeKey
                        alternative."
                    name: rangeStart
                    schema:
                        type: string
                -   in: query
                    description:
                        "Free-text keyword search across page titles and URLs."
                    name: search
                    schema:
                        type: string
                -   in: query
                    description:
                        "Sort expression `column:asc|desc`. Defaults to `views:desc`. Common columns: views, visitors,
                        bounceRate, avgTimeOnPage."
                    example: views:desc
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/PageMetric"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/PageMetric"
                                type: array
            tags: ["PageMetric"]