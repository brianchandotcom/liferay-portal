query getWorkspaceGroupChannelAssetSummariesPage(
	$channelId: String
	$keywords: String
	$rangeEnd: String
	$rangeKey: Int
	$rangeStart: String
	$size: Int!
	$sort: Sort!
	$start: Int!
) {
	assetSummaryMetricBag: assetSummaries(
		channelId: $channelId
		keywords: $keywords
		rangeEnd: $rangeEnd
		rangeKey: $rangeKey
		rangeStart: $rangeStart
		size: $size
		sort: $sort
		start: $start
	) {
		assetSummaryMetrics {
			assetId
			assetTitle
			assetType
			downloadsMetric {
				trend {
					percentage
				}
				value
			}
			impressionsMetric {
				trend {
					percentage
				}
				value
			}
			readsMetric {
				trend {
					percentage
				}
				value
			}
			viewsMetric {
				trend {
					percentage
				}
				value
			}
		}
		total
	}
}
