buildscript {
	dependencies {
		classpath group: "com.liferay", name: "com.liferay.gradle.plugins.defaults", version: "latest.release"
	}

	repositories {
		mavenLocal()

		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}
	}
}

apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "io.spring.dependency-management"
apply plugin: "java"

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

dependencies {
	annotationProcessor "org.projectlombok:lombok"
	annotationProcessor "org.springframework.boot:spring-boot-configuration-processor"

	compileOnly "org.projectlombok:lombok"
	compileOnly group: "com.liferay", name: "com.liferay.petra.function", version: "5.1.2"
	compileOnly group: "com.liferay", name: "com.liferay.petra.string", version: "5.0.4"
	compileOnly group: "com.liferay", name: "com.liferay.headless.portal.instances.client", version: "1.0.3"
	compileOnly group: "com.liferay.commerce", name: "com.liferay.headless.commerce.admin.order.client", version: "4.0.12"

	compile group: "org.springframework.boot", name: "spring-boot-starter-data-rest"
	compile group: "org.springframework.boot", name: "spring-boot-starter-security"
	compile group: "org.springframework.boot", name: "spring-boot-starter-web"
}

repositories {
	mavenCentral()
}

test {
	useJUnitPlatform()
}