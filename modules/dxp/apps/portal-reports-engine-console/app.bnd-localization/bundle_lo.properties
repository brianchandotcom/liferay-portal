liferay-releng-app-description=ນຳໃຊ້ສ່ວນຕິດຕໍ່ຜູ້ໃຊ້ທີ່ໃຊ້ງ່າຍ ແລະ ເຂົ້າໃຈງ່າຍຂອງ Liferay Reports ເພື່ອສ້າງ ແລະ ກຳນົດເວລາການສ້າງລາຍງານ. ແອັບ Liferay Reports ໄດ້ລວມເອົາເຄື່ອງຈັກລາຍງານຮ່ວມກັບ Jasper Reports ເຊິ່ງເປັນການຈັດຕັ້ງປະຕິບັດທີ່ດີເລີດ, ຊ່ວຍໃຫ້ທ່ານສາມາດອັບໂຫຼດຄຳນິຍາມລາຍງານ (ທີ່ອອກແບບໃນ report designer) ເຂົ້າໃນ Reports Admin ແລະ ສັ່ງໃຫ້ມັນເຮັດວຽກຈາກແຖບ Definitions ໄດ້ທັນທີ. ທ່ານສາມາດສ້າງລາຍງານດ້ວຍຕົນເອງ ຫຼື ກຳນົດເວລາການສ້າງລາຍງານແບບອັດຕະໂນມັດ. ສົ່ງອອກລາຍງານເປັນ HTML, CSV, XLS, PDF ແລະ ຮູບແບບອື່ນໆ. ລາຍງານສາມາດເບິ່ງໄດ້ໃນແອັບພລິເຄຊັນ Reports Admin ໃນແຜງຄວບຄຸມ ຫຼື ໃນໜ້າເວັບທີ່ມີແອັບພລິເຄຊັນ Reports Display ແລະ ຍັງສາມາດສົ່ງຜ່ານອີເມວໄດ້ນຳ.