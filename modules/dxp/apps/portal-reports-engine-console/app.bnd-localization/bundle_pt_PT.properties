liferay-releng-app-description=Tire partido da interface de utilizador intuitiva e fácil de utilizar do Liferay Reports para criar e agendar relatórios. A aplicação Liferay Reports integra um mecanismo de relatórios com o Jasper Reports, uma excelente implementação, permitindo carregar definições de relatórios (criadas num designer de relatórios) no Painel de Administração de Relatórios e executá-las a partir do separador Definições. Gere relatórios manualmente ou agende a geração automática. Exporte relatórios para HTML, CSV, XLS, PDF e outros formatos. Os relatórios podem ser visualizados no Painel de Administração de Relatórios, no Painel de Controlo ou numa página com a aplicação Visualização de Relatórios, podendo também ser enviados por e-mail.