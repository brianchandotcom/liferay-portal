liferay-releng-app-description=Liferay Digital Enterprise ສະໜອງການຈັດຕັ້ງປະຕິບັດລະບົບກົດເກນທີ່ຮອງຮັບ JSR-94 ໃນຮູບແບບເວັບແອັບ, ໂດຍອີງໃສ່ໂຄງການ Drools ທີ່ເປັນໂອເພັນຊອດ (open source) ຍອດນິຍົມ. ລະບົບກົດເກນສະໜອງວິທີການແຍກກົດເກນ ຫຼື ຕັກກະຂອງແອັບພລິເຄຊັນອອກຈາກລະຫັດສ່ວນທີ່ເຫຼືອ. ສິ່ງນີ້ຊ່ວຍໃຫ້ມີຮູບແບບການຂຽນໂປຣແກຣມແບບປະກາດ (declarative) ຫຼາຍຂຶ້ນ ເຊິ່ງກົດເກນຈະກຳນົດສິ່ງທີ່ກຳລັງເກີດຂຶ້ນ ໂດຍບໍ່ຕ້ອງອະທິບາຍວ່າເກີດຂຶ້ນໄດ້ແນວໃດ. ສິ່ງນີ້ເຮັດໃຫ້ມັນອ່ານງ່າຍກວ່າລະຫັດແບບ 'if-else' ທີ່ຊ້ອນກັນ. ມັນຍັງງ່າຍຕໍ່ການປ່ຽນແປງໂດຍບໍ່ເຮັດໃຫ້ເກີດຂໍ້ຜິດພາດ (bugs) ໃນລະຫັດຂອງທ່ານ. ກົດເກນເຫຼົ່ານີ້ຍັງຖືກຂຽນດ້ວຍພາສາທີ່ຜູ້ທີ່ບໍ່ແມ່ນຜູ້ພັດທະນາກໍສາມາດເຂົ້າໃຈໄດ້ງ່າຍ. ສິ່ງນີ້ເຮັດໃຫ້ຜູ້ໃຊ້ທາງທຸລະກິດສາມາດກວດສອບ ແລະ ປັບແກ້ກົດເກນໄດ້ໂດຍບໍ່ຕ້ອງອາໄສຜູ້ພັດທະນາ.<br /><br />ແອັບນີ້ຕິດຕັ້ງເປັນບໍລິການຂອງ Liferay.