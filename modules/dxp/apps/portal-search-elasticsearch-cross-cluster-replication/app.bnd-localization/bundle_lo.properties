liferay-releng-app-description=ແອັບ ${liferay.releng.app.title.prefix} Enterprise Search Cross-Cluster Replication ຊ່ວຍໃຫ້ທ່ານສາມາດປະຕິບັດການອ່ານຈາກຄລັສເຕີທ້ອງຖິ່ນທີ່ຖືກກຳນົດຄ່າໃຫ້ຈຳລອງ (replicate) ຫຼື ຕິດຕາມ (follow) ດັດຊະນີຂອງຄລັສເຕີທາງໄກ. ຄລັສເຕີທ້ອງຖິ່ນທີ່ມີດັດຊະນີຈຳລອງຈະຕ້ອງຖືກກຳນົດຄ່າດ້ວຍຕົນເອງກ່ອນທີ່ແອັບນີ້ຈະສາມາດປະຕິບັດຄຳຮ້ອງໄດ້. ທ່ານສາມາດເບິ່ງຂໍ້ມູນເພີ່ມເຕີມກ່ຽວກັບ Cross-Cluster Replication ໄດ້ທີ່ https://www.elastic.co/guide/en/elasticsearch/reference/7.9/xpack-ccr.html.<br />ເພື່ອສຶກສາກ່ຽວກັບຄວາມເຂົ້າກັນໄດ້, ເບິ່ງຕາຕະລາງຄວາມເຂົ້າກັນໄດ້: https://help.liferay.com/hc/en-us/articles/360016511651#Liferay-Enterprise-Search.