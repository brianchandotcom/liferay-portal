liferay-releng-app-description=ແອັບ ${liferay.releng.app.title.prefix} Enterprise Search Monitoring ຕິດຕາມຄລັສເຕີ Elasticsearch ຂອງທ່ານແບບຮຽລໄທມ໌ ໂດຍການສະແດງຜົນ Kibana Monitoring UI ຜ່ານ Liferay DXP instance.<br />ອີງຕາມເວັບໄຊຂອງ Elastic: "ຈາກ Kibana Monitoring UI, ທ່ານສາມາດເຫັນບັນຫາໄດ້ທັນທີ ແລະ ເຈາະເລິກເຖິງພຶດຕິກຳຂອງລະບົບໃນແຕ່ລະຊ່ວງເວລາເພື່ອວິນິດໄສບັນຫາການເຮັດວຽກ."<br />ທ່ານຕ້ອງຕິດຕັ້ງ Kibana ກ່ອນທີ່ຈະໃຊ້ປລັກອິນ ${liferay.releng.app.title.prefix} Enterprise Search Monitoring. ທ່ານສາມາດເບິ່ງຂໍ້ມູນເພີ່ມເຕີມກ່ຽວກັບການຕິດຕາມ Elasticsearch ໄດ້ທີ່ https://www.elastic.co/guide/en/kibana/current/xpack-monitoring.html.<br />ເພື່ອສຶກສາກ່ຽວກັບຄວາມເຂົ້າກັນໄດ້, ເບິ່ງຕາຕະລາງຄວາມເຂົ້າກັນໄດ້: https://help.liferay.com/hc/en-us/articles/360016511651#Liferay-Enterprise-Search.