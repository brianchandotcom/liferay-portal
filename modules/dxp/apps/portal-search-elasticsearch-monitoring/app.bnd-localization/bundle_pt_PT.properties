liferay-releng-app-description=A aplicação ${liferay.releng.app.title.prefix} Enterprise Search Monitoring monitoriza o seu cluster Elasticsearch em tempo real, fornecendo uma visualização da interface do utilizador do Kibana Monitoring através de uma instância do Liferay DXP.<br />De acordo com o site da Elastic, "Na interface do utilizador do Kibana Monitoring, pode identificar problemas rapidamente e analisar o comportamento do sistema ao longo do tempo para diagnosticar problemas operacionais."<br />É necessário instalar o Kibana antes de utilizar o plugin ${liferay.releng.app.title.prefix} Enterprise Search Monitoring. Pode encontrar mais informações sobre a monitorização do Elasticsearch em https://www.elastic.co/guide/en/kibana/current/xpack-monitoring.html.<br />Para saber mais sobre compatibilidade, consulte a matriz de compatibilidade: https://help.liferay.com/hc/en-us/articles/360016511651#Liferay-Enterprise-Search.