liferay-releng-app-description=ແອັບ ${liferay.releng.app.title.prefix} Enterprise Search Learning to Rank ນຳສະເໜີການຄົ້ນຫາຂອງ Liferay DXP ເພື່ອໃຫ້ຄະແນນໃໝ່ (re-scoring) ຜ່ານປລັກອິນ Elasticsearch Learning to Rank. ຕິດຕັ້ງປລັກອິນໃສ່ Elasticsearch, ຕິດຕັ້ງແອັບພລິເຄຊັນນີ້ໃສ່ Liferay DXP, ປະສົມປະສານວິທະຍາສາດຂໍ້ມູນເຂົ້າໄປໜ້ອຍໜຶ່ງ, ແລະ ທ່ານສາມາດກຳນົດການຄົ້ນຫາຂອງ Liferay ໄປຫາໂມເດວ Learning to Rank ທີ່ໄດ້ຮັບການເຝິກຝົນແລ້ວ ເຊິ່ງທ່ານໄດ້ອັບໂຫຼດຂຶ້ນປລັກອິນ Elasticsearch. ການຄົ້ນຫາ Liferay ຂອງທ່ານຈະຖືກໃຫ້ຄະແນນໃໝ່ໂດຍໂມເດວທີ່ເຝິກຝົນດ້ວຍ AI ເພື່ອໃຫ້ຜົນການຄົ້ນຫາທີ່ດີຂຶ້ນສຳລັບຜູ້ໃຊ້ Liferay DXP ຂອງທ່ານ.<br />ເພື່ອສຶກສາກ່ຽວກັບຄວາມເຂົ້າກັນໄດ້, ເບິ່ງຕາຕະລາງຄວາມເຂົ້າກັນໄດ້: https://help.liferay.com/hc/en-us/articles/360016511651#Liferay-Enterprise-Search.