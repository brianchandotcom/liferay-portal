liferay-releng-app-description=Connectez Salesforce Sales Cloud à Liferay DXP pour bénéficier d'une expérience client fluide. Grâce au connecteur Liferay pour Salesforce, synchronisez automatiquement vos comptes et contacts de Salesforce Sales Cloud vers Liferay DXP pour une intégration client fluide. Intégrez automatiquement vos produits et leurs prix dans Liferay DXP pour une gestion centralisée de vos produits. Transférez vos commandes de Liferay DXP vers Salesforce Sales Cloud pour un reporting et une visibilité optimisés au sein de votre réseau commercial. Enfin, configurez, planifiez et surveillez les tâches dans Liferay.<br /><br />Salesforce vers Liferay :<br /><br />* Contacts<br /> Produits<br />* Catalogues de prix<br />* Entrées du catalogue de prix<br /><br />Liferay vers Salesforce et Salesforce vers Liferay<br /><br />* Comptes<br />* Adresses<br />* Commandes<br />* Articles de commande<br />* Notes de commande<br /><br />Le connecteur Liferay vers Salesforce est compatible avec Liferay DXP 7.4+ et l'API Salesforce version 44.0 (SOAP).