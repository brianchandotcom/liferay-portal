liferay-releng-app-description=ເຊື່ອມຕໍ່ Salesforce Sales Cloud ກັບ Liferay DXP ເພື່ອປະສົບການລູກຄ້າທີ່ລຽບງ່າຍ. ດ້ວຍ Liferay Connector to Salesforce, ທ່ານສາມາດຊິງຄ໌ບັນຊີ ແລະ ລາຍຊື່ຜູ້ຕິດຕໍ່ຈາກ Salesforce Sales Cloud ໄປຫາ Liferay DXP ໂດຍອັດຕະໂນມັດເພື່ອເລີ່ມຕົ້ນການບໍລິການລູກຄ້າໄດ້ຢ່າງວ່ອງໄວ. ນຳເຂົ້າຂໍ້ມູນຜະລິດຕະພັນ ແລະ ລາຄາເຂົ້າໃນ Liferay DXP ໂດຍອັດຕະໂນມັດ ເພື່ອໃຫ້ທ່ານຈັດການຜະລິດຕະພັນໄດ້ໃນບ່ອນດຽວ. ສົ່ງຄຳສັ່ງຊື້ຈາກ Liferay DXP ໄປຫາ Salesforce Sales Cloud ເພື່ອປັບປຸງການລາຍງານ ແລະ ການເບິ່ງເຫັນຂໍ້ມູນພາຍໃນເຄືອຂ່າຍການຂາຍຂອງທ່ານ. ສຸດທ້າຍ, ທ່ານສາມາດກຳນົດຄ່າ, ວາງແຜນເວລາ ແລະ ຕິດຕາມການເຮັດວຽກທັງໝົດໄດ້ພາຍໃນ Liferay.<br /><br />Salesforce ຫາ Liferay:<br /><br />* ລາຍຊື່ຜູ້ຕິດຕໍ່<br />* ຜະລິດຕະພັນ<br />* ລາຍການລາຄາ (Price Books)<br />* ລາຍການຍ່ອຍໃນລາຍການລາຄາ<br /><br />Liferay ຫາ Salesforce ແລະ Salesforce ຫາ Liferay:<br /><br />* ບັນຊີ<br />* ທີ່ຢູ່<br />* ຄຳສັ່ງຊື້<br />* ລາຍການໃນຄຳສັ່ງຊື້<br />* ບັນທຶກຄຳສັ່ງຊື້<br /><br />Liferay Connector to Salesforce ສາມາດໃຊ້ງານໄດ້ກັບ Liferay DXP 7.4 ແລະ Salesforce API ເວີຊັນ 44.0 (SOAP).