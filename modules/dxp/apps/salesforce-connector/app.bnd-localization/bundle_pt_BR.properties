liferay-releng-app-description=Conecte o Salesforce Sales Cloud ao Liferay DXP para proporcionar uma experiência integrada ao cliente. Com o Conector do Liferay para Salesforce, sincronize automaticamente contas e contatos do Salesforce Sales Cloud com o Liferay DXP para uma integração perfeita de novos clientes. Importe automaticamente produtos e preços para o Liferay DXP para que você precise gerenciar os produtos em apenas um local. Envie pedidos do Liferay DXP para o Salesforce Sales Cloud para melhorar os relatórios e a visibilidade em sua rede de vendas. Por fim, configure, agende e monitore os trabalhos diretamente no Liferay.<br /><br />Salesforce para Liferay:<br /><br />* Contatos<br /> Produtos<br />* Catálogos de preços*<br /> Itens dos catálogos de preços<br /><br />Liferay para Salesforce e Salesforce para Liferay*<br /><br /> Contas<br />* Endereços<br />* Pedidos<br />* Itens dos pedidos<br />* Observações dos pedidos<br /><br />O Conector do Liferay para Salesforce é compatível com o Liferay DXP 7.4 ou superior e com a versão 44.0 da API do Salesforce (SOAP).