liferay-releng-app-description=Security Assertion Markup Language 2.0 (SAML 2.0) ແມ່ນເວີຊັນຂອງມາດຕະຖານ SAML OASIS ສຳລັບການແລກປ່ຽນຂໍ້ມູນການຢືນຢັນຕົວຕົນ ແລະ ການອະນຸຍາດລະຫວ່າງໂດເມນຄວາມປອດໄພ. SAML 2.0 ແມ່ນໂປຣໂຕຄໍທີ່ອີງໃສ່ XML ເຊິ່ງໃຊ້ security tokens ທີ່ມີການຢືນຢັນ (assertions) ເພື່ອສົ່ງຂໍ້ມູນກ່ຽວກັບຜູ້ໃຊ້ລະຫວ່າງຜູ້ໃຫ້ບໍລິການຕົວຕົນ (identity provider) ແລະ ເວັບເຊີວິດ. SAML 2.0 ຊ່ວຍໃຫ້ສາມາດຢືນຢັນຕົວຕົນ ແລະ ອະນຸຍາດຜ່ານເວັບໄດ້ ລວມທັງການເຂົ້າສູ່ລະບົບຄັ້ງດຽວ (SSO). ແອັບນີ້ຊ່ວຍໃຫ້ Liferay ສາມາດເຮັດໜ້າທີ່ເປັນ SAML 2.0 Identity Provider (IdP) ຫຼື Service Provider (SP). ມັນຖືກສ້າງຂຶ້ນບົນ OpenSAML ແລະ ໃຊ້ Java Keystore ສຳລັບການອອກໃບຢັ້ງຢືນ/ຂໍ້ມູນປະຈຳຕົວເພື່ອຄວາມປອດໄພ. ເມື່ອຕິດຕັ້ງແອັບນີ້ແລ້ວ, ທ່ານຈຳເປັນຕ້ອງກຳນົດຄ່າເພີ່ມເຕີມເພື່ອໃຫ້ແອັບເຂົ້າກັບສະພາບແວດລ້ອມ SAML ຂອງຄຸນ. ເຂົ້າເບິ່ງລິ້ງເອກະສານເພື່ອສຶກສາເພີ່ມເຕີມກ່ຽວກັບ SAML ແລະ ຕົວເລືອກການກຳນົດຄ່າ.<br /><br />SAML Providers ທີ່ຮອງຮັບ: PingFederate, ADFS, Shibboleth, Siteminder, ແລະ OpenAM.