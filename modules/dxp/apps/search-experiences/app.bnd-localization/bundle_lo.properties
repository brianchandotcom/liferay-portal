liferay-releng-app-description=ແອັບ ${liferay.releng.app.title.prefix} Enterprise Search Experiences ປະກອບມີຊຸດຄຸນສົມບັດທີ່ປົດລັອກທ່າແຮງທັງໝົດຂອງໂຄງຮ່າງການຄົ້ນຫາຂອງ Liferay ສຳລັບຜູ້ໃຊ້ທຸກຄົນ. ເວີຊັນທຳອິດໄດ້ນຳສະເໜີຄຸນສົມບັດ "Search Blueprints". ດ້ວຍ Blueprints, ຜູ້ດູແລລະບົບການຄົ້ນຫາສາມາດ:<br /><br />* ປັບແຕ່ງພຶດຕິກຳການຄົ້ນຫາເລີ່ມຕົ້ນຂອງ Liferay ຫຼື ຂຽນທັບໃໝ່ທັງໝົດ<br />* ສະແດງຜົນການຄົ້ນຫາທີ່ປັບຕາມບໍລິບົດໂດຍອີງໃສ່ຄຸນລັກສະນະຂອງຜູ້ໃຊ້<br /><br />Search Blueprints ຊ່ວຍໃຫ້ຜູ້ດູແລລະບົບການຄົ້ນຫາສາມາດປັບປຸງພຶດຕິກຳການຄົ້ນຫາເລີ່ມຕົ້ນ ຫຼື ສ້າງອັນກໍຣິທຶມການຄົ້ນຫາແບບກຳນົດເອງໄດ້ຢ່າງສົມບູນ ໂດຍໃຊ້ເຄື່ອງມືສ້າງຄຳສັ່ງ (query builder) ແບບພາບທີ່ບໍ່ຕ້ອງຂຽນລະຫັດ. ແຕ່ລະ Blueprint ປະກອບດ້ວຍສ່ວນປະກອບຫຼາຍຢ່າງທີ່ເອີ້ນວ່າ "Elements"; ເຊິ່ງແຕ່ລະ Element ຈະສົ່ງຜົນຕໍ່ການຄົ້ນຫາໃນຮູບແບບຕ່າງໆ. ຕົວຢ່າງ: ສ້າງ Blueprint ໂດຍການເພີ່ມ Element ໜຶ່ງເພື່ອເຊື່ອງເນື້ອຫາທີ່ຕິດແທັກ "ໝົດອາຍຸ", ອີກອັນໜຶ່ງເພື່ອລະເວັ້ນຄວາມຄິດເຫັນ ແລະ ອີກອັນໜຶ່ງເພື່ອລວມຟິວທີ່ປົກກະຕິແລ້ວຖືກລະເວັ້ນໂດຍອັນກໍຣິທຶມເລີ່ມຕົ້ນ.<br /><br />ທ່ານສາມາດກຳນົດຄ່າແຕ່ລະ Element ໂດຍໃຊ້ສ່ວນຕິດຕໍ່ຜູ້ໃຊ້ທີ່ຄຸ້ນເຄີຍ ເຊິ່ງລວມມີ Elements ທີ່ສະດວກຫຼາຍຢ່າງ (ເຊັ່ນ: Elements ສຳລັບການເພີ່ມຄະແນນຜົນການຄົ້ນຫາຕາມສະຖານທີ່ທາງພູມສາດ, ຄວາມໃໝ່ຂອງເນື້ອຫາ ແລະ ອື່ນໆ). ນອກຈາກນັ້ນ, ທ່ານຍັງສາມາດສ້າງ Elements ໃໝ່ເພື່ອໃຊ້ຄວາມສາມາດທັງໝົດຂອງໂຄງຮ່າງການຄົ້ນຫາ Liferay.<br /><br />Search Blueprints ແມ່ນແບບປັບຕາມບໍລິບົດ (context-aware). ທ່ານສາມາດສະແດງຜົນການຄົ້ນຫາສະເພາະບຸກຄົນໂດຍອີງໃສ່ໂປຣໄຟລ໌, ບົດບາດ, ສະຖານທີ່, ເວລາທ້ອງຖິ່ນ ແລະ ອື່ນໆ. ແຕ່ລະໜ້າການຄົ້ນຫາສາມາດໃຊ້ Blueprint ທີ່ແຕກຕ່າງກັນໄດ້ ເພື່ອໃຫ້ມີອັນກໍຣິທຶມການຄົ້ນຫາທີ່ເປັນເອກະລັກສຳລັບກໍລະນີການໃຊ້ງານທີ່ຕ່າງກັນ ເຊິ່ງລວມມີ ອິນທຣາເນັດ, ການຄ້າ ແລະ ເວັບໄຊການຕະຫຼາດ.