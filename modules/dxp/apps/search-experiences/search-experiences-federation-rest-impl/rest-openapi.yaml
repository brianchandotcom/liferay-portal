components:
    schemas:
        Result:
            description:
                A Result represents a single search result / article.
            properties:
                title:
                    type: string
                url:
                    type: string
            type: object
        SearchResult:
            description:
                A SearchResult represents a collection of Results.
            properties:
                results:
                    items:
                        $ref: "#/components/schemas/Result"
                    type: array
            type: object
info:
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: "Search Experiences Federation"
    version: v1.0
openapi: 3.0.1
paths:
    "/search":
        get:
            operationId: getFederatedSearchResults
            parameters:
                - in: query
                  name: labels
                  required: false
                  schema:
                      type: string
                - in: query
                  name: locale
                  required: false
                  schema:
                      type: string
                - in: query
                  name: query
                  required: true
                  schema:
                      type: string
                - in: query
                  name: size
                  required: false
                  schema:
                      type: integer
                - in: query
                  name: page
                  required: false
                  schema:
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SearchResult"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/SearchResult"
            tags: ["SearchResult"]