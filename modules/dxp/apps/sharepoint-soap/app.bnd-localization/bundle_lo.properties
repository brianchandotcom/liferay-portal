liferay-releng-app-description=ແອັບ Liferay SOAP Connector ສຳລັບ SharePoint ຊ່ວຍໃຫ້ຜູ້ໃຊ້ສາມາດຈັດການໄຟລ໌ໃນຄັງ SharePoint ໄດ້ຈາກພາຍໃນຄັງເອກະສານ ແລະ ສື່ຂອງ Liferay. ແອັບນີ້ເພີ່ມປະເພດຄັງເກັບມ້ຽນ SharePoint ເຂົ້າໃນຄັງເອກະສານ ແລະ ສື່ ເພື່ອເຊື່ອມຕໍ່ກັບຄັງ SharePoint. ພາຍໃນຄັງດັ່ງກ່າວ, ຜູ້ໃຊ້ສາມາດເບິ່ງ, ເພີ່ມ, ແກ້ໄຂ ແລະ ຍ້າຍໄຟລ໌ ຫຼື ໂຟນເດີໄດ້. ແອັບຈະຊິງຄ໌ການເຮັດວຽກລະຫວ່າງຄັງ SharePoint ແລະ ຄັງເອກະສານ ແລະ ສື່ ຂອງ Liferay ໄປມາຫາກັນ.<br /><br />ນີ້ແມ່ນຄວາມສາມາດບາງຢ່າງຂອງແອັບ:<br /><br />* ການອ່ານ/ຂຽນ ເອກະສານ ແລະ ໂຟນເດີ<br />* ການ Check-in, Check-out ແລະ ຍົກເລີກ Check-out ເອກະສານ<br />* ການດາວໂຫຼດເອກະສານ<br />* ການຍ້າຍໂຟນເດີ ແລະ ເອກະສານພາຍໃນຄັງເກັບມ້ຽນ<br />* ການເບິ່ງປະຫວັດການແກ້ໄຂ<br />* ການຍ້ອນຄືນເວີຊັນ (Reverting to a revision)<br /><br />ເວີຊັນປັດຈຸບັນຂອງແອັບນີ້ເຮັດວຽກຮ່ວມກັບ SharePoint 2013.<br /><br />ເຊື່ອມຕໍ່ Liferay DXP ຂອງທ່ານກັບຄັງ SharePoint ໄດ້ແລ້ວມື້ນີ້!<br /><br />ການປ່ຽນແປງທີ່ສຳຄັນ: ຊື່ແອັບນີ້ຫາກໍຖືກປ່ຽນເມື່ອບໍ່ດົນມານີ້. ກະລຸນາເຂົ້າເບິ່ງ https://help.liferay.com/hc/en-us/articles/360018233992 ສຳລັບຂໍ້ມູນເພີ່ມເຕີມກ່ຽວກັບຂັ້ນຕອນການຕິດຕັ້ງ.