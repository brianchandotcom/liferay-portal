cas-login-url-help=Définir le serveur CAS l'URL de connexion. Utilisateurs sont redirigés vers la page de connexion de CAS lors de l'authentification sur le portail. (Automatic Translation)
cas-logout-on-session-expiration=Déconnexion à l'expiration de la session. (Automatic Translation)
cas-logout-on-session-expiration-help=Si cette case est cochée, les navigateurs avec les sessions expirées seront redirigés vers l'URL de déconnexion de CAS. (Automatic Translation)
cas-logout-url-help=Définissez le l'URL de déconnexion du serveur CAS. Définissez le si vous voulez qu'une déconnexion du portail déclenche une déconnexion du serveur CAS.
cas-no-such-user-redirect-url-help=Définissez l'URL pour rediriger un utilisateur, si l'utilisateur peut s'authentifier avec le CAS mais est introuvable dans le portail. Si l'importation de LDAP est activée, l'utilisateur est redirigé, s'il est introuvable ou ne puisse pas être importé de LDAP. (Automatic Translation)
cas-server-name-help=Mettre à activer les liens profonds dans le portail (p. ex. d'http://localhost:8080). (Automatic Translation)
cas-server-url-help=Définissez le serveur CAS préfixe d'URL de domaine (par exemple https://localhost:8443/cas-web). (Automatic Translation)
cas-service-url-help=Mettre à la désactiver des liens profonds dans le portail (par exemple http://localhost:8080/c/portail/login). (Automatic Translation)
cas.configuration.name=Serveur CAS (Automatic Translation)
import-cas-users-from-ldap=Importer depuis le LDAP
import-cas-users-from-ldap-help=Si cette case est cochée, les utilisateurs authentifiés par SAE qui n'existent pas dans le portail sont importés de LDAP. LDAP doit être activée. (Automatic Translation)
no-such-user-redirect-url=Aucune URL de redirection pour cet utilisateur
