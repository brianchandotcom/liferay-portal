ldap.export.enable=Settings for exporting users from the portal to LDAP. This allows a user to modify his first name, last name, etc. in the portal and have that change pushed to the LDAP server. This setting is not used unless the property "ldap.auth.enabled" is set to true.
ldap.export.group.enabled=Set this to true if groups and their associations should be exported from the portal to LDAP. This setting is not used unless the property "ldap.auth.enabled" is set to true.
ldap.factory.initial=Set the values used to connect to an LDAP store.
ldap.import.create.role.per.group=Set this to true if the portal should automatically create a role per group imported from LDAP. The role will be assigned to the group so that users can automatically inherit that role when they are assigned to the group.
ldap.import.enabled=Settings for importing users and groups from LDAP to the portal.
ldap.import.group.cache.enabled=Specify whether group DN lookups will be cached during LDAP import and login. If set to true, this will speed up LDAP import and login, but updates to group attributes will not be recognized until the cache entry expires. The cache size and timeout may be configured in the configuration file specifed in the property "ehcache.single.vm.config.location".
ldap.import.group.search.filter.enabled=If set to true, the group filter will be applied, but only to groups in the specified base DN. If set to false, the filter will not be applied and all groups that are associated with the imported users will be imported regardless of the base DN.
ldap.import.interval=
ldap.import.lock.expiration.time=Set the lock expiration time for LDAP import. By default, the expiration time is 1 day.
ldap.import.method=Set either user or group for import method. If set to user, the portal imports all users and the groups associated with those users. If set to group, the portal imports all groups and the users associated with those groups. This value should be set based on how your LDAP server stores group membership information.
ldap.import.on.startup=
ldap.import.user.password.autogenerated=Set this to true to autogenerate passwords for users imported from LDAP. This property is only in use if the property "ldap.import.user.password.enabled" is set to false. If an LDAP password policy is enabled (see the property "ldap.password.policy.enabled"), the password will be generated using RegExpToolkit. Set the "auth.pipeline.enable.liferay.check" property to false to disable password checking by the portal's internal authentication (which is not compatible with LDAP), and set the "auth.pipeline.pre" property to com.liferay.portal.security.auth.LDAPAuth so that password checking will be delegated to the LDAPAuth authenticator. Note that enabling LDAP export, by setting the "ldap.export.enabled" property to true, may lead to overwriting the LDAP user's password with an autogenerated password.
ldap.import.user.password.default=Set either screenName or plain text as the default password for the imported LDAP user. Setting the value to screenName will use the user's screen name as the password for the imported LDAP user. Setting the value to any other plain text value will use that value as the password for the imported LDAP user. This property is only in use if the properties "ldap.import.user.password.enabled" and "ldap.import.user.password.autogenerated" are both set to false.
ldap.import.user.password.enabled=Set this to false when the LDAP user's password should not be imported to the Liferay user.
ldap.page.size=Set the page size for directory servers that support paging. This value needs to be 1000 or less for the Microsoft Active Directory Server.
ldap.password.policy.enabled=Set this to true to use LDAP's password policy instead of the portal password policy. If set to true, it is possible that portal generated passwords will not match the LDAP policy. See the "passwords.regexptoolkit.*" properties for details on configuring RegExpToolkit in generating these passwords.
ldap.range.size=Set the number of values to return in each query to a multivalued attribute for directory servers that support range retrieval. The range size must be 1000 or less for Windows 2000 and 1500 or less for Windows Server 2003.
ldap.referral=
ldap.user.ignore.attributes=Set the user attributes that are controlled from the portal. When adding or updating a user from LDAP, these attributes will be skipped.

