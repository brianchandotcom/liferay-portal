forbidden.classes=Introdueix, separades per una coma, una llista de noms de classe els quals mai estaran disponibles per scripts del costat del servidor definits per l'usuari. La cadena especial "all_classes" deshabilita l'accés a totes les classes Java. Aquesta propietat només tindrà efecte quan s'utilitzi el servei de scripts i invocant els mètodes eval o exec.
