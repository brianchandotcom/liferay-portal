forbidden.classes=Inserisci una lista di nomi di classe delimitati da virgola che non saranno mai rese disponibili agli script definit dall'utente lato server. La stringa speciale "all_classes" disabilita l'accesso a tutte le classi java. Questa proprietà è effettiva solamente quando utilizzato il servizio di Scripting viene invocata una eval o un metodo exec.
