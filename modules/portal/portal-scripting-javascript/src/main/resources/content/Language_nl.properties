forbidden.classes=Voer een lijst van door komma's gescheiden klassenamen in die nooit beschikbaar zullen zijn in door gebruikers gedefinieerde scripts op de server. De speciale string "all_classes" schakelt toegang tot alle Javaklassen uit. Dit veld is alleen werkzaam bij gebruik van de Scripting-service, en bij het aanroepen van de eval- en exec-methodes.
javascript.executor.configuration.name=JavaScript Engine