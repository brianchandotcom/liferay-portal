forbidden.classes=Insira uma lista de nomes de classes, separadas por vírgula, que nunca estarão disponíveis para scripts de servidor definidos por utilizadores. A palavra especial "all_classes" desativa o acesso a qualquer classe Java. Esta propriedade só é efetiva quando se utiliza o serviço de Scripting e se chama métodos eval ou exec.
