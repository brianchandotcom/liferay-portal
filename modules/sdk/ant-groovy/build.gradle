sourceCompatibility = "1.8"
targetCompatibility = "1.8"

clean {
	ext {
		cleanDeployed = false
	}
}

configurations {
	portalTest {
		exclude group: "com.liferay.portal", module: "com.liferay.portal.test"
	}

	portalTestSnapshot {
		exclude group: "com.liferay.portal", module: "com.liferay.portal.impl"
		exclude group: "com.liferay.portal", module: "com.liferay.portal.kernel"
	}
}

dependencies {
	api group: "org.codehaus.groovy", name: "groovy", version: "3.0.21"
	compileOnly group: "org.apache.ant", name: "ant", transitive: false, version: "1.10.14"
	testImplementation group: "junit", name: "junit", version: "4.13.1"
	testImplementation group: "org.apache.ant", name: "ant", transitive: false, version: "1.10.14"
	testImplementation group: "org.apache.ant", name: "ant-launcher", version: "1.10.14"
}

liferay {
	deployDir = file("../../../lib/development")
}