buildscript {

	repositories {
		mavenLocal()
		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}
	}
}

apply plugin: "com.liferay.base.plugin"

String gradleVersion = "8.5"
dependencies {
	api group: "com.liferay", name: "com.liferay.ant.mirrors.get", version: "1.2.22"
	api group: "com.liferay", name: "com.liferay.gradle.plugins", version: "16.1.61"
	api group: "com.liferay", name: "com.liferay.gradle.plugins.defaults", version: "latest.release"
	api group: "com.liferay", name: "com.liferay.gradle.util", version: "1.0.49"
	compileOnly fileTree(builtBy: [rootProject.tasks.getByName("extractGradleApi" + gradleVersion.replace(".", ""))], dir: new File(rootProject.buildDir, "gradle-${gradleVersion}"))
}