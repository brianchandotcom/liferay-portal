buildscript {
	dependencies {
		classpath group: "com.liferay", name: "com.liferay.gradle.plugins.tld.doc.builder", version: "latest.release"
	}

	repositories {
		mavenLocal()

		maven {
			url "http://cdn.repository.liferay.com/nexus/content/groups/public"
		}
	}
}

apply plugin: "com.liferay.tld.doc.builder"
apply plugin: "java"

dependencies {
	compile group: "javax.servlet.jsp", name: "jsp-api", version: "2.1"
}

repositories {
	mavenLocal()

	maven {
		url "http://cdn.repository.liferay.com/nexus/content/groups/public"
	}
}