task runGradleTest

runGradleTest {
	dependsOn ":client-extension:assembleClientExtension"

	doLast {
		Project clientExtensionProject = project(":client-extension")

		File staticDir = clientExtensionProject.file("${clientExtensionProject.buildDir}/liferay-client-extension-build/static")

		File dummyFile = new File(staticDir, "dummy.txt")

		assert !dummyFile.exists()

		File fooFile = new File(staticDir, "foo.txt")

		assert fooFile.exists()
	}
}