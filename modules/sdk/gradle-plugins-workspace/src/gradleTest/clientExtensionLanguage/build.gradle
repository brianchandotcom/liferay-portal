import groovy.json.JsonSlurper

task runGradleTest

runGradleTest {
	dependsOn ":language:build"

	doLast {
		Project languageProject = project(":language")

		JsonSlurper jsonSlurper = new JsonSlurper()

		_compareObjects(
			"language.client-extension-config.json",
			jsonSlurper.parse(project.file("expected-client-extension-config.json")),
			jsonSlurper.parse(languageProject.file("build/liferay-client-extension-build/language.client-extension-config.json")),
			"")

		_compareObjects(
			"language.batch-engine-data.json",
			jsonSlurper.parse(project.file("expected-batch-engine-data.json")),
			jsonSlurper.parse(languageProject.file("build/liferay-client-extension-build/batch/language.batch-engine-data.json")),
			"")
	}
}

private void _compareObjects(String fileName, Object object1, Object object2, String path) {
	if (object1 instanceof Map) {
		assert object2 instanceof Map

		assert object1.size() == object2.size() : "${fileName}: Object sizes do not match at property path ${path}"

		object1.each {
			key, value1 ->

			assert object2.containsKey(key) : "${fileName}: No key found at property path ${path}"

			if (key.equals("buildTimestamp")) {
				return
			}

			_compareObjects(fileName, value1, object2.get(key), "${path}['${key}']")
		}

		return
	}

	if (object1 instanceof List) {
		assert object2 instanceof List

		assert object1.size() == object2.size() : "${fileName}: Array sizes do not match at property path ${path}"

		object1.sort()
		object2.sort()

		object1.eachWithIndex {
			item1, i ->

			_compareObjects(fileName, item1, object2[i], "${path}[${i}]")
		}

		return
	}

	assert object1 == object2 : "${fileName}: Wrong value at property path ${path}"
}