task runGradleTest

runGradleTest {
	dependsOn ":global-js-client-extension:createClientExtensionConfig", ":instance-scoped-global-js-client-extension:createClientExtensionConfig"

	doLast {
		File clientExtensionConfigJSONFile = _getClientExtensionConfigJSONFile("global-js-client-extension")

		assert clientExtensionConfigJSONFile.text.contains('scriptElementAttributesJSON={\\"async\\":false,\\"data-bool-false\\":false,\\"data-bool-true\\":true,\\"data-empty\\":\\"\\",\\"data-str-false\\":\\"false\\",\\"data-str-true\\":\\"true\\",\\"defer\\":true,\\"nomodule\\":false}')

		clientExtensionConfigJSONFile = _getClientExtensionConfigJSONFile("instance-scoped-global-js-client-extension")

		assert clientExtensionConfigJSONFile.text.contains('restrictedToAdminPages=true')
		assert clientExtensionConfigJSONFile.text.contains('scope=instance')
		assert clientExtensionConfigJSONFile.text.contains('scriptLocation=head')
	}
}
private File _getClientExtensionConfigJSONFile(String projectName) {
	Project clientExtensionProject = project(":${projectName}")

	File clientExtensionConfigJSONFile = clientExtensionProject.file("${clientExtensionProject.getProjectDir()}/build/liferay-client-extension-build/${projectName}.client-extension-config.json")

	assert clientExtensionConfigJSONFile.exists()

	return clientExtensionConfigJSONFile
}