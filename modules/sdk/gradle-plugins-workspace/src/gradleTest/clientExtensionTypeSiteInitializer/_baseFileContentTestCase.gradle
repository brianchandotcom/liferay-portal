task runGradleTest

assert ext.properties.containsKey("expectedContentStrings") : "No ext.expectedContentStrings extension property set"
assert ext.properties.containsKey("expectedFilePath") : "No ext.expectedFilePath extension property set"

String expectedFilePath = ext.expectedFilePath
String[] expectedContentStrings = ext.expectedContentStrings

runGradleTest {
	dependsOn ":site-initializer:createClientExtensionConfig"

	doLast {
		Project siteInitializerProject = project(":site-initializer")

		File cxBuildDir = siteInitializerProject.file("${siteInitializerProject.buildDir}/liferay-client-extension-build")

		File file = siteInitializerProject.file("${cxBuildDir}/${expectedFilePath}")

		assert file.exists()

		expectedContentStrings.each {
			assert file.text.contains(it)
		}
	}
}