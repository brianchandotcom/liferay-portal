		File withoutVirtualInstanceIdClientExtensionZipFile = withoutVirtualInstanceIdClientExtensionProject.file("dist/without-virtual-instance-id-client-extension.zip")

		assert withoutVirtualInstanceIdClientExtensionZipFile.exists()
