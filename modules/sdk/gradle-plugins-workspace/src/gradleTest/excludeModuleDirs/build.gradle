task runGradleTest

runGradleTest {
	dependsOn ":modules:sample:sample-service:buildService"
	dependsOn ":modules:sample:sample-service:jar"
	dependsOn ":modules:sample:sample-api:jar"
	dependsOn ":modules:example:example-service:buildService"
	dependsOn ":modules:example:example-service:jar"
	dependsOn ":modules:example:example-api:jar"
	dependsOn ":modules:testApi:jar"

	doLast {
		Project exampleApiProject = project(":modules:example:example-api")

		File exampleApiJarFile = exampleApiProject.file("build/libs/example.api-1.0.0.jar")

		assert !exampleApiJarFile.exists()

		Project exampleServiceProject = project(":modules:example:example-service")

		File exampleServiceJarFile = exampleServiceProject.file("build/libs/example.service-1.0.0.jar")

		assert !exampleServiceJarFile.exists()

		Project sampleApiProject = project(":modules:sample:sample-api")

		File sampleApiJarFile = sampleApiProject.file("build/libs/sample.api-1.0.0.jar")

		assert !sampleApiJarFile.exists()

		Project sampleServiceProject = project(":modules:sample:sample-service")

		File sampleServiceJarFile = sampleServiceProject.file("build/libs/sample.service-1.0.0.jar")

		assert !sampleServiceJarFile.exists()

		Project testApiProject = project(":modules:testApi")

		File testApiJarFile = testApiProject.file("build/libs/com.example.test-1.0.0.jar")

		assert testApiJarFile.exists()
	}
}