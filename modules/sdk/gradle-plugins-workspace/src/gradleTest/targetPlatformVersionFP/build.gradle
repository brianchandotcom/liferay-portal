task runGradleTest

allprojects {
	repositories {
		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}
	}
}

runGradleTest {
	dependsOn eclipseClasspath

	doLast {
		String[] dependencyNames = configurations.targetPlatformBoms.dependencies.collect {
			it.name
		}

		assert dependencyNames.contains("release.dxp.bom")
		assert dependencyNames.contains("release.dxp.bom.compile.only")
		assert dependencyNames.contains("release.dxp.bom.third.party")
	}
}