task runGradleTest

dependencies {
	evergreen files("evergreen.zip")
}

runGradleTest {
	dependsOn updateWorkspace

	doLast {
		File file = new File(projectDir, "evergreen-marker.txt")

		assert file.exists()

		File nestedFile = new File(projectDir, "nested/evergreen-marker.txt")

		assert nestedFile.exists()
	}
}