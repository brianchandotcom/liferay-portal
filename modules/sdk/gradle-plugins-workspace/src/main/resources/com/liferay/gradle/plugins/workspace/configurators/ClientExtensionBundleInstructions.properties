Bundle-SymbolicName: ${project.name}
Bundle-Version: ${project.version}
Require-Capability:\
    osgi.extender;\
        filter:="(&(osgi.extender=osgi.configurator)(version>=1.0)(!(version>=2.0)))"
Web-ContextPath: /${project.name}
-includeresource:\
LCP.json;literal='${lcpJsonValue}',\
OSGI-INF/configurator/osgi.config.json;literal='${osgiConfigJsonValue}',\
Dockerfile;literal='${dockerFileValue}'