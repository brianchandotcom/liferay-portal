Bundle-SymbolicName: ${project.name}
Bundle-Version: ${project.version}
Require-Capability:\
    osgi.extender;\
        filter:="(&(osgi.extender=osgi.configurator)(version>=1.0)(!(version>=2.0)))"
Web-ContextPath: /${project.name}
-includeresource:\
    LCP.json;literal='\
{\n\
  "kind": "Deployment",\n\
  "id": "${project.name}",\n\
  "cpu": 0.1,\n\
  "scale": 1,\n\
  "memory": 50,\n\
  "loadBalancer": {\n\
    "targetPort": 80,\n\
    "cdn": true\n\
  },\n\
  "environments": {\n\
    "infra": {\n\
      "deploy": false\n\
    },\n\
    "dev": {\n\
      "loadBalancer": {\n\
        "targetPort": 80,\n\
        "cdn": false\n\
      }\n\
    }\n\
  }\n\
}',\
OSGI-INF/configurator/osgi.config.json;literal='\
{\n\
    "com.liferay.design.pack.factory.configuration.v1.DesignPackConfiguration~${project.name}": {\n\
        ":configurator:policy": "force",\n\
        "charset": "UTF-8",\n\
        "clayCss": "$[conf:host.service.address]/clay.css",\n\
        "mainCss": "$[conf:host.service.address]/main.css",\n\
        "host.service.address": "${portalURL}/o/${project.name}",\n\
        "timestamp": "${tstamp}"\n\
    }\n\
}',\
Dockerfile;literal='\
FROM ${designPackDockerFrom}\n\
COPY META-INF/resources /resources/',\
META-INF/resources/=build/buildTheme/css;filter:=*.css;recursive:=false