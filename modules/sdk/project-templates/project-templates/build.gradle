import com.liferay.gradle.util.FileUtil
import com.liferay.gradle.util.copy.StripPathSegmentsAction

import org.gradle.execution.ProjectConfigurer

task cleanProjectTemplateTests(type: Delete)
task uploadProjectTemplateArchives
task writeProjectTemplateVersions

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

File mavenWrapperPropertiesFile = file("src/main/resources/maven-wrapper/.mvn/wrapper/maven-wrapper.properties")

Properties mavenWrapperProperties = GUtil.loadProperties(mavenWrapperPropertiesFile)

String mavenDistributionVersion = mavenWrapperProperties["distributionUrl"]

mavenDistributionVersion = mavenDistributionVersion.find(/\d+\.\d+\.\d+/)

Set<Project> projectTemplateProjects = project.parent.subprojects.findAll {
	it.name.startsWith "project-templates-"
}

ProjectConfigurer projectConfigurer = gradle.services.get(ProjectConfigurer)

bundle {
	includeTransitiveDependencies = true
}

cleanProjectTemplateTests {
	delete fileTree(dir: processTestResources.destinationDir, include: "*.jar")
}

configurations {
	mavenDistribution
	projectTemplates

	projectTemplatesTests {
		extendsFrom projectTemplates

		resolutionStrategy.dependencySubstitution.all {
			DependencySubstitution dependencySubstitution ->

			ComponentSelector componentSelector = dependencySubstitution.requested

			if ((componentSelector instanceof ModuleComponentSelector) && componentSelector.module.startsWith("com.liferay.project.templates.")) {
				String template = componentSelector.module.substring(30)

				template = template.replace('.' as char, '-' as char)

				Project projectTemplateProject = project.parent.childProjects["project-templates-" + template]

				projectConfigurer.configure projectTemplateProject

				dependencySubstitution.useTarget projectTemplateProject
			}
		}
	}
}

dependencies {
	compileInclude group: "com.beust", name: "jcommander", version: "1.72"

	compileOnly group: "org.apache.maven.archetype", name: "archetype-common", version: "2.4"

	mavenDistribution classifier: "bin", ext: "zip", group: "org.apache.maven", name: "apache-maven", version: mavenDistributionVersion

	projectTemplates project(":sdk:project-templates:project-templates-activator")
	projectTemplates project(":sdk:project-templates:project-templates-api")
	projectTemplates project(":sdk:project-templates:project-templates-content-targeting-report")
	projectTemplates project(":sdk:project-templates:project-templates-content-targeting-rule")
	projectTemplates project(":sdk:project-templates:project-templates-content-targeting-tracking-action")
	projectTemplates project(":sdk:project-templates:project-templates-control-menu-entry")
	projectTemplates project(":sdk:project-templates:project-templates-form-field")
	projectTemplates project(":sdk:project-templates:project-templates-fragment")
	projectTemplates project(":sdk:project-templates:project-templates-freemarker-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-layout-template")
	projectTemplates project(":sdk:project-templates:project-templates-mvc-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-angular-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-billboardjs-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-isomorphic-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-jquery-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-metaljs-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-react-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-npm-vuejs-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-panel-app")
	projectTemplates project(":sdk:project-templates:project-templates-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-portlet-configuration-icon")
	projectTemplates project(":sdk:project-templates:project-templates-portlet-provider")
	projectTemplates project(":sdk:project-templates:project-templates-portlet-toolbar-contributor")
	projectTemplates project(":sdk:project-templates:project-templates-rest")
	projectTemplates project(":sdk:project-templates:project-templates-service")
	projectTemplates project(":sdk:project-templates:project-templates-service-builder")
	projectTemplates project(":sdk:project-templates:project-templates-service-wrapper")
	projectTemplates project(":sdk:project-templates:project-templates-simulation-panel-entry")
	projectTemplates project(":sdk:project-templates:project-templates-soy-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-spring-mvc-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-template-context-contributor")
	projectTemplates project(":sdk:project-templates:project-templates-theme")
	projectTemplates project(":sdk:project-templates:project-templates-theme-contributor")
	projectTemplates project(":sdk:project-templates:project-templates-war-hook")
	projectTemplates project(":sdk:project-templates:project-templates-war-mvc-portlet")
	projectTemplates project(":sdk:project-templates:project-templates-workspace")

	testCompile gradleTestKit()
	testCompile group: "biz.aQute.bnd", name: "biz.aQute.bnd", version: "3.2.0"
	testCompile group: "com.googlecode.java-diff-utils", name: "diffutils", version: "1.3.0"
	testCompile group: "junit", name: "junit", version: "4.12"
	testCompile group: "net.diibadaaba.zipdiff", name: "zipdiff", version: "1.0"
	testCompile project(":test:maven-executor")
}

liferayOSGi {
	expandCompileInclude = true
}

processResources {
	from configurations.projectTemplates
}

processTestResources {
	dependsOn cleanProjectTemplateTests
	from configurations.projectTemplatesTests
}

test {
	dependsOn projectTemplateProjects.collect {
		"${it.path}:install"
	}

	dependsOn writeProjectTemplateVersions

	doFirst {
		Properties gradleWrapperProperties = new Properties()

		File gradleWrapperPropertiesFile = file("src/main/resources/gradle-wrapper/gradle/wrapper/gradle-wrapper.properties")

		gradleWrapperPropertiesFile.withInputStream {
			gradleWrapperProperties.load it
		}

		String gradleDistributionUrl = gradleWrapperProperties["distributionUrl"]

		File gradleDistributionFile = FileUtil.get(project, gradleDistributionUrl)

		systemProperty "gradle.distribution", uri(gradleDistributionFile)
		systemProperty "maven.distribution.file.name", configurations.mavenDistribution.singleFile
	}

	jvmArgs "-XX:MaxMetaspaceSize=256m"
	maxHeapSize = "1024m"

	systemProperty "http.proxyHost", System.properties["http.proxyHost"]
	systemProperty "http.proxyPort", System.properties["http.proxyPort"]
	systemProperty "maven.debug", System.properties["maven.debug"]
	systemProperty "maven.repo.local", System.properties["maven.repo.local"]
	systemProperty "repository.url", System.properties["repository.url"]
	systemProperty "test.debug.bundle.diffs", System.properties["test.debug.bundle.diffs"]

	systemProperties projectTemplateTokens
}

uploadProjectTemplateArchives {
	dependsOn projectTemplateProjects.collect {
		"${it.path}:uploadArchives"
	}
}

writeProjectTemplateVersions {
	doLast {
		Properties properties = new Properties()

		for (Project projectTemplateProject in projectTemplateProjects) {
			Properties bndProperties = GUtil.loadProperties(projectTemplateProject.file("bnd.bnd"))

			properties.setProperty bndProperties["Bundle-SymbolicName"], bndProperties["Bundle-Version"]
		}

		File projectTemplateVersionsFile = new File(buildDir, "project-template-versions.properties")

		projectTemplateVersionsFile.parentFile.mkdirs()

		projectTemplateVersionsFile.withOutputStream {
			properties.store it, null
		}
	}
}