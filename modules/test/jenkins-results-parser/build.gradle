import com.liferay.gradle.util.GradleUtil

buildCSS {
	ext {
		autoClean = false
	}
}

dependencies {
	compile group: "dom4j", name: "dom4j", version: "1.6.1"
	compile group: "junit", name: "junit", version: "4.12"
	compile group: "org.apache.ant", name: "ant", version: "1.9.4"
	compile group: "org.json", name: "json", version: "20090211"

	runtime group: "jaxen", name: "jaxen", version: "1.1.6"
}

task deployWithDependencies(type: Copy)

deployWithDependencies {
	from configurations.runtime
	from jar

	into GradleUtil.getProperty(project, "destinationDir", (File)null)
}

gradle.taskGraph.whenReady { taskGraph ->
	def reportURL = null

	if(taskGraph.hasTask(':test:jenkins-results-parser:generateTestData')) {
		def url = System.console().readLine("\n> Please enter the Jenkins report URL: ")

		reportURL = new String(url)
	}

	if (reportURL != null && reportURL.length() > 0) {
		javaexec {
			main = "com.liferay.jenkins.results.junit.TestDataGenerator"

			classpath = sourceSets.main.runtimeClasspath + files("${projectDir}/test-classes/unit")

			args "${reportURL}"
		}
	} else {
		println "Aborting, you must provide a Jenkins report URL"
	}
}

task generateTestData(dependsOn: ["compileJava", "compileTestJava"]) {
}