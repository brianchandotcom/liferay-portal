##
## Test Batch
##

	test.batch.class.names.excludes=

    #
    # Default
    #

    test.batch.class.names.includes[modules-unit-jdk8]=\
        **/src/test/**/jenkins-results-parser/**/*Test.java,\
        **/src/test/**/poshi-runner/**/*Test.java

    test.batch.class.names.includes[modules-integration-*-jdk8]=\
        **/src/testIntegration/**/jenkins-results-parser/**/*Test.java,\
        **/src/testIntegration/**/poshi-runner/**/*Test.java

    #
    # Current Branch
    #

    test.batch.dist.app.servers[current-branch]=tomcat

    test.batch.names[current-branch]=\
        modules-integration-jdk8,\
        modules-unit-jdk8

    test.batch.class.names.appends[modules-unit-jdk8][current-branch]=${test.batch.class.names.includes[modules-unit-jdk8]}
    test.batch.class.names.appends[modules-integration-*-jdk8][current-branch]=${test.batch.class.names.includes[modules-integration-jdk8]}

    test.batch.include.base.settings[current-branch]=true