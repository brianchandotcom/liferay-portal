import com.liferay.gradle.util.FileUtil
import com.liferay.gradle.util.OSDetector

task downloadSrc(type: Copy)
task jarMvn(type: Exec)

String facesUtilGitHash = "d79007e280dee49bb10aa3a9704fe225d942a02d"
String facesUtilSrcUrl = "https://github.com/liferay/liferay-faces-portal/archive/${facesUtilGitHash}.zip"
File srcDir = new File(buildDir, "liferay-faces-portal-${facesUtilGitHash}")

downloadSrc {
	doLast {
		File pomXmlFile = new File(srcDir, "pom.xml")

		if (pomXmlFile.exists()) {
			pomXmlFile.text = pomXmlFile.text.replace("<module>demo</module>", "")
			pomXmlFile.text = pomXmlFile.text.replace("<module>test</module>", "")
		}
	}

	doNotTrackState("")

	from {
		zipTree(FileUtil.get(project, facesUtilSrcUrl))
	}

	into buildDir
}

jar {
	dependsOn jarMvn
	setActions([])
}

jarMvn {
	commandLine _getMvnCommand("package")
	dependsOn downloadSrc

	doLast {
		copy {
			from new File(srcDir, "portal/target")
			include "com.liferay.faces.portal-7.0.0.jar"
			into base.distsDirectory

			rename {
				jar.archiveFileName.get()
			}
		}
	}

	workingDir = srcDir
}

jarSources {
	mustRunAfter downloadSrc
}

processResources {
	mustRunAfter downloadSrc
}

private List<String> _getMvnCommand(String command) {
	if (OSDetector.windows) {
		return ["cmd.exe", "/c", "mvn ${command}"]
	}

	return ["/bin/sh", "-c", "mvn ${command}"]
}