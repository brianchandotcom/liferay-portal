import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task patch(type: PatchTask)

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

dependencies {
	compileOnly group: "taglibrarydoc", name: "tlddoc", version: "1.3"
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	fileNames "com/sun/tlddoc/Constants.java"
	fileNames "com/sun/tlddoc/TLDDocGenerator.java"
	originalLibModuleName = "tlddoc"
}