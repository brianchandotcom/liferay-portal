import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task deployJar(type: Copy)
task patch(type: PatchTask)

dependencies {
	compile group: "org.jodd", name: "jodd-core", optional, version: "3.6.4"
}

patch {
	ext {
		autoClean = false
	}

	fileNames "jodd/util/UnsafeUtil.java"

	originalLibModuleName = "jodd-core"
}

deploy {
	finalizedBy deployJar
}

deployJar {
	ext {
		autoClean = false
	}

	from jar
	into "../../../lib/portal"

	rename {
		"jodd-core.jar"
	}
}