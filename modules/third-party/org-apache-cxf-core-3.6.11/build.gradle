import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task patch(type: PatchTask)

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

compileJava {
	options.release = 8
}

dependencies {
	compileOnly group: "cglib", name: "cglib-nodep", transitive: false, version: "3.3.0"
	compileOnly group: "com.fasterxml.woodstox", name: "woodstox-core", transitive: false, version: "6.6.2"
	compileOnly group: "com.sun.xml.fastinfoset", name: "FastInfoset", transitive: false, version: "1.2.18"
	compileOnly group: "isorelax", name: "isorelax", transitive: false, version: "20030108"
	compileOnly group: "javax.activation", name: "javax.activation-api", transitive: false, version: "1.2.0"
	compileOnly group: "javax.annotation", name: "javax.annotation-api", transitive: false, version: "1.3.2"
	compileOnly group: "javax.validation", name: "validation-api", transitive: false, version: "2.0.1.Final"
	compileOnly group: "javax.xml.bind", name: "jaxb-api", transitive: false, version: "2.3.1"
	compileOnly group: "javax.xml.ws", name: "jaxws-api", transitive: false, version: "2.3.1"
	compileOnly group: "net.java.dev.msv", name: "msv-core", transitive: false, version: "2022.7"
	compileOnly group: "org.apache.aries.blueprint", name: "blueprint-parser", transitive: false, version: "1.6.1"
	compileOnly group: "org.apache.aries.blueprint", name: "org.apache.aries.blueprint.api", transitive: false, version: "1.0.1"
	compileOnly group: "org.apache.aries.blueprint", name: "org.apache.aries.blueprint.core", transitive: false, version: "1.10.3"
	compileOnly group: "org.apache.cxf", name: "cxf-core", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.ws.xmlschema", name: "xmlschema-core", transitive: false, version: "2.3.2"
	compileOnly group: "org.codehaus.woodstox", name: "stax2-api", transitive: false, version: "4.2.1"
	compileOnly group: "org.glassfish.jaxb", name: "jaxb-runtime", transitive: false, version: "2.3.5"
	compileOnly group: "org.osgi", name: "org.osgi.core", transitive: false, version: "6.0.0"
	compileOnly group: "org.osgi", name: "osgi.cmpn", transitive: false, version: "6.0.0"
	compileOnly group: "org.ow2.asm", name: "asm", transitive: false, version: "9.9.1"
	compileOnly group: "org.slf4j", name: "slf4j-api", transitive: false, version: "1.7.36"
	compileOnly group: "org.springframework", name: "spring-aop", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework", name: "spring-beans", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework", name: "spring-context", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework", name: "spring-core", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework.osgi", name: "spring-osgi-core", transitive: false, version: "1.2.1"
	compileOnly group: "org.springframework.osgi", name: "spring-osgi-io", transitive: false, version: "1.2.1"
	compileOnly group: "relaxngDatatype", name: "relaxngDatatype", transitive: false, version: "20020414"
	compileOnly group: "xml-resolver", name: "xml-resolver", transitive: false, version: "1.2"
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	fileNames "**/*.java"

	originalLibModuleName = "cxf-core"
}