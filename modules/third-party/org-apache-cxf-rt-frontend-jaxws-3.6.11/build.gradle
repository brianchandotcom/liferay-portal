import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task patch(type: PatchTask)

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

compileJava {
	options.release = 8
}

dependencies {
	compileOnly group: "javax.annotation", name: "javax.annotation-api", transitive: false, version: "1.3.2"
	compileOnly group: "javax.servlet", name: "javax.servlet-api", transitive: false, version: "4.0.1"
	compileOnly group: "javax.xml.bind", name: "jaxb-api", transitive: false, version: "2.3.1"
	compileOnly group: "javax.xml.soap", name: "javax.xml.soap-api", transitive: false, version: "1.4.0"
	compileOnly group: "javax.xml.ws", name: "jaxws-api", transitive: false, version: "2.3.1"
	compileOnly group: "org.apache.aries.blueprint", name: "blueprint-parser", transitive: false, version: "1.6.1"
	compileOnly group: "org.apache.aries.blueprint", name: "org.apache.aries.blueprint.api", transitive: false, version: "1.0.1"
	compileOnly group: "org.apache.aries.blueprint", name: "org.apache.aries.blueprint.core", transitive: false, version: "1.10.3"
	compileOnly group: "org.apache.cxf", name: "cxf-core", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-bindings-soap", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-bindings-xml", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-databinding-jaxb", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-frontend-jaxws", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-frontend-simple", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-transports-http", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-wsdl", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.ws.xmlschema", name: "xmlschema-core", transitive: false, version: "2.3.2"
	compileOnly group: "org.osgi", name: "org.osgi.core", transitive: false, version: "6.0.0"
	compileOnly group: "org.osgi", name: "osgi.cmpn", transitive: false, version: "6.0.0"
	compileOnly group: "org.ow2.asm", name: "asm", transitive: false, version: "9.9.1"
	compileOnly group: "org.springframework", name: "spring-beans", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework", name: "spring-context", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework", name: "spring-core", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework", name: "spring-web", transitive: false, version: "5.3.39"
	compileOnly group: "org.springframework", name: "spring-webmvc", transitive: false, version: "5.3.39"
	compileOnly group: "wsdl4j", name: "wsdl4j", transitive: false, version: "1.6.3"
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	fileNames "**/*.java"

	originalLibModuleName = "cxf-rt-frontend-jaxws"
}