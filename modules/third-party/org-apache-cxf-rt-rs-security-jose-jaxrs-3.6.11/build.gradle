import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task patch(type: PatchTask)

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

compileJava {
	options.release = 8
}

dependencies {
	compileOnly group: "javax.annotation", name: "javax.annotation-api", transitive: false, version: "1.3.2"
	compileOnly group: "javax.ws.rs", name: "javax.ws.rs-api", transitive: false, version: "2.1.1"
	compileOnly group: "org.apache.cxf", name: "cxf-core", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-frontend-jaxrs", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-rs-json-basic", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-rs-security-jose", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-rs-security-jose-jaxrs", transitive: false, version: "3.6.11"
	compileOnly group: "org.apache.cxf", name: "cxf-rt-security", transitive: false, version: "3.6.11"
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	fileNames "**/*.java"

	originalLibModuleName = "cxf-rt-rs-security-jose-jaxrs"
}