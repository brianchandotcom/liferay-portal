import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task jarManifest
task jarPatched(type: Zip)
task patch(type: PatchTask)

dependencies {
	compileOnly group: "org.apache.logging.log4j", name: "log4j-core", version: "2.17.1"
}

jar {
	dependsOn jarPatched
	finalizedBy jarManifest
	setActions([])
}

jarManifest {
	doLast {
		ant.jar(destfile: jar.archivePath, update: true)
	}
}

jarPatched {
	archiveFileName = jar.archiveFileName
	destinationDirectory = jar.destinationDirectory
	duplicatesStrategy = "exclude"
	exclude "META-INF/versions/9/org/apache/logging/log4j/core/util/SystemClock.class"
	from sourceSets.main.output

	from {
		zipTree(
			configurations.compileOnly.find {
				it.name.startsWith "log4j-core-"
			})
	}

	mustRunAfter compileJava
	mustRunAfter generatePomFileForMavenPublication
	mustRunAfter processResources
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	fileNames "org/apache/logging/log4j/core/lookup/Interpolator.java"
	originalLibModuleName = "log4j-core"
}