ext {
	jakartaFacesModule = true
}

if (JavaVersion.current() != JavaVersion.VERSION_17) {
	throw new GradleException("Project ${project.name} requires JDK 17.")
}

apply from: "../../build-jakarta-transformer.gradle"

dependencies {
	compileOnly group: "com.liferay", name: "org.primefaces", transitive: false, version: "15.0.6.LIFERAY-PATCHED-3"
}