import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task patch(type: PatchTask)

dependencies {
	api group: "org.springframework", name: "spring-beans", version: "6.2.19"
	api group: "org.springframework", name: "spring-core", version: "6.2.19"
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	fileNames "org/springframework/beans/StandardBeanInfoFactory.java"
	originalLibModuleName = "spring-beans"
}