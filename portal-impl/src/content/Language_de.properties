stage-2-role-help=This stage takes leadership over a given task and drives the review process through the task's lifecycle. The role at <strong>Task Leader Stage</strong> should grant, at least, <em>Approve Proposal</em>, <em>Assign Reviewer</em>, and <em>Manage Pages</em> permissions to its members. Add more permissions as individually required. (Automatic Copy)
