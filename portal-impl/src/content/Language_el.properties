staging-cannot-be-used-for-this-site-because-the-propagation-of-changes-from-the-site-template-is-enabled=Στάσης δεν μπορεί να χρησιμοποιηθεί για αυτήν την τοποθεσία, επειδή είναι ενεργοποιημένη η διάδοση των αλλαγών από το πρότυπο τοποθεσίας. (Automatic Translation)
