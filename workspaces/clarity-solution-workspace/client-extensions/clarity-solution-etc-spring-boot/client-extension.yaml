assemble:
    -   fromTask: bootJar
clarity-solution-etc-spring-boot-create-account-action:
    name: Clarity Solution Etc Spring Boot Create Account Action
    oAuth2ApplicationExternalReferenceCode: clarity-solution-etc-spring-boot-oauth-application-user-agent
    resourcePath: /object/action/account
    type: objectAction
clarity-solution-etc-spring-boot-oauth-application-user-agent:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Clarity Solution Etc Spring Boot OAuth Application User Agent
    scopes:
        -   Liferay.Headless.Admin.User.everything
        -   Liferay.Headless.Admin.Workflow.everything
    type: oAuthApplicationUserAgent
clarity-solution-etc-spring-boot-workflow-action:
    name: Clarity Solution Etc Spring Boot Workflow Action
    oAuth2ApplicationExternalReferenceCode: clarity-solution-etc-spring-boot-oauth-application-user-agent
    resourcePath: /workflow/action/application
    type: workflowAction