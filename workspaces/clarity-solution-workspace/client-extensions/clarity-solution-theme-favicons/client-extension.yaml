assemble:
    - from: assets/favicons
      hashify: favicon_*.ico
      into: static
    - from: assets/js
      hashify: global.js
      into: static
clarity-solution-theme-favicon-dark:
    name: Clarity Solution Theme Favicon Dark
    type: themeFavicon
    url: favicon_dark.*.ico
clarity-solution-theme-favicon-light:
    name: Clarity Solution Theme Favicon Light
    type: themeFavicon
    url: favicon_light.*.ico
clarity-solution-theme-favicon-primary:
    name: Clarity Solution Theme Favicon Primary
    type: themeFavicon
    url: favicon_primary.*.ico
clarity-solution-theme-global-js:
    name: Clarity Solution Theme Global JS
    type: globalJS
    url: global.*.js