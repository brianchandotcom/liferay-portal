apiVersion: v1
kind: ConfigMap
metadata:
  name: customrestservice-dxp-configs
  labels:
    cloud.liferay.com/serviceId: customrestservice
    dxp.liferay.com/configs: "true"
    projectCustomer: "yes"
    projectId: lcd13977
    projectSandbox: ""
    projectTrial: "no"
    projectType: ""
  annotations:
    cloud.liferay.com/context-data: '{"domains":["customrestservice.localdev.me"]}'
data:
  com.liferay.oauth2.application.factory.user.agent.configuration.v1.OAuth2ApplicationUserAgentConfiguration-customrestservice.config: |
    name="$[conf:cloud.liferay.com.serviceId]"
    homePageURL="https://$[conf:cloud.liferay.com.domain.0]"
    description="This a custom REST service DEMO"
    scopes=["Liferay.Headless.Admin.User.everything"]