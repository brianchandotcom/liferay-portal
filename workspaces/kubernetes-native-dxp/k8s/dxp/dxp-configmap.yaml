apiVersion: v1
kind: ConfigMap
metadata:
  name: dxp-configmap
  labels:
    app: dxp
data:
  com.liferay.k8s.agent.configuration.v1.K8sAgentConfiguration.config: |
    namespace="$[secret:namespace]"
    labelSelector="dxp=configmap"
  com.liferay.portal.security.sso.openid.connect.internal.configuration.OpenIdConnectProviderConfiguration-googleoidcprovider.config: |
    authorizationEndPoint=""
    companyId=L"20099"
    discoveryEndPoint="https://accounts.google.com/.well-known/openid-configuration"
    discoveryEndPointCacheInMillis=L"360000"
    idTokenSigningAlgValues=[ \
      "RS256", \
      ]
    issuerURL=""
    jwksURI=""
    openIdConnectClientId="$[secret:google.oidc.client.id]"
    openIdConnectClientSecret="$[secret:google.oidc.client.secret]"
    providerName="Google"
    registeredIdTokenSigningAlg=""
    scopes="openid\ email\ profile"
    subjectTypes=[ \
      ]
    tokenConnectionTimeout=I"1000"
    tokenEndPoint=""
    userInfoEndPoint=""
  com.liferay.portal.security.sso.openid.connect.configuration.OpenIdConnectConfiguration.config: |
    enabled=B"true"
  com.liferay.oauth2.provider.rest.internal.spi.bearer.token.provider.configuration.DefaultBearerTokenProviderConfiguration.config: |
    access.token.expires.in=I"60000"
    access.token.key.byte.size=I"32"
    refresh.token.expires.in=I"604800"
    refresh.token.key.byte.size=I"32"
  module.framework.system.packages.extra: "com.microsoft.sqlserver.jdbc,com.mysql.cj.jdbc,com.mysql.jdbc,com.p6spy.engine.spy,com.sun.security.auth.module,org.hsqldb.jdbc,org.mariadb.jdbc,sun.misc,sun.net.util,sun.security.provider,javax.websocket,javax.websocket.server,org.apache.tomcat.websocket.server,com.sun.net.httpserver"
  felix.cm.config.plugins: org.apache.felix.configadmin.plugin.interpolation
  org.apache.felix.configadmin.plugin.interpolation.file.encoding: "UTF-8"
  org.apache.felix.configadmin.plugin.interpolation.secretsdir: "/opt/liferay/osgi/configs,/var/run/secrets/kubernetes.io/serviceaccount"
