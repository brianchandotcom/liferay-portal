apiVersion: apps/v1
kind: Deployment
metadata:
  name: dxp-deployment
  labels:
    app: dxp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dxp
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: dxp
    spec:
      securityContext:
        runAsUser: 0
      initContainers:
        - name: init-dxp-pv
          image: k8s-native-dxp
          command:
          - bash
          - -c
          - if [ -z "$(ls -A /opt/liferay/data-pv)" ]; then chown -R 1000:1000 /opt/liferay/data-pv; ls -l /opt/liferay; cp -r /opt/liferay/data/* /opt/liferay/data-pv/; fi
          volumeMounts:
          - name: dxp-persistent-storage
            mountPath: "/opt/liferay/data-pv"
      containers:
        - name: dxp
          image: k8s-native-dxp
          imagePullPolicy: Never
          resources:
            limits:
              cpu: "4000m"
              memory: "8096Mi"
          livenessProbe:
            failureThreshold: 360
            httpGet:
              path: /c/portal/layout
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 300
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 30
          env:
            - name: LIFERAY_JPDA_ENABLED
              value: "true"
            - name: LIFERAY_COMPANY_PERIOD_SECURITY_PERIOD_STRANGERS_PERIOD_VERIFY
              value: "false"
            - name: LIFERAY_WEB_PERIOD_SERVER_PERIOD_PROTOCOL
              value: https
            - name: LIFERAY_MODULE_PERIOD_FRAMEWORK_PERIOD_PROPERTIES_PERIOD_ORG_PERIOD_APACHE_PERIOD_FELIX_PERIOD_CONFIGADMIN_PERIOD_PLUGIN_PERIOD_INTERPOLATION_PERIOD_SECRETSDIR
              value: /opt/liferay/osgi/configs,/var/run/secrets/kubernetes.io/serviceaccount
            - name: GOOGLE_OIDC_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: google-oidc-credentials-configmap
                  key: GOOGLE_OIDC_CLIENT_ID
            - name: GOOGLE_OIDC_CLIENT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: google-oidc-credentials-configmap
                  key: GOOGLE_OIDC_CLIENT_SECRET
            - name: SERVICE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: google-oidc-credentials-configmap
                  key: SERVICE_DOMAIN
          ports:
          - containerPort: 8080
          - containerPort: 8000
          - containerPort: 11311
          volumeMounts:
          - name: dxp-persistent-storage
            mountPath: "/opt/liferay/data"
      volumes:
        - name: dxp-persistent-storage
          persistentVolumeClaim:
            claimName: dxp-persistent-volume-claim
