apiVersion: v1
kind: ConfigMap
metadata:
  name: dxp-logging-configmap
data:
  # property-like keys; each key maps to a simple value
  com.liferay.kubernetes.config-log4j-ext.xml: |
    <?xml version="1.0"?>
    <!DOCTYPE log4j:configuration SYSTEM "log4j.dtd">
    <log4j:configuration xmlns:log4j="http://jakarta.apache.org/log4j/">
        <category name="com.liferay.kubernetes">
            <priority value="DEBUG" />
        </category>
        <category name="io.kubernetes">
            <priority value="DEBUG" />
        </category>
        <category name="okhttp3">
            <priority value="DEBUG" />
        </category>
    </log4j:configuration>
