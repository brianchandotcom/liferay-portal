apiVersion: v1
kind: PersistentVolume
metadata:
  name: dxp-persistent-volume
  labels:
    app: dxp
    type: local
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 4Gi
  hostPath:
    path: /data/dxp-volumne/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dxp-persistent-volume-claim
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi