apiVersion: apps/v1
kind: Deployment
metadata:
  name: liferayhelloworld
  labels:
    app: liferayhelloworld
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liferayhelloworld
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: liferayhelloworld
    spec:
      containers:
        - name: liferayhelloworld
          image: liferayhelloworld
          imagePullPolicy: Never
          ports:
          - containerPort: 80
          resources:
            limits:
              cpu: "200m"
              memory: "50Mi"
          env:
            - name: CORS_ALLOWED_ORIGIN
              value: dxp.localdev.me
            - name: LCP_SERVICE_DOMAIN
              value: localdev.me
            - name: LCP_PROJECT_ID
              value: dxp
            - name: WEBSERVER_SERVICE_HOST
              value: ""
