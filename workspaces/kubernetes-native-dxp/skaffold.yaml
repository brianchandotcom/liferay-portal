apiVersion: skaffold/v2beta28
kind: Config
build:
  artifacts:
  - image: k8s-native-dxp
    custom:
      buildCommand: ./gradlew resolve buildDockerImage -Pdocker.image.id=$IMAGE
      dependencies:
        paths:
        - modules/**/*
  - image: remote-app-a
    custom:
      buildCommand: lxc-extensions/liferay-hello-world/build.sh
      dependencies:
        paths:
        - lxc-extensions/liferay-hello-world/public
        - lxc-extensions/liferay-hello-world/src
        - lxc-extensions/liferay-hello-world/package.json
deploy:
  kustomize:
    paths:
    - k8s/dxp/
    - k8s/remoteappa/
---
apiVersion: skaffold/v2beta28
kind: Config
build:
  artifacts:
  - image: custom-rest-service
    custom:
      buildCommand: lxc-extensions/custom-rest-service/build.sh
      dependencies:
        paths:
        - lxc-extensions/custom-rest-service/src/**/*
        - lxc-extensions/custom-rest-service/pom.xml
deploy:
  kustomize:
    paths:
    - k8s/custom-rest-service/
