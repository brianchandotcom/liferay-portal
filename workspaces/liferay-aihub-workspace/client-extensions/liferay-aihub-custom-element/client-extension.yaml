assemble:
    -   from: build/vite
        into: static
liferay-ai-hub-custom-element:
    cssURLs:
        -   index.css
    friendlyURLMapping: liferay-ai-hub-custom-element
    htmlAttributes:
        ai-hub-url: https://ai.hub.liferay.com
        chatbot-external-reference-code: CHATBOT-ERC
        id: aihub-chatbot-widget-script
    htmlElementName: liferay-ai-hub-custom-element
    instanceable: false
    name: Liferay AI Hub Custom Element
    portletCategoryName: category.client-extensions
    type: customElement
    urls:
        -   widget.js
    useESM: true
