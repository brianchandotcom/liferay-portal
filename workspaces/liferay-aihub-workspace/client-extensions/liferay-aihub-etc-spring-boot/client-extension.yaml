assemble:
    -   fromTask: bootJar
liferay-aihub-etc-spring-boot-oaua:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay AI Hub Etc Spring Boot OAuth Application User Agent
    type: oAuthApplicationUserAgent
liferay-aihub-etc-spring-boot-object-action-crawler:
    name: Liferay AI Hub Etc Spring Boot Object Action Crawler
    oAuth2ApplicationExternalReferenceCode: liferay-aihub-etc-spring-boot-oaua
    resourcePath: /object/action/crawler
    type: objectAction