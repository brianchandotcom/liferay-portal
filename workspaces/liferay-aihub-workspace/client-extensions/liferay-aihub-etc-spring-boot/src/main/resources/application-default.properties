#
# Application
#

liferay.ai.hub.crawler.elasticsearch.host=
liferay.ai.hub.crawler.elasticsearch.port=
liferay.ai.hub.crawler.k8s.image.name=
liferay.ai.hub.crawler.k8s.namespace=

#
# LXC
#

com.liferay.lxc.dxp.domains=localhost:8080
com.liferay.lxc.dxp.mainDomain=localhost:8080
com.liferay.lxc.dxp.server.protocol=http

#
# OAuth
#

liferay-aihub-etc-spring-boot-oahs.oauth2.headless.server.client.secret=${LIFERAY_AIHUB_ETC_SPRING_BOOT_OAHS_CLIENT_SECRET:myfancypassword}

liferay.oauth.application.external.reference.codes=\
    liferay-aihub-etc-spring-boot-oahs,\
    liferay-aihub-etc-spring-boot-oaua

liferay.oauth.urls.excludes=/ready

#
# Spring Boot
#

server.port=58081