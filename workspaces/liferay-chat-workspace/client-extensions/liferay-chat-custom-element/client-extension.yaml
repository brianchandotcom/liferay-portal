assemble:
    - from: dist/liferay-chat
      into: static
liferay-chat-custom-element:
    cssURLs:
        - styles.*.css
    friendlyURLMapping: chat-ui
    htmlElementName: liferay-chat-window
    instanceable: true
    name: Liferay Chat Custom Element
    portletCategoryName: category.client-extensions
    type: customElement
    urls:
        - main.*.js
        - polyfills.*.js
        - runtime.*.js
    useESM: false