assemble:
    -   fromTask: bootJar
liferay-customer-etc-spring-boot-oahs:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay Customer Etc Spring Boot OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Admin.List.Type.everything
        -   Liferay.Headless.Admin.Taxonomy.everything
        -   Liferay.Headless.Admin.User.everything
        -   Liferay.Headless.Delivery.everything
        -   Liferay.Notification.REST.everything
        -   c_accountsubscription.everything.read
        -   c_koroneikiaccount.everything.read
        -   c_notificationsubscription.everything
        -   c_notificationtarget.everything
        -   c_ticketattachment.everything
    type: oAuthApplicationHeadlessServer
liferay-customer-etc-spring-boot-oaua:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay Customer Etc Spring Boot OAuth Application User Agent
    scopes:
        -   Liferay.Headless.Admin.User.everything.read
        -   c_ticketattachment.everything
    type: oAuthApplicationUserAgent