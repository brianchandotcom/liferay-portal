[#assign
	userFirstName = themeDisplay.getUser().getFirstName()
	welcomeText = languageUtil.get(locale, "welcome-to-customer-portal", "Welcome to Customer Portal")
/]

[#if userFirstName?has_content]
	[#assign welcomeText = languageUtil.format(locale, "welcome-x", userFirstName)]
[/#if]

<h1 clas="display-4">${welcomeText}</h1>
