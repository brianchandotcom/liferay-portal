assemble:
    - fromTask: bootJar
liferay-evp-etc-spring-boot-oauth-application-user-agent:
    .serviceAddress: 172.17.0.1:58081
    .serviceScheme: http
    name: Liferay EVP Etc Spring Boot Spring Boot OAuth Application User Agent
    scopes:
        - Liferay.Headless.Admin.Workflow.everything
        - C_EVPOrganization.everything.read
        - C_EVPRequest.everything.write
        - C_EVPRequest.everything.read
    type: oAuthApplicationUserAgent
liferay-evp-etc-spring-boot-object-action-evp-organization-status:
    name: Liferay EVP Etc Spring Boot Spring Boot Object Action EVP Organization Status
    oAuth2ApplicationExternalReferenceCode: liferay-evp-etc-spring-boot-oauth-application-user-agent
    resourcePath: /object/action/evp/organization/status/update
    type: objectAction
liferay-evp-etc-spring-boot-object-action-evp-request-status:
    name: Liferay EVP Etc Spring Boot Spring Boot Object Action EVP Request Status
    oAuth2ApplicationExternalReferenceCode: liferay-evp-etc-spring-boot-oauth-application-user-agent
    resourcePath: /object/action/evp/request/status
    type: objectAction