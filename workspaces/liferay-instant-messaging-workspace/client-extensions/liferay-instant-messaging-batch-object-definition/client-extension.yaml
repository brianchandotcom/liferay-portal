assemble:
    - from: batch
      into: batch
liferay-instant-messaging-batch-object-definition:
    name: Liferay Instant Messaging Object Definition
    oAuthApplicationHeadlessServer: liferay-instant-messaging-batch-object-definition-oauth-application-headless-server
    type: batch
liferay-instant-messaging-batch-object-definition-oauth-application-headless-server:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay Instant Messaging Batch OAuth Application Headless Server
    scopes:
        - Liferay.Headless.Batch.Engine.everything
        - Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer