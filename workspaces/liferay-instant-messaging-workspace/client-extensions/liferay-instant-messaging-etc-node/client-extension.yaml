assemble:
    - include:
          - "**/*.js"
          - application.json
          - package.json
liferay-instant-messaging-context-clause-add-etc-node:
    name: Liferay Chatbot Context Clause Add
    oAuth2ApplicationExternalReferenceCode: liferay-instant-messaging-etc-node-oauth-application-user-agent
    resourcePath: /context/clause/add
    type: objectAction
liferay-instant-messaging-context-clause-delete-etc-node:
    name: Liferay Chatbot Context Clause Delete
    oAuth2ApplicationExternalReferenceCode: liferay-instant-messaging-etc-node-oauth-application-user-agent
    resourcePath: /context/clause/delete
    type: objectAction
liferay-instant-messaging-context-clause-update-etc-node:
    name: Liferay Chatbot Context Clause Update
    oAuth2ApplicationExternalReferenceCode: liferay-instant-messaging-etc-node-oauth-application-user-agent
    resourcePath: /context/clause/update
    type: objectAction
liferay-instant-messaging-context-config-add-etc-node:
    name: Liferay Chatbot Add Context Configuration
    oAuth2ApplicationExternalReferenceCode: liferay-instant-messaging-etc-node-oauth-application-user-agent
    resourcePath: /context/config
    type: objectAction
liferay-instant-messaging-context-config-delete-etc-node:
    name: Liferay Chatbot Delete Context Configuration
    oAuth2ApplicationExternalReferenceCode: liferay-instant-messaging-etc-node-oauth-application-user-agent
    resourcePath: /context/config/delete
    type: objectAction
liferay-instant-messaging-etc-node-oauth-application-server:
    .serviceAddress: localhost:3001
    .serviceScheme: http
    name: Liferay Instant Messaging OAuth Application Server
    scopes:
        - Liferay.Headless.Admin.User.everything.read
        - Liferay.Object.Admin.REST.everything
        - c_message.everything
        - c_chatbot.everything
        - liferay-json-web-services.everything
    type: oAuthApplicationHeadlessServer
liferay-instant-messaging-etc-node-oauth-application-user-agent:
    .serviceAddress: localhost:3001
    .serviceScheme: http
    name: Liferay Instant Messaging OAuth Application User Agent
    scopes: []
    type: oAuthApplicationUserAgent