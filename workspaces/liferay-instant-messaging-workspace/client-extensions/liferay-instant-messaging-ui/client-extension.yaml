        - js/main.*.js
    useESM: true
liferay-instant-messaging-ui:
    cssURLs:
        - css/main.*.css
    friendlyURLMapping: liferay-instant-messaging-ui
    htmlElementName: liferay-instant-messaging-ui
    instanceable: true
    name: Liferay Instant Messaging
    portletCategoryName: category.client-extensions
    type: customElement
    urls:
        - js/main.*.js
    useESM: true
