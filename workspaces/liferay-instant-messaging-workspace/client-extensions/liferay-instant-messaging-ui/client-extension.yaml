assemble:
    - from: build/static
      into: static
liferay-chat-bot-manage-ui:
    cssURLs:
        - css/main.*.css
    friendlyURLMapping: liferay-chat-bot-manage
    htmlElementName: liferay-chat-bot-manage
    instanceable: false
    name: Liferay ChatBot Manager
    panelAppOrder: 700
    panelCategoryKey: control_panel.object
    type: customElement
