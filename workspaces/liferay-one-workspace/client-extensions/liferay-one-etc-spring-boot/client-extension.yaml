assemble:
    -   fromTask: bootJar
liferay-one-etc-spring-boot-oahs:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay One Etc Spring Boot OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Admin.User.everything
    type: oAuthApplicationHeadlessServer
liferay-one-etc-spring-boot-oaua:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay One Etc Spring Boot OAuth Application User Agent
    scopes: []
    type: oAuthApplicationUserAgent
liferay-one-etc-spring-boot-object-action-user-delete:
    name: Liferay One Etc Spring Boot Object Action User Delete
    oAuth2ApplicationExternalReferenceCode: liferay-one-etc-spring-boot-oaua
    resourcePath: /object/action/user/delete
    type: objectAction