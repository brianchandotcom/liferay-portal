<div class="lo-hero-banner overflow-hidden position-relative" data-lfr-background-image-id="backgroundImage">
	<div class="container-fluid-max-xl">
		<div class="d-flex flex-column lo-hero-banner-content position-relative">
			<nav aria-label="Breadcrumb" class="align-items-center d-flex lo-hero-banner-breadcrumb">
				<a href="${configuration.homeLink}">Home</a>

				[@clay["icon"] symbol="angle-right-small" /]

				[#if configuration.showBreadcrumbParent]
					<a class="lo-hero-banner-breadcrumb-parent" data-lfr-editable-id="breadcrumb-parent" data-lfr-editable-type="text" href="${configuration.parentLink}">Parent</a>

					[@clay["icon"] symbol="angle-right-small" /]
				[/#if]

				<span class="font-weight-semi-bold lo-hero-banner-breadcrumb-current" data-lfr-editable-id="breadcrumb-current" data-lfr-editable-type="text">Current Page</span>
			</nav>

			<div class="d-flex flex-column lo-hero-banner-text">
				<h1 class="font-weight-bold lo-hero-banner-title m-0" data-lfr-editable-id="title" data-lfr-editable-type="text">
					Page Title
				</h1>

				[#if configuration.showSubtitle]
					<p class="font-weight-normal lo-hero-banner-subtitle m-0" data-lfr-editable-id="subtitle" data-lfr-editable-type="text">
						Page subtitle goes here.
					</p>
				[/#if]
			</div>

			<lfr-drop-zone data-lfr-drop-zone-id="0" data-lfr-priority="0"></lfr-drop-zone>
		</div>
	</div>
</div>
