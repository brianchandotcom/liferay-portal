ext.faroEnvironmentName = System.getenv().get("FARO_ENVIRONMENT_NAME") ?: "local"
ext.faroImageTag = project.findProperty("docker.image.tag") ?: "latest"

// Pin service builder to the last version compatible with release.dxp.api:2026.q1.5.
// Versions >= 1.0.530 generate CollectionPersistenceFinder which is not in that API.

subprojects {
	plugins.withId("com.liferay.portal.tools.service.builder") {
		configurations.serviceBuilder {
			resolutionStrategy {
				force "com.liferay:com.liferay.portal.tools.service.builder:1.0.529"
			}
		}
	}
}

buildDockerImage {
	def tag = faroEnvironmentName == "prd" ? "prd-" + new Date().format("yyyyMMdd") : faroImageTag

	buildArgs = ["FARO_ENVIRONMENT_NAME": faroEnvironmentName]
	images = ["liferay/com-liferay-osb-faro:${tag}"]
}

task buildTheme(type: Exec)

buildTheme {
	dependsOn yarnInstall
	environment "PATH", "${project.buildDir}/node/bin:${System.getenv('PATH') ?: ''}"
	commandLine "${project.buildDir}/node/bin/node",
	"${project.buildDir}/node/lib/node_modules/npm/bin/npm-cli.js",
	"run", "build"
	workingDir "modules/osb-faro-theme"
}

createDockerfile {
	def extFile = file(faroEnvironmentName == "local" ? "modules/osb-faro-docker/local/Dockerfile.ext" : "modules/osb-faro-docker/cloud/Dockerfile.ext")

	inputs.file extFile
	outputs.upToDateWhen {
		false
	}

	doLast {
		file("${buildDir}/docker/Dockerfile") << "\n" + extFile.text
	}
}

dockerDeploy {
	dependsOn buildTheme

	doLast {
		copy {
			from "modules/osb-faro-theme/dist"
			include "*.war"
			into "${buildDir}/docker/deploy"
		}

		copy {
			from "modules/osb-faro-docker"
			exclude "cloud"
			into "${buildDir}/docker/docker"
		}

		copy {
			from "modules/osb-faro-docker/scripts/100_liferay_image_setup.sh"
			into "${buildDir}/docker"
		}

		def configsEnv = faroEnvironmentName == "local" ? "local" : "cloud"

		if (faroEnvironmentName != "local") {
			copy {
				from "modules/osb-faro-docker/cloud"
				into "${buildDir}/docker/docker"
			}
		}

		copy {
			from "modules/osb-faro-docker/portal-ext.properties"
			from "modules/osb-faro-docker/portal-setup-wizard.properties"
			into "${buildDir}/docker/configs/${configsEnv}"
		}

		copy {
			from "modules/osb-faro-docker/${configsEnv}/portal-env.properties"
			into "${buildDir}/docker/configs/${configsEnv}"
		}
	}
}

def buildUserProperties = new Properties()

def buildUserPropertiesFile = new File(rootProject.projectDir, "../../build.${System.getProperty('user.name')}.properties")

if (buildUserPropertiesFile.exists()) {
	buildUserPropertiesFile.withInputStream {
		buildUserProperties.load(it)
	}
}

allprojects {
	repositories {
		maven {
			url new File(rootProject.projectDir, "../../.m2")
		}

		maven {
			url new File(rootProject.projectDir, "../../.m2-tmp")
		}

		if (buildUserProperties["build.repository.private.url"]) {
			maven {
				credentials {
					password buildUserProperties["build.repository.private.password"] ?: ""
					username buildUserProperties["build.repository.private.username"] ?: ""
				}

				url buildUserProperties["build.repository.private.url"]
			}
		}

		mavenCentral()
	}
}

subprojects {
	tasks.all {
		Task task ->
		if (task.name == "baseline") {
			enabled = false
		}
	}

	tasks.withType(Test) {
		jvmArgs "--add-opens=java.base/java.lang.invoke=ALL-UNNAMED"
		maxHeapSize = "4096m"
	}
}

project(":modules:osb-faro-contacts-demo") {
	tasks.all {
		enabled = false
	}
}

project(":modules:osb-faro-dependencies") {
	tasks.all {
		enabled = false
	}
}