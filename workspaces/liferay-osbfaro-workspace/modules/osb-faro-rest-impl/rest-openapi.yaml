    "/workspace/{groupId}/channels/{channelId}/pages":
        get:
            description:
                "List analytics metrics for tracked pages on the workspace, ranked by views or another metric, optionally narrowed to a single channel (also known as property) or data source. Returns flattened view, visitor, bounce, exit, and access-path metrics for each page. For date-range filtering pass `rangeKey` as one of LAST_24_HOURS, YESTERDAY, LAST_7_DAYS, LAST_28_DAYS, LAST_30_DAYS, LAST_90_DAYS, LAST_180_DAYS, LAST_YEAR. Alternatively, pass `rangeStart` and `rangeEnd` as dates for a custom window. Use this for 'top pages' style queries."
            operationId: getWorkspaceGroupChannelPagesPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: path
                    description:
                        "Identifier of the channel whose search terms should be listed."
                    name: channelId
                    required: true
                    schema:
                        type: string
                -   in: query
                    description:
                        "Optional data source id to scope results to a single data source."
                    name: dataSourceId
                    schema:
                        type: string
                -   in: query
                    description:
                        "Page number (starts at 1)."
                    name: page
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Page size."
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Custom range end as date (e.g. 2026-01-01). Use with rangeStart as a rangeKey alternative."
                    name: rangeEnd
                    schema:
                        type: string
                -   in: query
                    description:
                        "Date-range preset. Use one of the listed enum values (e.g. LAST_30_DAYS). Mutually exclusive with rangeStart/rangeEnd. If rangeKey is set, rangeStart and rangeEnd are ignored. For custom windows, omit rangeKey and provide rangeStart and rangeEnd as dates."
                    example: LAST_30_DAYS
                    name: rangeKey
                    schema:
                        enum: [LAST_180_DAYS, LAST_24_HOURS, LAST_28_DAYS, LAST_30_DAYS, LAST_7_DAYS, LAST_90_DAYS, LAST_YEAR, YESTERDAY]
                        type: string
                -   in: query
                    description:
                        "Custom range start as datetime (e.g. 2026-01-01). Use with rangeEnd as a rangeKey alternative."
                    name: rangeStart
                    schema:
                        type: string
                -   in: query
                    description:
                        "Free-text keyword search across page titles and URLs."
                    name: search
                    schema:
                        type: string
                -   in: query
                    description:
                        "Sort expression `column:asc|desc`. Defaults to `viewsMetric:desc`. Common columns: viewsMetric, visitorsMetric, bounceMetric, avgTimeOnPageMetric."
                    example: viewsMetric:desc
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
