components:
    schemas:
        Account:
            description:
                "An account synced to Analytics Cloud. Accounts aggregate individuals (or contacts) employed by or associated with a single organization."
            properties:
                accountName:
                    description:
                        "Name of the account."
                    readOnly: true
                    type: string
                annualRevenue:
                    description:
                        "Annual revenue of the account."
                    format: double
                    readOnly: true
                    type: number
                country:
                    description:
                        "Country name where the account is headquartered."
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        "Last time the account record was modified within Analytics Cloud."
                    format: date-time
                    readOnly: true
                    type: string
                id:
                    description:
                        "Account ID. Use this with `getWorkspaceGroupAccount` to fetch the account directly."
                    readOnly: true
                    type: string
                industry:
                    description:
                        "Industry classification of the account (e.g. 'Software', 'Manufacturing')."
                    readOnly: true
                    type: string
                lastActivityDate:
                    description:
                        "Date of most recent activity from any individual associated with this account."
                    format: date-time
                    readOnly: true
                    type: string
                lifecycleStage:
                    description:
                        "Sales/marketing lifecycle stage of the account (e.g. 'Prospect', 'Customer')."
                    readOnly: true
                    type: string
            type: object
        AssetSummaryMetric:
            description:
                "An aggregated set of analytics metrics for a single tracked asset (page, blog, document, form, journal, object entry, etc.) over the selected date range. Trend percentages compare metrics on the selected date range to the previous date range. Use `getWorkspaceGroupChannelAssetSummariesPage` to list these sets of metrics."
            properties:
                assetId:
                    description:
                        "Identifier of the tracked asset."
                    readOnly: true
                    type: string
                assetTitle:
                    description:
                        "Display title of the asset (e.g. the page title or blog post title)."
                    readOnly: true
                    type: string
                assetType:
                    description:
                        "Asset category."
                    enum: [BLOG, DOCUMENT, FORM, JOURNAL, OBJECT_ENTRY, PAGE]
                    readOnly: true
                    type: string
                downloads:
                    description:
                        "Download count over the selected date range. Null when the asset type doesn't track downloads."
                    format: double
                    readOnly: true
                    type: number
                downloadsTrendPercentage:
                    description:
                        "Percentage change in downloads compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                impressions:
                    description:
                        "Impression count (asset rendered into a viewport but not necessarily interacted with)."
                    format: double
                    readOnly: true
                    type: number
                impressionsTrendPercentage:
                    description:
                        "Percentage change in impressions compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                reads:
                    description:
                        "Read count (full-content engagement, distinct from impressions)."
                    format: double
                    readOnly: true
                    type: number
                readsTrendPercentage:
                    description:
                        "Percentage change in reads compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                views:
                    description:
                        "View count (asset opened/loaded by an individual)."
                    format: double
                    readOnly: true
                    type: number
                viewsTrendPercentage:
                    description:
                        "Percentage change in views compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
            type: object
        Channel:
            description:
                "A logical grouping of data coming from configured data sources (e.g. a website, a CRM connection) under which asset metrics, events, individuals, and segments are scoped. Also known as property."
            properties:
                id:
                    description:
                        "Channel id. Use this with `getWorkspaceGroupChannel` to fetch the channel directly."
                    readOnly: true
                    type: string
                name:
                    description:
                        "Display name of the channel."
                    readOnly: true
                    type: string
            type: object
        Event:
            description:
                "A single tracked analytics event captured â€” page views, custom events, form submissions, etc. Each event carries free-form `attributes` (a name-value map of contextual properties) plus any matching page metadata. Use `getWorkspaceGroupChannelEventsPage` to retrieve a list of analytics events."
            properties:
                applicationId:
                    description:
                        "Identifier of the application that emitted the event."
                    readOnly: true
                    type: string
                assetTitle:
                    description:
                        "Title of the asset associated with the event."
                    readOnly: true
                    type: string
                attributes:
                    additionalProperties:
                        type: string
                    description:
                        "Free-form event properties as a key-value map. Available keys depend on the event `name` (e.g. a `pageViewed` event carries different attributes than `formSubmitted`)."
                    readOnly: true
                    type: object
                canonicalUrl:
                    description:
                        "Canonical URL of the page where the event was emitted."
                    readOnly: true
                    type: string
                createDate:
                    description:
                        "Timestamp of when the event was recorded."
                    format: date-time
                    readOnly: true
                    type: string
                individualId:
                    description:
                        "Identifier of the individual that emitted the event. Null for anonymous individuals. Use with `getWorkspaceGroupIndividual` to fetch the individual."
                    readOnly: true
                    type: string
                name:
                    description:
                        "Name of the event type (e.g. 'pageViewed', 'formSubmitted', etc.). The set of available names varies per channel and per integration."
                    readOnly: true
                    type: string
                pageDescription:
                    description:
                        "Meta description of the page that emitted the event."
                    readOnly: true
                    type: string
                pageKeywords:
                    description:
                        "Meta keywords of the page that emitted the event. Comma-separated when there are multiple."
                    readOnly: true
                    type: string
                pageTitle:
                    description:
                        "Title of the page that event occurred on."
                    readOnly: true
                    type: string
                referrer:
                    description:
                        "Referring URL the visitor arrived from."
                    readOnly: true
                    type: string
                url:
                    description:
                        "Full URL of the page where the event was emitted."
                    readOnly: true
                    type: string
            type: object
        Individual:
            description:
                "A single individual synced to Analytics Cloud. Individuals are aggregated from data sources configured to sync to Analytics Cloud, and may be either 'known' (identified by email) or 'anonymous' (browser-tracked only)."
            properties:
                accountName:
                    description:
                        "Display name of the account this Individual is primarily associated with."
                    readOnly: true
                    type: string
                activitiesCount:
                    description:
                        "Total number of tracked activities attributed to this individual."
                    format: int64
                    readOnly: true
                    type: integer
                dateCreated:
                    description:
                        "First time this Individual was observed by Analytics Cloud."
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        "Last time this individual's profile was modified."
                    format: date-time
                    readOnly: true
                    type: string
                demographics:
                    additionalProperties:
                        items:
                            $ref: "#/components/schemas/IndividualDemographicField"
                        type: array
                    description:
                        "Per-category demographic attributes attached to this Individual. The map key is the demographic category (e.g. 'profile', 'address', 'employment'), and each value is a list of attribute records. Use `IndividualDemographicField.fieldType` to interpret each `value`."
                    readOnly: true
                    type: object
                firstActivityDate:
                    description:
                        "Date of the earliest tracked activity for this individual."
                    format: date-time
                    readOnly: true
                    type: string
                id:
                    description:
                        "Individual ID. Use this with `getWorkspaceGroupIndividual` to fetch a single individual."
                    readOnly: true
                    type: string
                lastActivityDate:
                    description:
                        "Date of the most recent tracked activity for this individual."
                    format: date-time
                    readOnly: true
                    type: string
                lastSessionCountry:
                    description:
                        "Country detected for the individual's most recent session."
                    readOnly: true
                    type: string
                profileType:
                    description:
                        "Profile classification. KNOWN individuals are identified by email/account; ANONYMOUS individuals are browser-tracked only."
                    enum: [ANONYMOUS, KNOWN]
                    readOnly: true
                    type: string
            type: object
        IndividualDemographicField:
            description:
                "A single demographic attribute attached to an individual (e.g. job title, age, country). Sourced from connected data sources. Multiple attributes can share a category in `Individual.demographics`."
            properties:
                fieldType:
                    description:
                        "Logical data type of the value. Use this to interpret the `value` field."
                    enum: [BOOLEAN, DATE, NUMBER, STRING]
                    readOnly: true
                    type: string
                label:
                    description:
                        "Human-readable label for the attribute."
                    readOnly: true
                    type: string
                name:
                    description:
                        "Canonical attribute name. Can be used in filter expressions and OData queries."
                    readOnly: true
                    type: string
                value:
                    description:
                        "Attribute value, always serialized as a string. Use `fieldType` to interpret/parse it as the underlying logical type."
                    readOnly: true
                    type: string
            type: object
        IndividualSegment:
            description:
                "A saved audience definition that selects individuals matching a filter expression."
            properties:
                activeIndividualCount:
                    description:
                        "Number of individuals currently in the segment who have been active."
                    format: int64
                    readOnly: true
                    type: integer
                anonymousIndividualCount:
                    description:
                        "Number of anonymous individuals in this segment."
                    format: int64
                    readOnly: true
                    type: integer
                channelId:
                    description:
                        "Identifier of the channel this segment is scoped to."
                    readOnly: true
                    type: string
                dateCreated:
                    description:
                        "When the segment was created."
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        "Last time the segment definition was modified."
                    format: date-time
                    readOnly: true
                    type: string
                filter:
                    description:
                        "OData-style filter expression that defines segment membership."
                    readOnly: true
                    type: string
                id:
                    description:
                        "Segment id. Use this with `getWorkspaceGroupIndividualSegment` to fetch a single segment."
                    readOnly: true
                    type: string
                includeAnonymousUsers:
                    description:
                        "True if anonymous individuals are eligible for membership in this segment."
                    readOnly: true
                    type: boolean
                individualCount:
                    description:
                        "Total individuals in the segment."
                    format: int64
                    readOnly: true
                    type: integer
                knownIndividualCount:
                    description:
                        "Number of known individuals in this segment."
                    format: int64
                    readOnly: true
                    type: integer
                lastActivityDate:
                    description:
                        "Most recent activity by any individual currently in the segment."
                    format: date-time
                    readOnly: true
                    type: string
                name:
                    description:
                        "Display name of the segment."
                    readOnly: true
                    type: string
                segmentType:
                    description:
                        "Segment evaluation cadence."
                    enum: [BATCH, REAL_TIME]
                    readOnly: true
                    type: string
                state:
                    description:
                        "Lifecycle state of the segment."
                    enum: [DISABLED, IN_PROGRESS, READY]
                    readOnly: true
                    type: string
                status:
                    description:
                        "Operational status of the segment."
                    enum: [ACTIVE, INACTIVE]
                    readOnly: true
                    type: string
            type: object
        IndividualSegmentMembership:
            description:
                "A single individual's membership in an individual segment. Captures when the Individual entered the segment and (if applicable) when they exited."
            properties:
                dateCreated:
                    description:
                        "When the individual entered the segment."
                    format: date-time
                    readOnly: true
                    type: string
                dateRemoved:
                    description:
                        "When the individual exited the segment. Null if membership is still active."
                    format: date-time
                    readOnly: true
                    type: string
                individualId:
                    description:
                        "Identifier of the individual whose membership this record describes. Use with `getWorkspaceGroupIndividual` to fetch the individual."
                    readOnly: true
                    type: string
                individualSegmentId:
                    description:
                        "Identifier of the segment this membership belongs to."
                    readOnly: true
                    type: string
                status:
                    description:
                        "Membership status. ACTIVE means currently a member; INACTIVE means formerly a member."
                    enum: [ACTIVE, INACTIVE]
                    readOnly: true
                    type: string
            type: object
        PageMetric:
            description:
                "Analytics metrics for a single tracked page over the selected date range. Use `getWorkspaceGroupChannelPagesPage` to list these metrics for a site."
            properties:
                assetId:
                    description:
                        "Identifier of the tracked page (the page's canonical URL)."
                    readOnly: true
                    type: string
                assetTitle:
                    description:
                        "Display title of the page."
                    readOnly: true
                    type: string
                avgTimeOnPage:
                    description:
                        "Average time on page in seconds across all sessions in the date range."
                    format: double
                    readOnly: true
                    type: number
                bounceRate:
                    description:
                        "Fraction of sessions that landed on this page and exited without further interaction. Expressed as a value between 0 to 1."
                    format: double
                    readOnly: true
                    type: number
                dataSourceId:
                    description:
                        "Identifier of the data source providing this page's analytics events."
                    readOnly: true
                    type: string
                directAccess:
                    description:
                        "Total count of sessions where this page was the entry point with no referrer over the selected time range."
                    format: double
                    readOnly: true
                    type: number
                entrances:
                    description:
                        "Total count of sessions that started on this page over the selected time range."
                    format: double
                    readOnly: true
                    type: number
                exitRate:
                    description:
                        "Fraction of sessions on which this page was the last page viewed before exit. Expressed as a value between 0 to 1."
                    format: double
                    readOnly: true
                    type: number
                indirectAccess:
                    description:
                        "Visit count where this page was reached via a referrer (search engine, link, etc.)."
                    format: double
                    readOnly: true
                    type: number
                urls:
                    description:
                        "List of distinct URLs that resolve to this page."
                    items:
                        type: string
                    readOnly: true
                    type: array
                views:
                    description:
                        "Total page view count over the selected date range."
                    format: double
                    readOnly: true
                    type: number
                viewsTrendPercentage:
                    description:
                        "Percentage change in views compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
                visitors:
                    description:
                        "Distinct visitor count over the selected date range."
                    format: double
                    readOnly: true
                    type: number
                visitorsTrendPercentage:
                    description:
                        "Percentage change in distinct visitors compared to the previous date range."
                    format: double
                    readOnly: true
                    type: number
            type: object
        SearchTerm:
            description:
                "Search term metrics. Use `getWorkspaceGroupChannelSearchTermsPage` to list these metrics for a workspace."
            properties:
                count:
                    description:
                        "Number of times the term has been searched."
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        "Value of the term that was searched."
                    readOnly: true
                    type: string
            type: object
        Workspace:
            description:
                "An Analytics Cloud workspace synced from a Liferay site. Each workspace owns its own channels, individuals, accounts, segments, and asset analytics. Workspaces are scoped to the Liferay group identified by `groupId`."
            properties:
                groupId:
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace. Use this with other endpoints to scope requests to this workspace."
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        "Display name of the workspace."
                    readOnly: true
                    type: string
            type: object
info:
    description:
        "Read-only headless REST API for Liferay Analytics Cloud. Exposes accounts, asset-summary metrics, events, individuals, individual segments, page metrics, properties, and search terms for use as MCP tools and external integrations. All endpoints are scoped to a provisioned Analytics Cloud workspace. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID 'com.liferay.osb.faro.rest.client', and version '1.0.0'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: Liferay Analytics Cloud Headless REST API
    version: v1.0
    x-class-name: FaroRest
openapi: 3.0.1
paths:
    "/workspace/{groupId}/accounts/{accountId}":
        get:
            description:
                "Fetch a single account by id from an Analytics Cloud Workspace. Use this when you already have an account id. To search accounts by name or filter, use `getWorkspaceGroupChannelAccountsPage`."
            operationId: getWorkspaceGroupAccount
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: path
                    description:
                        "ID of the account to fetch."
                    name: accountId
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Account"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Account"
            tags: ["Account"]
    "/workspace/{groupId}/channels":
        get:
            description:
                "List channels configured within an Analytics Cloud workspaces. To fetch a single channel by id, use `getWorkspaceGroupChannel`."
            operationId: getWorkspaceGroupChannelsPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Channel"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Channel"
                                type: array
            tags: ["Channel"]
    "/workspace/{groupId}/channels/{channelId}":
        get:
            description:
                "Fetch a single channel (also known as property) from an Analytics Cloud workspace. To list available channels in the workspace use `getWorkspaceGroupChannelsPage`."
            operationId: getWorkspaceGroupChannel
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: path
                    description:
                        "ID of the channel to fetch."
                    name: channelId
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Channel"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Channel"
            tags: ["Channel"]
    "/workspace/{groupId}/channels/{channelId}/accounts":
        get:
            description:
                "List or search accounts synced to an Analytics Cloud workspace. Optionally narrow results to a single channel (also known as property). Use this to browse or search accounts by name. To fetch a single account by id, use `getAccount`."
            operationId: getWorkspaceGroupChannelAccountsPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: path
                    description:
                        "Identifier of the channel whose search terms should be listed."
                    name: channelId
                    required: true
                    schema:
                        type: string
                -   in: query
                    description:
                        "Page number (starts at 1)."
                    name: page
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Page size."
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Free-text keyword search across account name and related fields. Empty or null returns all matching assets."
                    name: search
                    schema:
                        type: string
                -   in: query
                    description:
                        "Sort expression `column:asc|desc`. Defaults to `accountName:asc` when omitted. Separate with commas for multiple column sort."
                    example: accountName:asc
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Account"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Account"
                                type: array
            tags: ["Account"]
    "/workspace/{groupId}/channels/{channelId}/asset-summaries":
        get:
            description:
                "List analytics asset summaries for pages, blogs, documents, forms, journal articles, and object entries. Rank summaries by the requested sort metric. Each summary includes download, impression, read, and view counts along with their period-over-period trend percentages. Optionally narrow results to a single channel (also known as property) or to a date range. For date-range filtering pass `rangeKey` as one of LAST_24_HOURS, YESTERDAY, LAST_7_DAYS, LAST_28_DAYS, LAST_30_DAYS, LAST_90_DAYS, LAST_180_DAYS, LAST_YEAR. Alternatively, pass `rangeStart` and `rangeEnd` as dates for a custom window. Use this to answer 'what content is performing best' and to pick assets for deeper drill-down via `getWorkspaceGroupChannelPagesPage`."
            operationId: getWorkspaceGroupChannelAssetSummariesPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: path
                    description:
                        "Identifier of the channel whose search terms should be listed."
                    name: channelId
                    required: true
                    schema:
                        type: string
                -   in: query
                    description:
                        "Page number (starts at 1)."
                    name: page
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Page size."
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Custom range end as date (e.g. 2026-01-01). Use with rangeStart as a rangeKey alternative."
                    name: rangeEnd
                    schema:
                        type: string
                -   in: query
                    description:
                        "Date-range preset. Use one of the listed enum values (e.g. LAST_30_DAYS). Mutually exclusive with rangeStart/rangeEnd. If rangeKey is set, rangeStart and rangeEnd are ignored. For custom windows, omit rangeKey and provide rangeStart and rangeEnd as dates."
                    example: LAST_30_DAYS
                    name: rangeKey
                    schema:
                        enum: [LAST_180_DAYS, LAST_24_HOURS, LAST_28_DAYS, LAST_30_DAYS, LAST_7_DAYS, LAST_90_DAYS, LAST_YEAR, YESTERDAY]
                        type: string
                -   in: query
                    description:
                        "Custom range start as datetime (e.g. 2026-01-01). Use with rangeEnd as a rangeKey alternative."
                    name: rangeStart
                    schema:
                        type: string
                -   in: query
                    description:
                        "Free-text keyword search across asset titles. Empty or null returns all matching assets."
                    name: search
                    schema:
                        type: string
                -   in: query
                    description:
                        "Sort expression `column:asc|desc`. Defaults to `viewsMetric:desc` when omitted. Common columns: viewsMetric, downloadsMetric, impressionMadeMetric, readsMetric."
                    example: viewsMetric:desc
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AssetSummaryMetric"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AssetSummaryMetric"
                                type: array
            tags: ["AssetSummaryMetric"]
    "/workspace/{groupId}/channels/{channelId}/events":
        get:
            description:
                "List tracked analytics events for a specific channel (also known as property), optionally narrowed to a date range. For date-range filtering pass `rangeKey` as one of LAST_24_HOURS, YESTERDAY, LAST_7_DAYS, LAST_28_DAYS, LAST_30_DAYS, LAST_90_DAYS, LAST_180_DAYS, LAST_YEAR. Alternatively, pass `rangeStart` and `rangeEnd` as dates for a custom window. For aggregated metrics across events, prefer `getWorkspaceGroupChannelAssetSummariesPage` or `getWorkspaceGroupChannelPagesPage`."
            operationId: getWorkspaceGroupChannelEventsPage
            parameters:
                -   in: path
                    description:
                        "Identifier of the Liferay site that owns the Analytics Cloud workspace."
                    name: groupId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: path
                    description:
                        "Identifier of the channel whose events should be listed."
                    name: channelId
                    required: true
                    schema:
                        type: string
                -   in: query
                    description:
                        "If true, events from anonymous (browser-tracked) individuals are included. Defaults to false."
                    name: includeAnonymousUsers
                    schema:
                        type: boolean
                -   in: query
                    description:
                        "Page number (starts at 1)."
                    name: page
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Page size."
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    description:
                        "Custom range end as date (e.g. 2026-01-01). Use with rangeStart as a rangeKey alternative."
                    name: rangeEnd
                    schema:
                        type: string
                -   in: query
                    description:
                        "Date-range preset. Use one of the listed enum values (e.g. LAST_30_DAYS). Mutually exclusive with rangeStart/rangeEnd. If rangeKey is set, rangeStart and rangeEnd are ignored. For custom windows, omit rangeKey and provide rangeStart and rangeEnd as dates."
                    example: LAST_30_DAYS
                    name: rangeKey
                    schema:
                        enum: [LAST_180_DAYS, LAST_24_HOURS, LAST_28_DAYS, LAST_30_DAYS, LAST_7_DAYS, LAST_90_DAYS, LAST_YEAR, YESTERDAY]
                        type: string
                -   in: query
                    description:
                        "Custom range start as date (e.g. 2026-01-01). Use with rangeEnd as a rangeKey alternative."
                    name: rangeStart
                    schema:
                        type: string
                -   in: query
                    description:
                        "Free-text keyword search across event fields. Empty or null returns all matching events."
                    name: search
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Event"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/Event"
                                type: array
            tags: ["Event"]
    "/workspace/{groupId}/channels/{channelId}/individual-segments":
        get:
            description:
