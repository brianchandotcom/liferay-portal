query getWorkspaceGroupChannelEventsPage(
    $channelId: String!
    $includeAnonymousUsers: Boolean
    $keywords: String
    $page: Int!
    $rangeEnd: String
    $rangeKey: Int
    $rangeStart: String
    $size: Int!
) {
    eventBag: events(
        channelId: $channelId
        includeAnonymousUsers: $includeAnonymousUsers
        keywords: $keywords
        page: $page
        rangeEnd: $rangeEnd
        rangeKey: $rangeKey
        rangeStart: $rangeStart
        size: $size
    ) {
        events {
            applicationId
            assetTitle
            canonicalUrl
            createDate
            emailAddressHashed
            name
            pageDescription
            pageKeywords
            pageTitle
            properties {
                name
                value
            }
            referrer
            url
        }
        total
    }
}