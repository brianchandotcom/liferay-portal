query getWorkspaceGroupChannelPagesPage(
    $channelId: String
    $dataSourceId: String
    $keywords: String
    $rangeEnd: String
    $rangeKey: Int
    $rangeStart: String
    $size: Int!
    $sort: Sort!
    $start: Int!
) {
    pageMetricBag: pages(
        channelId: $channelId
        dataSourceId: $dataSourceId
        keywords: $keywords
        rangeEnd: $rangeEnd
        rangeKey: $rangeKey
        rangeStart: $rangeStart
        size: $size
        sort: $sort
        start: $start
    ) {
        pageMetrics: assetMetrics {
            ... on PageMetric {
                assetId
                assetTitle
                assetType
                avgTimeOnPageMetric {
                    value
                }
                bounceRateMetric {
                    value
                }
                dataSourceId
                directAccessMetric {
                    value
                }
                entrancesMetric {
                    value
                }
                exitRateMetric {
                    value
                }
                indirectAccessMetric {
                    value
                }
                urls
                viewsMetric {
                    trend {
                        percentage
                    }
                    value
                }
                visitorsMetric {
                    trend {
                        percentage
                    }
                    value
                }
            }
        }
        total
    }
}