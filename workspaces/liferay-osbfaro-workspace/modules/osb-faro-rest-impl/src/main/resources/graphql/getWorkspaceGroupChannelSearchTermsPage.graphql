query getWorkspaceGroupChannelSearchTermsPage(
	$channelId: String
    $rangeEnd: String
    $rangeKey: Int
    $rangeStart: String
    $size: Int!
    $start: Int!
) {
    compositionBag: searchTerms(
    	channelId: $channelId
        rangeEnd: $rangeEnd
        rangeKey: $rangeKey
        rangeStart: $rangeStart
        size: $size
        start: $start
    ) {
        compositions {
            count
            name
        }
        total
    }
}