import com.liferay.gradle.plugins.node.task.YarnInstallTask

task osbYarnInstall(type: YarnInstallTask)
task osbYarnTest(type: Exec)
task osbYarnWebpack(type: Exec)

dependencies {
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-annotations", version: "2.18.6"
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-core", version: "2.18.6"
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-databind", version: "2.18.6"
	compileInclude group: "com.fasterxml.jackson.jakarta.rs", name: "jackson-jakarta-rs-base", version: "2.18.6"
	compileInclude group: "com.fasterxml.jackson.jakarta.rs", name: "jackson-jakarta-rs-json-provider", version: "2.18.6"
	compileInclude group: "com.github.albfernandez", name: "juniversalchardet", version: "2.4.0"
	compileInclude group: "com.github.scribejava", name: "scribejava-core", version: "6.6.3"
	compileInclude group: "com.univocity", name: "univocity-parsers", version: "2.9.1"
	compileInclude group: "fi.solita.clamav", name: "clamav-client", version: "1.0.1"
	compileInclude group: "org.apache.httpcomponents", name: "httpclient", version: "4.5.13"
	compileInclude group: "org.apache.httpcomponents", name: "httpcore", version: "4.4.14"
	compileOnly group: "com.liferay", name: "jakarta.ws.rs", version: "3.1.0.LIFERAY-PATCHED-2"
	compileOnly group: "com.liferay", name: "org.apache.cxf.core", version: "3.6.9.JAKARTA-LIFERAY-PATCHED-1"
	compileOnly group: "com.liferay", name: "org.apache.cxf.rt.frontend.jaxrs", version: "3.6.9.JAKARTA-LIFERAY-PATCHED-1"
	compileOnly group: "com.liferay.portal", name: "release.dxp.api", version: "2026.q1.5"
	compileOnly group: "commons-codec", name: "commons-codec", version: "1.15"
	compileOnly group: "jakarta.annotation", name: "jakarta.annotation-api", version: "2.1.1"
	compileOnly group: "org.apache.commons", name: "commons-collections4", version: "4.5.0"
	compileOnly group: "org.apache.commons", name: "commons-lang3", version: "3.18.0"
	compileOnly project(":modules:osb-faro-api")
	compileOnly project(":modules:osb-faro-contacts-api")
	compileOnly project(":modules:osb-faro-engine-client")
	compileOnly project(":modules:osb-faro-provisioning-client")
	testImplementation group: "org.mockito", name: "mockito-core", version: "5.14.2"
}

generateJSPJava {
	enabled = false
}

node {
	global = false
	nodeVersion = "20.12.2"
	useNpm = false
	yarnVersion = "1.22.19"
}

osbYarnInstall {
	doLast {
		delete ".yarnrc"
	}

	workingDir = projectDir
}

osbYarnTest {
	args = [osbYarnInstall.scriptFile, "test"]
	dependsOn osbYarnWebpack
	executable = new File(osbYarnInstall.nodeDir, "bin/node")
	workingDir = projectDir
}

osbYarnWebpack {
	args = [osbYarnInstall.scriptFile, "webpack"]
	dependsOn osbYarnInstall
	executable = new File(osbYarnInstall.nodeDir, "bin/node")
	workingDir = projectDir
}

packageRunTest {
	setActions([])

	dependsOn osbYarnTest
}

packageRunWebpack {
	dependsOn osbYarnInstall

	if (project.hasProperty("faroEnvironmentName")) {
		environment "FARO_ENVIRONMENT_NAME", faroEnvironmentName
	}

	enabled = ((System.getProperty("liferay.ci") == "true") || (System.getProperty("user.name") != "root") || (project.hasProperty("faroEnvironmentName") && (faroEnvironmentName != "local")))

	inputs.dir "src/main/css"
	inputs.dir "src/main/images"
	inputs.dir "src/main/js"

	outputs.dir "src/main/resources/META-INF/resources/dist"
}

processResources {
	dependsOn packageRunWebpack
}

tasks.named("copyCSS") {
	dependsOn tasks.named("packageRunWebpack")
}