import com.liferay.gradle.util.hash.HashUtil
import com.liferay.gradle.util.hash.HashValue

task buildFavicon(type: Copy)

buildFavicon {
	doFirst {
		delete "build/static"
	}

	from "assets/favicon.ico"
	into "build/static"

	rename {
		HashValue hashValue = HashUtil.sha1(file("assets/favicon.ico"))

		"favicon." + hashValue.asHexString() + ".ico"
	}
}