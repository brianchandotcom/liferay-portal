#
# Application
#

liferay.seo.studio.crawler.elasticsearch.host=
liferay.seo.studio.crawler.elasticsearch.pipeline=
liferay.seo.studio.crawler.elasticsearch.port=
liferay.seo.studio.crawler.local.network.allowed=false
liferay.seo.studio.crawler.url.queue.size.limit=50000
liferay.seo.studio.detector.max.docs=10000

#
# LXC
#

com.liferay.lxc.dxp.domains=localhost:8080
com.liferay.lxc.dxp.mainDomain=localhost:8080
com.liferay.lxc.dxp.server.protocol=http

#
# OAuth
