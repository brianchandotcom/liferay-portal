liferay-seostudio-crawler-oauth.oauth2.headless.server.client.secret=myfancypassword
liferay.oauth.application.external.reference.codes=liferay-seostudio-crawler-oauth
liferay.oauth.urls.excludes=/ready

#
# Spring Boot
#

server.port=58081