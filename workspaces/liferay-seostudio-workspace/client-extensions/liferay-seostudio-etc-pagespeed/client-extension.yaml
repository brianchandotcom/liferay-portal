assemble:
    -   fromTask: bootJar
liferay-seostudio-etc-pagespeed-oahs:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay SEO Studio Etc PageSpeed OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Portal.Instances.read
        -   c_seostudiodomain.read
        -   c_seostudioinstance.read
        -   c_seostudioscan.write
    type: oAuthApplicationHeadlessServer
liferay-seostudio-etc-pagespeed-oaua:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay SEO Studio Etc PageSpeed OAuth Application User Agent
    type: oAuthApplicationUserAgent