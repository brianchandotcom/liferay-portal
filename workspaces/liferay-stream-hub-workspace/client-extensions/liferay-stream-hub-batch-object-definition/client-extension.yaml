assemble:
    -   from: batch
        into: batch
liferay-stream-hub-batch-object-definition:
    name: Liferay Stream Hub Object Definition
    oAuthApplicationHeadlessServer: liferay-stream-hub-batch-object-definition-oauth-application-headless-server
    type: batch
liferay-stream-hub-batch-object-definition-oauth-application-headless-server:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay Stream Hub Batch OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Batch.Engine.everything
        -   Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer