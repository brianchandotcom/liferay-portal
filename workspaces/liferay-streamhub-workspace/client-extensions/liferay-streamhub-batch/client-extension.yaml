assemble:
    -   from: batch
        into: batch
liferay-streamhub-batch:
    name: Liferay Stream Hub Batch
    oAuthApplicationHeadlessServer: liferay-streamhub-batch-oauth-application-headless-server
    type: batch
liferay-streamhub-batch-oauth-application-headless-server:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay Stream Hub Batch OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Batch.Engine.everything
        -   Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer
