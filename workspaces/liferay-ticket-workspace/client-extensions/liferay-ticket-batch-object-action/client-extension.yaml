assemble:
    - from: batch
      into: batch
liferay-ticket-batch-object-action:
    name: Liferay Ticket Batch Object Action
    oAuthApplicationHeadlessServer: liferay-ticket-batch-object-action-oauth-application-headless-server
    type: batch
liferay-ticket-batch-object-action-oauth-application-headless-server:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay Ticket Batch Object Action OAuth Application Headless Server
    scopes:
        - Liferay.Headless.Batch.Engine.everything
        - Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer