<div class="bg-light py-6">
	<div class="sheet sheet-lg">
		<form>
			<legend class="font-weight-bold mb-1 text-8" data-lfr-editable-id="uswds-form-title" data-lfr-editable-type="text">Reset password</legend>

			<fieldset>
				<legend class="text-3" data-lfr-editable-id="uswds-form-legend" data-lfr-editable-type="text">Please enter your new password</legend>

				<div class="alert alert-indicator-start alert-info">
					<span class="alert-indicator">
						[@clay["icon"] symbol="exclamation-full" className="exclamation-full"/]
					</span>

					<div class="font-weight-bold text-7" data-lfr-editable-id="uswds-form-alert-title" data-lfr-editable-type="text">Password information</div>

					<p>
						While float short else enum boolean static import, throws char private finally volatile
					</p>
				</div>

				<div class="form-group">
					<label for="password-reset" data-lfr-editable-id="uswds-form-password-label" data-lfr-editable-type="text">New password</label>

					<input class="form-control" id="password-reset" name="password" type="password" />
				</div>

				<div class="form-group">
					<label for="confirmPassword" data-lfr-editable-id="uswds-form-confirm-password-label" data-lfr-editable-type="text">Confirm password</label>

					<input class="form-control" id="confirmPassword" name="confirmPassword" type="password" />
				</div>

				<div class="form-group">
					<input class="btn btn-primary" type="submit" value="Reset password" />
				</div>
			</fieldset>
		</form>
	</div>

	<div class="sheet sheet-lg">
		<h3>Select</h3>

		<div class="form-group">
			<label for="regularSelectElement">Regular Select Element</label>

			<select class="form-control" id="regularSelectElement">
				<option>Sample 1</option>
				<option>Sample 2</option>
				<option>Sample 3</option>
				<option>Sample 4</option>
				<option>ReallySuperInsanelyJustIncrediblyLongAndTotallyNotPossibleWordButWeAreReallyTryingToCoverAllOurBasesHereJustInCaseSomeoneIsNutsAsPerUsualReallySuperInsanelyJustIncrediblyLongAndTotallyNotPossibleWordButWeAreReallyTryingToCoverAllOurBasesHereJustInCaseSomeoneIsNutsAsPerUsualReallySuperInsanelyJustIncrediblyLongAndTotallyNotPossibleWordButWeAreReallyTryingToCoverAllOurBasesHereJustInCaseSomeoneIsNutsAsPerUsual</option>
			</select>
		</div>

		<div class="form-group">
			<label for="selectElementWithSize5">Select Element with Size 5</label>

			<select class="form-control" id="selectElementWithSize5" size="5">
				<option>Sample 1</option>
				<option>Sample 2</option>
				<option>Sample 3</option>
				<option>Sample 4</option>
				<option>Sample 5</option>
				<option>Sample 6</option>
				<option>Sample 7</option>
				<option>Sample 8</option>
			</select>
		</div>

		<div class="form-group">
			<label for="multipleSelectOptionsSelectElement">Select Element with Multiple Select Options</label>

			<select class="form-control" id="multipleSelectOptionsSelectElement" multiple>
				<option>Sample 1</option>
				<option>Sample 2</option>
				<option>Sample 3</option>
				<option>Sample 4</option>
				<option>Sample 5</option>
				<option>Sample 6</option>
				<option>Sample 7</option>
				<option>Sample 8</option>
			</select>
		</div>
	</div>

	<div class="sheet sheet-lg">
		<h3>Custom Checkbox</h3>

		<div class="form-group">
			<div class="custom-checkbox custom-control">
				<label>
					<input class="custom-control-input" type="checkbox" />

					<span class="custom-control-label"></span>
				</label>
			</div>

			<div class="custom-checkbox custom-control">
				<label>
					<input class="custom-control-input" type="checkbox" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">Unchecked ReallySuperInsanelyJustIncrediblyLongAndTotallyNotPossibleWordButWeAreReallyTryingToCoverAllOurBasesHereJustInCaseSomeoneIsNutsAsPerUsual</span>
					</span>
				</label>
			</div>

			<div class="custom-checkbox custom-control">
				<label>
					<input checked class="custom-control-input" type="checkbox" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">Checked</span>
					</span>
				</label>
			</div>

			<div class="custom-checkbox custom-control">
				<label>
					<input class="clay-site-custom-checkbox-indeterminate custom-control-input" type="checkbox" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">Indeterminate</span>
					</span>
				</label>
			</div>
		</div>

		<div class="form-group">
			<div class="custom-checkbox custom-control">
				<label>
					<input class="custom-control-input" disabled type="checkbox" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">Unchecked Disabled</span>
					</span>
				</label>
			</div>

			<div class="custom-checkbox custom-control">
				<label>
					<input checked class="custom-control-input" disabled type="checkbox" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">Checked Disabled</span>
					</span>
				</label>
			</div>

			<div class="custom-checkbox custom-control">
				<label>
					<input class="clay-site-custom-checkbox-indeterminate custom-control-input" disabled type="checkbox" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">Indeterminate Disabled</span>
					</span>
				</label>
			</div>
		</div>

		<h3>Custom Radio</h3>

		<div class="form-group">
			<div class="custom-control custom-radio">
				<label>
					<input checked class="custom-control-input" id="radio1" name="radio" type="radio" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">
							ReallySuperInsanelyJustIncrediblyLongAndTotallyNotPossibleWordButWeAreReallyTryingToCoverAllOurBasesHereJustInCaseSomeoneIsNutsAsPerUsual
						</span>
					</span>
					<span class="badge badge-primary"><span class="badge-item badge-item-expand">10</span></span>
				</label>
			</div>

			<div class="custom-control custom-radio">
				<label>
					<input class="custom-control-input" id="radio2" name="radio" type="radio" />

					<span class="custom-control-label">
						<span class="custom-control-label-text">Or toggle this other custom radio</span>
					</span>
				</label>
			</div>
		</div>
	</div>
</div>
