buildscript {
	dependencies {
		classpath group: "org.springframework.boot", name: "spring-boot-gradle-plugin", version: "2.7.3"
	}
	repositories {
		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}

	}
}

apply plugin: "java"
apply plugin: "org.springframework.boot"

bootRun {
	systemProperties System.properties
}

dependencies {
	implementation group: "com.fasterxml.jackson.core", name: "jackson-databind", version: "2.13.3"
	implementation group: "org.springframework.boot", name: "spring-boot-starter-oauth2-client", version: "2.7.3"
	implementation group: "org.springframework.boot", name: "spring-boot-starter-oauth2-resource-server", version: "2.7.3"
	implementation group: "org.springframework.boot", name: "spring-boot-starter-web", version: "2.7.3"
	implementation group: "org.springframework.boot", name: "spring-boot-starter-webflux", version: "2.7.3"
}

repositories {
	maven {
		url "https://repository-cdn.liferay.com/nexus/content/groups/public"
	}
}

try {
  tasks.named("assembleClientExtension") {
    from bootJar
  }
} catch (Exception e) {}