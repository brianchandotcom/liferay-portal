assemble:
    - include: "batch/*"
    - include: job.sh
batch:
    oAuth2ApplicationExternalReferenceCode: sample-oauth-application-headless-server
sample-oauth-application-headless-server:
    ext.lxc.liferay.com.mainDomain: localhost
    name: Sample OAuth Application Headless Server
    scopes:
        - Liferay.Headless.Admin.Workflow.everything
        - Liferay.Headless.Batch.Engine.everything
        - Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer